[auth]
enabled = true
site_url = "https://whistle-ai.com"
additional_redirect_urls = ["https://whistle-ai.com/**", "https://motiveinno-jpg.github.io/**", "http://localhost:*/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "60s"
otp_length = 6
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10
[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
[auth.mfa.web_authn]
enroll_enabled = false
verify_enabled = false

# OAuth providers managed via Supabase Dashboard (secrets required)
