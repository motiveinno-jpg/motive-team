}

/* === ENHANCED KPI FUNCTIONS === */
function calcARPU(){var paid=S.users.filter(function(u){return u.plan&&u.plan!=='free';});if(!paid.length)return 0;return calcMRR()/paid.length;}
function calcChurnRate(){var cancelled=S.subscriptions.filter(function(s){return s.status==='cancelled';}).length;var total=S.subscriptions.length;if(!total)return 0;return(cancelled/total*100);}
function calcConversionRate(){var total=S.users.length;if(!total)return 0;var paid=S.users.filter(function(u){return u.plan&&u.plan!=='free';}).length;return(paid/total*100);}
function calcLTV(){var arpu=calcARPU();var churn=calcChurnRate()/100;if(churn<=0)return arpu*12;return arpu/churn;}
function calcActiveRate(){var total=S.users.length;if(!total)return 0;var thirtyDaysAgo=new Date(Date.now()-30*864e5).toISOString();var active=S.users.filter(function(u){return u.last_sign_in_at&&u.last_sign_in_at>thirtyDaysAgo;}).length;return(active/total*100);}
function calcUsageSummary(){var summary={};if(!S.usageEvents)return summary;S.usageEvents.forEach(function(e){if(!summary[e.feature])summary[e.feature]={count:0,revenue:0};summary[e.feature].count+=e.quantity||1;summary[e.feature].revenue+=(e.unit_price||0)*(e.quantity||1);});return summary;}

function sortUsers(arr){
  var s=S._userSort;var col=s.col;var dir=s.asc?1:-1;
  return arr.slice().sort(function(a,b){
    var va,vb;
    if(col==='email'){va=(a.display_name||a.email||'').toLowerCase();vb=(b.display_name||b.email||'').toLowerCase();}
    else if(col==='company_name'){va=(a.company_name||'').toLowerCase();vb=(b.company_name||'').toLowerCase();}
    else if(col==='plan'){va=a.plan||'free';vb=b.plan||'free';}
    else if(col==='is_active'){va=a.is_active?1:0;vb=b.is_active?1:0;}
    else if(col==='analyses'){va=S.analyses.filter(function(x){return x.user_id===a.id;}).length;vb=S.analyses.filter(function(x){return x.user_id===b.id;}).length;}
    else{va=a.created_at||'';vb=b.created_at||'';}
    if(va<vb)return -1*dir;if(va>vb)return 1*dir;return 0;
  });
}
function setUserSort(col){
  if(S._userSort.col===col)S._userSort.asc=!S._userSort.asc;
  else{S._userSort={col:col,asc:true};}
  S._pg={};render();
}
function userSortCls(col){return 'sortable'+(S._userSort.col===col?(S._userSort.asc?' asc':' desc'):'');}

/* ── Feedback Management ── */
function getFeedbacks(){return S.serviceRequests.filter(function(s){return s.service_type==='feedback'||((s.type||'').indexOf('feedback_')===0);});}
function pgFeedback(){
  if(S.selectedFB)return pgFBDetail();
  var all=getFeedbacks();
  var filtered=all;
  if(S.searchFilter){var q=S.searchFilter.toLowerCase();filtered=filtered.filter(function(f){var d=f.details||{};return (d.title||'').toLowerCase().indexOf(q)>=0||(d.description||'').toLowerCase().indexOf(q)>=0||(d.feedback_type||'').toLowerCase().indexOf(q)>=0||(d.company||'').toLowerCase().indexOf(q)>=0;});}
  var fbTab=S._fbTab||'all';
  if(fbTab!=='all')filtered=filtered.filter(function(f){return (f.details||{}).feedback_type===fbTab;});
  var bugs=all.filter(function(f){return (f.details||{}).feedback_type==='bug';}).length;
  var features=all.filter(function(f){return (f.details||{}).feedback_type==='feature';}).length;
  var partners=all.filter(function(f){return (f.details||{}).feedback_type==='partnership';}).length;
  var pending=all.filter(function(f){return f.status==='pending';}).length;
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:20px;font-weight:800">'+(_isKorean?'📢 피드백 관리':'📢 Feedback')+'</h2><div style="font-size:12px;color:var(--w40);margin-top:4px">'+(_isKorean?'사용자 피드백 · 버그 신고 · 기능 요청 · 제휴 문의':'User feedback, bugs, features, partnership')+'</div></div><div style="display:flex;gap:8px"><input class="form-input" placeholder="'+(_isKorean?'검색...':'Search...')+'" value="'+esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="width:200px;padding:8px 12px;font-size:13px"></div></div>';
  h+='<div class="grid-4" style="margin-bottom:20px">';
  h+='<div class="card"><div class="card-b" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--err)">'+bugs+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'🐛 버그 신고':'🐛 Bugs')+'</div></div></div>';
  h+='<div class="card"><div class="card-b" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--acc)">'+features+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'💡 기능 요청':'💡 Features')+'</div></div></div>';
  h+='<div class="card"><div class="card-b" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--purple)">'+partners+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'🤝 제휴 문의':'🤝 Partnership')+'</div></div></div>';
  h+='<div class="card"><div class="card-b" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--pri)">'+pending+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'⏳ 미처리':'⏳ Pending')+'</div></div></div></div>';
  h+='<div style="display:flex;gap:6px;margin-bottom:16px">';
  ['all','bug','feature','partnership'].forEach(function(t){var label={all:(_isKorean?'전체':'All')+' ('+all.length+')',bug:'🐛 '+(_isKorean?'버그':'Bug')+' ('+bugs+')',feature:'💡 '+(_isKorean?'기능':'Feature')+' ('+features+')',partnership:'🤝 '+(_isKorean?'제휴':'Partner')+' ('+partners+')'}[t];h+='<button onclick="S._fbTab=\''+t+'\';render()" class="btn btn-sm '+(fbTab===t?'btn-admin':'btn-ghost')+'" style="font-size:11px">'+label+'</button>';});
  h+='</div>';

/* ── Service Requests ── */
function pgServiceReq(){
  if(S.selectedSR)return pgSRDetail();
  var filtered=filterBySearch(S.serviceRequests,['title','service_type']);
  if(S.tab!=='all')filtered=filtered.filter(function(s){return s.status===S.tab;});

  var tabs=['all','pending','accepted','processing','completed','cancelled'];
  var tabL={all:_isKorean?'전체':'All',pending:_isKorean?'접수':'Received',accepted:_isKorean?'배정':'Assigned',processing:_isKorean?'처리중':'Processing',completed:_isKorean?'완료':'Done',cancelled:_isKorean?'취소':'Cancelled'};

  /* SLA 계산 */
  var slaHours={urgent:4,high:24,normal:72,low:168};
  function getSLA(sr){
    var h=slaHours[sr.priority||'normal']||72;
    var created=new Date(sr.created_at);var now=new Date();
    var elapsed=Math.floor((now-created)/(1000*60*60));
    var remain=h-elapsed;
    return {total:h,elapsed:elapsed,remain:remain,pct:Math.min(Math.round(elapsed/h*100),100),overdue:remain<0};
  }

  /* 파이프라인 요약 */
  var pipeline='<div style="display:flex;gap:6px;margin-bottom:16px">'+
    [{s:'pending',i:'📥',c:'var(--w40)'},{s:'accepted',i:'👤',c:'var(--pri)'},{s:'processing',i:'⚙️',c:'var(--acc)'},{s:'completed',i:'✅',c:'var(--ok)'}].map(function(st){
    var cnt=S.serviceRequests.filter(function(x){return x.status===st.s;}).length;
    return '<div style="flex:1;padding:12px;border-radius:10px;background:var(--w08);text-align:center;border-bottom:3px solid '+(cnt?st.c:'transparent')+'">'+
    '<div style="font-size:16px">'+st.i+'</div><div style="font-size:10px;color:var(--w40)">'+tabL[st.s]+'</div>'+
    '<div style="font-size:20px;font-weight:800;color:'+(cnt?st.c:'var(--w20)')+'">'+cnt+'</div></div>';
  }).join('')+'</div>';

  /* 긴급 SLA 경고 */
  var urgentSRs=S.serviceRequests.filter(function(sr){return sr.status!=='completed'&&sr.status!=='cancelled'&&getSLA(sr).overdue;});
  var urgentAlert=urgentSRs.length?'<div style="padding:10px 14px;border-radius:10px;background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.2);margin-bottom:12px;font-size:12px;color:var(--err)">⚠️ SLA 초과 '+urgentSRs.length+'건 — 즉시 처리 필요</div>':'';

  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-size:18px;font-weight:800">'+(_isKorean?'💼 서비스 요청':'💼 Service Requests')+'</h2>'+UI.badge(S.serviceRequests.length+'건','acc')+'</div>'+
  pipeline+urgentAlert+
  '<div style="display:flex;gap:10px;margin-bottom:16px"><div class="search-box" style="flex:1"><input placeholder="'+(_isKorean?'서비스 검색...':'Search services...')+'" value="'+S.searchFilter+'" oninput="Adm.setSearch(this.value)"></div></div>'+
  '<div class="tab-bar">'+tabs.map(function(t){
    var c=t==='all'?S.serviceRequests.length:S.serviceRequests.filter(function(s){return s.status===t;}).length;
    return '<div class="tab-item '+(S.tab===t?'active':'')+'" onclick="Adm.setTab(\''+t+'\')">'+tabL[t]+' <span style="font-size:10px;color:var(--w20)">'+c+'</span></div>';
  }).join('')+'</div>'+
  '<div class="card"><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>'+(_isKorean?'서비스':'Service')+'</th><th>'+(_isKorean?'유저':'User')+'</th><th>'+(_isKorean?'상태':'Status')+'</th><th>'+(_isKorean?'긴급도':'Priority')+'</th><th>SLA</th><th>'+(_isKorean?'담당':'Assigned')+'</th><th>'+(_isKorean?'금액':'Amount')+'</th></tr></thead><tbody>'+
  (filtered.length?filtered.map(function(sr){
    var sla=getSLA(sr);
    var slaCol=sla.overdue?'var(--err)':sla.remain<12?'var(--acc)':'var(--ok)';
    var isDone=sr.status==='completed'||sr.status==='cancelled';
    return '<tr onclick="Adm.viewSR(\''+sr.id+'\')" style="'+(sla.overdue&&!isDone?'background:rgba(255,82,82,.04)':'')+'"><td>'+U.si(sr.service_type)+' '+U.sl(sr.service_type)+'</td><td style="font-size:12px">'+getUserName(sr.user_id)+'</td><td>'+UI.sb(sr.status)+'</td><td>'+UI.badge(sr.priority||'normal',sr.priority==='urgent'?'err':sr.priority==='high'?'acc':'ghost')+'</td>'+
    '<td style="font-size:11px;color:'+(isDone?'var(--w20)':slaCol)+'">'+(isDone?'—':(sla.overdue?(_isKorean?'초과 ':'Overdue ')+Math.abs(sla.remain)+'h':sla.remain+'h'))+'</td>'+
    '<td style="font-size:11px;color:var(--w40)">'+(sr.assigned_to?getUserName(sr.assigned_to):(_isKorean?'미배정':'Unassigned'))+'</td>'+
    '<td style="font-family:JetBrains Mono;font-size:12px">'+(sr.price?U.krw(sr.price):'\u2014')+'</td></tr>';
  }).join(''):'<tr><td colspan="7">'+UI.empty('💼',_isKorean?'결과 없음':'No results','')+'</td></tr>')+
  '</tbody></table></div></div>';
}

function pgSRDetail(){
  var sr=S.selectedSR;if(!sr)return'';

  /* SLA 계산 */
  var slaHours={urgent:4,high:24,normal:72,low:168};
  var slaH=slaHours[sr.priority||'normal']||72;
  var elapsed=Math.floor((new Date()-new Date(sr.created_at))/(1000*60*60));
  var remain=slaH-elapsed;var slaPct=Math.min(Math.round(elapsed/slaH*100),100);
  var isDone=sr.status==='completed'||sr.status==='cancelled';

  /* SLA 바 */
  var slaBar='<div style="padding:12px;border-radius:10px;background:'+(remain<0&&!isDone?'rgba(255,82,82,.06)':'var(--w08)')+';margin-bottom:16px;border:1px solid '+(remain<0&&!isDone?'rgba(255,82,82,.15)':'var(--bd)')+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+

    '<span style="font-size:11px;color:var(--w40)">목표: '+slaH+'h / 경과: '+elapsed+'h</span></div>'+
    '<div style="height:6px;border-radius:3px;background:var(--w08)"><div style="height:100%;border-radius:3px;background:'+slaCol+';width:'+slaPct+'%;transition:width .3s"></div></div></div>';

  return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><button class="btn btn-ghost btn-sm" onclick="Adm.set({selectedSR:null})">'+(_isKorean?'← 목록':'← Back')+'</button><h2 style="font-size:18px;font-weight:800;flex:1">'+U.si(sr.service_type)+' '+U.sl(sr.service_type)+'</h2>'+UI.sb(sr.status)+'</div>'+

/* ── Analytics ── */
function pgAnalytics(){
  var tabs=['users','pages','funnel'];
  var tabL={users:_isKorean?'유저 분석':'User Analytics',pages:_isKorean?'페이지뷰':'Page Views',funnel:_isKorean?'전환 퍼널':'Conversion Funnel'};
  var tabBar='<div class="tab-bar">'+tabs.map(function(t){
    return '<div class="tab-item '+(S.analyticsTab===t?'active':'')+'" onclick="Adm.setAnalyticsTab(\''+t+'\')">'+tabL[t]+'</div>';
  }).join('')+'</div>';
  if(S.analyticsTab==='pages') return pgAnalyticsPages(tabBar);
  if(S.analyticsTab==='funnel') return pgAnalyticsFunnel(tabBar);
  return pgAnalyticsUsers(tabBar);
}
function pgAnalyticsUsers(tabBar){
  var today=new Date();
  var days=[];for(var i=29;i>=0;i--){var d=new Date(today-i*864e5);days.push(d.toISOString().slice(0,10));}
  var signupByDay={};days.forEach(function(d){signupByDay[d]=0;});
  S.users.forEach(function(u){var d=(u.created_at||'').slice(0,10);if(signupByDay[d]!==undefined)signupByDay[d]++;});
  var maxSignup=Math.max.apply(null,days.map(function(d){return signupByDay[d];}))||1;
  var roles=groupBy(S.users,'role');var roleLabels={client:_isKorean?'제조사':'Manufacturer',buyer:_isKorean?'바이어':'Buyer',admin:_isKorean?'관리자':'Admin'};
  var clients=S.users.filter(function(u){return u.role==='client';});var plans=groupBy(clients,'plan');
  var countries={};S.buyers.forEach(function(b){if(b.country)countries[b.country]=(countries[b.country]||0)+1;});
  return '<div style="margin-bottom:20px"><h2 style="font-size:18px;font-weight:800">'+(_isKorean?'📈 분석 / 통계':'📈 Analytics')+'</h2></div>'+tabBar+
  '<div class="card" style="margin-bottom:16px"><div class="card-h">'+(_isKorean?'가입 추이 (30일)':'Signups (30 days)')+'</div><div class="card-b">'+
    '<div style="display:flex;align-items:flex-end;gap:2px;height:100px">'+days.map(function(d){var v=signupByDay[d];var h=Math.max(Math.round(v/maxSignup*80),2);return '<div title="'+d+': '+v+'명" style="flex:1;height:'+h+'px;background:var(--pri);border-radius:2px 2px 0 0;opacity:'+(v?1:0.2)+'"></div>';}).join('')+'</div>'+
    '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--w20)"><span>'+days[0]+'</span><span>'+days[days.length-1]+'</span></div>'+
  '</div></div>'+
  '<div class="grid-2" style="margin-bottom:16px">'+
    '<div class="card"><div class="card-h">'+(_isKorean?'역할 분포':'Role Dist.')+'</div><div class="card-b">'+Object.keys(roleLabels).map(function(k){return hBar(roleLabels[k],(roles[k]||[]).length,S.users.length,'var(--pri)');}).join('')+'</div></div>'+
    '<div class="card"><div class="card-h">'+(_isKorean?'플랜 분포 (제조사)':'Plan Dist. (Manufacturers)')+'</div><div class="card-b">'+['free','starter','pro','alibaba'].map(function(k){var cnt=0;clients.forEach(function(u){if(k==='starter'&&(u.plan==='starter'||u.plan==='basic'))cnt++;else if(u.plan===k)cnt++;});var r=U.pl(k);return hBar(r[0],cnt,clients.length||1,r[1]);}).join('')+'</div></div>'+
  '</div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-h">'+(_isKorean?'국가별 바이어':'Buyers by Country')+'</div><div class="card-b">'+(function(){var sorted=Object.entries(countries).sort(function(a,b){return b[1]-a[1];});var mx=sorted.length?sorted[0][1]:1;return sorted.map(function(e){return hBar(flag(e[0])+' '+e[0],e[1],mx,'var(--pri)');}).join('');})()+
    '</div></div>'+
    '<div class="card"><div class="card-h">'+(_isKorean?'활동 수준':'Activity Level')+'</div><div class="card-b">'+(function(){var t7=new Date(today-7*864e5);var t30=new Date(today-30*864e5);var a7=S.users.filter(function(u){return new Date(u.updated_at)>=t7;}).length;var a30=S.users.filter(function(u){return new Date(u.updated_at)>=t30;}).length;return hBar(_isKorean?'7일 내 활동':'Active 7d',a7,S.users.length,'var(--ok)')+hBar(_isKorean?'30일 내 활동':'Active 30d',a30,S.users.length,'var(--acc)')+hBar(_isKorean?'비활성 (30일+)':'Inactive (30d+)',S.users.length-a30,S.users.length,'var(--err)');})()+
    '</div></div>'+
  '</div>';
}

  var maxPV=sorted.length?sorted[0].count:1;
  var pvByRole=groupBy(S.pageViews,'role');var roleLabels={client:_isKorean?'제조사':'Manufacturer',buyer:_isKorean?'바이어':'Buyer',admin:_isKorean?'관리자':'Admin'};
  var pvByPortal=groupBy(S.pageViews,'portal');
  var today=new Date();var days=[];for(var i=29;i>=0;i--){var d=new Date(today-i*864e5);days.push(d.toISOString().slice(0,10));}
  var pvByDay={};days.forEach(function(d){pvByDay[d]=0;});

  '<div class="grid-4" style="margin-bottom:16px">'+UI.stat(_isKorean?'총 페이지뷰':'Total Views',S.pageViews.length,'','var(--pri)')+UI.stat(_isKorean?'고유 페이지':'Unique Pages',sorted.length,'','var(--acc)')+UI.stat(_isKorean?'제조사 뷰':'Mfr Views',(pvByRole['client']||[]).length,'','var(--ok)')+UI.stat(_isKorean?'바이어 뷰':'Buyer Views',(pvByRole['buyer']||[]).length,'','var(--purple)')+'</div>'+
  '<div class="card" style="margin-bottom:16px"><div class="card-h">'+(_isKorean?'페이지뷰 추이 (30일)':'Page Views (30 days)')+'</div><div class="card-b">'+
    '<div style="display:flex;align-items:flex-end;gap:2px;height:100px">'+days.map(function(d){var v=pvByDay[d];var h=Math.max(Math.round(v/maxDayPV*80),2);return '<div title="'+d+': '+v+'" style="flex:1;height:'+h+'px;background:var(--acc);border-radius:2px 2px 0 0;opacity:'+(v?1:0.2)+'"></div>';}).join('')+'</div>'+
    '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--w20)"><span>'+days[0]+'</span><span>'+days[days.length-1]+'</span></div>'+
  '</div></div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-h">'+(_isKorean?'인기 페이지 TOP':'Top Pages')+'</div><div class="card-b">'+sorted.slice(0,10).map(function(p){return hBar(p.page,p.count,maxPV,'var(--pri)');}).join('')+'</div></div>'+
    '<div class="card"><div class="card-h">'+(_isKorean?'포털별 / 역할별':'By Portal / Role')+'</div><div class="card-b"><div style="font-size:12px;font-weight:600;color:var(--w40);margin-bottom:8px">'+(_isKorean?'포털':'Portal')+'</div>'+Object.entries(pvByPortal).map(function(e){return hBar(e[0]||'unknown',e[1].length,S.pageViews.length||1,'var(--acc)');}).join('')+'<div style="font-size:12px;font-weight:600;color:var(--w40);margin:12px 0 8px">'+(_isKorean?'역할':'Role')+'</div>'+Object.keys(roleLabels).map(function(k){return hBar(roleLabels[k],(pvByRole[k]||[]).length,S.pageViews.length||1,'var(--pri)');}).join('')+'</div></div>'+
  '</div>';
}
function pgAnalyticsFunnel(tabBar){
  var clients=S.users.filter(function(u){return u.role==='client';});
  var wA=new Set();S.analyses.forEach(function(a){wA.add(a.user_id);});
  var wP=new Set();S.products.forEach(function(p){wP.add(p.user_id);});
  var wM=new Set();S.matchings.forEach(function(m){wM.add(m.user_id);});
  var wO=new Set();S.orders.forEach(function(o){wO.add(o.user_id);});
  var wC=new Set();S.matchings.filter(function(m){return m.status==='completed';}).forEach(function(m){wC.add(m.user_id);});
  var funnel=[{label:_isKorean?'가입':'Signup',count:clients.length,color:'var(--w60)'},{label:_isKorean?'분석 완료':'Analysis Done',count:wA.size,color:'var(--pri)'},{label:_isKorean?'제품 등록':'Product Listed',count:wP.size,color:'var(--acc)'},{label:_isKorean?'바이어 매칭':'Buyer Matched',count:wM.size,color:'var(--warn)'},{label:_isKorean?'주문 발생':'Order Placed',count:wO.size,color:'var(--purple)'},{label:_isKorean?'거래 완료':'Deal Closed',count:wC.size,color:'var(--ok)'}];
  var buyerUsers=S.users.filter(function(u){return u.role==='buyer';});
  var bR=new Set();S.buyerRequests.forEach(function(r){bR.add(r.buyer_id);});
  var bM=new Set();S.matchings.forEach(function(m){bM.add(m.buyer_id);});
  var bO=new Set();S.orders.forEach(function(o){bO.add(o.buyer_id);});
  var buyerFunnel=[{label:_isKorean?'가입':'Signup',count:buyerUsers.length,color:'var(--w60)'},{label:_isKorean?'바이어 등록':'Buyer Registered',count:S.buyers.length,color:'var(--pri)'},{label:_isKorean?'문의 작성':'Inquiry Made',count:bR.size,color:'var(--acc)'},{label:_isKorean?'매칭 진행':'Matching',count:bM.size,color:'var(--warn)'},{label:_isKorean?'주문':'Orders',count:bO.size,color:'var(--ok)'}];
  function funnelBar(f,base){var pct=base?Math.round(f.count/base*100):0;var w=Math.max(pct,8);return '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--w60)">'+f.label+'</span><span style="font-size:12px;font-weight:700;font-family:JetBrains Mono;color:'+f.color+'">'+f.count+' ('+pct+'%)</span></div><div style="height:28px;background:'+f.color+'15;border-radius:6px;width:'+w+'%;display:flex;align-items:center;padding:0 10px"><div style="height:100%;background:'+f.color+';border-radius:6px;width:100%;opacity:.7"></div></div></div>';}
  return '<div style="margin-bottom:20px"><h2 style="font-size:18px;font-weight:800">'+(_isKorean?'📈 분석 / 통계':'📈 Analytics')+'</h2></div>'+tabBar+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-h">'+(_isKorean?'제조사 퍼널':'Manufacturer Funnel')+'</div><div class="card-b">'+funnel.map(function(f){return funnelBar(f,clients.length);}).join('')+'</div></div>'+
    '<div class="card"><div class="card-h">'+(_isKorean?'바이어 퍼널':'Buyer Funnel')+'</div><div class="card-b">'+buyerFunnel.map(function(f){return funnelBar(f,buyerUsers.length||1);}).join('')+'</div></div>'+
  '</div>';
}

function pgSellers(){
  if(S.selectedSeller) return pgSellerDetail();
  var clients=S.users.filter(function(u){return u.role==='client';});
  var totalRev=sumBy(S.orders.filter(function(o){return o.payment_status==='paid'||o.status==='completed';}),'total_amount');
  var paidClients=clients.filter(function(u){return u.plan&&u.plan!=='free';}).length;
  var filtered=filterBySearch(clients,['email','company_name','display_name']);
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-size:18px;font-weight:800">'+(_isKorean?'🏭 제조사 관리':'🏭 Manufacturers')+'</h2>'+UI.badge(clients.length+'명','pri')+'</div>'+
  '<div class="grid-4" style="margin-bottom:16px">'+UI.stat(_isKorean?'제조사':'Manufacturers',clients.length,(_isKorean?'유료 ':'Paid ')+paidClients+(_isKorean?'명':''),'var(--pri)')+UI.stat(_isKorean?'등록 제품':'Products',S.products.length,'','var(--acc)')+UI.stat(_isKorean?'진행 딜':'Deals',S.matchings.length,'','var(--ok)')+UI.stat(_isKorean?'누적 매출':'Revenue',U.usd(totalRev),'','var(--admin)')+'</div>'+
  '<div style="display:flex;gap:10px;margin-bottom:16px"><div class="search-box" style="flex:1"><input placeholder="'+(_isKorean?'회사명, 이메일 검색...':'Search company, email...')+'" value="'+S.searchFilter+'" oninput="Adm.setSearch(this.value)"></div></div>'+
  '<div class="card"><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>'+(_isKorean?'회사':'Company')+'</th><th>'+(_isKorean?'제품':'Products')+'</th><th>'+(_isKorean?'딜':'Deals')+'</th><th>'+(_isKorean?'매출':'Revenue')+'</th><th>'+(_isKorean?'플랜':'Plan')+'</th><th>'+(_isKorean?'가입일':'Joined')+'</th></tr></thead><tbody>'+
  (filtered.length?filtered.map(function(u){
    var prods=S.products.filter(function(p){return p.user_id===u.id;}).length;

function saveDisputeForm(e){
  e.preventDefault();var f=e.target;
  var data={type:f.type.value,subject:f.subject.value,description:f.description.value,priority:f.priority.value,reporter_role:f.reporter_role.value,reporter_id:S.user.id,status:'open'};

  var _saveDisputeBtn=f.querySelector('[type=submit]');btnLoading(_saveDisputeBtn,true);
  sb.from('disputes').insert(data).select().then(function(r){
    btnLoading(_saveDisputeBtn,false);
    if(r.error)return UI.toast((_isKorean?'등록 실패: ':'Registration failed: ')+r.error.message,'err');
    S.disputes.unshift(r.data[0]);closeModal('modal-dispute');UI.toast(_isKorean?'분쟁이 등록되었습니다':'Dispute registered','ok');render();

function changeDisputeStatus(id,val){
  if((val==='resolved'||val==='closed')&&!confirm('분쟁을 "'+DST[val]+'" 처리하시겠습니까?'))return;
  var upd={status:val,updated_at:new Date().toISOString()};
  if(val==='resolved'||val==='closed'){upd.resolved_by=S.user.id;upd.resolved_at=new Date().toISOString();}
  sb.from('disputes').update(upd).eq('id',id).select().then(function(r){
    if(r.error)return UI.toast(_isKorean?'변경 실패':'Change failed','err');
    var d=r.data[0];var idx=S.disputes.findIndex(function(x){return x.id===id;});if(idx>=0)S.disputes[idx]=d;
    if(S.selectedDispute&&S.selectedDispute.id===id)S.selectedDispute=d;
    UI.toast('상태 변경: '+DST[val],'ok');render();
  });
}
function changeDisputePriority(id,val){
  sb.from('disputes').update({priority:val,updated_at:new Date().toISOString()}).eq('id',id).select().then(function(r){
    if(r.error)return UI.toast(_isKorean?'변경 실패':'Change failed','err');
    var d=r.data[0];var idx=S.disputes.findIndex(function(x){return x.id===id;});if(idx>=0)S.disputes[idx]=d;
    if(S.selectedDispute&&S.selectedDispute.id===id)S.selectedDispute=d;
    UI.toast('우선순위 변경: '+DPR[val],'ok');render();
  });
}

/* ── Deals Management ── */
function pgDeals(){
  if(S.selectedDeal)return pgDealDetail(S.selectedDeal);
  var deals=S.deals||[];
  var tab=S.dealsTab||'all';
  var search=(S.searchFilter||'').toLowerCase();
  // Filter by tab (stage)
  if(tab!=='all')deals=deals.filter(function(d){return d.stage===tab;});
  // Search filter
  if(search)deals=deals.filter(function(d){return (d.title||'').toLowerCase().indexOf(search)>=0||d.id.indexOf(search)>=0;});

  var stages=['prospect','inquiry','negotiation','contract','payment','shipping','completed','cancelled'];
  var stageColors={prospect:'#94a3b8',inquiry:'#f59e0b',negotiation:'#3b82f6',contract:'#8b5cf6',payment:'#22c55e',shipping:'#14b8a6',completed:'#22c55e',cancelled:'#ef4444'};

  // Stage summary cards
  var stageCounts={};stages.forEach(function(s){stageCounts[s]=S.deals.filter(function(d){return d.stage===s;}).length;});
  var totalDeals=S.deals.length;
  var activeDeals=S.deals.filter(function(d){return d.status==='active';}).length;

  var statsHtml='<div class="grid-5" style="margin-bottom:16px">'+
    '<div class="card" style="cursor:pointer" onclick="Adm.setDealsTab(\'all\')"><div class="card-b" style="text-align:center;padding:12px"><div style="font-size:24px;font-weight:800;color:var(--pri)">'+totalDeals+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'전체':'Total')+'</div></div></div>'+
    stages.slice(0,4).map(function(s){

  // Tab bar
  var tabHtml='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'+
    ['all'].concat(stages).map(function(t){
      var isActive=tab===t;
      var label=t==='all'?(_isKorean?'전체':'All')+' ('+S.deals.length+')':t.toUpperCase()+' ('+stageCounts[t]+')';
      return '<button class="btn btn-sm '+(isActive?'btn-pri':'btn-ghost')+'" onclick="Adm.setDealsTab(\''+t+'\')">'+label+'</button>';
    }).join('')+
  '</div>';

  // Search bar
  var searchHtml='<div style="margin-bottom:12px"><input placeholder="'+(_isKorean?'딜 검색 (제목, ID)...':'Search deals (title, ID)...')+'" value="'+U.esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="width:100%;max-width:400px;padding:10px 14px;border-radius:10px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:13px"></div>';

  // Deals table
  var pKey='deals';
  var pg=S._pg[pKey]||0;
  var perPage=15;
  var paged=deals.slice(pg*perPage,(pg+1)*perPage);

  var tableHtml='<table class="tbl"><thead><tr><th style="width:60px">Stage</th><th>제목</th><th>통화</th><th>인코텀즈</th><th>참여자</th><th>서류</th><th>견적</th><th>최근 활동</th><th>생성일</th></tr></thead><tbody>'+
    (paged.length?paged.map(function(d){
      var pCount=(S.dealParticipants||[]).filter(function(p){return p.deal_id===d.id;}).length;
      var dCount=(S.documents||[]).filter(function(doc){return doc.deal_id===d.id;}).length;
      var qCount=(S.quotes||[]).filter(function(q){return q.deal_id===d.id;}).length;
      var sc=stageColors[d.stage]||'#94a3b8';
      return '<tr style="cursor:pointer" onclick="Adm.viewDeal(\''+d.id+'\')">'+
        '<td><span class="badge" style="background:'+sc+'22;color:'+sc+';border:1px solid '+sc+'44;font-size:10px;padding:2px 8px;border-radius:6px">'+U.esc(d.stage)+'</span></td>'+
        '<td><div style="font-weight:600;font-size:13px">'+U.esc(d.title||'Untitled')+'</div><div style="font-size:10px;color:var(--w40);font-family:JetBrains Mono">'+d.id.substring(0,8)+'…</div></td>'+
        '<td>'+U.esc(d.currency||'USD')+'</td>'+
        '<td>'+U.esc(d.incoterms||'-')+'</td>'+
        '<td style="text-align:center">'+pCount+'</td>'+
        '<td style="text-align:center">'+dCount+'</td>'+
        '<td style="text-align:center">'+qCount+'</td>'+
        '<td style="font-size:11px">'+U.fd(d.last_activity_at)+'</td>'+
        '<td style="font-size:11px">'+U.fd(d.created_at)+'</td>'+
      '</tr>';
    }).join(''):'<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--w40)">딜이 없습니다</td></tr>')+
  '</tbody></table>';

  var pgInfo={items:paged,page:pg,pages:Math.ceil(deals.length/perPage)||1,total:deals.length};
  var pagination=paginationBar(pKey,pgInfo);

  return statsHtml+searchHtml+tabHtml+tableHtml+pagination;
}

function pgDealDetail(deal){
  var d=typeof deal==='string'?S.deals.find(function(x){return x.id===deal;}):deal;
  if(!d)return '<div class="card"><div class="card-b">딜을 찾을 수 없습니다</div></div>';
  S.selectedDeal=d;

  var stageColors={prospect:'#94a3b8',inquiry:'#f59e0b',negotiation:'#3b82f6',contract:'#8b5cf6',payment:'#22c55e',shipping:'#14b8a6',completed:'#22c55e',cancelled:'#ef4444'};
  var sc=stageColors[d.stage]||'#94a3b8';

function changeDealStage(dealId,newStage,evt){
  if(!confirm('스테이지를 "'+newStage.toUpperCase()+'"(으)로 변경하시겠습니까?'))return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.from('deals').update({stage:newStage,updated_at:new Date().toISOString()}).eq('id',dealId).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('스테이지 변경 실패: '+r.error.message,'err');return;}
    var d=S.deals.find(function(x){return x.id===dealId;});
    if(d){d.stage=newStage;S.selectedDeal=d;}
    UI.toast('스테이지가 '+newStage.toUpperCase()+'로 변경되었습니다','ok');
    render();
  });
}

function pgPayRevenue(){
  var mrr=calcMRR();var arr=mrr*12;var hold=calcEscrowHold();var comm=calcEscrowComm();var flt=calcFloat();
  /* 미수금 합계 (pending billing events) */
  var pendingBilling=(S.billingEvents||[]).filter(function(e){return e.status==='pending';});
  var pendingTotal=pendingBilling.reduce(function(s,e){return s+(Number(e.amount)||0);},0);
  var pendingDocCount=pendingBilling.filter(function(e){return e.event_type==='document_generation';}).length;
  var pendingAICount=pendingBilling.filter(function(e){return e.event_type==='ai_analysis';}).length;
  var activeSubs=S.subscriptions.filter(function(s){return s.status==='active';}).length||S.users.filter(function(u){return PLAN_PRICE[u.plan];}).length;
  var activeEsc=S.escrowTxns.filter(function(e){return['funded','in_production','shipped','inspection'].indexOf(e.escrow_status)>=0;}).length;

  /* Plan revenue breakdown */
  var planRev={starter:0,pro:0,alibaba:0,enterprise:0};
  if(S.subscriptions.length){S.subscriptions.filter(function(s){return s.status==='active';}).forEach(function(s){var a=Number(s.amount)||0;var mo=s.billing_cycle==='semi_annual'?a/6:s.billing_cycle==='annual'?a/12:a;var k=(s.plan==='basic')?'starter':s.plan;planRev[k]=(planRev[k]||0)+mo;});}
  else{S.users.forEach(function(u){var p=PLAN_PRICE[u.plan];if(p){var k=(u.plan==='basic')?'starter':u.plan;planRev[k]=(planRev[k]||0)+p.m;}});}
  var maxPR=Math.max.apply(null,Object.values(planRev).concat([1]));

  /* Billing cycle dist */
  var cycleDist={monthly:0,semi_annual:0,annual:0};
  if(S.subscriptions.length){S.subscriptions.filter(function(s){return s.status==='active';}).forEach(function(s){if(cycleDist[s.billing_cycle]!==undefined)cycleDist[s.billing_cycle]++;});}
  else{S.users.forEach(function(u){if(PLAN_PRICE[u.plan])cycleDist[u.billing_cycle||'monthly']++;});}
  var maxCy=Math.max.apply(null,Object.values(cycleDist).concat([1]));

  /* Escrow pipeline */
  var escPipe={};Object.keys(ESC_ST).forEach(function(k){escPipe[k]=0;});
  S.escrowTxns.forEach(function(e){if(escPipe[e.escrow_status]!==undefined)escPipe[e.escrow_status]++;});
  var maxEP=Math.max.apply(null,Object.values(escPipe).concat([1]));

  /* Product revenue from orders */
  var prodRev={};
  S.escrowTxns.forEach(function(e){if(e.product_name){prodRev[e.product_name]=(prodRev[e.product_name]||0)+(Number(e.amount)||0);}});
  S.orders.forEach(function(o){var items=o.items||[];if(typeof items==='string')try{items=JSON.parse(items);}catch(x){items=[];}
    items.forEach(function(it){if(it.name){prodRev[it.name]=(prodRev[it.name]||0)+(Number(it.amount||it.total)||0);}});
    if(!items.length&&o.total_amount){var p=S.products.find(function(pp){return pp.user_id===o.user_id;});if(p)prodRev[p.name_ko||p.name_en||'Unknown']=(prodRev[p.name_ko||p.name_en||'Unknown']||0)+(Number(o.total_amount)||0);}
  });
  var sortedProd=Object.entries(prodRev).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var maxProd=sortedProd.length?sortedProd[0][1]:1;

  /* Revenue streams */
  var streams=[{l:'\uAD6C\uB3C5 \uC218\uC775 (MRR)',v:mrr,c:'var(--pri)'},{l:'\uC5D0\uC2A4\uD06C\uB85C \uC218\uC218\uB8CC',v:comm,c:'var(--acc)'},{l:'\uD50C\uB85C\uD2B8 \uC218\uC775 (\uC790\uAE08\uBCF4\uC720 \uC774\uC790)',v:flt,c:'var(--ok)'}];
  var maxStr=Math.max.apply(null,streams.map(function(s){return s.v;}).concat([1]));

  var arpu=calcARPU();var churnR=calcChurnRate();var convR=calcConversionRate();var ltv=calcLTV();var actR=calcActiveRate();
  var usageStat=calcUsageSummary();
  var usageFeatures=['ai_analysis','document_gen','buyer_matching','email_send','trend_report'];
  var usageLabels={ai_analysis:'AI 분석',document_gen:'서류 생성',buyer_matching:'바이어 매칭',email_send:'이메일',trend_report:'트렌드 분석'};

  return '<div class="grid-5" style="margin-bottom:20px">'+
    UI.stat('MRR (월 반복매출)',U.usd(mrr),'구독 '+activeSubs+'건','var(--pri)')+
    UI.stat('ARR (연 반복매출)',U.usd(arr),'','var(--ok)')+
    UI.stat(_isKorean?'에스크로 보유금':'Escrow Held',U.usd(hold),activeEsc+'건 진행중','var(--acc)')+
    UI.stat(_isKorean?'누적 수수료':'Total Comm.',U.usd(comm),'에스크로 정산','var(--admin)')+
    UI.stat(_isKorean?'플로트 수익':'Float Revenue',U.usd(flt),'자금보유 이자','var(--purple)')+
  '</div>'+
  /* Enhanced KPI row */
  '<div class="grid-5" style="margin-bottom:20px">'+
    UI.stat('ARPU',U.usd(arpu),'유료 유저당 월 매출','var(--pri)')+
    UI.stat('LTV (추정)',U.usd(ltv),'고객 생애 가치','var(--ok)')+
    UI.stat(_isKorean?'이탈률':'Churn Rate',churnR.toFixed(1)+'%','해지/전체 비율','var(--err)')+
    UI.stat(_isKorean?'전환율':'Conv. Rate',convR.toFixed(1)+'%','Free→Paid','var(--acc)')+
    UI.stat('활동률 (30일)',actR.toFixed(1)+'%','최근 로그인','var(--purple)')+
  '</div>'+
  /* 미수금 현황 카드 */

function pgPayProofs(){
  var proofs=S.paymentProofs||[];
  var milestones=S.paymentMilestones||[];
  var tab=S._proofTab||'all';

  // Stats
  var pending=proofs.filter(function(p){return p.status==='pending';}).length;
  var approved=proofs.filter(function(p){return p.status==='approved';}).length;
  var rejected=proofs.filter(function(p){return p.status==='rejected';}).length;
  var totalAmt=milestones.filter(function(m){return m.status==='paid';}).reduce(function(s,m){return s+(Number(m.amount)||0);},0);

  // Filter by tab
  var filtered=proofs;
  if(tab!=='all')filtered=proofs.filter(function(p){return p.status===tab;});

  // Search
  var search=(S.searchFilter||'').toLowerCase();
  if(search){
    filtered=filtered.filter(function(p){
      var ms=milestones.find(function(m){return m.id===p.milestone_id;});
      var deal=ms?S.deals.find(function(d){return d.id===ms.deal_id;}):null;
      return (p.file_name||'').toLowerCase().indexOf(search)>=0||
        (ms&&ms.name&&ms.name.toLowerCase().indexOf(search)>=0)||
        (deal&&deal.title&&deal.title.toLowerCase().indexOf(search)>=0)||
        (p.id||'').indexOf(search)>=0;
    });
  }

  // Pagination
  var pKey='payProofs';
  var pg=S._pg[pKey]||0;
  var perPage=15;
  var paged=filtered.slice(pg*perPage,(pg+1)*perPage);

  var statsHtml='<div class="grid-4" style="margin-bottom:16px">'+
    UI.stat('\uB300\uAE30 \uC911',pending,'\uB9AC\uBDF0 \uD544\uC694','var(--acc)')+
    UI.stat('\uC2B9\uC778',approved,'','var(--ok)')+
    UI.stat('\uBC18\uB824',rejected,'','var(--err)')+
    UI.stat('\uACB0\uC81C \uC644\uB8CC \uCD1D\uC561','$'+Number(totalAmt).toLocaleString(),milestones.filter(function(m){return m.status==='paid';}).length+'\uAC74','var(--pri)')+

  var tabCounts={all:proofs.length,pending:pending,approved:approved,rejected:rejected};

  var tabHtml='<div style="display:flex;gap:6px;margin-bottom:12px">'+
    ['all','pending','approved','rejected'].map(function(t){

  var searchHtml='<div style="margin-bottom:12px"><input placeholder="\uC99D\uBE59 \uAC80\uC0C9 (\uD30C\uC77C\uBA85, \uB9C8\uC77C\uC2A4\uD1A4, \uB51C)..." value="'+U.esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="width:100%;max-width:400px;padding:10px 14px;border-radius:10px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:13px"></div>';

function approveProof(proofId,evt){
  if(!confirm('\uC774 \uACB0\uC81C \uC99D\uBE59\uC744 \uC2B9\uC778\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?'))return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.functions.invoke('verify-payment-proof',{body:{proof_id:proofId,action:'approve'}}).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('\uC2B9\uC778 \uC2E4\uD328: '+(r.error.message||r.error),'err');return;}
    var d=r.data;
    if(d&&!d.ok){UI.toast('\uC2B9\uC778 \uC2E4\uD328: '+(d.error||'unknown'),'err');return;}
    var proof=S.paymentProofs.find(function(p){return p.id===proofId;});
    if(proof){proof.status='approved';proof.reviewed_at=new Date().toISOString();proof.reviewer_id=S.user?S.user.id:null;}
    if(d&&d.milestone_id){
      var ms=S.paymentMilestones.find(function(m){return m.id===d.milestone_id;});
      if(ms)ms.status='paid';
    }
    closeModal('proof-detail');
    UI.toast('\uACB0\uC81C \uC99D\uBE59\uC774 \uC2B9\uC778\uB418\uC5C8\uC2B5\uB2C8\uB2E4','ok');
    render();
  });
}

function rejectProof(proofId,evt){
  var reason=prompt('\uBC18\uB824 \uC0AC\uC720\uB97C \uC785\uB825\uD558\uC138\uC694:');
  if(reason===null)return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.functions.invoke('verify-payment-proof',{body:{proof_id:proofId,action:'reject',reason:reason||'\uC99D\uBE59 \uBD80\uC801\uD569'}}).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('\uBC18\uB824 \uC2E4\uD328: '+(r.error.message||r.error),'err');return;}
    var d=r.data;
    if(d&&!d.ok){UI.toast('\uBC18\uB824 \uC2E4\uD328: '+(d.error||'unknown'),'err');return;}
    var proof=S.paymentProofs.find(function(p){return p.id===proofId;});
    if(proof){proof.status='rejected';proof.reviewed_at=new Date().toISOString();proof.reviewer_notes=reason||'\uC99D\uBE59 \uBD80\uC801\uD569';proof.reviewer_id=S.user?S.user.id:null;}

      var ms=S.paymentMilestones.find(function(m){return m.id===d.milestone_id;});

}

function exportCSV(table){
  var data=S[table==='service_requests'?'serviceRequests':table]||[];
  if(!data.length){UI.toast(_isKorean?'데이터 없음':'No data','warn');return;}
  var sensitive=['stripe_customer_id','toss_billing_key','toss_customer_key','password','password_hash','billing_key','secret','token'];
  var keys=Object.keys(data[0]).filter(function(k){return sensitive.indexOf(k)<0;});
  var csv=keys.join(',')+'\n';
  data.forEach(function(row){
    csv+=keys.map(function(k){var v=row[k];if(v==null)return'';v=String(v).replace(/"/g,'""');return v.indexOf(',')>=0||v.indexOf('\n')>=0?'"'+v+'"':v;}).join(',')+'\n';
  });
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=table+'_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
  URL.revokeObjectURL(url);UI.toast(_isKorean?'CSV 다운로드':'CSV downloaded','ok');
}

/* === ERROR MONITOR === */
function pgErrorMonitor(){
  var errs=S.clientErrors||[];
  var sf=S.searchFilter||'';
  if(sf){errs=errs.filter(function(e){return (e.error_message||'').toLowerCase().indexOf(sf.toLowerCase())>=0||(e.page||'').toLowerCase().indexOf(sf.toLowerCase())>=0||((e.extra&&e.extra.rid)||'').toLowerCase().indexOf(sf.toLowerCase())>=0;});}
  /* Top 10 errors (24h) */
  var now=Date.now();var h24=now-86400000;
  var recent=errs.filter(function(e){return new Date(e.created_at).getTime()>h24;});
  var msgCount={};recent.forEach(function(e){var k=(e.error_message||'unknown').slice(0,80);msgCount[k]=(msgCount[k]||0)+1;});
  var top10=Object.keys(msgCount).map(function(k){return{msg:k,cnt:msgCount[k]};}).sort(function(a,b){return b.cnt-a.cnt;}).slice(0,10);
  /* Stats */
  var total=errs.length;var today=recent.length;
  var pages=new Set();errs.forEach(function(e){if(e.page)pages.add(e.page);});
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px"><div><input oninput="Adm.setSearch(this.value)" value="'+U.esc(sf)+'" placeholder="RID, 메시지, 페이지 검색..." style="padding:8px 14px;border-radius:8px;background:var(--w08);border:1px solid var(--bd);color:var(--w);font-size:12px;width:300px;outline:none"></div><button class="btn btn-ghost btn-sm" onclick="Adm.refreshErrors()">'+(_isKorean?'🔄 새로고침':'🔄 Refresh')+'</button></div>';
  /* KPI cards */
  h+='<div class="grid-4" style="margin-bottom:20px">';
  h+='<div class="stat-card"><div class="stat-label">총 에러</div><div class="stat-value" style="color:var(--err)">'+total+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">24시간 내</div><div class="stat-value" style="color:var(--acc)">'+today+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">영향 페이지</div><div class="stat-value" style="color:var(--pri)">'+pages.size+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">에러 유형</div><div class="stat-value" style="color:var(--w60)">'+Object.keys(msgCount).length+'</div></div>';
  h+='</div>';
  /* Top 10 */
  if(top10.length){
    h+='<div class="card" style="margin-bottom:20px"><div class="card-h">Top 에러 (24시간)</div><div class="card-b"><table class="tbl"><thead><tr><th>횟수</th><th>에러 메시지</th></tr></thead><tbody>';
    top10.forEach(function(t){h+='<tr><td><span class="badge badge-err">'+t.cnt+'</span></td><td style="font-size:12px;word-break:break-all">'+U.esc(t.msg)+'</td></tr>';});
    h+='</tbody></table></div></div>';
  }
  /* Recent errors table */
  var pinfo=paginate(errs,'errorMonitor');
  h+='<div class="card"><div class="card-h">최근 에러 ('+total+'건)</div><div class="card-b"><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>시간</th><th>RID</th><th>페이지</th><th>메시지</th><th>유저</th></tr></thead><tbody>';
  if(!pinfo.items.length){h+='<tr><td colspan="5" style="text-align:center;color:var(--w40);padding:20px">에러 없음</td></tr>';}
  pinfo.items.forEach(function(e){

/* === PAGINATION === */
function getPg(key){return S._pg[key]||0;}
function setPg(key,p){S._pg[key]=p;render();}
function paginate(arr,key){
  var pg=getPg(key);var total=arr.length;var pages=Math.ceil(total/PAGE_SIZE)||1;
  if(pg>=pages)pg=pages-1;if(pg<0)pg=0;
  var start=pg*PAGE_SIZE;var sliced=arr.slice(start,start+PAGE_SIZE);
  return{items:sliced,page:pg,pages:pages,total:total};
}
function paginationBar(key,info){
  if(info.pages<=1)return '';
  var btns='';
  for(var i=0;i<info.pages;i++){
    if(info.pages>7&&i>1&&i<info.pages-2&&Math.abs(i-info.page)>1){
      if(btns.slice(-3)!=='...')btns+='<span style="color:var(--w20);padding:0 4px">...</span>';
      continue;
    }
    btns+='<button class="btn btn-sm '+(i===info.page?'btn-pri':'btn-ghost')+'" onclick="Adm.setPg(\''+key+'\','+i+')" style="min-width:30px;padding:4px 8px">'+( i+1)+'</button>';
  }
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:8px 0">'+
    '<span style="font-size:11px;color:var(--w40)">'+info.total+(_isKorean?'건 중 ':' of ')+(info.page*PAGE_SIZE+1)+'-'+Math.min((info.page+1)*PAGE_SIZE,info.total)+'</span>'+
    '<div style="display:flex;gap:4px;align-items:center">'+
    '<button class="btn btn-ghost btn-sm" onclick="Adm.setPg(\''+key+'\','+(info.page-1)+')" '+(info.page<=0?'disabled':'')+' style="padding:4px 8px">&laquo;</button>'+
    btns+
    '<button class="btn btn-ghost btn-sm" onclick="Adm.setPg(\''+key+'\','+(info.page+1)+')" '+(info.page>=info.pages-1?'disabled':'')+' style="padding:4px 8px">&raquo;</button>'+
    '</div></div>';
}

function editAlibabaSync(projectId){
  var p=S.projects.find(function(x){return x.id===projectId;});if(!p)return;
  var stages=['planning','certification','alibaba_listing','buyer_search','negotiation','production','shipping','completed'];
  var stL2={planning:'기획',certification:'인증',alibaba_listing:'알리바바 입점',buyer_search:'바이어 발굴',negotiation:'협상',production:'생산',shipping:'선적',completed:'완료'};
  var sync=p.alibaba_sync||{};
  var body='<div style="font-size:12px;color:var(--w40);margin-bottom:12px">프로젝트: <b style="color:var(--w90)">'+U.esc(p.name)+'</b></div>'+
    '<table class="tbl"><thead><tr><th>단계</th><th>동기화 상태</th><th>메모</th></tr></thead><tbody>'+
    stages.map(function(s){
      var ss=sync[s]||{};
      return '<tr><td style="font-weight:600">'+stL2[s]+'</td><td><select id="sync-'+s+'" style="padding:6px;border-radius:6px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:11px"><option value="pending"'+(ss.status==='pending'?' selected':'')+'>대기중</option><option value="synced"'+(ss.status==='synced'?' selected':'')+'>동기화됨</option><option value="not_applicable"'+(!ss.status||ss.status==='not_applicable'?' selected':'')+'>해당없음</option></select></td><td><input id="syncn-'+s+'" value="'+U.esc(ss.note||'')+'" placeholder="메모" style="width:100%;padding:6px;border-radius:6px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:11px"></td></tr>';
    }).join('')+'</tbody></table>';
  document.body.insertAdjacentHTML('beforeend',UI.modal({id:'sync-form',title:'알리바바 동기화 편집',body:body,footer:'<button class="btn btn-ghost" onclick="Adm.closeModal(\'sync-form\')">'+(_isKorean?'취소':'Cancel')+'</button><button class="btn btn-pri" onclick="Adm.saveAlibabaSync(\''+projectId+'\')">'+(_isKorean?'저장':'Save')+'</button>',width:'560px'}));
  UI.showModal('sync-form');
}

function saveAlibabaSync(projectId){
  var p=S.projects.find(function(x){return x.id===projectId;});if(!p)return;
  var stages=['planning','certification','alibaba_listing','buyer_search','negotiation','production','shipping','completed'];
  var sync={};
  stages.forEach(function(s){
    var statusEl=document.getElementById('sync-'+s);
    var noteEl=document.getElementById('syncn-'+s);
    sync[s]={status:statusEl?statusEl.value:'pending',note:noteEl?noteEl.value.trim():'',updated_at:new Date().toISOString()};
  });
  var _saveSyncBtn=document.querySelector('#sync-form .btn-pri, .modal-f .btn-pri');btnLoading(_saveSyncBtn,true);
  sb.from('projects').update({alibaba_sync:sync}).eq('id',projectId).then(function(r){
    btnLoading(_saveSyncBtn,false);
    if(r.error){UI.toast('저장 실패: '+r.error.message,'err');return;}
    p.alibaba_sync=sync;
    closeModal('sync-form');
    UI.toast(_isKorean?'동기화 상태 저장됨':'Sync status saved','ok');
    render();
  });
}

<script>
(function(){

    html+='<div style="position:fixed;bottom:90px;right:24px;z-index:9998;width:360px;max-height:520px;background:#0D1424;border-radius:16px;border:1px solid rgba(255,255,255,.1);box-shadow:0 16px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;font-family:Sora,Noto Sans KR,sans-serif">';
    html+='<div style="padding:14px 18px;background:linear-gradient(135deg,#00D4FF20,#0088FF10);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px"><div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#00D4FF,#0088FF);display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#060B18"/></svg></div><div><div style="font-size:14px;font-weight:700;color:#fff">Whistle AI</div><div style="font-size:11px;color:rgba(255,255,255,.4)">수출 전문 상담</div></div><div style="margin-left:auto;display:flex;align-items:center;gap:4px"><div style="width:6px;height:6px;border-radius:3px;background:#00E676"></div><span style="font-size:10px;color:#00E676">온라인</span></div></div>';
    html+='<div id="wc-msgs" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:200px;max-height:320px">';
    if(msgs.length===0&&step===0){html+=bbl('bot','안녕하세요! Whistle AI 수출 상담입니다. 무엇을 도와드릴까요?');html+=qb(['무료 분석이 궁금해요','바우처 문의','알리바바 입점','기타 문의']);}
    for(var i=0;i<msgs.length;i++)html+=bbl(msgs[i].from,msgs[i].text);
    if(step===1){html+=bbl('bot','상담을 위해 간단한 정보를 알려주세요.');html+='<div style="display:flex;flex-direction:column;gap:6px;width:100%"><input id="wc-name" placeholder="이름/회사명" value="'+esc(info.name)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><input id="wc-email" placeholder="이메일 (선택)" value="'+esc(info.email)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><input id="wc-phone" placeholder="연락처 (선택)" value="'+esc(info.phone)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><button onclick="WC.submitInfo()" style="padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);color:#060B18;font-weight:700;font-size:13px;cursor:pointer">상담 시작</button></div>';}
    html+='</div>';
    if(step>=2){html+='<div style="padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px"><input id="wc-input" onkeydown="if(event.key===\'Enter\')WC.send()" placeholder="메시지를 입력하세요..." style="flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><button onclick="WC.send()" style="width:40px;height:40px;border-radius:10px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="#060B18"/></svg></button></div>';}

  function bbl(f,t){var et=esc(t);return f==='bot'?'<div style="align-self:flex-start;max-width:85%;padding:10px 14px;border-radius:12px 12px 12px 4px;background:#111B2E;border:1px solid rgba(255,255,255,.06)"><div style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.5">'+et+'</div></div>':'<div style="align-self:flex-end;max-width:85%;padding:10px 14px;border-radius:12px 12px 4px 12px;background:linear-gradient(135deg,#00D4FF20,#0088FF15);border:1px solid #00D4FF30"><div style="font-size:13px;color:rgba(255,255,255,.9);line-height:1.5">'+et+'</div></div>';}

  // Default language for admin portal is Korean
  var DEFAULT_ADMIN_LANG = 'ko';

  function getAdminLang() {
    // Use i18n-detect.js detected language if available, otherwise default to Korean
    var lang = window._whistleLang || DEFAULT_ADMIN_LANG;
    if (!ADMIN_I18N[lang]) lang = DEFAULT_ADMIN_LANG;
    return lang;
  }

  // Build a sorted key list (longest first) to prevent partial replacements
  var sortedKeys = Object.keys(ADMIN_I18N.ko).sort(function(a, b) {
    return b.length - a.length;
  });

  function translateAdminDOM(lang) {
    if (!lang || lang === 'ko' || !ADMIN_I18N[lang]) return;

    var dict = ADMIN_I18N[lang];
    var walker = document.createTreeWalker(
      document.body,
      NodeFilter.SHOW_TEXT,
      null,
      false
    );

    var textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);

    for (var i = 0; i < textNodes.length; i++) {
      var node = textNodes[i];
      var original = node.nodeValue;
      if (!original || !original.trim()) continue;

      var translated = original;
      for (var k = 0; k < sortedKeys.length; k++) {
        var key = sortedKeys[k];
        if (translated.indexOf(key) !== -1 && dict[key] && dict[key] !== key) {
          translated = translated.split(key).join(dict[key]);
        }
      }
      if (translated !== original) {
        node.nodeValue = translated;
      }
    }

    // Also translate placeholder attributes
    var inputs = document.querySelectorAll('input[placeholder], textarea[placeholder]');
    for (var j = 0; j < inputs.length; j++) {
      var ph = inputs[j].placeholder;
      for (var m = 0; m < sortedKeys.length; m++) {
        var sk = sortedKeys[m];
        if (ph.indexOf(sk) !== -1 && dict[sk] && dict[sk] !== sk) {
          ph = ph.split(sk).join(dict[sk]);
        }
      }
      if (ph !== inputs[j].placeholder) {
        inputs[j].placeholder = ph;
      }
    }

    // Translate the page title
    if (dict['CEO Command Center']) {
      document.title = 'Whistle AI — Admin Portal';
    }

    // Set dir=rtl for Arabic
    if (lang === 'ar') {
      document.documentElement.setAttribute('dir', 'rtl');
    } else {
      document.documentElement.removeAttribute('dir');
    }
  }

  // Hook into the render cycle: observe DOM mutations to re-translate after dynamic renders
  var adminLang = getAdminLang();
  var translateTimer = null;

  function scheduleTranslation() {
    if (translateTimer) clearTimeout(translateTimer);
    translateTimer = setTimeout(function() {
      var lang = getAdminLang();
      if (lang !== 'ko') translateAdminDOM(lang);
    }, 100);
  }

  // Observe DOM changes for dynamic content
  if (typeof MutationObserver !== 'undefined') {
    var observer = new MutationObserver(function(mutations) {
      var hasRelevantChange = false;
      for (var i = 0; i < mutations.length; i++) {
        if (mutations[i].type === 'childList' && mutations[i].addedNodes.length > 0) {
          hasRelevantChange = true;
          break;
        }
      }
      if (hasRelevantChange) scheduleTranslation();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }

  // Override _whistleSetLang to re-translate admin on language change
  var origSetLang = window._whistleSetLang;
  window._whistleSetLang = function(lang) {
    if (origSetLang) origSetLang(lang);
    window._whistleLang = lang;
    scheduleTranslation();
  };

  // Initial translation
  if (adminLang !== 'ko') {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        translateAdminDOM(adminLang);
      });
    } else {
      translateAdminDOM(adminLang);
    }
  }

  // Expose for manual use
  window._adminI18n = ADMIN_I18N;
  window._translateAdmin = function(lang) {
    translateAdminDOM(lang || getAdminLang());
  };
})();
