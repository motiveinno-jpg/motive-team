const useInView = (th = 0.1) => {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => { const el = ref.current; if (!el) return; if(!window.IntersectionObserver){setV(true);return;} const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: th }); o.observe(el); const t=setTimeout(()=>setV(true),1200); return () => {o.disconnect();clearTimeout(t);}; }, [th]);
  return [ref, v];
};

  const readFileWithProgress = (f) => { setAnonFile(f); setUploadProgress(0); const reader = new FileReader(); reader.onprogress = (ev) => { if (ev.lengthComputable) setUploadProgress(Math.round((ev.loaded / ev.total) * 100)); }; reader.onload = (ev) => { setUploadProgress(100); setAnonFilePreview(ev.target.result); }; reader.onerror = () => { alert("Failed to read file. Please try again."); setAnonFile(null); setAnonFilePreview(null); setUploadProgress(0); }; reader.readAsDataURL(f); };

  const openSignup = () => { setShowSignup(true); setSignupStep(0); };
  const openLogin = () => { setShowLogin(true); setLoginError(""); setLoginForm({ email: "", pw: "" }); };

  const checkPwStrength = (pw) => {
    if (!pw) return { score: 0, msg: "" };
    let sc = 0;
    if (pw.length >= 8) sc++;
    if (/[A-Za-z]/.test(pw)) sc++;
    if (/[0-9]/.test(pw)) sc++;
    if (/[^A-Za-z0-9]/.test(pw)) sc++;
    const msgs = ["", "Very weak", "Weak", "Good", "Strong"];
    return { score: sc, msg: msgs[sc] || "" };
  };

  const handleSignup = async () => {
    if (signupLoading) return;
    const { company, name, email, phone, pw } = signupForm;
    if (!company || !name || !email || !phone || !pw) { alert("Please fill in all required fields."); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert("Please enter a valid email address."); return; }
    if (!signupForm.agreeTerms) { alert("Please agree to the Terms of Service and Privacy Policy."); return; }
    if (pw.length < 8) { alert("Password must be at least 8 characters."); return; }
    if (!/[A-Za-z]/.test(pw) || !/[0-9]/.test(pw) || !/[^A-Za-z0-9]/.test(pw)) { alert("Password must include letters, numbers, and special characters."); return; }
    setSignupLoading(true);
    try {
      const dbRole = signupRole === "seller" ? "client" : "buyer";
      const { data, error } = await sb.auth.signUp({ email, password: pw, options: { data: { full_name: name, display_name: name, company_name: company, phone, role: dbRole } } });
      if (error) {
        const msg = error.message.includes("already registered") ? "This email is already registered. Please log in."

          : error.message.includes("rate limit") ? "Please try again later."
          : error.message || "Sign up failed";
        alert(msg); setSignupLoading(false); return;
      }
      if (data.user) {
        try { await sb.from("users").upsert({ id: data.user.id, company_name: company, display_name: name, phone, analysis_credits: 1 }, { onConflict: "id" }); } catch(e) {}
        if (signupRole === "seller") {
          try { await sb.from("companies").insert({ user_id: data.user.id, name_ko: company, ceo_name_ko: name, phone, category: signupForm.product || null }); } catch(e) {}
        }
      }
      setSignupStep(1);
    } catch(e) { alert("Server connection failed. Please try again later."); }
    setSignupLoading(false);
  };

  const handleLogin = async () => {
    const { email, pw } = loginForm;
    if (!email || !pw) { setLoginError("Please enter your email and password."); return; }
    setLoginLoading(true); setLoginError("");
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
      if (error) {
        const msg = error.message === "Invalid login credentials" ? "Invalid email or password."
          : error.message.includes("Email not confirmed") ? "Email verification required. Please check your inbox."

        setLoginError(msg); setLoginLoading(false); return;
      }
      const uid = data.user.id;
      let role = data.user.user_metadata?.role || "client";
      try { const { data: u } = await sb.from("users").select("role").eq("id", uid).single(); if (u?.role) role = u.role; } catch(e) {}
      await new Promise(r => setTimeout(r, 300));
      if (role === "buyer") window.location.href = "/app/buyer";
      else window.location.href = "/app";
    } catch(e) { setLoginError("Server connection failed. Please try again later."); setLoginLoading(false); }

          { icon: "&#128196;", title: "Document Generation", desc: "Auto-generate 14 types of export documents: Commercial Invoice, Packing List, B/L, Certificate of Origin, and more.", color: T.pri },
        ].map((f, i) => (
          <Fade key={i} delay={i * 0.1}>
            <div style={{ ...s.card, padding: 28, height: "100%" }}>
              <div style={{ width: 48, height: 48, borderRadius: 14, background: `${f.color}12`, border: `1px solid ${f.color}25`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, marginBottom: 16 }} dangerouslySetInnerHTML={{__html: f.icon}} />
              <div style={{ fontSize: 17, fontWeight: 700, color: T.w, marginBottom: 8 }}>{f.title}</div>
              <div style={{ fontSize: 14, color: T.w40, lineHeight: 1.7 }}>{f.desc}</div>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ 4. LIVE DEMO ═══ */
  const demo = (
    <div id="demo" style={{ background: T.deep, padding: "100px 24px" }}>
      <div style={{ maxWidth: 1140, margin: "0 auto" }}>
        <Fade><h2 className="section-heading" style={s.heading}>Try It Now — Free</h2></Fade>
        <Fade delay={0.1}><p style={s.sub}>Upload a product image or paste a URL. Get a full AI export analysis instantly — no signup required.</p></Fade>
        <Fade delay={0.2}>
          <div style={{ marginTop: 40, maxWidth: 560, margin: "40px auto 0", padding: "24px 28px", background: T.bgCard, borderRadius: 16, border: `1px solid ${T.borderL}`, boxShadow: T.glow }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.w, marginBottom: 4, textAlign: "left" }}>Free Export Analysis</div>
            <div style={{ fontSize: 12, color: T.w40, marginBottom: 14, textAlign: "left" }}>Paste a URL or upload a product image for a full 13-section AI export report</div>
            <div style={{ display: "flex", gap: 4, marginBottom: 14, background: T.w08, borderRadius: 10, padding: 3 }}>
              {[["url","URL"],["file","Image Upload"]].map(([k,label]) => (
                <div key={k} onClick={() => setAnonTab(k)} style={{ flex: 1, padding: "8px 0", textAlign: "center", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all .2s", background: anonTab === k ? T.priG : "transparent", color: anonTab === k ? T.bg : T.w40 }}>{label}</div>
              ))}
            </div>
            {anonTab === "url" && (
              <div style={{ display: "flex", gap: 8 }}>
                <input value={anonUrl} onChange={e => setAnonUrl(e.target.value)} onKeyDown={e => { if (e.key === "Enter") runAnonAnalysis(); }} placeholder="https://your-product-page.com/..." style={{ ...s.input, flex: 1 }} disabled={anonLoading} />
                <button onClick={runAnonAnalysis} disabled={anonLoading} style={{ ...s.btn("pri"), padding: "12px 20px", fontSize: 13, opacity: anonLoading ? 0.6 : 1, whiteSpace: "nowrap" }}>{anonLoading ? "Analyzing..." : "Analyze"}</button>
              </div>
            )}
            {anonTab === "file" && (
              <div>
                <div onDragOver={e => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={handleFileDrop} onClick={() => fileInputRef.current && fileInputRef.current.click()}
                  style={{ border: `2px dashed ${dragOver ? T.pri : T.border}`, borderRadius: 12, padding: anonFilePreview ? "12px" : "32px 16px", textAlign: "center", cursor: "pointer", transition: "all .2s", background: dragOver ? `${T.pri}08` : "transparent", marginBottom: 10 }}>
                  {anonFilePreview ? (
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      {anonFile.type.startsWith("image/") ? <img src={anonFilePreview} style={{ width: 56, height: 56, borderRadius: 8, objectFit: "cover" }} alt="preview" /> : <div style={{ width: 56, height: 56, borderRadius: 8, background: T.w08, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>&#128196;</div>}
                      <div style={{ flex: 1, textAlign: "left" }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: T.w90 }}>{anonFile.name}</div>
                        <div style={{ fontSize: 11, color: T.w40 }}>{(anonFile.size / 1024).toFixed(0)} KB</div>
                      </div>
                      <div onClick={(e) => { e.stopPropagation(); setAnonFile(null); setAnonFilePreview(null); setUploadProgress(0); }} style={{ width: 28, height: 28, borderRadius: 14, background: T.w08, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 12, color: T.w40 }}>&#x2715;</div>
                    </div>
                  ) : (
                    <>
                      <div style={{ fontSize: 32, marginBottom: 8, color: T.w20 }}>&#128247;</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: T.w60 }}>Drop your product image here</div>
                      <div style={{ fontSize: 12, color: T.w20, marginTop: 4 }}>or click to browse (JPG, PNG, PDF, CSV — max 10MB)</div>
                    </>
                  )}
                </div>
                <input ref={fileInputRef} type="file" accept="image/*,.pdf,.csv,.txt,.xlsx,.xls" style={{ display: "none" }} onChange={handleFileSelect} />
                {uploadProgress > 0 && uploadProgress < 100 && <div style={{ height: 3, background: T.w08, borderRadius: 2, marginBottom: 8, overflow: "hidden" }}><div style={{ height: "100%", background: T.priG, borderRadius: 2, width: uploadProgress + "%", transition: "width .3s" }} /></div>}
                <button onClick={runAnonAnalysis} disabled={anonLoading || !anonFile} style={{ ...s.btn("pri"), width: "100%", padding: "14px 24px", fontSize: 15, opacity: (anonLoading || !anonFile) ? 0.5 : 1 }}>{anonLoading ? "Analyzing..." : "Start Free AI Analysis"}</button>
              </div>
            )}
          </div>
        </Fade>
      </div>
    </div>
  );

  /* ═══ 5. PRICING ═══ */
  const plans = [
    { name: "Free", price: "$0", period: "", desc: "Explore export potential", cta: "Start Free", planId: "free", hi: false,
      features: [["3 AI analyses / month",true],["5 product registrations",true],["1 project",true],["Cost calculator",true],["Export roadmap guide",true],["Document templates",false],["Email hub",false]] },
    { name: "Starter", price: "$29", period: "/mo", desc: "Serious export preparation", cta: "Subscribe to Starter", planId: "starter", hi: true,
      features: [["10 AI analyses / month",true],["20 product registrations",true],["5 projects",true],["Unlimited document templates",true],["50 emails / month",true],["Export checklist",true],["Category-specific roadmap",true]] },
    { name: "Professional", price: "$79", period: "/mo", desc: "Full platform access", cta: "Subscribe to Professional", planId: "pro", hi: false,
      features: [["Unlimited AI analyses",true],["Unlimited products & projects",true],["Buyer matching (3/mo)",true],["Escrow transaction support",true],["Priority support",true],["All features unlocked",true]] },
    { name: "Enterprise", price: "$199", period: "/mo", desc: "For scaling exporters", cta: "Contact Sales", planId: "enterprise", hi: false,
      features: [["Everything in Professional",true],["Unlimited buyer matching",true],["Dedicated account manager",true],["Custom integrations",true],["API access",true],["White-label options",true]] },
  ];

  const pricing = (
    <div id="pricing" style={{ background: T.deep, padding: "100px 24px" }}>
      <div style={{ maxWidth: 1140, margin: "0 auto" }}>
        <Fade><h2 className="section-heading" style={s.heading}>Simple, Transparent Pricing</h2></Fade>
        <Fade delay={0.1}><p style={s.sub}>Start free. Scale as you grow. All plans include core AI analysis features.</p></Fade>
        <div className="pricing-grid" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginTop: 40 }}>
          {plans.map((p,i) => (
            <Fade key={i} delay={i*0.1}><div style={{ ...s.card, overflow: "visible", padding: 28, height: "100%", display: "flex", flexDirection: "column", border: p.hi ? `2px solid ${T.pri}` : `1px solid ${T.border}`, boxShadow: p.hi ? T.glow : "none", position: "relative" }}>
              {p.hi && <div style={{ position: "absolute", top: -12, left: "50%", transform: "translateX(-50%)", background: T.priG, color: T.bg, fontSize: 11, fontWeight: 800, padding: "4px 16px", borderRadius: 20 }}>RECOMMENDED</div>}
              <div style={{ fontSize: 13, fontWeight: 700, color: T.pri, marginBottom: 4 }}>{p.name}</div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 2, marginBottom: 2 }}>
                <span style={{ fontSize: 28, fontWeight: 800, color: T.w }}>{p.price}</span>
                <span style={{ fontSize: 13, color: T.w40 }}>{p.period}</span>
              </div>
              <div style={{ fontSize: 13, color: T.w40, marginBottom: 16 }}>{p.desc}</div>
              <div style={{ flex: 1 }}>{p.features.map(([text,ok],j) => (<div key={j} style={{ display: "flex", alignItems: "center", padding: "5px 0", fontSize: 13, color: ok ? T.w60 : T.w20 }}><span style={{ color: ok ? T.ok : T.w20, fontSize: 14, marginRight: 8 }}>{ok ? "\u2713" : "\u2717"}</span>{text}</div>))}</div>
              <button onClick={() => { if(p.planId==="free" || p.planId==="enterprise"){openSignup()}else{openSignup()} }} style={{ ...s.btn(p.hi ? "pri" : "ghost"), width: "100%", marginTop: 18, padding: "12px 24px", fontSize: 14 }}>{p.cta}</button>
            </div></Fade>
          ))}
        </div>
        <Fade delay={0.4} style={{ textAlign: "center", marginTop: 20 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, fontSize: 13, color: T.w40 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" fill={T.ok} opacity=".3"/><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" stroke={T.ok} strokeWidth="1.5"/></svg>
            Payments secured by Stripe. Cancel anytime.
          </div>
        </Fade>
      </div>
    </div>
  );

  /* ═══ 6. TRUST / CTA ═══ */
  const ctaSection = (
    <div style={{ padding: "100px 24px", textAlign: "center" }}>
      <div style={{ maxWidth: 700, margin: "0 auto" }}>
        <Fade>
          <div style={{ fontSize: 14, fontWeight: 700, color: T.pri, marginBottom: 16, letterSpacing: 2 }}>READY TO EXPORT?</div>
          <h2 style={{ ...s.heading, fontSize: 36 }}>Your Products Deserve a Global Audience</h2>
          <p style={{ ...s.sub, marginBottom: 36 }}>Join manufacturers from 15+ countries already using Whistle AI to discover new markets, connect with buyers, and grow their export business.</p>
          <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
            <div onClick={openSignup} style={{ ...s.btn("pri"), padding: "18px 48px", fontSize: 16 }}>Create Free Account</div>
            <div onClick={() => scrollTo("demo")} style={{ ...s.btn("ghost"), padding: "18px 36px", fontSize: 15 }}>Try Demo First</div>
          </div>
          <div style={{ fontSize: 12, color: T.w20, marginTop: 14 }}>Free plan includes 3 analyses/month. No credit card required.</div>
        </Fade>
      </div>
    </div>
  );

  /* ═══ FOOTER ═══ */
  const footer = (
    <div style={{ background: T.deep, borderTop: `1px solid ${T.border}`, padding: "40px 24px 24px" }}>
      <div className="footer-flex" style={{ maxWidth: 1140, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 24 }}>
        <div><Logo size={22} /><div style={{ fontSize: 11, color: T.w20, lineHeight: 1.8, marginTop: 10 }}>MOTIVE Innovation Inc.<br />AI-Powered Export Intelligence Platform<br />Contact: creative@mo-tive.com</div></div>
        <div className="footer-links" style={{ display: "flex", gap: 32 }}>
          {[["Platform",[["AI Analysis",()=>scrollTo("features")],["Pricing",()=>scrollTo("pricing")],["Live Demo",()=>scrollTo("demo")]]],["Access",[["Manufacturer Login",()=>{window.open("/app","_blank")}],["Buyer Portal",()=>{window.open("/buyer","_blank")}]]],["Legal",[["Terms of Service",()=>{window.open("/terms","_blank")}],["Privacy Policy",()=>{window.open("/privacy","_blank")}],["Refund Policy",()=>{window.open("/refund","_blank")}]]]].map(([t,links],i)=>(
            <div key={i}><div style={{ fontSize: 12, fontWeight: 700, color: T.w20, marginBottom: 8 }}>{t}</div>{links.map(([l,a],j)=><div key={j} onClick={a} style={{ fontSize: 12, color: T.w40, cursor: "pointer", marginBottom: 4 }}>{l}</div>)}</div>
          ))}
        </div>
      </div>
      <div style={{ maxWidth: 1140, margin: "0 auto", borderTop: `1px solid ${T.border}`, marginTop: 24, paddingTop: 16, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8, fontSize: 11, color: T.w20 }}>
        <span>&copy; 2026 MOTIVE Innovation Inc. All rights reserved.</span>
        <span>Whistle AI &mdash; Export Intelligence Platform</span>
      </div>
    </div>
  );

  /* ═══ RENDER ═══ */
  return (
    <div style={{ fontFamily: "'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", background: T.bg, color: T.w, minHeight: "100vh" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}a{text-decoration:none}
        button{cursor:pointer;font-family:inherit}select,input,textarea{font-family:inherit}
        input:focus,textarea:focus,select:focus{border-color:${T.pri} !important;outline:none}
        ::selection{background:${T.pri}40;color:${T.w}}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:${T.bg}}::-webkit-scrollbar-thumb{background:${T.w12};border-radius:3px}
      `}</style>
      {signupModal}
      {loginModal}
      {analysisModal}
      {header}
      {hero}
      {how}
      {features}
      {demo}
      {pricing}
      {ctaSection}
      {footer}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
