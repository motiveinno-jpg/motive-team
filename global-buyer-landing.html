@media(max-width:768px){
  .hero-heading{font-size:28px!important}

  .section-heading{font-size:28px!important}
  .nav-desktop{display:none!important}
  .mobile-cta{display:flex!important}
  .grid-responsive{grid-template-columns:1fr!important}
  .grid-2-responsive{grid-template-columns:1fr!important}
  .footer-flex{flex-direction:column!important;text-align:center!important}
  .footer-links{justify-content:center!important}
  #root [style*="gridTemplateColumns: repeat(3"]{grid-template-columns:1fr!important}
  #root [style*="gridTemplateColumns: repeat(2"]{grid-template-columns:1fr!important}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  bg: "#060B18", bgCard: "#0D1424", bgSurface: "#111B2E",
  navy: "#0A1628", deep: "#070E1B",
  pri: "#00D4FF", priG: "linear-gradient(135deg,#00D4FF,#0088FF)",
  acc: "#FFB800", accG: "linear-gradient(135deg,#FFB800,#FF8C00)",
  ok: "#00E676", err: "#FF5252",
  purple: "#A855F7", purpleG: "linear-gradient(135deg,#A855F7,#6D28D9)",
  w: "#FFFFFF", w90: "rgba(255,255,255,.9)", w60: "rgba(255,255,255,.6)",
  w40: "rgba(255,255,255,.4)", w20: "rgba(255,255,255,.2)", w08: "rgba(255,255,255,.06)",
  w12: "rgba(255,255,255,.1)",
  border: "rgba(255,255,255,.08)", borderL: "rgba(255,255,255,.15)",
  glow: "0 0 40px rgba(0,212,255,.15)", glowAcc: "0 0 40px rgba(255,184,0,.12)",
  card: "0 4px 24px rgba(0,0,0,.4)",
};

const useInView = (th = 0.1) => {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => { const el = ref.current; if (!el) return; if(!window.IntersectionObserver){setV(true);return;} const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: th }); o.observe(el); const t=setTimeout(()=>setV(true),1200); return () => {o.disconnect();clearTimeout(t);}; }, [th]);
  return [ref, v];
};
const Fade = ({ children, delay = 0, style = {} }) => { const [ref, v] = useInView(); return <div ref={ref} style={{ ...style, opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(28px)", transition: `all .8s cubic-bezier(.16,1,.3,1) ${delay}s` }}>{children}</div>; };
const GlowLine = () => <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${T.pri}40, transparent)`, margin: "0 auto", maxWidth: 600 }} />;

const COUNTRIES = [
  { flag: "🇰🇷", name: "Korea", specialties: "Beauty & Cosmetics, Food & Beverage, Electronics" },
  { flag: "🇻🇳", name: "Vietnam", specialties: "Textiles, Furniture, Seafood" },
  { flag: "🇹🇭", name: "Thailand", specialties: "Food, Rubber, Auto Parts" },
  { flag: "🇨🇳", name: "China", specialties: "Electronics, Machinery, Textiles" },
  { flag: "🇮🇳", name: "India", specialties: "Pharmaceuticals, Textiles, Spices" },
  { flag: "🇯🇵", name: "Japan", specialties: "Electronics, Auto, Cosmetics" },
  { flag: "🇮🇩", name: "Indonesia", specialties: "Palm Oil, Textiles, Footwear" },
  { flag: "🇹🇼", name: "Taiwan", specialties: "Semiconductors, Machinery, Plastics" },
];

const TRENDING = [
  { name: "Snail Mucin Essence", origin: "Korea", category: "Beauty & Cosmetics", price: "$8.50", moq: "500 units", verified: true },
  { name: "Organic Coconut Oil", origin: "Thailand", category: "Food & Beverage", price: "$3.20/L", moq: "1,000L", verified: true },
  { name: "Cotton Jersey Fabric", origin: "Vietnam", category: "Textiles", price: "$2.80/m", moq: "2,000m", verified: true },
  { name: "Turmeric Extract Capsules", origin: "India", category: "Health Supplements", price: "$0.15/unit", moq: "10,000 units", verified: true },
  { name: "LED Panel Light 40W", origin: "China", category: "Electronics", price: "$6.50", moq: "200 units", verified: true },
  { name: "Matcha Green Tea Powder", origin: "Japan", category: "Food & Beverage", price: "$18.00/kg", moq: "100kg", verified: true },
];

const FEATURES = [
  { icon: "🔍", title: "AI Product Verification", desc: "Quality scoring, compliance checks, and pricing analysis powered by AI. Verify any manufacturer in seconds." },
  { icon: "🌐", title: "Global Manufacturer Network", desc: "Access verified manufacturers across 30+ countries — Korea, Vietnam, Thailand, China, India, Japan, and more." },
  { icon: "🔒", title: "Escrow Payment Protection", desc: "Stripe-secured escrow. Funds held until you confirm delivery. Dispute resolution within 48 hours." },
  { icon: "💬", title: "Real-time Chat Translation", desc: "Communicate with manufacturers in 21 languages. AI translates messages instantly — no language barriers." },
  { icon: "📄", title: "Export Document Templates", desc: "Auto-generate PI, CI, PL, CO, SC and 14+ trade documents. Save hours on paperwork." },
  { icon: "📊", title: "FTA/Tariff Calculator", desc: "Calculate FOB + shipping + tariff = total landed cost. Check FTA eligibility across trade agreements." },
];

const STEPS = [
  { num: "01", title: "Search", desc: "Search products or manufacturers across global marketplaces. Filter by country, category, MOQ, and certifications.", color: T.pri },
  { num: "02", title: "AI Verify", desc: "Our AI verifies manufacturer credentials, product quality scores, compliance status, and pricing benchmarks.", color: T.acc },
  { num: "03", title: "Negotiate", desc: "Chat directly with manufacturers using real-time translation. Request samples, negotiate MOQ and pricing.", color: T.ok },
  { num: "04", title: "Secure Payment", desc: "Pay through Stripe escrow. Funds are held safely until you confirm delivery. Full dispute protection.", color: T.purple },
];

function App() {
  const [scrollY, setScrollY] = useState(0);
  const [mobileMenu, setMobileMenu] = useState(false);

  useEffect(() => { const h = () => setScrollY(window.scrollY); window.addEventListener("scroll", h, { passive: true }); return () => window.removeEventListener("scroll", h); }, []);

  const s = {
    section: { padding: "100px 24px", maxWidth: 1140, margin: "0 auto" },
    heading: { fontSize: 40, fontWeight: 800, color: T.w, letterSpacing: -1.5, lineHeight: 1.2, textAlign: "center" },
    sub: { fontSize: 17, color: T.w60, textAlign: "center", marginTop: 14, lineHeight: 1.7, maxWidth: 640, margin: "14px auto 0" },
    card: { background: T.bgCard, borderRadius: 16, border: `1px solid ${T.border}`, overflow: "hidden" },
    btn: (v = "pri") => ({ display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "14px 32px", borderRadius: 12, fontFamily: "inherit", fontSize: 15, fontWeight: 700, cursor: "pointer", border: "none", transition: "all .25s",
      ...(v === "pri" ? { background: T.priG, color: T.bg, boxShadow: T.glow } : v === "acc" ? { background: T.accG, color: T.bg, boxShadow: T.glowAcc } : { background: "transparent", color: T.w, border: `1.5px solid ${T.borderL}` }) }),
    tag: (c) => ({ display: "inline-block", padding: "4px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, background: `${c}12`, color: c, border: `1px solid ${c}25` }),
  };

  const Logo = ({ size = 26 }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ width: size + 8, height: size + 8, borderRadius: 10, background: T.priG, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 0 20px rgba(0,212,255,.3)" }}>
        <svg width={size * 0.6} height={size * 0.6} viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill={T.bg} /></svg>
      </div>
      <div><div style={{ fontSize: size * 0.65, fontWeight: 800, color: T.w, letterSpacing: -1 }}>Whistle AI</div><div style={{ fontSize: size * 0.33, color: T.w20, fontWeight: 500, letterSpacing: 2, marginTop: -2 }}>GLOBAL SOURCING</div></div>
    </div>
  );

  const goSignup = () => { window.location.href = "/app/buyer"; };
  const scrollTo = (id) => { setMobileMenu(false); setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: "smooth" }), 100); };

  const navItems = [
    { label: "How It Works", action: () => scrollTo("howitworks") },
    { label: "Features", action: () => scrollTo("features") },
    { label: "Categories", action: () => scrollTo("categories") },
    { label: "Pricing", action: () => scrollTo("pricing") },
  ];

  /* ═══ HEADER ═══ */
  const header = (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, background: scrollY > 50 ? "rgba(6,11,24,.92)" : "transparent", backdropFilter: scrollY > 50 ? "blur(16px)" : "none", borderBottom: scrollY > 50 ? `1px solid ${T.border}` : "1px solid transparent", transition: "all .35s" }}>
      <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 24px", height: 64, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <Logo size={22} />
        <div className="nav-desktop" style={{ display: "flex", alignItems: "center", gap: 28 }}>
          {navItems.map((n, i) => <div key={i} onClick={n.action} style={{ fontSize: 13, color: T.w60, cursor: "pointer", fontWeight: 500, transition: "color .2s" }}>{n.label}</div>)}
          <div onClick={goSignup} style={{ ...s.btn("pri"), padding: "10px 24px", fontSize: 13 }}>Sign Up Free</div>
        </div>
        <div className="mobile-cta" onClick={() => setMobileMenu(!mobileMenu)} style={{ display: "none", cursor: "pointer", padding: 8 }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d={mobileMenu ? "M18 6L6 18M6 6l12 12" : "M3 12h18M3 6h18M3 18h18"} stroke={T.w} strokeWidth="2" strokeLinecap="round" /></svg>
        </div>
      </div>
      {mobileMenu && <div style={{ background: "rgba(6,11,24,.98)", padding: "16px 24px", borderTop: `1px solid ${T.border}` }}>
        {navItems.map((n, i) => <div key={i} onClick={n.action} style={{ padding: "12px 0", fontSize: 14, color: T.w60, cursor: "pointer", borderBottom: `1px solid ${T.border}` }}>{n.label}</div>)}
        <div onClick={goSignup} style={{ ...s.btn("pri"), width: "100%", marginTop: 16, textAlign: "center" }}>Sign Up Free</div>
      </div>}
    </div>
  );

  /* ═══ HERO ═══ */
  const hero = (
    <div style={{ padding: "140px 24px 80px", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at 50% 0%, rgba(0,212,255,.08) 0%, transparent 60%)" }} />
      <div style={{ maxWidth: 800, margin: "0 auto", textAlign: "center", position: "relative", zIndex: 1 }}>
        <Fade>
          <div style={s.tag(T.pri)}>Global Sourcing Platform — 30+ Countries</div>
        </Fade>
        <Fade delay={0.1}>
          <h1 className="hero-heading" style={{ fontSize: 48, fontWeight: 800, color: T.w, letterSpacing: -2, lineHeight: 1.15, marginTop: 24 }}>
            Source from Verified<br />Manufacturers <span style={{ background: T.priG, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Worldwide</span>
          </h1>
        </Fade>
        <Fade delay={0.2}>
          <p className="hero-sub" style={{ fontSize: 17, color: T.w60, lineHeight: 1.7, marginTop: 20, maxWidth: 600, margin: "20px auto 0" }}>
            AI-powered sourcing. Find, verify, and trade with manufacturers across 30+ countries. Escrow-protected payments. Real-time translation in 21 languages.
          </p>
        </Fade>
        <Fade delay={0.3}>
          <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap", marginTop: 36 }}>
            <div onClick={goSignup} style={s.btn("pri")}>Start Sourcing Free</div>
            <div onClick={() => scrollTo("howitworks")} style={s.btn("ghost")}>See How It Works</div>
          </div>
        </Fade>
        <Fade delay={0.4}>
          <div style={{ display: "flex", justifyContent: "center", gap: 32, marginTop: 48, flexWrap: "wrap" }}>
            {[["30+", "Countries"], ["10,000+", "Manufacturers"], ["AI", "Verification"], ["24hr", "Response"]].map(([v, l], i) => (
              <div key={i} style={{ textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 800, background: T.priG, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{v}</div>
                <div style={{ fontSize: 12, color: T.w40, marginTop: 4 }}>{l}</div>
              </div>
            ))}
          </div>
        </Fade>
      </div>
    </div>
  );

  /* ═══ HOW IT WORKS ═══ */
  const howSection = (
    <div id="howitworks" style={s.section}>
      <Fade><h2 style={s.heading}>How It Works</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>From search to secure payment — source globally in 4 simple steps.</p></Fade>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 24, marginTop: 56 }}>
        {STEPS.map((step, i) => (
          <Fade key={i} delay={i * 0.1}>
            <div style={{ ...s.card, padding: 32, position: "relative" }}>
              <div style={{ fontSize: 48, fontWeight: 800, color: `${step.color}15`, position: "absolute", top: 16, right: 24 }}>{step.num}</div>
              <div style={{ width: 44, height: 44, borderRadius: 12, background: `${step.color}15`, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
                <div style={{ width: 10, height: 10, borderRadius: 5, background: step.color }} />
              </div>
              <h3 style={{ fontSize: 20, fontWeight: 700, color: T.w, marginBottom: 10 }}>{step.title}</h3>
              <p style={{ fontSize: 14, color: T.w60, lineHeight: 1.7 }}>{step.desc}</p>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ FEATURES ═══ */
  const featuresSection = (
    <div id="features" style={{ ...s.section, padding: "80px 24px" }}>
      <Fade><h2 style={s.heading}>Everything You Need to Source Globally</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>Powerful tools built for international buyers. No middlemen, no hidden fees.</p></Fade>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20, marginTop: 56 }}>
        {FEATURES.map((f, i) => (
          <Fade key={i} delay={i * 0.08}>
            <div style={{ ...s.card, padding: 28, height: "100%" }}>
              <div style={{ fontSize: 28, marginBottom: 14 }}>{f.icon}</div>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: T.w, marginBottom: 8 }}>{f.title}</h3>
              <p style={{ fontSize: 13, color: T.w60, lineHeight: 1.7 }}>{f.desc}</p>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ GLOBAL NETWORK ═══ */
  const networkSection = (
    <div id="categories" style={s.section}>
      <Fade><h2 style={s.heading}>Global Manufacturer Network</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>Access verified manufacturers across Asia and beyond. Each country brings unique specialties.</p></Fade>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16, marginTop: 48 }}>
        {COUNTRIES.map((c, i) => (
          <Fade key={i} delay={i * 0.06}>
            <div style={{ ...s.card, padding: 24, display: "flex", alignItems: "center", gap: 16 }}>
              <div style={{ fontSize: 36, flexShrink: 0 }}>{c.flag}</div>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700, color: T.w }}>{c.name}</div>
                <div style={{ fontSize: 13, color: T.w40, marginTop: 4 }}>{c.specialties}</div>
              </div>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ TRENDING PRODUCTS ═══ */
  const trendingSection = (
    <div style={{ ...s.section, padding: "80px 24px" }}>
      <Fade><h2 style={s.heading}>Trending Products</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>Popular products sourced through Whistle AI right now.</p></Fade>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginTop: 48 }}>
        {TRENDING.map((p, i) => (
          <Fade key={i} delay={i * 0.08}>
            <div style={{ ...s.card, padding: 24 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                <span style={s.tag(T.pri)}>{p.category}</span>
                {p.verified && <span style={{ fontSize: 11, color: T.ok, fontWeight: 600 }}>Verified</span>}
              </div>
              <h4 style={{ fontSize: 15, fontWeight: 700, color: T.w, marginBottom: 8 }}>{p.name}</h4>
              <div style={{ fontSize: 13, color: T.w40, lineHeight: 1.8 }}>
                <div>Origin: <span style={{ color: T.w60 }}>{p.origin}</span></div>
                <div>FOB Price: <span style={{ color: T.acc }}>{p.price}</span></div>
                <div>MOQ: <span style={{ color: T.w60 }}>{p.moq}</span></div>
              </div>
              <div onClick={goSignup} style={{ marginTop: 16, padding: "10px 0", textAlign: "center", borderRadius: 8, border: `1px solid ${T.pri}30`, background: `${T.pri}08`, color: T.pri, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Request Quote</div>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ ESCROW / TRUST ═══ */
  const escrowSteps = [
    { icon: "💳", label: "Buyer Pays", desc: "Funds held in escrow (NOT sent to manufacturer)" },
    { icon: "📦", label: "Manufacturer Ships", desc: "Tracking number provided to buyer" },
    { icon: "✅", label: "Buyer Confirms", desc: "Inspect goods and confirm delivery" },
    { icon: "💰", label: "Payment Released", desc: "Funds released to manufacturer" },
  ];

  const escrowSection = (
    <div style={{ ...s.section, padding: "80px 24px" }}>
      <Fade><h2 style={s.heading}>Your Payment is Protected</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>Every transaction uses Stripe escrow — funds are held safely until you confirm delivery.</p></Fade>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16, marginTop: 48, maxWidth: 800, margin: "48px auto 0" }}>
        {escrowSteps.map((es, i) => (
          <Fade key={i} delay={i * 0.1}>
            <div style={{ ...s.card, padding: 24, textAlign: "center", position: "relative" }}>
              <div style={{ fontSize: 32, marginBottom: 12 }}>{es.icon}</div>
              <div style={{ position: "absolute", top: 12, left: 16, fontSize: 11, color: T.w20, fontWeight: 700 }}>STEP {i + 1}</div>
              <h4 style={{ fontSize: 15, fontWeight: 700, color: T.w, marginBottom: 6 }}>{es.label}</h4>
              <p style={{ fontSize: 13, color: T.w40, lineHeight: 1.6 }}>{es.desc}</p>
            </div>
          </Fade>
        ))}
      </div>
      <Fade delay={0.5}>
        <div style={{ textAlign: "center", marginTop: 32 }}>
          <div style={{ display: "inline-flex", gap: 16, alignItems: "center", padding: "12px 24px", borderRadius: 12, background: T.bgCard, border: `1px solid ${T.border}` }}>
            <span style={{ fontSize: 13, color: T.w40 }}>Dispute? Resolution within 48 hours</span>
            <span style={{ width: 1, height: 16, background: T.border }} />
            <span style={{ fontSize: 13, color: T.w40 }}>Powered by Stripe</span>
            <span style={{ width: 1, height: 16, background: T.border }} />
            <span style={{ fontSize: 13, color: T.w40 }}>256-bit SSL</span>
          </div>
        </div>
      </Fade>
    </div>
  );

  /* ═══ TRUST SIGNALS ═══ */
  const trustSection = (
    <div style={{ ...s.section, padding: "60px 24px" }}>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
        {[
          { val: "AI-Verified", label: "All manufacturers go through AI credential verification", icon: "🛡️" },
          { val: "Stripe-Secured", label: "PCI DSS compliant payment processing", icon: "🔐" },
          { val: "21 Languages", label: "Real-time chat translation for global communication", icon: "🌍" },
        ].map((t2, i) => (
          <Fade key={i} delay={i * 0.1}>
            <div style={{ textAlign: "center", padding: 28 }}>
              <div style={{ fontSize: 32, marginBottom: 12 }}>{t2.icon}</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: T.w, marginBottom: 6 }}>{t2.val}</div>

  // Register translations with i18n-detect system
  window._whistleI18n = translations;

  // Store original English text nodes so we can restore before re-translating
  var originalTextMap = new WeakMap();
  var isInitialized = false;

  /**
   * Snapshot all text nodes in #root so we can restore English later.
   */
  function snapshotOriginalText() {
    var root = document.getElementById('root');
    if (!root || isInitialized) return;
    isInitialized = true;

    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
    var node;
    while (node = walker.nextNode()) {
      if (node.nodeValue && node.nodeValue.trim().length > 0) {
        originalTextMap.set(node, node.nodeValue);
      }
    }
  }

  /**
   * Restore all text nodes to their original English values.
   */
  function restoreOriginalText() {
    var root = document.getElementById('root');
    if (!root) return;

    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
    var node;
    while (node = walker.nextNode()) {
      var orig = originalTextMap.get(node);
      if (orig !== undefined) {
        node.nodeValue = orig;
      }
    }
  }

  /**
   * Walk the DOM tree after React renders and replace English text
   * with detected language translations.
   * Stores originals on first run so language can be switched back to English.
   */
  function applyBuyerLandingI18n() {
    var lang = window._whistleLang || 'en';

    var root = document.getElementById('root');
    if (!root) return;

    // Take snapshot of English text on first call
    snapshotOriginalText();

    // Always restore English first to avoid stale partial translations
    restoreOriginalText();

    // If target is English, just restore and stop
    if (lang === 'en') {
      document.documentElement.setAttribute('lang', 'en');
      document.documentElement.removeAttribute('dir');
      return;
    }

    var dict = translations[lang];
    if (!dict) return;

    // Build sorted keys (longest first to avoid partial matches)
    var keys = Object.keys(dict).sort(function(a, b) { return b.length - a.length; });

    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
    var textNodes = [];
    var node;
    while (node = walker.nextNode()) {
      if (node.nodeValue && node.nodeValue.trim().length > 0) {
        textNodes.push(node);
      }
    }

    for (var i = 0; i < textNodes.length; i++) {
      var original = textNodes[i].nodeValue;
      var trimmed = original.trim();

      // Exact match first
      if (dict[trimmed] !== undefined) {
        textNodes[i].nodeValue = original.replace(trimmed, dict[trimmed]);
        continue;
      }

      // Partial match for longer strings containing translatable segments
      var changed = original;
      for (var k = 0; k < keys.length; k++) {
        if (changed.indexOf(keys[k]) !== -1 && dict[keys[k]]) {
          changed = changed.replace(keys[k], dict[keys[k]]);
        }
      }
      if (changed !== original) {
        textNodes[i].nodeValue = changed;
      }
    }

    // Also translate text content on buttons
    var buttons = root.querySelectorAll('button, [role="button"]');
    for (var b = 0; b < buttons.length; b++) {
      var btnText = buttons[b].textContent.trim();
      if (dict[btnText] !== undefined) {
        if (buttons[b].childNodes.length === 1 && buttons[b].childNodes[0].nodeType === 3) {
          buttons[b].childNodes[0].nodeValue = dict[btnText];
        }
      }
    }

    // Set document lang and dir for RTL
    document.documentElement.setAttribute('lang', lang);
    if (lang === 'ar') {
      document.documentElement.setAttribute('dir', 'rtl');
    } else {
      document.documentElement.removeAttribute('dir');
    }
  }

  /**
   * Wait for React to finish rendering, then apply translations.
   */
  function waitForReactAndTranslate() {
    var root = document.getElementById('root');
    if (!root) return;

    if (root.children.length > 0) {
      setTimeout(applyBuyerLandingI18n, 150);
      return;
    }

    var observer = new MutationObserver(function(mutations, obs) {
      if (root.children.length > 0) {
        obs.disconnect();
        setTimeout(applyBuyerLandingI18n, 150);
      }
    });

    observer.observe(root, { childList: true, subtree: true });

    setTimeout(function() {
      observer.disconnect();
      applyBuyerLandingI18n();
    }, 5000);
  }

  // Re-apply translations when language is switched via the lang switcher
  var originalSetLang = window._whistleSetLang;
  if (originalSetLang) {
    window._whistleSetLang = function(lang) {
      originalSetLang(lang);
      setTimeout(applyBuyerLandingI18n, 100);
    };
  }

  // Start the process
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', waitForReactAndTranslate);
  } else {
    waitForReactAndTranslate();
  }
})();
