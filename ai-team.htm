<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg-card:#12121a;--bg-card-hover:#1a1a25;
  --border:#1e1e2e;--border-light:#2a2a3a;
  --text:#e4e4e7;--text-muted:#71717a;--text-dim:#52525b;
  --accent:#8b5cf6;--accent-glow:rgba(139,92,246,0.15);
  --green:#22c55e;--yellow:#eab308;--blue:#3b82f6;--gray:#6b7280;
  --orange:#f97316;--pink:#ec4899;--cyan:#06b6d4;--amber:#f59e0b;
  --status-working:#22c55e;--status-meeting:#eab308;
  --status-research:#3b82f6;--status-break:#6b7280;--status-reviewing:#f97316;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.5}
/* scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.logo span{background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-badge{font-size:11px;padding:3px 8px;border-radius:20px;background:rgba(139,92,246,0.15);color:var(--accent);font-weight:600;letter-spacing:0.5px}
.header-right{display:flex;align-items:center;gap:20px}
.header-time{font-size:13px;color:var(--text-muted);font-variant-numeric:tabular-nums}
.status-summary{display:flex;gap:8px}
.status-pill{font-size:11px;padding:3px 10px;border-radius:12px;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.04);border:1px solid var(--border)}
.status-pill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 340px;gap:0;min-height:calc(100vh - 64px)}
.main{padding:24px;overflow-y:auto}
.sidebar{border-left:1px solid var(--border);padding:24px;overflow-y:auto;background:rgba(12,12,18,0.5)}

/* Section headers */
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:16px;font-weight:600}

/* Agent grid */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:32px}
.agent-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all 0.3s ease;position:relative;overflow:hidden}
.agent-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.3s}
.agent-card:hover{background:var(--bg-card-hover);border-color:var(--border-light);transform:translateY(-2px)}
.agent-card:hover::before{opacity:1}
.agent-card[data-agent="nova"]::before{background:linear-gradient(90deg,#8b5cf6,#3b82f6)}
.agent-card[data-agent="atlas"]::before{background:linear-gradient(90deg,#22c55e,#14b8a6)}
.agent-card[data-agent="pixel"]::before{background:linear-gradient(90deg,#ec4899,#f97316)}
.agent-card[data-agent="echo"]::before{background:linear-gradient(90deg,#06b6d4,#3b82f6)}
.agent-card[data-agent="sage"]::before{background:linear-gradient(90deg,#f59e0b,#eab308)}

.agent-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.avatar::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid transparent;transition:border-color 0.3s}
.avatar.status-working::after{border-color:var(--status-working);box-shadow:0 0 12px rgba(34,197,94,0.3)}
.avatar.status-meeting::after{border-color:var(--status-meeting);box-shadow:0 0 12px rgba(234,179,8,0.3)}
.avatar.status-research::after{border-color:var(--status-research);box-shadow:0 0 12px rgba(59,130,246,0.3)}
.avatar.status-break::after{border-color:var(--status-break);box-shadow:0 0 12px rgba(107,114,128,0.2)}
.avatar.status-reviewing::after{border-color:var(--status-reviewing);box-shadow:0 0 12px rgba(249,115,22,0.3)}
.avatar-nova{background:linear-gradient(135deg,#8b5cf6,#3b82f6)}
.avatar-atlas{background:linear-gradient(135deg,#22c55e,#14b8a6)}
.avatar-pixel{background:linear-gradient(135deg,#ec4899,#f97316)}
.avatar-echo{background:linear-gradient(135deg,#06b6d4,#3b82f6)}
.avatar-sage{background:linear-gradient(135deg,#f59e0b,#eab308)}

.agent-info{flex:1;min-width:0}
.agent-name{font-size:15px;font-weight:600;margin-bottom:2px}
.agent-role{font-size:12px;color:var(--text-muted)}

.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.status-badge .dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s ease-in-out infinite}
.status-badge.working{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.status-badge.working .dot{background:var(--green)}
.status-badge.meeting{background:rgba(234,179,8,0.1);color:var(--yellow);border:1px solid rgba(234,179,8,0.2)}
.status-badge.meeting .dot{background:var(--yellow)}
.status-badge.research{background:rgba(59,130,246,0.1);color:var(--blue);border:1px solid rgba(59,130,246,0.2)}
.status-badge.research .dot{background:var(--blue)}
.status-badge.break{background:rgba(107,114,128,0.1);color:var(--gray);border:1px solid rgba(107,114,128,0.2)}
.status-badge.break .dot{background:var(--gray);animation:none}
.status-badge.reviewing{background:rgba(249,115,22,0.1);color:var(--orange);border:1px solid rgba(249,115,22,0.2)}
.status-badge.reviewing .dot{background:var(--orange)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.agent-task{margin-top:14px}
.task-label{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.task-name{font-size:13px;color:var(--text);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 1s ease;background:var(--accent)}
.agent-card[data-agent="nova"] .progress-fill{background:linear-gradient(90deg,#8b5cf6,#3b82f6)}
.agent-card[data-agent="atlas"] .progress-fill{background:linear-gradient(90deg,#22c55e,#14b8a6)}
.agent-card[data-agent="pixel"] .progress-fill{background:linear-gradient(90deg,#ec4899,#f97316)}
.agent-card[data-agent="echo"] .progress-fill{background:linear-gradient(90deg,#06b6d4,#3b82f6)}
.agent-card[data-agent="sage"] .progress-fill{background:linear-gradient(90deg,#f59e0b,#eab308)}

.agent-meta{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.last-active{font-size:11px;color:var(--text-dim)}
.progress-pct{font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums}

/* Sparkline */
.sparkline{display:flex;align-items:flex-end;gap:2px;height:24px;margin-top:12px}
.sparkline .bar{flex:1;border-radius:1px;min-width:0;transition:height 0.5s ease;opacity:0.6}
.agent-card[data-agent="nova"] .sparkline .bar{background:#8b5cf6}
.agent-card[data-agent="atlas"] .sparkline .bar{background:#22c55e}
.agent-card[data-agent="pixel"] .sparkline .bar{background:#ec4899}
.agent-card[data-agent="echo"] .sparkline .bar{background:#06b6d4}
.agent-card[data-agent="sage"] .sparkline .bar{background:#f59e0b}

/* Skill tags */
.skill-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:12px}
.skill-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,0.04);color:var(--text-dim);border:1px solid var(--border)}

/* Meeting room */
.meeting-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px;transition:all 0.3s}
.meeting-panel.hidden{display:none}
.meeting-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.meeting-title{font-size:13px;font-weight:600}
.meeting-timer{font-size:12px;color:var(--yellow);font-variant-numeric:tabular-nums}
.meeting-topic{font-size:12px;color:var(--text-muted);margin-bottom:12px;padding:8px 12px;background:rgba(234,179,8,0.06);border-radius:8px;border:1px solid rgba(234,179,8,0.1)}
.meeting-avatars{display:flex;gap:-4px}
.meeting-avatars .mini-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;border:2px solid var(--bg-card);margin-left:-8px}
.meeting-avatars .mini-avatar:first-child{margin-left:0}

/* Activity feed */
.activity-feed{display:flex;flex-direction:column;gap:0}
.activity-item{padding:10px 0;border-bottom:1px solid var(--border);animation:fadeIn 0.5s ease}
.activity-item:last-child{border-bottom:none}
.activity-time{font-size:10px;color:var(--text-dim);font-variant-numeric:tabular-nums;margin-bottom:3px}
.activity-text{font-size:12px;color:var(--text-muted);line-height:1.5}
.activity-text strong{color:var(--text);font-weight:500}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

/* Metrics */
.metrics-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.metric-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.metric-value{font-size:28px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.metric-label{font-size:11px;color:var(--text-dim);margin-top:4px}
.metric-card:nth-child(1) .metric-value{color:#8b5cf6}
.metric-card:nth-child(2) .metric-value{color:#22c55e}
.metric-card:nth-child(3) .metric-value{color:#f97316}
.metric-card:nth-child(4) .metric-value{color:#ec4899}
.metric-card:nth-child(5) .metric-value{color:#06b6d4}

/* Footer */
.footer{padding:20px 24px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--text-dim)}
.footer a{color:var(--accent);text-decoration:none}

/* Mobile */
@media(max-width:1024px){
  .layout{grid-template-columns:1fr}
  .sidebar{border-left:none;border-top:1px solid var(--border)}
}
@media(max-width:768px){
  .header{padding:0 16px;height:56px}
  .status-summary{display:none}
  .main{padding:16px}
  .sidebar{padding:16px}
  .agent-grid{grid-template-columns:1fr}
  .metrics-bar{grid-template-columns:repeat(3,1fr)}
  .metric-card:nth-child(4),.metric-card:nth-child(5){grid-column:span 1}
}
@media(max-width:480px){
  .metrics-bar{grid-template-columns:repeat(2,1fr)}
  .metric-card:last-child{grid-column:span 2}
}
</style>
</head>

    { agent: 'pixel', text: 'Pixel이 Whistle AI 프로모션 배너 V2 완성' },
    { agent: 'pixel', text: 'Pixel이 바이어 온보딩 일러스트 4종 납품' },
    { agent: 'pixel', text: 'Pixel이 브랜드 가이드라인 컬러 팔레트 업데이트' },
    { agent: 'pixel', text: 'Pixel이 YouTube 썸네일 A/B 테스트 세트 제작' },
    { agent: 'pixel', text: 'Pixel이 랜딩 페이지 히어로 애니메이션 프로토타입 완성' },
    { agent: 'echo', text: 'Echo가 주간 트래픽 리포트 생성 완료' },
    { agent: 'echo', text: 'Echo가 SEO 키워드 순위 변동 분석 리포트 제출' },
    { agent: 'echo', text: 'Echo가 전환율 퍼널에서 이탈 지점 3곳 식별' },
    { agent: 'echo', text: 'Echo가 경쟁사 대비 트래픽 벤치마크 완료' },
    { agent: 'echo', text: 'Echo가 GEO-SEO 인용 현황 대시보드 갱신' },
    { agent: 'echo', text: 'Echo가 Supabase 슬로우 쿼리 5건 최적화 제안' },
    { agent: 'sage', text: 'Sage가 알리바바 파트너십 미팅 준비 자료 작성 완료' },
    { agent: 'sage', text: 'Sage가 분기 OKR 달성률 82% 보고서 제출' },
    { agent: 'sage', text: 'Sage가 Mercury Bank 계좌 설정 가이드 정리' },
    { agent: 'sage', text: 'Sage가 US 법인 EIN 신청 후속 절차 정리 완료' },
    { agent: 'sage', text: 'Sage가 KOTRA 지원사업 신청서 초안 작성' },
    { agent: 'sage', text: 'Sage가 투자 유치 IR 데크 v3 업데이트' },
    { agent: 'multi', agents: ['nova', 'atlas'], text: 'Nova와 Atlas가 코드 리뷰 미팅 시작' },
    { agent: 'multi', agents: ['pixel', 'echo'], text: 'Pixel과 Echo가 마케팅 데이터 리뷰 진행' },
    { agent: 'multi', agents: ['sage', 'nova'], text: 'Sage와 Nova가 기술 전략 미팅 진행 중' },
    { agent: 'multi', agents: ['atlas', 'pixel'], text: 'Atlas와 Pixel이 UI 버그 트리아지 세션 시작' },
    { agent: 'multi', agents: ['echo', 'sage'], text: 'Echo와 Sage가 성과 지표 리뷰 미팅 시작' },
  ];

  /* ── State ── */
  var state = {
    agents: {},
    meetingStart: null,
    meetingTopic: '',
    activityLog: [],
    metrics: { tasks: 47, commits: 12, bugs: 8, content: 5 }
  };

  /* ── Helpers ── */
  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function pickWeighted(items, weights) {
    var total = weights.reduce(function(s, w) { return s + w; }, 0);
    var r = Math.random() * total;
    var sum = 0;
    for (var i = 0; i < items.length; i++) {
      sum += weights[i];
      if (r <= sum) return items[i];
    }
    return items[items.length - 1];
  }

  function pickRandom(arr) { return arr[rand(0, arr.length - 1)]; }

  function formatTime(d) {
    var h = String(d.getHours()).padStart(2, '0');
    var m = String(d.getMinutes()).padStart(2, '0');
    var s = String(d.getSeconds()).padStart(2, '0');
    return h + ':' + m + ':' + s;
  }

  function formatTimeShort(d) {
    var h = String(d.getHours()).padStart(2, '0');
    var m = String(d.getMinutes()).padStart(2, '0');
    return h + ':' + m;
  }

  function minutesAgo(n) {
    var d = new Date();
    d.setMinutes(d.getMinutes() - n);
    return d;
  }

  function formatDuration(ms) {
    var totalSec = Math.floor(ms / 1000);
    var min = String(Math.floor(totalSec / 60)).padStart(2, '0');
    var sec = String(totalSec % 60).padStart(2, '0');
    return min + ':' + sec;
  }

  /* ── Initialize agent states ── */
  function initAgents() {
    AGENTS.forEach(function(agent) {
      var statusObj = pickWeighted(STATUSES, STATUS_WEIGHTS);
      var sparkline = [];
      for (var i = 0; i < 8; i++) sparkline.push(rand(20, 100));
      state.agents[agent.id] = {
        status: statusObj.key,
        task: pickRandom(agent.tasks),
        progress: rand(10, 85),
        lastActive: minutesAgo(rand(0, 5)),
        nextChange: Date.now() + rand(180000, 900000),
        sparkline: sparkline
      };
    });
  }

  /* ── Render: Agent cards ── */
  function renderAgentCards() {
    var grid = document.getElementById('agentGrid');
    grid.innerHTML = '';
    AGENTS.forEach(function(agent) {
      var s = state.agents[agent.id];
      var statusObj = STATUSES.find(function(st) { return st.key === s.status; });

      var card = document.createElement('div');
      card.className = 'agent-card';
      card.setAttribute('data-agent', agent.id);
      card.id = 'card-' + agent.id;

      var lastActiveMin = Math.max(0, Math.floor((Date.now() - s.lastActive.getTime()) / 60000));
      var lastActiveText = lastActiveMin === 0 ? '방금 전' : lastActiveMin + '분 전';

      var sparkBars = '';
      s.sparkline.forEach(function(h) {
        sparkBars += '<div class="bar" style="height:' + h + '%"></div>';
      });

      var skillHtml = '';
      agent.skills.forEach(function(sk) {
        skillHtml += '<span class="skill-tag">' + sk + '</span>';
      });

      card.innerHTML =
        '<div class="agent-top">' +
          '<div class="avatar ' + agent.avatarClass + ' status-' + s.status + '">' + agent.initial + '</div>' +
          '<div class="agent-info">' +
            '<div class="agent-name">' + agent.name + '</div>' +
            '<div class="agent-role">' + agent.role + (agent.pc ? ' · ' + agent.pc : '') + '</div>' +
          '</div>' +
          '<span class="status-badge ' + s.status + '"><span class="dot"></span>' + statusObj.label + '</span>' +
        '</div>' +
        '<div class="agent-task">' +
          '<div class="task-label">Current Task</div>' +
          '<div class="task-name">' + s.task + '</div>' +
          '<div class="progress-bar"><div class="progress-fill" style="width:' + s.progress + '%"></div></div>' +
        '</div>' +
        '<div class="agent-meta">' +
          '<span class="last-active">Last active: ' + lastActiveText + '</span>' +
          '<span class="progress-pct">' + s.progress + '%</span>' +
        '</div>' +
        '<div class="sparkline">' + sparkBars + '</div>' +
        '<div class="skill-tags">' + skillHtml + '</div>';

      grid.appendChild(card);
    });
  }

  /* ── Render: Status summary ── */
  function renderStatusSummary() {
    var counts = {};
    STATUSES.forEach(function(s) { counts[s.key] = 0; });
    Object.keys(state.agents).forEach(function(id) {
      counts[state.agents[id].status]++;
    });

    var el = document.getElementById('statusSummary');
    var html = '';
    var colorMap = {
      working: 'var(--status-working)', meeting: 'var(--status-meeting)',
      research: 'var(--status-research)', break: 'var(--status-break)',
      reviewing: 'var(--status-reviewing)'
    };
    STATUSES.forEach(function(s) {
      if (counts[s.key] > 0) {
        html += '<div class="status-pill"><span class="dot" style="background:' + colorMap[s.key] + '"></span>' + counts[s.key] + ' ' + s.label + '</div>';
      }
    });
    el.innerHTML = html;
  }

  /* ── Render: Meeting panel ── */
  function renderMeetingPanel() {
    var meetingAgents = [];
    Object.keys(state.agents).forEach(function(id) {
      if (state.agents[id].status === 'meeting') meetingAgents.push(id);
    });

    var panel = document.getElementById('meetingPanel');
    var noMeeting = document.getElementById('noMeeting');

    if (meetingAgents.length >= 2) {
      panel.classList.remove('hidden');
      noMeeting.style.display = 'none';

      if (!state.meetingStart) {
        state.meetingStart = Date.now();
        state.meetingTopic = pickRandom(MEETING_TOPICS);
      }

      document.getElementById('meetingTopic').textContent = state.meetingTopic;

      var avatarsHtml = '';
      meetingAgents.forEach(function(id) {
        var agent = AGENTS.find(function(a) { return a.id === id; });
        avatarsHtml += '<div class="mini-avatar ' + agent.avatarClass + '">' + agent.initial + '</div>';
      });
      document.getElementById('meetingAvatars').innerHTML = avatarsHtml;

      var names = meetingAgents.map(function(id) {
        return AGENTS.find(function(a) { return a.id === id; }).name;
      });
      document.getElementById('meetingTitle').textContent = names.join(' & ') + ' Meeting';
    } else {
      panel.classList.add('hidden');
      noMeeting.style.display = '';
      state.meetingStart = null;
    }
  }

  function updateMeetingTimer() {
    if (state.meetingStart) {
      var elapsed = Date.now() - state.meetingStart;
      document.getElementById('meetingTimer').textContent = formatDuration(elapsed);
    }
  }

  /* ── Render: Activity feed ── */
  function renderActivityFeed() {
    var feed = document.getElementById('activityFeed');
    feed.innerHTML = '';
    var items = state.activityLog.slice(-15).reverse();
    items.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'activity-item';
      div.innerHTML =
        '<div class="activity-time">' + formatTimeShort(item.time) + '</div>' +
        '<div class="activity-text">' + item.text + '</div>';
      feed.appendChild(div);
    });
  }

  /* ── Render: Metrics ── */
  function animateMetric(id, target) {
    var el = document.getElementById(id);
    var current = parseInt(el.textContent) || 0;
    if (current === target) return;
    var step = current < target ? 1 : -1;
    var interval = Math.max(10, Math.floor(500 / Math.abs(target - current)));
    var timer = setInterval(function() {
      current += step;
      el.textContent = current;
      if (current === target) clearInterval(timer);
    }, interval);
  }

  function renderMetrics() {
    animateMetric('metricTasks', state.metrics.tasks);
    animateMetric('metricCommits', state.metrics.commits);
    animateMetric('metricBugs', state.metrics.bugs);
    animateMetric('metricContent', state.metrics.content);
  }

  /* ── State machine: update agents ── */
  function updateAgentStates() {
    var now = Date.now();
    var changed = false;

    Object.keys(state.agents).forEach(function(id) {
      var s = state.agents[id];
      if (now >= s.nextChange) {
        var agent = AGENTS.find(function(a) { return a.id === id; });
        var prevStatus = s.status;
        var newStatusObj = pickWeighted(STATUSES, STATUS_WEIGHTS);

        s.status = newStatusObj.key;
        s.task = pickRandom(agent.tasks);
        s.progress = rand(5, 30);
        s.lastActive = new Date();
        s.nextChange = now + rand(180000, 900000);

        /* Update sparkline */
        s.sparkline.shift();
        s.sparkline.push(rand(20, 100));

        /* Log activity */
        if (prevStatus === 'working' && newStatusObj.key !== 'working') {
          addActivity(agent.name + '가 ' + s.task + ' 완료');
          incrementMetricForAgent(id);
        }

        changed = true;
      } else {
        /* Increment progress */
        if (s.status === 'working' || s.status === 'reviewing' || s.status === 'research') {
          s.progress = Math.min(98, s.progress + rand(1, 3));
        }
      }
    });

    if (changed) {
      renderAgentCards();
      renderStatusSummary();
      renderMeetingPanel();
    } else {
      updateProgressBars();
    }
  }

  function updateProgressBars() {
    Object.keys(state.agents).forEach(function(id) {
      var s = state.agents[id];
      var card = document.getElementById('card-' + id);
      if (!card) return;
      var fill = card.querySelector('.progress-fill');
      var pct = card.querySelector('.progress-pct');
      if (fill) fill.style.width = s.progress + '%';
      if (pct) pct.textContent = s.progress + '%';
    });
  }

  function incrementMetricForAgent(agentId) {
    if (agentId === 'nova') {
      state.metrics.tasks++;
      state.metrics.commits += rand(1, 2);
    } else if (agentId === 'atlas') {
      state.metrics.tasks++;
      state.metrics.bugs += rand(0, 2);
    } else if (agentId === 'pixel') {
      state.metrics.tasks++;
      state.metrics.content++;
    } else if (agentId === 'echo') {
      state.metrics.tasks++;
    } else if (agentId === 'sage') {
      state.metrics.tasks++;
    }
    renderMetrics();
  }

  function addActivity(text) {
    state.activityLog.push({ time: new Date(), text: text });
    if (state.activityLog.length > 50) state.activityLog.shift();
    renderActivityFeed();
  }

  /* ── Random activity generator ── */
  function generateRandomActivity() {
    var template = pickRandom(ACTIVITY_TEMPLATES);
    addActivity(template.text);
  }

  /* ── Clock ── */
  function updateClock() {
    document.getElementById('headerTime').textContent = formatTime(new Date());
  }

  /* ── Seed initial activity log ── */
  function seedActivityLog() {
    var used = [];
    for (var i = 0; i < 8; i++) {
      var idx;
      do { idx = rand(0, ACTIVITY_TEMPLATES.length - 1); } while (used.indexOf(idx) !== -1);
      used.push(idx);
      state.activityLog.push({
        time: minutesAgo(rand(2, 60)),
        text: ACTIVITY_TEMPLATES[idx].text
      });
    }
    state.activityLog.sort(function(a, b) { return a.time - b.time; });
  }

  /* ── Init ── */
  function init() {
    initAgents();
    seedActivityLog();
    renderAgentCards();
    renderStatusSummary();
    renderMeetingPanel();
    renderActivityFeed();
    renderMetrics();
    updateClock();

    /* Clock: every second */
    setInterval(updateClock, 1000);

    /* Meeting timer: every second */
    setInterval(updateMeetingTimer, 1000);

    /* State machine: every 30 seconds */
    setInterval(updateAgentStates, 30000);

    /* Random activity: every 45-90 seconds */
    function scheduleActivity() {
      setTimeout(function() {
        generateRandomActivity();
        scheduleActivity();
      }, rand(45000, 90000));
    }
    scheduleActivity();

    /* Metric bump: every 2-4 minutes */
    function scheduleMetricBump() {
      setTimeout(function() {
        var which = rand(0, 3);
        if (which === 0) state.metrics.tasks++;
        else if (which === 1) state.metrics.commits++;
        else if (which === 2) state.metrics.bugs++;
        else state.metrics.content++;
        renderMetrics();
        scheduleMetricBump();
      }, rand(120000, 240000));
    }
    scheduleMetricBump();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
