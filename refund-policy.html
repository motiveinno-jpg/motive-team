*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Sora','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--w90);line-height:1.8;min-height:100vh}

.site-header{position:sticky;top:0;z-index:100;background:rgba(6,11,24,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#00D4FF,#0088FF);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--bg);flex-shrink:0}
.logo-text{font-size:16px;font-weight:800;letter-spacing:-.5px;color:var(--w)}
.logo-text span{color:var(--pri);font-weight:400;font-size:11px;margin-left:4px;letter-spacing:0}
.header-nav{display:flex;gap:8px;align-items:center}
.header-nav a{font-size:12px;font-weight:500;color:var(--w40);padding:6px 14px;border-radius:var(--r-s);border:1px solid transparent;transition:all .15s;text-decoration:none}
.header-nav a:hover{color:var(--w90);border-color:var(--bd)}
.header-nav a.active{color:var(--pri);border-color:rgba(0,212,255,.2);background:rgba(0,212,255,.06)}

.wrap{max-width:820px;margin:0 auto;padding:48px 24px 80px}
.page-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;color:var(--pri);background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15);margin-bottom:16px}
h1{font-size:32px;font-weight:800;letter-spacing:-.5px;color:var(--w);margin-bottom:8px}
.updated{font-size:13px;color:var(--w40);margin-bottom:40px}
h2{font-size:18px;font-weight:700;color:var(--pri);margin:36px 0 14px;padding-top:20px;border-top:1px solid var(--bd)}
h2:first-of-type{border-top:none;padding-top:0}
h3{font-size:15px;font-weight:600;color:var(--w70);margin:18px 0 8px}
p,li{font-size:14px;color:var(--w60);margin-bottom:8px}
ol,ul{padding-left:24px;margin-bottom:14px}
li{padding-left:4px}
a{color:var(--pri);text-decoration:none;transition:color .15s}
a:hover{color:#5ae0ff;text-decoration:underline}
strong{color:var(--w90);font-weight:600}

table{width:100%;border-collapse:collapse;margin:16px 0;border-radius:var(--r-s);overflow:hidden}
th,td{border:1px solid var(--bd);padding:12px 14px;font-size:13px;text-align:left}
th{background:var(--card);color:var(--w70);font-weight:600}
td{color:var(--w60)}

.info-box{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px 24px;margin:16px 0}
.info-box p{margin-bottom:4px}
.info-box.highlight{border-color:rgba(0,212,255,.2);background:rgba(0,212,255,.04)}
.info-box.warn{border-color:rgba(255,82,82,.2);background:rgba(255,82,82,.04)}

.policy-links{display:flex;gap:12px;margin:32px 0;flex-wrap:wrap}
.policy-links a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:1px solid var(--bd);border-radius:var(--r-s);font-size:13px;font-weight:500;color:var(--w40);transition:all .2s;text-decoration:none}
.policy-links a:hover{border-color:var(--pri);color:var(--pri);background:rgba(0,212,255,.04);text-decoration:none}

.site-footer{border-top:1px solid var(--bd);margin-top:56px;padding:32px 0;text-align:center}
.footer-biz{font-size:12px;color:var(--w20);line-height:2.2}
.footer-copy{font-size:11px;color:rgba(255,255,255,.2);margin-top:12px}

@media(max-width:640px){
  .wrap{padding:32px 16px 60px}
  h1{font-size:26px}
  h2{font-size:16px}
  .header-nav{display:none}
  .site-header{padding:0 16px}
  table{font-size:12px}

  s1t: "第1条（目的）",s1:'本ポリシーは、(株)モティブイノベーションが運営するWhistle AIサービスの有料サービスの決済、解約、返金に関する事項を規定します。',
  s2t:"第2条（定義）",s2:'<li><strong>「有料サービス」</strong>とは、ユーザーが料金を支払い利用するサブスクリプション型サービスおよび個別課金サービスです。</li><li><strong>「サブスクリプション」</strong>とは、一定期間（1ヶ月/6ヶ月/12ヶ月）単位で料金を支払いサービスを利用することです。</li><li><strong>「定期決済」</strong>とは、Stripeによるカード自動決済です。</li><li><strong>「クーリングオフ」</strong>とは、契約締結後法定期間内に契約を撤回することです。</li>',
  s3t:"第3条（料金プラン）",s3:'サービスは<strong>FREE、STARTER、PROFESSIONAL、ENTERPRISE</strong>の4プランと<strong>単発購入（AI輸出分析レポート）</strong>を提供します。',
  s3table:'<tr><th>期間</th><th>請求サイクル</th><th>方法</th></tr>|<tr><td>1ヶ月</td><td>毎月自動請求</td><td>Stripe</td></tr><tr><td>6ヶ月</td><td>半年一括</td><td>Stripe</td></tr><tr><td>12ヶ月</td><td>年間一括</td><td>Stripe</td></tr>',
  s4t:"第4条（解約・返金）",s4principle:'すべてのサブスクリプション期間（1/6/12ヶ月）に同一に適用されます。',
  s4table:'<tr><th>条件</th><th>返金</th></tr>|<tr><td>決済後7日以内、<strong>未使用</strong></td><td><strong>全額返金</strong></td></tr><tr><td>決済後7日以内、<strong>使用済み</strong></td><td>返金不可 — 請求期間終了までサービス利用後終了</td></tr><tr><td>決済後7日経過</td><td>返金不可 — 請求期間終了までサービス利用後終了</td></tr>',
  s4note:'「使用」とは、AI分析実行、書類生成、バイヤーマッチング、チャット等の主要機能を1回でも利用したことを意味します。単なるログインは使用に該当しません。',
  s5t:"第5条（サブスクリプション解約）",s5:'<li><strong>いつでも</strong>自動更新を解約できます。</li><li>解約後も現在の請求期間終了までサービスをご利用いただけます。</li><li>次の請求サイクルから自動決済が停止します。</li><li>設定 > サブスクリプション管理から解約、または<a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>にご連絡ください。</li>',
  s6t:"第6条（個別課金サービス）",s6:'<li><strong>実行前</strong>：全額返金可能。</li><li><strong>AI分析実行後</strong>：デジタルコンテンツのため返金不可。</li><li><strong>システムエラー</strong>：全額返金または再分析を提供。</li>',
  s7t:"第7条（プラン変更）",s7:'<li><strong>アップグレード</strong>：差額を決済し即時適用。</li><li><strong>ダウングレード</strong>：次の請求サイクルから適用。</li>',
  s8t:"第8条（会社の責任）",s8:'<li>会社の責任でサービスが72時間以上連続で利用不可の場合、<strong>全額返金</strong>。</li><li>サービス終了時、残存期間の日割り返金を提供。</li>',
  s9t:"第9条（バウチャー決済）",s9:'韓国政府輸出バウチャーによる決済の返金は、該当<strong>バウチャー事業規定</strong>に従います。',
  s10t:"第10条（紛争解決）",s10:'<li>紛争は相互協議を優先します。</li><li>協議不成立の場合、<strong>韓国消費者院</strong>（1372）または<strong>電子商取引紛争調整委員会</strong>に調停申請できます。</li><li>訴訟管轄：ソウル中央地方裁判所。</li>',
  s11t:"第11条（施行日）",s11:'本ポリシーは<strong>2026年3月30日</strong>から施行します。',
  contact:'<strong>返金・解約のお問い合わせ</strong>',contactEmail:'メール: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'電話: +82-70-5097-6371（平日 10:00-18:00 KST）',
  navTerms:"利用規約",navPrivacy:"プライバシー",navRefund:"返金ポリシー",linkTerms:"利用規約",linkPrivacy:"プライバシーポリシー",
},
zh: {
  badge:"REFUND POLICY",title:"退款/取消政策",updated:"生效日期：2026年3月1日 | 最后更新：2026年3月30日",
  principle:'<strong>核心原则：</strong>仅在付款后7天内且完全未使用服务的情况下，可获得全额退款。一旦使用过服务，您可继续使用至当前计费周期结束，届时订阅将终止。',
  s1t:"第1条（目的）",s1:'本政策规定Motive Innovation Co., Ltd.运营的Whistle AI服务的付费服务付款、取消和退款相关事项。',
  s2t:"第2条（定义）",s2:'<li><strong>"付费服务"</strong>指用户付费使用的订阅制服务及单次计费服务。</li><li><strong>"订阅"</strong>指按一定周期（1个月/6个月/12个月）付费使用服务。</li><li><strong>"自动扣款"</strong>指通过Stripe进行的信用卡自动扣款。</li><li><strong>"撤回权"</strong>指在法定期限内撤回服务合同。</li>',
  s3t:"第3条（服务套餐）",s3:'服务提供<strong>FREE、STARTER、PROFESSIONAL、ENTERPRISE</strong>四种套餐及<strong>单次购买（AI出口分析报告）</strong>。',
  s3table:'<tr><th>周期</th><th>计费方式</th><th>支付方式</th></tr>|<tr><td>1个月</td><td>每月自动扣款</td><td>Stripe</td></tr><tr><td>6个月</td><td>半年一次性</td><td>Stripe</td></tr><tr><td>12个月</td><td>年度一次性</td><td>Stripe</td></tr>',
  s4t:"第4条（取消与退款）",s4principle:'适用于所有订阅周期（1/6/12个月）。',
  s4table:'<tr><th>条件</th><th>退款</th></tr>|<tr><td>付款后7天内，<strong>未使用</strong></td><td><strong>全额退款</strong></td></tr><tr><td>付款后7天内，<strong>已使用</strong></td><td>不予退款 — 服务持续至计费周期结束</td></tr><tr><td>付款7天后</td><td>不予退款 — 服务持续至计费周期结束</td></tr>',
  s4note:'"使用"指执行过AI分析、文档生成、买家匹配、聊天等核心功能至少一次。仅登录不算作使用。',
  s5t:"第5条（取消订阅）",s5:'<li>您可以<strong>随时</strong>取消自动续订。</li><li>取消后，可继续使用至当前计费周期结束。</li><li>下一个计费周期起停止自动扣款。</li><li>通过设置 > 订阅管理取消，或发送邮件至 <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>。</li>',
  s6t:"第6条（单次计费服务）",s6:'<li><strong>执行前</strong>：可全额退款。</li><li><strong>AI分析执行后</strong>：数字内容，不予退款。</li><li><strong>系统错误</strong>：全额退款或重新分析。</li>',
  s7t:"第7条（套餐变更）",s7:'<li><strong>升级</strong>：支付差价，立即生效。</li><li><strong>降级</strong>：下一计费周期生效。</li>',
  s8t:"第8条（公司责任）",s8:'<li>因公司原因导致服务连续72小时以上不可用，<strong>全额退款</strong>。</li><li>服务终止时，按剩余期间比例退款。</li>',
  s9t:"第9条（代金券支付）",s9:'通过韩国政府出口代金券支付的服务退款，遵循相应<strong>代金券项目规定</strong>。',
  s10t:"第10条（争议解决）",s10:'<li>优先通过协商解决争议。</li><li>协商不成的，可向<strong>韩国消费者院</strong>（1372）申请调解。</li><li>诉讼管辖：首尔中央地方法院。</li>',
  s11t:"第11条（生效日期）",s11:'本政策自<strong>2026年3月30日</strong>起生效。',
  contact:'<strong>退款咨询</strong>',contactEmail:'邮箱: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'电话: +82-70-5097-6371（工作日 10:00-18:00 KST）',
  navTerms:"服务条款",navPrivacy:"隐私政策",navRefund:"退款政策",linkTerms:"服务条款",linkPrivacy:"隐私政策",
},
vi: {
  badge:"REFUND POLICY",title:"Chính sách Hoàn tiền & Hủy",updated:"Có hiệu lực: 01/03/2026 | Cập nhật: 30/03/2026",
  principle:'<strong>Nguyên tắc cốt lõi:</strong> Hoàn tiền đầy đủ chỉ áp dụng khi bạn yêu cầu hủy trong vòng 7 ngày sau khi thanh toán và chưa sử dụng bất kỳ tính năng nào. Sau khi đã sử dụng, bạn có thể tiếp tục sử dụng đến hết kỳ thanh toán, sau đó gói đăng ký sẽ kết thúc.',
  s1t:"Điều 1 (Mục đích)",s1:'Chính sách này quy định về thanh toán, hủy và hoàn tiền cho dịch vụ trả phí của Whistle AI.',
  s2t:"Điều 2 (Định nghĩa)",s2:'<li><strong>"Dịch vụ trả phí"</strong> là dịch vụ đăng ký hoặc thanh toán theo lần.</li><li><strong>"Đăng ký"</strong> là thanh toán định kỳ (1/6/12 tháng).</li><li><strong>"Thanh toán tự động"</strong> là thanh toán thẻ qua Stripe.</li><li><strong>"Quyền rút lui"</strong> là hủy hợp đồng trong thời hạn pháp định.</li>',
  s3t:"Điều 3 (Gói dịch vụ)",s3:'Dịch vụ cung cấp gói <strong>FREE, STARTER, PROFESSIONAL, ENTERPRISE</strong> và <strong>mua lẻ báo cáo AI</strong>.',
  s3table:'<tr><th>Kỳ hạn</th><th>Chu kỳ</th><th>Phương thức</th></tr>|<tr><td>1 tháng</td><td>Hàng tháng</td><td>Stripe</td></tr><tr><td>6 tháng</td><td>6 tháng/lần</td><td>Stripe</td></tr><tr><td>12 tháng</td><td>Hàng năm</td><td>Stripe</td></tr>',
  s4t:"Điều 4 (Hủy & Hoàn tiền)",s4principle:'Áp dụng cho tất cả kỳ hạn (1/6/12 tháng).',
  s4table:'<tr><th>Điều kiện</th><th>Hoàn tiền</th></tr>|<tr><td>Trong 7 ngày, <strong>chưa dùng</strong></td><td><strong>Hoàn tiền 100%</strong></td></tr><tr><td>Trong 7 ngày, <strong>đã dùng</strong></td><td>Không hoàn — dùng đến hết kỳ</td></tr><tr><td>Sau 7 ngày</td><td>Không hoàn — dùng đến hết kỳ</td></tr>',
  s4note:'"Đã dùng" nghĩa là đã sử dụng ít nhất 1 lần các tính năng: phân tích AI, tạo tài liệu, ghép nối người mua, trò chuyện. Chỉ đăng nhập không tính là sử dụng.',
  s5t:"Điều 5 (Hủy đăng ký)",s5:'<li>Bạn có thể hủy gia hạn <strong>bất cứ lúc nào</strong>.</li><li>Sau khi hủy, tiếp tục dùng đến hết kỳ thanh toán.</li><li>Thanh toán tự động dừng từ kỳ tiếp theo.</li><li>Hủy qua Cài đặt > Quản lý đăng ký hoặc email <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>.</li>',
  s6t:"Điều 6 (Dịch vụ mua lẻ)",s6:'<li><strong>Chưa thực hiện</strong>: Hoàn tiền 100%.</li><li><strong>Đã chạy AI</strong>: Không hoàn tiền.</li><li><strong>Lỗi hệ thống</strong>: Hoàn tiền hoặc phân tích lại.</li>',
  s7t:"Điều 7 (Thay đổi gói)",s7:'<li><strong>Nâng cấp</strong>: Thanh toán chênh lệch, áp dụng ngay.</li><li><strong>Hạ cấp</strong>: Áp dụng từ kỳ tiếp theo.</li>',
  s8t:"Điều 8 (Lỗi công ty)",s8:'<li>Dịch vụ gián đoạn 72h+ do lỗi công ty: <strong>hoàn tiền 100%</strong>.</li><li>Ngừng dịch vụ: hoàn tiền theo tỷ lệ thời gian còn lại.</li>',
  s9t:"Điều 9 (Thanh toán voucher)",s9:'Hoàn tiền cho dịch vụ thanh toán qua voucher chính phủ Hàn Quốc tuân theo <strong>quy định chương trình voucher</strong>.',
  s10t:"Điều 10 (Giải quyết tranh chấp)",s10:'<li>Ưu tiên thương lượng.</li><li>Nếu không giải quyết được, có thể nộp đơn tại <strong>Cơ quan Bảo vệ Người tiêu dùng Hàn Quốc</strong> (1372).</li><li>Tòa án: Tòa án Trung tâm Seoul.</li>',
  s11t:"Điều 11 (Ngày hiệu lực)",s11:'Chính sách có hiệu lực từ <strong>30/03/2026</strong>.',
  contact:'<strong>Liên hệ hoàn tiền</strong>',contactEmail:'Email: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'ĐT: +82-70-5097-6371 (T2-T6 10:00-18:00 KST)',
  navTerms:"Điều khoản",navPrivacy:"Quyền riêng tư",navRefund:"Hoàn tiền",linkTerms:"Điều khoản Dịch vụ",linkPrivacy:"Chính sách Quyền riêng tư",
},
th: {
  badge:"REFUND POLICY",title:"นโยบายการคืนเงิน/ยกเลิก",updated:"มีผลบังคับ: 1 มี.ค. 2026 | อัปเดต: 30 มี.ค. 2026",
  principle:'<strong>หลักการสำคัญ:</strong> คืนเงินเต็มจำนวนเฉพาะกรณีขอยกเลิกภายใน 7 วันหลังชำระเงินและยังไม่ได้ใช้บริการ เมื่อใช้บริการแล้ว ท่านสามารถใช้ต่อจนหมดรอบบิล จากนั้นการสมัครจะสิ้นสุดลง',
  s1t:"มาตรา 1 (วัตถุประสงค์)",s1:'นโยบายนี้กำหนดเกี่ยวกับการชำระเงิน การยกเลิก และการคืนเงินสำหรับบริการแบบชำระเงินของ Whistle AI',
  s2t:"มาตรา 2 (คำนิยาม)",s2:'<li><strong>"บริการแบบชำระเงิน"</strong> คือบริการสมัครสมาชิกหรือบริการเรียกเก็บเงินรายครั้ง</li><li><strong>"การสมัครสมาชิก"</strong> คือการชำระเงินตามรอบ (1/6/12 เดือน)</li><li><strong>"การชำระเงินอัตโนมัติ"</strong> คือการตัดบัตรอัตโนมัติผ่าน Stripe</li>',
  s3t:"มาตรา 3 (แผนบริการ)",s3:'บริการมีแผน <strong>FREE, STARTER, PROFESSIONAL, ENTERPRISE</strong> และ<strong>ซื้อครั้งเดียว (รายงาน AI)</strong>',
  s3table:'<tr><th>ระยะเวลา</th><th>รอบบิล</th><th>วิธีการ</th></tr>|<tr><td>1 เดือน</td><td>รายเดือน</td><td>Stripe</td></tr><tr><td>6 เดือน</td><td>ทุก 6 เดือน</td><td>Stripe</td></tr><tr><td>12 เดือน</td><td>รายปี</td><td>Stripe</td></tr>',
  s4t:"มาตรา 4 (การยกเลิกและคืนเงิน)",s4principle:'ใช้กับทุกระยะเวลาสมัคร (1/6/12 เดือน)',
  s4table:'<tr><th>เงื่อนไข</th><th>การคืนเงิน</th></tr>|<tr><td>ภายใน 7 วัน <strong>ไม่ได้ใช้</strong></td><td><strong>คืนเงินเต็มจำนวน</strong></td></tr><tr><td>ภายใน 7 วัน <strong>ใช้แล้ว</strong></td><td>ไม่คืนเงิน — ใช้ได้จนหมดรอบ</td></tr><tr><td>หลัง 7 วัน</td><td>ไม่คืนเงิน — ใช้ได้จนหมดรอบ</td></tr>',
  s4note:'"ใช้แล้ว" หมายถึงใช้ฟีเจอร์หลักอย่างน้อย 1 ครั้ง: วิเคราะห์ AI, สร้างเอกสาร, จับคู่ผู้ซื้อ, แชท แค่ล็อกอินไม่นับเป็นการใช้งาน',
  s5t:"มาตรา 5 (ยกเลิกการสมัคร)",s5:'<li>ยกเลิกการต่ออายุอัตโนมัติได้<strong>ทุกเมื่อ</strong></li><li>ยกเลิกแล้วใช้ได้จนหมดรอบบิลปัจจุบัน</li><li>การตัดบัตรอัตโนมัติหยุดตั้งแต่รอบถัดไป</li><li>ยกเลิกที่ ตั้งค่า > จัดการสมาชิก หรืออีเมล <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a></li>',
  s6t:"มาตรา 6 (บริการซื้อครั้งเดียว)",s6:'<li><strong>ก่อนดำเนินการ</strong>: คืนเงินเต็มจำนวน</li><li><strong>หลังรัน AI</strong>: ไม่คืนเงิน</li><li><strong>ข้อผิดพลาดระบบ</strong>: คืนเงินหรือวิเคราะห์ใหม่</li>',
  s7t:"มาตรา 7 (เปลี่ยนแผน)",s7:'<li><strong>อัปเกรด</strong>: จ่ายส่วนต่าง มีผลทันที</li><li><strong>ดาวน์เกรด</strong>: มีผลรอบถัดไป</li>',
  s8t:"มาตรา 8 (ความผิดของบริษัท)",s8:'<li>บริการขัดข้อง 72 ชม.+ จากความผิดของบริษัท: <strong>คืนเงินเต็มจำนวน</strong></li><li>ยุติบริการ: คืนเงินตามสัดส่วนเวลาที่เหลือ</li>',
  s9t:"มาตรา 9 (การชำระเงินด้วยบัตรกำนัล)",s9:'การคืนเงินสำหรับบริการที่ชำระผ่านบัตรกำนัลรัฐบาลเกาหลี เป็นไปตาม<strong>ข้อกำหนดโปรแกรมบัตรกำนัล</strong>',
  s10t:"มาตรา 10 (การระงับข้อพิพาท)",s10:'<li>เจรจาก่อน</li><li>หากตกลงไม่ได้ ยื่นเรื่องที่ <strong>สำนักงานคุ้มครองผู้บริโภคเกาหลี</strong> (1372)</li><li>ศาลที่มีเขตอำนาจ: ศาลแขวงกลางโซล</li>',
  s11t:"มาตรา 11 (วันที่มีผลบังคับ)",s11:'นโยบายนี้มีผลตั้งแต่ <strong>30 มี.ค. 2026</strong>',

de:{badge:"REFUND POLICY",title:"Rückerstattungs- & Kündigungsrichtlinie",updated:"Gültig ab: 01.03.2026 | Aktualisiert: 30.03.2026",principle:'<strong>Grundprinzip:</strong> Eine vollständige Rückerstattung ist nur möglich, wenn Sie innerhalb von 7 Tagen nach Zahlung kündigen und keine Servicefunktionen genutzt haben. Nach Nutzung können Sie den Service bis zum Ende des Abrechnungszeitraums nutzen, danach endet das Abonnement.',s1t:"§1 (Zweck)",s1:'Diese Richtlinie regelt Zahlung, Kündigung und Rückerstattung für kostenpflichtige Dienste von Whistle AI.',s2t:"§2 (Definitionen)",s2:'<li><strong>"Kostenpflichtiger Dienst"</strong>: Abo- oder Einzelabrechnungsdienste.</li><li><strong>"Abonnement"</strong>: Wiederkehrende Zahlung (1/6/12 Monate).</li><li><strong>"Automatische Zahlung"</strong>: Kartenzahlung über Stripe.</li>',s3t:"§3 (Tarife)",s3:'<strong>FREE, STARTER, PROFESSIONAL, ENTERPRISE</strong> und <strong>Einzelkauf (AI-Exportanalyse)</strong>.',s3table:'<tr><th>Zeitraum</th><th>Zyklus</th><th>Methode</th></tr>|<tr><td>1 Monat</td><td>Monatlich</td><td>Stripe</td></tr><tr><td>6 Monate</td><td>Halbjährlich</td><td>Stripe</td></tr><tr><td>12 Monate</td><td>Jährlich</td><td>Stripe</td></tr>',s4t:"§4 (Kündigung & Rückerstattung)",s4principle:'Gilt einheitlich für alle Laufzeiten (1/6/12 Monate).',s4table:'<tr><th>Bedingung</th><th>Rückerstattung</th></tr>|<tr><td>Innerhalb 7 Tagen, <strong>ungenutzt</strong></td><td><strong>Volle Rückerstattung</strong></td></tr><tr><td>Innerhalb 7 Tagen, <strong>genutzt</strong></td><td>Keine Rückerstattung — Nutzung bis Periodenende</td></tr><tr><td>Nach 7 Tagen</td><td>Keine Rückerstattung — Nutzung bis Periodenende</td></tr>',s4note:'"Genutzt" bedeutet mindestens einmalige Verwendung einer Kernfunktion: AI-Analyse, Dokumentenerstellung, Käufer-Matching, Chat. Alleiniges Einloggen gilt nicht als Nutzung.',s5t:"§5 (Abo-Kündigung)",s5:'<li>Automatische Verlängerung <strong>jederzeit</strong> kündbar.</li><li>Nach Kündigung Nutzung bis Ende des aktuellen Zeitraums.</li><li>Automatische Zahlung stoppt ab nächstem Zyklus.</li><li>Kündigung über Einstellungen > Abo-Verwaltung oder <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>.</li>',s6t:"§6 (Einzelkauf-Dienste)",s6:'<li><strong>Vor Ausführung</strong>: Volle Rückerstattung.</li><li><strong>Nach AI-Analyse</strong>: Keine Rückerstattung.</li><li><strong>Systemfehler</strong>: Volle Rückerstattung oder Neuanalyse.</li>',s7t:"§7 (Tarifwechsel)",s7:'<li><strong>Upgrade</strong>: Differenz zahlen, sofort wirksam.</li><li><strong>Downgrade</strong>: Ab nächstem Zyklus wirksam.</li>',s8t:"§8 (Verschulden des Unternehmens)",s8:'<li>Bei Ausfall 72h+ durch Unternehmensverschulden: <strong>Volle Rückerstattung</strong>.</li><li>Bei Diensteinstellung: anteilige Rückerstattung.</li>',s9t:"§9 (Gutschein-Zahlungen)",s9:'Rückerstattungen für über koreanische Regierungsgutscheine bezahlte Dienste richten sich nach den <strong>Gutscheinprogramm-Regelungen</strong>.',s10t:"§10 (Streitbeilegung)",s10:'<li>Vorrangig gütliche Einigung.</li><li>Sonst koreanische Verbraucherschutzbehörde (1372).</li><li>Gerichtsstand: Seoul Central District Court.</li>',s11t:"§11 (Inkrafttreten)",s11:'Diese Richtlinie gilt ab <strong>30.03.2026</strong>.',contact:'<strong>Rückerstattungsanfragen</strong>',contactEmail:'E-Mail: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'Tel: +82-70-5097-6371 (Mo-Fr 10:00-18:00 KST)',navTerms:"AGB",navPrivacy:"Datenschutz",navRefund:"Rückerstattung",linkTerms:"AGB",linkPrivacy:"Datenschutzrichtlinie"},
fr:{badge:"REFUND POLICY",title:"Politique de Remboursement et d'Annulation",updated:"En vigueur: 01/03/2026 | Mise à jour: 30/03/2026",principle:'<strong>Principe fondamental:</strong> Un remboursement intégral est possible uniquement si vous annulez dans les 7 jours suivant le paiement et n\'avez utilisé aucune fonctionnalité. Après utilisation, vous pouvez continuer à utiliser le service jusqu\'à la fin de votre période de facturation.',s1t:"Article 1 (Objet)",s1:'Cette politique régit les paiements, annulations et remboursements des services payants de Whistle AI.',s2t:"Article 2 (Définitions)",s2:'<li><strong>"Service payant"</strong>: abonnement ou service facturé à l\'unité.</li><li><strong>"Abonnement"</strong>: paiement récurrent (1/6/12 mois).</li><li><strong>"Paiement automatique"</strong>: prélèvement carte via Stripe.</li>',s3t:"Article 3 (Forfaits)",s3:'<strong>FREE, STARTER, PROFESSIONAL, ENTERPRISE</strong> et <strong>achat unitaire (rapport AI)</strong>.',s3table:'<tr><th>Durée</th><th>Cycle</th><th>Méthode</th></tr>|<tr><td>1 mois</td><td>Mensuel</td><td>Stripe</td></tr><tr><td>6 mois</td><td>Semestriel</td><td>Stripe</td></tr><tr><td>12 mois</td><td>Annuel</td><td>Stripe</td></tr>',s4t:"Article 4 (Annulation et Remboursement)",s4principle:'S\'applique uniformément à toutes les durées (1/6/12 mois).',s4table:'<tr><th>Condition</th><th>Remboursement</th></tr>|<tr><td>Dans les 7 jours, <strong>non utilisé</strong></td><td><strong>Remboursement intégral</strong></td></tr><tr><td>Dans les 7 jours, <strong>utilisé</strong></td><td>Pas de remboursement — service jusqu\'à fin de période</td></tr><tr><td>Après 7 jours</td><td>Pas de remboursement — service jusqu\'à fin de période</td></tr>',s4note:'"Utilisé" signifie avoir exécuté au moins une fois une fonctionnalité principale: analyse AI, génération de documents, mise en relation acheteurs, chat. La simple connexion ne compte pas.',s5t:"Article 5 (Résiliation)",s5:'<li>Résiliation du renouvellement automatique <strong>à tout moment</strong>.</li><li>Accès maintenu jusqu\'à fin de période.</li><li>Prélèvement automatique arrêté au cycle suivant.</li><li>Via Paramètres > Gestion abonnement ou <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>.</li>',s6t:"Article 6 (Achats unitaires)",s6:'<li><strong>Avant exécution</strong>: remboursement intégral.</li><li><strong>Après analyse AI</strong>: non remboursable.</li><li><strong>Erreur système</strong>: remboursement ou nouvelle analyse.</li>',s7t:"Article 7 (Changement de forfait)",s7:'<li><strong>Upgrade</strong>: payer la différence, effet immédiat.</li><li><strong>Downgrade</strong>: effet au prochain cycle.</li>',s8t:"Article 8 (Faute de l\'entreprise)",s8:'<li>Indisponibilité 72h+ par faute de l\'entreprise: <strong>remboursement intégral</strong>.</li><li>Arrêt du service: remboursement au prorata.</li>',s9t:"Article 9 (Paiements par bon gouvernemental)",s9:'Les remboursements via bons gouvernementaux coréens suivent les <strong>règlements du programme de bons</strong>.',s10t:"Article 10 (Résolution des litiges)",s10:'<li>Négociation amiable prioritaire.</li><li>À défaut, <strong>Agence coréenne de protection des consommateurs</strong> (1372).</li><li>Tribunal compétent: Tribunal central de Séoul.</li>',s11t:"Article 11 (Date d\'effet)",s11:'Cette politique est en vigueur depuis le <strong>30/03/2026</strong>.',contact:'<strong>Demandes de remboursement</strong>',contactEmail:'Email: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'Tél: +82-70-5097-6371 (Lun-Ven 10h-18h KST)',navTerms:"CGU",navPrivacy:"Confidentialité",navRefund:"Remboursement",linkTerms:"Conditions d\'utilisation",linkPrivacy:"Politique de confidentialité"},
es:{badge:"REFUND POLICY",title:"Política de Reembolso y Cancelación",updated:"Vigente: 01/03/2026 | Actualizado: 30/03/2026",principle:'<strong>Principio fundamental:</strong> El reembolso completo solo aplica si cancela dentro de los 7 días posteriores al pago y no ha utilizado ninguna función. Una vez utilizado el servicio, puede seguir usándolo hasta el final del período de facturación.',s1t:"Artículo 1 (Propósito)",s1:'Esta política regula los pagos, cancelaciones y reembolsos de los servicios pagos de Whistle AI.',s2t:"Artículo 2 (Definiciones)",s2:'<li><strong>"Servicio pago"</strong>: suscripción o servicio de cobro individual.</li><li><strong>"Suscripción"</strong>: pago recurrente (1/6/12 meses).</li><li><strong>"Pago automático"</strong>: cargo automático vía Stripe.</li>',s3t:"Artículo 3 (Planes)",s3:'<strong>FREE, STARTER, PROFESSIONAL, ENTERPRISE</strong> y <strong>compra individual (informe AI)</strong>.',s3table:'<tr><th>Período</th><th>Ciclo</th><th>Método</th></tr>|<tr><td>1 mes</td><td>Mensual</td><td>Stripe</td></tr><tr><td>6 meses</td><td>Semestral</td><td>Stripe</td></tr><tr><td>12 meses</td><td>Anual</td><td>Stripe</td></tr>',s4t:"Artículo 4 (Cancelación y Reembolso)",s4principle:'Se aplica igualmente a todos los períodos (1/6/12 meses).',s4table:'<tr><th>Condición</th><th>Reembolso</th></tr>|<tr><td>Dentro de 7 días, <strong>sin uso</strong></td><td><strong>Reembolso total</strong></td></tr><tr><td>Dentro de 7 días, <strong>con uso</strong></td><td>Sin reembolso — servicio hasta fin del período</td></tr><tr><td>Después de 7 días</td><td>Sin reembolso — servicio hasta fin del período</td></tr>',s4note:'"Uso" significa haber ejecutado al menos una vez una función principal: análisis AI, generación de documentos, matching de compradores, chat. Solo iniciar sesión no cuenta como uso.',s5t:"Artículo 5 (Cancelación de suscripción)",s5:'<li>Cancele la renovación automática <strong>en cualquier momento</strong>.</li><li>Acceso hasta fin del período actual.</li><li>Cobro automático se detiene en el siguiente ciclo.</li><li>Cancele en Configuración > Gestión de suscripción o <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>.</li>',s6t:"Artículo 6 (Compras individuales)",s6:'<li><strong>Antes de ejecutar</strong>: reembolso total.</li><li><strong>Después del análisis AI</strong>: sin reembolso.</li><li><strong>Error del sistema</strong>: reembolso o reanálisis.</li>',s7t:"Artículo 7 (Cambio de plan)",s7:'<li><strong>Upgrade</strong>: pagar diferencia, efecto inmediato.</li><li><strong>Downgrade</strong>: efecto en siguiente ciclo.</li>',s8t:"Artículo 8 (Responsabilidad de la empresa)",s8:'<li>Indisponibilidad 72h+ por culpa de la empresa: <strong>reembolso total</strong>.</li><li>Fin del servicio: reembolso proporcional.</li>',s9t:"Artículo 9 (Pagos con voucher)",s9:'Reembolsos por servicios pagados con vouchers gubernamentales coreanos siguen las <strong>regulaciones del programa</strong>.',s10t:"Artículo 10 (Resolución de disputas)",s10:'<li>Negociación amistosa prioritaria.</li><li>Si no se resuelve, <strong>Agencia Coreana de Consumidores</strong> (1372).</li><li>Jurisdicción: Tribunal Central de Seúl.</li>',s11t:"Artículo 11 (Fecha de vigencia)",s11:'Esta política entra en vigor el <strong>30/03/2026</strong>.',contact:'<strong>Consultas de reembolso</strong>',contactEmail:'Email: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'Tel: +82-70-5097-6371 (Lun-Vie 10:00-18:00 KST)',navTerms:"Términos",navPrivacy:"Privacidad",navRefund:"Reembolso",linkTerms:"Términos de Servicio",linkPrivacy:"Política de Privacidad"},
pt:{badge:"REFUND POLICY",title:"Política de Reembolso e Cancelamento",updated:"Vigente: 01/03/2026 | Atualizado: 30/03/2026",principle:'<strong>Princípio fundamental:</strong> Reembolso integral apenas se cancelar dentro de 7 dias após o pagamento e não tiver utilizado nenhuma funcionalidade. Após o uso, pode continuar usando até o final do período de faturamento.',s1t:"Artigo 1 (Objetivo)",s1:'Esta política rege pagamentos, cancelamentos e reembolsos dos serviços pagos do Whistle AI.',s2t:"Artigo 2 (Definições)",s2:'<li><strong>"Serviço pago"</strong>: assinatura ou serviço cobrado individualmente.</li><li><strong>"Assinatura"</strong>: pagamento recorrente (1/6/12 meses).</li><li><strong>"Pagamento automático"</strong>: cobrança via Stripe.</li>',s3t:"Artigo 3 (Planos)",s3:'<strong>FREE, STARTER, PROFESSIONAL, ENTERPRISE</strong> e <strong>compra avulsa (relatório AI)</strong>.',s3table:'<tr><th>Período</th><th>Ciclo</th><th>Método</th></tr>|<tr><td>1 mês</td><td>Mensal</td><td>Stripe</td></tr><tr><td>6 meses</td><td>Semestral</td><td>Stripe</td></tr><tr><td>12 meses</td><td>Anual</td><td>Stripe</td></tr>',s4t:"Artigo 4 (Cancelamento e Reembolso)",s4principle:'Aplica-se igualmente a todos os períodos (1/6/12 meses).',s4table:'<tr><th>Condição</th><th>Reembolso</th></tr>|<tr><td>Dentro de 7 dias, <strong>sem uso</strong></td><td><strong>Reembolso integral</strong></td></tr><tr><td>Dentro de 7 dias, <strong>com uso</strong></td><td>Sem reembolso — serviço até fim do período</td></tr><tr><td>Após 7 dias</td><td>Sem reembolso — serviço até fim do período</td></tr>',s4note:'"Uso" significa ter executado pelo menos uma vez uma funcionalidade principal. Apenas fazer login não conta.',s5t:"Artigo 5 (Cancelar assinatura)",s5:'<li>Cancele a renovação automática <strong>a qualquer momento</strong>.</li><li>Acesso até o fim do período atual.</li><li>Cobrança automática para no próximo ciclo.</li><li>Cancele em Configurações > Gerenciar assinatura ou <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>.</li>',s6t:"Artigo 6 (Compras avulsas)",s6:'<li><strong>Antes da execução</strong>: reembolso integral.</li><li><strong>Após análise AI</strong>: sem reembolso.</li><li><strong>Erro do sistema</strong>: reembolso ou reanálise.</li>',s7t:"Artigo 7 (Mudança de plano)",s7:'<li><strong>Upgrade</strong>: pagar diferença, efeito imediato.</li><li><strong>Downgrade</strong>: efeito no próximo ciclo.</li>',s8t:"Artigo 8 (Culpa da empresa)",s8:'<li>Indisponibilidade 72h+ por culpa da empresa: <strong>reembolso integral</strong>.</li><li>Encerramento: reembolso proporcional.</li>',s9t:"Artigo 9 (Pagamento com voucher)",s9:'Reembolsos de serviços pagos com vouchers governamentais seguem as <strong>regulamentações do programa</strong>.',s10t:"Artigo 10 (Resolução de disputas)",s10:'<li>Negociação amigável prioritária.</li><li>Se não resolvido, <strong>Agência Coreana de Consumidores</strong> (1372).</li><li>Foro: Tribunal Central de Seul.</li>',s11t:"Artigo 11 (Data de vigência)",s11:'Esta política vigora desde <strong>30/03/2026</strong>.',contact:'<strong>Consultas de reembolso</strong>',contactEmail:'Email: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'Tel: +82-70-5097-6371 (Seg-Sex 10:00-18:00 KST)',navTerms:"Termos",navPrivacy:"Privacidade",navRefund:"Reembolso",linkTerms:"Termos de Serviço",linkPrivacy:"Política de Privacidade"},
id:{badge:"REFUND POLICY",title:"Kebijakan Pengembalian Dana & Pembatalan",updated:"Berlaku: 01/03/2026 | Diperbarui: 30/03/2026",principle:'<strong>Prinsip utama:</strong> Pengembalian dana penuh hanya berlaku jika Anda membatalkan dalam 7 hari setelah pembayaran dan belum menggunakan fitur apa pun. Setelah menggunakan layanan, Anda dapat terus menggunakannya hingga akhir periode penagihan.',s1t:"Pasal 1 (Tujuan)",s1:'Kebijakan ini mengatur pembayaran, pembatalan, dan pengembalian dana untuk layanan berbayar Whistle AI.',s2t:"Pasal 2 (Definisi)",s2:'<li><strong>"Layanan berbayar"</strong>: langganan atau layanan tagihan per unit.</li><li><strong>"Langganan"</strong>: pembayaran berkala (1/6/12 bulan).</li><li><strong>"Pembayaran otomatis"</strong>: tagihan kartu via Stripe.</li>',s3t:"Pasal 3 (Paket layanan)",s3:'<strong>FREE, STARTER, PROFESSIONAL, ENTERPRISE</strong> dan <strong>pembelian satuan (laporan AI)</strong>.',s3table:'<tr><th>Periode</th><th>Siklus</th><th>Metode</th></tr>|<tr><td>1 bulan</td><td>Bulanan</td><td>Stripe</td></tr><tr><td>6 bulan</td><td>6 bulanan</td><td>Stripe</td></tr><tr><td>12 bulan</td><td>Tahunan</td><td>Stripe</td></tr>',s4t:"Pasal 4 (Pembatalan & Pengembalian Dana)",s4principle:'Berlaku sama untuk semua periode (1/6/12 bulan).',s4table:'<tr><th>Kondisi</th><th>Pengembalian</th></tr>|<tr><td>Dalam 7 hari, <strong>belum digunakan</strong></td><td><strong>Pengembalian penuh</strong></td></tr><tr><td>Dalam 7 hari, <strong>sudah digunakan</strong></td><td>Tidak ada pengembalian — layanan sampai akhir periode</td></tr><tr><td>Setelah 7 hari</td><td>Tidak ada pengembalian — layanan sampai akhir periode</td></tr>',s4note:'"Digunakan" berarti telah menjalankan fitur utama minimal 1 kali. Hanya login tidak dihitung sebagai penggunaan.',s5t:"Pasal 5 (Batal langganan)",s5:'<li>Batalkan perpanjangan otomatis <strong>kapan saja</strong>.</li><li>Akses berlanjut sampai akhir periode.</li><li>Tagihan otomatis berhenti dari siklus berikutnya.</li><li>Batalkan di Pengaturan > Kelola Langganan atau <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>.</li>',s6t:"Pasal 6 (Pembelian satuan)",s6:'<li><strong>Sebelum eksekusi</strong>: pengembalian penuh.</li><li><strong>Setelah analisis AI</strong>: tidak dapat dikembalikan.</li><li><strong>Error sistem</strong>: pengembalian atau analisis ulang.</li>',s7t:"Pasal 7 (Ganti paket)",s7:'<li><strong>Upgrade</strong>: bayar selisih, berlaku langsung.</li><li><strong>Downgrade</strong>: berlaku siklus berikutnya.</li>',s8t:"Pasal 8 (Kesalahan perusahaan)",s8:'<li>Gangguan 72 jam+ karena kesalahan perusahaan: <strong>pengembalian penuh</strong>.</li><li>Penghentian layanan: pengembalian proporsional.</li>',s9t:"Pasal 9 (Pembayaran voucher)",s9:'Pengembalian untuk layanan yang dibayar melalui voucher pemerintah Korea mengikuti <strong>peraturan program voucher</strong>.',s10t:"Pasal 10 (Penyelesaian sengketa)",s10:'<li>Negosiasi damai diprioritaskan.</li><li>Jika tidak terselesaikan, <strong>Badan Perlindungan Konsumen Korea</strong> (1372).</li><li>Yurisdiksi: Pengadilan Distrik Pusat Seoul.</li>',s11t:"Pasal 11 (Tanggal berlaku)",s11:'Kebijakan ini berlaku sejak <strong>30/03/2026</strong>.',contact:'<strong>Pertanyaan pengembalian</strong>',contactEmail:'Email: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'Tel: +82-70-5097-6371 (Sen-Jum 10:00-18:00 KST)',navTerms:"Ketentuan",navPrivacy:"Privasi",navRefund:"Pengembalian",linkTerms:"Ketentuan Layanan",linkPrivacy:"Kebijakan Privasi"},
tr:{badge:"REFUND POLICY",title:"İade ve İptal Politikası",updated:"Yürürlük: 01.03.2026 | Güncelleme: 30.03.2026",principle:'<strong>Temel ilke:</strong> Tam iade yalnızca ödeme sonrası 7 gün içinde iptal edilmesi ve hiçbir özelliğin kullanılmamış olması durumunda geçerlidir. Kullanım sonrası, fatura dönemi sonuna kadar hizmeti kullanabilirsiniz.',s1t:"Madde 1 (Amaç)",s1:'Bu politika Whistle AI ücretli hizmetlerinin ödeme, iptal ve iade prosedürlerini düzenler.',s2t:"Madde 2 (Tanımlar)",s2:'<li><strong>"Ücretli hizmet"</strong>: abonelik veya bireysel faturalandırma.</li><li><strong>"Abonelik"</strong>: yinelenen ödeme (1/6/12 ay).</li><li><strong>"Otomatik ödeme"</strong>: Stripe ile kart ödemesi.</li>',s3t:"Madde 3 (Planlar)",s3:'<strong>FREE, STARTER, PROFESSIONAL, ENTERPRISE</strong> ve <strong>tekil satın alma (AI raporu)</strong>.',s3table:'<tr><th>Süre</th><th>Döngü</th><th>Yöntem</th></tr>|<tr><td>1 ay</td><td>Aylık</td><td>Stripe</td></tr><tr><td>6 ay</td><td>6 aylık</td><td>Stripe</td></tr><tr><td>12 ay</td><td>Yıllık</td><td>Stripe</td></tr>',s4t:"Madde 4 (İptal ve İade)",s4principle:'Tüm abonelik süreleri için (1/6/12 ay) aynı şekilde uygulanır.',s4table:'<tr><th>Koşul</th><th>İade</th></tr>|<tr><td>7 gün içinde, <strong>kullanılmamış</strong></td><td><strong>Tam iade</strong></td></tr><tr><td>7 gün içinde, <strong>kullanılmış</strong></td><td>İade yok — dönem sonuna kadar kullanım</td></tr><tr><td>7 gün sonra</td><td>İade yok — dönem sonuna kadar kullanım</td></tr>',s4note:'"Kullanılmış", herhangi bir temel özelliğin en az 1 kez çalıştırılmış olması anlamına gelir. Sadece giriş yapmak kullanım sayılmaz.',s5t:"Madde 5 (Abonelik İptali)",s5:'<li>Otomatik yenilemeyi <strong>istediğiniz zaman</strong> iptal edebilirsiniz.</li><li>İptal sonrası dönem sonuna kadar erişim devam eder.</li><li>Otomatik ödeme bir sonraki döngüde durur.</li><li>Ayarlar > Abonelik Yönetimi veya <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a> ile iptal edin.</li>',s6t:"Madde 6 (Tekil Satın Alma)",s6:'<li><strong>Çalıştırmadan önce</strong>: tam iade.</li><li><strong>AI analizi sonrası</strong>: iade yok.</li><li><strong>Sistem hatası</strong>: tam iade veya yeniden analiz.</li>',s7t:"Madde 7 (Plan Değişikliği)",s7:'<li><strong>Yükseltme</strong>: farkı ödeme, hemen geçerli.</li><li><strong>Düşürme</strong>: sonraki döngüde geçerli.</li>',s8t:"Madde 8 (Şirket Kusuru)",s8:'<li>Şirket kusuru ile 72 saat+ kesinti: <strong>tam iade</strong>.</li><li>Hizmet sonlandırma: orantılı iade.</li>',s9t:"Madde 9 (Kupon Ödemeleri)",s9:'Kore hükümeti ihracat kuponlarıyla yapılan ödemelerin iadesi <strong>kupon programı düzenlemelerine</strong> tabidir.',s10t:"Madde 10 (Uyuşmazlık Çözümü)",s10:'<li>Öncelikli dostane çözüm.</li><li>Çözümsüz kalırsa <strong>Kore Tüketici Ajansı</strong> (1372).</li><li>Yargı yetkisi: Seul Merkez Bölge Mahkemesi.</li>',s11t:"Madde 11 (Yürürlük Tarihi)",s11:'Bu politika <strong>30.03.2026</strong> tarihinden itibaren geçerlidir.',contact:'<strong>İade Sorguları</strong>',contactEmail:'E-posta: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'Tel: +82-70-5097-6371 (Pzt-Cum 10:00-18:00 KST)',navTerms:"Şartlar",navPrivacy:"Gizlilik",navRefund:"İade",linkTerms:"Kullanım Şartları",linkPrivacy:"Gizlilik Politikası"},
ar:{badge:"REFUND POLICY",title:"سياسة الاسترداد والإلغاء",updated:"سارية من: 01/03/2026 | آخر تحديث: 30/03/2026",principle:'<strong>المبدأ الأساسي:</strong> يتم الاسترداد الكامل فقط إذا قمت بالإلغاء خلال 7 أيام من الدفع ولم تستخدم أي ميزة. بعد الاستخدام، يمكنك الاستمرار حتى نهاية فترة الفوترة.',s1t:"المادة 1 (الغرض)",s1:'تنظم هذه السياسة إجراءات الدفع والإلغاء والاسترداد للخدمات المدفوعة في Whistle AI.',s2t:"المادة 2 (التعريفات)",s2:'<li><strong>"الخدمة المدفوعة"</strong>: اشتراك أو خدمة مفوترة فردياً.</li><li><strong>"الاشتراك"</strong>: دفع متكرر (1/6/12 شهر).</li><li><strong>"الدفع التلقائي"</strong>: خصم البطاقة عبر Stripe.</li>',s3t:"المادة 3 (الخطط)",s3:'<strong>FREE، STARTER، PROFESSIONAL، ENTERPRISE</strong> و<strong>شراء فردي (تقرير AI)</strong>.',s3table:'<tr><th>المدة</th><th>الدورة</th><th>الطريقة</th></tr>|<tr><td>شهر</td><td>شهري</td><td>Stripe</td></tr><tr><td>6 أشهر</td><td>نصف سنوي</td><td>Stripe</td></tr><tr><td>12 شهر</td><td>سنوي</td><td>Stripe</td></tr>',s4t:"المادة 4 (الإلغاء والاسترداد)",s4principle:'تنطبق بالتساوي على جميع الفترات (1/6/12 شهر).',s4table:'<tr><th>الشرط</th><th>الاسترداد</th></tr>|<tr><td>خلال 7 أيام، <strong>غير مستخدم</strong></td><td><strong>استرداد كامل</strong></td></tr><tr><td>خلال 7 أيام، <strong>مستخدم</strong></td><td>لا استرداد — الخدمة حتى نهاية الفترة</td></tr><tr><td>بعد 7 أيام</td><td>لا استرداد — الخدمة حتى نهاية الفترة</td></tr>',s4note:'"مستخدم" يعني تشغيل ميزة أساسية واحدة على الأقل. تسجيل الدخول فقط لا يُعد استخداماً.',s5t:"المادة 5 (إلغاء الاشتراك)",s5:'<li>إلغاء التجديد التلقائي <strong>في أي وقت</strong>.</li><li>الوصول مستمر حتى نهاية الفترة.</li><li>الخصم التلقائي يتوقف من الدورة التالية.</li><li>الإلغاء عبر الإعدادات > إدارة الاشتراك أو <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>.</li>',s6t:"المادة 6 (الشراء الفردي)",s6:'<li><strong>قبل التنفيذ</strong>: استرداد كامل.</li><li><strong>بعد تحليل AI</strong>: لا استرداد.</li><li><strong>خطأ النظام</strong>: استرداد أو إعادة تحليل.</li>',s7t:"المادة 7 (تغيير الخطة)",s7:'<li><strong>ترقية</strong>: دفع الفرق، سارية فوراً.</li><li><strong>تخفيض</strong>: سارية من الدورة التالية.</li>',s8t:"المادة 8 (خطأ الشركة)",s8:'<li>انقطاع 72+ ساعة بسبب الشركة: <strong>استرداد كامل</strong>.</li><li>إنهاء الخدمة: استرداد نسبي.</li>',s9t:"المادة 9 (الدفع بالقسائم)",s9:'تخضع عمليات الاسترداد للخدمات المدفوعة بقسائم حكومية كورية <strong>للوائح البرنامج</strong>.',s10t:"المادة 10 (حل النزاعات)",s10:'<li>التفاوض الودي أولاً.</li><li>إذا لم يُحل، <strong>وكالة حماية المستهلك الكورية</strong> (1372).</li><li>الاختصاص: محكمة سيول المركزية.</li>',s11t:"المادة 11 (تاريخ السريان)",s11:'هذه السياسة سارية من <strong>30/03/2026</strong>.',contact:'<strong>استفسارات الاسترداد</strong>',contactEmail:'البريد: <a href="mailto:creative@mo-tive.com">creative@mo-tive.com</a>',contactTel:'هاتف: +82-70-5097-6371 (إثنين-جمعة 10:00-18:00 KST)',navTerms:"الشروط",navPrivacy:"الخصوصية",navRefund:"الاسترداد",linkTerms:"شروط الخدمة",linkPrivacy:"سياسة الخصوصية"}
};

/* ── Auto-detect language from browser/Cloudflare ── */
function detectLang() {
  /* 1. URL param ?lang=xx */
  var p = new URLSearchParams(location.search).get("lang");
  if (p && T[p]) return p;
  /* 2. localStorage (user chose before) */
  var s = localStorage.getItem("whistle_lang");
  if (s && T[s]) return s;
  /* 3. navigator.language */
  var nav = (navigator.language || "en").substring(0, 2).toLowerCase();
  if (T[nav]) return nav;
  /* 4. fallback */
  return "en";
}

function setLang(lang) {
  if (!T[lang]) lang = "en";
  localStorage.setItem("whistle_lang", lang);
  document.getElementById("langSel").value = lang;
  document.documentElement.lang = lang === "ar" ? "ar" : lang;
  if (lang === "ar") document.documentElement.dir = "rtl";
  else document.documentElement.dir = "ltr";
  render(lang);
}

function render(lang) {
  var t = T[lang] || T.en;
  /* Nav */
  document.querySelectorAll("[data-i18n-nav]").forEach(function(el) {
    var k = el.getAttribute("data-i18n-nav");
    if (k === "terms") el.textContent = t.navTerms;
    if (k === "privacy") el.textContent = t.navPrivacy;
    if (k === "refund") el.textContent = t.navRefund;
  });
  /* Build table helper */
  function tbl(raw) {
    var parts = raw.split("|");
    return '<table><thead>' + parts[0] + '</thead><tbody>' + parts[1] + '</tbody></table>';
  }
  var h = '';
  h += '<div class="page-badge">' + t.badge + '</div>';
  h += '<h1>' + t.title + '</h1>';
  h += '<p class="updated">' + t.updated + '</p>';
  h += '<div class="info-box highlight"><p>' + t.principle + '</p></div>';
  h += '<h2>' + t.s1t + '</h2><p>' + t.s1 + '</p>';
  h += '<h2>' + t.s2t + '</h2><ol>' + t.s2 + '</ol>';
  h += '<h2>' + t.s3t + '</h2><p>' + t.s3 + '</p>' + tbl(t.s3table);
  h += '<h2>' + t.s4t + '</h2>';
  h += '<div class="info-box highlight"><p><strong>' + t.s4principle + '</strong></p></div>';
  h += tbl(t.s4table);
  h += '<p style="font-size:13px;color:var(--w40);margin-top:8px">' + t.s4note + '</p>';
  h += '<h2>' + t.s5t + '</h2><ol>' + t.s5 + '</ol>';
  h += '<h2>' + t.s6t + '</h2><ol>' + t.s6 + '</ol>';
  h += '<h2>' + t.s7t + '</h2><ol>' + t.s7 + '</ol>';
  h += '<h2>' + t.s8t + '</h2><ol>' + t.s8 + '</ol>';
  h += '<h2>' + t.s9t + '</h2><p>' + t.s9 + '</p>';
  h += '<h2>' + t.s10t + '</h2><ol>' + t.s10 + '</ol>';
  h += '<h2>' + t.s11t + '</h2><p>' + t.s11 + '</p>';
  h += '<div class="info-box" style="margin-top:40px"><p>' + t.contact + '</p><p>' + t.contactEmail + '</p><p>' + t.contactTel + '</p></div>';
  h += '<div class="policy-links"><a href="/terms">' + t.linkTerms + '</a><a href="/privacy">' + t.linkPrivacy + '</a></div>';
  h += '<footer class="site-footer"><div class="footer-biz">(주)모티브이노베이션 | 대표: 채희웅<br>사업자등록번호: 155-88-02209 | 통신판매업신고: 제 2023-서울강남-04603호<br>서울특별시 강남구 논현로98길 28 3층 307호<br>TEL: 070-5097-6371 | creative@mo-tive.com</div><div class="footer-copy">&copy; 2026 Motive Innovation Co., Ltd. All rights reserved.</div></footer>';
  document.getElementById("content").innerHTML = h;
}

/* ── Init ── */
var lang = detectLang();
document.getElementById("langSel").value = lang;
setLang(lang);
</script>
