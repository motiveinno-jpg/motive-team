}

/* === ENHANCED KPI FUNCTIONS === */
function calcARPU(){var paid=S.users.filter(function(u){return u.plan&&u.plan!=='free';});if(!paid.length)return 0;return calcMRR()/paid.length;}
function calcChurnRate(){var cancelled=S.subscriptions.filter(function(s){return s.status==='cancelled';}).length;var total=S.subscriptions.length;if(!total)return 0;return(cancelled/total*100);}
function calcConversionRate(){var total=S.users.length;if(!total)return 0;var paid=S.users.filter(function(u){return u.plan&&u.plan!=='free';}).length;return(paid/total*100);}
function calcLTV(){var arpu=calcARPU();var churn=calcChurnRate()/100;if(churn<=0)return arpu*12;return arpu/churn;}
function calcActiveRate(){var total=S.users.length;if(!total)return 0;var thirtyDaysAgo=new Date(Date.now()-30*864e5).toISOString();var active=S.users.filter(function(u){return u.last_sign_in_at&&u.last_sign_in_at>thirtyDaysAgo;}).length;return(active/total*100);}
function calcUsageSummary(){var summary={};if(!S.usageEvents)return summary;S.usageEvents.forEach(function(e){if(!summary[e.feature])summary[e.feature]={count:0,revenue:0};summary[e.feature].count+=e.quantity||1;summary[e.feature].revenue+=(e.unit_price||0)*(e.quantity||1);});return summary;}

  var mrr=calcMRR();var arr=mrr*12;var hold=calcEscrowHold();var comm=calcEscrowComm();var flt=calcFloat();
  var activeEsc=S.escrowTxns.filter(function(e){return['funded','in_production','shipped','inspection'].indexOf(e.escrow_status)>=0;});
  var releasePending=S.escrowTxns.filter(function(e){return e.escrow_status==='inspection';}).length;
  var paidOrders=S.orders.filter(function(o){return o.payment_status==='paid'||o.status==='completed';});
  var totalGMV=sumBy(paidOrders,'total_amount');
  var activeSubs=S.subscriptions.filter(function(s){return s.status==='active';}).length||S.users.filter(function(u){return PLAN_PRICE[u.plan];}).length;
  var singleAnalysisRev=(S.billingEvents||[]).filter(function(e){return e.event_type==='ai_analysis'&&e.status==='completed';}).reduce(function(s,e){return s+(Number(e.amount)||0);},0);
  var subRev=mrr;
  var platformFeeRev=comm;
  var totalRev=subRev+platformFeeRev+singleAnalysisRev+flt;
  var pendingPayments=S.orders.filter(function(o){return o.payment_status==='pending';}).length;
  var completedPayments=paidOrders.length;
  var refundedOrders=S.orders.filter(function(o){return o.payment_status==='refunded'||o.status==='cancelled';}).length;

  /* Monthly revenue trend (last 6 months) */
  var monthlyRev=[];
  var now=new Date();
  for(var mi=5;mi>=0;mi--){
    var md=new Date(now.getFullYear(),now.getMonth()-mi,1);
    var mEnd=new Date(now.getFullYear(),now.getMonth()-mi+1,0);
    var mLabel=(md.getMonth()+1)+(_isKorean?'월':'/'+(md.getFullYear()%100));
    var mOrders=S.orders.filter(function(o){var d=new Date(o.created_at);return d>=md&&d<=mEnd&&(o.payment_status==='paid'||o.status==='completed');});
    var mBilling=(S.billingEvents||[]).filter(function(e){var d=new Date(e.created_at);return d>=md&&d<=mEnd&&e.status==='completed';});
    var mSub=mrr;
    var mComm=mOrders.reduce(function(s,o){return s+(Number(o.total_amount)||0)*0.025;},0);
    var mSingle=mBilling.filter(function(e){return e.event_type==='ai_analysis';}).reduce(function(s,e){return s+(Number(e.amount)||0);},0);
    monthlyRev.push({label:mLabel,sub:mSub,comm:mComm,single:mSingle,total:mSub+mComm+mSingle});
  }
  var maxMonthRev=Math.max.apply(null,monthlyRev.map(function(m){return m.total;}).concat([1]));

  return '<div class="grid-4" style="margin-bottom:20px">'+
    UI.stat(_isKorean?'총 수익 (이번 달)':'Total Revenue (This Month)',U.usd(totalRev),_isKorean?'구독+수수료+분석+이자':'Sub+Fees+Analysis+Interest','var(--ok)')+
    UI.stat(_isKorean?'에스크로 보유금':'Escrow Holdings',U.usd(hold),activeEsc.length+(_isKorean?' 건 진행 중':' active'),'var(--acc)')+
    UI.stat(_isKorean?'MRR':'MRR',U.usd(mrr),(_isKorean?'구독 ':'Subs ')+activeSubs+(_isKorean?'건':''),'var(--pri)')+
    UI.stat(_isKorean?'GMV (총 거래액)':'GMV (Total)',U.usd(totalGMV),paidOrders.length+(_isKorean?'건 완료':' completed'),'var(--purple)')+
  '</div>'+
  /* Alert cards */
  (releasePending>0||pendingPayments>0?'<div class="card" style="border-left:3px solid var(--acc);margin-bottom:16px"><div class="card-b" style="padding:14px 18px"><div style="font-weight:800;font-size:14px;margin-bottom:10px;color:var(--acc)">&#x26A0;&#xFE0F; '+(_isKorean?'조치 필요':'Action Required')+'</div><div style="display:flex;gap:12px;flex-wrap:wrap">'+
    (releasePending>0?'<div style="padding:10px 16px;background:rgba(255,184,0,.1);border-radius:var(--r-s);border:1px solid rgba(255,184,0,.2);cursor:pointer" onclick="Adm.setFinanceDashTab(\'escrow\')"><div style="font-size:22px;font-weight:800;color:var(--acc)">'+releasePending+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'릴리즈 대기':'Release Pending')+'</div></div>':'')+
    (pendingPayments>0?'<div style="padding:10px 16px;background:rgba(0,212,255,.1);border-radius:var(--r-s);border:1px solid rgba(0,212,255,.2);cursor:pointer" onclick="Adm.setFinanceDashTab(\'payments\')"><div style="font-size:22px;font-weight:800;color:var(--pri)">'+pendingPayments+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'결제 대기':'Payment Pending')+'</div></div>':'')+
  '</div></div></div>':'')+
  /* Revenue breakdown */
  '<div class="grid-2" style="margin-bottom:16px">'+
    '<div class="card"><div class="card-h">'+(_isKorean?'수익 구조':'Revenue Structure')+'</div><div class="card-b">'+
      hBar(_isKorean?'구독 수익 (MRR)':'Subscription Revenue (MRR)',U.usd(subRev),Math.max(subRev,platformFeeRev,singleAnalysisRev,flt,1),'var(--pri)')+
      hBar(_isKorean?'플랫폼 수수료 (2.5%)':'Platform Fee (2.5%)',U.usd(platformFeeRev),Math.max(subRev,platformFeeRev,singleAnalysisRev,flt,1),'var(--acc)')+
      hBar(_isKorean?'단건 분석 수익':'Single Analysis Revenue',U.usd(singleAnalysisRev),Math.max(subRev,platformFeeRev,singleAnalysisRev,flt,1),'var(--ok)')+
      hBar(_isKorean?'플로트 수익 (이자)':'Float Revenue (Interest)',U.usd(flt),Math.max(subRev,platformFeeRev,singleAnalysisRev,flt,1),'var(--purple)')+
      '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--w08);display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;font-weight:700;color:var(--w70)">'+(_isKorean?'월 총 수익':'Monthly Total Revenue')+'</span><span style="font-size:20px;font-weight:900;color:var(--admin)">'+U.usd(totalRev)+'</span></div>'+
    '</div></div>'+
    '<div class="card"><div class="card-h">'+(_isKorean?'결제 상태 요약':'Payment Status Summary')+'</div><div class="card-b">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">'+
        '<div style="text-align:center;padding:14px;background:rgba(255,184,0,.06);border-radius:8px"><div style="font-size:24px;font-weight:800;color:var(--acc)">'+pendingPayments+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'대기중':'Pending')+'</div></div>'+
        '<div style="text-align:center;padding:14px;background:rgba(0,230,118,.06);border-radius:8px"><div style="font-size:24px;font-weight:800;color:var(--ok)">'+completedPayments+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'완료':'Completed')+'</div></div>'+
        '<div style="text-align:center;padding:14px;background:rgba(255,82,82,.06);border-radius:8px"><div style="font-size:24px;font-weight:800;color:var(--err)">'+refundedOrders+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'환불/취소':'Refund/Cancel')+'</div></div>'+
      '</div>'+
      '<div style="font-size:11px;font-weight:600;color:var(--w40);margin-bottom:8px">'+(_isKorean?'구독자 플랜별':'By Subscription Plan')+'</div>'+
      (function(){var pd={starter:0,pro:0,alibaba:0,enterprise:0};S.users.forEach(function(u){var k=(u.plan==='basic')?'starter':u.plan;if(PLAN_PRICE[k])pd[k]=(pd[k]||0)+1;});var mx=Math.max.apply(null,Object.values(pd).concat([1]));return['starter','pro','alibaba','enterprise'].map(function(p){var r=U.pl(p);return hBar(r[0],pd[p]||0,mx,r[1]);}).join('');})()+
    '</div></div>'+
  '</div>'+
  /* Monthly trend */
  '<div class="card" style="margin-bottom:16px"><div class="card-h">'+(_isKorean?'월별 수익 추이 (최근 6개월)':'Monthly Revenue Trend (Last 6 Months)')+'</div><div class="card-b">'+
    '<div style="display:flex;gap:8px;align-items:flex-end;height:180px;padding-bottom:24px;position:relative">'+
      monthlyRev.map(function(m){var pct=maxMonthRev?Math.round(m.total/maxMonthRev*100):0;
        return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">'+
          '<div style="font-size:10px;font-weight:700;color:var(--pri);font-family:JetBrains Mono;margin-bottom:4px">'+U.usd(m.total)+'</div>'+
          '<div style="width:100%;max-width:60px;height:'+Math.max(pct,4)+'%;border-radius:6px 6px 0 0;background:var(--pri-g);position:relative;overflow:hidden">'+
            '<div style="position:absolute;bottom:0;width:100%;height:'+(m.total?Math.round(m.sub/m.total*100):0)+'%;background:rgba(0,212,255,.6)"></div>'+
            '<div style="position:absolute;bottom:'+(m.total?Math.round(m.sub/m.total*100):0)+'%;width:100%;height:'+(m.total?Math.round(m.comm/m.total*100):0)+'%;background:rgba(255,184,0,.6)"></div>'+
          '</div>'+
          '<div style="font-size:11px;color:var(--w40);margin-top:6px;font-weight:600">'+m.label+'</div>'+
        '</div>';
      }).join('')+
    '</div>'+
    '<div style="display:flex;gap:16px;justify-content:center;margin-top:8px">'+
      '<span style="font-size:10px;color:var(--w40)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(0,212,255,.6);margin-right:4px"></span>'+(_isKorean?'구독':'Subs')+'</span>'+
      '<span style="font-size:10px;color:var(--w40)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(255,184,0,.6);margin-right:4px"></span>'+(_isKorean?'수수료':'Fees')+'</span>'+
      '<span style="font-size:10px;color:var(--w40)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--pri-g);margin-right:4px"></span>'+(_isKorean?'기타':'Other')+'</span>'+
    '</div>'+
  '</div></div>';
}

/* ── Finance: Escrow ── */
function pgFinEscrow(){
  var hold=calcEscrowHold();
  var activeEsc=S.escrowTxns.filter(function(e){return['funded','in_production','shipped','inspection'].indexOf(e.escrow_status)>=0;});
  var releasePending=S.escrowTxns.filter(function(e){return e.escrow_status==='inspection';});
  var released=S.escrowTxns.filter(function(e){return e.escrow_status==='released';});
  var disputed=S.escrowTxns.filter(function(e){return e.escrow_status==='disputed';});
  var refunded=S.escrowTxns.filter(function(e){return e.escrow_status==='refunded';});
  var totalComm=calcEscrowComm();
  var totalFloat=calcFloat();

  /* Status pipeline */
  var escPipe={};Object.keys(ESC_ST).forEach(function(k){escPipe[k]=0;});
  S.escrowTxns.forEach(function(e){if(escPipe[e.escrow_status]!==undefined)escPipe[e.escrow_status]++;});
  var maxEP=Math.max.apply(null,Object.values(escPipe).concat([1]));

  return '<div class="grid-4" style="margin-bottom:20px">'+
    UI.stat(_isKorean?'현재 보관 중':'Currently Held',U.usd(hold),activeEsc.length+(_isKorean?'건':' txns'),'var(--acc)')+
    UI.stat(_isKorean?'릴리즈 대기':'Release Pending',releasePending.length+(_isKorean?'건':' txns'),U.usd(sumBy(releasePending,'amount')),'var(--warn)')+
    UI.stat(_isKorean?'누적 수수료':'Accumulated Fees',U.usd(totalComm),released.length+(_isKorean?'건 정산':' settled'),'var(--ok)')+
    UI.stat(_isKorean?'플로트 수익':'Float Revenue',U.usd(totalFloat),_isKorean?'자금 보유 이자':'Interest on holdings','var(--purple)')+
  '</div>'+
  '<div class="grid-2" style="margin-bottom:16px">'+
    '<div class="card"><div class="card-h">에스크로 '+(_isKorean?'파이프라인':'Pipeline')+'</div><div class="card-b">'+
      ['pending_deposit','funded','in_production','shipped','inspection','released','refunded','disputed'].map(function(k){return hBar(ESC_ST[k][0],escPipe[k]||0,maxEP,ESC_COL[k]||'var(--w40)');}).join('')+
    '</div></div>'+
    '<div class="card"><div class="card-h">'+(_isKorean?'에스크로 통계':'Escrow Stats')+'</div><div class="card-b">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
        '<div style="padding:14px;background:rgba(0,212,255,.06);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'총 거래 건수':'Total Transactions')+'</div><div style="font-size:22px;font-weight:800;color:var(--pri)">'+S.escrowTxns.length+'</div></div>'+
        '<div style="padding:14px;background:rgba(0,230,118,.06);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'정산 완료':'Settled')+'</div><div style="font-size:22px;font-weight:800;color:var(--ok)">'+released.length+'</div></div>'+
        '<div style="padding:14px;background:rgba(255,82,82,.06);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'분쟁 발생':'Disputed')+'</div><div style="font-size:22px;font-weight:800;color:var(--err)">'+disputed.length+'</div></div>'+
        '<div style="padding:14px;background:rgba(168,85,247,.06);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'환불':'Refund')+'</div><div style="font-size:22px;font-weight:800;color:var(--purple)">'+refunded.length+'</div></div>'+
      '</div>'+
    '</div></div>'+
  '</div>'+
  /* Active escrow transactions table */
  '<div class="card"><div class="card-h"><span>'+(_isKorean?'진행 중인 에스크로 거래':'Active Escrow Transactions')+'</span>'+UI.badge(activeEsc.length+(_isKorean?'건':''),'acc')+'</div><div class="card-b"><div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>'+(_isKorean?'거래일':'Date')+'</th><th>'+(_isKorean?'제조사':'Manufacturer')+'</th><th>'+(_isKorean?'바이어':'Buyer')+'</th><th>'+(_isKorean?'상품':'Product')+'</th><th>'+(_isKorean?'금액':'Amount')+'</th><th>'+(_isKorean?'수수료':'Fee')+'</th><th>'+(_isKorean?'상태':'Status')+'</th>'+
  '</tr></thead><tbody>'+
    (activeEsc.length?activeEsc.slice(0,20).map(function(e){
      return '<tr><td>'+U.fd(e.created_at)+'</td><td>'+getUserName(e.seller_id||e.user_id)+'</td><td>'+(e.buyer_name?U.esc(e.buyer_name):getBuyerName(e.buyer_id))+'</td><td>'+U.tr(e.product_name||'—',20)+'</td><td style="font-family:JetBrains Mono;font-weight:700;color:var(--pri)">'+U.usd(e.amount)+'</td><td style="font-family:JetBrains Mono;color:var(--acc)">'+U.usd(e.commission_amount)+'</td><td>'+escBadge(e.escrow_status)+'</td></tr>';
    }).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--w40);padding:32px">'+(_isKorean?'진행 중인 에스크로 거래가 없습니다':'No active escrow transactions')+'</td></tr>')+
  '</tbody></table></div></div></div>';
}

/* ── Finance: Revenue ── */
function pgFinRevenue(){
  var mrr=calcMRR();var arr=mrr*12;var comm=calcEscrowComm();var flt=calcFloat();
  var singleAnalysisRev=(S.billingEvents||[]).filter(function(e){return e.event_type==='ai_analysis'&&e.status==='completed';}).reduce(function(s,e){return s+(Number(e.amount)||0);},0);
  var docGenRev=(S.billingEvents||[]).filter(function(e){return e.event_type==='document_generation'&&e.status==='completed';}).reduce(function(s,e){return s+(Number(e.amount)||0);},0);

  /* Plan revenue breakdown */
  var planRev={starter:0,pro:0,alibaba:0,enterprise:0};
  if(S.subscriptions.length){S.subscriptions.filter(function(s){return s.status==='active';}).forEach(function(s){var a=Number(s.amount)||0;var mo=s.billing_cycle==='semi_annual'?a/6:s.billing_cycle==='annual'?a/12:a;var k=(s.plan==='basic')?'starter':s.plan;planRev[k]=(planRev[k]||0)+mo;});}
  else{S.users.forEach(function(u){var p=PLAN_PRICE[u.plan];if(p){var k=(u.plan==='basic')?'starter':u.plan;planRev[k]=(planRev[k]||0)+p.m;}});}
  var maxPR=Math.max.apply(null,Object.values(planRev).concat([1]));

  /* Subscription revenue */
  var activeSubs=S.subscriptions.filter(function(s){return s.status==='active';}).length||S.users.filter(function(u){return PLAN_PRICE[u.plan];}).length;

  /* Monthly trend */
  var monthlyData=[];var now=new Date();
  for(var mi=5;mi>=0;mi--){
    var md=new Date(now.getFullYear(),now.getMonth()-mi,1);
    var mEnd=new Date(now.getFullYear(),now.getMonth()-mi+1,0);
    var mLabel=(md.getMonth()+1)+(_isKorean?'월':'/'+(md.getFullYear()%100));
    var mBilling=(S.billingEvents||[]).filter(function(e){var d=new Date(e.created_at);return d>=md&&d<=mEnd&&e.status==='completed';});
    var mSingle=mBilling.filter(function(e){return e.event_type==='ai_analysis';}).reduce(function(s,e){return s+(Number(e.amount)||0);},0);
    var mDoc=mBilling.filter(function(e){return e.event_type==='document_generation';}).reduce(function(s,e){return s+(Number(e.amount)||0);},0);
    monthlyData.push({label:mLabel,sub:mrr,single:mSingle,doc:mDoc,total:mrr+mSingle+mDoc});
  }
  var maxMD=Math.max.apply(null,monthlyData.map(function(m){return m.total;}).concat([1]));

  return '<div class="grid-5" style="margin-bottom:20px">'+
    UI.stat(_isKorean?'총 플랫폼 수수료':'Total Platform Fees',U.usd(comm),_isKorean?'에스크로 2.5%':'Escrow 2.5%','var(--acc)')+
    UI.stat(_isKorean?'구독 수익 (MRR)':'Subscription Revenue (MRR)',U.usd(mrr),activeSubs+(_isKorean?'건 활성':' active'),'var(--pri)')+
    UI.stat(_isKorean?'ARR':'ARR',U.usd(arr),_isKorean?'연 반복 매출':'Annual Recurring Revenue','var(--ok)')+
    UI.stat(_isKorean?'단건 분석 수익':'Single Analysis Revenue',U.usd(singleAnalysisRev),_isKorean?'AI 분석':'AI Analysis','var(--purple)')+
    UI.stat(_isKorean?'서류 생성 수익':'Document Revenue',U.usd(docGenRev),_isKorean?'과금 서류':'Billable Docs','var(--admin)')+
  '</div>'+
  '<div class="grid-2" style="margin-bottom:16px">'+
    '<div class="card"><div class="card-h">'+(_isKorean?'플랜별 MRR 구성':'MRR by Plan')+'</div><div class="card-b">'+
      ['starter','pro','alibaba','enterprise'].map(function(p){var r=U.pl(p);var pr=PLAN_PRICE[p];return hBar(r[0]+' ($'+(pr?pr.m:0)+'/mo)',U.usd(planRev[p]||0),maxPR,r[1]);}).join('')+
      '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--w08);display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600;color:var(--w60)">'+(_isKorean?'MRR 합계':'MRR Total')+'</span><span style="font-size:16px;font-weight:900;color:var(--pri);font-family:JetBrains Mono">'+U.usd(mrr)+'</span></div>'+
    '</div></div>'+
    '<div class="card"><div class="card-h">'+(_isKorean?'수익 스트림':'Revenue Streams')+'</div><div class="card-b">'+
      (function(){var streams=[{l:_isKorean?'구독 수익':'Subscription',v:mrr,c:'var(--pri)'},{l:_isKorean?'에스크로 수수료 (2.5%)':'Escrow Fee (2.5%)',v:comm,c:'var(--acc)'},{l:_isKorean?'단건 AI 분석':'Single AI Analysis',v:singleAnalysisRev,c:'var(--purple)'},{l:_isKorean?'서류 생성':'Doc Generation',v:docGenRev,c:'var(--admin)'},{l:_isKorean?'플로트 수익 (이자)':'Float Revenue (Interest)',v:flt,c:'var(--ok)'}];var mx=Math.max.apply(null,streams.map(function(s){return s.v;}).concat([1]));return streams.map(function(s){return hBar(s.l,U.usd(s.v),mx,s.c);}).join('');})()+
    '</div></div>'+
  '</div>'+
  /* Monthly revenue trend table */
  '<div class="card"><div class="card-h">'+(_isKorean?'월별 수익 추이':'Monthly Revenue Trend')+'</div><div class="card-b"><div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>'+(_isKorean?'월':'Month')+'</th><th>'+(_isKorean?'구독':'Subs')+'</th><th>'+(_isKorean?'단건 분석':'Single Analysis')+'</th><th>'+(_isKorean?'서류 생성':'Doc Gen')+'</th><th>'+(_isKorean?'합계':'Total')+'</th>'+
  '</tr></thead><tbody>'+
    monthlyData.map(function(m){
      return '<tr><td style="font-weight:600">'+m.label+'</td><td style="font-family:JetBrains Mono;color:var(--pri)">'+U.usd(m.sub)+'</td><td style="font-family:JetBrains Mono;color:var(--purple)">'+U.usd(m.single)+'</td><td style="font-family:JetBrains Mono;color:var(--admin)">'+U.usd(m.doc)+'</td><td style="font-family:JetBrains Mono;font-weight:700;color:var(--ok)">'+U.usd(m.total)+'</td></tr>';
    }).join('')+
  '</tbody></table></div></div></div>';
}

/* ── Finance: Payments ── */
function pgFinPayments(){
  var pendingOrders=S.orders.filter(function(o){return o.payment_status==='pending';});
  var completedOrders=S.orders.filter(function(o){return o.payment_status==='paid'||o.status==='completed';});
  var refundedOrders=S.orders.filter(function(o){return o.payment_status==='refunded'||o.status==='cancelled';});
  var partialOrders=S.orders.filter(function(o){return o.payment_status==='partial';});
  var totalPaid=sumBy(completedOrders,'total_amount');
  var totalPending=sumBy(pendingOrders,'total_amount');
  var pendingProofs=S.paymentProofs.filter(function(p){return p.status==='pending';});

  /* Subscriber counts by plan */
  var subsByPlan={starter:0,pro:0,alibaba:0,enterprise:0};
  var subs=S.subscriptions.length?S.subscriptions.filter(function(s){return s.status==='active';}):S.users.filter(function(u){return PLAN_PRICE[u.plan];});
  subs.forEach(function(s){var k=s.plan==='basic'?'starter':(s.plan||'starter');if(subsByPlan[k]!==undefined)subsByPlan[k]++;});
  var totalActiveSubs=Object.values(subsByPlan).reduce(function(s,v){return s+v;},0);

  /* Recent payments (from billing events + orders) */
  var recentPayments=[];
  (S.billingEvents||[]).forEach(function(e){
    recentPayments.push({date:e.created_at,user_id:e.user_id,type:e.event_type,amount:Number(e.amount)||0,status:e.status,source:'billing'});
  });
  S.orders.forEach(function(o){
    recentPayments.push({date:o.created_at,user_id:o.user_id,type:'order',amount:Number(o.total_amount)||0,status:o.payment_status||o.status,source:'order'});
  });
  recentPayments.sort(function(a,b){return new Date(b.date)-new Date(a.date);});

  return '<div class="grid-4" style="margin-bottom:20px">'+
    UI.stat(_isKorean?'결제 완료':'Payments Completed',U.usd(totalPaid),completedOrders.length+(_isKorean?'건':' orders'),'var(--ok)')+
    UI.stat(_isKorean?'결제 대기':'Payments Pending',U.usd(totalPending),pendingOrders.length+(_isKorean?'건':' orders'),'var(--acc)')+
    UI.stat(_isKorean?'환불/취소':'Refunded/Cancelled',refundedOrders.length+(_isKorean?'건':' orders'),'','var(--err)')+
    UI.stat(_isKorean?'증빙 대기':'Proof Pending',pendingProofs.length+(_isKorean?'건':' items'),_isKorean?'결제 증빙 리뷰':'Payment proof review','var(--warn)')+
  '</div>'+
  '<div class="grid-2" style="margin-bottom:16px">'+
    '<div class="card"><div class="card-h">'+(_isKorean?'결제 상태 분류':'Payment Status Breakdown')+'</div><div class="card-b">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
        '<div style="padding:14px;background:rgba(255,184,0,.06);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'대기':'Pending')+'</div><div style="font-size:24px;font-weight:800;color:var(--acc)">'+pendingOrders.length+'</div></div>'+
        '<div style="padding:14px;background:rgba(0,230,118,.06);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'완료':'Completed')+'</div><div style="font-size:24px;font-weight:800;color:var(--ok)">'+completedOrders.length+'</div></div>'+
        '<div style="padding:14px;background:rgba(168,85,247,.06);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'부분결제':'Partial')+'</div><div style="font-size:24px;font-weight:800;color:var(--purple)">'+partialOrders.length+'</div></div>'+
        '<div style="padding:14px;background:rgba(255,82,82,.06);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'환불':'Refund')+'</div><div style="font-size:24px;font-weight:800;color:var(--err)">'+refundedOrders.length+'</div></div>'+
      '</div>'+
    '</div></div>'+
    '<div class="card"><div class="card-h">'+(_isKorean?'구독자 현황 (플랜별)':'Subscribers by Plan')+'</div><div class="card-b">'+
      '<div style="text-align:center;margin-bottom:14px"><div style="font-size:36px;font-weight:900;color:var(--pri)">'+totalActiveSubs+'</div><div style="font-size:12px;color:var(--w40)">'+(_isKorean?'활성 구독자':'Active Subscribers')+'</div></div>'+
      ['starter','pro','alibaba','enterprise'].map(function(p){var r=U.pl(p);var cnt=subsByPlan[p]||0;var pr=PLAN_PRICE[p];return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--w08)"><div style="display:flex;align-items:center;gap:8px">'+UI.badge(r[0],p==='starter'?'pri':p==='pro'?'acc':p==='alibaba'?'admin':'purple')+'<span style="font-size:12px;color:var(--w60)">$'+(pr?pr.m:0)+'/mo</span></div><span style="font-size:14px;font-weight:700;color:var(--w90)">'+cnt+(_isKorean?'명':'')+'</span></div>';}).join('')+
    '</div></div>'+
  '</div>'+
  /* Recent payments table */
  '<div class="card"><div class="card-h"><span>'+(_isKorean?'최근 결제 목록':'Recent Payments')+'</span>'+UI.badge(recentPayments.length+(_isKorean?'건':''),'pri')+'</div><div class="card-b"><div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>'+(_isKorean?'일시':'Date')+'</th><th>'+(_isKorean?'사용자':'User')+'</th><th>'+(_isKorean?'유형':'Type')+'</th><th>'+(_isKorean?'금액':'Amount')+'</th><th>'+(_isKorean?'상태':'Status')+'</th><th>'+(_isKorean?'소스':'Source')+'</th>'+
  '</tr></thead><tbody>'+
    (recentPayments.length?recentPayments.slice(0,25).map(function(p){
      var statusBadge=p.status==='completed'||p.status==='paid'?UI.badge(_isKorean?'완료':'Done','ok'):p.status==='pending'?UI.badge(_isKorean?'대기':'Pending','acc'):p.status==='refunded'?UI.badge(_isKorean?'환불':'Refund','err'):UI.badge(p.status||'—','ghost');
      var typeLabel=_isKorean?({ai_analysis:'AI 분석',document_generation:'서류 생성',subscription:'구독',order:'주문'}[p.type]||p.type||'—'):({ai_analysis:'AI Analysis',document_generation:'Doc Generation',subscription:'Subscription',order:'Order'}[p.type]||p.type||'—');
      return '<tr><td>'+U.fd(p.date)+'</td><td>'+getUserName(p.user_id)+'</td><td>'+U.esc(typeLabel)+'</td><td style="font-family:JetBrains Mono;font-weight:700;color:var(--pri)">'+U.usd(p.amount)+'</td><td>'+statusBadge+'</td><td>'+UI.badge(p.source==='billing'?(_isKorean?'과금':'Billing'):(_isKorean?'주문':'Order'),p.source==='billing'?'purple':'pri')+'</td></tr>';
    }).join(''):'<tr><td colspan="6" style="text-align:center;color:var(--w40);padding:32px">'+(_isKorean?'결제 이력이 없습니다':'No payment history')+'</td></tr>')+
  '</tbody></table></div></div></div>';
}

/* ── Finance: Key Metrics ── */

  var gmv=sumBy(paidOrders,'total_amount');
  var avgOrderValue=paidOrders.length?gmv/paidOrders.length:0;
  var hold=calcEscrowHold();var comm=calcEscrowComm();
  var paidUsers=S.users.filter(function(u){return u.plan&&u.plan!=='free';}).length;

    '<th>'+(_isKorean?'지표':'Metric')+'</th><th>'+(_isKorean?'현재 값':'Value')+'</th><th>'+(_isKorean?'설명':'Description')+'</th>'+

/* ── Dashboard ── */
function pgDash(){
  var today=new Date();var t7=new Date(today-7*864e5);var t30=new Date(today-30*864e5);
  var clients=S.users.filter(function(u){return u.role==='client';});
  var buyerUsers=S.users.filter(function(u){return u.role==='buyer';});
  var completedDeals=S.matchings.filter(function(m){return m.status==='completed';});
  var totalRevenue=sumBy(S.orders.filter(function(o){return o.payment_status==='paid'||o.status==='completed';}), 'total_amount');
  var activeDeals=S.matchings.filter(function(m){return m.status!=='completed'&&m.status!=='rejected'&&m.status!=='expired';}).length;
  var countries={}; S.buyers.forEach(function(b){if(b.country)countries[b.country]=(countries[b.country]||0)+1;});
  var countryCount=Object.keys(countries).length;
  var newUsers7=S.users.filter(function(u){return new Date(u.created_at)>=t7;}).length;
  var newUsers30=S.users.filter(function(u){return new Date(u.created_at)>=t30;}).length;
  var convRate=clients.length?Math.round(completedDeals.length/clients.length*100):0;
  var mrr=calcMRR();
  var activeRate=calcActiveRate();
  var paidClients=clients.filter(function(u){return u.plan&&u.plan!=='free';}).length;

  // Plan distribution
  var planDist={free:0,starter:0,basic:0,pro:0,alibaba:0};
  clients.forEach(function(u){planDist[u.plan||'free']=(planDist[u.plan||'free']||0)+1;});
  planDist.starter=(planDist.starter||0)+(planDist.basic||0);planDist.basic=0;
  var maxPlan=Math.max(planDist.free,planDist.starter,planDist.pro,planDist.alibaba,1);

  // Pipeline funnel
  var pipeline={proposed:0,interested:0,sample:0,negotiation:0,contract:0,completed:0};
  S.matchings.forEach(function(m){if(pipeline[m.status]!==undefined)pipeline[m.status]++;});
  var maxPipe=Math.max.apply(null,Object.values(pipeline).concat([1]));

  // Recent activity
  var recentMsgs=S.messages.slice(0,5);

  // ── Section 1: Urgent alerts ──
  var pendingSR=S.serviceRequests.filter(function(r){return r.status==='pending';}).length;
  var overdueSR=S.serviceRequests.filter(function(r){
    if(!r.created_at||r.status==='completed'||r.status==='cancelled')return false;
    var hours=(Date.now()-new Date(r.created_at).getTime())/3600000;
    var limit={urgent:4,high:24,normal:72,low:168}[r.priority||'normal']||72;
    return hours>limit;
  }).length;
  var unreadChat=S.messages?S.messages.filter(function(m){return !m.is_read;}).length:0;
  var pendingProofs=S.paymentProofs.filter(function(p){return p.status==='pending';}).length;
  var openDisputes=S.disputes.filter(function(d){return d.status==='open'||d.status==='escalated';}).length;
  var hasUrgent=pendingSR>0||overdueSR>0||unreadChat>0||pendingProofs>0||openDisputes>0;
  var urgentHtml='';
  if(hasUrgent){
    urgentHtml='<div class="card" style="border-left:3px solid var(--err);margin-bottom:16px"><div class="card-b" style="padding:14px 18px"><div style="font-weight:800;font-size:14px;margin-bottom:10px;color:var(--err)">&#x26A0;&#xFE0F; CEO Action Required</div><div style="display:flex;gap:12px;flex-wrap:wrap">';
    if(pendingSR>0) urgentHtml+='<div onclick="Adm.set({page:\'services\'})" style="cursor:pointer;padding:10px 16px;background:rgba(255,82,82,.1);border-radius:var(--r-s);border:1px solid rgba(255,82,82,.2)"><div style="font-size:22px;font-weight:800;color:var(--err)">'+pendingSR+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'미배정 요청':'Unassigned')+'</div></div>';
    if(overdueSR>0) urgentHtml+='<div onclick="Adm.set({page:\'services\'})" style="cursor:pointer;padding:10px 16px;background:rgba(255,82,82,.1);border-radius:var(--r-s);border:1px solid rgba(255,82,82,.2)"><div style="font-size:22px;font-weight:800;color:var(--err)">'+overdueSR+'</div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'SLA 초과':'SLA Exceeded')+'</div></div>';

function sortUsers(arr){
  var s=S._userSort;var col=s.col;var dir=s.asc?1:-1;
  return arr.slice().sort(function(a,b){
    var va,vb;
    if(col==='email'){va=(a.display_name||a.email||'').toLowerCase();vb=(b.display_name||b.email||'').toLowerCase();}
    else if(col==='company_name'){va=(a.company_name||'').toLowerCase();vb=(b.company_name||'').toLowerCase();}
    else if(col==='plan'){va=a.plan||'free';vb=b.plan||'free';}
    else if(col==='is_active'){va=a.is_active?1:0;vb=b.is_active?1:0;}
    else if(col==='analyses'){va=S.analyses.filter(function(x){return x.user_id===a.id;}).length;vb=S.analyses.filter(function(x){return x.user_id===b.id;}).length;}
    else{va=a.created_at||'';vb=b.created_at||'';}
    if(va<vb)return -1*dir;if(va>vb)return 1*dir;return 0;
  });
}

  if(S._userSort.col===col)S._userSort.asc=!S._userSort.asc;

      '<div style="display:flex;gap:8px;margin-top:14px">'+
        '<button class="btn btn-ok btn-sm" onclick="Adm.updateAStatus(\''+a.id+'\',\'completed\',event)">'+(_isKorean?'\uC644\uB8CC \uCC98\uB9AC':'Complete')+'</button>'+
        '<button class="btn btn-danger btn-sm" onclick="Adm.updateAStatus(\''+a.id+'\',\'failed\',event)">'+(_isKorean?'\uC2E4\uD328 \uCC98\uB9AC':'Mark Failed')+'</button>'+

      '</div>'+
    '</div></div>'+
  '</div>';

  /* Summary */
  if(r.summary||r.executive_summary){
    html+='<div class="card" style="margin-bottom:16px"><div class="card-h">\uD83D\uDCDD '+(_isKorean?'\uC694\uC57D':'Summary')+'</div><div class="card-b">';
    if(r.executive_summary)html+='<p style="font-size:13px;color:var(--w70);line-height:1.8;font-weight:600">'+U.esc(r.executive_summary)+'</p>';
    if(r.summary)html+='<p style="font-size:13px;color:var(--w70);line-height:1.8;'+(r.executive_summary?'margin-top:10px;padding-top:10px;border-top:1px solid var(--w08)':'')+'">'+U.esc(r.summary)+'</p>';
    html+='</div></div>';
  }

  /* Market Analysis */
  if(r.market_analysis&&r.market_analysis.length){
    html+='<div class="card" style="margin-bottom:16px"><div class="card-h">\uD83C\uDF0D '+(_isKorean?'\uC2DC\uC7A5 \uBD84\uC11D':'Market Analysis')+'</div><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>'+(_isKorean?'\uC2DC\uC7A5':'Market')+'</th><th>'+(_isKorean?'\uADDC\uBAA8':'Size')+'</th><th>'+(_isKorean?'\uC131\uC7A5\uB960':'Growth')+'</th><th>'+(_isKorean?'\uC9C4\uC785\uC7A5\uBCBD':'Entry Barrier')+'</th></tr></thead><tbody>'+
      r.market_analysis.map(function(m){return '<tr><td style="font-weight:700">'+U.esc(m.name)+'</td><td style="font-family:JetBrains Mono">'+U.esc(m.size)+'</td><td style="color:var(--ok)">'+U.esc(m.grow)+'</td><td>'+U.esc(m.entry)+'</td></tr>';}).join('')+
    '</tbody></table></div></div>';
  }

  /* FTA Analysis (v4) */
  if(r.fta_analysis){
    var fta=r.fta_analysis;
    html+='<div class="card" style="margin-bottom:16px"><div class="card-h">\uD83C\uDFF3\uFE0F '+(_isKorean?'FTA / \uAD00\uC138 \uBD84\uC11D':'FTA / Tariff Analysis')+'</div><div class="card-b">';
    if(typeof fta==='string'){html+='<p style="font-size:13px;color:var(--w70);line-height:1.8">'+U.esc(fta)+'</p>';}
    else if(Array.isArray(fta)){html+='<table class="tbl"><thead><tr><th>FTA</th><th>'+(_isKorean?'\uB300\uC0C1\uAD6D':'Countries')+'</th><th>'+(_isKorean?'\uAD00\uC138\uC728':'Tariff Rate')+'</th><th>'+(_isKorean?'\uD61C\uD0DD':'Benefit')+'</th></tr></thead><tbody>'+fta.map(function(f){return '<tr><td style="font-weight:600">'+U.esc(f.agreement||f.name||'')+'</td><td>'+U.esc(f.countries||f.country||'')+'</td><td style="font-family:JetBrains Mono;color:var(--ok)">'+U.esc(f.tariff_rate||f.rate||'')+'</td><td style="font-size:12px">'+U.esc(f.benefit||f.note||'')+'</td></tr>';}).join('')+'</tbody></table>';}
    else{Object.entries(fta).forEach(function(e){html+='<div class="detail-row"><div class="detail-label">'+U.esc(e[0])+'</div><div class="detail-value">'+U.esc(typeof e[1]==='object'?JSON.stringify(e[1]):e[1])+'</div></div>';});}
    html+='</div></div>';
  }

  /* Margin Analysis (v4) */
  if(r.margin_analysis){
    var ma=r.margin_analysis;
    html+='<div class="card" style="margin-bottom:16px"><div class="card-h">\uD83D\uDCB0 '+(_isKorean?'\uB9C8\uC9C4 / \uBE44\uC6A9 \uBD84\uC11D':'Margin / Cost Analysis')+'</div><div class="card-b">';
    if(typeof ma==='string'){html+='<p style="font-size:13px;color:var(--w70);line-height:1.8">'+U.esc(ma)+'</p>';}
    else if(typeof ma==='object'){
      var maFields=[['fob_price',_isKorean?'FOB \uAC00\uACA9':'FOB Price'],['cif_estimate',_isKorean?'CIF \uCD94\uC815':'CIF Estimate'],['landed_cost',_isKorean?'\uB79C\uB514\uB4DC \uCF54\uC2A4\uD2B8':'Landed Cost'],['retail_margin',_isKorean?'\uC18C\uBE44\uC790\uAC00 \uB9C8\uC9C4':'Retail Margin'],['wholesale_margin',_isKorean?'\uB3C4\uB9E4 \uB9C8\uC9C4':'Wholesale Margin'],['gross_margin',_isKorean?'\uCD1D \uB9C8\uC9C4\uC728':'Gross Margin'],['net_margin',_isKorean?'\uC21C \uB9C8\uC9C4\uC728':'Net Margin'],['freight_cost',_isKorean?'\uBB3C\uB958\uBE44':'Freight Cost'],['customs_duty',_isKorean?'\uAD00\uC138':'Customs Duty'],['insurance',_isKorean?'\uBCF4\uD5D8\uB8CC':'Insurance']];
      maFields.forEach(function(f){var val=ma[f[0]];if(val!==undefined&&val!==null){html+='<div class="detail-row"><div class="detail-label">'+f[1]+'</div><div class="detail-value" style="font-family:JetBrains Mono;font-weight:700">'+U.esc(String(val))+'</div></div>';}});
      Object.keys(ma).forEach(function(k){if(!maFields.find(function(f){return f[0]===k;})&&ma[k]){html+='<div class="detail-row"><div class="detail-label">'+U.esc(k)+'</div><div class="detail-value">'+U.esc(typeof ma[k]==='object'?JSON.stringify(ma[k]):String(ma[k]))+'</div></div>';}});
    }
    html+='</div></div>';
  }

  /* Pricing Strategy (v4) */
  if(r.pricing_strategy){
    var ps=r.pricing_strategy;
    html+='<div class="card" style="margin-bottom:16px"><div class="card-h">\uD83C\uDFF7\uFE0F '+(_isKorean?'\uAC00\uACA9 \uC804\uB7B5':'Pricing Strategy')+'</div><div class="card-b">';
    if(typeof ps==='string'){html+='<p style="font-size:13px;color:var(--w70);line-height:1.8">'+U.esc(ps)+'</p>';}
    else if(typeof ps==='object'){Object.entries(ps).forEach(function(e){html+='<div class="detail-row"><div class="detail-label">'+U.esc(e[0])+'</div><div class="detail-value" style="font-size:12px">'+U.esc(typeof e[1]==='object'?JSON.stringify(e[1]):String(e[1]))+'</div></div>';});}
    html+='</div></div>';
  }

  /* Cert Gap Analysis (v4) */
  if(r.cert_gap_analysis||r.existing_certs_evaluation){
    html+='<div class="card" style="margin-bottom:16px"><div class="card-h">\uD83D\uDEE1\uFE0F '+(_isKorean?'\uC778\uC99D \uBD84\uC11D':'Certification Analysis')+'</div><div class="card-b">';
    if(r.existing_certs_evaluation){
      html+='<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--ok);margin-bottom:6px">'+(_isKorean?'\uBCF4\uC720 \uC778\uC99D \uD3C9\uAC00':'Existing Cert Evaluation')+'</div>';
      if(typeof r.existing_certs_evaluation==='string'){html+='<p style="font-size:12px;color:var(--w60)">'+U.esc(r.existing_certs_evaluation)+'</p>';}
      else if(Array.isArray(r.existing_certs_evaluation)){r.existing_certs_evaluation.forEach(function(c){html+='<div style="padding:6px 10px;border-radius:6px;background:rgba(34,197,94,.08);margin-bottom:4px;font-size:12px"><span style="font-weight:600">'+U.esc(c.name||c.cert||'')+'</span>'+(c.status?' \u2014 '+U.esc(c.status):'')+(c.note?' <span style="color:var(--w40)">'+U.esc(c.note)+'</span>':'')+'</div>';});}
      html+='</div>';
    }
    if(r.cert_gap_analysis){
      html+='<div><div style="font-size:13px;font-weight:700;color:var(--err);margin-bottom:6px">'+(_isKorean?'\uBD80\uC871 \uC778\uC99D / \uAC2D':'Missing Certs / Gap')+'</div>';
      if(typeof r.cert_gap_analysis==='string'){html+='<p style="font-size:12px;color:var(--w60)">'+U.esc(r.cert_gap_analysis)+'</p>';}
      else if(Array.isArray(r.cert_gap_analysis)){r.cert_gap_analysis.forEach(function(c){html+='<div style="padding:6px 10px;border-radius:6px;background:rgba(239,68,68,.08);margin-bottom:4px;font-size:12px"><span style="font-weight:600;color:var(--err)">'+U.esc(c.cert||c.name||'')+'</span>'+(c.required_for?' \u2014 '+U.esc(c.required_for):'')+(c.cost?' | '+(_isKorean?'\uBE44\uC6A9: ':'Cost: ')+''+U.esc(c.cost):'')+(c.timeline?' | '+(_isKorean?'\uAE30\uAC04: ':'Timeline: ')+''+U.esc(c.timeline):'')+'</div>';});}
      html+='</div>';
    }
    html+='</div></div>';
  }

  /* Government Support (v4) */
  if(r.government_support){
    var gs=r.government_support;
    html+='<div class="card" style="margin-bottom:16px"><div class="card-h">\uD83C\uDFDB\uFE0F '+(_isKorean?'\uC815\uBD80 \uC9C0\uC6D0 \uC0AC\uC5C5':'Government Support')+'</div><div class="card-b">';
    if(typeof gs==='string'){html+='<p style="font-size:13px;color:var(--w70);line-height:1.8">'+U.esc(gs)+'</p>';}
    else if(Array.isArray(gs)){gs.forEach(function(p){html+='<div style="padding:10px 14px;border-radius:8px;background:var(--w08);margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:var(--pri)">'+U.esc(p.name||p.program||'')+'</div>'+(p.support_rate||p.amount?'<div style="font-size:12px;color:var(--ok);margin-top:2px">'+(_isKorean?'\uC9C0\uC6D0: ':'Support: ')+''+U.esc(p.support_rate||p.amount||'')+'</div>':'')+(p.eligibility?'<div style="font-size:11px;color:var(--w40);margin-top:2px">'+(_isKorean?'\uC790\uACA9: ':'Eligibility: ')+''+U.esc(p.eligibility)+'</div>':'')+(p.how_to_apply?'<div style="font-size:11px;color:var(--w40);margin-top:2px">'+(_isKorean?'\uC2E0\uCCAD: ':'Apply: ')+''+U.esc(p.how_to_apply)+'</div>':'')+'</div>';});}
    else{Object.entries(gs).forEach(function(e){html+='<div class="detail-row"><div class="detail-label">'+U.esc(e[0])+'</div><div class="detail-value">'+U.esc(typeof e[1]==='object'?JSON.stringify(e[1]):String(e[1]))+'</div></div>';});}
    html+='</div></div>';
  }

  /* Alibaba Strategy (v4) */
  if(r.alibaba_strategy){
    var ab=r.alibaba_strategy;
    html+='<div class="card" style="margin-bottom:16px"><div class="card-h">\uD83C\uDFEA '+(_isKorean?'\uC54C\uB9AC\uBC14\uBC14 \uC804\uB7B5':'Alibaba Strategy')+'</div><div class="card-b">';
    if(typeof ab==='string'){html+='<p style="font-size:13px;color:var(--w70);line-height:1.8">'+U.esc(ab)+'</p>';}
    else if(typeof ab==='object'){Object.entries(ab).forEach(function(e){html+='<div class="detail-row"><div class="detail-label">'+U.esc(e[0])+'</div><div class="detail-value" style="font-size:12px">'+U.esc(typeof e[1]==='object'?JSON.stringify(e[1]):String(e[1]))+'</div></div>';});}
    html+='</div></div>';
  }

  return html;
}

/* ── Feedback Management ── */
function getFeedbacks(){return S.serviceRequests.filter(function(s){return s.service_type==='feedback'||((s.type||'').indexOf('feedback_')===0);});}
function pgFeedback(){
  if(S.selectedFB)return pgFBDetail();
  var all=getFeedbacks();
  var filtered=all;
  if(S.searchFilter){var q=S.searchFilter.toLowerCase();filtered=filtered.filter(function(f){var d=f.details||{};return (d.title||'').toLowerCase().indexOf(q)>=0||(d.description||'').toLowerCase().indexOf(q)>=0||(d.feedback_type||'').toLowerCase().indexOf(q)>=0||(d.company||'').toLowerCase().indexOf(q)>=0;});}
  var fbTab=S._fbTab||'all';
  if(fbTab!=='all')filtered=filtered.filter(function(f){var d=f.details||{};return d.feedback_type===fbTab;});
  var bugs=all.filter(function(f){return (f.details||{}).feedback_type==='bug';}).length;
  var features=all.filter(function(f){return (f.details||{}).feedback_type==='feature';}).length;
  var partners=all.filter(function(f){return (f.details||{}).feedback_type==='partnership';}).length;
  var pending=all.filter(function(f){return f.status==='pending';}).length;

  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">';
  h+='<div><h2 style="font-size:20px;font-weight:800">📢 '+(_isKorean?'피드백 관리':'Feedback Management')+'</h2><div style="font-size:12px;color:var(--w40);margin-top:4px">'+(_isKorean?'사용자 피드백 · 버그 신고 · 기능 요청 · 제휴 문의':'User feedback, bug reports, feature requests, partnerships')+'</div></div>';
  h+='<div style="display:flex;gap:8px"><input class="form-input" placeholder="'+(_isKorean?'검색...':'Search...')+'" value="'+esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="width:200px;padding:8px 12px;font-size:13px"></div></div>';

  // Stats cards
  h+='<div class="grid-4" style="margin-bottom:20px">';
  h+='<div class="card"><div class="card-b" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--err)">'+bugs+'</div><div style="font-size:11px;color:var(--w40)">🐛 '+(_isKorean?'버그 신고':'Bug Reports')+'</div></div></div>';
  h+='<div class="card"><div class="card-b" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--acc)">'+features+'</div><div style="font-size:11px;color:var(--w40)">💡 '+(_isKorean?'기능 요청':'Feature Requests')+'</div></div></div>';
  h+='<div class="card"><div class="card-b" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--purple)">'+partners+'</div><div style="font-size:11px;color:var(--w40)">🤝 '+(_isKorean?'제휴 문의':'Partnerships')+'</div></div></div>';
  h+='<div class="card"><div class="card-b" style="text-align:center"><div style="font-size:28px;font-weight:900;color:var(--pri)">'+pending+'</div><div style="font-size:11px;color:var(--w40)">⏳ '+(_isKorean?'미처리':'Pending')+'</div></div></div>';
  h+='</div>';

  // Tabs
  h+='<div style="display:flex;gap:6px;margin-bottom:16px">';
  ['all','bug','feature','partnership'].forEach(function(t){
    var label={all:(_isKorean?'전체 (':'All (')+all.length+')',bug:'🐛 '+(_isKorean?'버그 (':'Bug (')+bugs+')',feature:'💡 '+(_isKorean?'기능 (':'Feature (')+features+')',partnership:'🤝 '+(_isKorean?'제휴 (':'Partner (')+partners+')'}[t];
    h+='<button onclick="S._fbTab=\''+t+'\';render()" class="btn btn-sm '+(fbTab===t?'btn-admin':'btn-ghost')+'" style="font-size:11px">'+label+'</button>';
  });
  h+='</div>';

  // Table
  h+='<div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>'+(_isKorean?'유형':'Type')+'</th><th>'+(_isKorean?'제목':'Title')+'</th><th>'+(_isKorean?'상태':'Status')+'</th><th>'+(_isKorean?'심각도':'Severity')+'</th><th>'+(_isKorean?'접수일':'Date')+'</th><th>'+(_isKorean?'사용자':'User')+'</th></tr></thead><tbody>';
  if(!filtered.length)h+='<tr><td colspan="6" style="text-align:center;color:var(--w40);padding:40px">'+(_isKorean?'접수된 피드백이 없습니다':'No feedback received')+'</td></tr>';
  filtered.forEach(function(f){
    var d=f.details||{};
    var typeIcon={bug:'🐛',feature:'💡',partnership:'🤝'}[d.feedback_type]||'📋';
    var typeLabel=_isKorean?({bug:'버그',feature:'기능요청',partnership:'제휴'}[d.feedback_type]||'기타'):({bug:'Bug',feature:'Feature',partnership:'Partnership'}[d.feedback_type]||'Other');
    var statusBadge={pending:'badge-acc',accepted:'badge-pri',processing:'badge-purple',completed:'badge-ok',cancelled:'badge-ghost'}[f.status]||'badge-ghost';
    var statusLabel=_isKorean?({pending:'대기',accepted:'접수',processing:'처리중',completed:'완료',cancelled:'취소'}[f.status]||f.status):({pending:'Pending',accepted:'Accepted',processing:'Processing',completed:'Completed',cancelled:'Cancelled'}[f.status]||f.status);
    var sevBadge='';
    if(d.severity){var sc={critical:'badge-err',high:'badge-acc',medium:'badge-pri',low:'badge-ghost'}[d.severity]||'badge-ghost';var sl=_isKorean?((_isKorean?{critical:'긴급',high:'높음',medium:'보통',low:'낮음'}:{critical:'Critical',high:'High',medium:'Medium',low:'Low'})[d.severity]||d.severity):({critical:'Critical',high:'High',medium:'Medium',low:'Low'}[d.severity]||d.severity);sevBadge='<span class="badge '+sc+'">'+sl+'</span>';}
    else if(d.priority){var pc={high:'badge-err',medium:'badge-acc',low:'badge-ghost'}[d.priority]||'badge-ghost';var pl=_isKorean?((_isKorean?{high:'높음',medium:'보통',low:'낮음'}:{high:'High',medium:'Medium',low:'Low'})[d.priority]||d.priority):({high:'High',medium:'Medium',low:'Low'}[d.priority]||d.priority);sevBadge='<span class="badge '+pc+'">'+pl+'</span>';}
    var ago=timeAgo(f.created_at);
    var email=d.user_email||d.email||'';
    h+='<tr onclick="Adm.viewFB(\''+f.id+'\')" style="cursor:pointer">';
    h+='<td><span class="badge '+(d.feedback_type==='bug'?'badge-err':d.feedback_type==='feature'?'badge-acc':'badge-purple')+'">'+typeIcon+' '+typeLabel+'</span></td>';
    h+='<td style="font-weight:600;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(d.title||_isKorean?'(제목없음)':'(No title)')+'</td>';
    h+='<td><span class="badge '+statusBadge+'">'+statusLabel+'</span></td>';
    h+='<td>'+sevBadge+'</td>';
    h+='<td style="color:var(--w40);font-size:12px">'+ago+'</td>';
    h+='<td style="color:var(--w40);font-size:12px">'+esc(email)+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function pgFBDetail(){
  var f=S.selectedFB;if(!f)return pgFeedback();
  var d=f.details||{};
  var typeIcon={bug:'🐛',feature:'💡',partnership:'🤝'}[d.feedback_type]||'📋';
  var typeLabel=_isKorean?({bug:'버그 신고',feature:'기능 요청',partnership:'제휴 문의'}[d.feedback_type]||'피드백'):({bug:'Bug Report',feature:'Feature Request',partnership:'Partnership Inquiry'}[d.feedback_type]||'Feedback');

  var h='<div style="margin-bottom:16px"><button class="btn btn-ghost btn-sm" onclick="S.selectedFB=null;render()">← '+(_isKorean?'목록':'List')+'으로</button></div>';
  h+='<div class="card" style="margin-bottom:16px"><div class="card-h"><span>'+typeIcon+' '+esc(d.title||(_isKorean?'(제목없음)':'(Untitled)')+'')+'</span><span class="badge badge-admin">'+typeLabel+'</span></div><div class="card-b">';

  // Meta info
  h+='<div class="grid-3" style="margin-bottom:16px">';
  h+='<div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'접수일':'Received')+'</div><div style="font-size:13px;font-weight:600">'+new Date(f.created_at).toLocaleString('ko-KR')+'</div></div>';
  h+='<div><div style="font-size:11px;color:var(--w40)">'+(_isKorean?'상태':'Status')+'</div><div><select class="form-select" style="padding:6px 10px;font-size:12px" onchange="Adm.updateFB(\''+f.id+'\',\'status\',this.value)">';
  ['pending','accepted','processing','completed','cancelled'].forEach(function(st){h+='<option value="'+st+'"'+(f.status===st?' selected':'')+'>'+((_isKorean?{pending:'대기',accepted:'접수',processing:'처리중',completed:'완료',cancelled:'취소'}:{pending:'Pending',accepted:'Accepted',processing:'Processing',completed:'Completed',cancelled:'Cancelled'})[st])+'</option>';});

/* ── Service Requests ── */
function pgServiceReq(){
  if(S.selectedSR)return pgSRDetail();
  var filtered=filterBySearch(S.serviceRequests,['title','service_type']);
  if(S.tab!=='all')filtered=filtered.filter(function(s){return s.status===S.tab;});

  var tabs=['all','pending','accepted','processing','completed','cancelled'];
  var tabL=_isKorean?{all:'전체',pending:'접수',accepted:'배정',processing:'처리중',completed:'완료',cancelled:'취소'}:{all:'All',pending:'Pending',accepted:'Assigned',processing:'Processing',completed:'Completed',cancelled:'Cancelled'};

  /* SLA 계산 */
  var slaHours={urgent:4,high:24,normal:72,low:168};
  function getSLA(sr){
    var h=slaHours[sr.priority||'normal']||72;
    var created=new Date(sr.created_at);var now=new Date();
    var elapsed=Math.floor((now-created)/(1000*60*60));
    var remain=h-elapsed;
    return {total:h,elapsed:elapsed,remain:remain,pct:Math.min(Math.round(elapsed/h*100),100),overdue:remain<0};
  }

  /* 파이프라인 요약 */
  var pipeline='<div style="display:flex;gap:6px;margin-bottom:16px">'+
    [{s:'pending',i:'📥',c:'var(--w40)'},{s:'accepted',i:'👤',c:'var(--pri)'},{s:'processing',i:'⚙️',c:'var(--acc)'},{s:'completed',i:'✅',c:'var(--ok)'}].map(function(st){
    var cnt=S.serviceRequests.filter(function(x){return x.status===st.s;}).length;
    return '<div style="flex:1;padding:12px;border-radius:10px;background:var(--w08);text-align:center;border-bottom:3px solid '+(cnt?st.c:'transparent')+'">'+
    '<div style="font-size:16px">'+st.i+'</div><div style="font-size:10px;color:var(--w40)">'+tabL[st.s]+'</div>'+
    '<div style="font-size:20px;font-weight:800;color:'+(cnt?st.c:'var(--w20)')+'">'+cnt+'</div></div>';
  }).join('')+'</div>';

  /* 긴급 SLA 경고 */
  var urgentSRs=S.serviceRequests.filter(function(sr){return sr.status!=='completed'&&sr.status!=='cancelled'&&getSLA(sr).overdue;});
  var urgentAlert=urgentSRs.length?'<div style="padding:10px 14px;border-radius:10px;background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.2);margin-bottom:12px;font-size:12px;color:var(--err)">⚠️ '+(_isKorean?'SLA 초과 '+urgentSRs.length+'건 — 즉시 처리 필요':'SLA exceeded: '+urgentSRs.length+' — immediate action needed')+'</div>':'';

  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-size:18px;font-weight:800">💼 '+(_isKorean?'서비스 요청':'Service Requests')+'</h2>'+UI.badge(S.serviceRequests.length+'건','acc')+'</div>'+
  pipeline+urgentAlert+
  '<div style="display:flex;gap:10px;margin-bottom:16px"><div class="search-box" style="flex:1"><input placeholder="'+(_isKorean?'서비스 검색...':'Search services...')+'" value="'+S.searchFilter+'" oninput="Adm.setSearch(this.value)"></div></div>'+
  '<div class="tab-bar">'+tabs.map(function(t){
    var c=t==='all'?S.serviceRequests.length:S.serviceRequests.filter(function(s){return s.status===t;}).length;
    return '<div class="tab-item '+(S.tab===t?'active':'')+'" onclick="Adm.setTab(\''+t+'\')">'+tabL[t]+' <span style="font-size:10px;color:var(--w20)">'+c+'</span></div>';
  }).join('')+'</div>'+
  '<div class="card"><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>'+(_isKorean?'서비스':'Service')+'</th><th>'+(_isKorean?'유저':'User')+'</th><th>'+(_isKorean?'상태':'Status')+'</th><th>'+(_isKorean?'긴급도':'Priority')+'</th><th>SLA</th><th>'+(_isKorean?'담당':'Assignee')+'</th><th>'+(_isKorean?'금액':'Amount')+'</th></tr></thead><tbody>'+
  (filtered.length?filtered.map(function(sr){
    var sla=getSLA(sr);
    var slaCol=sla.overdue?'var(--err)':sla.remain<12?'var(--acc)':'var(--ok)';
    var isDone=sr.status==='completed'||sr.status==='cancelled';
    return '<tr onclick="Adm.viewSR(\''+sr.id+'\')" style="'+(sla.overdue&&!isDone?'background:rgba(255,82,82,.04)':'')+'"><td>'+U.si(sr.service_type)+' '+U.sl(sr.service_type)+'</td><td style="font-size:12px">'+getUserName(sr.user_id)+'</td><td>'+UI.sb(sr.status)+'</td><td>'+UI.badge(sr.priority||'normal',sr.priority==='urgent'?'err':sr.priority==='high'?'acc':'ghost')+'</td>'+
    '<td style="font-size:11px;color:'+(isDone?'var(--w20)':slaCol)+'">'+(isDone?'—':(sla.overdue?(_isKorean?'초과 ':'Exceeded ')+Math.abs(sla.remain)+'h':sla.remain+'h'))+'</td>'+
    '<td style="font-size:11px;color:var(--w40)">'+(sr.assigned_to?getUserName(sr.assigned_to):(_isKorean?'미배정':'Unassigned'))+'</td>'+
    '<td style="font-family:JetBrains Mono;font-size:12px">'+(sr.price?U.krw(sr.price):'\u2014')+'</td></tr>';
  }).join(''):'<tr><td colspan="7">'+UI.empty('💼',_isKorean?'결과 없음':'No results','')+'</td></tr>')+
  '</tbody></table></div></div>';
}

function pgSRDetail(){
  var sr=S.selectedSR;if(!sr)return'';

  /* SLA 계산 */
  var slaHours={urgent:4,high:24,normal:72,low:168};
  var slaH=slaHours[sr.priority||'normal']||72;
  var elapsed=Math.floor((new Date()-new Date(sr.created_at))/(1000*60*60));
  var remain=slaH-elapsed;var slaPct=Math.min(Math.round(elapsed/slaH*100),100);
  var isDone=sr.status==='completed'||sr.status==='cancelled';
  var slaCol=isDone?'var(--ok)':remain<0?'var(--err)':remain<12?'var(--acc)':'var(--pri)';

  var slaBar='<div style="padding:12px;border-radius:10px;background:'+(remain<0&&!isDone?'rgba(255,82,82,.06)':'var(--w08)')+';margin-bottom:16px;border:1px solid '+(remain<0&&!isDone?'rgba(255,82,82,.15)':'var(--bd)')+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+

    '<span style="font-size:11px;color:var(--w40)">'+(_isKorean?'목표: ':'Target: ')+slaH+'h / '+(_isKorean?'경과: ':'Elapsed: ')+elapsed+'h</span></div>'+
    '<div style="height:6px;border-radius:3px;background:var(--w08)"><div style="height:100%;border-radius:3px;background:'+slaCol+';width:'+slaPct+'%;transition:width .3s"></div></div></div>';

  /* 담당자 선택 옵션 */
  var adminUsers=S.users.filter(function(u){return u.role==='admin';});
  var assignOpts=[{value:'',label:''+(_isKorean?'-- 미배정 --':'-- Unassigned --')+''}].concat(adminUsers.map(function(u){return {value:u.id,label:U.esc(u.display_name||u.email)};}));

    '<div style="font-size:10px;font-weight:'+(active?'700':'400')+';color:'+(active?'var(--admin)':'var(--w20)')+'">'+stageL[st]+'</div></div>';

  return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><button class="btn btn-ghost btn-sm" onclick="Adm.set({selectedSR:null})">← '+(_isKorean?'목록':'List')+'</button><h2 style="font-size:18px;font-weight:800;flex:1">'+U.si(sr.service_type)+' '+U.sl(sr.service_type)+'</h2>'+UI.sb(sr.status)+'</div>'+

      '<div class="detail-row"><div class="detail-label">'+(_isKorean?'담당자':'Assignee')+'</div><div class="detail-value">'+(sr.assigned_to?getUserName(sr.assigned_to):'<span style="color:var(--err)">'+(_isKorean?'미배정':'Unassigned')+'</span>')+'</div></div>'+

      '<div class="grid-2" style="margin-bottom:12px">'+
        UI.sel('sr_status',_isKorean?'상태':'Status',[{value:'pending',label:_isKorean?'접수':'Received'},{value:'accepted',label:_isKorean?'배정':'Assigned'},{value:'processing',label:_isKorean?'처리중':'Processing'},{value:'review',label:_isKorean?'검토':'Review'},{value:'completed',label:_isKorean?'완료':'Completed'},{value:'cancelled',label:_isKorean?'취소':'Cancelled'}],sr.status)+

    '<div style="display:flex;align-items:flex-end;gap:2px;height:100px">'+days.map(function(d){var v=signupByDay[d];var h=Math.max(Math.round(v/maxSignup*80),2);return '<div title="'+d+': '+v+(_isKorean?'명':'')+'" style="flex:1;height:'+h+'px;background:var(--pri);border-radius:2px 2px 0 0;opacity:'+(v?1:0.2)+'"></div>';}).join('')+'</div>'+
    '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--w20)"><span>'+days[0]+'</span><span>'+days[days.length-1]+'</span></div>'+

  '</div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-h">'+(_isKorean?'국가별 바이어':'Buyers by Country')+'</div><div class="card-b">'+(function(){var sorted=Object.entries(countries).sort(function(a,b){return b[1]-a[1];});var mx=sorted.length?sorted[0][1]:1;return sorted.map(function(e){return hBar(flag(e[0])+' '+e[0],e[1],mx,'var(--pri)');}).join('');})()+

function saveDisputeForm(e){
  e.preventDefault();var f=e.target;
  var data={type:f.type.value,subject:f.subject.value,description:f.description.value,priority:f.priority.value,reporter_role:f.reporter_role.value,reporter_id:S.user.id,status:'open'};
  if(f.order_id.value)data.order_id=f.order_id.value;
  if(f.matching_id.value)data.matching_id=f.matching_id.value;
  var _saveDisputeBtn=f.querySelector('[type=submit]');btnLoading(_saveDisputeBtn,true);
  sb.from('disputes').insert(data).select().then(function(r){
    btnLoading(_saveDisputeBtn,false);
    if(r.error)return UI.toast((_isKorean?'등록 실패: ':'Registration failed: ')+r.error.message,'err');
    S.disputes.unshift(r.data[0]);closeModal('modal-dispute');UI.toast(_isKorean?'분쟁이 등록되었습니다':'Dispute registered','ok');render();
  });
}
function changeDisputeStatus(id,val){
  if((val==='resolved'||val==='closed')&&!confirm(_isKorean?(_isKorean?'분쟁을 "'+DST[val]+'" 처리하시겠습니까?':'Change dispute status to "'+DST[val]+'"?'):'Change dispute status to "'+DST[val]+'"?'))return;
  var upd={status:val,updated_at:new Date().toISOString()};
  if(val==='resolved'||val==='closed'){upd.resolved_by=S.user.id;upd.resolved_at=new Date().toISOString();}
  sb.from('disputes').update(upd).eq('id',id).select().then(function(r){
    if(r.error)return UI.toast(_isKorean?'변경 실패':'Update failed','err');
    var d=r.data[0];var idx=S.disputes.findIndex(function(x){return x.id===id;});if(idx>=0)S.disputes[idx]=d;
    if(S.selectedDispute&&S.selectedDispute.id===id)S.selectedDispute=d;
    UI.toast((_isKorean?'상태 변경: ':'Status: ')+DST[val],'ok');render();
  });
}
function changeDisputePriority(id,val){
  sb.from('disputes').update({priority:val,updated_at:new Date().toISOString()}).eq('id',id).select().then(function(r){
    if(r.error)return UI.toast(_isKorean?'변경 실패':'Update failed','err');
    var d=r.data[0];var idx=S.disputes.findIndex(function(x){return x.id===id;});if(idx>=0)S.disputes[idx]=d;
    if(S.selectedDispute&&S.selectedDispute.id===id)S.selectedDispute=d;
    UI.toast((_isKorean?'우선순위 변경: ':'Priority: ')+DPR[val],'ok');render();
  });
}
function saveDisputeResolution(id,evt){
  var el=document.getElementById('dispute-resolution');if(!el)return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.from('disputes').update({resolution:el.value,updated_at:new Date().toISOString()}).eq('id',id).select().then(function(r){
    btnLoading(btn,false);
    if(r.error)return UI.toast(_isKorean?'저장 실패':'Save failed','err');
    var d=r.data[0];var idx=S.disputes.findIndex(function(x){return x.id===id;});if(idx>=0)S.disputes[idx]=d;

}

function pgPayRevenue(){
  var mrr=calcMRR();var arr=mrr*12;var hold=calcEscrowHold();var comm=calcEscrowComm();var flt=calcFloat();
  /* 미수금 합계 (pending billing events) */
  var pendingBilling=(S.billingEvents||[]).filter(function(e){return e.status==='pending';});
  var pendingTotal=pendingBilling.reduce(function(s,e){return s+(Number(e.amount)||0);},0);
  var pendingDocCount=pendingBilling.filter(function(e){return e.event_type==='document_generation';}).length;
  var pendingAICount=pendingBilling.filter(function(e){return e.event_type==='ai_analysis';}).length;
  var activeSubs=S.subscriptions.filter(function(s){return s.status==='active';}).length||S.users.filter(function(u){return PLAN_PRICE[u.plan];}).length;
  var activeEsc=S.escrowTxns.filter(function(e){return['funded','in_production','shipped','inspection'].indexOf(e.escrow_status)>=0;}).length;

  /* Plan revenue breakdown */
  var planRev={starter:0,pro:0,alibaba:0,enterprise:0};
  if(S.subscriptions.length){S.subscriptions.filter(function(s){return s.status==='active';}).forEach(function(s){var a=Number(s.amount)||0;var mo=s.billing_cycle==='semi_annual'?a/6:s.billing_cycle==='annual'?a/12:a;var k=(s.plan==='basic')?'starter':s.plan;planRev[k]=(planRev[k]||0)+mo;});}
  else{S.users.forEach(function(u){var p=PLAN_PRICE[u.plan];if(p){var k=(u.plan==='basic')?'starter':u.plan;planRev[k]=(planRev[k]||0)+p.m;}});}
  var maxPR=Math.max.apply(null,Object.values(planRev).concat([1]));

  /* Billing cycle dist */
  var cycleDist={monthly:0,semi_annual:0,annual:0};
  if(S.subscriptions.length){S.subscriptions.filter(function(s){return s.status==='active';}).forEach(function(s){if(cycleDist[s.billing_cycle]!==undefined)cycleDist[s.billing_cycle]++;});}
  else{S.users.forEach(function(u){if(PLAN_PRICE[u.plan])cycleDist[u.billing_cycle||'monthly']++;});}
  var maxCy=Math.max.apply(null,Object.values(cycleDist).concat([1]));

  /* Escrow pipeline */
  var escPipe={};Object.keys(ESC_ST).forEach(function(k){escPipe[k]=0;});
  S.escrowTxns.forEach(function(e){if(escPipe[e.escrow_status]!==undefined)escPipe[e.escrow_status]++;});
  var maxEP=Math.max.apply(null,Object.values(escPipe).concat([1]));

  /* Product revenue from orders */
  var prodRev={};
  S.escrowTxns.forEach(function(e){if(e.product_name){prodRev[e.product_name]=(prodRev[e.product_name]||0)+(Number(e.amount)||0);}});
  S.orders.forEach(function(o){var items=o.items||[];if(typeof items==='string')try{items=JSON.parse(items);}catch(x){items=[];}
    items.forEach(function(it){if(it.name){prodRev[it.name]=(prodRev[it.name]||0)+(Number(it.amount||it.total)||0);}});
    if(!items.length&&o.total_amount){var p=S.products.find(function(pp){return pp.user_id===o.user_id;});if(p)prodRev[p.name_ko||p.name_en||'Unknown']=(prodRev[p.name_ko||p.name_en||'Unknown']||0)+(Number(o.total_amount)||0);}
  });
  var sortedProd=Object.entries(prodRev).sort(function(a,b){return b[1]-a[1];}).slice(0,8);

/* ── Payment Proofs Review ── */
function pgPayProofs(){
  var proofs=S.paymentProofs||[];
  var milestones=S.paymentMilestones||[];
  var tab=S._proofTab||'all';

  // Stats
  var pending=proofs.filter(function(p){return p.status==='pending';}).length;
  var approved=proofs.filter(function(p){return p.status==='approved';}).length;
  var rejected=proofs.filter(function(p){return p.status==='rejected';}).length;
  var totalAmt=milestones.filter(function(m){return m.status==='paid';}).reduce(function(s,m){return s+(Number(m.amount)||0);},0);

  // Filter by tab
  var filtered=proofs;
  if(tab!=='all')filtered=proofs.filter(function(p){return p.status===tab;});

  // Search
  var search=(S.searchFilter||'').toLowerCase();
  if(search){
    filtered=filtered.filter(function(p){
      var ms=milestones.find(function(m){return m.id===p.milestone_id;});
      var deal=ms?S.deals.find(function(d){return d.id===ms.deal_id;}):null;
      return (p.file_name||'').toLowerCase().indexOf(search)>=0||
        (ms&&ms.name&&ms.name.toLowerCase().indexOf(search)>=0)||
        (deal&&deal.title&&deal.title.toLowerCase().indexOf(search)>=0)||
        (p.id||'').indexOf(search)>=0;
    });
  }

  // Pagination
  var pKey='payProofs';
  var pg=S._pg[pKey]||0;
  var perPage=15;
  var paged=filtered.slice(pg*perPage,(pg+1)*perPage);

  var statsHtml='<div class="grid-4" style="margin-bottom:16px">'+
    UI.stat('\uB300\uAE30 \uC911',pending,'\uB9AC\uBDF0 \uD544\uC694','var(--acc)')+
    UI.stat('\uC2B9\uC778',approved,'','var(--ok)')+
    UI.stat('\uBC18\uB824',rejected,'','var(--err)')+
    UI.stat('\uACB0\uC81C \uC644\uB8CC \uCD1D\uC561','$'+Number(totalAmt).toLocaleString(),milestones.filter(function(m){return m.status==='paid';}).length+'\uAC74','var(--pri)')+
  '</div>';

  // Tabs
  var tabCounts={all:proofs.length,pending:pending,approved:approved,rejected:rejected};
  var tabLabels={all:'\uC804\uCCB4',pending:'\uB300\uAE30',approved:'\uC2B9\uC778',rejected:'\uBC18\uB824'};
  var tabHtml='<div style="display:flex;gap:6px;margin-bottom:12px">'+
    ['all','pending','approved','rejected'].map(function(t){
      return '<button class="btn btn-sm '+(tab===t?'btn-pri':'btn-ghost')+'" onclick="Adm.setProofTab(\''+t+'\')">'+tabLabels[t]+' ('+tabCounts[t]+')</button>';
    }).join('')+
  '</div>';

  var searchHtml='<div style="margin-bottom:12px"><input placeholder="\uC99D\uBE59 \uAC80\uC0C9 (\uD30C\uC77C\uBA85, \uB9C8\uC77C\uC2A4\uD1A4, \uB51C)..." value="'+U.esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="width:100%;max-width:400px;padding:10px 14px;border-radius:10px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:13px"></div>';

  // Table
  var tableHtml='<div class="card"><div class="card-h"><span>\uACB0\uC81C \uC99D\uBE59 \uBAA9\uB85D</span>'+UI.badge(filtered.length+'\uAC74','pri')+'</div><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>\uB51C</th><th>\uB9C8\uC77C\uC2A4\uD1A4</th><th>\uAE08\uC561</th><th>\uC5C5\uB85C\uB354</th><th>\uD30C\uC77C</th><th>\uC0C1\uD0DC</th><th>\uC81C\uCD9C\uC77C</th><th>\uC561\uC158</th></tr></thead><tbody>'+
    (paged.length?paged.map(function(p){

function approveProof(proofId,evt){
  if(!confirm('\uC774 \uACB0\uC81C \uC99D\uBE59\uC744 \uC2B9\uC778\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?'))return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.functions.invoke('verify-payment-proof',{body:{proof_id:proofId,action:'approve'}}).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('\uC2B9\uC778 \uC2E4\uD328: '+(r.error.message||r.error),'err');return;}
    var d=r.data;
    if(d&&!d.ok){UI.toast('\uC2B9\uC778 \uC2E4\uD328: '+(d.error||'unknown'),'err');return;}
    var proof=S.paymentProofs.find(function(p){return p.id===proofId;});
    if(proof){proof.status='approved';proof.reviewed_at=new Date().toISOString();proof.reviewer_id=S.user?S.user.id:null;}
    if(d&&d.milestone_id){
      var ms=S.paymentMilestones.find(function(m){return m.id===d.milestone_id;});
      if(ms)ms.status='paid';
    }
    closeModal('proof-detail');
    UI.toast('\uACB0\uC81C \uC99D\uBE59\uC774 \uC2B9\uC778\uB418\uC5C8\uC2B5\uB2C8\uB2E4','ok');
    render();
  });
}

function rejectProof(proofId,evt){
  var reason=prompt('\uBC18\uB824 \uC0AC\uC720\uB97C \uC785\uB825\uD558\uC138\uC694:');
  if(reason===null)return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.functions.invoke('verify-payment-proof',{body:{proof_id:proofId,action:'reject',reason:reason||'\uC99D\uBE59 \uBD80\uC801\uD569'}}).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('\uBC18\uB824 \uC2E4\uD328: '+(r.error.message||r.error),'err');return;}
    var d=r.data;
    if(d&&!d.ok){UI.toast('\uBC18\uB824 \uC2E4\uD328: '+(d.error||'unknown'),'err');return;}
    var proof=S.paymentProofs.find(function(p){return p.id===proofId;});
    if(proof){proof.status='rejected';proof.reviewed_at=new Date().toISOString();proof.reviewer_notes=reason||'\uC99D\uBE59 \uBD80\uC801\uD569';proof.reviewer_id=S.user?S.user.id:null;}
    if(d&&d.milestone_id){
      var ms=S.paymentMilestones.find(function(m){return m.id===d.milestone_id;});
      if(ms)ms.status='rejected';
    }
    closeModal('proof-detail');
    UI.toast('\uACB0\uC81C \uC99D\uBE59\uC774 \uBC18\uB824\uB418\uC5C8\uC2B5\uB2C8\uB2E4','ok');
    render();
  });
}

  var keys=Object.keys(data[0]).filter(function(k){return sensitive.indexOf(k)<0;});

  data.forEach(function(row){
    csv+=keys.map(function(k){var v=row[k];if(v==null)return'';v=String(v).replace(/"/g,'""');return v.indexOf(',')>=0||v.indexOf('\n')>=0?'"'+v+'"':v;}).join(',')+'\n';
  });
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);

function pgErrorMonitor(){

  var sf=S.searchFilter||'';
  if(sf){errs=errs.filter(function(e){return (e.error_message||'').toLowerCase().indexOf(sf.toLowerCase())>=0||(e.page||'').toLowerCase().indexOf(sf.toLowerCase())>=0||((e.extra&&e.extra.rid)||'').toLowerCase().indexOf(sf.toLowerCase())>=0;});}
  /* Top 10 errors (24h) */
  var now=Date.now();var h24=now-86400000;
  var recent=errs.filter(function(e){return new Date(e.created_at).getTime()>h24;});
  var msgCount={};recent.forEach(function(e){var k=(e.error_message||'unknown').slice(0,80);msgCount[k]=(msgCount[k]||0)+1;});
  var top10=Object.keys(msgCount).map(function(k){return{msg:k,cnt:msgCount[k]};}).sort(function(a,b){return b.cnt-a.cnt;}).slice(0,10);

  h+='<div class="stat-card"><div class="stat-label">'+(_isKorean?'총 에러':'Total Errors')+'</div><div class="stat-value" style="color:var(--err)">'+total+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">'+(_isKorean?'24시간 내':'Last 24h')+'</div><div class="stat-value" style="color:var(--acc)">'+today+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">'+(_isKorean?'영향 페이지':'Affected Pages')+'</div><div class="stat-value" style="color:var(--pri)">'+pages.size+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">'+(_isKorean?'에러 유형':'Error Types')+'</div><div class="stat-value" style="color:var(--w60)">'+Object.keys(msgCount).length+'</div></div>';
  h+='</div>';
  /* Top 10 */
  if(top10.length){
    h+='<div class="card" style="margin-bottom:20px"><div class="card-h">'+(_isKorean?'Top 에러 (24시간)':'Top Errors (24h)')+'</div><div class="card-b"><table class="tbl"><thead><tr><th>'+(_isKorean?'횟수':'Count')+'</th><th>'+(_isKorean?'에러 메시지':'Error Message')+'</th></tr></thead><tbody>';
    top10.forEach(function(t){h+='<tr><td><span class="badge badge-err">'+t.cnt+'</span></td><td style="font-size:12px;word-break:break-all">'+U.esc(t.msg)+'</td></tr>';});
    h+='</tbody></table></div></div>';
  }
  /* Recent errors table */
  var pinfo=paginate(errs,'errorMonitor');
  h+='<div class="card"><div class="card-h">'+(_isKorean?'최근 에러 (':'Recent Errors (')+total+(_isKorean?'건)':')') +'</div><div class="card-b"><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>'+(_isKorean?'시간':'Time')+'</th><th>RID</th><th>'+(_isKorean?'페이지':'Page')+'</th><th>'+(_isKorean?'메시지':'Message')+'</th><th>'+(_isKorean?'유저':'User')+'</th></tr></thead><tbody>';
  if(!pinfo.items.length){h+='<tr><td colspan="5" style="text-align:center;color:var(--w40);padding:20px">'+(_isKorean?'에러 없음':'No errors')+'</td></tr>';}
  pinfo.items.forEach(function(e){
    var dt=new Date(e.created_at);var _loc=_isKorean?'ko-KR':'en-US';var ts=dt.toLocaleDateString(_loc,{month:'short',day:'numeric'})+' '+dt.toLocaleTimeString(_loc,{hour:'2-digit',minute:'2-digit'});
    var rid=(e.extra&&e.extra.rid)||'-';
    var uid=e.user_id?getUserName(e.user_id):'<span style="color:var(--w20)">'+(_isKorean?'비로그인':'Anonymous')+'</span>';
    h+='<tr><td style="font-size:11px;white-space:nowrap">'+ts+'</td>';
    h+='<td><span style="font-family:monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--w08);cursor:pointer" onclick="navigator.clipboard.writeText(\''+U.esc(rid)+'\');Adm.UI.toast(\''+(_isKorean?'복사됨':'Copied')+'\',\'ok\')" title="'+(_isKorean?'클릭하여 복사':'Click to copy')+'">'+U.esc(rid)+'</span></td>';

/* === PAGINATION === */
function getPg(key){return S._pg[key]||0;}
function setPg(key,p){S._pg[key]=p;render();}
function paginate(arr,key){
  var pg=getPg(key);var total=arr.length;var pages=Math.ceil(total/PAGE_SIZE)||1;
  if(pg>=pages)pg=pages-1;if(pg<0)pg=0;
  var start=pg*PAGE_SIZE;var sliced=arr.slice(start,start+PAGE_SIZE);
  return{items:sliced,page:pg,pages:pages,total:total};
}
function paginationBar(key,info){
  if(info.pages<=1)return '';
  var btns='';
  for(var i=0;i<info.pages;i++){
    if(info.pages>7&&i>1&&i<info.pages-2&&Math.abs(i-info.page)>1){
      if(btns.slice(-3)!=='...')btns+='<span style="color:var(--w20);padding:0 4px">...</span>';
      continue;
    }
    btns+='<button class="btn btn-sm '+(i===info.page?'btn-pri':'btn-ghost')+'" onclick="Adm.setPg(\''+key+'\','+i+')" style="min-width:30px;padding:4px 8px">'+( i+1)+'</button>';
  }
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:8px 0">'+
    '<span style="font-size:11px;color:var(--w40)">'+info.total+''+(_isKorean?'건 중':' of ')+' '+(info.page*PAGE_SIZE+1)+'-'+Math.min((info.page+1)*PAGE_SIZE,info.total)+'</span>'+
    '<div style="display:flex;gap:4px;align-items:center">'+
    '<button class="btn btn-ghost btn-sm" onclick="Adm.setPg(\''+key+'\','+(info.page-1)+')" '+(info.page<=0?'disabled':'')+' style="padding:4px 8px">&laquo;</button>'+
    btns+
    '<button class="btn btn-ghost btn-sm" onclick="Adm.setPg(\''+key+'\','+(info.page+1)+')" '+(info.page>=info.pages-1?'disabled':'')+' style="padding:4px 8px">&raquo;</button>'+
    '</div></div>';
}
