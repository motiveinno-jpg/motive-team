<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Whistle AI — 온보딩 가이드</title>
<meta name="description" content="Whistle AI 수출 플랫폼 기능별 온보딩 가이드. 제조사, 바이어, 관리자, 알리바바 대행사 4가지 역할별 완벽 가이드.">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060B18;--bg2:#0A1020;--card:#0D1424;--card2:#111B2E;--pri:#00D4FF;--pri-g:linear-gradient(135deg,#00D4FF,#0088FF);--acc:#FFB800;--ok:#00E676;--err:#FF5252;--purple:#A855F7;--w:#fff;--w90:rgba(255,255,255,.9);--w70:rgba(255,255,255,.7);--w60:rgba(255,255,255,.6);--w40:rgba(255,255,255,.55);--w20:rgba(255,255,255,.35);--w08:rgba(255,255,255,.06);--bd:rgba(255,255,255,.08);--r:14px;--shadow:0 4px 24px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Sora,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--w);overflow-x:hidden}
a{color:var(--pri);text-decoration:none}

/* Hero */
.hero{padding:60px 20px 40px;text-align:center;background:linear-gradient(180deg,rgba(0,212,255,.04) 0%,transparent 100%)}
.hero h1{font-size:32px;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg,#00D4FF,#0088FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:15px;color:var(--w40);max-width:600px;margin:0 auto}

/* Persona Selector */
.persona-bar{display:flex;justify-content:center;gap:12px;padding:20px;flex-wrap:wrap}
.persona-card{padding:20px 24px;border-radius:var(--r);border:2px solid var(--bd);background:var(--card);cursor:pointer;text-align:center;min-width:160px;transition:all .3s}
.persona-card:hover{border-color:rgba(0,212,255,.3);transform:translateY(-2px)}
.persona-card.active{border-color:var(--pri);background:rgba(0,212,255,.04)}
.persona-card .icon{font-size:32px;margin-bottom:8px}
.persona-card .name{font-size:14px;font-weight:700}
.persona-card .desc{font-size:11px;color:var(--w40);margin-top:4px}

/* Content Area */
.content{max-width:1000px;margin:0 auto;padding:20px}
.section{margin-bottom:24px}
.section-h{display:flex;align-items:center;gap:10px;margin-bottom:14px;cursor:pointer;padding:14px 18px;border-radius:var(--r);background:var(--card);border:1px solid var(--bd);transition:background .2s}
.section-h:hover{background:var(--card2)}
.section-h .num{width:28px;height:28px;border-radius:50%;background:var(--pri-g);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--bg);flex-shrink:0}
.section-h .title{font-size:15px;font-weight:700;flex:1}
.section-h .arrow{font-size:14px;color:var(--w40);transition:transform .3s}
.section-h.open .arrow{transform:rotate(90deg)}
.section-body{display:none;padding:0 0 0 20px}
.section-h.open+.section-body{display:block}

/* Step Cards */
.step{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--bd)}
.step:last-child{border-bottom:none}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--w08);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--pri);flex-shrink:0;margin-top:2px}
.step-content{flex:1}
.step-title{font-size:13px;font-weight:700;margin-bottom:6px}
.step-desc{font-size:12px;color:var(--w60);line-height:1.7}
.step-action{margin-top:8px;display:flex;align-items:center;gap:8px}
.step-action .click-target{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:8px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);font-size:11px;color:var(--pri);font-weight:600}

/* Mock Screen */
.mock-screen{position:relative;margin:12px 0;border-radius:10px;border:1px solid var(--bd);background:var(--bg2);overflow:hidden;padding:16px;min-height:120px}
.mock-screen .mock-sidebar{position:absolute;left:0;top:0;bottom:0;width:50px;background:var(--card);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:12px}
.mock-screen .mock-sidebar .mi{width:30px;height:30px;border-radius:8px;background:var(--w08);display:flex;align-items:center;justify-content:center;font-size:12px}
.mock-screen .mock-sidebar .mi.active{background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.3)}
.mock-screen .mock-main{margin-left:58px}

/* Animated Cursor */
.cursor-anim{position:absolute;width:20px;height:20px;pointer-events:none;z-index:100;transition:all 1.2s cubic-bezier(.4,0,.2,1)}
.cursor-anim::before{content:'';display:block;width:0;height:0;border-left:8px solid var(--pri);border-top:5px solid transparent;border-bottom:5px solid transparent;filter:drop-shadow(0 0 4px rgba(0,212,255,.5))}
.cursor-anim::after{content:'Click';position:absolute;top:20px;left:8px;font-size:9px;color:var(--pri);font-weight:700;opacity:0;animation:cursorClick 2s infinite 1.2s}
@keyframes cursorClick{0%,100%{opacity:0;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* Highlight pulse */
.highlight-box{position:absolute;border:2px solid var(--pri);border-radius:8px;animation:highlightPulse 2s infinite;pointer-events:none}
@keyframes highlightPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.4)}50%{box-shadow:0 0 0 8px rgba(0,212,255,0)}}

/* Tips */
.tip{padding:12px 16px;border-radius:10px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);margin:10px 0;font-size:12px;color:var(--w60);line-height:1.7}
.tip strong{color:var(--pri)}

/* Progress */
.progress-bar{display:flex;gap:4px;margin:20px 0}
.progress-bar .dot{width:8px;height:8px;border-radius:50%;background:var(--w08);transition:background .3s}
.progress-bar .dot.done{background:var(--ok)}
.progress-bar .dot.current{background:var(--pri);box-shadow:0 0 8px rgba(0,212,255,.4)}

/* Back to top */
.back-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--pri-g);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);font-size:18px;z-index:50}

/* Responsive */
@media(max-width:768px){
  .hero h1{font-size:24px}
  .persona-bar{gap:8px}
  .persona-card{min-width:140px;padding:14px}
  .persona-card .icon{font-size:24px}
  .content{padding:10px}
}
</style>
</head>
<body>
<div class="hero">
  <div style="font-size:12px;color:var(--pri);font-weight:700;margin-bottom:8px;letter-spacing:2px">WHISTLE AI ONBOARDING</div>
  <h1>수출, 어렵지 않습니다</h1>
  <p>역할을 선택하면 해당 기능별 단계별 가이드를 확인할 수 있습니다. 처음 수출하는 분도 쉽게 따라할 수 있도록 만들었습니다.</p>
</div>

<div class="persona-bar" id="persona-bar"></div>
<div class="content" id="content"></div>
<div class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

var currentPersona = 'manufacturer';
var openSections = {};

function selectPersona(id){
  currentPersona = id;
  openSections = {};
  renderPersonaBar();
  renderContent();
  window.scrollTo({top:document.getElementById('content').offsetTop-20,behavior:'smooth'});
}

function toggleSection(idx){
  var key = currentPersona+'-'+idx;
  openSections[key] = !openSections[key];
  renderContent();
}

function renderPersonaBar(){
  var h = '';
  PERSONAS.forEach(function(p){
    h += '<div class="persona-card'+(p.id===currentPersona?' active':'')+'" onclick="selectPersona(\''+p.id+'\')" style="'+(p.id===currentPersona?'border-color:'+p.color+';box-shadow:0 0 20px '+p.color+'20':'')+'">';
    h += '<div class="icon">'+p.icon+'</div>';
    h += '<div class="name">'+p.name+'</div>';
    h += '<div class="desc">'+p.desc+'</div>';
    h += '</div>';
  });
  document.getElementById('persona-bar').innerHTML = h;
}

function renderContent(){
  var guides = GUIDES[currentPersona]||[];
  var persona = PERSONAS.find(function(p){return p.id===currentPersona;});
  var h = '';

  h += '<div style="text-align:center;margin-bottom:24px">';
  h += '<div style="display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:24px;background:'+persona.color+'10;border:1px solid '+persona.color+'30">';
  h += '<span style="font-size:20px">'+persona.icon+'</span>';
  h += '<span style="font-size:15px;font-weight:700;color:'+persona.color+'">'+persona.name+' 온보딩 가이드</span>';
  h += '</div>';
  h += '<div class="progress-bar" style="justify-content:center;margin-top:12px">';
  guides.forEach(function(g,i){
    h += '<div class="dot'+(openSections[currentPersona+'-'+i]?' done':'')+'"></div>';
  });
  h += '</div></div>';

  guides.forEach(function(guide,gi){
    var key = currentPersona+'-'+gi;
    var isOpen = openSections[key];

    h += '<div class="section">';
    h += '<div class="section-h'+(isOpen?' open':'')+'" onclick="toggleSection('+gi+')">';
    h += '<div class="num">'+(gi+1)+'</div>';
    h += '<span style="font-size:18px;margin-right:4px">'+guide.icon+'</span>';
    h += '<div class="title">'+guide.title+'</div>';
    h += '<div class="arrow">▸</div>';
    h += '</div>';
    h += '<div class="section-body"'+(isOpen?' style="display:block"':'')+'>';

    guide.steps.forEach(function(step,si){
      h += '<div class="step">';
      h += '<div class="step-num">'+(si+1)+'</div>';
      h += '<div class="step-content">';
      h += '<div class="step-title">'+step.title+'</div>';
      h += '<div class="step-desc">'+step.desc+'</div>';
      if(step.click){
        h += '<div class="step-action">';
        h += '<div class="click-target"><span style="display:inline-block;width:0;height:0;border-left:6px solid var(--pri);border-top:4px solid transparent;border-bottom:4px solid transparent;margin-right:2px"></span>'+step.click+'</div>';
        h += '</div>';
      }
      h += '</div></div>';
    });

    if(gi===0){
      h += '<div class="tip"><strong>TIP:</strong> 회원가입 후 AI 수출 분석을 3회 무료로 이용할 수 있습니다. URL만 넣으면 맥킨지 수준의 분석 리포트가 생성됩니다.</div>';
    }

    h += '</div></div>';
  });

  /* Quick Links */
  h += '<div style="margin-top:40px;padding:24px;border-radius:var(--r);background:var(--card);border:1px solid var(--bd);text-align:center">';
  h += '<div style="font-size:16px;font-weight:800;margin-bottom:8px">바로 시작하기</div>';
  h += '<div style="font-size:12px;color:var(--w40);margin-bottom:16px">가이드를 읽었으면 직접 사용해보세요</div>';
  h += '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">';
  if(currentPersona==='manufacturer'){
    h += '<a href="whistle-landing.html" class="btn" style="padding:10px 24px;border-radius:10px;background:var(--pri-g);color:var(--bg);font-weight:700;font-size:13px">🏭 제조사 시작하기</a>';
  }else if(currentPersona==='buyer'){
    h += '<a href="buyer-landing.html" class="btn" style="padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,#00E676,#00C853);color:var(--bg);font-weight:700;font-size:13px">🛒 바이어 시작하기</a>';
  }else if(currentPersona==='admin'){
    h += '<a href="admin.html" class="btn" style="padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,#FFB800,#FF8C00);color:var(--bg);font-weight:700;font-size:13px">🛡️ 관리자 접속</a>';
  }else{
    h += '<a href="whistle-landing.html" class="btn" style="padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,#A855F7,#7C3AED);color:#fff;font-weight:700;font-size:13px">🏪 알리바바 대행 시작</a>';
  }
  h += '<a href="index.html" class="btn" style="padding:10px 24px;border-radius:10px;background:var(--w08);color:var(--w70);font-weight:700;font-size:13px;border:1px solid var(--bd)">🏠 메인으로</a>';
  h += '</div></div>';

  /* Footer */
  h += '<div style="margin-top:40px;padding:20px 0;border-top:1px solid var(--bd);text-align:center;font-size:11px;color:var(--w20);line-height:2">';
  h += '<div>(주)모티브이노베이션 | 대표 채희웅</div>';
  h += '<div>사업자등록번호: 956-87-02691 | 통신판매업신고: 제2026-인천미추홀-0123호</div>';
  h += '<div>주소: 인천광역시 미추홀구 학익동 663-1 스파크플러스 | 이메일: contact@whistleai.co.kr</div>';
  h += '</div>';

  document.getElementById('content').innerHTML = h;
}

/* Init */
renderPersonaBar();
renderContent();

/* Open first section by default */
setTimeout(function(){toggleSection(0);},300);
</script>
