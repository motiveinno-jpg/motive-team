const useInView = (th = 0.1) => {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => { const el = ref.current; if (!el) return; if(!window.IntersectionObserver){setV(true);return;} const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: th }); o.observe(el); const t=setTimeout(()=>setV(true),1200); return () => {o.disconnect();clearTimeout(t);}; }, [th]);
  return [ref, v];
};
const Fade = ({ children, delay = 0, style = {} }) => { const [ref, v] = useInView(); return <div ref={ref} style={{ ...style, opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(28px)", transition: `all .8s cubic-bezier(.16,1,.3,1) ${delay}s` }}>{children}</div>; };
const GlowLine = () => <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${T.pri}40, transparent)`, margin: "0 auto", maxWidth: 600 }} />;

    const delays = [2000, 150, 150, 150, 150, 150, 1200, 2000, 2200, 2200, 2200, 3000];

    const run = (s) => {
      if (s === 0) { setStep(0); setTyping(""); charIdx = 0; timer = setTimeout(() => run(1), delays[0]); }
      else if (s >= 1 && s <= 5) { charIdx = s; setTyping(fullText.slice(0, charIdx)); timer = setTimeout(() => run(s + 1), delays[s]); }
      else if (s === 6) { setStep(1); timer = setTimeout(() => run(7), delays[6]); } // click search
      else if (s === 7) { setStep(2); timer = setTimeout(() => run(8), delays[7]); } // loading
      else if (s === 8) { setStep(3); timer = setTimeout(() => run(9), delays[8]); } // results
      else if (s === 9) { setStep(4); timer = setTimeout(() => run(10), delays[9]); } // origin verify
      else if (s === 10) { setStep(5); timer = setTimeout(() => run(11), delays[10]); } // inquiry
      else if (s === 11) { setStep(6); timer = setTimeout(() => run(0), delays[11]); } // connected → loop
    };

/* ═══ AUTO LANGUAGE DETECTION ═══ */
const _SUPPORTED_LANGS = ['en','ko','ja','zh','vi','th','de','fr','es','pt','id','tr','ar'];
const _COUNTRY_LANG_MAP = {
  KR:'ko', JP:'ja', CN:'zh', TW:'zh', HK:'zh', VN:'vi', TH:'th',
  DE:'de', AT:'de', CH:'de', FR:'fr', BE:'fr', ES:'es', MX:'es',
  AR:'es', CO:'es', CL:'es', PE:'es', BR:'pt', PT:'pt',
  ID:'id', TR:'tr', SA:'ar', AE:'ar', EG:'ar', QA:'ar', KW:'ar',
};

function _detectInitialLang() {
  /* Check saved preference first */
  try {
    const saved = localStorage.getItem('whistle_lang');
    if (saved && _SUPPORTED_LANGS.indexOf(saved) !== -1) return saved;
  } catch(e) {}
  /* Check URL param */
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  if (urlLang && _SUPPORTED_LANGS.indexOf(urlLang) !== -1) return urlLang;
  /* Browser language detection */
  const navLang = (navigator.language || navigator.userLanguage || '').toLowerCase().substring(0, 2);
  if (_SUPPORTED_LANGS.indexOf(navLang) !== -1) return navLang;
  return 'en';
}

function App() {
  const [lang, setLang] = useState(_detectInitialLang);
  const [geoDetected, setGeoDetected] = useState(false);

  /* Geo-IP language detection — upgrades browser detection with actual country */
  useEffect(() => {
    if (geoDetected) return;
    /* Skip if user already has a saved preference */
    try { if (localStorage.getItem('whistle_lang')) { setGeoDetected(true); return; } } catch(e) {}
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 3000);
    fetch('https://ipapi.co/json/', { signal: controller.signal })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data || !data.country_code) return;
        const cc = data.country_code.toUpperCase();
        const detected = _COUNTRY_LANG_MAP[cc] || 'en';
        /* Only switch if we have translations for this language */
        if (L[detected] || detected === 'en') {
          setLang(detected);
          try { localStorage.setItem('whistle_lang', detected); } catch(e) {}
        }
      })
      .catch(() => {})
      .finally(() => { clearTimeout(timeout); setGeoDetected(true); });
  }, [geoDetected]);

  useEffect(() => {
    window.__whistleLang = lang;
    document.documentElement.setAttribute('lang', lang);
    if (lang === 'ar') document.documentElement.setAttribute('dir', 'rtl');
    else document.documentElement.removeAttribute('dir');
  }, [lang]);
  const t = L[lang];

  /* Search credit system - multi-key to resist simple localStorage clear */

  function _setSearchCount(n){try{_scKeys.forEach(k=>localStorage.setItem(k,String(n)));try{document.cookie="wsc="+n+";path=/;max-age=86400;SameSite=Lax";}catch{}}catch{}}

      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); const ct = r.headers.get("content-type") || ""; if (!ct.includes("json")) throw new Error("Invalid response"); return r.json(); })

      if (L.en) {
        Object.keys(L.en).forEach(function(k) {
          if (typeof L.en[k] === 'function') {
            ALL_LANGS.forEach(function(lang) {
              if (L[lang] && !L[lang][k]) L[lang][k] = L.en[k];
            });
          }
        });
      }
    }

    /* Detect language and switch */
    var detected = detectLang();
    if (detected === 'en') return; /* Already English by default */
    if (!L || !L[detected]) return;

    var dispatch = findReactSetLang(rootEl);
    if (dispatch) {
      dispatch(detected);
      localStorage.setItem('whistle_lang', detected);
      document.documentElement.setAttribute('lang', detected);
      if (detected === 'ar') document.documentElement.setAttribute('dir', 'rtl');
    }

    /* Add expanded language switcher to nav */
    setTimeout(function() { injectLangSwitcher(dispatch); }, 300);
  }

  /* Replace the 3-button lang switcher with a dropdown supporting all 13 languages */
  function injectLangSwitcher(dispatch) {
    if (!dispatch) return;
    /* Find desktop nav lang switcher containers */
    var containers = document.querySelectorAll('[style*="border-radius"][style*="overflow: hidden"][style*="font-size"]');
    containers.forEach(function(container) {
      var children = container.children;
      if (children.length < 3) return;
      /* Check if this looks like the EN/KO/JA switcher */
      var texts = [];
      for (var i = 0; i < children.length; i++) texts.push((children[i].textContent || '').trim());
      var isLangSwitcher = texts.some(function(t) { return t === 'EN' || t.indexOf('EN') !== -1; }) &&
                           texts.some(function(t) { return t.indexOf('KO') !== -1 || t.indexOf('\uD55C\uAD6D\uC5B4') !== -1; });
      if (!isLangSwitcher) return;

      /* Replace content with a dropdown-style switcher */
      container.style.position = 'relative';
      container.style.cursor = 'pointer';
      container.innerHTML = '';

      var currentLang = window.__whistleLang || detectLang();
      var btn = document.createElement('div');
      btn.style.cssText = 'padding:5px 10px;font-size:11px;font-weight:600;color:rgba(0,212,255,1);display:flex;align-items:center;gap:4px;white-space:nowrap';
      btn.innerHTML = (LANG_FLAGS[currentLang]||'') + ' ' + (currentLang||'EN').toUpperCase() + ' \u25BC';

      var dropdown = document.createElement('div');
      dropdown.style.cssText = 'display:none;position:absolute;top:100%;right:0;background:rgba(6,11,24,.96);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:4px;z-index:999;min-width:130px;max-height:280px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)';

      ALL_LANGS.forEach(function(lang) {
        var item = document.createElement('div');
        item.style.cssText = 'padding:6px 10px;font-size:11px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;border-radius:6px;white-space:nowrap;transition:all .15s';
        item.textContent = (LANG_FLAGS[lang]||'') + ' ' + LANG_LABELS[lang];
        item.onmouseenter = function() { this.style.background = 'rgba(255,255,255,.08)'; this.style.color = '#fff'; };
        item.onmouseleave = function() { this.style.background = 'transparent'; this.style.color = 'rgba(255,255,255,.7)'; };
        item.onclick = function(e) {
          e.stopPropagation();
          dispatch(lang);
          localStorage.setItem('whistle_lang', lang);
          document.documentElement.setAttribute('lang', lang);
          if (lang === 'ar') document.documentElement.setAttribute('dir', 'rtl');
          else document.documentElement.removeAttribute('dir');
          window.__whistleLang = lang;
          btn.innerHTML = (LANG_FLAGS[lang]||'') + ' ' + lang.toUpperCase() + ' \u25BC';
          dropdown.style.display = 'none';
        };
        dropdown.appendChild(item);
      });

      btn.onclick = function(e) {
        e.stopPropagation();
        dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
      };
      document.addEventListener('click', function() { dropdown.style.display = 'none'; });

      container.appendChild(btn);
      container.appendChild(dropdown);
    });
  }

  /* Hide the i18n-detect.js floating switcher since we handle it ourselves */
  var styleEl = document.createElement('style');
  styleEl.textContent = '#lang-switcher { display: none !important; }';
  document.head.appendChild(styleEl);

  /* Start initialization after a short delay for Babel to compile */
  setTimeout(init, 500);
})();
</script>
