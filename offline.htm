<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>오프라인 — Whistle AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#060B18;color:rgba(255,255,255,.7);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-align:center;padding:24px}
.wrap{max-width:440px}
.icon{font-size:64px;margin-bottom:24px;opacity:.8}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#00D4FF,#0088FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:32px;letter-spacing:-0.5px}
h1{font-size:22px;color:#fff;margin-bottom:10px;font-weight:700}
p{font-size:14px;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:28px}
.btn{display:inline-block;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:opacity .2s;cursor:pointer;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);color:#060B18}
.btn:hover{opacity:.85}
.hint{margin-top:20px;font-size:12px;color:rgba(255,255,255,.25)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Whistle AI</div>
  <div class="icon">📡</div>
  <h1 id="title">오프라인 상태입니다</h1>
  <p id="desc">인터넷 연결이 끊겼습니다.<br>연결을 확인한 후 다시 시도해 주세요.</p>
  <button class="btn" onclick="location.reload()" id="btn">다시 시도</button>
  <p class="hint" id="hint">캐시된 페이지는 계속 사용할 수 있습니다.</p>
</div>
<script>
(function(){
  var lang=navigator.language||'ko';
  var isEn=lang.toLowerCase().indexOf('ko')<0;
  if(isEn){
    document.documentElement.lang='en';
    document.getElementById('title').textContent='You\'re offline';
    document.getElementById('desc').innerHTML='No internet connection detected.<br>Please check your network and try again.';
    document.getElementById('btn').textContent='Try again';
    document.getElementById('hint').textContent='Cached pages are still available.';
  }
  window.addEventListener('online',function(){location.reload();});
})();
</script>
</body>
</html>
