<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NARU — Buyer Portal</title>
<meta name="description" content="NARU | Where products cross borders. Find Korean manufacturers and source quality products.">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
<link rel="stylesheet" href="assets/naru.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://js.stripe.com/v3/"></script>
</head>
<body>
<div id="naru-app"></div>

<script src="assets/naru-core.js"></script>
<script>
/**
 * NARU Buyer Portal
 * Product catalog, deal initiation, order management
 */

/* Override: Buyer-specific state */
S.route = 'catalog';
S._buyerProfile = null;
S._catalog = [];
S._buyerDeals = [];
S._buyerOrders = [];

/* Override nav for buyer */
const _origRenderMain = renderMainApp;
renderMainApp = function(container) {
  const navItems = [
    { id: 'catalog', icon: '🔍', label: 'Products' },
    { id: 'deals', icon: '💬', label: 'Deals' },
    { id: 'orders', icon: '📋', label: 'Orders' },
    { id: 'buyer-settings', icon: '⚙️', label: 'Settings' }
  ];

  const nav = navItems.map(n =>
    `<a href="#${n.id}" class="nav-item ${S.route === n.id ? 'active' : ''}" onclick="Router.go('${n.id}')">
      <span class="nav-icon">${n.icon}</span>
      <span class="nav-label">${n.label}</span>
    </a>`
  ).join('');

  container.innerHTML = `
    <div class="app-layout">
      <aside class="app-sidebar">
        <div class="sidebar-logo">NARU</div>
        <nav class="sidebar-nav">${nav}</nav>
        <div class="sidebar-user">
          <div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:2px">${S.company ? UI.trunc(S.company.name, 16) : ''}</div>
          <div style="font-size:11px;color:var(--tx2)">${S.user ? S.user.email : ''}</div>
          <button onclick="Auth.signOut()" style="margin-top:8px;background:none;border:1px solid var(--bd);border-radius:6px;padding:4px 12px;font-size:11px;color:var(--tx2);cursor:pointer">Logout</button>
        </div>
      </aside>
      <main class="app-main" id="naru-main"></main>
    </div>`;

  const main = document.getElementById('naru-main');
  Router.render(main);
};

/* ═══ Catalog: Browse available products ═══ */
Router.register('catalog', function(state) {
  let h = '';

  h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">';
  h += '<h2 style="font-size:20px;font-weight:800;color:#fff;flex:1">Product Catalog</h2>';
  h += '<div style="display:flex;gap:8px">';
  h += '<input id="catalog-search" class="form-input" placeholder="Search products..." style="width:260px" oninput="BuyerApp.searchCatalog(this.value)">';
  h += '<select id="catalog-cat" class="form-input" style="width:160px" onchange="BuyerApp.filterCategory(this.value)">';
  h += '<option value="">All Categories</option>';
  h += '<option value="food">Food & Beverage</option>';
  h += '<option value="beauty">Beauty & Cosmetics</option>';
  h += '<option value="health">Health & Supplements</option>';
  h += '<option value="electronics">Electronics</option>';
  h += '<option value="fashion">Fashion & Apparel</option>';
  h += '<option value="home">Home & Living</option>';
  h += '</select>';
  h += '</div></div>';

  const catalog = state._catalog || [];

  if (catalog.length === 0) {
    h += '<div style="text-align:center;padding:60px 20px">';
    h += '<div style="font-size:48px;margin-bottom:12px">🔍</div>';
    h += '<h3 style="font-size:17px;font-weight:700;color:#fff;margin-bottom:8px">Products coming soon</h3>';
    h += '<p style="font-size:13px;color:var(--tx2);max-width:360px;margin:0 auto">Korean manufacturers are registering their products. Check back soon for export-ready products with AI-verified market analysis.</p>';
    h += '</div>';
  } else {
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">';
    catalog.forEach(p => {
      const analysis = state.analyses.find(a => a.product_id === p.id);
      const score = analysis ? analysis.score : null;

      h += '<div class="card" style="cursor:pointer;overflow:hidden" onclick="BuyerApp.viewProduct(\'' + p.id + '\')">';
      if (p.images && p.images[0]) {
        h += `<img src="${p.images[0]}" style="width:100%;height:180px;object-fit:cover;margin:-20px -20px 16px;width:calc(100% + 40px);border-radius:16px 16px 0 0">`;
      }
      h += `<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px">${p.name}</div>`;
      if (p.category) h += `<div style="font-size:11px;color:var(--tx2);margin-bottom:8px">${p.category}</div>`;
      h += '<div style="display:flex;align-items:center;gap:8px">';
      if (p.fob_price) h += `<span style="font-size:14px;font-weight:700;color:var(--pri)">${UI.usd(p.fob_price)} FOB</span>`;
      if (score) h += `<span style="margin-left:auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:${UI.scoreColor(score)}22;color:${UI.scoreColor(score)}">${score}pts</span>`;
      h += '</div>';
      h += `<button onclick="event.stopPropagation();BuyerApp.startDeal('${p.id}')" class="btn btn-pri btn-sm" style="width:100%;margin-top:12px">Send Inquiry</button>`;
      h += '</div>';
    });
    h += '</div>';
  }

  return h;
});

/* ═══ Deals: Active deals with sellers ═══ */
Router.register('deals', function(state) {
  const deals = state._buyerDeals || [];

  if (deals.length === 0) {
    return UI.empty('💬', 'No active deals',
      'Browse the catalog and send an inquiry to start a deal.',
      'Browse Products', "Router.go('catalog')");
  }

  let h = '';
  h += '<h2 style="font-size:20px;font-weight:800;color:#fff;margin-bottom:20px">My Deals</h2>';

  h += '<div style="display:flex;flex-direction:column;gap:12px">';
  deals.forEach(deal => {
    const stageLabels = { inquiry: 'Inquiry', negotiation: 'Negotiation', sample: 'Sample', order: 'Order', payment: 'Payment', shipping: 'Shipping', completed: 'Completed' };
    const stageColors = { inquiry: 'pri', negotiation: 'ylw', sample: 'acc', order: 'org', payment: 'pri', shipping: 'grn', completed: 'grn' };

    h += `<div class="card" style="cursor:pointer" onclick="BuyerApp.openDealChat('${deal.id}')">`;
    h += '<div style="display:flex;align-items:center;gap:12px">';
    h += '<div style="flex:1">';
    h += `<div style="font-size:14px;font-weight:700;color:#fff">${deal.seller_name || 'Seller'}</div>`;
    h += `<div style="font-size:12px;color:var(--tx2);margin-top:2px">${deal.product_name || ''}</div>`;
    h += '</div>';
    h += UI.badge(stageLabels[deal.stage] || deal.stage, stageColors[deal.stage] || 'default');
    h += `<div style="font-size:11px;color:var(--tx3)">${deal.last_message_at ? UI.ago(deal.last_message_at) : ''}</div>`;
    h += '</div>';
    if (deal.last_message) {
      h += `<div style="font-size:12px;color:var(--tx2);margin-top:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${deal.last_message}</div>`;
    }
    h += '</div>';
  });
  h += '</div>';

  return h;
});

/* ═══ Orders: Confirmed orders ═══ */
Router.register('orders', function(state) {
  const orders = state._buyerOrders || [];

  if (orders.length === 0) {
    return UI.empty('📋', 'No orders yet',
      'Once a deal is confirmed, your orders will appear here.',
      'View Deals', "Router.go('deals')");
  }

  let h = '';
  h += '<h2 style="font-size:20px;font-weight:800;color:#fff;margin-bottom:20px">My Orders</h2>';

  h += '<table class="tbl"><thead><tr>';
  h += '<th>Order #</th><th>Product</th><th>Seller</th><th>Amount</th><th>Status</th><th>Date</th>';
  h += '</tr></thead><tbody>';

  orders.forEach(o => {
    const statusBadge = o.status === 'shipped' ? UI.badge('Shipped', 'grn')
      : o.status === 'paid' ? UI.badge('Paid', 'pri')
      : o.status === 'confirmed' ? UI.badge('Confirmed', 'ylw')
      : UI.badge(o.status || 'Pending', 'default');

    h += '<tr>';
    h += `<td style="font-weight:600;color:#fff">${o.order_number || '-'}</td>`;
    h += `<td>${o.product_name || '-'}</td>`;
    h += `<td>${o.seller_name || '-'}</td>`;
    h += `<td>${o.total_amount ? UI.usd(o.total_amount) : '-'}</td>`;
    h += `<td>${statusBadge}</td>`;
    h += `<td>${UI.date(o.created_at)}</td>`;
    h += '</tr>';
  });

  h += '</tbody></table>';
  return h;
});

/* ═══ Buyer Settings ═══ */
Router.register('buyer-settings', function(state) {
  const c = state.company || {};
  let h = '';

  h += '<h2 style="font-size:20px;font-weight:800;color:#fff;margin-bottom:20px">Settings</h2>';

  h += '<div class="card" style="max-width:600px">';
  h += '<div class="card-header"><div class="card-title">Company Profile</div></div>';
  h += '<form id="buyer-profile-form" onsubmit="BuyerApp.saveProfile(event)">';

  h += '<div class="form-group"><label class="form-label">Company Name</label>';
  h += `<input name="name" class="form-input" value="${c.name || ''}" required></div>`;

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
  h += '<div class="form-group"><label class="form-label">Country</label>';
  h += `<input name="country" class="form-input" value="${c.country || ''}" placeholder="e.g., United States"></div>`;
  h += '<div class="form-group"><label class="form-label">Phone</label>';
  h += `<input name="phone" class="form-input" value="${c.phone || ''}"></div>`;
  h += '</div>';

  h += '<div class="form-group"><label class="form-label">Address</label>';
  h += `<input name="address" class="form-input" value="${c.address || ''}"></div>`;

  h += '<div class="form-group"><label class="form-label">Industry</label>';
  h += '<select name="industry" class="form-input">';
  ['', 'Retail', 'Wholesale', 'Distribution', 'E-commerce', 'Manufacturing', 'Import/Export', 'Other'].forEach(v => {
    h += `<option value="${v}" ${c.industry === v ? 'selected' : ''}>${v || 'Select...'}</option>`;
  });
  h += '</select></div>';

  h += '<button type="submit" class="btn btn-pri" style="margin-top:8px">Save</button>';
  h += '</form></div>';

  return h;
});

/* ═══ Buyer App Logic ═══ */
const BuyerApp = {
  async loadCatalog() {
    // Load published products (visible to buyers)
    const { data } = await sb.from('products')
      .select('*, companies(name)')
      .in('status', ['matching', 'dealing', 'documenting'])
      .order('created_at', { ascending: false })
      .limit(100);
    S._catalog = (data || []).map(p => ({ ...p, seller_name: p.companies?.name }));
  },

  async loadDeals() {
    if (!S.company) return;
    const { data } = await sb.from('matchings')
      .select('*')
      .eq('buyer_company_id', S.company.id)
      .order('last_message_at', { ascending: false, nullsFirst: false });
    S._buyerDeals = data || [];
  },

  async loadOrders() {
    if (!S.company) return;
    const { data } = await sb.from('orders')
      .select('*')
      .eq('buyer_company_id', S.company.id)
      .order('created_at', { ascending: false });
    S._buyerOrders = data || [];
  },

  searchCatalog(query) {
    // Client-side filter
    const el = document.getElementById('naru-main');
    // Simple re-render — in production, use server-side search
    notify();
  },

  viewProduct(pid) {
    const p = S._catalog.find(x => x.id === pid);
    if (!p) return;

    let body = '';
    if (p.images && p.images[0]) {
      body += `<img src="${p.images[0]}" style="width:100%;max-height:250px;object-fit:cover;border-radius:var(--radius);margin-bottom:16px">`;
    }
    body += `<h3 style="font-size:18px;font-weight:800;color:#fff;margin-bottom:8px">${p.name}</h3>`;
    if (p.category) body += `<div style="font-size:12px;color:var(--tx2);margin-bottom:8px">Category: ${p.category}</div>`;
    if (p.seller_name) body += `<div style="font-size:12px;color:var(--tx2);margin-bottom:8px">Seller: ${p.seller_name}</div>`;
    if (p.fob_price) body += `<div style="font-size:20px;font-weight:800;color:var(--pri);margin-bottom:16px">${UI.usd(p.fob_price)} <span style="font-size:12px;font-weight:400;color:var(--tx2)">FOB</span></div>`;

    body += `<button onclick="BuyerApp.startDeal('${pid}');document.querySelectorAll('[id^=naru-modal]').forEach(el=>el.remove())" class="btn btn-pri" style="width:100%">Send Inquiry</button>`;

    UI.modal('Product Details', body, { width: '560px' });
  },

  async startDeal(productId) {
    if (!S.company) {
      UI.toast('Please complete your company profile first.', 'warn');
      Router.go('buyer-settings');
      return;
    }

    const p = S._catalog.find(x => x.id === productId);
    if (!p) return;

    const ok = await UI.confirm(`Send an inquiry for "${p.name}"?\n\nThe seller will be notified and you can start negotiating.`);
    if (!ok) return;

    // Create matching record
    const { data: deal, error } = await sb.from('matchings').insert({
      product_id: productId,
      seller_company_id: p.company_id,
      buyer_company_id: S.company.id,
      buyer_name: S.company.name,
      buyer_country: S.company.country,
      stage: 'inquiry',
      last_message: 'New inquiry from ' + S.company.name,
      last_message_at: new Date().toISOString()
    }).select().single();

    if (error) {
      UI.toast('문의 전송 실패: ' + UI.err(error), 'error');
      return;
    }

    // Send initial message
    await sb.from('messages').insert({
      matching_id: deal.id,
      sender_id: S.user.id,
      sender_name: S.company.name,
      content: `Hello, I'm interested in "${p.name}". Could you provide more details about pricing and MOQ?`,
      type: 'text'
    });

    UI.toast('Inquiry sent! Check your deals.', 'success');
    await BuyerApp.loadDeals();
    Router.go('deals');
    notify();
  },

  openDealChat(dealId) {
    // Navigate to simple chat view (reuse Chat module pattern)
    UI.toast('Opening chat...', 'info');
    // For buyer, use a simplified chat modal
    BuyerApp._showChatModal(dealId);
  },

  async _showChatModal(dealId) {
    const { data: messages } = await sb.from('messages')
      .select('*')
      .eq('matching_id', dealId)
      .order('created_at', { ascending: true })
      .limit(200);

    let body = '';

    // Messages
    body += '<div style="max-height:400px;overflow-y:auto;margin-bottom:16px;display:flex;flex-direction:column;gap:8px" id="buyer-chat-msgs">';
    (messages || []).forEach(msg => {
      const isMine = msg.sender_id === S.user?.id;
      body += `<div style="display:flex;${isMine ? 'justify-content:flex-end' : 'justify-content:flex-start'}">`;
      body += `<div style="max-width:70%;padding:10px 14px;border-radius:${isMine ? '14px 14px 4px 14px' : '14px 14px 14px 4px'};background:${isMine ? 'var(--pri)' : 'var(--s2)'};color:${isMine ? '#000' : '#fff'};font-size:13px">`;
      body += msg.content || '';
      body += '</div></div>';
    });
    body += '</div>';

    // Input
    body += '<div style="display:flex;gap:8px">';
    body += `<input id="buyer-chat-input" class="form-input" placeholder="Type a message..." style="flex:1" onkeydown="if(event.key==='Enter'){BuyerApp._sendMsg('${dealId}');event.preventDefault()}">`;
    body += `<button onclick="BuyerApp._sendMsg('${dealId}')" class="btn btn-pri btn-sm">Send</button>`;
    body += '</div>';

    UI.modal('Chat', body, { width: '600px' });

    // Scroll to bottom
    setTimeout(() => {
      const el = document.getElementById('buyer-chat-msgs');
      if (el) el.scrollTop = el.scrollHeight;
    }, 100);
  },

  async _sendMsg(dealId) {
    const input = document.getElementById('buyer-chat-input');
    const content = input?.value?.trim();
    if (!content) return;
    input.value = '';

    await sb.from('messages').insert({
      matching_id: dealId,
      sender_id: S.user.id,
      sender_name: S.company?.name || S.user.email,
      content,
      type: 'text'
    });

    await sb.from('matchings').update({
      last_message: content,
      last_message_at: new Date().toISOString()
    }).eq('id', dealId);

    // Refresh chat
    BuyerApp._showChatModal(dealId);
  },

  async saveProfile(e) {
    e.preventDefault();
    const f = e.target;
    const data = {
      name: f.name.value.trim(),
      country: f.country.value.trim(),
      phone: f.phone.value.trim(),
      address: f.address.value.trim(),
      industry: f.industry.value,
      type: 'buyer'
    };

    if (S.company) {
      const { error } = await sb.from('companies').update(data).eq('id', S.company.id);
      if (error) { UI.toast('저장 실패: ' + UI.err(error), 'error'); return; }
      Object.assign(S.company, data);
    } else {
      const { data: company, error } = await sb.from('companies').insert(data).select().single();
      if (error) { UI.toast('저장 실패: ' + UI.err(error), 'error'); return; }
      await sb.from('users').update({ company_id: company.id }).eq('id', S.user.id);
      S.company = company;
    }
    UI.toast('저장되었습니다!', 'success');
    notify();
  }
};

/* ═══ Init buyer-specific data loading ═══ */
const _origLoadProfile = Auth.loadProfile;
Auth.loadProfile = async function() {
  await _origLoadProfile.call(Auth);
  await BuyerApp.loadCatalog();
  await BuyerApp.loadDeals();
  await BuyerApp.loadOrders();
};

window.BuyerApp = BuyerApp;
</script>
</body>
</html>
