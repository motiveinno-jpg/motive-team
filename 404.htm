<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Not Found — Whistle AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a1a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-align:center;padding:24px}
.wrap{max-width:480px}
.code{font-size:96px;font-weight:800;background:linear-gradient(135deg,#4f8cff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
h1{font-size:22px;margin:16px 0 8px;color:#fff}
p{font-size:14px;color:#999;line-height:1.6;margin-bottom:24px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{display:inline-block;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:opacity .2s}
.pri{background:linear-gradient(135deg,#4f8cff,#6366f1);color:#fff}
.sec{background:rgba(255,255,255,.06);color:#ccc;border:1px solid rgba(255,255,255,.1)}
a:hover{opacity:.85}
</style>
</head>
<body>
<div class="wrap">
<div class="code">404</div>
<h1>Page Not Found</h1>
<p>The page you're looking for doesn't exist or has been moved.</p>
<div class="btns">
<a href="/" class="pri">Go Home</a>
<a href="/app" class="sec">Manufacturer Portal</a>
<a href="/app/buyer" class="sec">Buyer Portal</a>
</div>
</div>
<script>
(function(){
var t={ko:{h:'페이지를 찾을 수 없습니다',p:'요청하신 페이지가 존재하지 않거나 이동되었습니다.',home:'홈으로',mfr:'제조사 포탈',buyer:'바이어 포탈'},
ja:{h:'ページが見つかりません',p:'お探しのページは存在しないか、移動されました。',home:'ホームへ',mfr:'メーカーポータル',buyer:'バイヤーポータル'},
zh:{h:'页面未找到',p:'您访问的页面不存在或已被移动。',home:'返回首页',mfr:'制造商门户',buyer:'买家门户'},
vi:{h:'Không tìm thấy trang',p:'Trang bạn tìm kiếm không tồn tại hoặc đã được di chuyển.',home:'Trang chủ',mfr:'Cổng nhà sản xuất',buyer:'Cổng người mua'},
th:{h:'ไม่พบหน้า',p:'หน้าที่คุณกำลังมองหาไม่มีอยู่หรือถูกย้ายแล้ว',home:'หน้าแรก',mfr:'พอร์ทัลผู้ผลิต',buyer:'พอร์ทัลผู้ซื้อ'},
de:{h:'Seite nicht gefunden',p:'Die gesuchte Seite existiert nicht oder wurde verschoben.',home:'Startseite',mfr:'Hersteller-Portal',buyer:'Käufer-Portal'},
fr:{h:'Page introuvable',p:'La page que vous recherchez n\'existe pas ou a été déplacée.',home:'Accueil',mfr:'Portail fabricant',buyer:'Portail acheteur'},
es:{h:'Página no encontrada',p:'La página que busca no existe o ha sido movida.',home:'Inicio',mfr:'Portal fabricante',buyer:'Portal comprador'}};
var l=(navigator.language||'en').split('-')[0];
var d=t[l];if(!d)return;
var h1=document.querySelector('h1');if(h1)h1.textContent=d.h;
var p=document.querySelector('p');if(p)p.textContent=d.p;
var a=document.querySelectorAll('a');
if(a[0])a[0].textContent=d.home;
if(a[1])a[1].textContent=d.mfr;
if(a[2])a[2].textContent=d.buyer;
})();
</script>
</body>
</html>
