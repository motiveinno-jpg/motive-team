  .section-padding{padding:60px 16px!important}

  #root [style*="padding: 80px"]{padding:48px 16px!important}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  bg: "#060B18", bgCard: "#0D1424", bgSurface: "#111B2E",
  navy: "#0A1628", deep: "#070E1B",
  pri: "#00D4FF", priG: "linear-gradient(135deg,#00D4FF,#0088FF)",
  acc: "#FFB800", accG: "linear-gradient(135deg,#FFB800,#FF8C00)",
  ok: "#00E676", err: "#FF5252",
  purple: "#A855F7", purpleG: "linear-gradient(135deg,#A855F7,#6D28D9)",
  w: "#FFFFFF", w90: "rgba(255,255,255,.9)", w60: "rgba(255,255,255,.6)",
  w40: "rgba(255,255,255,.4)", w20: "rgba(255,255,255,.2)", w08: "rgba(255,255,255,.06)",
  w12: "rgba(255,255,255,.1)",
  border: "rgba(255,255,255,.08)", borderL: "rgba(255,255,255,.15)",
  glow: "0 0 40px rgba(0,212,255,.15)", glowAcc: "0 0 40px rgba(255,184,0,.12)",
  card: "0 4px 24px rgba(0,0,0,.4)",
};

const useInView = (th = 0.1) => {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => { const el = ref.current; if (!el) return; if(!window.IntersectionObserver){setV(true);return;} const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: th }); o.observe(el); const t=setTimeout(()=>setV(true),1200); return () => {o.disconnect();clearTimeout(t);}; }, [th]);
  return [ref, v];
};
const Fade = ({ children, delay = 0, style = {} }) => { const [ref, v] = useInView(); return <div ref={ref} style={{ ...style, opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(28px)", transition: `all .8s cubic-bezier(.16,1,.3,1) ${delay}s` }}>{children}</div>; };
const GlowLine = () => <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${T.pri}40, transparent)`, margin: "0 auto", maxWidth: 600 }} />;

const CATEGORIES = [
  { icon: "💄", name: "Beauty & Cosmetics", desc: "K-Beauty, skincare, hair care" },
  { icon: "🍜", name: "Food & Beverage", desc: "Health foods, snacks, beverages" },
  { icon: "⚡", name: "Electronics", desc: "Components, devices, accessories" },
  { icon: "👕", name: "Textiles & Fashion", desc: "Fabrics, apparel, accessories" },
  { icon: "🌿", name: "Health & Wellness", desc: "Supplements, vitamins, wellness products" },
  { icon: "🏭", name: "Industrial", desc: "Machinery, auto parts, materials" },
];

const PAIN_POINTS = [
  {
    problem: "Searching through thousands of listings on Alibaba",
    solution: "Tell our AI what you need in plain language — get matched with verified manufacturers instantly",
    icon: "🔍"
  },
  {
    problem: "No idea what the total landed cost will be",
    solution: "AI calculates HS code, tariffs, FTA benefits, shipping — see your real cost before you commit",
    icon: "💰"
  },
  {
    problem: "Worried about scams and quality issues",
    solution: "AI-verified manufacturers + Stripe-secured payments + full transaction history",
    icon: "🛡️"
  },
  {
    problem: "Language barriers with manufacturers",
    solution: "AI translates your conversations in real-time — negotiate naturally in your language",
    icon: "💬"
  },
];

const STEPS = [
  { num: "01", title: "Describe", desc: "Tell us what you're looking for — product type, quantity, budget, destination country.", color: T.pri },
  { num: "02", title: "Match", desc: "Our AI finds verified manufacturers that match your requirements and calculates total landed cost.", color: T.acc },
  { num: "03", title: "Connect", desc: "Chat directly with manufacturers using AI translation. Request samples, negotiate terms.", color: T.ok },
  { num: "04", title: "Trade", desc: "Secure payment via Stripe. Track your order from factory to doorstep.", color: T.purple },
];

function App() {
  const [scrollY, setScrollY] = useState(0);
  const [mobileMenu, setMobileMenu] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");

  useEffect(() => { const h = () => setScrollY(window.scrollY); window.addEventListener("scroll", h, { passive: true }); return () => window.removeEventListener("scroll", h); }, []);

  const s = {
    section: { padding: "100px 24px", maxWidth: 1140, margin: "0 auto" },
    heading: { fontSize: 40, fontWeight: 800, color: T.w, letterSpacing: -1.5, lineHeight: 1.2, textAlign: "center" },
    sub: { fontSize: 17, color: T.w60, textAlign: "center", marginTop: 14, lineHeight: 1.7, maxWidth: 640, margin: "14px auto 0" },
    card: { background: T.bgCard, borderRadius: 16, border: `1px solid ${T.border}`, overflow: "hidden" },
    btn: (v = "pri") => ({ display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "14px 32px", borderRadius: 12, fontFamily: "inherit", fontSize: 15, fontWeight: 700, cursor: "pointer", border: "none", transition: "all .25s",
      ...(v === "pri" ? { background: T.priG, color: T.bg, boxShadow: T.glow } : v === "acc" ? { background: T.accG, color: T.bg, boxShadow: T.glowAcc } : { background: "transparent", color: T.w, border: `1.5px solid ${T.borderL}` }) }),
    tag: (c) => ({ display: "inline-block", padding: "4px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, background: `${c}12`, color: c, border: `1px solid ${c}25` }),
  };

  const Logo = ({ size = 26 }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ width: size + 8, height: size + 8, borderRadius: 10, background: T.priG, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 0 20px rgba(0,212,255,.3)" }}>
        <svg width={size * 0.6} height={size * 0.6} viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill={T.bg} /></svg>
      </div>
      <div><div style={{ fontSize: size * 0.65, fontWeight: 800, color: T.w, letterSpacing: -1 }}>Whistle AI</div><div style={{ fontSize: size * 0.33, color: T.w20, fontWeight: 500, letterSpacing: 2, marginTop: -2 }}>GLOBAL SOURCING</div></div>
    </div>
  );

  const goSignup = () => { window.location.href = "/app/buyer?lang=en"; };
  const goSearch = () => { window.location.href = "/app/buyer?lang=en&q=" + encodeURIComponent(searchQuery); };
  const scrollTo = (id) => { setMobileMenu(false); setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: "smooth" }), 100); };

  const navItems = [
    { label: "How It Works", action: () => scrollTo("howitworks") },
    { label: "Features", action: () => scrollTo("features") },
    { label: "Categories", action: () => scrollTo("categories") },
  ];

  /* ═══ HEADER ═══ */
  const header = (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, background: scrollY > 50 ? "rgba(6,11,24,.92)" : "transparent", backdropFilter: scrollY > 50 ? "blur(16px)" : "none", borderBottom: scrollY > 50 ? `1px solid ${T.border}` : "1px solid transparent", transition: "all .35s" }}>
      <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 24px", height: 64, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <Logo size={22} />
        <div className="nav-desktop" style={{ display: "flex", alignItems: "center", gap: 28 }}>
          {navItems.map((n, i) => <div key={i} onClick={n.action} style={{ fontSize: 13, color: T.w60, cursor: "pointer", fontWeight: 500, transition: "color .2s" }}>{n.label}</div>)}
          <div onClick={() => { window.location.href = "/ko"; }} style={{ fontSize: 13, color: T.w40, cursor: "pointer", fontWeight: 500 }}>For Manufacturers</div>
          <div onClick={goSignup} style={{ ...s.btn("pri"), padding: "10px 24px", fontSize: 13 }}>Start Free</div>
        </div>
        <div className="mobile-cta" onClick={() => setMobileMenu(!mobileMenu)} style={{ display: "none", cursor: "pointer", padding: 8 }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d={mobileMenu ? "M18 6L6 18M6 6l12 12" : "M3 12h18M3 6h18M3 18h18"} stroke={T.w} strokeWidth="2" strokeLinecap="round" /></svg>
        </div>
      </div>
      {mobileMenu && <div style={{ background: "rgba(6,11,24,.98)", padding: "16px 24px", borderTop: `1px solid ${T.border}` }}>
        {navItems.map((n, i) => <div key={i} onClick={n.action} style={{ padding: "12px 0", fontSize: 14, color: T.w60, cursor: "pointer", borderBottom: `1px solid ${T.border}` }}>{n.label}</div>)}
        <div onClick={goSignup} style={{ ...s.btn("pri"), width: "100%", marginTop: 16, textAlign: "center" }}>Start Free</div>
      </div>}
    </div>
  );

  /* ═══ HERO — AI Search Bar ═══ */
  const hero = (
    <div style={{ padding: "140px 24px 80px", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at 50% 0%, rgba(0,212,255,.08) 0%, transparent 60%)" }} />
      <div style={{ maxWidth: 800, margin: "0 auto", textAlign: "center", position: "relative", zIndex: 1 }}>
        <Fade>
          <div style={{ ...s.tag(T.ok), marginBottom: 8 }}>Free to Use for Buyers</div>
        </Fade>
        <Fade delay={0.1}>
          <h1 className="hero-heading" style={{ fontSize: 48, fontWeight: 800, color: T.w, letterSpacing: -2, lineHeight: 1.15, marginTop: 16 }}>
            Find the right manufacturer<br />in <span style={{ background: T.priG, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>minutes, not months</span>
          </h1>
        </Fade>
        <Fade delay={0.2}>
          <p className="hero-sub" style={{ fontSize: 17, color: T.w60, lineHeight: 1.7, marginTop: 20, maxWidth: 600, margin: "20px auto 0" }}>
            AI-powered sourcing platform. Describe what you need, get matched with verified manufacturers, and see your total landed cost — instantly.
          </p>
        </Fade>
        <Fade delay={0.3}>
          <div className="hero-search-box" style={{ display: "flex", gap: 0, marginTop: 36, maxWidth: 600, margin: "36px auto 0", background: T.bgCard, borderRadius: 14, border: `1.5px solid ${T.borderL}`, overflow: "hidden", boxShadow: "0 8px 32px rgba(0,0,0,.4)" }}>
            <input
              type="text"
              placeholder="e.g. I need organic skincare products, 500 units, shipping to Dubai..."
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter" && searchQuery.trim()) goSearch(); }}
              style={{ flex: 1, minWidth: 200, padding: "16px 20px", background: "transparent", border: "none", color: T.w90, fontSize: 14, fontFamily: "inherit", outline: "none" }}
            />
            <div onClick={() => searchQuery.trim() ? goSearch() : goSignup()} style={{ padding: "16px 28px", background: T.priG, color: T.bg, fontWeight: 700, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap" }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke={T.bg} strokeWidth="2.5" strokeLinecap="round"/></svg>
              Find Manufacturers
            </div>
          </div>
        </Fade>
        <Fade delay={0.4}>
          <div style={{ display: "flex", justifyContent: "center", gap: 24, marginTop: 32, flexWrap: "wrap" }}>
            {["K-Beauty", "Electronics", "Food & Beverage", "Textiles", "Health"].map((cat, i) => (
              <div key={i} onClick={goSignup} style={{ padding: "6px 14px", borderRadius: 8, background: T.w08, border: `1px solid ${T.border}`, color: T.w40, fontSize: 12, cursor: "pointer", transition: "all .2s" }}>{cat}</div>
            ))}
          </div>
        </Fade>
        <Fade delay={0.5}>
          <div style={{ display: "flex", justifyContent: "center", gap: 32, marginTop: 48, flexWrap: "wrap" }}>
            {[["AI", "Powered Matching"], ["Stripe", "Secure Payments"], ["Free", "For All Buyers"], ["Asia+", "Expanding Globally"]].map(([v, l], i) => (
              <div key={i} style={{ textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 800, background: T.priG, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{v}</div>
                <div style={{ fontSize: 12, color: T.w40, marginTop: 4 }}>{l}</div>
              </div>
            ))}
          </div>
        </Fade>
      </div>
    </div>
  );

  /* ═══ PAIN POINTS — Why Whistle ═══ */
  const painSection = (
    <div id="features" style={{ ...s.section, padding: "80px 24px" }}>
      <Fade><h2 style={s.heading}>What makes Whistle AI different?</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>We solve the real problems buyers face in international sourcing.</p></Fade>
      <div style={{ display: "flex", flexDirection: "column", gap: 20, marginTop: 56, maxWidth: 800, margin: "56px auto 0" }}>
        {PAIN_POINTS.map((p, i) => (
          <Fade key={i} delay={i * 0.1}>
            <div style={{ ...s.card, padding: 28, display: "flex", gap: 20, alignItems: "flex-start" }}>
              <div style={{ fontSize: 32, flexShrink: 0, marginTop: 4 }}>{p.icon}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, color: T.err, fontWeight: 600, marginBottom: 6, textDecoration: "line-through", opacity: 0.7 }}>{p.problem}</div>
                <div style={{ fontSize: 15, color: T.w90, fontWeight: 600, lineHeight: 1.6 }}>{p.solution}</div>
              </div>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ HOW IT WORKS ═══ */
  const howSection = (
    <div id="howitworks" style={s.section}>
      <Fade><h2 style={s.heading}>How It Works</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>From idea to delivery — source globally in 4 simple steps.</p></Fade>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 24, marginTop: 56 }}>
        {STEPS.map((step, i) => (
          <Fade key={i} delay={i * 0.1}>
            <div style={{ ...s.card, padding: 32, position: "relative" }}>
              <div style={{ fontSize: 48, fontWeight: 800, color: `${step.color}15`, position: "absolute", top: 16, right: 24 }}>{step.num}</div>
              <div style={{ width: 44, height: 44, borderRadius: 12, background: `${step.color}15`, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
                <div style={{ width: 10, height: 10, borderRadius: 5, background: step.color }} />
              </div>
              <h3 style={{ fontSize: 20, fontWeight: 700, color: T.w, marginBottom: 10 }}>{step.title}</h3>
              <p style={{ fontSize: 14, color: T.w60, lineHeight: 1.7 }}>{step.desc}</p>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ AI SUPERPOWERS — What Alibaba Can't Do ═══ */
  const aiSection = (
    <div style={{ ...s.section, padding: "80px 24px" }}>
      <Fade><h2 style={s.heading}>AI superpowers for global trade</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>Tools that traditional sourcing platforms don't have.</p></Fade>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20, marginTop: 56 }}>
        {[
          { icon: "🏷️", title: "AI HS Code Classification", desc: "Automatically classify any product into the correct HS code. No customs broker needed for basic classification." },
          { icon: "📊", title: "Landed Cost Calculator", desc: "FOB + shipping + tariff + insurance = total cost to your door. Know your real cost before you commit." },
          { icon: "🌐", title: "FTA Optimization", desc: "Check FTA eligibility to potentially save on import duties. Available on select trade routes." },
          { icon: "💬", title: "AI Translation", desc: "Chat with manufacturers in your language. AI translates messages in real-time for natural conversation." },
          { icon: "🛡️", title: "Manufacturer Verification", desc: "AI analyzes manufacturer credentials, export history, and product data to give you a trust score." },
          { icon: "📄", title: "Trade Documents", desc: "Generate PI, CI, PL, CO and other export documents. Reduce paperwork hours to minutes." },
        ].map((f, i) => (
          <Fade key={i} delay={i * 0.08}>
            <div style={{ ...s.card, padding: 28, height: "100%" }}>
              <div style={{ fontSize: 28, marginBottom: 14 }}>{f.icon}</div>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: T.w, marginBottom: 8 }}>{f.title}</h3>
              <p style={{ fontSize: 13, color: T.w60, lineHeight: 1.7 }}>{f.desc}</p>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ CATEGORIES ═══ */
  const categoriesSection = (
    <div id="categories" style={s.section}>
      <Fade><h2 style={s.heading}>Product Categories</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>Starting with Korea's premium manufacturers — expanding across Asia and beyond.</p></Fade>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginTop: 48 }}>
        {CATEGORIES.map((c, i) => (
          <Fade key={i} delay={i * 0.06}>
            <div onClick={goSignup} style={{ ...s.card, padding: 24, cursor: "pointer", transition: "all .2s" }}>
              <div style={{ fontSize: 36, marginBottom: 12 }}>{c.icon}</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: T.w, marginBottom: 4 }}>{c.name}</div>
              <div style={{ fontSize: 13, color: T.w40 }}>{c.desc}</div>
            </div>
          </Fade>
        ))}
      </div>
      <Fade delay={0.4}>
        <div style={{ textAlign: "center", marginTop: 24 }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "8px 16px", borderRadius: 8, background: T.w08 }}>
            {["🇰🇷"].map((f, i) => <span key={i} style={{ fontSize: 18 }}>{f}</span>)}
            <span style={{ fontSize: 12, color: T.w, fontWeight: 600 }}>Your gateway to premium Korean manufacturers</span>
            <span style={{ fontSize: 11, color: T.w40 }}>K-Beauty · K-Food · K-Tech · K-Culture</span>
          </div>
        </div>
      </Fade>
    </div>
  );

  /* ═══ PAYMENT SECURITY ═══ */
  const paymentSection = (
    <div style={{ ...s.section, padding: "80px 24px" }}>
      <Fade><h2 style={s.heading}>Safe and secure payments</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>All payments processed through Stripe. Your money is protected.</p></Fade>
      <div className="grid-responsive" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20, marginTop: 48 }}>
        {[
          { icon: "🔐", title: "Stripe-Powered", desc: "PCI DSS Level 1 compliant payment processing. The same infrastructure used by Amazon, Google, and Shopify." },
          { icon: "💳", title: "Payment Protection", desc: "Funds are processed securely. Track every transaction with full transparency and dispute support." },
          { icon: "🌍", title: "Global Currencies", desc: "Pay in USD, EUR, GBP, JPY, KRW, and more. Automatic currency conversion at competitive rates." },
        ].map((p, i) => (
          <Fade key={i} delay={i * 0.1}>
            <div style={{ ...s.card, padding: 28, textAlign: "center" }}>
              <div style={{ fontSize: 32, marginBottom: 12 }}>{p.icon}</div>
              <h4 style={{ fontSize: 16, fontWeight: 700, color: T.w, marginBottom: 8 }}>{p.title}</h4>
              <p style={{ fontSize: 13, color: T.w40, lineHeight: 1.7 }}>{p.desc}</p>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ FREE FOR BUYERS ═══ */
  const freeSection = (
    <div style={{ ...s.section, padding: "80px 24px" }}>
      <div style={{ ...s.card, padding: 48, maxWidth: 800, margin: "0 auto", textAlign: "center", border: `1px solid ${T.ok}30`, background: `linear-gradient(135deg, ${T.bgCard}, rgba(0,230,118,.03))` }}>

          <div style={{ fontSize: 48, marginBottom: 16 }}>🎉</div>
          <h2 style={{ fontSize: 32, fontWeight: 800, color: T.w, marginBottom: 12 }}>Free to Use for Buyers</h2>
          <p style={{ fontSize: 16, color: T.w60, lineHeight: 1.8, maxWidth: 500, margin: "0 auto 24px" }}>
            Search manufacturers, request quotes, chat with suppliers, use AI tools — free to use. We earn a commission (3-5%) only when a deal is successfully completed. No deal = no fee.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, maxWidth: 360, margin: "0 auto 32px" }}>

          </div>

        </Fade>
      </div>
    </div>
  );

  const ctaSection = (
    <div style={{ padding: "80px 24px", position: "relative" }}>

        <p style={{ fontSize: 14, color: T.w40, marginBottom: 32, lineHeight: 1.7 }}>Join buyers using AI to find the best manufacturers. Starting with Korea's finest — expanding worldwide.</p>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
          <div onClick={goSignup} style={s.btn("pri")}>Sign Up Free</div>
          <div onClick={() => { window.location.href = "/ko"; }} style={s.btn("ghost")}>I'm a Manufacturer</div>
        </div>
      </div>
    </div>
  );

  /* ═══ FOOTER ═══ */
  const footer = (
    <div style={{ background: T.deep, borderTop: `1px solid ${T.border}`, padding: "40px 24px 24px" }}>
      <div className="footer-flex" style={{ maxWidth: 1140, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 24 }}>
        <div>
          <Logo size={22} />
          <div style={{ fontSize: 11, color: T.w20, lineHeight: 1.8, marginTop: 10 }}>
            MOTIVE Global, Inc.<br />
            AI-Powered Global Sourcing Platform<br />
            Contact: creative@mo-tive.com
          </div>
        </div>
        <div className="footer-links" style={{ display: "flex", gap: 32 }}>
          {[
            ["Platform", [["How It Works", () => scrollTo("howitworks")], ["Features", () => scrollTo("features")], ["Categories", () => scrollTo("categories")]]],
            ["For Buyers", [["Sign Up", goSignup], ["Buyer Portal", () => { window.location.href = "/app/buyer"; }]]],
            ["For Manufacturers", [["Seller Portal", () => { window.location.href = "/ko"; }], ["Export Tools", () => { window.location.href = "/app"; }]]],
            ["Legal", [["Terms of Service", () => { window.open("/terms/en", "_blank"); }], ["Privacy Policy", () => { window.open("/privacy/en", "_blank"); }], ["Refund Policy", () => { window.open("/refund/en", "_blank"); }]]],
          ].map(([ft, links], i) => (
            <div key={i}>
              <div style={{ fontSize: 12, fontWeight: 700, color: T.w20, marginBottom: 8 }}>{ft}</div>
              {links.map(([l, a], j) => <div key={j} onClick={a} style={{ fontSize: 12, color: T.w40, cursor: "pointer", marginBottom: 4 }}>{l}</div>)}
            </div>
          ))}
        </div>
      </div>
      <div style={{ maxWidth: 1140, margin: "0 auto", borderTop: `1px solid ${T.border}`, marginTop: 24, paddingTop: 16, display: "flex", justifyContent: "space-between", fontSize: 11, color: T.w20, flexWrap: "wrap", gap: 8 }}>
        <span>&copy; 2026 MOTIVE Global, Inc. All rights reserved.</span>
        <span>Whistle AI &middot; AI-Powered Global Sourcing</span>
      </div>
    </div>
  );

  /* ═══ RENDER ═══ */
  return (
    <div style={{ fontFamily: "'Sora','Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", background: T.bg, color: T.w, minHeight: "100vh" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}a{text-decoration:none}
        button{cursor:pointer;font-family:inherit}select,input,textarea{font-family:inherit}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:${T.bg}}::-webkit-scrollbar-thumb{background:${T.w12};border-radius:3px}
        input::placeholder{color:rgba(255,255,255,.3)}
      `}</style>
      {header}
      {hero}
      {painSection}
      <GlowLine />
      {howSection}
      {aiSection}
      <GlowLine />
      {categoriesSection}
      {paymentSection}
      <GlowLine />
      {freeSection}
      {ctaSection}
      {footer}
      {/* Cookie Consent */}
      {!localStorage.getItem('whistle_cookie_ok') && (
        <div id="cookie-banner" style={{position:'fixed',bottom:0,left:0,right:0,padding:'14px 24px',background:'rgba(6,11,24,.96)',borderTop:'1px solid rgba(255,255,255,.08)',display:'flex',alignItems:'center',justifyContent:'center',gap:16,zIndex:9999,backdropFilter:'blur(12px)',flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'rgba(255,255,255,.6)',maxWidth:600}}>We use cookies to improve your experience. By continuing, you agree to our <a href="/privacy/en" target="_blank" style={{color:'#00d4ff',textDecoration:'underline'}}>Privacy Policy</a>.</span>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>{localStorage.setItem('whistle_cookie_ok','1');document.getElementById('cookie-banner').remove()}} style={{padding:'6px 16px',borderRadius:6,background:'#00d4ff',color:'#000',border:'none',fontSize:12,fontWeight:700,cursor:'pointer'}}>Accept</button>
            <button onClick={()=>{document.getElementById('cookie-banner').remove()}} style={{padding:'6px 16px',borderRadius:6,background:'transparent',color:'rgba(255,255,255,.5)',border:'1px solid rgba(255,255,255,.12)',fontSize:12,cursor:'pointer'}}>Decline</button>
          </div>
        </div>
      )}
    </div>
  );
}
