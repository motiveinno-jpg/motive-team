<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Whistle AI — 고객 여정 다이어그램</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--bg2:#111827;--card:#1a2035;--bd:#2a3050;--pri:#00d4ff;--acc:#ffb800;--ok:#00e676;--err:#ff5252;--purple:#8a5cf6;--w90:rgba(255,255,255,.9);--w70:rgba(255,255,255,.7);--w50:rgba(255,255,255,.5);--w30:rgba(255,255,255,.3);--w15:rgba(255,255,255,.15);--w08:rgba(255,255,255,.08)}
body{background:var(--bg);color:var(--w90);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:200;background:rgba(10,14,26,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--pri),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .info{font-size:11px;color:var(--w30);margin-left:auto}
.tabs{display:flex;gap:2px;padding:6px 20px;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:12px;font-weight:700;color:var(--w50);transition:all .2s;white-space:nowrap;border:1px solid transparent;border-bottom:none}
.tab:hover{color:var(--w70);background:var(--w08)}
.tab.a{color:var(--pri);background:var(--card);border-color:var(--bd)}
.ctrl{display:flex;gap:8px;padding:10px 20px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--w08)}
.ctrl input{padding:8px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--w08);color:var(--w90);font-size:12px;outline:none;width:260px}
.ctrl input:focus{border-color:var(--pri)}
.legend{display:flex;gap:10px;margin-left:auto;font-size:10px;flex-wrap:wrap;align-items:center}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:3px;vertical-align:middle}
.canvas-wrap{position:relative;overflow:auto;height:calc(100vh - 130px)}
svg{display:block}

/* Nodes */
.node{cursor:pointer;transition:filter .2s}
.node:hover{filter:brightness(1.2)}
.node rect,.node circle{transition:all .2s}
.node-label{font-size:11px;font-weight:700;fill:var(--w90);pointer-events:none}
.node-sub{font-size:9px;fill:var(--w50);pointer-events:none}
.node-badge{font-size:8px;font-weight:800;pointer-events:none}

/* Edges */
.edge{stroke:var(--w15);stroke-width:1.5;fill:none;marker-end:url(#arrow)}
.edge.interact{stroke:var(--purple);stroke-dasharray:6 3;marker-end:url(#arrow-purple)}
.edge.blocked{stroke:var(--acc);stroke-dasharray:4 4;marker-end:url(#arrow-acc)}
.edge-label{font-size:8px;fill:var(--w30);pointer-events:none}

/* Tooltip */
.tip{position:fixed;z-index:300;background:rgba(17,24,39,.97);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;max-width:380px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.tip.show{opacity:1}
.tip h3{font-size:13px;font-weight:800;margin-bottom:6px;color:var(--pri)}
.tip .desc{font-size:11px;color:var(--w70);margin-bottom:8px;line-height:1.5}
.tip .acts{display:flex;flex-wrap:wrap;gap:4px}
.tip .at{font-size:9px;padding:2px 8px;border-radius:4px;border:1px solid var(--w15)}
.tip .at.btn{border-color:rgba(0,212,255,.25);color:var(--pri);background:rgba(0,212,255,.06)}
.tip .at.form{border-color:rgba(0,230,118,.25);color:var(--ok);background:rgba(0,230,118,.06)}
.tip .at.modal{border-color:rgba(255,184,0,.25);color:var(--acc);background:rgba(255,184,0,.06)}
.tip .at.api{border-color:rgba(138,92,246,.25);color:var(--purple);background:rgba(138,92,246,.06)}
.tip .at.nav{border-color:var(--w15);color:var(--w50);background:var(--w08)}
.tip .status{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:6px}
.tip .status.pass{background:rgba(0,230,118,.15);color:var(--ok)}
.tip .status.fail{background:rgba(255,82,82,.15);color:var(--err)}
.tip .status.blocked{background:rgba(255,184,0,.15);color:var(--acc)}
.tip .status.untested{background:var(--w08);color:var(--w50)}
.tip .note{font-size:10px;color:var(--acc);margin-top:6px}
.tip .interact-info{font-size:10px;color:var(--purple);margin-top:6px;border-top:1px solid var(--w15);padding-top:6px}
</style>
</head>

    {from:"by_escrow_pay",to:"escrow_hold",label:"결제/분쟁",type:"blocked"},

var curTab='landing';
var tipEl=document.getElementById('tip');
var searchQ='';

function init(){renderTabs();draw();}

function renderTabs(){
  var h='';
  for(var k in JOURNEYS) h+='<div class="tab'+(k===curTab?' a':'')+'" onclick="curTab=\''+k+'\';renderTabs();draw()">'+JOURNEYS[k].label+'</div>';
  document.getElementById('tabs').innerHTML=h;
}

function onSearch(){searchQ=document.getElementById('search').value.toLowerCase();draw();}

function draw(){
  var j=JOURNEYS[curTab];
  var nodes=j.nodes,edges=j.edges;
  // Filter
  var vis={};
  if(searchQ){
    nodes.forEach(function(n){
      var match=n.label.toLowerCase().indexOf(searchQ)>=0||n.sub.toLowerCase().indexOf(searchQ)>=0||(n.note&&n.note.toLowerCase().indexOf(searchQ)>=0);
      if(!match) n.actions.forEach(function(a){if(a.t.toLowerCase().indexOf(searchQ)>=0)match=true;});
      if(match)vis[n.id]=true;
    });
  }

  // Calc SVG size
  var maxX=0,maxY=0;
  nodes.forEach(function(n){maxX=Math.max(maxX,n.x+(n.w||140)+40);maxY=Math.max(maxY,n.y+(n.h||44)+40);});

  var svg='<svg width="'+maxX+'" height="'+maxY+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<defs>';
  svg+='<marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(255,255,255,.2)"/></marker>';
  svg+='<marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(138,92,246,.5)"/></marker>';
  svg+='<marker id="arrow-acc" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(255,184,0,.5)"/></marker>';
  svg+='</defs>';

  // Draw edges
  var nodeMap={};nodes.forEach(function(n){nodeMap[n.id]=n;});
  edges.forEach(function(e){
    var f=nodeMap[e.from],t=nodeMap[e.to];
    if(!f||!t)return;
    if(searchQ&&!vis[e.from]&&!vis[e.to])return;
    var dim=searchQ&&(!vis[e.from]||!vis[e.to]);
    var fx=f.x+f.w/2,fy=f.y+f.h;
    var tx=t.x+t.w/2,ty=t.y;
    // If same row, connect side
    if(Math.abs(f.y-t.y)<20){fy=f.y+f.h/2;ty=t.y+t.h/2;fx=f.x+(f.x<t.x?f.w:0);tx=t.x+(f.x<t.x?0:t.w);}
    var cls='edge'+(e.type==='interact'?' interact':'')+(e.type==='blocked'?' blocked':'');
    var op=dim?0.15:1;
    svg+='<line x1="'+fx+'" y1="'+fy+'" x2="'+tx+'" y2="'+ty+'" class="'+cls+'" style="opacity:'+op+'"/>';
    if(e.label){
      var mx=(fx+tx)/2,my=(fy+ty)/2;
      svg+='<text x="'+mx+'" y="'+(my-4)+'" text-anchor="middle" class="edge-label" style="opacity:'+op+'">'+e.label+'</text>';
    }
  });

  // Draw nodes
  nodes.forEach(function(n){
    if(searchQ&&!vis[n.id]){
      // Dimmed
      svg+='<g class="node" style="opacity:0.15" data-id="'+n.id+'">';
      svg+='<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="8" fill="'+statusColor(n.status,.15)+'" stroke="'+statusStroke(n.status)+'" stroke-width="1"/>';
      svg+='<text x="'+(n.x+n.w/2)+'" y="'+(n.y+n.h/2+1)+'" text-anchor="middle" class="node-label" style="font-size:10px">'+n.label+'</text>';
      svg+='</g>';
      return;
    }
    svg+='<g class="node" data-id="'+n.id+'" onmouseenter="showTip(event,\''+n.id+'\')" onmouseleave="hideTip()">';
    svg+='<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="10" fill="'+statusColor(n.status,.2)+'" stroke="'+statusStroke(n.status)+'" stroke-width="1.5"/>';
    // Status dot
    svg+='<circle cx="'+(n.x+12)+'" cy="'+(n.y+12)+'" r="4" fill="'+statusDot(n.status)+'"/>';
    // Label
    var ly=n.h>44?n.y+n.h/2-4:n.y+n.h/2+1;
    svg+='<text x="'+(n.x+24)+'" y="'+ly+'" class="node-label">'+n.label+'</text>';
    if(n.h>44) svg+='<text x="'+(n.x+24)+'" y="'+(ly+14)+'" class="node-sub">'+truncate(n.sub,28)+'</text>';
    // Interact badge
    if(n.interact) svg+='<text x="'+(n.x+n.w-6)+'" y="'+(n.y+12)+'" text-anchor="end" class="node-badge" fill="var(--purple)">🔄</text>';
    // Blocked badge
    if(n.status==='blocked') svg+='<text x="'+(n.x+n.w-6)+'" y="'+(n.y+12)+'" text-anchor="end" class="node-badge" fill="var(--acc)">⚠️</text>';
    svg+='</g>';
  });

  svg+='</svg>';
  document.getElementById('canvasWrap').innerHTML=svg;
}

function statusColor(s,a){
  if(s==='pass')return 'rgba(0,230,118,'+a+')';
  if(s==='fail')return 'rgba(255,82,82,'+a+')';
  if(s==='blocked')return 'rgba(255,184,0,'+a+')';
  return 'rgba(255,255,255,'+(a*.3)+')';
}
function statusStroke(s){
  if(s==='pass')return 'rgba(0,230,118,.4)';
  if(s==='fail')return 'rgba(255,82,82,.4)';
  if(s==='blocked')return 'rgba(255,184,0,.4)';
  return 'rgba(255,255,255,.1)';
}
function statusDot(s){
  if(s==='pass')return 'var(--ok)';
  if(s==='fail')return 'var(--err)';
  if(s==='blocked')return 'var(--acc)';
  return 'var(--w30)';
}
function truncate(s,n){return s.length>n?s.slice(0,n)+'...':s;}

function showTip(ev,id){
  var j=JOURNEYS[curTab];
  var n=j.nodes.find(function(x){return x.id===id;});
  if(!n)return;
  var sl={pass:'통과',fail:'버그',blocked:'차단됨',untested:'미테스트'}[n.status]||'';
  var h='<span class="status '+n.status+'">'+sl+'</span>';
  h+='<h3>'+n.label+'</h3>';
  h+='<div class="desc">'+n.sub+'</div>';
  if(n.note)h+='<div class="note">⚠️ '+n.note+'</div>';
  if(n.interact)h+='<div class="interact-info">🔄 상호작용: '+n.interact+'</div>';
  if(n.actions.length){
    h+='<div style="font-size:10px;color:var(--w50);margin-bottom:4px">가능한 액션:</div><div class="acts">';
    n.actions.forEach(function(a){h+='<span class="at '+a.type+'">'+a.t+'</span>';});
    h+='</div>';
  }
  tipEl.innerHTML=h;
  tipEl.classList.add('show');
  var x=ev.clientX+12,y=ev.clientY+12;
  if(x+380>window.innerWidth)x=ev.clientX-390;
  if(y+300>window.innerHeight)y=ev.clientY-200;
  tipEl.style.left=x+'px';tipEl.style.top=y+'px';
}
function hideTip(){tipEl.classList.remove('show');}
document.addEventListener('mousemove',function(e){
  if(tipEl.classList.contains('show')){
    var x=e.clientX+12,y=e.clientY+12;
    if(x+380>window.innerWidth)x=e.clientX-390;
    if(y+300>window.innerHeight)y=e.clientY-200;
    tipEl.style.left=x+'px';tipEl.style.top=y+'px';
  }
});

init();
</script>
