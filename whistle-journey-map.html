<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Whistle AI — Customer Journey Map & QA Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--bg2:#111827;--card:#1a2035;--bd:#2a3050;--pri:#00d4ff;--acc:#ffb800;--ok:#00e676;--err:#ff5252;--w90:rgba(255,255,255,.9);--w70:rgba(255,255,255,.7);--w50:rgba(255,255,255,.5);--w30:rgba(255,255,255,.3);--w15:rgba(255,255,255,.15);--w08:rgba(255,255,255,.08)}
body{background:var(--bg);color:var(--w90);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6}
.top{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.top h1{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--pri),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top .stats{display:flex;gap:12px;margin-left:auto;font-size:12px}
.stat{padding:4px 12px;border-radius:20px;font-weight:700}
.stat.pass{background:rgba(0,230,118,.15);color:var(--ok)}
.stat.fail{background:rgba(255,82,82,.15);color:var(--err)}
.stat.untested{background:var(--w08);color:var(--w50)}
.tabs{display:flex;gap:4px;padding:8px 24px;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto}
.tab{padding:8px 20px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:var(--w50);border:1px solid transparent;border-bottom:none;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--w70);background:var(--w08)}
.tab.active{color:var(--pri);background:var(--card);border-color:var(--bd)}
.container{max-width:1400px;margin:0 auto;padding:20px 24px}
.search-bar{margin-bottom:16px;display:flex;gap:8px}
.search-bar input{flex:1;padding:10px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--w08);color:var(--w90);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--pri)}
.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{padding:4px 12px;border-radius:16px;border:1px solid var(--bd);background:transparent;color:var(--w50);cursor:pointer;font-size:11px;transition:all .2s}
.fbtn:hover{border-color:var(--w50)}
.fbtn.active{border-color:var(--pri);color:var(--pri);background:rgba(0,212,255,.08)}
.phase{margin-bottom:16px;border:1px solid var(--bd);border-radius:12px;overflow:hidden;background:var(--card)}
.phase-h{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .2s}
.phase-h:hover{background:var(--w08)}
.phase-h .arrow{font-size:10px;color:var(--w30);transition:transform .2s}
.phase-h.open .arrow{transform:rotate(90deg)}
.phase-h .icon{font-size:20px}
.phase-h .title{font-size:14px;font-weight:700;flex:1}
.phase-h .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.phase-h .badge.pass{background:rgba(0,230,118,.15);color:var(--ok)}
.phase-h .badge.fail{background:rgba(255,82,82,.15);color:var(--err)}
.phase-h .badge.partial{background:rgba(255,184,0,.15);color:var(--acc)}
.phase-h .badge.untested{background:var(--w08);color:var(--w50)}
.phase-b{display:none;padding:0 16px 16px}
.phase-b.open{display:block}
.step{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:4px;border:1px solid transparent;transition:all .15s;position:relative}
.step:hover{background:var(--w08);border-color:var(--bd)}
.step .dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.step .dot.pass{background:var(--ok)}
.step .dot.fail{background:var(--err)}
.step .dot.untested{background:var(--w30)}
.step .dot.blocked{background:var(--acc)}
.step-info{flex:1;min-width:0}
.step-name{font-size:13px;font-weight:600}
.step-desc{font-size:11px;color:var(--w50);margin-top:2px}
.step-actions{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.action-tag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--w08);color:var(--w50);border:1px solid var(--w15)}
.action-tag.btn{border-color:rgba(0,212,255,.2);color:var(--pri)}
.action-tag.form{border-color:rgba(0,230,118,.2);color:var(--ok)}
.action-tag.api{border-color:rgba(138,92,246,.2);color:#8a5cf6}
.action-tag.modal{border-color:rgba(255,184,0,.2);color:var(--acc)}
.action-tag.nav{border-color:rgba(255,255,255,.1);color:var(--w50)}
.step-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap}
.step-status.pass{color:var(--ok)}
.step-status.fail{color:var(--err)}
.step-status.blocked{color:var(--acc)}
.step-status.untested{color:var(--w30)}
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px 16px;background:var(--bg2);border-radius:10px;margin-bottom:16px;font-size:11px;align-items:center}
.legend span{display:flex;align-items:center;gap:4px}
.legend .d{width:8px;height:8px;border-radius:50%;display:inline-block}
@media(max-width:768px){.container{padding:12px}.top{padding:8px 12px}.top h1{font-size:15px}}
</style>
</head>

    <span><span class="d" style="background:var(--acc)"></span> Blocked</span>

  <div id="content"></div>
</div>

var activeTab='manufacturer',searchQuery='',statusFilter='all';

function init(){renderTabs();renderFilters();renderContent();updateStats();}

function renderTabs(){
var h='';for(var k in DATA)h+='<div class="tab'+(k===activeTab?' active':'')+'" onclick="switchTab(\''+k+'\')">'+DATA[k].label+'</div>';
document.getElementById('tabs').innerHTML=h;
}

function switchTab(t){activeTab=t;renderTabs();renderContent();updateStats();}

function renderFilters(){
var fs=[{id:'all',label:'All'},{id:'pass',label:'Pass'},{id:'fail',label:'Fail'},{id:'blocked',label:'Blocked'},{id:'untested',label:'Untested'}];
var h='';fs.forEach(function(f){h+='<button class="fbtn'+(statusFilter===f.id?' active':'')+'" onclick="setFilter(\''+f.id+'\')">'+f.label+'</button>';});
document.getElementById('filterRow').innerHTML=h;
}

function setFilter(f){statusFilter=f;renderFilters();renderContent();}

function filterSteps(){searchQuery=document.getElementById('searchInput').value.toLowerCase();renderContent();}

function matchStep(s){
if(!searchQuery&&statusFilter==='all')return true;
if(statusFilter!=='all'&&s.status!==statusFilter)return false;
if(!searchQuery)return true;
var q=searchQuery;
if(s.name.toLowerCase().indexOf(q)>=0)return true;
if(s.desc.toLowerCase().indexOf(q)>=0)return true;
if(s.note&&s.note.toLowerCase().indexOf(q)>=0)return true;
for(var i=0;i<s.actions.length;i++)if(s.actions[i].t.toLowerCase().indexOf(q)>=0)return true;
return false;
}

function phaseStatus(steps){
var v=steps.filter(matchStep);if(!v.length)return'untested';
if(v.some(function(s){return s.status==='fail';}))return'fail';
if(v.some(function(s){return s.status==='blocked';}))return'partial';
if(v.every(function(s){return s.status==='pass';}))return'pass';
return'partial';
}

function hl(t){
if(!searchQuery)return t;
var re=new RegExp('('+searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
return t.replace(re,'<mark style="background:rgba(0,212,255,.3);color:var(--w90);border-radius:2px;padding:0 2px">$1</mark>');
}

function renderContent(){
var d=DATA[activeTab],h='';
d.phases.forEach(function(p){
var vis=p.steps.filter(matchStep);
if(!vis.length&&(searchQuery||statusFilter!=='all'))return;
var ps=phaseStatus(p.steps);
var sl={pass:'ALL PASS',fail:'HAS BUGS',partial:'ISSUES',untested:'UNTESTED'}[ps]||'';
h+='<div class="phase"><div class="phase-h open" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')">';
h+='<span class="arrow">▶</span><span class="icon">'+p.icon+'</span><span class="title">'+p.title+'</span>';
h+='<span style="font-size:11px;color:var(--w30)">'+p.steps.length+' steps</span>';
h+='<span class="badge '+ps+'">'+sl+'</span></div><div class="phase-b open">';
var show=(searchQuery||statusFilter!=='all')?vis:p.steps;
show.forEach(function(s){
h+='<div class="step"><span class="dot '+s.status+'"></span><div class="step-info">';
h+='<div class="step-name">'+hl(s.name)+'</div>';
h+='<div class="step-desc">'+hl(s.desc)+'</div>';
if(s.note)h+='<div style="font-size:10px;color:var(--acc);margin-top:2px">⚠️ '+s.note+'</div>';
if(s.actions.length){h+='<div class="step-actions">';s.actions.forEach(function(a){h+='<span class="action-tag '+a.type+'">'+hl(a.t)+'</span>';});h+='</div>';}
h+='</div>';
var st={pass:'PASS',fail:'FAIL',blocked:'BLOCKED',untested:'—'}[s.status]||'—';
h+='<span class="step-status '+s.status+'">'+st+'</span></div>';
});
h+='</div></div>';
});
if(!h)h='<div style="text-align:center;padding:40px;color:var(--w30)">No results found</div>';
document.getElementById('content').innerHTML=h;
}

function updateStats(){
var d=DATA[activeTab],t=0,p=0,f=0,b=0,u=0;
d.phases.forEach(function(ph){ph.steps.forEach(function(s){t++;if(s.status==='pass')p++;else if(s.status==='fail')f++;else if(s.status==='blocked')b++;else u++;});});
var h='<span class="stat pass">Pass '+p+'</span>';
h+='<span class="stat fail">Fail '+f+'</span>';
if(b)h+='<span class="stat" style="background:rgba(255,184,0,.15);color:var(--acc)">Blocked '+b+'</span>';
h+='<span class="stat untested">Untested '+u+'</span>';
h+='<span style="font-size:11px;color:var(--w30)">Total: '+t+'</span>';
document.getElementById('globalStats').innerHTML=h;
}

init();
</script>
