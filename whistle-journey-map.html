<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Whistle AI — 고객 여정 다이어그램</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--bg2:#111827;--card:#1a2035;--bd:#2a3050;--pri:#00d4ff;--acc:#ffb800;--ok:#00e676;--err:#ff5252;--purple:#8a5cf6;--w90:rgba(255,255,255,.9);--w70:rgba(255,255,255,.7);--w50:rgba(255,255,255,.5);--w30:rgba(255,255,255,.3);--w15:rgba(255,255,255,.15);--w08:rgba(255,255,255,.08)}
body{background:var(--bg);color:var(--w90);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:200;background:rgba(10,14,26,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--pri),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .info{font-size:11px;color:var(--w30);margin-left:auto}
.topbar .btn{padding:5px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--w08);color:var(--w70);font-size:11px;cursor:pointer;font-weight:600;transition:all .2s}
.topbar .btn:hover{background:var(--pri);color:#fff;border-color:var(--pri)}
.topbar .btn.refresh{border-color:rgba(0,212,255,.3);color:var(--pri)}
.tabs{display:flex;gap:2px;padding:6px 20px;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:12px;font-weight:700;color:var(--w50);transition:all .2s;white-space:nowrap;border:1px solid transparent;border-bottom:none}
.tab:hover{color:var(--w70);background:var(--w08)}
.tab.a{color:var(--pri);background:var(--card);border-color:var(--bd)}
.tab.full{color:var(--acc)}
.tab.full.a{color:var(--acc);background:var(--card)}
.ctrl{display:flex;gap:8px;padding:10px 20px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--w08)}
.ctrl input{padding:8px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--w08);color:var(--w90);font-size:12px;outline:none;width:260px}
.ctrl input:focus{border-color:var(--pri)}
.legend{display:flex;gap:10px;margin-left:auto;font-size:10px;flex-wrap:wrap;align-items:center}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:3px;vertical-align:middle}
.main-area{display:flex;height:calc(100vh - 136px)}
.canvas-wrap{flex:1;overflow:auto;position:relative}
svg{display:block}

/* Detail Panel */
.detail-panel{width:0;overflow:hidden;transition:width .25s ease;background:var(--bg2);border-left:1px solid var(--bd);flex-shrink:0}
.detail-panel.open{width:380px}
.dp-inner{width:380px;padding:20px;height:100%;overflow-y:auto}
.dp-close{position:absolute;top:12px;right:12px;background:var(--w08);border:1px solid var(--bd);color:var(--w70);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.dp-close:hover{background:var(--err);color:#fff;border-color:var(--err)}
.dp-status{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;margin-bottom:10px}
.dp-status.pass{background:rgba(0,230,118,.12);color:var(--ok)}
.dp-status.fail{background:rgba(255,82,82,.12);color:var(--err)}
.dp-status.blocked{background:rgba(255,184,0,.12);color:var(--acc)}
.dp-status.untested{background:var(--w08);color:var(--w50)}
.dp-title{font-size:16px;font-weight:800;margin-bottom:4px}
.dp-sub{font-size:12px;color:var(--w50);margin-bottom:14px;line-height:1.5}
.dp-section{margin-bottom:16px}
.dp-section-title{font-size:11px;font-weight:700;color:var(--w30);text-transform:uppercase;margin-bottom:8px;letter-spacing:.5px}
.dp-act{display:inline-block;font-size:10px;padding:4px 10px;border-radius:6px;margin:0 4px 4px 0;border:1px solid var(--w15)}
.dp-act.btn{border-color:rgba(0,212,255,.25);color:var(--pri);background:rgba(0,212,255,.06)}
.dp-act.form{border-color:rgba(0,230,118,.25);color:var(--ok);background:rgba(0,230,118,.06)}
.dp-act.modal{border-color:rgba(255,184,0,.25);color:var(--acc);background:rgba(255,184,0,.06)}
.dp-act.api{border-color:rgba(138,92,246,.25);color:var(--purple);background:rgba(138,92,246,.06)}
.dp-act.nav{border-color:var(--w15);color:var(--w50);background:var(--w08)}
.dp-note{font-size:11px;padding:8px 12px;border-radius:8px;background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.2);color:var(--acc);line-height:1.5}
.dp-interact{font-size:11px;padding:8px 12px;border-radius:8px;background:rgba(138,92,246,.08);border:1px solid rgba(138,92,246,.2);color:var(--purple);line-height:1.5}
.dp-edges{font-size:11px;color:var(--w50);line-height:1.8}
.dp-edges span{color:var(--pri);font-weight:600}

/* Nodes */
.node{cursor:pointer;transition:filter .15s}
.node:hover{filter:brightness(1.3)}
.node.selected rect{stroke-width:2.5!important;stroke:var(--pri)!important;filter:drop-shadow(0 0 8px rgba(0,212,255,.4))}
.node-label{font-size:11px;font-weight:700;fill:var(--w90);pointer-events:none}
.node-sub{font-size:9px;fill:var(--w50);pointer-events:none}
.node-badge{font-size:8px;font-weight:800;pointer-events:none}

/* Edges */
.edge{stroke:var(--w15);stroke-width:1.5;fill:none;marker-end:url(#arrow)}
.edge.interact{stroke:var(--purple);stroke-dasharray:6 3;marker-end:url(#arrow-purple)}
.edge.blocked{stroke:var(--acc);stroke-dasharray:4 4;marker-end:url(#arrow-acc)}
.edge.cross{stroke:rgba(255,184,0,.3);stroke-width:2;stroke-dasharray:8 4;marker-end:url(#arrow-acc)}
.edge-label{font-size:8px;fill:var(--w30);pointer-events:none}

/* Group labels for full view */
.group-label{font-size:14px;font-weight:900;fill:var(--w30);letter-spacing:1px}
.group-rect{fill:none;stroke:var(--w08);stroke-width:1;stroke-dasharray:6 4;rx:16}

@media(max-width:900px){.detail-panel.open{width:100%;position:fixed;top:0;left:0;right:0;bottom:0;z-index:500}}
</style>
</head>

<div class="topbar">
  <h1>Whistle AI 고객 여정 다이어그램</h1>

<div class="ctrl">
  <input type="text" id="search" placeholder="검색 (예: 에스크로, 결제, 채팅, 프로필...)" oninput="onSearch()">
  <div class="legend">
    <span><i style="background:var(--ok)"></i>통과</span>
    <span><i style="background:var(--err)"></i>버그</span>
    <span><i style="background:var(--acc)"></i>차단됨</span>
    <span><i style="background:var(--w30)"></i>미테스트</span>

<div class="main-area">

  <div class="detail-panel" id="detailPanel">

  </div>
</div>

    {from:"f_by_dash",to:"f_by_mkt"},{from:"f_by_dash",to:"f_by_order"},{from:"f_by_dash",to:"f_by_profile"},
    /* Cross-platform interactions */
    {from:"f_mf_products",to:"f_by_search",label:"공개 제품 노출",type:"interact"},
    {from:"f_by_inquiry",to:"f_mf_deals",label:"문의→딜 생성",type:"interact"},
    {from:"f_mf_chat",to:"f_by_deals",label:"실시간 채팅",type:"interact"},
    {from:"f_mf_deals",to:"f_by_deals",label:"딜 양방향",type:"interact"},
    {from:"f_by_mkt",to:"f_mf_deals",label:"제안→매칭",type:"interact"},
    {from:"f_mf_deals",to:"f_escrow",label:"에스크로",type:"blocked"},
    {from:"f_by_deals",to:"f_escrow",label:"에스크로",type:"blocked"},
    {from:"f_by_deals",to:"f_by_review",label:"완료 후"},
    {from:"f_blur",to:"f_mf_sub",label:"구독 유도"}
  ]
}

};

/* ============================================================
   STATE & RENDERING
   ============================================================ */
var curTab='full';
var selectedNode=null;
var searchQ='';

function init(){
  document.getElementById('updateInfo').textContent='최종 업데이트: '+new Date().toLocaleString('ko-KR');
  renderTabs();draw();
}

function renderTabs(){
  var order=['full','landing','manufacturer','buyer','interaction'];
  var h='';
  order.forEach(function(k){
    var j=JOURNEYS[k];if(!j)return;
    var cls='tab'+(k===curTab?' a':'')+(k==='full'?' full':'');
    h+='<div class="'+cls+'" onclick="switchTab(\''+k+'\')">'+j.label+'</div>';
  });
  document.getElementById('tabs').innerHTML=h;
}

function switchTab(t){curTab=t;selectedNode=null;closeDetail();renderTabs();draw();}
function onSearch(){searchQ=document.getElementById('search').value.toLowerCase();draw();}
function hardRefresh(){location.reload(true);}

function draw(){
  var j=JOURNEYS[curTab];
  var nodes=j.nodes,edges=j.edges;
  var vis={};
  if(searchQ){
    nodes.forEach(function(n){
      var match=n.label.toLowerCase().indexOf(searchQ)>=0||n.sub.toLowerCase().indexOf(searchQ)>=0||(n.note&&n.note.toLowerCase().indexOf(searchQ)>=0);
      if(!match)n.actions.forEach(function(a){if(a.t.toLowerCase().indexOf(searchQ)>=0)match=true;});
      if(match)vis[n.id]=true;
    });
  }

  var maxX=0,maxY=0;
  nodes.forEach(function(n){maxX=Math.max(maxX,n.x+(n.w||140)+60);maxY=Math.max(maxY,n.y+(n.h||44)+60);});

  var svg='<svg width="'+maxX+'" height="'+maxY+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<defs>';
  svg+='<marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(255,255,255,.2)"/></marker>';
  svg+='<marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(138,92,246,.5)"/></marker>';
  svg+='<marker id="arrow-acc" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(255,184,0,.5)"/></marker>';
  svg+='</defs>';

  var nodeMap={};nodes.forEach(function(n){nodeMap[n.id]=n;});

  // Edges
  edges.forEach(function(e){
    var f=nodeMap[e.from],t=nodeMap[e.to];
    if(!f||!t)return;
    if(searchQ&&!vis[e.from]&&!vis[e.to])return;
    var dim=searchQ&&(!vis[e.from]||!vis[e.to]);
    var hl=(selectedNode&&(e.from===selectedNode||e.to===selectedNode));
    var fx=f.x+f.w/2,fy=f.y+f.h,tx=t.x+t.w/2,ty=t.y;
    if(Math.abs(f.y-t.y)<20){fy=f.y+f.h/2;ty=t.y+t.h/2;fx=f.x+(f.x<t.x?f.w:0);tx=t.x+(f.x<t.x?0:t.w);}
    var cls='edge'+(e.type==='interact'?' interact':'')+(e.type==='blocked'?' blocked':'');
    var op=dim?0.1:(hl?1:0.6);
    var sw=hl?2.5:1.5;
    svg+='<line x1="'+fx+'" y1="'+fy+'" x2="'+tx+'" y2="'+ty+'" class="'+cls+'" style="opacity:'+op+';stroke-width:'+sw+'"/>';
    if(e.label){
      var mx=(fx+tx)/2,my=(fy+ty)/2;
      svg+='<text x="'+mx+'" y="'+(my-4)+'" text-anchor="middle" class="edge-label" style="opacity:'+(dim?0.1:1)+'">'+e.label+'</text>';
    }
  });

  // Nodes
  nodes.forEach(function(n){
    var isDim=searchQ&&!vis[n.id];
    var isSel=selectedNode===n.id;
    if(isDim){
      svg+='<g class="node" style="opacity:0.12" onclick="selectNode(\''+n.id+'\')">';
      svg+='<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="8" fill="'+statusColor(n.status,.1)+'" stroke="'+statusStroke(n.status)+'" stroke-width="1"/>';
      svg+='<text x="'+(n.x+n.w/2)+'" y="'+(n.y+n.h/2+1)+'" text-anchor="middle" class="node-label" style="font-size:10px">'+n.label+'</text>';
      svg+='</g>';
      return;
    }
    svg+='<g class="node'+(isSel?' selected':'')+'" onclick="selectNode(\''+n.id+'\')">';
    svg+='<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="10" fill="'+statusColor(n.status,.2)+'" stroke="'+(isSel?'var(--pri)':statusStroke(n.status))+'" stroke-width="'+(isSel?'2.5':'1.5')+'"/>';
    svg+='<circle cx="'+(n.x+12)+'" cy="'+(n.y+12)+'" r="4" fill="'+statusDot(n.status)+'"/>';
    var ly=n.h>44?n.y+n.h/2-4:n.y+n.h/2+1;
    svg+='<text x="'+(n.x+24)+'" y="'+ly+'" class="node-label">'+n.label+'</text>';
    if(n.h>44)svg+='<text x="'+(n.x+24)+'" y="'+(ly+14)+'" class="node-sub">'+truncate(n.sub,30)+'</text>';
    if(n.interact)svg+='<text x="'+(n.x+n.w-6)+'" y="'+(n.y+12)+'" text-anchor="end" class="node-badge" fill="var(--purple)">🔄</text>';
    if(n.status==='blocked')svg+='<text x="'+(n.x+n.w-6)+'" y="'+(n.y+12)+'" text-anchor="end" class="node-badge" fill="var(--acc)">⚠️</text>';
    svg+='</g>';
  });

  svg+='</svg>';
  document.getElementById('canvasWrap').innerHTML=svg;

  // If selected, scroll to node
  if(selectedNode){
    var sn=nodeMap[selectedNode];
    if(sn){
      var wrap=document.getElementById('canvasWrap');
      var cx=sn.x+sn.w/2-wrap.clientWidth/2;
      var cy=sn.y+sn.h/2-wrap.clientHeight/2;
      wrap.scrollTo({left:Math.max(0,cx),top:Math.max(0,cy),behavior:'smooth'});
    }
  }
}

function selectNode(id){
  selectedNode=id;
  draw();
  showDetail(id);
}

function showDetail(id){
  var j=JOURNEYS[curTab];
  var n=j.nodes.find(function(x){return x.id===id;});
  if(!n){closeDetail();return;}

  var sl={pass:'통과',fail:'버그 발견',blocked:'차단됨 (외부 의존)',untested:'미테스트'}[n.status]||'미확인';
  var h='<button class="dp-close" onclick="closeDetail()">✕</button>';
  h+='<span class="dp-status '+n.status+'">'+sl+'</span>';
  h+='<div class="dp-title">'+n.label+'</div>';
  h+='<div class="dp-sub">'+n.sub+'</div>';

  if(n.note){h+='<div class="dp-section"><div class="dp-note">⚠️ '+n.note+'</div></div>';}
  if(n.interact){h+='<div class="dp-section"><div class="dp-interact">🔄 상호작용: '+n.interact+'</div></div>';}

  if(n.actions.length){
    h+='<div class="dp-section"><div class="dp-section-title">가능한 액션 ('+n.actions.length+')</div>';
    n.actions.forEach(function(a){h+='<span class="dp-act '+a.type+'">'+a.t+'</span>';});
    h+='</div>';
  }

  // Connected edges
  var incoming=[],outgoing=[];
  j.edges.forEach(function(e){
    var nodeMap={};j.nodes.forEach(function(nn){nodeMap[nn.id]=nn;});
    if(e.to===id&&nodeMap[e.from])incoming.push({label:e.label||'',node:nodeMap[e.from],type:e.type||''});
    if(e.from===id&&nodeMap[e.to])outgoing.push({label:e.label||'',node:nodeMap[e.to],type:e.type||''});
  });

  if(incoming.length){
    h+='<div class="dp-section"><div class="dp-section-title">← 들어오는 연결 ('+incoming.length+')</div><div class="dp-edges">';
    incoming.forEach(function(c){
      h+='<div onclick="selectNode(\''+c.node.id+'\')" style="cursor:pointer;padding:4px 0;border-bottom:1px solid var(--w08)"><span>'+c.node.label+'</span>'+(c.label?' → '+c.label:'')+(c.type==='interact'?' <span style="color:var(--purple)">🔄</span>':'')+(c.type==='blocked'?' <span style="color:var(--acc)">⚠️</span>':'')+'</div>';
    });
    h+='</div></div>';
  }

  if(outgoing.length){
    h+='<div class="dp-section"><div class="dp-section-title">→ 나가는 연결 ('+outgoing.length+')</div><div class="dp-edges">';
    outgoing.forEach(function(c){
      h+='<div onclick="selectNode(\''+c.node.id+'\')" style="cursor:pointer;padding:4px 0;border-bottom:1px solid var(--w08)"><span>'+c.node.label+'</span>'+(c.label?' → '+c.label:'')+(c.type==='interact'?' <span style="color:var(--purple)">🔄</span>':'')+(c.type==='blocked'?' <span style="color:var(--acc)">⚠️</span>':'')+'</div>';
    });
    h+='</div></div>';
  }

  // Stats
  var total=j.nodes.length;
  var pass=j.nodes.filter(function(nn){return nn.status==='pass';}).length;
  var blocked=j.nodes.filter(function(nn){return nn.status==='blocked';}).length;
  h+='<div class="dp-section" style="margin-top:20px;padding-top:12px;border-top:1px solid var(--w15)">';
  h+='<div class="dp-section-title">현재 탭 통계</div>';
  h+='<div style="font-size:11px;color:var(--w50);line-height:1.8">전체 노드: '+total+' | 통과: <span style="color:var(--ok)">'+pass+'</span> | 차단: <span style="color:var(--acc)">'+blocked+'</span> | 미테스트: <span style="color:var(--w30)">'+(total-pass-blocked)+'</span></div>';
  h+='</div>';

  document.getElementById('dpInner').innerHTML=h;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');
  selectedNode=null;draw();
}

function statusColor(s,a){
  if(s==='pass')return 'rgba(0,230,118,'+a+')';
  if(s==='fail')return 'rgba(255,82,82,'+a+')';
  if(s==='blocked')return 'rgba(255,184,0,'+a+')';
  return 'rgba(255,255,255,'+(a*.3)+')';
}
function statusStroke(s){
  if(s==='pass')return 'rgba(0,230,118,.4)';
  if(s==='fail')return 'rgba(255,82,82,.4)';
  if(s==='blocked')return 'rgba(255,184,0,.4)';
  return 'rgba(255,255,255,.1)';
}
function statusDot(s){
  if(s==='pass')return 'var(--ok)';
  if(s==='fail')return 'var(--err)';
  if(s==='blocked')return 'var(--acc)';
  return 'var(--w30)';
}
function truncate(s,n){return s.length>n?s.slice(0,n)+'...':s;}

init();
</script>
</body>
