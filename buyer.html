  if(deal.sellerId)h+='<div style="font-size:11px;color:var(--w40)">'+esc(getSellerName(deal.sellerId))+'</div>';
  h+='</div>';
  var stg=DEAL_STAGES[stageIdx]||DEAL_STAGES[0];
  h+='<span class="badge '+(deal.stage==='completed'?'badge-ok':'badge-pri')+'" style="font-size:11px;padding:4px 10px;flex-shrink:0">'+stg.icon+' '+t(stg.label)+'</span>';
  h+='<button class="sidebar-toggle" onclick="B.toggleDealSidebar()" title="Deal info">&#x2630;</button>';
  h+='</div>';

  // Compact inline stage progress dots
  h+='<div style="display:flex;gap:3px;margin-bottom:0;padding:0 0 8px">';
  DEAL_STAGES.forEach(function(s,i){
    var done=i<stageIdx;var current=i===stageIdx;
    h+='<div style="flex:1;text-align:center;cursor:default" title="'+s.label+'">';
    h+='<div style="height:3px;border-radius:2px;background:'+(done?'var(--ok)':current?'var(--pri)':'var(--w08)')+';margin-bottom:2px"></div>';
    h+='<div style="font-size:8px;color:'+(current?'var(--pri)':done?'var(--ok)':'var(--w20)')+';font-weight:'+(current?'700':'400')+'">'+t(s.label)+'</div>';
    h+='</div>';
  });
  h+='</div>';

  // Deal room: CHAT-CENTRIC layout
  h+='<div class="deal-room">';

  // LEFT: Chat (MAIN — takes most of the space)
  if(deal.sellerId&&deal.buyerLinkId){
    h+='<div class="deal-chat">';
    h+='<div class="deal-chat-header">';
    h+='<div><div style="font-weight:700;font-size:13px">&#x1F4AC; '+esc(getSellerName(deal.sellerId))+'</div>';
    h+='<div style="font-size:10px;color:var(--w40)">Chat, documents & deal progress</div></div>';
    h+='<div style="display:flex;align-items:center;gap:6px"><div style="width:6px;height:6px;border-radius:3px;background:var(--ok)"></div><span style="font-size:10px;color:var(--ok)">Online</span></div>';
    h+='</div>';

    // Chat messages area
    h+='<div class="chat-msgs" id="dealChatMsgs">';
    if(!S.dealMessages.length){
      h+='<div style="text-align:center;padding:40px 20px">';
      h+='<div style="font-size:36px;margin-bottom:8px">&#x1F4AC;</div>';
      h+='<div style="font-size:14px;font-weight:700;color:var(--w60);margin-bottom:4px">'+t('Start your conversation')+'</div>';
      h+='<div style="font-size:12px;color:var(--w30);max-width:300px;margin:0 auto">Chat with your seller, exchange documents, and track deal progress.</div>';
      h+='</div>';
    }
    var lastDate='';
    S.dealMessages.forEach(function(m){
      var d=new Date(m.created_at).toLocaleDateString();
      if(d!==lastDate){h+='<div style="text-align:center;font-size:9px;color:var(--w20);padding:8px 0">'+d+'</div>';lastDate=d;}
      var isMine=m.sender_type==='buyer';
      h+=renderChatBubble(m,isMine);
    });
    h+='</div>';

    // Chat input area with STAGE-SPECIFIC ACTION CHIPS
    h+='<div class="chat-input-area">';
    h+=renderDealActionChips(deal,stageIdx);
    h+='<div class="chat-input-row">';
    h+='<input class="form-input" id="dealChatInput" placeholder="'+t('Type a message...')+'" style="border-radius:12px;font-size:13px;padding:10px 14px" onkeydown="if(event.key===\'Enter\')B.sendDealMessage()">';
    h+='<button class="btn btn-pri" onclick="B.sendDealMessage()" style="border-radius:12px;padding:10px 18px">'+t('Send')+'</button>';
    h+='</div></div>';

    h+='</div>'; // end deal-chat

  } else {
    // Not matched yet — full chat area with waiting state
    h+='<div class="deal-chat" style="align-items:center;justify-content:center;text-align:center">';
    h+='<div style="padding:40px"><div style="font-size:48px;margin-bottom:12px">&#x1F91D;</div>';
    h+='<div style="font-size:16px;font-weight:700;color:var(--w70);margin-bottom:8px">'+t('Matching in progress')+'</div>';
    h+='<div style="font-size:12px;color:var(--w30);max-width:320px;margin:0 auto">Our team is reviewing your inquiry. Once matched with the best seller, you can chat, exchange documents, and manage the entire deal here.</div>';
    h+='<div style="margin-top:16px"><div style="display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;background:rgba(255,184,0,.06);border:1px solid rgba(255,184,0,.15)"><div style="width:8px;height:8px;border-radius:4px;background:var(--acc);animation:pulse 2s infinite"></div><span style="font-size:11px;color:var(--acc)">Reviewing your inquiry</span></div></div>';
    h+='</div></div>';
  }

  // RIGHT: Context sidebar (collapsible)
  h+='<div class="deal-content'+(S._dealSidebarHidden?' collapsed':'')+'" id="dealSidebar">';
  if(!S._dealSidebarHidden){h+=renderDealSidebar(deal,stageIdx);}
  h+='</div>';

  h+='</div>'; // end deal-room
  return h;
}

/* === DEAL ACTION CHIPS — Stage-specific quick actions above chat input === */
function renderDealActionChips(deal,stageIdx){
  var h='<div class="chat-actions">';
  var stage=deal.stage;

  switch(stage){
    case'matched':
      h+='<div class="chat-action-chip" onclick="B.requestQuote(\''+deal.matching.id+'\')">&#x1F4B0; '+t('Request Quote')+'</div>';
      h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; '+t('Say Hello')+'</div>';
      break;
    case'quotation':
      var hasPI=deal.documents.some(function(d){return d.doc_type==='pi';});
      if(hasPI){
        h+='<div class="chat-action-chip ok" onclick="B.acceptQuote(\''+deal.matching.id+'\')">&#x2705; Accept Quote</div>';
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Negotiate</div>';
      } else {
        h+='<div class="chat-action-chip" onclick="B.requestQuote(\''+deal.matching.id+'\')">&#x1F4B0; Request Quote Again</div>';
      }
      break;
    case'sample':
      var hasPending=(deal.dealSamples||[]).some(function(s){return s.status==='requested'||s.status==='preparing';});
      var hasDelivered=(deal.dealSamples||[]).some(function(s){return s.status==='delivered';});
      if(hasDelivered){
        h+='<div class="chat-action-chip ok" onclick="B.confirmSampleOk(\''+deal.matching.id+'\')">&#x1F44D; Approve Sample</div>';
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Request Changes</div>';
      } else if(!hasPending){
        h+='<div class="chat-action-chip accent" onclick="B.toggleSampleForm(\''+deal.id+'\')">&#x1F4E6; Request Sample</div>';
      } else {
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Check Status</div>';
      }
      break;
    case'negotiation':
      h+='<div class="chat-action-chip ok" onclick="B.confirmReadyToOrder(\''+deal.matching.id+'\')">&#x2705; Ready to Order</div>';
      h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Discuss Terms</div>';
      break;
    case'order':
      h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Discuss Payment</div>';
      break;
    case'production':
      h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Check Progress</div>';
      break;
    case'shipping':
      if(deal.shipment&&deal.shipment.status==='delivered'){
        h+='<div class="chat-action-chip ok" onclick="B.confirmDelivery(\''+deal.matching.id+'\')">&#x1F4E6; Confirm Receipt</div>';
      } else {
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Track Shipment</div>';
      }
      break;
    case'completed':
      var hasReview=S.reviews.some(function(rv){return rv.target_id===deal.matching.id;});
      if(!hasReview){h+='<div class="chat-action-chip accent" onclick="B.toggleDealSidebar()">&#x2B50; Write Review</div>';}
      break;
  }

  // Sample form inline (shown in chat area when requested)
  if(S._sampleFormOpen===deal.id){
    h+='</div>';
    h+=renderInlineSampleForm(deal);
    return h;
  }
  h+='</div>';
  return h;
}

/* === DEAL SIDEBAR — Collapsible context panel === */
function toggleDealSidebar(){S._dealSidebarHidden=!S._dealSidebarHidden;render();}

function renderDealSidebar(deal,stageIdx){
  var h='<div style="font-size:12px;font-weight:700;margin-bottom:12px;color:var(--w60)">Deal Info</div>';

  // Deal summary
  h+='<div class="stage-card" style="padding:10px">';
  h+='<div style="font-size:11px;color:var(--w40);margin-bottom:2px">Product</div>';
  h+='<div style="font-size:12px;font-weight:600;margin-bottom:6px">'+esc(deal.title)+'</div>';
  if(deal.sellerId){h+='<div style="font-size:11px;color:var(--w40);margin-bottom:2px">Seller</div><div style="font-size:12px;font-weight:600;margin-bottom:6px">'+esc(getSellerName(deal.sellerId))+'</div>';}
  h+='<div style="font-size:11px;color:var(--w40);margin-bottom:2px">Stage</div>';
  h+='<div style="font-size:12px;font-weight:600">'+DEAL_STAGES[stageIdx].icon+' '+DEAL_STAGES[stageIdx].label+'</div>';
  h+='</div>';

  // Documents
  if((deal.documents||[]).length){
    h+='<div class="stage-card" style="padding:10px">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--w60);margin-bottom:6px">&#x1F4C4; Documents ('+(deal.documents||[]).length+')</div>';
    (deal.documents||[]).forEach(function(doc){
      var typeNames={pi:'PI',ci:'CI',pl:'PL',co:'CO',sc:'SC'};
      h+='<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px">';
      h+='<span class="badge badge-acc" style="font-size:9px;padding:1px 6px">'+(typeNames[doc.doc_type]||'DOC')+'</span>';
      h+='<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(doc.doc_number||'Document')+'</span>';
      if(doc.pdf_url)h+='<a href="'+esc(doc.pdf_url)+'" target="_blank" style="font-size:9px;color:var(--pri)">PDF</a>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Samples
  if((deal.dealSamples||[]).length){
    h+='<div class="stage-card" style="padding:10px">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--w60);margin-bottom:6px">&#x1F4E6; Samples</div>';
    (deal.dealSamples||[]).forEach(function(s){
      var stCls=s.status==='delivered'?'badge-ok':s.status==='shipped'?'badge-pri':'badge-ghost';
      h+='<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px">';
      h+='<span class="badge '+stCls+'" style="font-size:9px">'+esc(s.status)+'</span>';
      h+='<span>Qty: '+esc(s.quantity||1)+'</span>';
      if(s.tracking_number)h+='<span style="color:var(--w30)">'+esc(s.tracking_number)+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Order
  if(deal.order){
    var o=deal.order;
    h+='<div class="stage-card" style="padding:10px">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--w60);margin-bottom:6px">&#x2705; Order</div>';
    h+='<div style="font-size:11px"><span style="color:var(--w40)">No:</span> '+esc(o.order_number||'')+'</div>';
    h+='<div style="font-size:13px;font-weight:800;color:var(--acc);margin:4px 0">$'+Number(o.total_amount||0).toLocaleString()+'</div>';
    h+='<div style="font-size:11px"><span style="color:var(--w40)">Status:</span> <span class="badge badge-acc" style="font-size:9px">'+esc(o.status)+'</span></div>';
    h+='<div style="font-size:11px"><span style="color:var(--w40)">Payment:</span> <span class="badge '+(o.payment_status==='paid'?'badge-ok':'badge-ghost')+'" style="font-size:9px">'+(o.payment_status||'unpaid')+'</span></div>';

    if(S.orderMilestones.length){
      h+='<div style="margin-top:6px;border-top:1px solid var(--w08);padding-top:6px">';

        var paid=ms.status==='paid';

    var shipIdx=shipStages.indexOf(sh.status);
    h+='<div style="display:flex;gap:2px;margin-top:6px">';
    shipStages.forEach(function(st,i){
      h+='<div style="flex:1;height:3px;border-radius:2px;background:'+(i<=shipIdx?'var(--purple)':'var(--w08)')+'"></div>';
    });
    h+='</div>';
    h+='<div style="font-size:9px;color:var(--purple);margin-top:2px;text-transform:capitalize">'+esc(sh.status).replace(/_/g,' ')+'</div>';

  var canReview=deal.stage==='completed';
  if(deal.order&&(deal.order.status==='completed'||deal.order.status==='delivered'))canReview=true;
  if(canReview){
    var existingReview=S.reviews.find(function(rv){return rv.target_id===deal.matching.id&&rv.target_type==='matching';});

    h+='<div style="font-size:11px;font-weight:700;color:var(--w60);margin-bottom:6px">&#x2B50; Review</div>';
    if(existingReview){
      h+='<div>'+('&#x2B50;'.repeat(existingReview.rating))+'<span style="font-size:10px;color:var(--w40);margin-left:4px">'+existingReview.rating+'/5</span></div>';
      if(existingReview.title)h+='<div style="font-size:11px;font-weight:600;margin-top:4px">'+esc(existingReview.title)+'</div>';
      if(existingReview.content)h+='<div style="font-size:11px;color:var(--w40);margin-top:2px">'+esc(existingReview.content)+'</div>';

      h+='<div id="review-stars" style="display:flex;gap:2px;margin-bottom:6px">';
      for(var star=1;star<=5;star++){h+='<span onclick="B.setReviewStar('+star+')" style="cursor:pointer;font-size:18px;color:'+(S.reviewDraft.rating>=star?'var(--acc)':'var(--w12)')+'">&#x2B50;</span>';}
      h+='</div>';
      h+='<input type="text" placeholder="Title (optional)" value="'+esc(S.reviewDraft.title||'')+'" oninput="B._rvTitle=this.value" style="width:100%;padding:6px 8px;background:var(--w08);border:1px solid var(--bd);border-radius:6px;color:var(--w);font-size:11px;margin-bottom:4px;outline:none">';
      h+='<textarea placeholder="Your review..." oninput="B._rvContent=this.value" style="width:100%;padding:6px 8px;background:var(--w08);border:1px solid var(--bd);border-radius:6px;color:var(--w);font-size:11px;min-height:40px;resize:vertical;outline:none;font-family:inherit;margin-bottom:4px">'+esc(S.reviewDraft.content||'')+'</textarea>';
      h+='<button class="btn btn-pri btn-sm" onclick="B.submitReview(\''+deal.matching.id+'\')" style="width:100%;font-size:10px"'+(S.reviewDraft.rating?'':' disabled')+'>Submit Review</button>';
    }
    h+='</div>';
  }

  return h;
}

    case'inquiry':
      h+='<div style="font-size:12px;color:var(--w60)">Your inquiry has been submitted. Our team is reviewing it and will match you with the best seller.</div>';
      if(deal.inquiry){h+='<div style="margin-top:8px;font-size:12px"><strong>Product:</strong> '+esc(deal.inquiry.product_query||'')+'<br><strong>Type:</strong> '+esc(deal.inquiry.inquiry_type||'')+'<br><strong>Status:</strong> <span class="badge badge-ghost">'+esc(deal.inquiry.status||'pending')+'</span></div>';}
      break;
    case'matched':
      h+='<div style="font-size:12px;color:var(--w60)">You\'ve been matched with <strong>'+esc(getSellerName(deal.sellerId))+'</strong>! Start a conversation to discuss your needs.</div>';
      h+='<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">';
      h+='<button class="btn btn-pri btn-sm" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Start Chatting</button>';
      h+='<button class="btn btn-ghost btn-sm" onclick="B.requestQuote(\''+deal.matching.id+'\')">&#x1F4B0; Request Quotation</button>';
      h+='</div>';
      break;
    case'quotation':
      h+='<div style="font-size:12px;color:var(--w60)">The seller has shared a quotation. Review the documents below, then accept or request changes.</div>';
      // Show document action buttons
      var piDocs=deal.documents.filter(function(d){return d.doc_type==='pi';});
      if(piDocs.length){
        h+='<div style="margin-top:8px;padding:10px;background:rgba(0,212,255,.05);border-radius:8px;border:1px solid rgba(0,212,255,.15)">';
        var latestPI=piDocs[0];
        var piContent=null;try{piContent=JSON.parse(latestPI.content);}catch(e){}
        if(piContent){
          h+='<div style="font-size:12px;font-weight:700;margin-bottom:6px">&#x1F4B0; Proforma Invoice — '+esc(latestPI.doc_number||'')+'</div>';
          if(piContent.items&&piContent.items.length){
            h+='<div style="font-size:11px;margin-bottom:6px">';
            piContent.items.forEach(function(it){h+='<div>'+esc(it.name||'Item')+' × '+(it.qty||0)+' '+esc(it.unit||'PCS')+' @ $'+(parseFloat(it.unit_price)||0).toFixed(2)+' = <strong>$'+((parseFloat(it.qty)||0)*(parseFloat(it.unit_price)||0)).toFixed(2)+'</strong></div>';});
            h+='<div style="margin-top:4px;font-weight:700;color:var(--acc)">Total: $'+(piContent.total||0).toFixed(2)+'</div>';
            h+='</div>';
          }
          if(piContent.payment_terms)h+='<div style="font-size:11px;color:var(--w40)">Payment: '+esc(piContent.payment_terms)+'</div>';
          if(piContent.incoterms)h+='<div style="font-size:11px;color:var(--w40)">Incoterms: '+esc(piContent.incoterms)+'</div>';
        }
        h+='<div style="display:flex;gap:8px;margin-top:10px">';
        h+='<button class="btn btn-pri btn-sm" onclick="B.acceptQuote(\''+deal.matching.id+'\')">&#x2705; Accept &amp; Proceed</button>';
        h+='<button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Negotiate</button>';
        h+='</div></div>';
      }
      break;
    case'sample':
      h+='<div style="font-size:12px;color:var(--w60)">Sample stage — track your sample request status below. Once you receive and approve the sample, we can proceed to negotiation.</div>';
      var deliveredSamples=(deal.dealSamples||[]).filter(function(s){return s.status==='delivered';});
      if(deliveredSamples.length){
        h+='<div style="display:flex;gap:8px;margin-top:10px">';
        h+='<button class="btn btn-pri btn-sm" onclick="B.confirmSampleOk(\''+deal.matching.id+'\')">&#x1F44D; Sample Approved — Proceed to Negotiation</button>';
        h+='<button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Request Changes</button>';
        h+='</div>';
      }
      break;
    case'negotiation':
      h+='<div style="font-size:12px;color:var(--w60)">Finalize pricing, MOQ, delivery schedule, and payment terms with the seller. Once agreed, the seller will create the order.</div>';
      h+='<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">';
      h+='<button class="btn btn-pri btn-sm" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Continue Discussion</button>';
      h+='<button class="btn btn-ghost btn-sm" onclick="B.confirmReadyToOrder(\''+deal.matching.id+'\')">&#x2705; Ready to Order</button>';
      h+='</div>';
      break;
    case'order':
      h+='<div style="font-size:12px;color:var(--w60)">Your order has been confirmed! Track payment milestones and production status below.</div>';
      if(deal.order&&deal.order.payment_status!=='paid'){
        h+='<div style="margin-top:8px;padding:8px;background:rgba(255,165,0,.08);border-radius:6px;font-size:11px;color:var(--acc)">&#x26A0;&#xFE0F; Payment pending — contact the seller via chat to arrange payment details.</div>';
      }
      break;
    case'production':
      h+='<div style="font-size:12px;color:var(--w60)">Your order is being manufactured. The seller will update progress and notify you when ready for shipment.</div>';
      h+='<div style="margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Check Production Status</button></div>';
      break;
    case'shipping':
      h+='<div style="font-size:12px;color:var(--w60)">Your shipment is on its way! Track delivery status below.</div>';
      if(deal.shipment&&deal.shipment.status==='delivered'){
        h+='<div style="display:flex;gap:8px;margin-top:10px">';
        h+='<button class="btn btn-pri btn-sm" onclick="B.confirmDelivery(\''+deal.matching.id+'\')">&#x1F4E6; Confirm Receipt</button>';
        h+='</div>';
      }
      break;
    case'completed':
      h+='<div style="font-size:12px;color:var(--ok)">This deal is complete. Thank you for using Whistle AI!</div>';
      break;
  }
  h+='</div>';

  // Documents section
  if((deal.documents||[]).length){
    h+='<div class="stage-card"><div class="stage-card-title">&#x1F4C4; Documents ('+(deal.documents||[]).length+')</div>';
    (deal.documents||[]).forEach(function(doc){
      var typeNames={pi:'Proforma Invoice',ci:'Commercial Invoice',pl:'Packing List',co:'Certificate of Origin',sc:'Sales Contract'};
      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--w08)">';
      h+='<span class="badge badge-acc" style="font-size:10px">'+esc(doc.doc_type||'').toUpperCase()+'</span>';
      h+='<div style="flex:1;font-size:12px"><div style="font-weight:600">'+esc(doc.doc_number||typeNames[doc.doc_type]||'Document')+'</div><div style="color:var(--w40)">'+formatDate(doc.created_at)+'</div></div>';
      if(doc.pdf_url)h+='<a href="'+esc(doc.pdf_url)+'" target="_blank" class="btn btn-ghost btn-sm" style="font-size:10px">&#x1F4E5; PDF</a>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Samples section
  if((deal.dealSamples||[]).length){
    h+='<div class="stage-card"><div class="stage-card-title">&#x1F4E6; Samples ('+(deal.dealSamples||[]).length+')</div>';
    (deal.dealSamples||[]).forEach(function(s){
      var stCls=s.status==='delivered'?'badge-ok':s.status==='shipped'?'badge-pri':'badge-ghost';
      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0">';
      h+='<span class="badge '+stCls+'">'+esc(s.status)+'</span>';
      h+='<div style="flex:1;font-size:12px">Qty: '+esc(s.quantity||1);
      if(s.tracking_number)h+=' &middot; Track: '+esc(s.tracking_number);
      h+='</div>';
      if(s.feedback_rating)h+='<span style="color:var(--acc)">'+('&#x2B50;'.repeat(s.feedback_rating))+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Sample Request — available for matched/negotiation/sample stages when seller is known
  var canRequestSample=deal.matching&&deal.sellerId&&!deal.order&&['matched','quotation','negotiation','sample'].indexOf(deal.stage)>-1;
  var hasPendingSample=(deal.dealSamples||[]).some(function(s){return s.status==='requested'||s.status==='preparing';});
  if(canRequestSample&&!hasPendingSample){
    if(S._sampleFormOpen===deal.id){
      h+='<div class="stage-card"><div class="stage-card-title">&#x1F4E6; Request Sample</div>';
      h+='<div style="font-size:12px;color:var(--w60);margin-bottom:10px">Request a product sample from this seller before placing a full order.</div>';
      h+='<div style="display:grid;gap:8px">';
      h+='<div><label style="font-size:11px;color:var(--w40);display:block;margin-bottom:3px">Quantity</label>';
      h+='<input type="number" id="smp-qty" min="1" value="1" style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;outline:none"></div>';
      h+='<div><label style="font-size:11px;color:var(--w40);display:block;margin-bottom:3px">Shipping Address</label>';
      h+='<input type="text" id="smp-addr" placeholder="Full shipping address with postal code" style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;outline:none"></div>';
      h+='<div><label style="font-size:11px;color:var(--w40);display:block;margin-bottom:3px">Preferred Shipping Method</label>';
      h+='<select id="smp-method" style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;outline:none">';
      h+='<option value="express">Express (DHL/FedEx/UPS)</option>';
      h+='<option value="standard">Standard Post</option>';
      h+='<option value="economy">Economy</option>';
      h+='<option value="seller_choice">Seller\'s Choice</option>';
      h+='</select></div>';
      h+='<div><label style="font-size:11px;color:var(--w40);display:block;margin-bottom:3px">Notes (optional)</label>';
      h+='<textarea id="smp-notes" rows="2" placeholder="e.g., specific variant, color, packaging requirements..." style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;resize:vertical;outline:none;font-family:inherit"></textarea></div>';
      h+='</div>';
      h+='<div style="display:flex;gap:8px;margin-top:10px">';
      h+='<button class="btn btn-pri btn-sm" onclick="B.submitSampleReq(\''+deal.matching.id+'\')">&#x1F4E8; Submit Request</button>';
      h+='<button class="btn btn-ghost btn-sm" onclick="B.toggleSampleForm(null)">Cancel</button>';
      h+='</div></div>';
    }else{
      h+='<div style="padding:8px 0"><button class="btn btn-ghost btn-sm" onclick="B.toggleSampleForm(\''+deal.id+'\')" style="width:100%;border:1px dashed var(--bd)">&#x1F4E6; Request Sample</button></div>';
    }
  }

  // Order section
  if(deal.order){
    var o=deal.order;
    h+='<div class="stage-card"><div class="stage-card-title">&#x2705; Order — '+esc(o.order_number||'')+'</div>';
    h+='<div class="grid-2" style="gap:8px;font-size:12px">';
    h+='<div><span style="color:var(--w40)">Amount:</span> <strong style="color:var(--acc)">$'+Number(o.total_amount||0).toLocaleString()+'</strong></div>';
    h+='<div><span style="color:var(--w40)">Status:</span> <span class="badge badge-acc">'+esc(o.status)+'</span></div>';
    h+='<div><span style="color:var(--w40)">Terms:</span> '+esc(o.payment_terms||'-')+'</div>';
    h+='<div><span style="color:var(--w40)">Payment:</span> <span class="badge '+(o.payment_status==='paid'?'badge-ok':'badge-ghost')+'">'+esc(o.payment_status||'unpaid')+'</span></div>';
    h+='</div>';
    // Milestones
    if(S.orderMilestones.length){
      h+='<div style="margin-top:10px">';
      S.orderMilestones.forEach(function(ms){
        var paid=ms.status==='paid';
        h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:11px">';
        h+='<span>'+(paid?'&#x2705;':'&#x23F3;')+'</span>';
        h+='<span style="flex:1;text-transform:capitalize;'+(paid?'color:var(--ok)':'')+'">'+esc(ms.name).replace(/_/g,' ')+' ('+esc(ms.percentage)+'%)</span>';
        h+='<span style="font-weight:700">$'+Number(ms.amount||0).toLocaleString()+'</span>';
        h+='<span class="badge '+(paid?'badge-ok':'badge-ghost')+'" style="font-size:9px">'+(paid?'Paid':'Pending')+'</span></div>';
      });
      h+='</div>';
    }
    h+='</div>';
  }

  // Shipment section
  if(deal.shipment){
    var sh=deal.shipment;
    var shipStages=['booked','loaded','departed','in_transit','arrived','customs_clearance','delivered'];
    var shipIdx=shipStages.indexOf(sh.status);
    h+='<div class="stage-card"><div class="stage-card-title">&#x1F6A2; Shipment — '+esc(sh.type||'ocean').toUpperCase()+'</div>';
    h+='<div style="font-size:12px;margin-bottom:10px">'+esc(sh.port_of_loading||'Busan')+' &#x2192; '+esc(sh.port_of_discharge||'TBD');
    if(sh.eta)h+=' &middot; ETA: '+sh.eta;
    if(sh.bl_number)h+=' &middot; B/L: '+esc(sh.bl_number);
    h+='</div>';
    h+='<div class="ship-timeline">';
    shipStages.forEach(function(st,i){
      var cls=i<shipIdx?'done':i===shipIdx?'current':'';
      h+='<div class="ship-step '+cls+'"><div class="dot"></div>';
      h+='<div style="font-size:11px;font-weight:'+(i===shipIdx?'700':'400')+'">'+st.replace(/_/g,' ')+'</div></div>';
    });
    h+='</div></div>';
  }

  // If no extra content, show helpful tips
  if(!(deal.documents||[]).length&&!(deal.dealSamples||[]).length&&!deal.order&&!deal.shipment&&deal.stage!=='inquiry'){
    h+='<div style="padding:20px;text-align:center;color:var(--w40);font-size:12px">';
    h+='<div style="font-size:24px;margin-bottom:8px">&#x1F4A1;</div>';
    h+='Use the chat to discuss requirements, request quotes, and exchange documents with your seller.';
    h+='</div>';
  }

  // Review section — show for completed deals
  var canReview=deal.stage==='completed'||deal.stage==='delivered';
  if(deal.order&&(deal.order.status==='completed'||deal.order.status==='delivered'))canReview=true;
  if(canReview){
    var existingReview=S.reviews.find(function(rv){return rv.target_id===deal.matching.id&&rv.target_type==='matching';});
    h+='<div class="stage-card"><div class="stage-card-title">&#x2B50; Review & Rating</div>';
    if(existingReview){
      h+='<div style="padding:8px 0">';
      h+='<div style="margin-bottom:6px">'+('&#x2B50;'.repeat(existingReview.rating))+'<span style="color:var(--w40);margin-left:4px;font-size:12px">'+existingReview.rating+'/5</span></div>';
      if(existingReview.title)h+='<div style="font-weight:600;font-size:13px;margin-bottom:4px">'+esc(existingReview.title)+'</div>';
      if(existingReview.content)h+='<div style="font-size:12px;color:var(--w60);line-height:1.6">'+esc(existingReview.content)+'</div>';
      if(existingReview.tags&&existingReview.tags.length)h+='<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">'+existingReview.tags.map(function(t){return'<span class="badge badge-ghost" style="font-size:10px">'+esc(t)+'</span>';}).join('')+'</div>';
      h+='<div style="font-size:10px;color:var(--w20);margin-top:8px">Submitted '+new Date(existingReview.created_at).toLocaleDateString()+'</div>';
      h+='</div>';
    }else{
      h+='<div style="padding:8px 0;font-size:12px;color:var(--w60);margin-bottom:10px">Share your experience with this seller to help other buyers.</div>';
      h+='<div id="review-stars" style="display:flex;gap:4px;margin-bottom:10px">';
      for(var star=1;star<=5;star++){
        h+='<span onclick="B.setReviewStar('+star+')" style="cursor:pointer;font-size:24px;color:'+(S.reviewDraft.rating>=star?'var(--acc)':'var(--w12)')+';transition:color .2s">&#x2B50;</span>';
      }
      if(S.reviewDraft.rating)h+='<span style="color:var(--w40);font-size:12px;align-self:center;margin-left:6px">'+S.reviewDraft.rating+'/5</span>';
      h+='</div>';
      h+='<input type="text" placeholder="Review title (optional)" value="'+esc(S.reviewDraft.title||'')+'" oninput="B._rvTitle=this.value" style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;margin-bottom:8px;outline:none">';
      h+='<textarea placeholder="Write your review..." oninput="B._rvContent=this.value" style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;min-height:60px;resize:vertical;outline:none;font-family:inherit">'+esc(S.reviewDraft.content||'')+'</textarea>';
      var rvTags=['Fast Response','Good Quality','Fair Price','Professional','Reliable','Great Communication'];
      h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin:8px 0">';
      rvTags.forEach(function(tag){
        var sel=S.reviewDraft.tags.indexOf(tag)>-1;
        h+='<span onclick="B.toggleReviewTag(\''+tag+'\')" class="badge '+(sel?'badge-pri':'badge-ghost')+'" style="cursor:pointer;font-size:10px">'+tag+'</span>';
      });
      h+='</div>';
      h+='<button class="btn btn-pri btn-sm" onclick="B.submitReview(\''+deal.matching.id+'\')" style="margin-top:6px"'+(S.reviewDraft.rating?'':' disabled')+'>Submit Review</button>';
    }
    h+='</div>';
  }

  return h;
}

/* === REVIEWS === */
function loadReviews(){
  if(!S.user)return;
  sb.from('reviews').select('*').eq('reviewer_id',S.user.id).order('created_at',{ascending:false}).then(function(r){
    S.reviews=r.data||[];render();
  });
}

function setReviewStar(n){
  S.reviewDraft.rating=n;render();
}

function toggleReviewTag(tag){
  var idx=S.reviewDraft.tags.indexOf(tag);
  if(idx>-1)S.reviewDraft.tags.splice(idx,1);
  else S.reviewDraft.tags.push(tag);
  render();
}

function submitReview(matchingId){
  if(!S.user||!S.reviewDraft.rating)return;
  var title=B._rvTitle||S.reviewDraft.title||'';
  var content=B._rvContent||S.reviewDraft.content||'';
  sb.from('reviews').insert({
    reviewer_id:S.user.id,
    reviewer_role:'buyer',
    target_id:matchingId,
    target_type:'matching',
    rating:S.reviewDraft.rating,
    title:title||null,
    content:content||null,
    tags:S.reviewDraft.tags.length?S.reviewDraft.tags:null,
    is_public:true
  }).then(function(r){
    if(r.error){toast('Failed to submit review: '+r.error.message,'err');return;}
    toast('Review submitted! Thank you.','ok');
    S.reviewDraft={rating:0,title:'',content:'',tags:[]};
    B._rvTitle='';B._rvContent='';
    loadReviews();
  });
}

/* === DEAL ACTIONS (BUYER SIDE) === */
function requestQuote(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  sb.from('messages').insert({
    buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
    body:'Hi! I\'d like to request a formal quotation (Proforma Invoice) for this product. Please include pricing, MOQ, lead time, and payment terms.',
    message:'Quotation request',msg_type:'text',channel:'platform',direction:'inbound'
  }).then(function(){
    toast('Quotation request sent to seller!','ok');
    render();
  });
}

function acceptQuote(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  // Move to sample stage
  sb.from('matchings').update({status:'sample'}).eq('id',matchingId).then(function(){
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Quotation Accepted] I accept the quotation. Let\'s proceed — would you like to send a sample first?',
      message:'Quote accepted',msg_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){});
    toast('Quotation accepted! Moving to sample stage.','ok');
    deal.matching.status='sample';
    buildDeals();render();
  });
}

function confirmSampleOk(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  sb.from('matchings').update({status:'negotiation'}).eq('id',matchingId).then(function(){
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Sample Approved] The sample quality meets our requirements. Let\'s finalize the order terms.',
      message:'Sample approved',msg_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){});
    toast('Sample approved! Moving to negotiation.','ok');
    deal.matching.status='negotiation';
    buildDeals();render();
  });
}

function confirmReadyToOrder(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  sb.from('messages').insert({
    buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
    body:'[Ready to Order] We\'re ready to proceed with the order. Please create the purchase order with the agreed terms.',
    message:'Ready to order',msg_type:'system',channel:'platform',direction:'inbound'
  }).then(function(){
    toast('Order readiness confirmed! The seller will create the order.','ok');
    render();
  });
}

function confirmDelivery(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  sb.from('matchings').update({status:'completed'}).eq('id',matchingId).then(function(){
    if(deal.order)sb.from('orders').update({status:'completed'}).eq('id',deal.order.id).then(function(){});
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Delivery Confirmed] Goods received successfully. Thank you!',
      message:'Delivery confirmed',msg_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){
      toast('Delivery confirmed! Deal completed.','ok');
      deal.matching.status='completed';
      buildDeals();render();
    });
  });
}

/* === SAMPLE REQUESTS === */
function toggleSampleForm(dealId){
  S._sampleFormOpen=dealId;render();
}

function submitSampleReq(matchingId){
  if(!S.user)return;
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  var qty=parseInt(document.getElementById('smp-qty').value)||1;
  var addr=document.getElementById('smp-addr').value.trim();
  var method=document.getElementById('smp-method').value;
  var notes=document.getElementById('smp-notes').value.trim();
  if(!addr){toast('Please enter a shipping address','err');return;}
  sb.from('samples').insert({
    user_id:deal.sellerId,
    buyer_id:deal.buyerLinkId,
    status:'requested',
    quantity:qty,
    shipping_method:method,
    notes:(addr?'Ship to: '+addr:'')+(notes?'\n'+notes:'')
  }).then(function(r){
    if(r.error){toast('Failed to request sample: '+r.error.message,'err');return;}
    toast('Sample request sent! The seller will review your request.','ok');
    S._sampleFormOpen=null;
    loadSamples();
    // Also send a chat message to the seller
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,
      user_id:deal.sellerId,
      sender_type:'buyer',
      message:'[Sample Request] Qty: '+qty+' | Shipping: '+method+(notes?' | Notes: '+notes:''),
      msg_type:'system'
    }).then(function(){});
  });
}

/* === MESSAGES / CHAT === */
function loadConversations(){
  var bids=getBuyerIds();if(!bids.length)return;
  sb.from('messages').select('*').in('buyer_id',bids).order('created_at',{ascending:false}).limit(200).then(function(r){
    var msgs=r.data||[];
    var convMap={};
    msgs.forEach(function(m){
      var key=m.buyer_id+'_'+m.user_id;
      if(!convMap[key]){convMap[key]={buyerLinkId:m.buyer_id,sellerId:m.user_id,lastMsg:m,unread:0,msgs:[]};}
      convMap[key].msgs.push(m);
      if(!m.is_read&&m.sender_type!=='buyer'&&!m.read_at)convMap[key].unread++;
    });
    S.conversations=Object.values(convMap).sort(function(a,b){return new Date(b.lastMsg.created_at)-new Date(a.lastMsg.created_at);});
    S.chatUnread=S.conversations.reduce(function(s,c){return s+c.unread;},0);
    render();
  });
}

  h+='<div class="chat-panel">';

    h+='<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--w40);font-size:13px"><div style="text-align:center"><div style="font-size:36px;margin-bottom:12px">&#x1F4AC;</div>Select a conversation</div></div>';
  } else {
    h+='<div style="padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px">';
    h+='<button class="btn btn-ghost btn-sm" onclick="B.closeChat()" style="display:none" id="chatBackBtn">&#x2190;</button>';
    h+='<div style="font-weight:700;font-size:14px">'+esc(getSellerName(S.currentChat.sellerId))+'</div></div>';
    h+='<div class="chat-msgs" id="chatMsgs" ondragover="event.preventDefault();this.style.background=\'rgba(0,212,255,.04)\'" ondragleave="this.style.background=\'transparent\'" ondrop="B.chatDrop(event)">';
    var lastDate='';
    S.chatMessages.forEach(function(m){
      var d=new Date(m.created_at).toLocaleDateString();
      if(d!==lastDate){h+='<div style="text-align:center;font-size:10px;color:var(--w20);padding:8px 0">'+d+'</div>';lastDate=d;}
      var isMine=m.sender_type==='buyer';
      h+=renderChatBubble(m,isMine);
    });
    h+='</div>';
    h+='<div class="chat-input-row"><button class="btn btn-ghost" style="padding:6px;font-size:16px;flex-shrink:0" onclick="B.chatAttach()" title="Attach file">&#x1F4CE;</button><input class="form-input" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key===\'Enter\')B.sendChat()" style="flex:1"><button class="btn btn-pri" onclick="B.sendChat()">Send</button></div>';
  }

function openChat(buyerLinkId,sellerId){
  S.currentChat={buyerLinkId:buyerLinkId,sellerId:sellerId};
  S.chatMessages=[];render();
  sb.from('messages').select('*').eq('buyer_id',buyerLinkId).eq('user_id',sellerId).order('created_at',{ascending:true}).limit(100).then(function(r){
    S.chatMessages=r.data||[];render();
    setTimeout(scrollChatBottom,100);
    // Mark unread as read
    var unread=(r.data||[]).filter(function(m){return m.sender_type!=='buyer'&&!m.read_at;});
    if(unread.length){
      sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).in('id',unread.map(function(m){return m.id;})).then(function(){loadConversations();});
    }
  });
  initChatRealtime(buyerLinkId);
}

function closeChat(){S.currentChat=null;if(S._chatChannel){sb.removeChannel(S._chatChannel);S._chatChannel=null;}render();}

function sendChat(){
  var inp=document.getElementById('chatInput');if(!inp||!inp.value.trim())return;
  var body=inp.value.trim();inp.value='';
  var msg={user_id:S.currentChat.sellerId,buyer_id:S.currentChat.buyerLinkId,body:body,sender_type:'buyer',message_type:'text',channel:'platform',direction:'inbound'};
  S.chatMessages.push(Object.assign({id:'temp_'+Date.now(),created_at:new Date().toISOString()},msg));
  render();scrollChatBottom();
  sb.from('messages').insert(msg).select().single().then(function(r){
    if(r.error){toast('Failed to send','err');return;}
    S.chatMessages=S.chatMessages.filter(function(m){return!m.id.toString().startsWith('temp_');});
    S.chatMessages.push(r.data);render();scrollChatBottom();
  });
}

function chatAttach(){
  if(!S.currentChat)return;
  var inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.jpg,.jpeg,.png,.doc,.docx,.xlsx,.csv';
  inp.onchange=function(){
    var file=inp.files[0];if(!file)return;
    if(file.size>10*1024*1024){toast('Max 10MB','warn');return;}
    var path='chat/buyer/'+S.user.id+'/'+Date.now()+'_'+file.name;
    toast('Uploading...','info');
    sb.storage.from('whistle-uploads').upload(path,file).then(function(r){
      if(r.error){toast('Upload failed','err');return;}
      var url=sb.storage.from('whistle-uploads').getPublicUrl(path).data.publicUrl;
      var msg={user_id:S.currentChat.sellerId,buyer_id:S.currentChat.buyerLinkId,body:file.name,sender_type:'buyer',message_type:'file',file_url:url,channel:'platform',direction:'inbound'};
      sb.from('messages').insert(msg).select().single().then(function(r2){
        if(r2.error){toast('Send failed','err');return;}
        S.chatMessages.push(r2.data);render();scrollChatBottom();
        toast('File sent','ok');
      });
    });
  };inp.click();
}

function chatDrop(e){
  e.preventDefault();e.currentTarget.style.background='transparent';
  if(!S.currentChat)return;
  var files=e.dataTransfer.files;if(!files||!files.length)return;
  var file=files[0];
  if(file.size>10*1024*1024){toast('Max 10MB','warn');return;}
  var ALLOWED=/\.(pdf|jpe?g|png|gif|webp|doc|docx|xls|xlsx|csv)$/i;
  if(!ALLOWED.test(file.name)){toast('Unsupported file type','warn');return;}
  var path='chat/buyer/'+S.user.id+'/'+Date.now()+'_'+file.name;
  toast('Uploading...','info');
  sb.storage.from('whistle-uploads').upload(path,file).then(function(r){
    if(r.error){toast('Upload failed','err');return;}
    var url=sb.storage.from('whistle-uploads').getPublicUrl(path).data.publicUrl;
    sb.from('messages').insert({user_id:S.currentChat.sellerId,buyer_id:S.currentChat.buyerLinkId,body:file.name,sender_type:'buyer',message_type:'file',file_url:url,channel:'platform',direction:'inbound'}).select().single().then(function(r2){
      if(r2.error){toast('Send failed','err');return;}
      S.chatMessages.push(r2.data);render();scrollChatBottom();
    });
  });
}

function initChatRealtime(buyerLinkId){
  if(S._chatChannel){sb.removeChannel(S._chatChannel);S._chatChannel=null;}
  S._chatChannel=sb.channel('buyer-chat-'+buyerLinkId).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'buyer_id=eq.'+buyerLinkId},function(payload){
    var m=payload.new;
    if(S.currentChat&&S.currentChat.buyerLinkId===buyerLinkId){
      if(!S.chatMessages.find(function(x){return x.id===m.id;})){S.chatMessages.push(m);render();scrollChatBottom();}
      if(m.sender_type!=='buyer'){sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).eq('id',m.id).then(function(){});}
    } else {S.chatUnread++;render();}
  }).subscribe();
}

function scrollChatBottom(){var el=document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;}

/* === DOCUMENT APPROVAL WORKFLOW === */
function approveDocument(docId){
  if(S._docApproving)return;S._docApproving=true;
  sb.from('documents').update({status:'approved',approved_at:new Date().toISOString(),approved_by:S.user.id}).eq('id',docId).then(function(r){
    S._docApproving=false;
    if(r.error){toast(r.error.message||'Failed to approve document','err');return;}
    // Update local state
    var doc=S.sharedDocs.find(function(d){return d.id===docId;});
    if(doc){doc.status='approved';doc.approved_at=new Date().toISOString();}
    if(S.modalData&&S.modalData.id===docId){S.modalData.status='approved';S.modalData.approved_at=new Date().toISOString();}
    toast(t('Document approved successfully'),'ok');
    // Insert system message in deal chat if there's an active deal with this seller
    _insertDocApprovalChatMsg(doc,'approved');
    // Check stage progression (approval also counts)
    _checkStageProgression(doc);
    render();
  });
}

function openRevisionModal(docId){
  S.modal='docRevision';S._revisionDocId=docId;render();
}

function submitRevisionRequest(){
  var reason=document.getElementById('revisionReason');
  if(!reason||!reason.value.trim()){toast('Please enter a revision reason.','warn');return;}
  var docId=S._revisionDocId;
  var reasonText=reason.value.trim();
  if(S._docApproving)return;S._docApproving=true;
  sb.from('documents').update({status:'revision_requested',revision_reason:reasonText,revision_requested_at:new Date().toISOString(),revision_requested_by:S.user.id}).eq('id',docId).then(function(r){
    S._docApproving=false;
    if(r.error){toast(r.error.message||'Failed to request revision','err');return;}
    // Update local state
    var doc=S.sharedDocs.find(function(d){return d.id===docId;});
    if(doc){doc.status='revision_requested';doc.revision_reason=reasonText;}
    toast(t('Revision request sent'),'ok');
    // Insert system message in deal chat
    _insertDocApprovalChatMsg(doc,'revision_requested',reasonText);
    S.modal='docDetail';
    if(S.modalData&&S.modalData.id===docId){S.modalData.status='revision_requested';S.modalData.revision_reason=reasonText;}
    render();
  });
}

function _insertDocApprovalChatMsg(doc,action,reason){
  if(!doc)return;
  // Find the deal/buyer_link associated with this document's seller
  var sellerId=doc.user_id;
  var link=S.buyerLinks.find(function(bl){return bl.seller_id===sellerId;});
  if(!link)return;
  var typeNames={pi:'Proforma Invoice',ci:'Commercial Invoice',pl:'Packing List',co:'Certificate of Origin',sc:'Sales Contract'};
  var docLabel=typeNames[doc.doc_type]||(doc.doc_type||'').toUpperCase();
  var body='';
  if(action==='approved'){
    body='[Document Approved] '+docLabel+(doc.doc_number?' ('+doc.doc_number+')':'')+' has been approved by the buyer.';
  } else {
    body='[Revision Requested] '+docLabel+(doc.doc_number?' ('+doc.doc_number+')':'')+' — Reason: '+(reason||'');
  }
  sb.from('messages').insert({
    user_id:sellerId,
    buyer_id:link.id,
    sender_type:'buyer',
    body:body,message_type:'system',
    channel:'platform',direction:'inbound',
    created_at:new Date().toISOString()
  }).then(function(r){
    if(!r.error){
      sb.from('notifications').insert({
        user_id:sellerId,type:'document',
        title:action==='approved'?'Document Approved':'Revision Requested',
        body:docLabel+(doc.doc_number?' '+doc.doc_number:'')+' — '+(action==='approved'?'Approved by buyer':'Revision requested by buyer'),
        link_page:'documents',is_read:false
      }).then(function(){});
    }
  });
}

function showDocPreviewBuyer(docId){

  var existing=document.getElementById('bdpOverlay');if(existing)existing.remove();

  var content=doc.content||{};
  var d={
    type:doc.doc_type||'other',
    company:content.company||content.seller||{},
    buyer:content.buyer||{},
    ref:content.ref||{doc_no:doc.doc_number||'',doc_date:doc.created_at?formatDate(doc.created_at):''},
    items:content.items||[],
    remarks:content.remarks||''

  if(!d.ref.doc_no&&doc.doc_number)d.ref.doc_no=doc.doc_number;

function _initSigCanvas(){
  _sigCanvas=document.getElementById('sigCanvas');
  if(!_sigCanvas)return;
  _sigCtx=_sigCanvas.getContext('2d');
  _sigCtx.strokeStyle='#ffffff';_sigCtx.lineWidth=2.5;_sigCtx.lineCap='round';_sigCtx.lineJoin='round';
  _sigDrawing=false;_sigHasDrawn=false;
  // Mouse events
  _sigCanvas.addEventListener('mousedown',function(e){_sigStartDraw(e.offsetX,e.offsetY);});
  _sigCanvas.addEventListener('mousemove',function(e){if(_sigDrawing)_sigDraw(e.offsetX,e.offsetY);});
  _sigCanvas.addEventListener('mouseup',function(){_sigDrawing=false;});
  _sigCanvas.addEventListener('mouseleave',function(){_sigDrawing=false;});
  // Touch events
  _sigCanvas.addEventListener('touchstart',function(e){e.preventDefault();var r=_sigCanvas.getBoundingClientRect();var touch=e.touches[0];_sigStartDraw(touch.clientX-r.left,touch.clientY-r.top);},{passive:false});
  _sigCanvas.addEventListener('touchmove',function(e){e.preventDefault();if(!_sigDrawing)return;var r=_sigCanvas.getBoundingClientRect();var touch=e.touches[0];_sigDraw(touch.clientX-r.left,touch.clientY-r.top);},{passive:false});
  _sigCanvas.addEventListener('touchend',function(){_sigDrawing=false;});
}
function _sigStartDraw(x,y){_sigDrawing=true;_sigHasDrawn=true;_sigCtx.beginPath();_sigCtx.moveTo(x,y);}
function _sigDraw(x,y){_sigCtx.lineTo(x,y);_sigCtx.stroke();}

function clearSignature(){
  if(_sigCtx&&_sigCanvas){_sigCtx.clearRect(0,0,_sigCanvas.width,_sigCanvas.height);_sigHasDrawn=false;}
}

function submitSignature(){
  if(!_sigHasDrawn||!_sigCanvas){toast(t('Please draw your signature first'),'warn');return;}
  if(S._sigSubmitting)return;S._sigSubmitting=true;
  var sigData=_sigCanvas.toDataURL('image/png');
  var docId=_sigDocId;
  var now=new Date().toISOString();
  sb.from('documents').update({
    status:'signed',
    signature_data:sigData,
    signed_at:now,
    signed_by:S.user.id,
    approved_at:now,
    approved_by:S.user.id
  }).eq('id',docId).then(function(r){
    S._sigSubmitting=false;
    if(r.error){toast(r.error.message||'Failed to sign document','err');return;}
    // Update local state
    var doc=S.sharedDocs.find(function(d){return d.id===docId;});
    if(doc){doc.status='signed';doc.signature_data=sigData;doc.signed_at=now;doc.approved_at=now;}
    if(S.modalData&&S.modalData.id===docId){S.modalData.status='signed';S.modalData.signature_data=sigData;S.modalData.signed_at=now;}
    toast(t('Document signed successfully'),'ok');
    // Insert system message in chat
    _insertDocSignedChatMsg(doc);
    // Check stage progression
    _checkStageProgression(doc);
    S.modal=null;S.modalData=null;render();
  });
}

function _insertDocSignedChatMsg(doc){

   ============================================================= */
var _STAGE_DOC_REQS={
  quotation:['pi'],
  negotiation:['pi'],
  order:['pi'],
  production:['ci','pl'],
  shipping:['bl']
};

function _checkStageProgression(signedDoc){
  if(!signedDoc||!S.currentDeal)return;
  var deal=S.currentDeal;
  var stage=deal.stage;
  var reqs=_STAGE_DOC_REQS[stage];
  if(!reqs)return;
  // Check if all required doc types for this stage exist and are signed
  var dealDocs=(deal.documents||[]).concat(S.sharedDocs.filter(function(d){
    return d.user_id===(deal.sellerId) || d.buyer_id===S.user.id;
  }));
  var allSigned=reqs.every(function(reqType){
    return dealDocs.some(function(dd){return dd.doc_type===reqType&&(dd.status==='signed'||dd.status==='approved');});
  });
  if(allSigned){
    S.modal='stageAdvance';S.modalData={deal:deal,stage:stage};
    render();
  }
}

function toggleRevField(fieldId,label){
  if(!S._revisionFields)S._revisionFields=[];

  else{S._revisionFields.push({id:fieldId,label:label,note:''});}
  render();
}

function updateRevFieldNote(fieldId,note){
  if(!S._revisionFields)return;
  var f=S._revisionFields.find(function(x){return x.id===fieldId;});
  if(f)f.note=note;
}

function submitRevisionAnnotated(){
  var reasonEl=document.getElementById('revisionReasonAnnotated');
  var reason=reasonEl?reasonEl.value.trim():'';
  var fields=S._revisionFields||[];
  if(!reason&&!fields.length){toast('Please select fields or enter a reason.','warn');return;}
  var docId=S._revisionDocId;
  if(S._docApproving)return;S._docApproving=true;
  // Build combined reason text
  var reasonParts=[];
  if(fields.length){
    reasonParts.push('Fields needing revision: '+fields.map(function(f){return f.label+(f.note?' ('+f.note+')':'');}).join(', '));
  }
  if(reason)reasonParts.push(reason);
  var fullReason=reasonParts.join(' | ');
  sb.from('documents').update({
    status:'revision_requested',
    revision_reason:fullReason,
    revision_fields:fields,
    revision_requested_at:new Date().toISOString(),
    revision_requested_by:S.user.id
  }).eq('id',docId).then(function(r){
    S._docApproving=false;
    if(r.error){toast(r.error.message||'Failed to request revision','err');return;}
    var doc=S.sharedDocs.find(function(d){return d.id===docId;});
    if(doc){doc.status='revision_requested';doc.revision_reason=fullReason;doc.revision_fields=fields;}
    toast(t('Revision request sent'),'ok');
    _insertDocApprovalChatMsg(doc,'revision_requested',fullReason);
    S.modal='docDetail';
    if(S.modalData&&S.modalData.id===docId){
      S.modalData.status='revision_requested';
      S.modalData.revision_reason=fullReason;
      S.modalData.revision_fields=fields;
    }
    S._revisionFields=[];S._revisionGeneralNote='';
    render();
  });
}

var _translations={};
function translateMsg(msgId,targetLang){
  var key=msgId+'_'+(targetLang||'en');
  if(_translations[key]&&_translations[key]!=='loading'){
    delete _translations[key];render();return;
  }
  // Find message text from current messages
  var text='';
  var allMsgs=S.dealMessages.concat(S.chatMessages);
  for(var i=0;i<allMsgs.length;i++){if(String(allMsgs[i].id)===String(msgId)){text=allMsgs[i].body||'';break;}}
  if(!text)return;
  _translations[key]='loading';render();
  sb.functions.invoke('translate-text',{body:{text:text,target:targetLang||'en'}}).then(function(r){
    if(r.error){_translations[key]='[Translation failed]';render();return;}
    var d=r.data||{};
    _translations[key]=d.ok?d.translated:'[Translation failed]';
    render();
    setTimeout(function(){var el=document.getElementById('dealChatMsgs')||document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;},50);
  }).catch(function(){_translations[key]='[Translation failed]';render();});
}

}

function renderSystemCard(m,body){
  var ts=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var deal=S.currentDeal;

  // === DOCUMENT CARDS (Enhanced with status, preview, sign actions) ===
  if(body.indexOf('[서류 전송]')>-1||body.indexOf('Document')>-1||body.indexOf('PI-')>-1||body.indexOf('CI-')>-1||body.indexOf('[Document Signed]')>-1||body.indexOf('[Document Approved]')>-1||body.indexOf('[Revision Requested]')>-1){
    var docMatch=body.match(/(견적송장|상업송장|패킹리스트|원산지증명|계약서|PI|CI|PL|CO|SC|Proforma Invoice|Commercial Invoice|Packing List|Certificate of Origin|Sales Contract)\s*\(?([A-Z]*)?\)?[^$]*?(\$[\d,.]+)?/i);
    var docType=docMatch?docMatch[1]:'Document';
    var amount=docMatch&&docMatch[3]?docMatch[3]:'';
    var docNum=body.match(/[A-Z]{2}-\d{4}-\d+/);
    var docIcons={PI:'&#x1F4B0;',CI:'&#x1F4CB;',PL:'&#x1F4E6;',CO:'&#x1F3F3;',SC:'&#x1F4DD;',BL:'&#x1F6A2;'};

    // Find matching doc in sharedDocs — prefer doc_id from message, fallback to regex
    var matchedDoc=null;
    var _msgDocId=m.doc_id||null;
    if(!_msgDocId&&m.metadata){try{var _md=typeof m.metadata==='string'?JSON.parse(m.metadata):m.metadata;_msgDocId=_md.doc_id||null;}catch(e){}}
    if(_msgDocId){matchedDoc=S.sharedDocs.find(function(sd){return sd.id===_msgDocId;});}
    if(!matchedDoc&&docNum){matchedDoc=S.sharedDocs.find(function(sd){return sd.doc_number===docNum[0];});}
    if(!matchedDoc&&S.sharedDocs.length){matchedDoc=S.sharedDocs.find(function(sd){return sd.doc_type===typeCode.toLowerCase()&&sd.status==='sent';});}
    if(!matchedDoc&&S.sharedDocs.length){matchedDoc=S.sharedDocs.find(function(sd){return sd.doc_type===typeCode.toLowerCase();});}

    var h='<div style="display:flex;justify-content:center"><div class="chat-rich-card" style="min-width:280px;max-width:340px;'+cardBorder+'">';

    // Show revision reason inline if present
    if(isRevision){
      var reasonPart=body.match(/Reason:\s*(.+)/);
      if(reasonPart)h+='<div style="font-size:10px;color:var(--acc);background:rgba(255,184,0,.06);padding:4px 8px;border-radius:4px;margin:4px 0">'+esc(reasonPart[1])+'</div>';
    }

    if(matchedDoc){
      h+='<button class="btn btn-pri btn-sm" onclick="B.showDocPreviewBuyer(\''+matchedDoc.id+'\')" style="font-size:10px">&#x1F4C4; View</button>';
      if(matchedDoc.status==='sent'){
        h+='<button class="btn btn-ok btn-sm" onclick="B.openSignaturePad(\''+matchedDoc.id+'\')" style="font-size:10px">&#x270D; Sign</button>';
      }
      if(matchedDoc.pdf_url){
        h+='<a href="'+esc(matchedDoc.pdf_url)+'" target="_blank" class="btn btn-ghost btn-sm" style="font-size:10px">&#x1F4E5; PDF</a>';
      }
    }
    // Quote actions for PI in quotation stage
    if(deal&&deal.stage==='quotation'&&(typeCode==='PI'||docType==='견적송장')&&deal.matching){
      h+='<button class="btn btn-pri btn-sm" onclick="B.acceptQuote(\''+deal.matching.id+'\')" style="font-size:10px">&#x2705; Accept</button>';
      h+='<button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'dealChatInput\').focus()" style="font-size:10px">&#x1F4AC; Negotiate</button>';
    }
    h+='</div>';
    h+='</div></div>';
    return h;
  }

  // === STAGE TRANSITION CARDS ===
  if(body.indexOf('[단계 전환]')>-1||body.indexOf('Stage advanced')>-1){
    var stageMatch=body.match(/→\s*(.+?)\s*(단계|stage)/i);
    var stageName=stageMatch?stageMatch[1]:'Next';
    var stageIcons={'매칭':'&#x1F91D;','견적':'&#x1F4B0;','샘플':'&#x1F4E6;','협상':'&#x1F4DD;','주문':'&#x2705;','생산':'&#x1F3ED;','출하':'&#x1F6A2;','완료':'&#x1F389;'};
    var stIcon=stageIcons[stageName]||'&#x27A1;';
    return '<div style="text-align:center"><div class="chat-stage-badge">'+stIcon+' Stage: '+esc(stageName)+'<span style="font-size:9px;color:var(--w30);margin-left:6px">'+ts+'</span></div></div>';
  }

  // === ORDER CARDS ===
  if(body.indexOf('[주문 확정]')>-1||body.indexOf('Order confirmed')>-1){
    var orderMatch=body.match(/([A-Z]{2}-\d{4}-\d+).*?\$([0-9,.]+)/);
    var h='<div style="display:flex;justify-content:center"><div class="chat-rich-card" style="min-width:260px;border-color:rgba(0,230,118,.2)">';
    h+='<div class="rc-header" style="background:rgba(0,230,118,.04);color:var(--ok)">&#x2705; Order Confirmed</div>';
    h+='<div class="rc-body">';

    var termsMatch=body.match(/\(([^)]+)\)\s*$/);
    if(termsMatch)h+='<div style="font-size:10px;color:var(--w40)">Payment: '+esc(termsMatch[1])+'</div>';
    h+='<div style="font-size:10px;color:var(--w30);margin-top:4px">'+ts+'</div>';
    h+='</div></div></div>';
    return h;
  }

  // === SHIPMENT CARDS ===
  if(body.indexOf('[출하 등록]')>-1||body.indexOf('Shipment registered')>-1){
    var h='<div style="display:flex;justify-content:center"><div class="chat-rich-card" style="min-width:260px;border-color:rgba(168,85,247,.2)">';
    h+='<div class="rc-header" style="background:rgba(168,85,247,.04);color:var(--purple)">&#x1F6A2; Shipment Registered</div>';

    shipParts.forEach(function(p){if(p)h+='<div style="margin-bottom:2px">'+esc(p)+'</div>';});
    h+='<div style="font-size:10px;color:var(--w30);margin-top:4px">'+ts+'</div>';
    h+='</div></div></div>';
    return h;
  }

  // === ACCEPTANCE / APPROVAL CARDS ===
  if(body.indexOf('[Quotation Accepted]')>-1||body.indexOf('[Sample Approved]')>-1||body.indexOf('[Ready to Order]')>-1){
    var isAccept=body.indexOf('Accepted')>-1;var isSample=body.indexOf('Sample')>-1;var isReady=body.indexOf('Ready')>-1;
    var label=isAccept?'Quotation Accepted':isSample?'Sample Approved':'Ready to Order';

  // === DEAL COMPLETION ===

    return '<div style="text-align:center;padding:12px"><div style="display:inline-block;padding:16px 28px;border-radius:16px;background:linear-gradient(135deg,rgba(0,230,118,.08),rgba(0,212,255,.08));border:1px solid rgba(0,230,118,.2)"><div style="font-size:28px;margin-bottom:4px">&#x1F389;</div><div style="font-size:14px;font-weight:800;color:var(--ok)">Deal Completed!</div><div style="font-size:10px;color:var(--w40);margin-top:4px">'+ts+'</div></div></div>';
  }

  // === DEFAULT SYSTEM MESSAGE ===

function loadSearchCredits(){
  if(!S.user)return;
  var plan=S.user.plan||'free';
  var limits={free:3,starter:30,basic:30,pro:200,enterprise:9999};
  S.searchCreditsLimit=limits[plan]||3;
  // Count searches this month from Supabase search_logs
  var now=new Date();
  var firstDay=new Date(now.getFullYear(),now.getMonth(),1).toISOString();
  sb.from('search_logs').select('id',{count:'exact',head:true}).eq('user_id',S.user.id).gte('created_at',firstDay).then(function(r){
    S.searchCreditsUsed=r.count||0;
    S._searchCreditsLoaded=true;
    render();
  });
}

function checkSearchCredits(){
  if(!S._searchCreditsLoaded)return true; // allow if not loaded yet
  if(S.searchCreditsUsed>=S.searchCreditsLimit){
    S.modal='upgradePrompt';S.modalData=null;render();
    return false;
  }
  return true;
}

  var h='<div class="modal-overlay" onclick="if(event.target===this)B.closeModal()"><div class="modal" style="max-width:480px"><div class="modal-h"><span>Search Limit Reached</span><button class="modal-close" onclick="B.closeModal()">&#10005;</button></div>';

  h+='<div style="font-size:48px;margin-bottom:16px">&#x1F6AB;</div>';
  h+='<h3 style="font-size:18px;font-weight:800;margin-bottom:8px">Monthly Search Limit Reached</h3>';
  h+='<p style="font-size:13px;color:var(--w40);margin-bottom:8px">You have used <strong>'+S.searchCreditsUsed+'</strong> of <strong>'+S.searchCreditsLimit+'</strong> searches this month.</p>';

function formatDate(d){if(!d)return'';var dt=new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function timeAgo(d){if(!d)return'';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return formatDate(d);}

function initBuyerStripe(planId){
  var stripe=_getStripe();
  if(!stripe){toast('Stripe is not configured yet. Contact support.','warn');return;}
  var cycleEl=document.querySelector('input[name=b_cycle]:checked');
  var cycle=cycleEl?cycleEl.value:'m';
  var priceId=STRIPE_CFG.prices[planId]&&STRIPE_CFG.prices[planId][cycle];
  if(!priceId||priceId==='price_buyer_starter_m'||priceId==='price_buyer_starter_s'||priceId==='price_buyer_starter_a'||priceId==='price_buyer_pro_m'||priceId==='price_buyer_pro_s'||priceId==='price_buyer_pro_a'||priceId==='price_buyer_enterprise_m'){toast('Payment setup in progress. Contact support@motiveinno.com','info');return;}
  var btn=document.getElementById('bck-btn');
  if(btn){btn.disabled=true;btn.textContent='Connecting...';}
  sb.auth.getSession().then(function(r){
    if(!r.data||!r.data.session){toast('Please log in first','warn');if(btn){btn.disabled=false;btn.textContent='Pay with Card';}return;}
    fetch(STRIPE_CFG.fn+'/create-checkout-session',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+r.data.session.access_token,'apikey':SB_KEY},
      body:JSON.stringify({price_id:priceId,success_url:location.origin+location.pathname+'#profile',cancel_url:location.origin+location.pathname+'#profile'})
    }).then(function(r){return r.json();}).then(function(data){
      if(data.error){toast(data.error,'err');if(btn){btn.disabled=false;btn.textContent='Pay with Card';}return;}
      closeModal('bck');
      document.body.insertAdjacentHTML('beforeend','<div class="modal-overlay" id="stripe-ck" onclick="if(event.target===this)B.closeStripeModal()"><div class="modal" style="max-width:520px"><div class="modal-h"><h3>Payment</h3><button class="modal-close" onclick="B.closeStripeModal()">&#10005;</button></div><div class="modal-b"><div id="stripe-mount" style="min-height:300px"></div></div></div></div>');
      var sm=document.getElementById('stripe-ck');if(sm)sm.style.display='flex';
      stripe.initEmbeddedCheckout({clientSecret:data.clientSecret}).then(function(checkout){window._bStripe=checkout;checkout.mount('#stripe-mount');});
    }).catch(function(err){toast('Connection error: '+err.message,'err');if(btn){btn.disabled=false;btn.textContent='Pay with Card';}});
  });
}

function closeStripeModal(){
  if(window._bStripe){window._bStripe.destroy();window._bStripe=null;}

}

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18,subdomains:'abcd'}).addTo(_buyerMap);
  _buyerMapLayers.vessels=L.layerGroup().addTo(_buyerMap);
  _buyerMapLayers.routes=L.layerGroup().addTo(_buyerMap);
  _buyerMapLayers.risks=L.layerGroup().addTo(_buyerMap);
  /* Draw shipment routes */
  _drawBuyerRoutes();
  /* Fetch live vessel positions */
  _fetchBuyerVessels();
  _fetchBuyerConflicts();
}

function _drawBuyerRoutes(){
  if(!_buyerMap||!S.shipments.length)return;
  var portCoords={'Busan, KR':[35.1,129],'Busan':[35.1,129],'Incheon':[37.45,126.7],'Shanghai':[31.2,121.5],'Tokyo':[35.65,139.8],'Yokohama':[35.44,139.65],'Los Angeles':[33.73,-118.27],'Long Beach':[33.75,-118.2],'New York':[40.67,-74.04],'Hamburg':[53.55,9.93],'Rotterdam':[51.95,4.13],'Singapore':[1.26,103.84],'Ho Chi Minh':[10.8,106.7],'Dubai':[25.27,55.3],'Sydney':[-33.85,151.2],'Mumbai':[19.0,72.85]};
  S.shipments.forEach(function(sh){
    var fromKey=sh.port_of_loading||'Busan, KR';var toKey=sh.port_of_discharge||'';
    var from=null;var to=null;
    Object.keys(portCoords).forEach(function(k){if(fromKey.indexOf(k)>-1)from=portCoords[k];if(toKey.indexOf(k)>-1)to=portCoords[k];});
    if(!from)from=portCoords['Busan, KR'];
    if(!to)return;
    var color=sh.status==='delivered'?'#00E676':sh.status==='in_transit'?'#00D4FF':'#FFB800';
    L.polyline([from,to],{color:color,weight:2,opacity:0.6,dashArray:'8 4'}).addTo(_buyerMapLayers.routes);
    L.circleMarker(from,{radius:5,color:'#00D4FF',fillColor:'#00D4FF',fillOpacity:0.8,weight:1}).bindPopup('<b>'+esc(fromKey)+'</b><br>Origin').addTo(_buyerMapLayers.routes);
    L.circleMarker(to,{radius:5,color:'#FFB800',fillColor:'#FFB800',fillOpacity:0.8,weight:1}).bindPopup('<b>'+esc(toKey)+'</b><br>Destination').addTo(_buyerMapLayers.routes);
    if(sh.status==='in_transit'||sh.status==='departed'){
      var mid=[(from[0]+to[0])/2,(from[1]+to[1])/2];
      var icon=L.divIcon({className:'',html:'<div style="font-size:16px;filter:drop-shadow(0 0 4px rgba(0,212,255,.5))">'+(sh.type==='air'?'&#x2708;':'&#x1F6A2;')+'</div>',iconSize:[20,20],iconAnchor:[10,10]});
      L.marker(mid,{icon:icon}).bindPopup('<b>'+esc(sh.vessel_name||'In Transit')+'</b><br>'+esc(fromKey)+' → '+esc(toKey)+'<br>ETA: '+esc(sh.eta||'TBD')).addTo(_buyerMapLayers.routes);
    }
  });
  if(S.shipments.length){
    var bounds=[];
    _buyerMapLayers.routes.eachLayer(function(l){if(l.getLatLng)bounds.push(l.getLatLng());});
    if(bounds.length>1)_buyerMap.fitBounds(L.latLngBounds(bounds).pad(0.3));
  }
}

function _fetchBuyerVessels(){
  sb.functions.invoke('track-vessels',{body:{bounds:null}}).then(function(r){
    if(r.error)throw r.error;return r.data;
  }).then(function(data){
    var vessels=data.vessels||[];
    vessels.forEach(function(v){
      var icon=L.divIcon({className:'',html:'<div style="font-size:10px;opacity:.6">&#x25C6;</div>',iconSize:[10,10],iconAnchor:[5,5]});
      L.marker([v.lat,v.lon],{icon:icon}).bindPopup('<b>'+esc(v.name||'Vessel')+'</b><br>Type: '+esc(v.type||'Cargo')+'<br>Speed: '+(v.speed||0)+' kts').addTo(_buyerMapLayers.vessels);
    });
  }).catch(function(){});
}

function _fetchBuyerConflicts(){
  sb.functions.invoke('conflict-data',{body:{days:30}}).then(function(r){
    if(r.error)throw r.error;return r.data;
  }).then(function(data){
    var zones=data.risk_zones||[];
    zones.forEach(function(z){
      var lvl=z.risk_level||'low';
      var color=lvl==='critical'?'#FF5252':lvl==='high'?'#FFA726':lvl==='medium'?'#FFD54F':'#81C784';
      L.circle([z.lat,z.lon],{radius:(z.fatalities||1)*5000+50000,color:color,fillColor:color,fillOpacity:0.1,weight:1}).bindPopup('<b>'+esc(z.country||'')+'</b><br>Risk: '+lvl+'<br>Events: '+(z.event_count||0)).addTo(_buyerMapLayers.risks);
    });
  }).catch(function(){});
}

function refreshBuyerMap(){
  if(!_buyerMap)return;
  _buyerMapLayers.vessels.clearLayers();
  _buyerMapLayers.routes.clearLayers();
  _buyerMapLayers.risks.clearLayers();
  _drawBuyerRoutes();
  _fetchBuyerVessels();
  _fetchBuyerConflicts();
  toast('Map refreshed','ok');
}

function destroyBuyerMap(){
  if(_buyerMap){_buyerMap.remove();_buyerMap=null;_buyerMapLayers={vessels:null,routes:null,risks:null};}
}

    target_price:parseFloat((document.getElementById('rfq-price')||{}).value)||null,
    destination_country:(document.getElementById('rfq-dest')||{}).value||null,
    delivery_deadline:(document.getElementById('rfq-deadline')||{}).value||null,
    certifications:((document.getElementById('rfq-certs')||{}).value||'').split(',').map(function(c){return c.trim();}).filter(Boolean)
  };
  sb.from('rfq_requests').insert(data).select().single().then(function(res){
    if(res.error){alert('Error: '+res.error.message);return;}
    _rfqFormOpen=false;
    _rfqList.unshift(res.data);
    render();
    // AI 매칭 트리거 (백그라운드)
    sb.functions.invoke('match-rfq',{body:{action:'match',rfq_id:res.data.id}}).then(function(mr){
      if(mr.data&&mr.data.matched)pushNotif(t('AI matched')+' '+mr.data.matched+' '+t('manufacturers to your RFQ'));
    });
  });
}

function showRFQDetail(id){
  var r=_rfqList.find(function(x){return x.id===id;});
  if(!r)return;
  _rfqDetail=r;
  // Load proposals
  sb.from('rfq_proposals').select('*').eq('rfq_id',id).order('created_at',{ascending:false}).then(function(res){
    _rfqProposals=res.data||[];
    render();
  });
  render();
}

function acceptProposalRFQ(proposalId){
  if(!confirm(t('Accept this proposal? Other proposals will be rejected.')))return;
  sb.functions.invoke('match-rfq',{body:{action:'accept_proposal',proposal_id:proposalId}}).then(function(res){
    if(res.data&&res.data.success){
      pushNotif(t('Proposal accepted! Manufacturer will be notified.'));
      _rfqDetail.status='matched';
      _rfqProposals.forEach(function(p){p.status=p.id===proposalId?'accepted':'rejected';});
      render();
    }
  });
}

function _loadMyRFQs(){
  if(!S.user)return;
  sb.from('rfq_requests').select('*').eq('buyer_id',S.user.id).order('created_at',{ascending:false}).then(function(res){
    _rfqList=res.data||[];
    render();
  });
}

function _loadOpenRFQs(){
  sb.functions.invoke('match-rfq',{body:{action:'list_open'}}).then(function(res){
    if(res.data&&res.data.rfqs){_rfqOpen=res.data.rfqs;render();}
  });
}

function runQualityPredict(){
  var el=document.getElementById('qp-result');
  var company=(document.getElementById('qp-company')||{}).value;
  if(!company){alert(t('Please enter company name'));return;}
  el.innerHTML='<div style="text-align:center;padding:40px;color:var(--w40)"><div class="spinner" style="width:32px;height:32px;border:3px solid var(--w08);border-top-color:var(--pri);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px"></div>'+t('Analyzing quality data from 5 sources...')+'</div>';
  var certs=((document.getElementById('qp-certs')||{}).value||'').split(',').map(function(c){return c.trim();}).filter(Boolean);
  sb.functions.invoke('quality-prediction',{body:{company:company,product:(document.getElementById('qp-product')||{}).value||'',country:(document.getElementById('qp-country')||{}).value||'KR',certifications:certs}}).then(function(res){
    if(res.error||!res.data)throw new Error(res.error||'Analysis failed');
    var d=res.data;var h='';
    // Score circle
    var sc=d.quality_score.total;var scColor=sc>=75?'var(--ok)':sc>=50?'var(--acc)':'var(--err)';
    h+='<div style="display:grid;grid-template-columns:200px 1fr;gap:20px;margin-bottom:20px">';
    h+='<div style="text-align:center;background:var(--card);border-radius:16px;padding:24px;border:1px solid var(--w06)">';
    h+='<svg width="130" height="130" viewBox="0 0 130 130"><circle cx="65" cy="65" r="56" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="8"/><circle cx="65" cy="65" r="56" fill="none" stroke="'+scColor+'" stroke-width="8" stroke-dasharray="'+Math.round(sc*3.52)+' 352" stroke-dashoffset="-88" stroke-linecap="round"/><text x="65" y="58" text-anchor="middle" fill="'+scColor+'" font-size="30" font-weight="800">'+sc+'</text><text x="65" y="78" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="11">'+d.quality_score.grade+'</text></svg>';
    h+='<div style="font-size:12px;margin-top:8px"><span style="padding:4px 10px;border-radius:6px;background:'+scColor+'20;color:'+scColor+';font-weight:700">Risk: '+d.quality_score.risk_level+'</span></div>';
    h+='</div>';
    // Breakdown bars
    h+='<div style="display:grid;gap:8px">';
    var breakdowns=[{label:'Certifications',val:d.breakdown.certification.score,max:d.breakdown.certification.max,color:'var(--pri)'},{label:'Company Profile',val:d.breakdown.company_profile.score,max:d.breakdown.company_profile.max,color:'var(--ok)'},{label:'Manufacturing Country',val:d.breakdown.manufacturing_country.score,max:d.breakdown.manufacturing_country.max,color:'var(--purple)'},{label:'Regulatory',val:d.breakdown.regulatory.score,max:d.breakdown.regulatory.max,color:'var(--acc)'},{label:'Category Baseline',val:d.breakdown.category_baseline.score,max:d.breakdown.category_baseline.max,color:'var(--w40)'}];
    breakdowns.forEach(function(b){
      var pct=Math.round(b.val/b.max*100);
      h+='<div style="background:var(--card);border-radius:10px;padding:10px 14px;border:1px solid var(--w06)"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:var(--w60)">'+b.label+'</span><span style="color:'+b.color+';font-weight:700">'+b.val+'/'+b.max+'</span></div><div style="height:6px;background:var(--w06);border-radius:3px"><div style="height:100%;width:'+pct+'%;background:'+b.color+';border-radius:3px"></div></div></div>';
    });
    h+='</div></div>';
    // Recommendations
    if(d.recommendations&&d.recommendations.length){
      h+='<div style="background:rgba(255,184,0,.05);border:1px solid rgba(255,184,0,.2);border-radius:14px;padding:16px;margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--acc);margin-bottom:10px">&#x26A0;&#xFE0F; Recommendations</div>';
      d.recommendations.forEach(function(r){h+='<div style="font-size:12px;color:var(--w60);padding:4px 0;display:flex;gap:8px">• '+esc(r)+'</div>';});
      h+='</div>';

      h+='<div style="background:var(--card);border:1px solid rgba(168,85,247,.2);border-radius:14px;padding:20px"><div style="font-size:12px;font-weight:700;color:#A855F7;margin-bottom:8px">&#x1F916; AI Quality Prediction</div><div style="font-size:13px;color:var(--w60);line-height:1.8">'+esc(d.ai_prediction)+'</div></div>';
    }

}

function runSupplierCompare(){
  var el=document.getElementById('sc-result');
  var names=document.querySelectorAll('.sc-name');
  var suppliers=[];
  names.forEach(function(n,i){
    if(!n.value)return;
    var countries=document.querySelectorAll('.sc-country');
    var prices=document.querySelectorAll('.sc-price');
    var moqs=document.querySelectorAll('.sc-moq');
    var leads=document.querySelectorAll('.sc-lead');
    var certs=document.querySelectorAll('.sc-certs');
    suppliers.push({
      company_name:n.value,
      country:countries[i]?countries[i].value:'KR',
      unit_price:prices[i]?parseFloat(prices[i].value)||null:null,
      moq:moqs[i]?parseInt(moqs[i].value)||null:null,
      lead_time_days:leads[i]?parseInt(leads[i].value)||null:null,
      certifications:certs[i]?certs[i].value.split(',').map(function(c){return c.trim();}).filter(Boolean):[],
    });

  if(suppliers.length<2){alert(t('Please add at least 2 suppliers'));return;}

  sb.functions.invoke('supplier-compare',{body:{suppliers:suppliers,product:(document.getElementById('sc-product')||{}).value||''}}).then(function(res){

      h+='<div style="font-size:14px;color:var(--ok);font-weight:700;margin-top:4px">Trust Score: '+d.winner.trust_score+'/100</div>';
      h+='</div>';

      d.comparison.forEach(function(c,i){
        var sc=c.trust_score>=75?'var(--ok)':c.trust_score>=50?'var(--acc)':'var(--err)';
        var bg=i===0?'background:rgba(0,212,255,.03);':'';
