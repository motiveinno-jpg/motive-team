function _escMethodSelect(method){
  var stripe=document.getElementById('esc-method-stripe');
  var wire=document.getElementById('esc-method-wire');
  if(method==='stripe'){
    if(stripe){stripe.style.borderColor='var(--acc)';stripe.style.background='rgba(0,212,255,.04)';}
    if(wire){wire.style.borderColor='var(--w08)';wire.style.background='transparent';}
  }else{
    if(wire){wire.style.borderColor='var(--acc)';wire.style.background='rgba(0,212,255,.04)';}
    if(stripe){stripe.style.borderColor='var(--w08)';stripe.style.background='transparent';}
  }
  var radio=document.querySelector('input[name=esc_method][value="'+method+'"]');
  if(radio)radio.checked=true;
}
function confirmEscrowPay(dealId){
  var escData=_getEscrowStatus(dealId);
  if(!escData||escData.status!=='requested')return;
  var methodEl=document.querySelector('input[name=esc_method]:checked');
  var method=methodEl?methodEl.value:'stripe';

  if(method==='stripe'){
    /* Stripe card payment */
    initiateStripeEscrowPayment(dealId,escData.amount,escData.currency||'USD');
    return;
  }

  /* Wire transfer flow (original) */
  var btn=document.getElementById('escrow-pay-btn');if(btn)btn.disabled=true;
  escData.status='buyer_paid';escData.paidAt=new Date().toISOString();escData.method='wire';
  _setEscrow(dealId,escData);
  S.modal=null;S.modalData=null;
  if(S.user)sb.from('service_requests').insert({user_id:S.user.id,type:'escrow_payment',status:'pending',details:{deal_id:dealId,amount:escData.amount,currency:escData.currency||'USD',method:'wire'}}).catch(function(e){console.error('[escrow] payment notify fail:',e);});
  toast('Payment confirmed! Settlement will proceed after delivery is verified.','ok',5000);
  render();
}

/* Buyer confirms delivery → triggers seller settlement (escrow flow) */
function confirmEscrowDelivery(dealId){
  var escData=_getEscrowStatus(dealId);
  if(!escData||escData.status!=='shipping'){toast('Goods must be shipped before confirming delivery','warn');return;}
  if(!confirm('Confirm that you have received the goods?\nThis will release payment to the seller within 7 days.'))return;
  escData.status='delivered';escData.deliveredAt=new Date().toISOString();
  _setEscrow(dealId,escData);
  /* Send delivery confirmation message to chat */
  var deal=S.currentDeal;
  if(deal&&S.user){
    var metadata={type:'delivery_confirmed',deal_id:dealId,amount:escData.amount,currency:escData.currency};
    sb.from('messages').insert({user_id:S.user.id,buyer_id:S.user.id,body:'[Delivery Confirmed] Buyer has confirmed receipt of goods. Payment will be released.',sender_type:'buyer',message_type:'system',channel:'platform',direction:'inbound',metadata:metadata}).catch(function(){});
    /* Notify seller */
    var sellerId=deal.matching&&deal.matching.user_id;
    if(sellerId){sb.from('notifications').insert({user_id:sellerId,type:'payment',title:'Delivery Confirmed',body:'Buyer confirmed receipt. Escrow payment of '+(escData.currency||'USD')+' '+(escData.amount||0)+' will be released.',link_page:'deals',link_id:dealId,is_read:false}).catch(function(){});}
  }
  toast('Delivery confirmed! Payment will be released to the seller.','ok');
  render();
}

/* Buyer raises dispute */
function raiseEscrowDispute(dealId){
  var escData=_getEscrowStatus(dealId);
  if(!escData)return;
  _bPrompt('Please describe the issue with your order:',function(reason){
    if(!reason||!reason.trim())return;
    escData.dispute={reason:reason.trim(),raisedAt:new Date().toISOString(),status:'open'};
    _setEscrow(dealId,escData);
    toast('Dispute raised. Our team will review and contact both parties within 48 hours.','warn',6000);
    if(S.user)sb.from('service_requests').insert({user_id:S.user.id,type:'escrow_dispute',status:'pending',details:{deal_id:dealId,amount:escData.amount,reason:reason.trim()}}).catch(function(e){console.error('[escrow] dispute insert fail:',e);});
    render();
  },'Describe the issue in detail...');
}

/* Buyer pays a milestone via Stripe escrow */
function payMilestone(dealId,msId){
  var ms=S.orderMilestones.find(function(m){return m.id===msId;});
  if(!ms){toast('Milestone not found','warn');return;}
  var amt=Number(ms.amount||0);
  if(!amt){toast('Invalid milestone amount','warn');return;}
  if(!confirm('Pay milestone "'+ms.name.replace(/_/g,' ')+'" — $'+amt.toLocaleString()+' via Stripe?'))return;
  /* Use Stripe escrow payment */
  initiateStripeEscrowPayment(dealId,amt,ms.currency||'USD');
}

/* Buyer confirms order receipt */
function confirmOrderReceipt(dealId){
  var deal=S.deals.find(function(d){return d.id===dealId;});
  if(!deal||!deal.order)return;
  var escCheck=_getEscrowStatus(dealId);
  if(escCheck&&escCheck.status==='disputed'){toast('Cannot confirm receipt — escrow is currently under dispute.','err');return;}
  if(!confirm('Confirm you have received this order? This may trigger final payment release.'))return;
  deal.order.status='completed';deal.order.received_at=new Date().toISOString();
  sb.from('orders').update({status:'completed'}).eq('id',deal.order.id).then(function(){}).catch(function(e){console.error('[order] receipt confirm fail:',e);});
  // Auto-advance deal stage
  if(deal.matching&&deal.matching.status!=='completed'){
    deal.matching.status='completed';
    sb.from('matchings').update({status:'completed'}).eq('id',deal.matching.id||deal.id).then(function(){});
  }
  // Auto-release escrow
  var escData=_getEscrowStatus(dealId);
  if(escData&&(escData.status==='shipping'||escData.status==='secured')){
    escData.status='delivered';escData.deliveredAt=new Date().toISOString();
    _setEscrow(dealId,escData);
  }
  toast('Order receipt confirmed! Deal completed.','ok',5000);
  render();
}

function _initSigCanvas(){
  var c=document.getElementById('sig-canvas');if(!c)return;
  var ctx=c.getContext('2d');
  var drawing=false;
  ctx.strokeStyle='#ffffff';ctx.lineWidth=2;ctx.lineCap='round';
  c.onmousedown=function(e){drawing=true;ctx.beginPath();var r=c.getBoundingClientRect();ctx.moveTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));};
  c.onmousemove=function(e){if(!drawing)return;var r=c.getBoundingClientRect();ctx.lineTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));ctx.stroke();};
  c.onmouseup=function(){drawing=false;};
  c.onmouseleave=function(){drawing=false;};
  // Touch support
  c.ontouchstart=function(e){e.preventDefault();drawing=true;ctx.beginPath();var r=c.getBoundingClientRect();var t=e.touches[0];ctx.moveTo((t.clientX-r.left)*(c.width/r.width),(t.clientY-r.top)*(c.height/r.height));};
  c.ontouchmove=function(e){e.preventDefault();if(!drawing)return;var r=c.getBoundingClientRect();var t=e.touches[0];ctx.lineTo((t.clientX-r.left)*(c.width/r.width),(t.clientY-r.top)*(c.height/r.height));ctx.stroke();};
  c.ontouchend=function(){drawing=false;};
  c._sigCtx=ctx;
}

function clearSigCanvas(){
  var c=document.getElementById('sig-canvas');if(!c)return;
  var ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
}

/* Buyer signature/stamp registration */
function _initBuyerSigCanvas(){
  var c=document.getElementById('buyer-sig-canvas');
  if(!c||c._bound)return;c._bound=true;
  var ctx=c.getContext('2d');var drawing=false;
  ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var _bs=_getBuyerSig();
  if(_bs&&_bs.type==='draw'&&_bs.image){var img=new Image();img.onload=function(){ctx.drawImage(img,0,0);};img.src=_bs.image;}
  c.addEventListener('mousedown',function(e){drawing=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);});
  c.addEventListener('mousemove',function(e){if(!drawing)return;ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();});
  c.addEventListener('mouseup',function(){drawing=false;});
  c.addEventListener('mouseleave',function(){drawing=false;});
  c.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var r=c.getBoundingClientRect();var t=e.touches[0];ctx.beginPath();ctx.moveTo(t.clientX-r.left,t.clientY-r.top);},{passive:false});
  c.addEventListener('touchmove',function(e){e.preventDefault();if(!drawing)return;var r=c.getBoundingClientRect();var t=e.touches[0];ctx.lineTo(t.clientX-r.left,t.clientY-r.top);ctx.stroke();},{passive:false});
  c.addEventListener('touchend',function(){drawing=false;});
}
function clearBuyerSigCanvas(){var c=document.getElementById('buyer-sig-canvas');if(c){c.getContext('2d').clearRect(0,0,c.width,c.height);}}
function saveBuyerSig(){
  var type=S._bSigType||'draw';var image='';
  if(type==='draw'){
    var c=document.getElementById('buyer-sig-canvas');if(!c){toast('Canvas not found','warn');return;}
    var data=c.getContext('2d').getImageData(0,0,c.width,c.height).data;
    var has=false;for(var i=3;i<data.length;i+=4){if(data[i]>0){has=true;break;}}
    if(!has){toast('Please draw your signature','warn');return;}
    image=c.toDataURL('image/png');
  } else {
    image=S._buyerStampPreview||(_getBuyerSig()||{}).image||'';
    if(!image){toast('Please upload a stamp image','warn');return;}
  }
  var sigData={type:type,image:image,updatedAt:new Date().toISOString()};
  S._buyerSigData=sigData;
  localStorage.setItem('buyer_signature',JSON.stringify(sigData));
  toast(type==='draw'?'Signature registered!':'Company stamp registered!','ok');
  render();
}
function uploadBuyerStamp(inp){
  var file=inp&&inp.files&&inp.files[0];if(!file)return;
  if(!file.type.startsWith('image/')){toast('Image files only','warn');return;}
  if(file.size>2*1024*1024){toast('Max 2MB','warn');return;}
  var reader=new FileReader();reader.onload=function(e){
    S._buyerStampPreview=e.target.result;
    var box=document.getElementById('buyer-stamp-preview');
    if(box)box.innerHTML='<img src="'+S._buyerStampPreview+'" style="max-width:100%;max-height:100%;object-fit:contain">';
  };reader.readAsDataURL(file);
}
function deleteBuyerSig(){
  if(!confirm('Delete registered signature/stamp?'))return;
  S._buyerSigData=null;S._buyerStampPreview=null;
  localStorage.removeItem('buyer_signature');
  toast('Deleted','ok');render();
}
function _getBuyerSig(){
  if(S._buyerSigData&&S._buyerSigData.image)return S._buyerSigData;
  try{var ls=JSON.parse(localStorage.getItem('buyer_signature'));if(ls&&ls.image)return ls;}catch(e){}
  return null;
}

function submitDocSignature(docId){
  /* Use registered signature if available, otherwise canvas drawing */
  var sigData=null;
  var _regSig=_getBuyerSig();
  if(_regSig&&_regSig.image){
    sigData=_regSig.image;
  } else {
    var c=document.getElementById('sig-canvas');
    if(c){var ctx=c.getContext('2d');var imgData=ctx.getImageData(0,0,c.width,c.height);var hasDrawing=false;for(var i=3;i<imgData.data.length;i+=4){if(imgData.data[i]>0){hasDrawing=true;break;}}
      if(!hasDrawing){toast('Please draw your signature or register one in Settings','warn');return;}}
    sigData=c?c.toDataURL():null;
  }
  var sigs=_getDocSignatures();
  sigs[docId]=Object.assign(sigs[docId]||{},{status:'signed',signedAt:new Date().toISOString(),signatureData:sigData});
  localStorage.setItem('doc_signatures',JSON.stringify(sigs));
  /* Sync signature to Supabase so seller can see it */
  if(S.user&&docId){
    var _bids=getBuyerIds();
    sb.from('documents').update({
      status:'signed',
      signed_at:new Date().toISOString(),
      signed_by:S.user.id,
      signature_data:sigData
    }).eq('id',docId).in('buyer_id',_bids.length?_bids:['__none__']).then(function(r){
      if(r.error){console.warn('Signature DB sync failed:',r.error.message);toast('Signature saved locally. Cloud sync will retry.','warn');}
    }).catch(function(){toast('Signature saved locally only. Check your connection.','warn');});
    /* Send chat message: "Document Signed" */
    var _sigDoc=S._sharedDocs&&S._sharedDocs.find(function(d){return d.id===docId;});
    var _sigDocType=_sigDoc?(_sigDoc.doc_type||'').toUpperCase():'DOC';
    var _sigDocNo=_sigDoc?(_sigDoc.doc_number||''):'';
    var _sigBuyerId=_bids[0]||null;
    if(_sigBuyerId&&_sigDoc){
      sb.from('messages').insert({user_id:_sigDoc.user_id||S.user.id,buyer_id:_sigBuyerId,body:'[Document Signed] '+_sigDocType+' '+_sigDocNo+' — Signed by '+(S.user.company_name||S.user.display_name||'Buyer'),sender_type:'buyer',message_type:'system',channel:'platform',metadata:{type:'document_signed',doc_id:docId,doc_type:_sigDoc.doc_type,doc_number:_sigDocNo,signer_name:S.user.company_name||S.user.display_name||'Buyer'}}).then(function(){}).catch(function(e){console.error('[sig chat]',e);});
    }
  }
  S.modal=null;S.modalData=null;
  toast('Document signed successfully!','ok');
  render();
}

      h+='</div>';
      h+='<input type="text" placeholder="Review title (optional)" value="'+esc(S.reviewDraft.title||'')+'" oninput="B._rvTitle=this.value" style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;margin-bottom:8px;outline:none">';
      h+='<textarea placeholder="Write your review..." oninput="B._rvContent=this.value" style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;min-height:60px;resize:vertical;outline:none;font-family:inherit">'+esc(S.reviewDraft.content||'')+'</textarea>';
      var rvTags=['Fast Response','Good Quality','Fair Price','Professional','Reliable','Great Communication'];
      h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin:8px 0">';
      rvTags.forEach(function(tag){
        var sel=S.reviewDraft.tags.indexOf(tag)>-1;
        h+='<span onclick="B.toggleReviewTag(\''+tag+'\')" class="badge '+(sel?'badge-pri':'badge-ghost')+'" style="cursor:pointer;font-size:10px">'+tag+'</span>';
      });
      h+='</div>';
      h+='<button class="btn btn-pri btn-sm" onclick="B.submitReview(\''+(_smid3||'')+'\')" style="margin-top:6px"'+(S.reviewDraft.rating&&_smid3?'':' disabled')+'>Submit Review</button>';
    }
    h+='</div>';
  }

  return h;
}

function loadReviews(){
  if(!S.user)return;
  sb.from('reviews').select('*').eq('reviewer_id',S.user.id).order('created_at',{ascending:false}).limit(100).then(function(r){
    S.reviews=r.data||[];render();
  });
}

function loadProductReviews(){
  sb.from('reviews').select('*').order('created_at',{ascending:false}).limit(100).then(function(r){
    S._productReviews=r.data||[];
  }).catch(function(){S._productReviews=[];});
}

function setReviewStar(n){
  S.reviewDraft.rating=n;render();
}

function toggleReviewTag(tag){
  var idx=S.reviewDraft.tags.indexOf(tag);
  if(idx>-1)S.reviewDraft.tags.splice(idx,1);
  else S.reviewDraft.tags.push(tag);
  render();
}

function submitReview(matchingId){
  if(!S.user||!S.reviewDraft.rating)return;
  var title=B._rvTitle||S.reviewDraft.title||'';
  var content=B._rvContent||S.reviewDraft.content||'';
  // Find product_id and company from the deal/matching context
  var _deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  var _pid=_deal&&_deal.matching?(_deal.matching.product_id||null):null;
  var _company=_deal?(_deal.sellerId||null):null;
  sb.from('reviews').insert({
    reviewer_id:S.user.id,
    reviewer_role:'buyer',
    target_id:matchingId,
    target_type:'matching',
    review_type:'product',
    product_id:_pid,
    target_company:_company,
    buyer_country:S.user.country||null,
    rating:S.reviewDraft.rating,
    title:title||null,
    content:content||null,
    tags:S.reviewDraft.tags.length?S.reviewDraft.tags:null,
    is_public:true
  }).then(function(r){
    if(r.error){toast('Failed to submit review: '+r.error.message,'err');return;}
    toast('Review submitted! Thank you.','ok');
    S.reviewDraft={rating:0,title:'',content:'',tags:[]};
    B._rvTitle='';B._rvContent='';
    loadReviews();
  });
}

/* === DEAL ACTIONS (BUYER SIDE) === */
function requestQuote(matchingId){
  if(S._submitting)return;S._submitting=true;
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal){S._submitting=false;return;}
  if(!deal.buyerLinkId||!deal.sellerId){toast('Deal is not yet matched. Please wait for seller response.','warn');S._submitting=false;return;}
  sb.from('messages').insert({
    buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
    body:'Hi! I\'d like to request a formal quotation (Proforma Invoice) for this product. Please include pricing, MOQ, lead time, and payment terms.',
    message_type:'text',channel:'platform',direction:'inbound'
  }).then(function(){
    S._submitting=false;
    toast('Quotation request sent to seller!','ok');
    render();
  }).catch(function(e){S._submitting=false;console.error('[requestQuote]',e);toast('Failed to send request','err');});
}

function acceptQuote(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  sb.from('matchings').update({status:'negotiation'}).eq('id',matchingId).then(function(){
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Quotation Accepted] I accept the quotation. Let\'s proceed with the next steps.',
      message_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){});
    if(deal.sellerId)sb.from('notifications').insert({user_id:deal.sellerId,type:'deal',title:'Quotation Accepted',body:(S.user.company_name||S.user.display_name||'Buyer')+' accepted your quotation',link_page:'deals',link_id:deal.id,is_read:false}).then(function(){});
    toast('Quotation accepted! Moving to negotiation stage.','ok');
    deal.matching.status='negotiation';
    buildDeals();render();
  });
}

function confirmSampleOk(matchingId){

function confirmReadyToOrder(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  if(!S._orderReadySent)S._orderReadySent={};
  S._orderReadySent[matchingId]=true;
  sb.from('messages').insert({
    buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
    body:'[Ready to Order] We\'re ready to proceed with the order. Please create the purchase order with the agreed terms.',

  }).then(function(){

    toast('Order readiness confirmed! The seller will create the order.','ok');
    render();
  });
}

function confirmDelivery(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  /* Payment validation before completion */
  if(deal.order&&deal.order.payment_status&&deal.order.payment_status!=='paid'){
    toast('Payment is not completed yet. Please complete payment before confirming delivery.','err');return;
  }
  sb.from('matchings').update({status:'completed'}).eq('id',matchingId).then(function(){
    if(deal.order)sb.from('orders').update({status:'completed'}).eq('id',deal.order.id).then(function(){});
    // Auto-update escrow if active
    var _escDlv=_getEscrowStatus(deal.id);
    if(_escDlv&&(_escDlv.status==='shipping'||_escDlv.status==='secured'||_escDlv.status==='buyer_paid')){
      _escDlv.status='delivered';_escDlv.deliveredAt=new Date().toISOString();_setEscrow(deal.id,_escDlv);
      /* Notify seller about escrow auto-release schedule */
      if(deal.sellerId){sb.from('notifications').insert({user_id:deal.sellerId,type:'payment',title:'Escrow Auto-Release Scheduled',body:'Buyer confirmed delivery. Payment of '+(_escDlv.currency||'USD')+' '+(_escDlv.amount||0)+' will be released in '+(_escDlv.confirmDays||7)+' days.',link_page:'deals',link_id:deal.id,is_read:false}).catch(function(){});}
    }
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Delivery Confirmed] Goods received successfully. Thank you!',
      message_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){
      if(deal.sellerId)sb.from('notifications').insert({user_id:deal.sellerId,type:'deal',title:'Delivery Confirmed',body:(S.user.company_name||S.user.display_name||'Buyer')+' confirmed receipt. Deal completed!',link_page:'deals',link_id:deal.id,is_read:false}).then(function(){});
      toast('Delivery confirmed! Deal completed.','ok');
      deal.matching.status='completed';
      buildDeals();render();
    });
  });
}

/* === MESSAGES / CHAT === */
function loadConversations(){
  var bids=getBuyerIds();if(!bids.length)return;
  sb.from('messages').select('*').in('buyer_id',bids).order('created_at',{ascending:false}).limit(200).then(function(r){
    var msgs=r.data||[];
    var convMap={};
    msgs.forEach(function(m){
      var key=m.buyer_id+'_'+m.user_id;
      if(!convMap[key]){convMap[key]={buyerLinkId:m.buyer_id,sellerId:m.user_id,lastMsg:m,unread:0,msgs:[]};}
      convMap[key].msgs.push(m);
      if(!m.is_read&&m.sender_type!=='buyer'&&!m.read_at)convMap[key].unread++;
    });
    S.conversations=Object.values(convMap).sort(function(a,b){return new Date(b.lastMsg.created_at)-new Date(a.lastMsg.created_at);});
    S.chatUnread=S.conversations.reduce(function(s,c){return s+c.unread;},0);
    render();
  });
}

function pgMessages(){
  var h='<div class="chat-layout'+(S.currentChat?' chat-open':'')+'">';
  // Conversation list
  h+='<div class="chat-list">';
  h+='<div style="padding:12px 14px;border-bottom:1px solid var(--bd);font-weight:700;font-size:13px">Conversations</div>';
  if(!S.buyerLinks.length){
    h+='<div style="padding:30px 14px;text-align:center;color:var(--w40);font-size:12px">Submit an inquiry to start messaging with sellers.<br><button class="btn btn-pri btn-sm" onclick="B.nav(\'search\')" style="margin-top:12px;font-size:12px">🔍 Search Products</button></div>';
  } else if(!S.conversations.length){
    h+='<div style="padding:30px 14px;text-align:center;color:var(--w40);font-size:12px">No messages yet. Sellers will contact you after reviewing your inquiries.<br><button class="btn btn-ghost btn-sm" onclick="B.nav(\'pipeline\')" style="margin-top:12px;font-size:12px">📋 View My Inquiries</button></div>';
  } else {
    S.conversations.forEach(function(c){
      var active=S.currentChat&&S.currentChat.buyerLinkId===c.buyerLinkId&&S.currentChat.sellerId===c.sellerId;
      h+='<div class="chat-list-item'+(active?' active':'')+'" onclick="B.openChat(\''+c.buyerLinkId+'\',\''+c.sellerId+'\')">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:600;font-size:13px">'+esc(getSellerName(c.sellerId))+'</div>';
      if(c.unread)h+='<span class="badge badge-err" style="font-size:9px">'+c.unread+'</span>';
      h+='</div>';
      h+='<div style="font-size:11px;color:var(--w40);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc((c.lastMsg&&c.lastMsg.body||'').substring(0,50))+'</div>';
      h+='<div style="font-size:10px;color:var(--w20);margin-top:2px">'+timeAgo(c.lastMsg&&c.lastMsg.created_at)+'</div>';
      h+='</div>';
    });
  }
  h+='</div>';
  // Chat panel
  h+='<div class="chat-panel">';
  if(!S.currentChat){
    h+='<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--w40);font-size:13px"><div style="text-align:center"><div style="font-size:36px;margin-bottom:12px">&#x1F4AC;</div>Select a conversation</div></div>';
  } else {
    h+='<div style="padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px">';
    h+='<button class="btn btn-ghost btn-sm" onclick="B.closeChat()" id="chatBackBtn" style="display:none;min-width:44px;min-height:44px">&#x2190;</button>';
    h+='<div style="font-weight:700;font-size:14px">'+esc(getSellerName(S.currentChat.sellerId))+'</div></div>';
    h+='<div class="chat-msgs" id="chatMsgs">';
    var lastDate='';
    S.chatMessages.forEach(function(m){
      var d=new Date(m.created_at).toLocaleDateString();
      if(d!==lastDate){h+='<div style="text-align:center;font-size:10px;color:var(--w20);padding:8px 0">'+d+'</div>';lastDate=d;}
      var isMine=m.sender_type==='buyer';
      h+=renderChatBubble(m,isMine);
    });
    h+='</div>';
    h+='<div class="chat-input-row" style="display:flex;gap:6px;align-items:center"><label style="cursor:pointer;padding:8px;border-radius:8px;background:var(--w08);display:flex;align-items:center;flex-shrink:0" title="Attach file"><span style="font-size:14px">&#x1F4CE;</span><input type="file" onchange="B.chatAttachFile(this)" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"></label><textarea class="form-input" id="chatInput" placeholder="Type a message..." rows="1" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();B.sendChat()}" oninput="this.style.height=\'auto\';this.style.height=Math.min(this.scrollHeight,120)+\'px\'" style="flex:1;resize:none;max-height:120px;line-height:1.4"></textarea><button class="btn btn-pri" onclick="B.sendChat()">Send</button></div>';
  }
  h+='</div></div>';
  return h;
}

function openChat(buyerLinkId,sellerId){
  S.currentChat={buyerLinkId:buyerLinkId,sellerId:sellerId};
  S.chatMessages=[];render();
  sb.from('messages').select('*').eq('buyer_id',buyerLinkId).eq('user_id',sellerId).order('created_at',{ascending:true}).limit(100).then(function(r){
    S.chatMessages=r.data||[];render();
    setTimeout(scrollChatBottom,100);
    // Mark unread as read
    var unread=(r.data||[]).filter(function(m){return m.sender_type!=='buyer'&&!m.read_at;});
    if(unread.length){
      sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).in('id',unread.map(function(m){return m.id;})).then(function(){loadConversations();});
    }
  });
  initChatRealtime(buyerLinkId);
}

function closeChat(){S.currentChat=null;if(S._chatChannel){sb.removeChannel(S._chatChannel);S._chatChannel=null;}render();}

function sendChat(){
  var inp=document.getElementById('chatInput');if(!inp||!inp.value.trim())return;
  var body=inp.value.trim();inp.value='';inp.style.height='auto';
  var msg={user_id:S.currentChat.sellerId,buyer_id:S.currentChat.buyerLinkId,body:body,sender_type:'buyer',message_type:'text',channel:'platform',direction:'inbound'};
  S.chatMessages.push(Object.assign({id:'temp_'+Date.now(),created_at:new Date().toISOString()},msg));
  render();scrollChatBottom();
  sb.from('messages').insert(msg).select().single().then(function(r){
    if(r.error){toast('Failed to send','err');return;}
    S.chatMessages=S.chatMessages.filter(function(m){return!m.id.toString().startsWith('temp_');});
    S.chatMessages.push(r.data);render();scrollChatBottom();
  });
}

function chatAttachFile(input){
  if(!input.files||!input.files[0]||!S.currentChat)return;
  var file=input.files[0];
  if(file.size>10*1024*1024){toast('Max file size is 10MB','warn');return;}
  var ext=file.name.split('.').pop().toLowerCase();
  var path='chat/'+S.user.id+'/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  toast('Uploading...','info');
  sb.storage.from('documents').upload(path,file).then(function(r){
    if(r.error){toast('Upload failed: '+r.error.message,'err');return;}
    var url=sb.storage.from('documents').getPublicUrl(path).data.publicUrl;
    var isImg=/^(jpg|jpeg|png|gif|webp)$/i.test(ext);
    var body=isImg?'[Image] '+file.name:'[File] '+file.name;
    var msg={user_id:S.currentChat.sellerId,buyer_id:S.currentChat.buyerLinkId,body:body,sender_type:'buyer',message_type:'file',metadata:{file_url:url,file_name:file.name,file_type:ext,is_image:isImg},channel:'platform',direction:'inbound'};
    S.chatMessages.push(Object.assign({id:'temp_'+Date.now(),created_at:new Date().toISOString()},msg));
    render();scrollChatBottom();
    sb.from('messages').insert(msg).select().single().then(function(r){
      if(r.error){toast('Send failed','err');return;}
      S.chatMessages=S.chatMessages.filter(function(m){return!m.id.toString().startsWith('temp_');});
      S.chatMessages.push(r.data);toast('File sent','ok');render();scrollChatBottom();
    });
  });
  input.value='';
}

function initChatRealtime(buyerLinkId){
  if(S._chatChannel){sb.removeChannel(S._chatChannel);S._chatChannel=null;}
  S._chatChannel=sb.channel('buyer-chat-'+buyerLinkId).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'buyer_id=eq.'+buyerLinkId},function(payload){
    var m=payload.new;
    if(S.currentChat&&S.currentChat.buyerLinkId===buyerLinkId){
      if(!S.chatMessages.find(function(x){return x.id===m.id;})){S.chatMessages.push(m);render();scrollChatBottom();}
      if(m.sender_type!=='buyer'){sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).eq('id',m.id).then(function(){});}
    } else {S.chatUnread++;render();}
  }).subscribe();
}

function scrollChatBottom(){var el=document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;}

    h+='<div style="text-align:right"><span class="badge '+stCls+'">'+o.status+'</span>';
    h+='<div style="margin-top:6px"><span class="badge '+payCls+'">'+(o.payment_status||'unpaid')+'</span></div></div></div>';

/* === TRANSLATION === */
var _translations={};
function translateMsg(msgId,targetLang){
  var key=msgId+'_'+(targetLang||'en');
  if(_translations[key]&&_translations[key]!=='loading'){
    delete _translations[key];render();return;
  }
  // Find message text from current messages
  var text='';
  var allMsgs=S.dealMessages.concat(S.chatMessages);
  for(var i=0;i<allMsgs.length;i++){if(String(allMsgs[i].id)===String(msgId)){text=allMsgs[i].body||'';break;}}
  if(!text)return;
  if(!RELAY){_translations[key]='[Translation unavailable]';render();return;}
  _translations[key]='loading';render();
  fetch(RELAY+'/api/translate',{method:'POST',headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},body:JSON.stringify({text:text,targetLang:targetLang||'en'})}).then(function(r){return r.json();}).then(function(d){
    if(d.ok){_translations[key]=d.translated;}
    else{_translations[key]='[Translation failed]';}
    render();
    setTimeout(function(){var el=document.getElementById('dealChatMsgs')||document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;},50);
  }).catch(function(){_translations[key]='[Translation failed]';render();});
}
function getTranslation(msgId,targetLang){
  return _translations[msgId+'_'+(targetLang||'en')]||null;
}
function renderChatBubble(m,isMine){
  var body=m.body||'';
  var isSystem=m.message_type==='system';

  // Rich card rendering for system messages
  if(isSystem){return renderSystemCard(m,body);}

  var tgt=isMine?'ko':'en';
  var tr=getTranslation(m.id,tgt);
  var h='<div class="chat-bubble '+(isMine?'mine':'theirs')+'" style="font-size:12px">';
  var _fUrl=m.file_url||(m.metadata&&m.metadata.file_url)||'';var _fName=(m.metadata&&m.metadata.file_name)||body||'File';var _fIsImg=m.metadata&&m.metadata.is_image;
  if(m.message_type==='file'&&_fUrl&&/^https?:\/\//.test(_fUrl)){if(_fIsImg){h+='<img src="'+esc(_fUrl)+'" style="max-width:200px;max-height:200px;border-radius:8px;margin-bottom:4px;cursor:pointer" onclick="window.open(\''+esc(_fUrl)+'\',\'_blank\')">';}else{h+='&#x1F4CE; <a href="'+esc(_fUrl)+'" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">'+esc(_fName)+'</a>';}}else if(m.message_type==='file'){h+='&#x1F4CE; '+esc(_fName);}
  else if(m.message_type==='doc'){h+='&#x1F4C4; '+esc(body||'Document shared');}
  else{
    if(tr&&tr!=='loading'){
      h+='<div style="font-size:12px">'+esc(tr)+'</div>';
      h+='<div style="font-size:9px;color:'+(isMine?'rgba(0,0,0,.4)':'var(--w20)')+';margin-top:3px;font-style:italic">Translated</div>';
      h+='<div style="font-size:10px;margin-top:2px;opacity:.6;border-top:1px solid '+(isMine?'rgba(0,0,0,.1)':'var(--w08)')+';padding-top:2px">'+esc(body)+'</div>';
    } else {
      h+=esc(body);
    }
  }
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">';
  h+='<span style="font-size:8px;opacity:.5">'+new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</span>';
  if(body&&!String(m.id).startsWith('tmp_')&&!String(m.id).startsWith('temp_')){
    if(tr==='loading'){
      h+='<span style="font-size:9px;opacity:.5">translating...</span>';
    } else {
      h+='<span style="font-size:9px;cursor:pointer;opacity:.6;'+(tr?'color:'+(isMine?'rgba(0,0,0,.7)':'var(--pri)'):'')
        +'" onclick="event.stopPropagation();B.translateMsg(\''+m.id+'\',\''+(isMine?'ko':'en')+'\')">'
        +(tr?'Original':'Translate')+'</span>';
    }
  }
  h+='</div></div>';
  return h;
}

function renderSystemCard(m,body){
  var ts=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var deal=S.currentDeal;
  var _meta=m.metadata||{};

  // === SIGNATURE CARDS ===
  if(_meta.type==='signature_request'){

function loadSearchCredits(){
  if(!S.user)return;
  var plan=S.user.plan||'free';
  var limits={free:5,starter:30,basic:30,pro:200,enterprise:9999};
  S.searchCreditsLimit=limits[plan]||5;
  // Count searches this month from Supabase search_logs
  var now=new Date();
  var firstDay=new Date(now.getFullYear(),now.getMonth(),1).toISOString();
  sb.from('search_logs').select('id',{count:'exact',head:true}).eq('user_id',S.user.id).gte('created_at',firstDay).then(function(r){
    S.searchCreditsUsed=r.count||0;
    S._searchCreditsLoaded=true;
    render();
  });
}

function checkSearchCredits(){
  if(!S._searchCreditsLoaded)return true; // allow if not loaded yet
  if(S.searchCreditsUsed>=S.searchCreditsLimit){
    S.modal='upgradePrompt';S.modalData=null;render();
    return false;
  }
  return true;
}

function renderUpgradePrompt(){
  var h='<div class="modal-overlay" onclick="if(event.target===this)B.closeModal()"><div class="modal" style="max-width:480px"><div class="modal-h"><span>Search Limit Reached</span><button class="modal-close" onclick="B.closeModal()">&#10005;</button></div>';
  h+='<div class="modal-b" style="text-align:center;padding:30px">';
  h+='<div style="font-size:48px;margin-bottom:16px">&#x1F6AB;</div>';
  h+='<h3 style="font-size:18px;font-weight:800;margin-bottom:8px">Monthly Search Limit Reached</h3>';
  h+='<p style="font-size:13px;color:var(--w40);margin-bottom:8px">You have used <strong>'+S.searchCreditsUsed+'</strong> of <strong>'+S.searchCreditsLimit+'</strong> searches this month.</p>';
  h+='<p style="font-size:12px;color:var(--w40);margin-bottom:20px">Upgrade your plan for more searches, inquiries, and premium features.</p>';
  h+='<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">';
  var curPlan=S.user.plan||'free';
  if(curPlan==='free'||curPlan==='starter'||curPlan==='basic'){

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function stripHtml(s){return s?s.replace(/<[^>]*>/g,''):''}
function formatDate(d){if(!d)return'';var dt=new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function _countryFlag(code){if(!code||code.length!==2)return'&#x1F30D;';var c=code.toUpperCase();return String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)+String.fromCodePoint(0x1F1E6+c.charCodeAt(1)-65);}
function _relDate(d){if(!d)return'';var ms=Date.now()-new Date(d).getTime();var days=Math.floor(ms/86400000);if(days<1)return'Today';if(days<7)return days+'d ago';if(days<30)return Math.floor(days/7)+'w ago';return Math.floor(days/30)+'mo ago';}
function timeAgo(d){if(!d)return'';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return formatDate(d);}

function initBuyerStripe(planId){
  var stripe=_getStripe();
  if(!stripe){toast('Card payment is being set up. Please contact creative@mo-tive.com for assistance.','info');return;}
  var cycleEl=document.querySelector('input[name=b_cycle]:checked');
  var cycle=cycleEl?cycleEl.value:'m';
  var priceId=STRIPE_CFG.prices[planId]&&STRIPE_CFG.prices[planId][cycle];
  if(!priceId){toast('Payment setup in progress. Contact creative@mo-tive.com','info');return;}
  var btn=document.getElementById('bck-btn');
  if(btn){btn.disabled=true;btn.textContent='Connecting...';}
  sb.auth.getSession().then(function(r){
    if(!r.data||!r.data.session){toast('Please log in first','warn');if(btn){btn.disabled=false;btn.textContent='Pay with Card';}return;}
    fetch(STRIPE_CFG.fn+'/create-checkout-session',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+r.data.session.access_token,'apikey':SB_KEY},
      body:JSON.stringify({price_id:priceId,success_url:location.origin+location.pathname+'#profile',cancel_url:location.origin+location.pathname+'#profile'})
    }).then(function(r){return r.json();}).then(function(data){
      if(data.error){toast(data.error,'err');if(btn){btn.disabled=false;btn.textContent='Pay with Card';}return;}
      if(data.url){closeModal('bck');window.location.href=data.url;}
      else if(data.clientSecret){
        closeModal('bck');
        document.body.insertAdjacentHTML('beforeend','<div class="modal-overlay" id="stripe-ck" onclick="if(event.target===this)B.closeStripeModal()"><div class="modal" style="max-width:520px"><div class="modal-h"><h3>Payment</h3><button class="modal-close" onclick="B.closeStripeModal()">&#10005;</button></div><div class="modal-b"><div id="stripe-mount" style="min-height:300px"></div></div></div></div>');
        var sm=document.getElementById('stripe-ck');if(sm)sm.style.display='flex';
        stripe.initEmbeddedCheckout({clientSecret:data.clientSecret}).then(function(checkout){window._bStripe=checkout;checkout.mount('#stripe-mount');});
      }
    }).catch(function(err){toast('Connection error: '+err.message,'err');if(btn){btn.disabled=false;btn.textContent='Pay with Card';}});
  });
}

/* ★ Command Palette (Cmd+K / Ctrl+K) */
var CMD_ITEMS=[
  {icon:'🏠',label:'Dashboard',page:'dashboard'},
  {icon:'🔍',label:'Search Manufacturers',page:'search'},
  {icon:'🏪',label:'Marketplace',page:'marketplace'},
  {icon:'📄',label:'Documents',page:'documents'},
  {icon:'💬',label:'Messages',page:'messages'},
  {icon:'🤝',label:'Deals',page:'deals'},
  {icon:'📋',label:'Orders',page:'orders'},
  {icon:'🚢',label:'Shipments',page:'shipments'},
  {icon:'⭐',label:'Saved Products',page:'saved'},
  {icon:'📨',label:'Inquiries',page:'inquiries'},
  {icon:'👤',label:'Profile',page:'profile'},
  {icon:'🤝',label:'Partnership',page:'partnership'},
];
function openCmdPalette(){
  if(document.getElementById('cmd-pal'))return;
  var o=document.createElement('div');o.id='cmd-pal';o.className='cmd-palette-overlay';
  o.onclick=function(e){if(e.target===o)closeCmdPalette();};
  var p=document.createElement('div');p.className='cmd-palette';
  var inp=document.createElement('input');inp.className='cmd-input';inp.placeholder='Navigate, search...';
  p.appendChild(inp);
  var res=document.createElement('div');res.className='cmd-results';
  p.appendChild(res);o.appendChild(p);document.body.appendChild(o);inp.focus();
  function renderItems(q){
    var items=CMD_ITEMS;
    if(q){var ql=q.toLowerCase();items=CMD_ITEMS.filter(function(c){return c.label.toLowerCase().indexOf(ql)>=0||(c.page||'').indexOf(ql)>=0;});}
    if(!items.length){res.innerHTML='<div class="cmd-empty">No results</div>';return;}
    res.innerHTML=items.map(function(c,i){return '<div class="cmd-item'+(i===0?' sel':'')+'" data-idx="'+i+'"><span class="ci-icon">'+c.icon+'</span><span class="ci-label">'+c.label+'</span></div>';}).join('');
    res.querySelectorAll('.cmd-item').forEach(function(el,i){el.onclick=function(){closeCmdPalette();nav(items[i].page);};});
    window._cmdFiltered=items;window._cmdIdx=0;
  }
  inp.addEventListener('input',function(){renderItems(inp.value);});
  inp.addEventListener('keydown',function(e){
    var items=window._cmdFiltered||CMD_ITEMS;var idx=window._cmdIdx||0;
    if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,items.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);}
    else if(e.key==='Enter'){e.preventDefault();if(items[idx]){closeCmdPalette();nav(items[idx].page);}return;}
    else if(e.key==='Escape'){closeCmdPalette();return;}
    else return;
    window._cmdIdx=idx;
    res.querySelectorAll('.cmd-item').forEach(function(el,i){el.classList.toggle('sel',i===idx);});
    var sel=res.querySelector('.cmd-item.sel');if(sel)sel.scrollIntoView({block:'nearest'});
  });
  renderItems('');
}
function closeCmdPalette(){var o=document.getElementById('cmd-pal');if(o)o.remove();}
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openCmdPalette();}
});

    html+='<div><div style="font-size:14px;font-weight:700;color:#fff">Whistle AI Support</div><div style="font-size:11px;color:rgba(255,255,255,.4)">Ask anything about sourcing</div></div>';
    html+='<div style="margin-left:auto;display:flex;align-items:center;gap:4px"><span style="font-size:10px;color:var(--w40)">Available</span></div></div>';
    html+='<div id="wc-msgs" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:200px;max-height:320px">';
    if(msgs.length===0&&step===0){html+=bbl('bot','Hi! Welcome to Whistle AI. How can we help?');html+=qb(['Product Search Help','Sourcing Inquiry','Partnership','Other']);}
    for(var i=0;i<msgs.length;i++)html+=bbl(msgs[i].from,msgs[i].text);
    if(step===1){html+=bbl('bot','Please share some info so we can assist you better.');html+='<div style="display:flex;flex-direction:column;gap:6px;width:100%"><input id="wc-name" placeholder="Name / Company" value="'+esc(info.name)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><input id="wc-email" placeholder="Email (optional)" value="'+esc(info.email)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><input id="wc-phone" placeholder="Phone (optional)" value="'+esc(info.phone)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><button onclick="WC.submitInfo()" style="padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);color:#060B18;font-weight:700;font-size:13px;cursor:pointer">Start Chat</button></div>';}
    html+='</div>';
    if(step>=2){html+='<div style="padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px"><input id="wc-input" onkeydown="if(event.key===\'Enter\')WC.send()" placeholder="Type your message..." style="flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><button onclick="WC.send()" style="width:40px;height:40px;border-radius:10px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="#060B18"/></svg></button></div>';}
    html+='</div>';
    el.innerHTML=html;var mc=document.getElementById('wc-msgs');if(mc)mc.scrollTop=mc.scrollHeight;
  }
  function bbl(f,t){var et=esc(t);return f==='bot'?'<div style="align-self:flex-start;max-width:85%;padding:10px 14px;border-radius:12px 12px 12px 4px;background:#111B2E;border:1px solid rgba(255,255,255,.06)"><div style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.5">'+et+'</div></div>':'<div style="align-self:flex-end;max-width:85%;padding:10px 14px;border-radius:12px 12px 4px 12px;background:linear-gradient(135deg,#00D4FF20,#0088FF15);border:1px solid #00D4FF30"><div style="font-size:13px;color:rgba(255,255,255,.9);line-height:1.5">'+et+'</div></div>';}
  function qb(a){var h='<div style="display:flex;flex-wrap:wrap;gap:6px">';for(var i=0;i<a.length;i++)h+='<div onclick="WC.pick(\''+esc(a[i])+'\')" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(0,212,255,.3);background:rgba(0,212,255,.06);color:#00D4FF;font-size:12px;font-weight:600;cursor:pointer">'+esc(a[i])+'</div>';return h+'</div>';}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  var ar={'Product Search Help':'You can search for Korean products using the search bar on the Product Search page. Enter keywords, product names, or categories to find suppliers.','Sourcing Inquiry':'For custom sourcing requests, use the Marketplace page to post your requirements. Korean manufacturers will review and send proposals.','Partnership':'We offer reseller, service, technology, and institutional partnerships. Navigate to the Partnership page from the sidebar or contact us at contact@whistleai.co.kr.','Other':'Please type your question below and our team will get back to you shortly.'};
  window.WC={
    toggle:function(){open=!open;r();},
    pick:function(t){msgs.push({from:'user',text:t});if(ar[t]){msgs.push({from:'bot',text:ar[t]});msgs.push({from:'bot',text:'For further assistance, please share your details below.'});step=1;}r();},
    submitInfo:function(){var n=document.getElementById('wc-name'),e=document.getElementById('wc-email'),p=document.getElementById('wc-phone');info.name=n?n.value:'';info.email=e?e.value:'';info.phone=p?p.value:'';if(!info.name){toast('Please enter your name or company.','warn');return;}msgs.push({from:'bot',text:'Hi '+info.name+'! Feel free to type your question.'});step=2;r();},
    send:function(){var inp=document.getElementById('wc-input');if(!inp||!inp.value.trim())return;var msg=inp.value.trim();msgs.push({from:'user',text:msg});r();var relay=getRelay();if(!relay){msgs.push({from:'bot',text:'Chat service is connecting... please try again in a moment.'});r();return;}fetch(relay+'/api/whistle/chat-inquiry',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:info.name,email:info.email,phone:info.phone,message:msg,page:PAGE})}).then(function(res){return res.json();}).then(function(d){if(d.ok){msgs.push({from:'bot',text:d.reply||'Your message has been received.'});r();}}).catch(function(){msgs.push({from:'bot',text:'Failed to send. Please try again later.'});r();});}
  };r();
})();
</script>
