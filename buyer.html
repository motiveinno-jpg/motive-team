<style>
:root{--bg:#060B18;--bg2:#0A1020;--card:#0D1424;--card2:#111B2E;--sf:#111B2E;--pri:#00D4FF;--pri-g:linear-gradient(135deg,#00D4FF,#0088FF);--pri-d:#0088FF;--pri-glow:0 0 30px rgba(0,212,255,.12);--acc:#FFB800;--acc-g:linear-gradient(135deg,#FFB800,#FF8C00);--ok:#00E676;--err:#FF5252;--warn:#FFA726;--purple:#A855F7;--w:#fff;--w90:rgba(255,255,255,.9);--w70:rgba(255,255,255,.7);--w60:rgba(255,255,255,.6);--w50:rgba(255,255,255,.5);--w40:rgba(255,255,255,.55);--w20:rgba(255,255,255,.35);--w12:rgba(255,255,255,.1);--w10:rgba(255,255,255,.08);--w08:rgba(255,255,255,.06);--bd:rgba(255,255,255,.08);--bd-l:rgba(255,255,255,.15);--r:14px;--r-s:10px;--r-xs:6px;--shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 12px 48px rgba(0,0,0,.6);--w04:rgba(255,255,255,.03);--w30:rgba(255,255,255,.25);--w80:rgba(255,255,255,.8);--txt:rgba(255,255,255,.9)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'Sora',-apple-system,sans-serif;color:var(--w);line-height:1.5;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--w12);border-radius:3px}::selection{background:rgba(0,212,255,.3)}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pri)!important;box-shadow:0 0 0 3px rgba(0,212,255,.25)}
.btn:focus-visible,.nav-item:focus-visible,button:focus-visible{outline:2px solid var(--pri);outline-offset:2px}
select option{background:var(--card);color:var(--w90)}textarea{resize:vertical;min-height:60px}a{color:var(--pri);text-decoration:none}
.app-layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-header{padding:16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sidebar-logo{width:32px;height:32px;border-radius:9px;background:var(--pri-g);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--bg);flex-shrink:0}
.sidebar-title{font-size:15px;font-weight:800;letter-spacing:-.5px}
.sidebar-sub{font-size:10px;color:var(--w40);font-family:'JetBrains Mono'}
.sidebar-nav{flex:1;padding:8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-s);font-size:13px;font-weight:500;color:var(--w60);cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:2px}
.nav-item:hover{background:var(--w08);color:var(--w90)}
.nav-item.active{background:rgba(0,212,255,.08);color:var(--pri);border-color:rgba(0,212,255,.15);font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-item .badge-count{margin-left:auto;font-size:10px;background:var(--err);color:var(--w);padding:1px 6px;border-radius:10px;font-weight:700}
.nav-section{height:1px;background:var(--bd);margin:8px 12px}
.sidebar-footer{padding:12px;border-top:1px solid var(--bd)}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:rgba(6,11,24,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700}
.page-content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;margin-bottom:16px}
.card-h{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:14px}
.card-b{padding:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r-s);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-pri{background:var(--pri-g);color:var(--bg);box-shadow:var(--pri-glow)}.btn-acc{background:var(--acc-g);color:var(--bg)}
.btn-ok{background:var(--ok);color:var(--bg)}.btn-ghost{background:transparent;color:var(--w);border:1.5px solid var(--bd-l)}
.btn-ghost:hover{border-color:var(--w40)}.btn-danger{background:rgba(255,82,82,.15);color:var(--err);border:1px solid rgba(255,82,82,.2)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:var(--r-xs);min-height:36px}.btn-lg{padding:12px 24px;font-size:14px}.btn-block{width:100%}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r-xs);font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.badge-pri{background:rgba(0,212,255,.1);color:var(--pri);border:1px solid rgba(0,212,255,.2)}
.badge-acc{background:rgba(255,184,0,.1);color:var(--acc);border:1px solid rgba(255,184,0,.2)}
.badge-ok{background:rgba(0,230,118,.1);color:var(--ok);border:1px solid rgba(0,230,118,.2)}
.badge-err{background:rgba(255,82,82,.1);color:var(--err);border:1px solid rgba(255,82,82,.2)}
.badge-purple{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.badge-ghost{background:var(--w08);color:var(--w40);border:1px solid var(--bd)}
.form-group{margin-bottom:14px}
.form-row{display:flex;gap:12px}.form-row>.form-group{flex:1;min-width:0}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--w40);margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border-radius:var(--r-s);border:1.5px solid var(--bd);background:var(--sf);color:var(--w90);font-size:14px;font-family:inherit}
.form-input::placeholder,.form-textarea::placeholder{color:var(--w20)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.grid-3,.grid-4{grid-template-columns:1fr 1fr}.grid-5-dash{grid-template-columns:repeat(3,1fr)!important}}
@media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.sidebar{display:none}.mob-menu{display:flex!important}.topbar{padding:0 12px}.page-content{padding:12px}.search-box{min-width:0}.filter-row{gap:6px}.notif-dropdown{width:calc(100vw - 24px);right:-60px}.float-chat-panel{width:calc(100vw - 24px);right:12px;bottom:84px;max-height:60vh}.deal-stages{padding:10px 0}.auth-card{padding:24px 18px}.stat-val{font-size:22px}.product-grid{grid-template-columns:1fr!important}.btn{min-height:44px;min-width:44px}.btn-sm{min-height:36px;min-width:36px}.form-select,.form-input{min-height:44px;font-size:16px!important}.nav-item{min-height:44px}.order-stage{min-height:40px;padding:10px 16px}.source-tab-item{min-height:44px;padding:12px 12px}.mob-bottom-nav{display:flex!important}.page-content{padding-bottom:70px!important}}
.stat-card{padding:18px;border-radius:var(--r);background:var(--card);border:1px solid var(--bd);text-align:center}
.stat-val{font-size:28px;font-weight:800;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--w40);text-transform:uppercase;letter-spacing:.5px}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:var(--r-s);font-size:13px;font-weight:600;z-index:9999;animation:slideUp .3s}
.toast-ok{background:var(--ok);color:#000}.toast-err{background:var(--err);color:#fff}.toast-warn{background:var(--acc);color:#000}.toast-info{background:var(--pri);color:#000}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.auth-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.auth-card{width:420px;max-width:90vw;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:36px;box-shadow:var(--shadow-lg)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;justify-content:center}
.auth-logo-icon{width:48px;height:48px;border-radius:14px;background:var(--pri-g);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--bg)}
.auth-title{font-size:22px;font-weight:900;letter-spacing:-.5px}
.auth-sub{font-size:11px;color:var(--acc);font-weight:600}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:var(--r-s);overflow:hidden;border:1px solid var(--bd)}
.auth-tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:600;color:var(--w40);cursor:pointer;background:transparent;transition:all .15s}
.auth-tab.active{background:rgba(0,212,255,.1);color:var(--pri)}
.auth-error{background:rgba(255,82,82,.1);color:var(--err);padding:10px 14px;border-radius:var(--r-xs);font-size:12px;margin-bottom:14px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:16px}
.product-card{padding:16px;border-radius:var(--r);background:var(--sf);border:1px solid var(--bd);transition:all .2s}
.product-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:var(--shadow)}
.product-img{width:100%;height:160px;object-fit:cover;border-radius:var(--r-xs);margin-bottom:10px;background:var(--w08)}
.product-img-placeholder{width:100%;height:160px;border-radius:var(--r-xs);background:linear-gradient(135deg,var(--w08),rgba(0,212,255,.04));display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px;border:1px dashed var(--bd);gap:4px}.product-img-placeholder:after{content:'No Image';font-size:10px;color:var(--w20);font-family:'Sora',sans-serif}
.source-tab{display:flex;gap:0;border-radius:var(--r-s);overflow:hidden;border:1px solid var(--bd);margin-bottom:16px}
.source-tab-item{flex:1;text-align:center;padding:10px 16px;font-size:13px;font-weight:600;color:var(--w40);cursor:pointer;transition:all .15s;border-right:1px solid var(--bd)}
.source-tab-item:last-child{border-right:none}
.source-tab-item.active{background:rgba(0,212,255,.08);color:var(--pri)}
.source-tab-item:hover:not(.active){background:var(--w08);color:var(--w90)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{width:560px;max-width:92vw;max-height:85vh;overflow-y:auto;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--shadow-lg)}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:15px}
.modal-close{width:36px;height:36px;border-radius:8px;background:var(--w08);border:none;color:var(--w60);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--err);color:var(--w)}
.modal-b{padding:20px}
.inquiry-type-card{padding:16px;border-radius:var(--r-s);border:2px solid var(--bd);cursor:pointer;transition:all .15s;margin-bottom:10px}
.inquiry-type-card:hover{border-color:var(--w40)}
.inquiry-type-card.selected{border-color:var(--pri);background:rgba(0,212,255,.05)}
.mob-menu{display:none;position:fixed;top:12px;left:12px;z-index:500;min-width:44px;min-height:44px;width:44px;height:44px;border-radius:10px;background:var(--card);border:1px solid var(--bd);align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.mob-overlay{display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.6);z-index:899}
.sidebar.mobile-open{display:flex!important;position:fixed;top:0;left:0;bottom:0;z-index:900;width:280px;box-shadow:var(--shadow-lg);animation:slideInL .2s}
.mob-overlay.active{display:block}
@keyframes slideInL{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.origin-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:var(--r-xs);font-size:10px;font-weight:700}
.origin-verified{background:rgba(0,230,118,.12);color:var(--ok)}
.origin-likely{background:rgba(255,184,0,.12);color:var(--acc)}
.origin-unknown{background:var(--w08);color:var(--w40)}
.filter-row{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;position:sticky;top:0;z-index:50;background:var(--bg);padding:8px 0}
.search-box{flex:1;min-width:200px;display:flex;gap:8px}
.search-box input{flex:1}
.inquiry-list-item{padding:14px 18px;border-bottom:1px solid var(--w08);display:flex;align-items:center;gap:14px;cursor:pointer;transition:background .15s}
.inquiry-list-item:hover{background:var(--w08)}
.inquiry-list-item:last-child{border-bottom:none}
/* Chat */
.chat-layout{display:flex;height:calc(100vh - 100px);gap:0}
.chat-list{width:280px;border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0}
.chat-list-item{padding:12px 14px;border-bottom:1px solid var(--w08);cursor:pointer;transition:background .15s}
.chat-list-item:hover{background:var(--w08)}.chat-list-item.active{background:rgba(0,212,255,.08);border-left:3px solid var(--pri)}
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.chat-bubble{max-width:70%;padding:10px 14px;border-radius:var(--r-s);font-size:13px;line-height:1.5;word-break:break-word}
.chat-bubble.mine{align-self:flex-end;background:var(--pri-g);color:var(--bg);border-bottom-right-radius:4px}
.chat-bubble.theirs{align-self:flex-start;background:var(--sf);border:1px solid var(--bd);border-bottom-left-radius:4px}
.chat-input-row{padding:12px;border-top:1px solid var(--bd);display:flex;gap:8px}
.chat-input-row input{flex:1}
/* Orders pipeline */
.order-pipeline{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;mask-image:linear-gradient(to right,#000 90%,transparent 100%);-webkit-mask-image:linear-gradient(to right,#000 90%,transparent 100%)}
.order-stage{padding:8px 16px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;border:1px solid var(--bd);background:var(--sf);color:var(--w40);transition:all .15s}
.order-stage.active{background:rgba(0,212,255,.1);color:var(--pri);border-color:rgba(0,212,255,.3)}
.order-stage .cnt{margin-left:4px;opacity:.6}
/* Shipment timeline */
.ship-timeline{position:relative;padding-left:28px}
.ship-step{position:relative;padding-bottom:24px;padding-left:20px}
.ship-step:before{content:'';position:absolute;left:-28px;top:0;width:2px;height:100%;background:var(--bd)}
.ship-step:last-child:before{height:16px}
.ship-step .dot{position:absolute;left:-34px;top:2px;width:14px;height:14px;border-radius:50%;border:2px solid var(--bd);background:var(--bg)}
.ship-step.done .dot{background:var(--ok);border-color:var(--ok)}
.ship-step.current .dot{background:var(--pri);border-color:var(--pri);box-shadow:0 0 8px rgba(0,212,255,.4)}
/* Notification dropdown */
.notif-bell{position:relative;cursor:pointer;font-size:18px;padding:4px}
.notif-dot{position:absolute;top:0;right:0;width:8px;height:8px;border-radius:50%;background:var(--err)}
.notif-dropdown{position:absolute;top:40px;right:0;width:360px;max-height:400px;overflow-y:auto;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:1100;animation:slideUp .2s ease-out}
.notif-item{padding:12px 14px;border-bottom:1px solid var(--w08);cursor:pointer;transition:background .15s;font-size:12px}
.notif-item:hover{background:var(--w08)}
.notif-item.unread{border-left:3px solid var(--pri)}
@media(max-width:768px){.chat-list{width:100%}.chat-panel{display:none}.chat-layout.chat-open .chat-list{display:none}.chat-layout.chat-open .chat-panel{display:flex}.chat-layout.chat-open #chatBackBtn{display:flex!important}}
/* Deal Pipeline */
.deal-stages{display:flex;align-items:center;gap:0;overflow-x:auto;padding:16px 0;margin-bottom:20px}
.deal-stage{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:11px;font-weight:600;color:var(--w20);white-space:nowrap;position:relative;cursor:default;transition:all .2s}
.deal-stage .s-icon{font-size:16px;opacity:.4}.deal-stage .s-line{width:20px;height:2px;background:var(--bd);flex-shrink:0}
.deal-stage.done{color:var(--ok)}.deal-stage.done .s-icon{opacity:1}.deal-stage.done .s-line{background:var(--ok)}
.deal-stage.current{color:var(--pri);font-weight:800}.deal-stage.current .s-icon{opacity:1}
.deal-stage.current:after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--pri);box-shadow:0 0 8px var(--pri)}
/* Deal Room */
.deal-room{display:flex;height:calc(100vh - 100px);gap:0;overflow:hidden}
.deal-content{width:300px;overflow-y:auto;padding:16px;border-right:1px solid var(--bd);flex-shrink:0;background:var(--bg2);transition:width .3s}
.deal-content.collapsed{width:0;padding:0;overflow:hidden;border:none}
.deal-chat{flex:1;display:flex;flex-direction:column;min-width:0}
.deal-chat .chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.deal-chat .chat-input-area{border-top:1px solid var(--bd);background:var(--card)}
.deal-chat .chat-actions{padding:8px 16px 0;display:flex;gap:6px;flex-wrap:wrap}
.deal-chat .chat-input-row{padding:10px 16px;display:flex;gap:8px}
.deal-chat .chat-input-row input,.deal-chat .chat-input-row textarea{flex:1;font-size:13px;padding:10px 14px;border-radius:12px}
.deal-chat-header{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:rgba(0,212,255,.02)}
.chat-action-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(0,212,255,.2);background:rgba(0,212,255,.05);color:var(--pri);transition:all .15s;white-space:nowrap}
.chat-action-chip:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);transform:translateY(-1px)}
.chat-action-chip.accent{border-color:rgba(255,184,0,.2);background:rgba(255,184,0,.05);color:var(--acc)}
.chat-action-chip.accent:hover{background:rgba(255,184,0,.12);border-color:rgba(255,184,0,.4)}
.chat-action-chip.ok{border-color:rgba(0,230,118,.2);background:rgba(0,230,118,.05);color:var(--ok)}
.chat-action-chip.ok:hover{background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.4)}
.chat-rich-card{max-width:85%;border-radius:12px;overflow:hidden;border:1px solid var(--bd);background:var(--card);margin:4px 0}
.chat-rich-card .rc-header{padding:10px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--w08)}
.chat-rich-card .rc-body{padding:10px 14px;font-size:11px;color:var(--w60);line-height:1.6}

function toggleBuyerCat(catId){
  var sel=typeof S.user.interests==='string'?JSON.parse(S.user.interests||'[]'):(S.user.interests||[]);
  var idx=sel.indexOf(catId);
  if(idx===-1)sel.push(catId);else sel.splice(idx,1);

function setBuyerExp(val){

function nextBuyerOb(step){
  if(step===0){
    var f=document.getElementById('bobf0');if(!f)return;
    var els=f.elements;
    var cn=els.company_name.value.trim(),dn=els.display_name.value.trim(),co=els.country.value,ph=els.phone.value.trim();

    S.user.company_name=cn;S.user.display_name=dn;S.user.country=co;S.user.phone=ph;S.user.onboarding_step=1;render();
    sb.from('users').update({company_name:cn,display_name:dn,country:co||null,phone:ph||null,onboarding_step:1}).eq('id',S.user.id).then(function(){}).catch(function(e){console.warn('[onboarding step0 save error]',e);});
  }else if(step===1){
    var sel=S.user.interests||[];
    if(!sel.length){toast('Please select at least one category','warn');return;}
    S.user.onboarding_step=2;render();
    sb.from('users').update({interests:JSON.stringify(sel),onboarding_step:2}).eq('id',S.user.id).then(function(){}).catch(function(e){console.warn('[onboarding step1 save error]',e);});
  }else if(step===2){
    var exp=S.user.import_experience||'new';
    S.user.onboarding_step=3;render();
    sb.from('users').update({import_experience:exp,onboarding_step:3}).eq('id',S.user.id).then(function(){}).catch(function(e){console.warn('[onboarding step2 save error]',e);});
  }
}

function submitSourcingReq(){
  if(S._submitting)return;S._submitting=true;
  var desc=document.getElementById('src-desc');
  if(!desc||!desc.value.trim()){toast('Please describe the product you\'re looking for.','err');S._submitting=false;return;}
  if(!S.user){toast('Please sign in to submit a request.','err');S._submitting=false;return;}
  var msgText=desc.value.trim();
  var trackingId='WH-INQ-'+Date.now();
  sb.from('contact_requests').insert({
    buyer_id:S.user.id,email:S.user.email,contact_name:S.user.display_name||'',company_name:S.user.company_name||'',
    inquiry_type:'sourcing',message:msgText,status:'pending',source:'buyer-sourcing',tracking_id:trackingId
  }).select().single().then(function(r){
    S._submitting=false;
    if(r.error){toast('Failed: '+r.error.message,'err');return;}
    S.modal='inquiryConfirm';S.modalData={trackingId:trackingId,product:msgText.slice(0,80),type:'sourcing'};
    desc.value='';render();
    /* Auto-create buyer_request for marketplace matching */
    _autoCreateBuyerRequest(msgText,'sourcing');
    /* Notify admins about new sourcing request */
    _notifyAdminsNewRequest(r.data);
  }).catch(function(e){S._submitting=false;toast('Network error. Please try again.','err');});
}

/* 자동 마켓플레이스 등록 + 제조사 알림 */
function _autoCreateBuyerRequest(msg,type){
  if(!S.user)return;
  sb.from('buyer_requests').insert({
    buyer_user_id:S.user.id,title:(type==='sourcing'?'Sourcing: ':'Inquiry: ')+msg.slice(0,80),
    description:msg,category:'',status:'open',budget_range:'',
    created_at:new Date().toISOString()
  }).then(function(r){
    if(r.error){console.error('[auto-buyer-request]',r.error);return;}
    /* 바이어 마켓플레이스에 자동 등록됨 → 제조사들이 제안 가능 */
  });
}
function _notifyAdminsNewRequest(contactReq){
  /* 관리자에게 새 바이어 요청 알림 */
  sb.from('users').select('id').eq('role','admin').limit(20).then(function(r){
    if(!r.data||!r.data.length)return;
    var notifs=r.data.map(function(admin){
      return {user_id:admin.id,type:'buyer',title:'New buyer sourcing request',
        body:(contactReq.company_name||contactReq.email)+': '+((contactReq.message||'').slice(0,100)),
        link_page:'admin-contacts',is_read:false};
    });
    sb.from('notifications').insert(notifs).then(function(){});
  });
  /* 카테고리 매칭: 관련 제품이 있는 제조사에게도 알림 */
  sb.from('products').select('user_id').eq('is_public',true).limit(10).then(function(r){
    if(!r.data||!r.data.length)return;
    var uids=[...new Set(r.data.map(function(p){return p.user_id;}))];
    var mfrNotifs=uids.map(function(uid){
      return {user_id:uid,type:'buyer',title:'New buyer inquiry received',
        body:'A buyer is looking for products. Check your marketplace for opportunities.',
        link_page:'marketplace',is_read:false};
    });
    if(mfrNotifs.length)sb.from('notifications').insert(mfrNotifs).then(function(){});
  });
}

function submitCatSourcing(catId){
  var product=document.getElementById('src-product');
  if(!product||!product.value.trim()){toast('Please enter the product type.','err');return;}
  if(!S.user){toast('Please sign in to submit a request.','err');return;}
  var moq=(document.getElementById('src-moq')||{}).value||'';
  var price=(document.getElementById('src-price')||{}).value||'';
  var country=(document.getElementById('src-country')||{}).value||'';
  var notes=(document.getElementById('src-notes')||{}).value||'';
  var msg='[Category: '+catId+']\nProduct: '+product.value.trim()+'\nMOQ: '+(moq||'N/A')+'\nTarget Price: '+(price||'N/A')+'\nDestination: '+(country||'N/A')+'\n\n'+notes;
  var trackingId='WH-INQ-'+Date.now();
  sb.from('contact_requests').insert({
    buyer_id:S.user.id,email:S.user.email,contact_name:S.user.display_name||'',company_name:S.user.company_name||'',
    inquiry_type:'sourcing',message:msg,status:'pending',source:'buyer-sourcing-'+catId.toLowerCase(),tracking_id:trackingId
  }).select().single().then(function(r){
    if(r.error){toast('Failed: '+r.error.message,'err');return;}
    S.modal='inquiryConfirm';S.modalData={trackingId:trackingId,product:product.value.trim(),type:'sourcing-'+catId};
    _srcCat=null;render();
    /* Auto marketplace + notify */
    _autoCreateBuyerRequest(msg,'sourcing-'+catId);
    _notifyAdminsNewRequest(r.data);
  });
}

function doUpdatePassword(f){
  var pw=f.newpw.value;if(pw.length<8||!/[a-zA-Z]/.test(pw)||!/[0-9]/.test(pw)||!/[^a-zA-Z0-9]/.test(pw))return set({authError:'Password must be 8+ characters with letters, numbers, and special characters.'});
  sb.auth.updateUser({password:pw}).then(function(r){
    if(r.error)return set({authError:_authErr(r.error.message)});
    set({_pwRecovery:false});toast('Password updated successfully!','ok');loadUser();
  }).catch(function(){set({authError:'Network error. Please try again.'});});
}

var _authErrMap={
  'Invalid login credentials':'Invalid email or password. Please check and try again.',
  'Email not confirmed':'Please verify your email first. Check your inbox for the confirmation link.',
  'User already registered':'This email is already registered. Try signing in instead.',
  'Email rate limit exceeded':'Too many attempts. Please wait a moment and try again.',
  'Invalid email':'Please enter a valid email address.',
  'Signup requires a valid password':'Please enter a valid password (at least 6 characters).',
  'Password should be at least 6':'Password must be at least 6 characters.',
  'For security purposes':'For security, please wait a moment before trying again.'
};
function _authErr(msg){if(!msg)return msg;for(var k in _authErrMap){if(msg.indexOf(k)>=0)return _authErrMap[k];}return msg;}
function doLogin(f){
  var emailVal=f.email.value;
  set({authError:'',_loggingIn:true,_loginEmail:emailVal});
  sb.auth.signInWithPassword({email:emailVal,password:f.password.value}).then(function(r){
    if(r.error){set({_loggingIn:false,authError:_authErr(r.error.message)});return;}
    set({_loggingIn:false,_loginEmail:''});
    loadUser();
  }).catch(function(){set({_loggingIn:false,authError:'Login failed. Please try again.'});});
}
function doSignup(f){
  var _pw=f.password.value;if(_pw.length<8||!/[a-zA-Z]/.test(_pw)||!/[0-9]/.test(_pw)||!/[^a-zA-Z0-9]/.test(_pw))return set({authError:'Password must be 8+ characters with letters, numbers, and special characters.'});
  set({authError:''});
  sb.auth.signUp({email:f.email.value,password:f.password.value,options:{data:{role:'buyer',company_name:f.company_name.value,display_name:f.display_name.value,terms_accepted_at:new Date().toISOString()}}}).then(function(r){
    if(r.error)return set({authError:_authErr(r.error.message)});
    if(r.data&&r.data.user&&r.data.user.identities&&r.data.user.identities.length===0)return set({authError:'This email is already registered. Please sign in.'});
    // Also upsert into users table
    var uid=r.data&&r.data.user?r.data.user.id:null;
    if(uid){
      var signupInterest=f.interest&&f.interest.value?JSON.stringify([f.interest.value]):null;
      sb.from('users').upsert({id:uid,email:f.email.value,role:'buyer',company_name:f.company_name.value,display_name:f.display_name.value,country:f.country.value,interests:signupInterest},{onConflict:'id'}).then(function(){});
    }
    toast('Account created! Please check your email to verify, then sign in.','ok');
    set({authMode:'login'});
  }).catch(function(){set({authError:'Network error. Please try again.'});});
}
function socialLogin(provider){
  sb.auth.signInWithOAuth({provider:provider,options:{redirectTo:window.location.origin+window.location.pathname}}).then(function(r){
    if(r.error)set({authError:_authErr(r.error.message)});
  }).catch(function(){set({authError:'Network error. Please try again.'});});
}
function doReset(f){
  sb.auth.resetPasswordForEmail(f.email.value).then(function(r){
    if(r.error)return set({authError:_authErr(r.error.message)});
    toast('Reset link sent to your email','ok');
    set({authMode:'login'});
  }).catch(function(){set({authError:'Network error. Please try again.'});});
}

  if(S._dealChatCh){try{S._dealChatCh.unsubscribe();}catch(e){}sb.removeChannel(S._dealChatCh);S._dealChatCh=null;}

/* === LOAD USER === */
function loadUser(){
  set({loading:true});
  /* 5초 타임아웃: 로딩이 끝나지 않으면 로그인 화면 표시 */
  var _loadTimeout=setTimeout(function(){if(S.loading){set({loading:false,user:null});}},5000);
  sb.auth.getSession().then(function(r){
    clearTimeout(_loadTimeout);
    var session=r.data.session;
    if(!session)return set({loading:false,user:null});
    sb.from('users').select('*').eq('id',session.user.id).single().then(function(r){
      if(r.error||!r.data){
        // User exists in auth but not users table - create entry
        var meta=session.user.user_metadata||{};
        if(meta.role && meta.role !== 'buyer' && meta.role !== 'admin'){
          sb.auth.signOut();
          window.location.href='/app';return;
        }
        sb.from('users').insert({id:session.user.id,email:session.user.email,role:'buyer',company_name:meta.company_name||'',display_name:meta.display_name||''}).then(function(ur){
          S.user=ur.data&&ur.data[0]?ur.data[0]:{id:session.user.id,email:session.user.email,role:'buyer'};
          S.loading=false;
          loadAllData();
        });
        return;
      }
      if(r.data.role!=='buyer'&&r.data.role!=='admin'){window.location.href='/app';return;}
      S.user=r.data;S.loading=false;
      loadAllData();
    }).catch(function(){set({loading:false,user:null});});
  }).catch(function(){set({loading:false,user:null});});
}

function importLandingSavedProducts(){
  if(!S.user)return;
  try{
    var saved=JSON.parse(localStorage.getItem('whistle_saved_products')||'[]');
    if(!saved.length)return;
    saved.forEach(function(p){
      sb.from('buyer_saved_products').insert({
        user_id:S.user.id,
        source:'naver',
        naver_product_data:{title:p.title,lprice:p.lprice,image:p.image,link:p.link,maker:p.maker,brand:p.brand,mallName:p.mallName,category:p.category,origin:p.origin},
        note:'Landing page inquiry'
      }).then(function(r){
        if(r.error&&r.error.message&&r.error.message.includes('duplicate'))return;
        if(!r.error)console.log('[import] 랜딩 관심제품 저장:', p.title);
      });
    });
    localStorage.removeItem('whistle_saved_products');
  }catch(e){console.log('[import] 에러:', e.message);}
}

function loadBuyerLinks(){
  if(!S.user)return;
  var safeEmail=(S.user.email||'').replace(/[%_(),.*\\'"]/g,'');
  sb.from('buyers').select('*').or('buyer_user_id.eq.'+S.user.id+(safeEmail?',email.ilike.'+safeEmail:'')).limit(200).then(function(r){
    S.buyerLinks=r.data||[];
    // Auto-link buyer_user_id if not set
    S.buyerLinks.forEach(function(b){
      if(!b.buyer_user_id){sb.from('buyers').update({buyer_user_id:S.user.id}).eq('id',b.id).then(function(){});}
    });
    if(S.buyerLinks.length){
      loadConversations();
      loadOrders(); // loadShipments() chained inside after orders load
      loadSharedDocs();
      loadSellerInfo();
      loadMatchings();
      loadSamples();
    }
    render();
  });
}

function getBuyerIds(){return S.buyerLinks.map(function(b){return b.id;});}

function loadSellerInfo(){
  var sellerIds=[];
  S.buyerLinks.forEach(function(b){if(b.registered_by&&sellerIds.indexOf(b.registered_by)<0)sellerIds.push(b.registered_by);});
  if(!sellerIds.length)return;
  sb.from('companies').select('user_id,name_en,name_ko,logo_url').in('user_id',sellerIds).then(function(r){
    (r.data||[]).forEach(function(c){S.sellerInfo[c.user_id]=c;});
    sb.from('users').select('id,email,display_name,company_name').in('id',sellerIds).then(function(r2){
      (r2.data||[]).forEach(function(u){if(!S.sellerInfo[u.id])S.sellerInfo[u.id]={user_id:u.id,name_en:u.company_name||u.display_name,name_ko:u.company_name};});
      render();
    });
  });
}

function loadInquiries(){
  if(!S.user)return;

function loadSavedProducts(){

      h+='</div></div>';

function buildActivityFeed(){
  var feed=[];
  S.inquiries.slice(0,5).forEach(function(inq){
    feed.push({icon:'&#x1F4CB;',title:'Inquiry: '+esc(inq.product_query||'Inquiry'),desc:'Status: '+(inq.status||'pending').replace('_',' '),time:inq.created_at});
  });
  S.deals.slice(0,5).forEach(function(d){
    feed.push({icon:'&#x1F680;',title:'Deal: '+esc(d.title||'Deal'),desc:'Stage: '+(d.stage||'inquiry'),time:d.created_at});
  });
  S.orders.slice(0,5).forEach(function(o){
    feed.push({icon:'&#x1F4E6;',title:'Order #'+(o.order_number||o.id).toString().substring(0,8),desc:'Status: '+(o.status||'pending'),time:o.created_at});
  });
  S.savedProducts.slice(0,3).forEach(function(sp){
    var pName=sp.source==='naver'&&sp.naver_product_data?stripHtml(sp.naver_product_data.title||''):(sp.product_name||'Product');
    feed.push({icon:'&#x1F4BE;',title:'Saved: '+esc(pName).substring(0,50),desc:sp.source==='whistle'?'Whistle Verified':'Korea Market',time:sp.created_at});
  });
  S.notifications.slice(0,3).forEach(function(n){
    feed.push({icon:'&#x1F514;',title:esc(n.title||'Notification'),desc:esc((n.body||'').substring(0,60)),time:n.created_at});
  });
  feed.sort(function(a,b){return new Date(b.time)-new Date(a.time);});
  return feed;
}

function mergeResults(){
  var all=[];
  S.whistleResults.forEach(function(p){all.push({source:'whistle',data:p});});
  S.naverResults.forEach(function(p){all.push({source:'naver',data:p});});
  return all;
}

function renderWhistleProducts(products){
  if(!products.length)return '<div style="text-align:center;padding:30px;color:var(--w40);font-size:13px">Loading products...</div>';
  var h='<div class="product-grid">';
  products.forEach(function(p,i){h+=renderProductCard('whistle',p,i);});
  h+='</div>';
  return h;
}

function renderProductCard(source,p,idx){
  var h='<div class="product-card" style="cursor:pointer" onclick="B.openProductDetail(\''+source+'\','+idx+')">';
  // Image
  if(source==='whistle'){
    var img=(p.images&&p.images[0])||p.image_url||p.thumbnail_url||'';
    h+=img?'<img class="product-img" loading="lazy" src="'+esc(img)+'" onerror="this.onerror=null;this.parentNode.innerHTML=\'<div class=product-img-placeholder>&#x1F4E6;</div>\'">':'<div class="product-img-placeholder">&#x1F4E6;</div>';
  } else {
    h+=p.image?'<img class="product-img" loading="lazy" src="'+esc(p.image)+'" onerror="this.style.display=\'none\'">':'<div class="product-img-placeholder">&#x1F6CD;</div>';
  }
  // Source badge
  if(source==='whistle'){
    h+='<div style="margin-bottom:8px"><span class="badge badge-pri">&#x1F3C5; Whistle Verified</span></div>';

    h+='<div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap"><span class="badge badge-acc">&#x1F1F0;&#x1F1F7; Korea Market</span>';

    h+='</div>';
  }
  // Name
  if(source==='whistle'){
    h+='<div style="font-weight:700;font-size:14px;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc(p.name_en||p.name_ko||'Product')+'</div>';
    h+='<div style="font-size:11px;color:var(--w40);margin-bottom:8px">'+esc(p.category||'')+(p.hs_code?' | HS '+esc(p.hs_code):'')+'</div>';
  } else {
    h+='<div style="font-weight:700;font-size:14px;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc(stripHtml(p.title)||'Product')+'</div>';
    h+='<div style="font-size:11px;color:var(--w40);margin-bottom:8px">'+esc(p.category1||'')+(p.category2?' > '+esc(p.category2):'')+(p.mallName?' | '+esc(p.mallName):'')+'</div>';

  if(source==='whistle'){
    h+='<div style="margin-bottom:8px">'+(p.fob_price?'<span style="font-weight:800;color:var(--acc)">'+fxFormat(p.fob_price)+'</span><span style="font-size:10px;color:var(--w40)"> FOB/unit</span>':'<span style="font-size:12px;color:var(--w40)">Price on request</span>');

  } else {
    var priceKRW=parseInt(p.lprice)||0;

    p.certifications.slice(0,3).forEach(function(c){h+='<span class="badge badge-ok">'+esc(c.name||c)+'</span>';});

/* === SEARCH === */
function doSearch(){
  var q=document.getElementById('searchInput');
  if(!q)return;
  var query=q.value.trim();
  if(!query){
    // Reset search: clear query, reload default products
    S.searchQuery='';S.searchResults=[];S.naverResults=[];S.whistleResults=[];S.searching=false;
    S._searchFilters={};
    render();
    loadWhistleProducts('');
    return;
  }
  // Check search credits (server-side)
  if(!checkSearchCredits())return;
  S.searchQuery=query;S.searching=true;S._showSearchHints=false;
  // Save to recent searches
  try{var rs=JSON.parse(localStorage.getItem('whistle_recent_searches')||'[]');rs=rs.filter(function(q){return q!==query;});rs.unshift(query);if(rs.length>10)rs=rs.slice(0,10);localStorage.setItem('whistle_recent_searches',JSON.stringify(rs));}catch(e){}
  render();
  // Search both sources in parallel — credits deducted AFTER results return
  var done=0,total=2,gotResults=false;
  function checkDone(){
    done++;
    if(done>=total){
      S.searching=false;
      // Only deduct credit if at least one source returned results
      if((S.whistleResults.length||S.naverResults.length)&&S.user){
        gotResults=true;
        var cat=S.searchSource||'all';
        sb.from('search_logs').insert({user_id:S.user.id,query:query,category:cat,ip_country:S.user.country||'unknown',results_count:S.whistleResults.length+S.naverResults.length,session_id:S._sessionId||''}).then(function(){
          S.searchCreditsUsed=(S.searchCreditsUsed||0)+1;
        });
      }
      render();
    }
  }
  loadWhistleProducts(query,checkDone);
  loadNaverProducts(query,checkDone);
}

function quickSearch(kw){
  S.searchQuery=kw;
  render();
  setTimeout(function(){
    var inp=document.getElementById('searchInput');
    if(inp)inp.value=kw;
    doSearch();
  },50);
}

function toggleCompare(source,id,idx){
  if(!S._compareList)S._compareList=[];
  if(!S._compareItems)S._compareItems=[];
  var i=S._compareList.indexOf(id);
  if(i>-1){S._compareList.splice(i,1);S._compareItems.splice(i,1);}
  else{
    if(S._compareList.length>=4){toast('Max 4 products to compare','warn');return;}
    S._compareList.push(id);
    var products=applySearchFilters(mergeResults());
    if(!products.length)products=S.whistleResults.map(function(p){return{source:'whistle',data:p};});
    var item=products[idx];
    if(item)S._compareItems.push(item);
  }
  render();
}

function setFilter(key,val){
  if(!S._searchFilters)S._searchFilters={};
  S._searchFilters[key]=val;render();

function applySearchFilters(products){
  var f=S._searchFilters||{};
  if(f.category){
    products=products.filter(function(item){
      if(item.source==='whistle')return (item.data.category||'').toLowerCase().indexOf(f.category.toLowerCase())!==-1;
      return (item.data.category1||'').toLowerCase().indexOf(f.category.toLowerCase())!==-1||(item.data.category2||'').toLowerCase().indexOf(f.category.toLowerCase())!==-1;
    });
  }
  if(f.maxPrice){
    var mp=parseFloat(f.maxPrice);
    products=products.filter(function(item){
      if(item.source==='whistle')return item.data.fob_price&&parseFloat(item.data.fob_price)<=mp;
      var krwPrice=parseInt(item.data.lprice||0);
      return !krwPrice||krwPrice/1400<=mp;
    });
  }
  if(f.moq){
    var mm=parseInt(f.moq);
    products=products.filter(function(item){
      if(item.source==='whistle')return !item.data.moq||item.data.moq<=mm;
      return true;
    });
  }
  if(f.moqMin){
    var mn=parseInt(f.moqMin);
    products=products.filter(function(item){
      if(item.source==='whistle')return item.data.moq&&item.data.moq>=mn;
      return true;
    });
  }
  if(f.originVerified){
    products=products.filter(function(item){
      if(item.source==='whistle')return true; // Whistle products are Korea-verified
      return item.data.origin==='verified'||item.data.origin==='likely_korean';
    });
  }
  var sort=f.sort||'relevance';
  if(sort==='price_asc'){
    products.sort(function(a,b){
      var pa=a.source==='whistle'?parseFloat(a.data.fob_price||9999):parseInt(a.data.lprice||9999999)/1400;
      var pb=b.source==='whistle'?parseFloat(b.data.fob_price||9999):parseInt(b.data.lprice||9999999)/1400;
      return pa-pb;
    });
  }else if(sort==='price_desc'){
    products.sort(function(a,b){
      var pa=a.source==='whistle'?parseFloat(a.data.fob_price||0):parseInt(a.data.lprice||0)/1400;
      var pb=b.source==='whistle'?parseFloat(b.data.fob_price||0):parseInt(b.data.lprice||0)/1400;
      return pb-pa;
    });
  }else if(sort==='newest'){
    products.sort(function(a,b){
      var ta=a.source==='whistle'?(a.data.created_at||''):'';
      var tb=b.source==='whistle'?(b.data.created_at||''):'';
      return tb.localeCompare(ta);
    });
  }
  // 'relevance' = default order (whistle first, then naver)
  return products;
}

function openProductDetail(source,idx){
  var products=[];
  if(S.searchSource==='all')products=applySearchFilters(mergeResults());
  else if(S.searchSource==='whistle')products=applySearchFilters(S.whistleResults.map(function(p){return{source:'whistle',data:p};}));
  else products=applySearchFilters(S.naverResults.map(function(p){return{source:'naver',data:p};}));
  // Also check featured products (no search query)
  if(!products.length&&S.whistleResults.length){products=S.whistleResults.map(function(p){return{source:'whistle',data:p};});}
  var item=products[idx];if(!item)return;
  S._productDetailPage={source:item.source||source,data:item.data,idx:idx,allProducts:products};
  nav('product-detail');

function renderRelatedProducts(pd){
  var related=[];
  var allP=pd.allProducts||[];
  // If allProducts is empty/tiny, use whistleResults as fallback
  if(allP.length<=1&&S.whistleResults.length>0){
    allP=S.whistleResults.map(function(p){return{source:'whistle',data:p};});
  }
  var currentIdx=pd.idx;
  var currentId=pd.data?(pd.data.id||pd.data.productId||''):'';
  var src=pd.source;
  var p=pd.data;
  var cat=(src==='whistle'?(p.category||''):(p.category1||'')).toLowerCase();
  // Find products in same category, excluding current
  allP.forEach(function(item,i){
    if(i===currentIdx)return;
    // Also skip if same product ID
    var itemId=item.data?(item.data.id||item.data.productId||''):'';
    if(currentId&&itemId===currentId)return;
    var itemCat=(item.source==='whistle'?(item.data.category||''):(item.data.category1||'')).toLowerCase();
    if(cat&&itemCat.indexOf(cat)!==-1)related.push({item:item,idx:i});
  });
  // If not enough, add others
  if(related.length<4){
    allP.forEach(function(item,i){
      if(i===currentIdx)return;
      var itemId=item.data?(item.data.id||item.data.productId||''):'';
      if(currentId&&itemId===currentId)return;
      if(related.some(function(r){return r.idx===i;}))return;
      if(related.length<6)related.push({item:item,idx:i});
    });
  }
  if(!related.length)return '';
  var h='<div style="margin-top:32px;border-top:1px solid var(--bd);padding-top:24px">';
  h+='<h3 style="font-size:16px;font-weight:700;margin-bottom:16px">Related Products</h3>';
  h+='<div class="product-grid" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr))">';
  related.slice(0,4).forEach(function(r){
    h+=renderProductCard(r.item.source,r.item.data,r.idx);
  });
  h+='</div></div>';
  return h;
}

function loadWhistleProducts(query,cb){
  var q=sb.from('products').select('*,seller:users!products_user_id_fkey(company_name,display_name)').eq('is_public',true).eq('status','active');
  if(query){var sq=query.replace(/[%_(),.*\\]/g,'');if(sq)q=q.or('name_en.ilike.%'+sq+'%,name_ko.ilike.%'+sq+'%,category.ilike.%'+sq+'%,description_en.ilike.%'+sq+'%');}
  q.order('created_at',{ascending:false}).limit(40).then(function(r){
    var data=r.data||[];
    // Flatten seller info into product for easy access
    data.forEach(function(p){
      if(p.seller){
        if(!p.company_name)p.company_name=p.seller.company_name||p.seller.display_name||'';
        if(!p.manufacturer)p.manufacturer=p.seller.company_name||p.seller.display_name||'';
      }
    });
    S.whistleResults=data;
    if(cb)cb();else render();
  }).catch(function(){
    // Fallback: load without join if the FK doesn't exist
    var q2=sb.from('products').select('*').eq('is_public',true).eq('status','active');
    if(query){var sq=query.replace(/[%_(),.*\\]/g,'');if(sq)q2=q2.or('name_en.ilike.%'+sq+'%,name_ko.ilike.%'+sq+'%,category.ilike.%'+sq+'%,description_en.ilike.%'+sq+'%');}
    q2.order('created_at',{ascending:false}).limit(40).then(function(r){
      S.whistleResults=r.data||[];
      if(cb)cb();else render();
    });
  });
}

function loadNaverProducts(query,cb){
  _relayReady.then(function(){
    if(!RELAY_URL){
      S.naverResults=[];S._naverUnavailable=true;if(cb)cb();else render();
      return;
    }
    fetch(RELAY_URL+'/api/naver/search?q='+encodeURIComponent(query)+'&display=40',{headers:{'ngrok-skip-browser-warning':'1'}}).then(function(r){return r.json();}).then(function(data){
      if(data.ok&&data.items){S.naverResults=data.items;}
      else{S.naverResults=[];}
      if(cb)cb();else render();
    }).catch(function(){S.naverResults=[];if(cb)cb();else render();});
  });
}

/* === TOTAL COST ESTIMATOR === */
function _getShippingRegion(country){
  if(!country)return 'others';
  var c=(country||'').toUpperCase().trim();
  var asia=['VN','TH','MY','SG','PH','ID','JP','CN','TW','HK','IN','BD','KH','MM','LA','BN','MN','PK','LK','NP'];
  var americas=['US','CA','MX','BR','AR','CL','CO','PE','EC','UY','PA','CR','GT','DO','HN','SV','NI','BO','PY','VE','JM','TT','CU','HT','PR'];
  var europe=['GB','UK','DE','FR','IT','ES','NL','BE','SE','NO','DK','FI','AT','CH','IE','PT','PL','CZ','RO','HU','GR','BG','HR','SK','SI','EE','LV','LT'];
  if(asia.indexOf(c)>-1)return 'asia';
  if(americas.indexOf(c)>-1)return 'americas';
  if(europe.indexOf(c)>-1)return 'europe';
  return 'others';
}
function _shippingRate(region){
  var rates={asia:3,americas:5,europe:4,others:5};
  return rates[region]||5;
}
function renderCostEstimator(product,source){
  if(!product||source!=='whistle'||!product.fob_price)return '';
  var fobPrice=parseFloat(product.fob_price);
  if(!fobPrice||isNaN(fobPrice))return '';
  var moq=product.moq||100;
  var uc=S.user&&S.user.country?S.user.country.toUpperCase():'US';
  var destOpts=[{v:'VN',l:'Vietnam'},{v:'US',l:'United States'},{v:'JP',l:'Japan'},{v:'DE',l:'Germany'},{v:'GB',l:'United Kingdom'},{v:'SG',l:'Singapore'},{v:'TH',l:'Thailand'},{v:'MY',l:'Malaysia'},{v:'ID',l:'Indonesia'},{v:'PH',l:'Philippines'},{v:'BR',l:'Brazil'},{v:'MX',l:'Mexico'},{v:'CA',l:'Canada'},{v:'FR',l:'France'},{v:'AU',l:'Australia'},{v:'OTHER',l:'Other'}];
  var h='<div id="cost-estimator" style="margin-top:16px;padding:16px;background:var(--w08);border-radius:var(--r-s);border:1px solid var(--bd)">';
  h+='<div style="font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px">&#x1F4B0; Total Cost Estimator</div>';
  h+='<div class="grid-2" style="gap:10px;margin-bottom:12px">';
  h+='<div class="form-group" style="margin-bottom:0"><label class="form-label">Quantity (units)</label><input class="form-input" type="number" id="ce-qty" value="'+moq+'" min="1" oninput="B._updateCostEstimate()" style="font-size:13px"></div>';
  h+='<div class="form-group" style="margin-bottom:0"><label class="form-label">Destination</label><select class="form-select" id="ce-dest" onchange="B._updateCostEstimate()" style="font-size:13px">';
  destOpts.forEach(function(o){h+='<option value="'+o.v+'"'+(uc===o.v?' selected':'')+'>'+o.l+'</option>';});
  h+='</select></div></div>';
  h+='<div id="ce-result" style="font-size:12px;color:var(--w60)"></div>';
  h+='<div style="font-size:10px;color:var(--w20);margin-top:8px;font-style:italic">Estimates only. Actual shipping and customs duty may vary by carrier, weight, and local regulations.</div>';
  h+='</div>';
  return h;
}
function _updateCostEstimate(){
  var el=document.getElementById('ce-result');
  if(!el)return;
  var pd=S._productDetailPage;
  if(!pd||!pd.data||!pd.data.fob_price)return;
  var fob=parseFloat(pd.data.fob_price);
  var qty=parseInt((document.getElementById('ce-qty')||{}).value)||1;
  var dest=(document.getElementById('ce-dest')||{}).value||'OTHER';
  var region=_getShippingRegion(dest);
  var rate=_shippingRate(region);
  var estWeight=0.5; // avg 0.5kg per unit estimate
  var fobTotal=fob*qty;
  var shippingTotal=rate*estWeight*qty;
  var dutyLow=fobTotal*0.05;
  var dutyHigh=fobTotal*0.15;
  var totalLow=fobTotal+shippingTotal+dutyLow;
  var totalHigh=fobTotal+shippingTotal+dutyHigh;
  var regionLabel={asia:'Asia',americas:'Americas',europe:'Europe',others:'Other regions'}[region]||'Other';
  var h='<div style="padding:12px;background:var(--card);border-radius:var(--r-xs);border:1px solid var(--bd)">';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--w40)">FOB ('+fxFormat(fob)+' x '+qty.toLocaleString()+')</span><span style="font-weight:600">'+fxFormat(fobTotal)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--w40)">Est. Shipping ('+regionLabel+' ~$'+rate+'/kg)</span><span style="font-weight:600">~'+fxFormat(shippingTotal)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--w40)">Est. Customs Duty (5-15%)</span><span style="font-weight:600">'+fxFormat(dutyLow)+' ~ '+fxFormat(dutyHigh)+'</span></div>';
  h+='<div style="border-top:1px solid var(--bd);padding-top:8px;display:flex;justify-content:space-between"><span style="font-weight:700;color:var(--pri)">Estimated Total</span><span style="font-weight:800;font-size:15px;color:var(--acc)">'+fxFormat(totalLow)+' ~ '+fxFormat(totalHigh)+'</span></div>';
  h+='</div>';
  el.innerHTML=h;
}

/* === MOQ/BUDGET GUIDANCE === */
function _checkMoqBudget(){
  var guideEl=document.getElementById('moq-budget-guide');
  if(!guideEl)return;
  var d=S.modalData||{};
  var p=d.product;
  if(!p)return;
  var fobPrice=d.source==='whistle'?parseFloat(p.fob_price||0):0;
  var moq=p.moq||0;
  var qtyEl=document.querySelector('input[name="quantity"]');
  var budgetEl=document.querySelector('input[name="buyer_budget"]');
  var qty=parseInt((qtyEl||{}).value)||0;
  var budget=parseFloat((budgetEl||{}).value)||0;
  var h='';
  // Budget-based guidance
  if(budget>0&&fobPrice>0){
    var affordableUnits=Math.floor(budget/fobPrice);
    if(affordableUnits<1){
      h+='<div style="padding:8px 12px;border-radius:var(--r-xs);background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.15);font-size:12px;color:var(--err);margin-bottom:8px">';
      h+='Your budget of $'+budget.toLocaleString()+' is below the unit price of '+fxFormat(fobPrice)+'. Consider a <a href="#" onclick="event.preventDefault();B.set({inquiryType:\'sample_order\'})" style="color:var(--pri);font-weight:600">Sample Order</a> instead.</div>';
    } else if(moq>0&&affordableUnits<moq){
      h+='<div style="padding:8px 12px;border-radius:var(--r-xs);background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.15);font-size:12px;color:var(--acc);margin-bottom:8px">';
      h+='Your budget of $'+budget.toLocaleString()+' covers ~<strong>'+affordableUnits.toLocaleString()+'</strong> units at '+fxFormat(fobPrice)+'/unit. This is below the MOQ of <strong>'+moq.toLocaleString()+'</strong>. ';
      h+='Consider a <a href="#" onclick="event.preventDefault();B.set({inquiryType:\'sample_order\'})" style="color:var(--pri);font-weight:600">Sample Order</a> (10-50 units) first.</div>';
    } else {
      h+='<div style="padding:8px 12px;border-radius:var(--r-xs);background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.15);font-size:12px;color:var(--ok);margin-bottom:8px">';
      h+='Your budget of $'+budget.toLocaleString()+' covers ~<strong>'+affordableUnits.toLocaleString()+'</strong> units at '+fxFormat(fobPrice)+'/unit.'+(moq>0?' (MOQ: '+moq.toLocaleString()+')':'')+'</div>';
    }
  }
  // Quantity vs MOQ guidance
  if(qty>0&&moq>0&&qty<moq&&!budget){
    h+='<div style="padding:8px 12px;border-radius:var(--r-xs);background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.15);font-size:12px;color:var(--acc);margin-bottom:8px">';
    h+='Your quantity of '+qty.toLocaleString()+' is below the MOQ of <strong>'+moq.toLocaleString()+'</strong>. Consider a <a href="#" onclick="event.preventDefault();B.set({inquiryType:\'sample_order\'})" style="color:var(--pri);font-weight:600">Sample Order</a> to test before bulk purchase.</div>';
  }
  guideEl.innerHTML=h;
}

function submitInquiry(f){
  if(S._submitting)return;S._submitting=true;
  var d=S.modalData||{};
  var p=d.product;
  var fd=new FormData(f);
  var data={};fd.forEach(function(v,k){data[k]=v;});

  var trackingId='WH-INQ-'+Date.now();
  var req={
    buyer_id:S.user.id,
    inquiry_type:data.inquiry_type||'import',
    destination_country:data.destination||S.user.country||'',
    target_moq:parseInt(data.quantity)||null,
    target_price:data.target_price||data.budget||data.buyer_budget||null,
    status:'pending',
    tracking_id:trackingId
  };

  // Build message
  var msg='';
  if(data.inquiry_type==='sample_order')msg+='[SAMPLE ORDER]\n';
  if(data.buyer_budget)msg+='Budget: $'+data.buyer_budget+'\n';
  if(data.purpose)msg+='Purpose: '+data.purpose+'\n';
  if(data.specs)msg+='Specs: '+data.specs+'\n';
  if(data.requirements)msg+='Requirements: '+data.requirements+'\n';
  if(data.timeline)msg+='Timeline: '+data.timeline+'\n';
  if(data.message)msg+=(msg?'\n':'')+data.message;
  req.message=msg;

  // Product info
  if(d.source==='whistle'&&p){
    req.product_id=p.id;
    req.product_query=(p.name_en||p.name_ko||'')+(p.category?' ('+p.category+')':'');
  } else if(d.source==='naver'&&p){
    req.naver_product_data=p;
    req.product_query=p.title||'Naver product';
  } else {
    req.product_query=data.requirements||'Custom sourcing request';
  }

  sb.from('contact_requests').insert(req).then(function(r){
    S._submitting=false;
    if(r.error){toast('Failed to submit: '+r.error.message,'err');return;}
    // Also notify via relay server (only if RELAY is available)
    if(RELAY_URL)fetch(RELAY_URL+'/api/naver/contact-request',{method:'POST',headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},body:JSON.stringify({
      buyer_name:S.user.display_name,buyer_email:S.user.email,buyer_company:S.user.company_name,
      inquiry_type:data.inquiry_type,product_name:req.product_query,message:msg,
      destination_country:req.destination_country,target_moq:req.target_moq,target_price:req.target_price
    })}).catch(function(){});
    S.modal='inquiryConfirm';S.modalData={trackingId:trackingId,product:req.product_query,type:data.inquiry_type};
    render();
    loadInquiries();
  }).catch(function(e){S._submitting=false;console.error('[submitInquiry]',e);toast('Network error. Please try again.','err');});
}

/* === SAVE PRODUCT === */
function saveProduct(source,id){
  if(!S.user){toast('Please sign in','err');return;}
  var rec={user_id:S.user.id,source:source};
  if(source==='whistle'){
    rec.product_id=id;
    var wp=S.whistleResults.find(function(x){return x.id===id;});
    if(wp){rec.product_name=wp.name_en||wp.name_ko||'';rec.image_url=(wp.images&&wp.images[0])||wp.image_url||'';}
  } else {
    var p=S.naverResults.find(function(x){return(x.productId||'')==id;});
    rec.naver_product_data=p||{productId:id};
  }
  sb.from('buyer_saved_products').insert(rec).then(function(r){
    if(r.error){
      if(r.error.message&&r.error.message.includes('duplicate'))toast('Already saved','warn');
      else toast('Failed to save','err');
      return;
    }
    toast('Product saved!','ok');
    loadSavedProducts();
  });
}

function inquireAllSaved(){
  var names=S.savedProducts.slice(0,5).map(function(sp){
    if(sp.source==='naver'&&sp.naver_product_data)return stripHtml(sp.naver_product_data.title||'').substring(0,40);
    return(sp.product_name||'Product').substring(0,40);
  }).join(', ');
  S.modal='inquiry';S.modalData={source:'custom',product:null,id:null};S.inquiryType='custom_sourcing';
  render();
  setTimeout(function(){var ta=document.querySelector('[name="requirements"]');if(ta)ta.value='I am interested in the following saved products: '+names;},100);
}
function unsaveProduct(saveId){
  sb.from('buyer_saved_products').delete().eq('id',saveId).then(function(r){

    toast('Removed from saved','ok');

}

function submitRequest(){
  var form=document.getElementById('mkt-form');
  if(!form)return;
  var fd=new FormData(form);
  var title=fd.get('title');var desc=fd.get('description');
  if(!title||!desc){toast('Title and description are required','warn');return;}
  var req={
    buyer_user_id:S.user.id,
    buyer_company:S.user.company_name||S.user.display_name||S.user.email,
    buyer_country:S.user.country||'',
    buyer_display_name:S.user.display_name||'',
    title:title,
    category:fd.get('category')||null,
    description:desc,
    target_quantity:fd.get('target_quantity')||null,
    target_price_range:fd.get('target_price_range')||null,
    target_market:fd.get('target_market')||null,
    product_type:fd.get('product_type')||null,
    deadline:fd.get('deadline')||null,
    is_urgent:!!(form.querySelector('[name=is_urgent]')&&form.querySelector('[name=is_urgent]').checked),
    status:'open'
  };
  sb.from('buyer_requests').insert(req).then(function(r){
    if(r.error){toast('Failed: '+r.error.message,'err');return;}
    toast('Request posted!','ok');
    S.modal=null;
    loadMyRequests();
    if(RELAY_URL)fetch(RELAY_URL+'/api/whistle/marketplace-notify',{method:'POST',headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
      body:JSON.stringify({type:'new_request',title:title,category:fd.get('category'),buyer:S.user.company_name,country:S.user.country})
    }).catch(function(){});
  });
}

function acceptProposal(propId,reqId){
  if(!confirm('Accept this proposal?\n\nThis will create a sourcing deal and open communication with the manufacturer.'))return;
  var request=S.myRequests.find(function(r){return r.id===reqId;});
  var proposals=S.requestProposals[reqId]||[];
  var prop=proposals.find(function(p){return p.id===propId;});
  if(!prop||!request)return;
  // 1. Create buyer record
  sb.from('buyers').insert({
    registered_by:prop.seller_user_id,source:'marketplace',
    company_name:request.buyer_company,contact_name:request.buyer_display_name,
    email:S.user.email,country:request.buyer_country,
    buyer_user_id:S.user.id,
    categories:request.category?[request.category]:[],
    notes:'[Marketplace] '+request.title
  }).select().single().then(function(br){
    if(br.error){toast('Error: '+br.error.message,'err');return;}
    var newBuyer=br.data;
    // 2. Create matching
    sb.from('matchings').insert({
      user_id:prop.seller_user_id,buyer_id:newBuyer.id,
      product_id:prop.product_id||null,status:'interested',
      match_reason:'[Marketplace] '+request.title,match_score:80
    }).select().single().then(function(mr){
      if(mr.error){toast('Matching error: '+mr.error.message,'err');return;}
      // 3. Update proposal
      sb.from('buyer_request_proposals').update({status:'accepted',matching_id:mr.data.id,buyer_id:newBuyer.id,updated_at:new Date().toISOString()}).eq('id',propId).then(function(){});
      // 4. Reject others
      sb.from('buyer_request_proposals').update({status:'rejected',updated_at:new Date().toISOString()}).eq('request_id',reqId).neq('id',propId).then(function(){});
      // 5. Close request
      sb.from('buyer_requests').update({status:'completed',accepted_proposal_id:propId,updated_at:new Date().toISOString()}).eq('id',reqId).then(function(){});
      // 6. Send initial chat message to start conversation
      sb.from('messages').insert({
        buyer_id:newBuyer.id,user_id:prop.seller_user_id,sender_type:'buyer',
        body:'[Marketplace Deal Started] '+request.buyer_company+' accepted your proposal for: '+request.title+'\n\nProposal details: '+(prop.message||'').substring(0,200),
        message_type:'system',channel:'platform',direction:'inbound'
      }).then(function(){}).catch(function(e){console.error('[acceptProposal] msg:',e);});
      // 7. Create buyer notification
      sb.from('notifications').insert({user_id:S.user.id,title:'Deal Created',body:'Your deal with '+(prop.seller_company||'seller')+' for "'+request.title+'" is now active.',link_page:'deals',link_id:mr.data.id,is_read:false}).then(function(){}).catch(function(){});
      // 8. Notify seller
      if(RELAY_URL)fetch(RELAY_URL+'/api/whistle/notify',{method:'POST',headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
        body:JSON.stringify({userId:prop.seller_user_id,type:'marketplace',title:'Proposal accepted: '+request.title,body:request.buyer_company+' accepted your proposal. Start the deal!',linkPage:'buyers',telegram:true})
      }).catch(function(){});
      toast('Proposal accepted! Deal created — you can now chat with the seller.','ok');
      loadMyRequests();loadBuyerLinks();loadMatchings();loadNotifications();
    }).catch(function(e){console.error('[acceptProposal] matching:',e);toast('Error creating deal','err');});
  }).catch(function(e){console.error('[acceptProposal] buyer:',e);toast('Error creating buyer record','err');});
}

function rejectProposal(propId,reqId){
  if(!confirm('Reject this proposal?\n\nThe seller will be notified. You can still accept other proposals.'))return;
  sb.from('buyer_request_proposals').update({status:'rejected',updated_at:new Date().toISOString()}).eq('id',propId).then(function(r){
    if(r.error){toast('Error','err');return;}
    toast('Proposal rejected','ok');
    loadRequestProposals(reqId);
  });
}

function closeRequest(reqId){
  if(!confirm('Close this request? No more proposals will be received.'))return;
  sb.from('buyer_requests').update({status:'closed',updated_at:new Date().toISOString()}).eq('id',reqId).then(function(r){
    if(r.error){toast('Error','err');return;}
    toast('Request closed','ok');
    S._viewRequest=null;loadMyRequests();
  });
}

  {id:'quotation',label:'Quote',icon:'&#x1F4B0;'},

  {id:'shipping',label:'Shipping',icon:'&#x1F6A2;'},
  {id:'completed',label:'Done',icon:'&#x1F389;'}
];

function loadMatchings(){
  var bids=getBuyerIds();if(!bids.length)return;
  sb.from('matchings').select('*').in('buyer_id',bids).order('created_at',{ascending:false}).limit(200).then(function(r){
    S.matchings=r.data||[];buildDeals();
  });
}
function loadSamples(){
  var bids=getBuyerIds();if(!bids.length)return;
  sb.from('samples').select('*').in('buyer_id',bids).order('created_at',{ascending:false}).limit(200).then(function(r){
    S.samples=r.data||[];buildDeals();
  });
}

function computeStage(deal){
  if(deal.shipment){
    if(deal.shipment.status==='delivered')return 'completed';
    if(deal.shipment.status==='customs_clearance')return 'shipping';
    return 'shipping';
  }
  if(deal.order){
    if(deal.order.status==='production'||deal.order.status==='inspection')return 'production';
    return 'order';
  }
  if(deal.matching){
    var ms=deal.matching.status;
    if(ms==='negotiation'||ms==='contract')return 'negotiation';
    if(ms==='sample')return 'sample';
    if(ms==='completed')return 'completed';
    if((deal.documents||[]).length)return 'quotation';
    return 'matched';
  }
  return 'inquiry';
}

function buildDeals(){
  var deals=[];
  // Matchings → primary deals
  S.matchings.forEach(function(m){
    var d={id:m.id,type:'matching',matching:m,sellerId:m.user_id,buyerLinkId:m.buyer_id,
      inquiry:null,order:null,shipment:null,documents:[],dealSamples:[],
      title:m.match_reason||'Deal',created_at:m.created_at};
    d.order=S.orders.find(function(o){return o.buyer_id===m.buyer_id&&o.user_id===m.user_id;});
    if(d.order)d.shipment=S.shipments.find(function(s){return s.order_id===d.order.id;});
    d.documents=S.sharedDocs.filter(function(doc){return doc.buyer_id===m.buyer_id&&doc.user_id===m.user_id;});
    d.dealSamples=S.samples.filter(function(s){return s.buyer_id===m.buyer_id&&s.user_id===m.user_id;});
    d.stage=computeStage(d);
    deals.push(d);
  });
  // Unmatched inquiries
  S.inquiries.forEach(function(inq){
    var hasMatch=deals.some(function(d){return d.matching&&d.inquiry&&d.inquiry.id===inq.id;});
    if(!hasMatch){
      deals.push({id:'inq_'+inq.id,type:'inquiry',matching:null,sellerId:null,buyerLinkId:null,
        inquiry:inq,order:null,shipment:null,documents:[],dealSamples:[],
        title:inq.product_query||inq.inquiry_type||'Inquiry',stage:'inquiry',created_at:inq.created_at});
    }
  });
  S.deals=deals.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
  render();
}

function openDeal(dealId){
  var deal=S.deals.find(function(d){return d.id===dealId;});
  if(!deal)return;
  S.currentDeal=deal;S.dealMessages=[];S.dealChatOpen=true;S._dealLoading=true;
  render();
  // Load chat if matched
  if(deal.sellerId&&deal.buyerLinkId){
    sb.from('messages').select('*').eq('buyer_id',deal.buyerLinkId).eq('user_id',deal.sellerId).order('created_at',{ascending:true}).limit(100).then(function(r){
      S.dealMessages=r.data||[];S._dealLoading=false;render();
      setTimeout(function(){var el=document.getElementById('dealChatMsgs');if(el)el.scrollTop=el.scrollHeight;},100);
      // Mark unread
      var unread=(r.data||[]).filter(function(m){return m.sender_type!=='buyer'&&!m.read_at;});
      if(unread.length){sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).in('id',unread.map(function(m){return m.id;})).then(function(){loadConversations();});}
    });
    initDealChatRealtime(deal.buyerLinkId,deal.sellerId);
  }
  // Load milestones if order exists
  if(deal.order){
    sb.from('payment_milestones').select('*').eq('order_id',deal.order.id).order('created_at',{ascending:true}).limit(50).then(function(r){
      S.orderMilestones=r.data||[];render();
    });
  }
}

function closeDeal(){
  S.currentDeal=null;S.dealMessages=[];
  if(S._dealChatCh){sb.removeChannel(S._dealChatCh);S._dealChatCh=null;}
  render();
}

function initDealChatRealtime(buyerLinkId,sellerId){
  if(S._dealChatCh){sb.removeChannel(S._dealChatCh);S._dealChatCh=null;}
  S._dealChatCh=sb.channel('deal-chat-'+buyerLinkId+'-'+sellerId).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'buyer_id=eq.'+buyerLinkId},function(payload){
    var m=payload.new;
    if(m.user_id===sellerId&&!S.dealMessages.find(function(x){return x.id===m.id;})){
      S.dealMessages.push(m);render();
      setTimeout(function(){var el=document.getElementById('dealChatMsgs');if(el)el.scrollTop=el.scrollHeight;},50);
      if(m.sender_type!=='buyer'){sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).eq('id',m.id).then(function(){});}
    }
  }).subscribe();
}

function sendQuickMsg(deal,text){

  S.dealMessages.push(Object.assign({id:'tmp_'+Date.now(),created_at:new Date().toISOString()},msg));

    render();
  });
  toast('Message sent!','ok');
}

    h+='<div style="padding:10px 14px;margin-bottom:8px;border-radius:8px;background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(139,92,246,.06));border:1px solid rgba(0,212,255,.15);display:flex;align-items:center;gap:10px">';
    h+='<div style="font-size:22px">&#x1F4B3;</div>';
    h+='<div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--pri)">Escrow Payment Required</div>';
    var _escAlertSym=({KRW:'₩',EUR:'€',CNY:'¥',JPY:'¥'})[_escAlert.currency]||'$';
    h+='<div style="font-size:10px;color:var(--w40)">'+_escAlertSym+Number(_escAlert.amount||0).toLocaleString()+' — Secure your deal</div></div>';
    h+='<button class="btn btn-acc btn-sm" style="font-size:10px;white-space:nowrap" onclick="B.openEscrowPayModal(\''+deal.id+'\')">Pay Now</button>';
    h+='</div>';
  }

  // Deal room: CHAT-CENTRIC layout
  h+='<div class="deal-room">';

  // LEFT: Chat (MAIN — takes most of the space)
  if(deal.sellerId&&deal.buyerLinkId){
    h+='<div class="deal-chat">';
    h+='<div class="deal-chat-header">';
    h+='<div><div style="font-weight:700;font-size:13px">&#x1F4AC; '+esc(getSellerName(deal.sellerId))+'</div>';
    h+='<div style="font-size:10px;color:var(--w40)">Chat, documents & deal progress</div></div>';
    h+='<div style="font-size:10px;color:var(--w40)">Typically responds within 24h</div>';
    h+='</div>';

    // Chat messages area
    h+='<div class="chat-msgs" id="dealChatMsgs">';
    if(S._dealLoading){
      h+='<div style="text-align:center;padding:40px 20px"><div style="font-size:24px;margin-bottom:8px;animation:pulse 1.5s infinite">&#x1F4AC;</div><div style="font-size:12px;color:var(--w40)">Loading messages...</div></div>';
    } else if(!S.dealMessages.length){
      h+='<div style="text-align:center;padding:40px 20px">';
      h+='<div style="font-size:36px;margin-bottom:8px">&#x1F4AC;</div>';
      h+='<div style="font-size:14px;font-weight:700;color:var(--w60);margin-bottom:4px">Start your conversation</div>';
      h+='<div style="font-size:12px;color:var(--w30);max-width:300px;margin:0 auto">Chat with your seller, exchange documents, and track deal progress — all in one place.</div>';
      h+='</div>';
    }
    var lastDate='';
    S.dealMessages.forEach(function(m){
      var d=new Date(m.created_at).toLocaleDateString();
      if(d!==lastDate){h+='<div style="text-align:center;font-size:9px;color:var(--w20);padding:8px 0">'+d+'</div>';lastDate=d;}
      var isMine=m.sender_type==='buyer';
      h+=renderChatBubble(m,isMine);
    });
    h+='</div>';

    // Chat input area with STAGE-SPECIFIC ACTION CHIPS
    h+='<div class="chat-input-area">';
    h+=renderDealActionChips(deal,stageIdx);
    h+='<div class="chat-input-row">';
    h+='<input class="form-input" id="dealChatInput" placeholder="Type a message..." style="border-radius:12px;font-size:13px;padding:10px 14px" onkeydown="if(event.key===\'Enter\')B.sendDealMessage()">';
    h+='<button class="btn btn-pri" onclick="B.sendDealMessage()" style="border-radius:12px;padding:10px 18px">Send</button>';
    h+='</div></div>';

    h+='</div>'; // end deal-chat

  } else {
    // Not matched yet — full chat area with waiting state
    h+='<div class="deal-chat" style="align-items:center;justify-content:center;text-align:center">';
    h+='<div style="padding:40px"><div style="font-size:48px;margin-bottom:12px">&#x1F91D;</div>';
    h+='<div style="font-size:16px;font-weight:700;color:var(--w70);margin-bottom:8px">Matching in progress</div>';
    h+='<div style="font-size:12px;color:var(--w30);max-width:320px;margin:0 auto">Our team is reviewing your inquiry. Once matched with the best seller, you can chat, exchange documents, and manage the entire deal here.</div>';
    h+='<div style="margin-top:16px"><div style="display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;background:rgba(255,184,0,.06);border:1px solid rgba(255,184,0,.15)"><div style="width:8px;height:8px;border-radius:4px;background:var(--acc);animation:pulse 2s infinite"></div><span style="font-size:11px;color:var(--acc)">Reviewing your inquiry</span></div></div>';

  h+='<div class="deal-content'+(S._dealSidebarHidden?' collapsed':'')+'" id="dealSidebar">';
  if(!S._dealSidebarHidden){h+=renderDealSidebar(deal,stageIdx);}
  h+='</div>';

  h+='</div>'; // end deal-room
  return h;
}

/* === DEAL ACTION CHIPS — Stage-specific quick actions above chat input === */
function renderDealActionChips(deal,stageIdx){
  var h='<div class="chat-actions">';
  var stage=deal.stage;

  switch(stage){
    case'matched':
      if(deal.matching&&deal.matching.id){
      h+='<div class="chat-action-chip" onclick="B.requestQuote(\''+deal.matching.id+'\')">&#x1F4B0; Request Quote</div>';
      }
      h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Say Hello</div>';
      break;
    case'quotation':
      var hasPI=deal.documents.some(function(d){return d.doc_type==='pi';});
      if(hasPI){
        if(deal.matching&&deal.matching.id)h+='<div class="chat-action-chip ok" onclick="B.acceptQuote(\''+deal.matching.id+'\')">&#x2705; Accept Quote</div>';
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Negotiate</div>';
      } else {
        if(deal.matching&&deal.matching.id)h+='<div class="chat-action-chip" onclick="B.requestQuote(\''+deal.matching.id+'\')">&#x1F4B0; Request Quote Again</div>';
      }
      break;
    case'sample':
      var hasPending=(deal.dealSamples||[]).some(function(s){return s.status==='requested'||s.status==='preparing';});
      var hasDelivered=(deal.dealSamples||[]).some(function(s){return s.status==='delivered';});
      if(hasDelivered){
        if(deal.matching&&deal.matching.id)h+='<div class="chat-action-chip ok" onclick="B.confirmSampleOk(\''+deal.matching.id+'\')">&#x1F44D; Approve Sample</div>';
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Request Changes</div>';
      } else if(!hasPending){
        h+='<div class="chat-action-chip accent" onclick="B.toggleSampleForm(\''+deal.id+'\')">&#x1F4E6; Request Sample</div>';
      } else {
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Check Status</div>';
      }
      break;
    case'negotiation':
      if(deal.matching&&deal.matching.id){
        var _orSent=S._orderReadySent&&S._orderReadySent[deal.matching.id];
        if(_orSent)h+='<div class="chat-action-chip" style="cursor:default;opacity:.6">&#x23F3; Waiting for seller to create order...</div>';
        else h+='<div class="chat-action-chip ok" onclick="B.confirmReadyToOrder(\''+deal.matching.id+'\')">&#x2705; Ready to Order</div>';
      }
      h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Discuss Terms</div>';
      var _escN=_getEscrowStatus(deal.id);
      if(_escN&&_escN.status==='requested')h+='<div class="chat-action-chip ok" onclick="B.openEscrowPayModal(\''+deal.id+'\')">&#x1F512; Pay via Escrow</div>';
      else if(_escN&&_escN.status!=='none')h+='<div class="chat-action-chip" style="cursor:default;opacity:.7">&#x1F512; Escrow: '+_escrowBuyerLabel(_escN.status)+'</div>';
      break;
    case'order':
      var _escO=_getEscrowStatus(deal.id);
      if(_escO&&_escO.status==='requested')h+='<div class="chat-action-chip ok" onclick="B.openEscrowPayModal(\''+deal.id+'\')">&#x1F512; Pay via Escrow</div>';
      else if(_escO&&_escO.status!=='none')h+='<div class="chat-action-chip" style="cursor:default;opacity:.7">&#x1F512; Escrow: '+_escrowBuyerLabel(_escO.status)+'</div>';
      else h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Discuss Payment</div>';
      break;
    case'production':
      h+='<div class="chat-action-chip" onclick="B.sendQuickMsg(deal,\'Could you please share a production progress update?\')">&#x1F4AC; Request Update</div>';
      h+='<div class="chat-action-chip" onclick="B.sendQuickMsg(deal,\'When is the estimated shipment date?\')">&#x1F6A2; Ask ETA</div>';
      h+='<div class="chat-action-chip" onclick="B.sendQuickMsg(deal,\'Can I arrange a factory inspection before shipment?\')">&#x1F50D; Request Inspection</div>';
      break;
    case'shipping':
      var _escS=_getEscrowStatus(deal.id);
      if(_escS&&_escS.status==='shipping'){
        h+='<div class="chat-action-chip ok" onclick="B.confirmEscrowDelivery(\''+deal.id+'\')">&#x1F4E6; Confirm Delivery &amp; Release Payment</div>';
        h+='<div class="chat-action-chip" style="color:var(--err)" onclick="B.raiseEscrowDispute(\''+deal.id+'\')">&#x26A0; Dispute</div>';
      } else if(deal.shipment&&deal.shipment.status==='delivered'){
        h+='<div class="chat-action-chip ok" onclick="B.confirmDelivery(\''+(deal.matching&&deal.matching.id||'')+'\')">&#x1F4E6; Confirm Receipt</div>';
      } else {
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; Track Shipment</div>';
      }
      break;
    case'completed':
      var _mid=deal.matching&&deal.matching.id;
      var hasReview=_mid&&S.reviews.some(function(rv){return rv.target_id===_mid;});
      if(!hasReview){h+='<div class="chat-action-chip accent" onclick="B.toggleDealSidebar()">&#x2B50; Write Review</div>';}
      break;
  }

  // Sample form inline (shown in chat area when requested)
  if(S._sampleFormOpen===deal.id){
    h+='</div>';
    h+=renderInlineSampleForm(deal);
    return h;
  }
  h+='</div>';
  return h;
}

function _getEscrowStatus(dealId){
  var cached=S._escrowCache&&S._escrowCache[dealId];if(cached)return cached;
  var k='escrow_'+dealId;try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}
}
function _setEscrow(dealId,data){
  localStorage.setItem('escrow_'+dealId,JSON.stringify(data));
  if(!S._escrowCache)S._escrowCache={};S._escrowCache[dealId]=data;
  var _escDetails={deal_id:dealId,amount:data.amount,currency:data.currency,terms:data.terms,status:data.status,requestedAt:data.requestedAt,paidAt:data.paidAt,deliveredAt:data.deliveredAt,method:data.method};
  if(S.user){
    sb.from('service_requests').upsert({user_id:S.user.id,type:'escrow_buyer_'+dealId,status:data.status,details:_escDetails},{onConflict:'user_id,type'}).catch(function(e){console.error('[escrow] buyer DB upsert fail:',e);});
    // Sync to seller's record so seller can read buyer's payment status
    var deal=S.currentDeal||S.deals.find(function(d){return d.id===dealId;});
    var _sellerUserId=deal&&deal.sellerId;
    if(_sellerUserId)sb.from('service_requests').upsert({user_id:_sellerUserId,type:'escrow_'+dealId,status:data.status,details:_escDetails},{onConflict:'user_id,type'}).catch(function(){});
  }
}
function _loadEscrowFromDB(){
  if(!S.user)return Promise.resolve();
  return sb.from('service_requests').select('*').like('type','escrow%').eq('user_id',S.user.id).limit(200).then(function(r){
    if(r.data){r.data.forEach(function(sr){if(sr.details&&sr.details.deal_id){var did=sr.details.deal_id;if(!S._escrowCache)S._escrowCache={};S._escrowCache[did]=sr.details;localStorage.setItem('escrow_'+did,JSON.stringify(sr.details));}});}
