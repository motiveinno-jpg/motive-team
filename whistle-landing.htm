    html+='<div style="padding:14px 18px;background:linear-gradient(135deg,#00D4FF20,#0088FF10);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px">';

    if(msgs.length===0&&step===0){
      html+=bubble('bot','안녕하세요! Whistle AI 수출 상담입니다. 무엇을 도와드릴까요?');
      html+=qbtns(['무료 분석이 궁금해요','바우처 문의','알리바바 입점','기타 문의']);
    }
    for(var i=0;i<msgs.length;i++){html+=bubble(msgs[i].from,msgs[i].text);}
    if(step===1){
      html+=bubble('bot','상담을 위해 간단한 정보를 알려주세요.');
      html+='<div style="display:flex;flex-direction:column;gap:6px;align-self:flex-start;width:100%">';

    if(from==='bot')return '<div style="align-self:flex-start;max-width:85%;padding:10px 14px;border-radius:12px 12px 12px 4px;background:#111B2E;border:1px solid rgba(255,255,255,.06)"><div style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.5">'+safe+'</div></div>';

  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  var autoReplies={
    '무료 분석이 궁금해요':'Whistle AI는 상품 URL이나 이미지만 올리면 13개 섹션의 수출 분석 리포트를 생성합니다. 이 페이지 상단에서 바로 체험해보실 수 있어요!',
    '바우처 문의':'Whistle AI는 수출바우처·제조혁신바우처 공식 수행기관입니다. 정부가 비용의 50~85%를 부담하며, SaaS 구독과 알리바바 셋업비 모두 정산 가능합니다.',

  };

  window.WC={
    toggle:function(){open=!open;r();},
    pick:function(t){msgs.push({from:'user',text:t});if(autoReplies[t]){msgs.push({from:'bot',text:autoReplies[t]});msgs.push({from:'bot',text:'더 자세한 상담을 원하시면 아래 정보를 남겨주세요.'});step=1;}r();},
    submitInfo:function(){
      var n=document.getElementById('wc-name');var e=document.getElementById('wc-email');var p=document.getElementById('wc-phone');
      info.name=n?n.value:'';info.email=e?e.value:'';info.phone=p?p.value:'';
      if(!info.name){alert('이름/회사명을 입력해주세요.');return;}
      msgs.push({from:'bot',text:info.name+'님, 반갑습니다! 궁금한 점을 자유롭게 입력해주세요.'});step=2;r();
    },
    send:function(){
      var inp=document.getElementById('wc-input');if(!inp||!inp.value.trim())return;

  };
  r();

<script>
(function(){
  var ESSENTIAL_PREFIXES = ['sb-', 'supabase'];
  var TRACKING_PATTERNS = [
    /^_ga/, /^_gid$/, /^_gat/, /^_fbp$/, /^_fbc$/, /^_gcl/,
    /^__utm/, /^_hjid$/, /^_hjSession/, /^__cf_bm$/, /^cf_clearance$/,
    /^_clck$/, /^_clsk$/, /^mp_/, /^amplitude_/, /^ajs_/
  ];

  function isEssentialCookie(name) {
    for (var i = 0; i < ESSENTIAL_PREFIXES.length; i++) {
      if (name.indexOf(ESSENTIAL_PREFIXES[i]) === 0) return true;
    }
    return false;
  }

  function isTrackingCookie(name) {
    for (var i = 0; i < TRACKING_PATTERNS.length; i++) {
      if (TRACKING_PATTERNS[i].test(name)) return true;
    }
    return false;
  }

  function deleteNonEssentialCookies() {
    var cookies = document.cookie.split(';');
    var domains = [
      window.location.hostname,
      '.' + window.location.hostname,
      '.whistle-ai.com',
      'whistle-ai.com'
    ];
    for (var i = 0; i < cookies.length; i++) {
      var name = cookies[i].split('=')[0].trim();
      if (!name || isEssentialCookie(name)) continue;
      if (isTrackingCookie(name)) {
        for (var d = 0; d < domains.length; d++) {
          document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;domain=' + domains[d];
          document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
        }
      }
    }
  }

  function loadAnalytics() {
    if (localStorage.getItem('cookie_consent') !== 'accepted') return;
    try {
      var s = document.createElement('script');
      s.defer = true;
      s.src = 'https://static.cloudflareinsights.com/beacon.min.js';
      s.dataset.cfBeacon = '{"token":""}';
      document.head.appendChild(s);
    } catch (e) {}
  }

  var consent = localStorage.getItem('cookie_consent');
  if (!consent) {
    document.getElementById('cookie-consent-banner').classList.add('show');
  } else if (consent === 'accepted') {
    loadAnalytics();
  } else if (consent === 'declined') {
    deleteNonEssentialCookies();
  }

  window.cookieConsent = function(v) {
    localStorage.setItem('cookie_consent', v);
    document.getElementById('cookie-consent-banner').classList.remove('show');
    if (v === 'accepted') {
      loadAnalytics();
    } else if (v === 'declined') {
      deleteNonEssentialCookies();
    }
  };
})();
</script>
