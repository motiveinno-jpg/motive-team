              <div><label style={{ fontSize: 11, fontWeight: 600, color: T.w40, marginBottom: 4, display: "block" }}>비밀번호 *</label><input type="password" value={signupForm.pw} onChange={e => { setSignupForm({...signupForm, pw: e.target.value}); setPwStrength(checkPwStrength(e.target.value)); }} placeholder="8자 이상 (영문+숫자+특수문자)" autoComplete="new-password" style={s.input} />{signupForm.pw && <div style={{ display: "flex", gap: 4, marginTop: 6, alignItems: "center" }}>{[1,2,3,4].map(i => <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= pwStrength.score ? (pwStrength.score <= 1 ? T.err : pwStrength.score <= 2 ? T.acc : T.ok) : T.w08 }} />)}<span style={{ fontSize: 10, color: pwStrength.score <= 1 ? T.err : pwStrength.score <= 2 ? T.acc : T.ok, marginLeft: 6, whiteSpace: "nowrap" }}>{pwStrength.msg}</span></div>}</div>
              <div><label style={{ fontSize: 11, fontWeight: 600, color: T.w40, marginBottom: 4, display: "block" }}>연락처 *</label><input type="tel" value={signupForm.phone} onChange={e => setSignupForm({...signupForm, phone: e.target.value})} placeholder="010-1234-5678" autoComplete="tel" style={s.input} /></div>
              <div><label style={{ fontSize: 11, fontWeight: 600, color: T.w40, marginBottom: 4, display: "block" }}>주요 제품 (선택)</label><input value={signupForm.product} onChange={e => setSignupForm({...signupForm, product: e.target.value})} placeholder="예: 스킨케어, 전자부품, 식품 등" style={s.input} /></div>
              <label style={{ display: "flex", alignItems: "flex-start", gap: 8, marginTop: 4, cursor: "pointer" }}><input type="checkbox" checked={signupForm.agreeTerms} onChange={e => setSignupForm({...signupForm, agreeTerms: e.target.checked})} style={{ marginTop: 3, accentColor: T.pri }} /><span style={{ fontSize: 11, color: T.w40, lineHeight: 1.5 }}><a href="/terms" target="_blank" rel="noopener" onClick={e => e.stopPropagation()} style={{ color: T.pri, textDecoration: "underline" }}>이용약관</a> 및 <a href="/privacy" target="_blank" rel="noopener" onClick={e => e.stopPropagation()} style={{ color: T.pri, textDecoration: "underline" }}>개인정보처리방침</a>에 동의합니다 (필수)</span></label>

        ) : (

            <div style={{ width: 64, height: 64, borderRadius: 32, background: `${T.ok}15`, border: `2px solid ${T.ok}40`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: 28 }}>✓</div>

  /* ═══ LOGIN MODAL ═══ */
  const loginModal = showLogin && (

              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill={T.bg} /></svg>

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div><label style={{ fontSize: 11, fontWeight: 600, color: T.w40, marginBottom: 4, display: "block" }}>이메일</label><input type="email" value={loginForm.email} onChange={e => setLoginForm({...loginForm, email: e.target.value})} onKeyDown={e => { if (e.key === "Enter") handleLogin(); }} placeholder="your@email.com" autoComplete="email" style={s.input} /></div>
            <div><label style={{ fontSize: 11, fontWeight: 600, color: T.w40, marginBottom: 4, display: "block" }}>비밀번호</label><input type="password" value={loginForm.pw} onChange={e => setLoginForm({...loginForm, pw: e.target.value})} onKeyDown={e => { if (e.key === "Enter") handleLogin(); }} placeholder="비밀번호 입력" autoComplete="current-password" style={s.input} /></div>

          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16, fontSize: 12 }}>
            <span style={{ color: T.w40, cursor: "pointer" }} onClick={() => { setShowLogin(false); setShowResetPw(true); setResetPwEmail(loginForm.email || ""); setResetPwSent(false); setResetPwError(""); }}>비밀번호 찾기</span>
            <span style={{ color: T.pri, cursor: "pointer", fontWeight: 600 }} onClick={() => { setShowLogin(false); openSignup(); }}>회원가입</span>
          </div>
        </div>
      </div>
    </div>

  /* ═══ RESET PASSWORD MODAL ═══ */
  const resetPwModal = showResetPw && (
    <div style={{ position: "fixed", inset: 0, zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div onClick={() => setShowResetPw(false)} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.7)", backdropFilter: "blur(8px)" }} />
      <div style={{ position: "relative", width: "100%", maxWidth: 400, background: T.bgCard, borderRadius: 20, border: `1px solid ${T.borderL}`, boxShadow: "0 24px 80px rgba(0,0,0,.6)", overflow: "hidden" }}>
        <div onClick={() => setShowResetPw(false)} style={{ position: "absolute", top: 16, right: 16, width: 32, height: 32, borderRadius: 16, background: T.w08, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 16, color: T.w40, zIndex: 1 }}>✕</div>
        <div style={{ padding: "32px 28px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>

          </div>
          {resetPwSent ? (
            <div style={{ textAlign: "center", padding: "24px 0" }}>

            </div>

              <div><label style={{ fontSize: 11, fontWeight: 600, color: T.w40, marginBottom: 4, display: "block" }}>가입한 이메일</label><input type="email" value={resetPwEmail} onChange={e => setResetPwEmail(e.target.value)} onKeyDown={e => { if (e.key === "Enter") document.getElementById("resetPwBtn")?.click(); }} placeholder="your@email.com" autoComplete="email" style={s.input} autoFocus /></div>

                setResetPwLoading(true); setResetPwError("");
                const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href.split('?')[0] });
                setResetPwLoading(false);
                if (error) { setResetPwError(error.message.includes("rate limit") ? "잠시 후 다시 시도해주세요." : "이메일 발송에 실패했습니다. 다시 시도해주세요."); }

            </div>

  /* ═══ ANALYSIS MODAL — Genspark-style 30초 프리뷰 ═══ */
  const stageLabels = anonTab === "file" ? ["파일 업로드 중...", "제품 정보 추출 중...", "시장 데이터 분석 중...", "수출 전략 수립 중...", "리포트 생성 중...", "분석 완료!"] : ["웹사이트 접속 중...", "제품 정보 수집 중...", "시장 데이터 분석 중...", "수출 전략 수립 중...", "리포트 생성 중...", "분석 완료!"];

            <div style={{ width: 28, height: 28, borderRadius: 8, background: T.priG, display: "flex", alignItems: "center", justifyContent: "center" }}>

          <div onClick={() => { setShowAnalysisModal(false); if(countdownRef.current) clearInterval(countdownRef.current); }} style={{ width: 32, height: 32, borderRadius: 8, background: T.w08, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 14, color: T.w40 }}>✕</div>

                {stageLabels.slice(0, 5).map((label, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", opacity: analysisStage >= i ? 1 : 0.2, transition: "opacity .5s" }}>
                    <div style={{ width: 22, height: 22, borderRadius: 11, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
                      background: analysisStage > i ? `${T.ok}20` : analysisStage === i ? `${T.pri}20` : T.w08,

              {/* 분석 결과 전체 */}

                {/* 헤더: 점수 + 제품명 */}

                  <div style={{ width: 80, height: 80, borderRadius: 16, background: `${(anonResult.overall_score||0) >= 70 ? T.ok : (anonResult.overall_score||0) >= 50 ? T.acc : T.err}10`, border: `3px solid ${(anonResult.overall_score||0) >= 70 ? T.ok : (anonResult.overall_score||0) >= 50 ? T.acc : T.err}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <span style={{ fontSize: 30, fontWeight: 900, color: (anonResult.overall_score||0) >= 70 ? T.ok : (anonResult.overall_score||0) >= 50 ? T.acc : T.err }}>{anonResult.overall_score}</span>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <span style={{ fontSize: 20, fontWeight: 800, color: T.w }}>{anonResult.product_name || "분석 완료"}</span>
                      {anonResult.category && <span style={s.tag(T.pri)}>{anonResult.category}</span>}
                    </div>
                    {anonResult.product_name_en && <div style={{ fontSize: 13, color: T.w20, marginBottom: 6 }}>{anonResult.product_name_en}</div>}
                    <div style={{ fontSize: 13, color: T.w60, lineHeight: 1.6 }}>{anonResult.summary}</div>

                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: T.w, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 18 }}>🌍</span> 추천 수출 시장</div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10 }}>

                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>

                          {(m.market_size || m.growth) && <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                            {m.market_size && <span style={{ fontSize: 10, padding: "2px 6px", background: `${T.pri}10`, borderRadius: 4, color: T.pri }}>{m.market_size}</span>}
                            {m.growth && <span style={{ fontSize: 10, padding: "2px 6px", background: `${T.ok}10`, borderRadius: 4, color: T.ok }}>+{m.growth}</span>}

                          <div onClick={openSignup} style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "5px 10px", borderRadius: 6, background: `${T.pri}12`, border: `1px solid ${T.pri}30`, cursor: "pointer", fontSize: 11, fontWeight: 600, color: T.pri, marginTop: 4, transition: "all .2s" }}>
                            <span style={{ fontSize: 13 }}>→</span> 이 시장 바이어 찾기 <span style={{ fontSize: 9, color: T.w40, marginLeft: 2 }}>(가입 필요)</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 핵심 강점 */}
                {anonResult.key_strengths && anonResult.key_strengths.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: T.w, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 18 }}>💪</span> 핵심 강점</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                      {anonResult.key_strengths.map((str, i) => (
                        <div key={i} style={{ padding: "10px 14px", background: `${T.ok}06`, borderRadius: 8, border: `1px solid ${T.ok}15`, display: "flex", alignItems: "flex-start", gap: 8 }}>
                          <span style={{ color: T.ok, fontSize: 13, flexShrink: 0 }}>✓</span>
                          <span style={{ fontSize: 12, color: T.w60, lineHeight: 1.5 }}>{typeof str === "string" ? str : str.text || ""}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 리스크 */}
                {anonResult.key_risks && anonResult.key_risks.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: T.w, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 18 }}>⚠️</span> 리스크 분석</div>

            </div>
          )}
        </div></Fade>
      </div>
    </div>
  );

  /* ═══ FOOTER ═══ */
  const footer = (
    <div style={{ background: T.deep, borderTop: `1px solid ${T.border}`, padding: "40px 24px 24px" }}>

        <div style={{ display: "flex", gap: 32 }}>

  /* ═══ RENDER — 개선된 흐름 ═══ */
  return (
    <div style={{ fontFamily: "'Sora','Noto Sans KR',-apple-system,sans-serif", background: T.bg, color: T.w, minHeight: "100vh" }}>

        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}a{text-decoration:none}

      `}</style>
      {signupModal}

<script>
(function(){
  var RELAY=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:3456':'';
  (function(){if(RELAY)return;fetch('relay-url.txt?t='+Date.now()).then(function(r){return r.ok?r.text():null;}).then(function(t){if(t){t=t.trim();if(t.startsWith('https://'))RELAY=t;}}).catch(function(){});})();
  var PAGE='landing';
  var open=false,step=0,msgs=[],info={name:'',email:'',phone:''};
  var el=document.createElement('div');el.id='wc-root';document.body.appendChild(el);

  function r(){
    var html='';
    // 플로팅 버튼
    html+='<div onclick="WC.toggle()" style="position:fixed;bottom:24px;right:24px;z-index:9999;width:56px;height:56px;border-radius:28px;background:linear-gradient(135deg,#00D4FF,#0088FF);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,212,255,.4);transition:transform .2s">';
    html+=open?'<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#060B18" stroke-width="2.5" stroke-linecap="round"/></svg>'
              :'<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" fill="#060B18"/></svg>';
    html+='</div>';

    if(!open){el.innerHTML=html;return;}

    // 채팅 윈도우
    html+='<div style="position:fixed;bottom:90px;right:24px;z-index:9998;width:min(360px,calc(100vw - 32px));max-height:520px;background:#0D1424;border-radius:16px;border:1px solid rgba(255,255,255,.1);box-shadow:0 16px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;font-family:Sora,Noto Sans KR,sans-serif">';
    // 헤더
    html+='<div style="padding:14px 18px;background:linear-gradient(135deg,#00D4FF20,#0088FF10);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px">';
    html+='<div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#00D4FF,#0088FF);display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#060B18"/></svg></div>';
    html+='<div><div style="font-size:14px;font-weight:700;color:#fff">Whistle AI</div><div style="font-size:11px;color:rgba(255,255,255,.4)">수출 전문 상담</div></div>';
    html+='<div style="margin-left:auto;display:flex;align-items:center;gap:4px"><div style="width:6px;height:6px;border-radius:3px;background:#00E676"></div><span style="font-size:10px;color:#00E676">온라인</span></div>';
    html+='</div>';

    // 메시지 영역
    html+='<div id="wc-msgs" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:200px;max-height:320px">';
    // 초기 인사
    if(msgs.length===0&&step===0){
      html+=bubble('bot','안녕하세요! Whistle AI 수출 상담입니다. 무엇을 도와드릴까요?');
      html+=qbtns(['무료 분석이 궁금해요','바우처 문의','알리바바 입점','기타 문의']);
    }
    for(var i=0;i<msgs.length;i++){html+=bubble(msgs[i].from,msgs[i].text);}
    if(step===1){
      html+=bubble('bot','상담을 위해 간단한 정보를 알려주세요.');
      html+='<div style="display:flex;flex-direction:column;gap:6px;align-self:flex-start;width:100%">';
      html+='<input id="wc-name" placeholder="이름/회사명" value="'+esc(info.name)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none;width:100%">';
      html+='<input id="wc-email" placeholder="이메일 (선택)" value="'+esc(info.email)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none;width:100%">';
      html+='<input id="wc-phone" placeholder="연락처 (선택)" value="'+esc(info.phone)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none;width:100%">';
      html+='<button onclick="WC.submitInfo()" style="padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);color:#060B18;font-weight:700;font-size:13px;cursor:pointer">상담 시작</button>';
      html+='</div>';
    }
    html+='</div>';

    // 입력 영역 (step>=2)
    if(step>=2){
      html+='<div style="padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px">';
      html+='<input id="wc-input" onkeydown="if(event.key===\'Enter\')WC.send()" placeholder="메시지를 입력하세요..." style="flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none">';
      html+='<button onclick="WC.send()" style="width:40px;height:40px;border-radius:10px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="#060B18"/></svg></button>';
      html+='</div>';
    }
    html+='</div>';
    el.innerHTML=html;
    var mc=document.getElementById('wc-msgs');if(mc)mc.scrollTop=mc.scrollHeight;
  }

  function bubble(from,text){
    var safe=esc(text);
    if(from==='bot')return '<div style="align-self:flex-start;max-width:85%;padding:10px 14px;border-radius:12px 12px 12px 4px;background:#111B2E;border:1px solid rgba(255,255,255,.06)"><div style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.5">'+safe+'</div></div>';
    return '<div style="align-self:flex-end;max-width:85%;padding:10px 14px;border-radius:12px 12px 4px 12px;background:linear-gradient(135deg,#00D4FF20,#0088FF15);border:1px solid #00D4FF30"><div style="font-size:13px;color:rgba(255,255,255,.9);line-height:1.5">'+safe+'</div></div>';
  }
  function qbtns(arr){
    var h='<div style="display:flex;flex-wrap:wrap;gap:6px;align-self:flex-start">';
    for(var i=0;i<arr.length;i++)h+='<div onclick="WC.pick(\''+esc(arr[i])+'\')" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(0,212,255,.3);background:rgba(0,212,255,.06);color:#00D4FF;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s">'+arr[i]+'</div>';
    return h+'</div>';
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  var autoReplies={
    '무료 분석이 궁금해요':'Whistle AI는 상품 URL이나 이미지만 올리면 13개 섹션의 수출 분석 리포트를 생성합니다. 이 페이지 상단에서 바로 체험해보실 수 있어요!',
    '바우처 문의':'Whistle AI는 수출바우처·제조혁신바우처 공식 수행기관입니다. 정부가 비용의 50~85%를 부담하며, SaaS 구독과 알리바바 셋업비 모두 정산 가능합니다.',
    '알리바바 입점':'총판 운영(셋업비 200만원, 계정비 무료)과 독립 운영(셋업비 500만원, 자체 계정) 두 가지 모델이 있습니다. 바우처 적용 시 최대 85%까지 절감 가능합니다.',
    '기타 문의':'궁금한 내용을 자유롭게 입력해주세요. 담당자가 확인 후 빠르게 답변드리겠습니다.'
  };

  window.WC={
    toggle:function(){open=!open;r();},
    pick:function(t){msgs.push({from:'user',text:t});if(autoReplies[t]){msgs.push({from:'bot',text:autoReplies[t]});msgs.push({from:'bot',text:'더 자세한 상담을 원하시면 아래 정보를 남겨주세요.'});step=1;}r();},
    submitInfo:function(){
      var n=document.getElementById('wc-name');var e=document.getElementById('wc-email');var p=document.getElementById('wc-phone');
      info.name=n?n.value:'';info.email=e?e.value:'';info.phone=p?p.value:'';
      if(!info.name){alert('이름/회사명을 입력해주세요.');return;}
      msgs.push({from:'bot',text:info.name+'님, 반갑습니다! 궁금한 점을 자유롭게 입력해주세요.'});step=2;r();
    },
    send:function(){
      var inp=document.getElementById('wc-input');if(!inp||!inp.value.trim())return;
      var msg=inp.value.trim();msgs.push({from:'user',text:msg});r();
      if(!RELAY){msgs.push({from:'bot',text:'문의가 접수되었습니다. creative@mo-tive.com으로도 문의 가능합니다.'});r();return;}
      fetch(RELAY+'/api/whistle/chat-inquiry',{method:'POST',headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},body:JSON.stringify({name:info.name,email:info.email,phone:info.phone,message:msg,page:PAGE})})
        .then(function(resp){if(!resp.ok)throw new Error('HTTP '+resp.status);return resp.json();}).then(function(d){if(d.ok){msgs.push({from:'bot',text:d.reply||'접수되었습니다.'});r();}})
        .catch(function(){msgs.push({from:'bot',text:'전송에 실패했습니다. creative@mo-tive.com으로 문의해주세요.'});r();});
    }
  };
  r();
})();
</script>
