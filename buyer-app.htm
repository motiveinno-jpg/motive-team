function renderSystemCard(m,body){
  var ts=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var deal=S.currentDeal;

  // === DOCUMENT CARDS ===
  if(body.indexOf('[서류 전송]')>-1||body.indexOf('Document')>-1||body.indexOf('PI-')>-1||body.indexOf('CI-')>-1){
    var docMatch=body.match(/(견적송장|상업송장|패킹리스트|원산지증명|계약서|PI|CI|PL|CO|SC)\(?([A-Z]*)?\)?[^$]*?(\$[\d,.]+)?/i);
    var docType=docMatch?docMatch[1]:'Document';
    var amount=docMatch&&docMatch[3]?docMatch[3]:'';
    var docNum=body.match(/[A-Z]{2}-\d{4}-\d+/);
    var docIcons={PI:'&#x1F4B0;',CI:'&#x1F4CB;',PL:'&#x1F4E6;',CO:'&#x1F3F3;',SC:'&#x1F4DD;'};
    var docTypeMap={'견적송장':'PI','상업송장':'CI','패킹리스트':'PL','원산지증명':'CO','계약서':'SC'};
    var typeCode=docTypeMap[docType]||(docType.length<=2?docType:'PI');
    var icon=docIcons[typeCode]||'&#x1F4C4;';

    var h='<div style="display:flex;justify-content:center"><div class="chat-rich-card" style="min-width:260px">';
    h+='<div class="rc-header" style="background:rgba(0,212,255,.04)">'+icon+' ';
    h+=typeCode==='PI'?'Proforma Invoice':typeCode==='CI'?'Commercial Invoice':typeCode==='PL'?'Packing List':typeCode==='CO'?'Certificate of Origin':'Sales Contract';
    h+='</div><div class="rc-body">';
    if(docNum)h+='<div style="font-weight:600;color:var(--w80);margin-bottom:4px">'+docNum[0]+'</div>';
    if(amount)h+='<div style="font-size:16px;font-weight:800;color:var(--acc);margin-bottom:4px">'+amount+'</div>';
    h+='<div style="font-size:10px;color:var(--w30)">'+ts+' &middot; From seller</div>';
    h+='</div>';
    // Show accept/negotiate buttons for PI documents in quotation stage
    if(deal&&deal.stage==='quotation'&&(typeCode==='PI'||docType==='견적송장')){
      h+='<div class="rc-footer">';
      if(deal.matching&&deal.matching.id)h+='<button class="btn btn-pri btn-sm" onclick="B.acceptQuote(\''+deal.matching.id+'\')" style="font-size:10px">&#x2705; Accept</button>';
      h+='<button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'dealChatInput\').focus()" style="font-size:10px">&#x1F4AC; Negotiate</button>';
      h+='</div>';
    }
    h+='</div></div>';
    return h;
  }

  // === STAGE TRANSITION CARDS ===
  if(body.indexOf('[단계 전환]')>-1||body.indexOf('Stage advanced')>-1){
    var stageMatch=body.match(/→\s*(.+?)\s*(단계|stage)/i);
    var stageName=stageMatch?stageMatch[1]:'Next';
    var stageIcons={'매칭':'&#x1F91D;','견적':'&#x1F4B0;','샘플':'&#x1F4E6;','협상':'&#x1F4DD;','주문':'&#x2705;','생산':'&#x1F3ED;','출하':'&#x1F6A2;','완료':'&#x1F389;'};
    var stIcon=stageIcons[stageName]||'&#x27A1;';
    return '<div style="text-align:center"><div class="chat-stage-badge">'+stIcon+' Stage: '+esc(stageName)+'<span style="font-size:9px;color:var(--w30);margin-left:6px">'+ts+'</span></div></div>';
  }

  // === ORDER CARDS ===
  if(body.indexOf('[주문 확정]')>-1||body.indexOf('Order confirmed')>-1){
    var orderMatch=body.match(/([A-Z]{2}-\d{4}-\d+).*?\$([0-9,.]+)/);
    var h='<div style="display:flex;justify-content:center"><div class="chat-rich-card" style="min-width:260px;border-color:rgba(0,230,118,.2)">';
    h+='<div class="rc-header" style="background:rgba(0,230,118,.04);color:var(--ok)">&#x2705; Order Confirmed</div>';
    h+='<div class="rc-body">';
    if(orderMatch){h+='<div style="font-weight:600;color:var(--w80)">'+orderMatch[1]+'</div>';h+='<div style="font-size:18px;font-weight:800;color:var(--acc);margin:4px 0">$'+orderMatch[2]+'</div>';}
    var termsMatch=body.match(/\(([^)]+)\)\s*$/);
    if(termsMatch)h+='<div style="font-size:10px;color:var(--w40)">Payment: '+esc(termsMatch[1])+'</div>';
    h+='<div style="font-size:10px;color:var(--w30);margin-top:4px">'+ts+'</div>';
    h+='</div></div></div>';
    return h;
  }

  // === SHIPMENT CARDS ===
  if(body.indexOf('[출하 등록]')>-1||body.indexOf('Shipment registered')>-1){
    var h='<div style="display:flex;justify-content:center"><div class="chat-rich-card" style="min-width:260px;border-color:rgba(168,85,247,.2)">';
    h+='<div class="rc-header" style="background:rgba(168,85,247,.04);color:var(--purple)">&#x1F6A2; Shipment Registered</div>';
    h+='<div class="rc-body">';
    var shipParts=body.replace(/\[출하 등록\]\s*/,'').split('|').map(function(s){return s.trim();});
    shipParts.forEach(function(p){if(p)h+='<div style="margin-bottom:2px">'+esc(p)+'</div>';});
    h+='<div style="font-size:10px;color:var(--w30);margin-top:4px">'+ts+'</div>';
    h+='</div></div></div>';
    return h;
  }

  // === ACCEPTANCE / APPROVAL CARDS ===
  if(body.indexOf('[Quotation Accepted]')>-1||body.indexOf('[Sample Approved]')>-1||body.indexOf('[Ready to Order]')>-1){
    var isAccept=body.indexOf('Accepted')>-1;var isSample=body.indexOf('Sample')>-1;var isReady=body.indexOf('Ready')>-1;
    var label=isAccept?'Quotation Accepted':isSample?'Sample Approved':'Ready to Order';
    var badgeIcon=isAccept?'&#x2705;':isSample?'&#x1F44D;':'&#x1F680;';
    var color=isAccept?'var(--ok)':isSample?'var(--pri)':'var(--acc)';
    return '<div style="text-align:center"><div class="chat-stage-badge" style="background:rgba(0,230,118,.06);border-color:rgba(0,230,118,.15);color:'+color+'">'+badgeIcon+' '+label+'<span style="font-size:9px;color:var(--w30);margin-left:6px">'+ts+'</span></div></div>';
  }

  // === DEAL COMPLETION ===
  if(body.indexOf('[거래 완료]')>-1||body.indexOf('Deal completed')>-1){
    return '<div style="text-align:center;padding:12px"><div style="display:inline-block;padding:16px 28px;border-radius:16px;background:linear-gradient(135deg,rgba(0,230,118,.08),rgba(0,212,255,.08));border:1px solid rgba(0,230,118,.2)"><div style="font-size:28px;margin-bottom:4px">&#x1F389;</div><div style="font-size:14px;font-weight:800;color:var(--ok)">Deal Completed!</div><div style="font-size:10px;color:var(--w40);margin-top:4px">'+ts+'</div></div></div>';
  }

  // === DEFAULT SYSTEM MESSAGE ===
  return '<div style="text-align:center;padding:4px 8px"><span style="font-size:10px;color:var(--w30);background:var(--w04);padding:4px 12px;border-radius:12px;display:inline-block">'+esc(body)+' <span style="opacity:.6">'+ts+'</span></span></div>';
}

function openMakerProfile(makerId){
  if(!makerId)return;
  S._viewMakerId=makerId;
  S._makerLoading=true;
  S._makerProfile=null;
  S._makerProducts=[];
  S._makerUser=null;
  S._makerSaved=false;
  S._prevPage=S.page;
  S.page='maker-profile';
  if(history.pushState)history.pushState(null,null,'#maker-profile');
  render();
  window.scrollTo(0,0);
  Promise.all([
    sb.from('companies').select('*').eq('user_id',makerId).single(),
    sb.from('products').select('*').eq('user_id',makerId).eq('is_public',true).eq('status','active').order('created_at',{ascending:false}).limit(20),
    sb.from('users').select('display_name,email,created_at,company_name,country').eq('id',makerId).single()
  ]).then(function(results){
    S._makerProfile=results[0].data;
    S._makerProducts=results[1].data||[];
    S._makerUser=results[2].data;
    S._makerLoading=false;
    // Check if buyer saved this manufacturer
    if(S.user){
      sb.from('buyer_saved_products').select('id').eq('user_id',S.user.id).eq('manufacturer_id',makerId).limit(1).then(function(sv){
        S._makerSaved=!!(sv.data&&sv.data.length);
        render();
      }).catch(function(){render();});
    } else {
      render();
    }
  }).catch(function(err){
    console.error('[loadMakerProfile error]',err);
    S._makerLoading=false;
    render();
  });
}

function saveMaker(makerId){
  if(!S.user||!makerId)return;
  sb.from('buyer_saved_manufacturers').insert({user_id:S.user.id,manufacturer_id:makerId}).then(function(){
    S._makerSaved=true;
    toast(_t('Manufacturer saved!','제조사 저장 완료!'),'ok');

    S._makerSaved=true;

}

function sendDirectMessage(){
  var d=S.modalData||{};
  var inp=document.getElementById('dmInput');
  if(!inp||!inp.value.trim()){toast(_t('Please enter a message','메시지를 입력해주세요'),'warn');return;}
  var body=inp.value.trim();
  var sellerId=d.sellerId;
  if(!sellerId){toast(_t('Manufacturer not found','제조사를 찾을 수 없습니다'),'err');return;}

  // Find or create buyer link for messaging
  var buyerLink=S.buyerLinks.find(function(b){return b.registered_by===sellerId;});
  if(!buyerLink&&S.buyerLinks.length)buyerLink=S.buyerLinks[0];

  if(buyerLink){
    _insertDirectMessage(buyerLink.id,sellerId,body,d.context);
  } else {
    // Auto-create buyer record for self-registered buyer
    var newBuyer={
      company_name:S.user.user_metadata&&S.user.user_metadata.company_name||S.user.email,
      email:S.user.email,
      buyer_user_id:S.user.id,
      registered_by:sellerId,
      status:'active'
    };
    sb.from('buyers').insert(newBuyer).select().single().then(function(r){
      if(r.error){toast(_t('Failed to initialize messaging','메시징 초기화 실패'),'err');return;}
      S.buyerLinks.push(r.data);
      _insertDirectMessage(r.data.id,sellerId,body,d.context);
    });
  }
}

function _insertDirectMessage(buyerId,sellerId,body,context){
  var prefix=context?'['+context+'] ':'';
  var msg={
    user_id:sellerId,
    buyer_id:buyerId,
    body:prefix+body,
    sender_type:'buyer',
    message_type:'text',
    channel:'platform',
    direction:'inbound'
  };
  sb.from('messages').insert(msg).select().single().then(function(r){
    if(r.error){toast(_t('Failed to send message','메시지 전송 실패'),'err');return;}
    toast(_t('Message sent! The manufacturer will receive it in their inbox.','메시지 전송 완료! 제조사의 메시지함에서 확인합니다.'),'ok');
    S.modal=null;S.modalData=null;
    loadConversations();
    render();
  });
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function stripHtml(s){return s?s.replace(/<[^>]*>/g,''):''}
function formatDate(d){if(!d)return'';var dt=new Date(d);return dt.toLocaleDateString(_isKorean?'ko-KR':'en-US',{month:'short',day:'numeric',year:'numeric'});}
function _countryFlag(code){if(!code||code.length!==2)return'&#x1F30D;';var c=code.toUpperCase();return String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)+String.fromCodePoint(0x1F1E6+c.charCodeAt(1)-65);}
function _relDate(d){if(!d)return'';var ms=Date.now()-new Date(d).getTime();var days=Math.floor(ms/86400000);if(days<1)return'Today';if(days<7)return days+'d ago';if(days<30)return Math.floor(days/7)+'w ago';return Math.floor(days/30)+'mo ago';}
function timeAgo(d){if(!d)return'';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return formatDate(d);}

    toast(_t('Connection restored','인터넷 연결 복구'),'ok');
    if(S.user){loadNotifications();loadInquiries();}

    /* Flush queued chat messages */
    _flushBuyerChatQueue();
  });
  window.addEventListener('offline',function(){
    _showOfflineBanner();
  });
  if(!navigator.onLine)_showOfflineBanner();
})();
/* Chat message queue for offline resilience */
var _buyerChatQueue=[];
function _queueBuyerChatMsg(insertData){
  _buyerChatQueue.push(insertData);
  try{localStorage.setItem('_buyer_chat_queue',JSON.stringify(_buyerChatQueue));}catch(e){}
}
function _flushBuyerChatQueue(){
  try{var stored=localStorage.getItem('_buyer_chat_queue');if(stored){var parsed=JSON.parse(stored);if(Array.isArray(parsed)&&parsed.length)_buyerChatQueue=_buyerChatQueue.concat(parsed);localStorage.removeItem('_buyer_chat_queue');}}catch(e){}
  if(!_buyerChatQueue.length)return;
  var batch=_buyerChatQueue.splice(0);
  batch.forEach(function(msg){
    sb.from('messages').insert(msg).then(function(r){
      if(r.error){_buyerChatQueue.push(msg);console.error('[chat-queue] flush fail:',r.error);}
    }).catch(function(e){_buyerChatQueue.push(msg);console.error('[chat-queue] flush error:',e);});
  });
}

function initBuyerStripe(planId){

function _buildFtaPrompt(d, hsCode, destinations){
  var destNames = destinations.map(function(code){
    var c = _FTA_COUNTRIES.find(function(fc){return fc.code===code;});
    return c ? c.name+' ('+code+')' : code;
  }).join(', ');
  var originC = _FTA_ORIGIN_COUNTRIES.find(function(c){return c.code===d.fta_origin;});
  var originName = originC ? originC.name : d.fta_origin;
  var catObj = _FTA_PRODUCT_CATS.find(function(c){return c.id===d.fta_category;});
  var catName = catObj ? catObj.label : d.fta_category;
  var p = 'You are an expert international trade consultant specializing in FTA (Free Trade Agreement) analysis and tariff classification.\n\n';
  p += 'Analyze the following import scenario and provide detailed FTA/tariff information:\n\n';
  p += '- Product Category: '+catName+'\n';
  if(hsCode) p += '- HS Code: '+hsCode+'\n';
  if(d.fta_product_desc) p += '- Product Description: '+d.fta_product_desc+'\n';
  p += '- Origin Country: '+originName+'\n';
  p += '- Destination(s): '+destNames+'\n';
  if(d.fta_value && parseFloat(d.fta_value) > 0) p += '- Estimated Product Value: $'+d.fta_value+' USD\n';
  p += '\nPlease respond with ONLY valid JSON (no markdown, no code blocks) in this exact format:\n';
  if(destinations.length === 1){
    p += '{\n';
    p += '  "destination": "'+destinations[0]+'",\n';
    p += '  "best_fta": "Name of the best applicable FTA agreement",\n';
    p += '  "mfn_rate": 8.5,\n';
    p += '  "best_rate": 0,\n';
    p += '  "savings_pct": 8.5,\n';
    p += '  "origin_rule": "CTC (Change in Tariff Classification) or RVC 40% etc.",\n';
    p += '  "required_docs": ["Certificate of Origin","Commercial Invoice","etc."],\n';
    p += '  "applicable_ftas": [{"name":"FTA Name","fta_rate":0,"mfn_rate":8.5}],\n';
    p += '  "hs_code_suggestion": "330499 if not provided",\n';
    p += '  "recommendation": "Brief strategic recommendation for the buyer"\n';
    p += '}\n';
  } else {
    p += '{"results": [{"destination":"US","best_fta":"KORUS","mfn_rate":6.5,"best_rate":0,"savings_pct":6.5,"origin_rule":"CTC","required_docs":["C/O"],"recommendation":"..."},...]}\n';
  }
  p += '\nIMPORTANT: Use realistic tariff rates. If no FTA applies, set best_fta to null and best_rate equal to mfn_rate. Numbers must be numeric (not strings). Always include origin_rule and required_docs.';
  return p;
}

function _callFtaAI(prompt, callback){
  var relay = RELAY_URL;
  /* Extract structured data from prompt for edge function */
  var hsMatch = prompt.match(/HS Code:\s*(\d+)/);
  var destMatch = prompt.match(/Destination\(s\):\s*([^\n]+)/);
  var destCodes = [];
  if(destMatch){
    var dStr = destMatch[1];
    _FTA_COUNTRIES.forEach(function(c){if(dStr.indexOf(c.code)>=0) destCodes.push(c.code);});
  }
  function _callEdgeFn(){
    var body = {prompt:prompt};
    if(hsMatch) body.hs_code = hsMatch[1];
    if(destCodes.length===1) body.destination = destCodes[0];
    else if(destCodes.length>1) body.destinations = destCodes;
    sb.functions.invoke('fta-simulator',{body:body}).then(function(resp){
      if(resp.error) return callback({error:resp.error.message||'Simulation failed'});
      var data = resp.data;
      if(!data||!data.ok) return callback({error:(data&&data.error)||'Simulation failed'});
      callback(data.result || data.results || data);
    }).catch(function(err){callback({error:err.message});});
  }
  if(!relay){
    _callEdgeFn();
    return;
  }
  fetch(relay+'/api/whistle/chat-inquiry',{
    method:'POST',
    headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
    body:JSON.stringify({
      message:prompt,
      page:'buyer-fta',
      system:'You are an FTA trade expert. Respond only with valid JSON. No markdown.',
      name:S.user?(S.user.display_name||S.user.email):'buyer',
      email:S.user?S.user.email:''
    })
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(data){
    if(!data.ok && !data.reply){
      /* Fallback: try Supabase edge function */
      _callEdgeFn();
      return;
    }
    /* Parse AI reply as JSON */
    var reply = data.reply || '';
    try {
      reply = reply.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
      var parsed = JSON.parse(reply);
      callback(parsed.results ? parsed : parsed);
    } catch(e){
      /* If JSON parse fails, return the text as-is for display */
      callback({_rawText:reply});
    }
  }).catch(function(err){callback({error:err.message||'Network error'});});
}

function openCmdPalette(){
  if(document.getElementById('cmd-pal'))return;
  var o=document.createElement('div');o.id='cmd-pal';o.className='cmd-palette-overlay';
  o.onclick=function(e){if(e.target===o)closeCmdPalette();};
  var p=document.createElement('div');p.className='cmd-palette';
  var inp=document.createElement('input');inp.className='cmd-input';inp.placeholder=_t('Navigate, search...','탐색, 검색...');
  p.appendChild(inp);
  var res=document.createElement('div');res.className='cmd-results';
  p.appendChild(res);o.appendChild(p);document.body.appendChild(o);inp.focus();
  function renderItems(q){
    var items=CMD_ITEMS;
    if(q){var ql=q.toLowerCase();items=CMD_ITEMS.filter(function(c){return c.label.toLowerCase().indexOf(ql)>=0||(c.page||'').indexOf(ql)>=0;});}
    if(!items.length){res.innerHTML='<div class="cmd-empty">'+_t('No results','결과 없음')+'</div>';return;}
    res.innerHTML=items.map(function(c,i){return '<div class="cmd-item'+(i===0?' sel':'')+'" data-idx="'+i+'"><span class="ci-icon">'+c.icon+'</span><span class="ci-label">'+c.label+'</span></div>';}).join('');
    res.querySelectorAll('.cmd-item').forEach(function(el,i){el.onclick=function(){closeCmdPalette();nav(items[i].page);};});
    window._cmdFiltered=items;window._cmdIdx=0;
  }
  inp.addEventListener('input',function(){renderItems(inp.value);});
  inp.addEventListener('keydown',function(e){
    var items=window._cmdFiltered||CMD_ITEMS;var idx=window._cmdIdx||0;
    if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,items.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);}
    else if(e.key==='Enter'){e.preventDefault();if(items[idx]){closeCmdPalette();nav(items[idx].page);}return;}
    else if(e.key==='Escape'){closeCmdPalette();return;}
    else return;
    window._cmdIdx=idx;
    res.querySelectorAll('.cmd-item').forEach(function(el,i){el.classList.toggle('sel',i===idx);});
    var sel=res.querySelector('.cmd-item.sel');if(sel)sel.scrollIntoView({block:'nearest'});
  });
  renderItems('');
}
function closeCmdPalette(){var o=document.getElementById('cmd-pal');if(o)o.remove();}
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openCmdPalette();}
});

<!-- Floating Chat Widget -->
<script>
(function(){
  function getRelay(){return(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:3456':(typeof RELAY_URL!=='undefined'&&RELAY_URL?RELAY_URL:'');}
  var PAGE='buyer';
  var open=false,step=0,msgs=[],info={name:'',email:'',phone:''};
  var el=document.createElement('div');el.id='wc-root';document.body.appendChild(el);
  function _isLoggedIn(){return typeof S!=='undefined'&&S&&S.user&&S.user.id;}
  function r(){
    // Hide floating chat for logged-in users — they use platform Messages
    if(_isLoggedIn()){el.innerHTML='';return;}
    var html='';
    html+='<div onclick="WC.toggle()" style="position:fixed;bottom:24px;right:24px;z-index:9999;width:56px;height:56px;border-radius:28px;background:linear-gradient(135deg,#00D4FF,#0088FF);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,212,255,.4);transition:transform .2s">';
    html+=open?'<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#060B18" stroke-width="2.5" stroke-linecap="round"/></svg>':'<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" fill="#060B18"/></svg>';
    html+='</div>';
    if(!open){el.innerHTML=html;return;}
    html+='<div style="position:fixed;bottom:90px;right:24px;z-index:9998;width:360px;max-height:520px;background:#0D1424;border-radius:16px;border:1px solid rgba(255,255,255,.1);box-shadow:0 16px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;font-family:Sora,sans-serif">';
    html+='<div style="padding:14px 18px;background:linear-gradient(135deg,#00D4FF20,#0088FF10);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px">';
    html+='<div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#00D4FF,#0088FF);display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#060B18"/></svg></div>';
    html+='<div><div style="font-size:14px;font-weight:700;color:#fff">Whistle AI Support</div><div style="font-size:11px;color:rgba(255,255,255,.4)">Ask anything about sourcing</div></div>';
    html+='<div style="margin-left:auto;display:flex;align-items:center;gap:4px"><span style="font-size:10px;color:var(--w40)">Available</span></div></div>';
    html+='<div id="wc-msgs" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:200px;max-height:320px">';
    if(msgs.length===0&&step===0){html+=bbl('bot',''+(_isKorean?'안녕하세요! Whistle AI입니다. 어떻게 도와드릴까요?':'Hi! Welcome to Whistle AI. How can we help?')+'');html+=qb(_isKorean?['제품 검색 도움','소싱 문의','파트너십','기타']:['Product Search Help','Sourcing Inquiry','Partnership','Other']);}
    for(var i=0;i<msgs.length;i++)html+=bbl(msgs[i].from,msgs[i].text);
    if(step===1){html+=bbl('bot',''+(_isKorean?'더 잘 도와드리기 위해 정보를 알려주세요.':'Please share some info so we can assist you better.')+'');html+='<div style="display:flex;flex-direction:column;gap:6px;width:100%"><input id="wc-name" placeholder="'+(_isKorean?'이름 / 회사명':'Name / Company')+'" value="'+esc(info.name)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><input id="wc-email" placeholder="Email (optional)" value="'+esc(info.email)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><input id="wc-phone" placeholder="Phone (optional)" value="'+esc(info.phone)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><button onclick="WC.submitInfo()" style="padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);color:#060B18;font-weight:700;font-size:13px;cursor:pointer">'+(_isKorean?'채팅 시작':'Start Chat')+'</button></div>';}
    html+='</div>';
    if(step>=2){html+='<div style="padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px"><input id="wc-input" onkeydown="if(event.key===\'Enter\')WC.send()" placeholder="Type your message..." style="flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><button onclick="WC.send()" style="width:40px;height:40px;border-radius:10px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="#060B18"/></svg></button></div>';}
    html+='</div>';
    el.innerHTML=html;var mc=document.getElementById('wc-msgs');if(mc)mc.scrollTop=mc.scrollHeight;
  }
  function bbl(f,t){var et=esc(t);return f==='bot'?'<div style="align-self:flex-start;max-width:85%;padding:10px 14px;border-radius:12px 12px 12px 4px;background:#111B2E;border:1px solid rgba(255,255,255,.06)"><div style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.5">'+et+'</div></div>':'<div style="align-self:flex-end;max-width:85%;padding:10px 14px;border-radius:12px 12px 4px 12px;background:linear-gradient(135deg,#00D4FF20,#0088FF15);border:1px solid #00D4FF30"><div style="font-size:13px;color:rgba(255,255,255,.9);line-height:1.5">'+et+'</div></div>';}
  function qb(a){var h='<div style="display:flex;flex-wrap:wrap;gap:6px">';for(var i=0;i<a.length;i++)h+='<div onclick="WC.pick(\''+esc(a[i])+'\')" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(0,212,255,.3);background:rgba(0,212,255,.06);color:#00D4FF;font-size:12px;font-weight:600;cursor:pointer">'+esc(a[i])+'</div>';return h+'</div>';}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  var ar={'Product Search Help':'You can search for Korean products using the search bar on the Product Search page. Enter keywords, product names, or categories to find suppliers.','Sourcing Inquiry':'For custom sourcing requests, use the Marketplace page to post your requirements. Korean manufacturers will review and send proposals.','Partnership':'We offer reseller, service, technology, and institutional partnerships. Navigate to the Partnership page from the sidebar or contact us at creative@mo-tive.com.','Other':'Please type your question below and our team will get back to you shortly.'};
  window.WC={
    toggle:function(){open=!open;r();},
    pick:function(t){msgs.push({from:'user',text:t});if(ar[t]){msgs.push({from:'bot',text:ar[t]});msgs.push({from:'bot',text:'For further assistance, please share your details below.'});step=1;}r();},
    submitInfo:function(){var n=document.getElementById('wc-name'),e=document.getElementById('wc-email'),p=document.getElementById('wc-phone');info.name=n?n.value:'';info.email=e?e.value:'';info.phone=p?p.value:'';if(!info.name){toast(_t('Please enter your name or company.','이름 또는 회사명을 입력해 주세요.'),'warn');return;}msgs.push({from:'bot',text:'Hi '+info.name+'! Feel free to type your question.'});step=2;r();},
    send:function(){var inp=document.getElementById('wc-input');if(!inp||!inp.value.trim())return;var msg=inp.value.trim();msgs.push({from:'user',text:msg});r();var relay=getRelay();if(!relay){msgs.push({from:'bot',text:'Chat service is connecting... please try again in a moment.'});r();return;}fetch(relay+'/api/whistle/chat-inquiry',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:info.name,email:info.email,phone:info.phone,message:msg,page:PAGE})}).then(function(res){return res.json();}).then(function(d){if(d.ok){msgs.push({from:'bot',text:d.reply||'Your message has been received.'});r();}}).catch(function(){msgs.push({from:'bot',text:'Failed to send. Please try again later.'});r();});}
  };r();
})();
</script>
