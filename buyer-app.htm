/* === ESCROW PAYMENT (localStorage simulation вҖ” shared with whistle.html) === */
function _getEscrowStatus(dealId){
  var cached=S._escrowCache&&S._escrowCache[dealId];if(cached)return cached;
  var k='escrow_'+dealId;try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}
}
function _setEscrow(dealId,data){
  localStorage.setItem('escrow_'+dealId,JSON.stringify(data));
  if(!S._escrowCache)S._escrowCache={};S._escrowCache[dealId]=data;
  var _escDetails={deal_id:dealId,amount:data.amount,currency:data.currency,terms:data.terms,status:data.status,requestedAt:data.requestedAt,paidAt:data.paidAt,deliveredAt:data.deliveredAt,method:data.method};
  if(S.user){
    sb.from('service_requests').upsert({user_id:S.user.id,type:'escrow_buyer_'+dealId,status:data.status,details:_escDetails},{onConflict:'user_id,type'}).catch(function(e){console.error('[escrow] buyer DB upsert fail:',e);});
    // Sync to seller's record so seller can read buyer's payment status
    var deal=S.currentDeal||S.deals.find(function(d){return d.id===dealId;});
    var _sellerUserId=deal&&deal.sellerId;
    if(_sellerUserId)sb.from('service_requests').upsert({user_id:_sellerUserId,type:'escrow_'+dealId,status:data.status,details:_escDetails},{onConflict:'user_id,type'}).catch(function(){});
  }
}
function _loadEscrowFromDB(){
  if(!S.user)return Promise.resolve();
  return sb.from('service_requests').select('*').like('type','escrow%').eq('user_id',S.user.id).limit(200).then(function(r){
    if(r.data){r.data.forEach(function(sr){if(sr.details&&sr.details.deal_id){var did=sr.details.deal_id;if(!S._escrowCache)S._escrowCache={};S._escrowCache[did]=sr.details;localStorage.setItem('escrow_'+did,JSON.stringify(sr.details));}});}
  }).catch(function(e){console.error('[escrow] buyer load fail:',e);});
}

function _escMethodSelect(method){
  var stripe=document.getElementById('esc-method-stripe');
  var wire=document.getElementById('esc-method-wire');
  if(method==='stripe'){
    if(stripe){stripe.style.borderColor='var(--acc)';stripe.style.background='rgba(0,212,255,.04)';}
    if(wire){wire.style.borderColor='var(--w08)';wire.style.background='transparent';}
  }else{
    if(wire){wire.style.borderColor='var(--acc)';wire.style.background='rgba(0,212,255,.04)';}
    if(stripe){stripe.style.borderColor='var(--w08)';stripe.style.background='transparent';}
  }
  var radio=document.querySelector('input[name=esc_method][value="'+method+'"]');
  if(radio)radio.checked=true;
}
function confirmEscrowPay(dealId){
  var escData=_getEscrowStatus(dealId);
  if(!escData||escData.status!=='requested')return;
  var methodEl=document.querySelector('input[name=esc_method]:checked');
  var method=methodEl?methodEl.value:'stripe';

  if(method==='stripe'){
    /* Stripe card payment */
    initiateStripeEscrowPayment(dealId,escData.amount,escData.currency||'USD');
    return;
  }

  /* Wire transfer flow (original) */
  var btn=document.getElementById('escrow-pay-btn');if(btn)btn.disabled=true;
  escData.status='buyer_paid';escData.paidAt=new Date().toISOString();escData.method='wire';
  _setEscrow(dealId,escData);
  S.modal=null;S.modalData=null;
  if(S.user)sb.from('service_requests').insert({user_id:S.user.id,type:'escrow_payment',status:'pending',details:{deal_id:dealId,amount:escData.amount,currency:escData.currency||'USD',method:'wire'}}).catch(function(e){console.error('[escrow] payment notify fail:',e);});
  toast(_t('Payment confirmed! Settlement will proceed after delivery is verified.','кІ°м ңк°Җ нҷ•мқёлҗҳм—ҲмҠөлӢҲлӢӨ! л°°мҶЎ нҷ•мқё нӣ„ м •мӮ°мқҙ м§„н–үлҗ©лӢҲлӢӨ.'),'ok',5000);
  render();
}

/* Buyer confirms delivery вҶ’ triggers seller settlement (escrow flow) */
function confirmEscrowDelivery(dealId){
  var escData=_getEscrowStatus(dealId);
  if(!escData||escData.status!=='shipping'){toast(_t('Goods must be shipped before confirming delivery','л°°мҶЎмқҙ мҷ„лЈҢлҗң нӣ„м—җл§Ң мҲҳл № нҷ•мқёмқҙ к°ҖлҠҘн•©лӢҲлӢӨ'),'warn');return;}
  if(!confirm(_t('Confirm that you have received the goods? This will release payment to the seller.','мғҒн’Ҳмқ„ мҲҳл №н•ҳм…ЁмҠөлӢҲк№Ң? м…Җлҹ¬м—җкІҢ лҢҖкёҲмқҙ м§Җкёүлҗ©лӢҲлӢӨ.')))return;

  render();
}

/* Buyer raises dispute */
function raiseEscrowDispute(dealId){
  var escData=_getEscrowStatus(dealId);
  if(!escData)return;
  _bPrompt(_t('Please describe the issue with your order:','мЈјл¬ём—җ лҢҖн•ң л¬ём ңлҘј м„ӨлӘ…н•ҙ мЈјм„ёмҡ”:'),function(reason){
    if(!reason||!reason.trim())return;

/* Buyer confirms order receipt */
function confirmOrderReceipt(dealId){
  var deal=S.deals.find(function(d){return d.id===dealId;});
  if(!deal||!deal.order)return;
  var escCheck=_getEscrowStatus(dealId);
  if(escCheck&&escCheck.status==='disputed'){toast(_t('Cannot confirm receipt вҖ” escrow is currently under dispute.','мҲҳл № нҷ•мқё л¶Ҳк°Җ вҖ” м—җмҠӨнҒ¬лЎңк°Җ нҳ„мһ¬ мқҙмқҳ м ңкё° мӨ‘мһ…лӢҲлӢӨ.'),'err');return;}
  if(!confirm(_t('Confirm you have received this order? This may trigger final payment release.','мқҙ мЈјл¬ёмқ„ мҲҳл №н•ҳм…ЁмҠөлӢҲк№Ң? мөңмў… лҢҖкёҲ м§Җкёүмқҙ м§„н–үлҗ  мҲҳ мһҲмҠөлӢҲлӢӨ.')))return;
  deal.order.status='completed';deal.order.received_at=new Date().toISOString();
  sb.from('orders').update({status:'completed'}).eq('id',deal.order.id).then(function(){}).catch(function(e){console.error('[order] receipt confirm fail:',e);});
  // Auto-advance deal stage
  if(deal.matching&&deal.matching.status!=='completed'){
    deal.matching.status='completed';
    sb.from('matchings').update({status:'completed'}).eq('id',deal.matching.id||deal.id).then(function(){});
  }
  // Auto-release escrow
  var escData=_getEscrowStatus(dealId);
  if(escData&&(escData.status==='shipping'||escData.status==='secured')){
    escData.status='delivered';escData.deliveredAt=new Date().toISOString();
    _setEscrow(dealId,escData);
  }
  toast(_t('Order receipt confirmed! Deal completed.','мЈјл¬ё мҲҳл №мқҙ нҷ•мқёлҗҳм—ҲмҠөлӢҲлӢӨ! кұ°лһҳ мҷ„лЈҢ.'),'ok',5000);
  render();
}

function _initSigCanvas(){
  var c=document.getElementById('sig-canvas');if(!c)return;
  var ctx=c.getContext('2d');
  var drawing=false;
  ctx.strokeStyle='#ffffff';ctx.lineWidth=2;ctx.lineCap='round';
  c.onmousedown=function(e){drawing=true;ctx.beginPath();var r=c.getBoundingClientRect();ctx.moveTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));};
  c.onmousemove=function(e){if(!drawing)return;var r=c.getBoundingClientRect();ctx.lineTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));ctx.stroke();};
  c.onmouseup=function(){drawing=false;};
  c.onmouseleave=function(){drawing=false;};
  // Touch support
  c.ontouchstart=function(e){e.preventDefault();drawing=true;ctx.beginPath();var r=c.getBoundingClientRect();var t=e.touches[0];ctx.moveTo((t.clientX-r.left)*(c.width/r.width),(t.clientY-r.top)*(c.height/r.height));};
  c.ontouchmove=function(e){e.preventDefault();if(!drawing)return;var r=c.getBoundingClientRect();var t=e.touches[0];ctx.lineTo((t.clientX-r.left)*(c.width/r.width),(t.clientY-r.top)*(c.height/r.height));ctx.stroke();};
  c.ontouchend=function(){drawing=false;};
  c._sigCtx=ctx;
}

function clearSigCanvas(){
  var c=document.getElementById('sig-canvas');if(!c)return;
  var ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
}

function submitDocSignature(docId){
  var c=document.getElementById('sig-canvas');
  if(c){var ctx=c.getContext('2d');var imgData=ctx.getImageData(0,0,c.width,c.height);var hasDrawing=false;for(var i=3;i<imgData.data.length;i+=4){if(imgData.data[i]>0){hasDrawing=true;break;}}
    if(!hasDrawing){toast(_t('Please draw your signature first','лЁјм Җ м„ңлӘ…мқ„ к·ёл ӨмЈјм„ёмҡ”'),'warn');return;}}
  var sigs=_getDocSignatures();
  var sigData=c?c.toDataURL():null;
  sigs[docId]=Object.assign(sigs[docId]||{},{status:'signed',signedAt:new Date().toISOString(),signatureData:sigData});
  localStorage.setItem('doc_signatures',JSON.stringify(sigs));
  /* Sync signature to Supabase so seller can see it */
  if(S.user&&docId){
    var _bids=getBuyerIds();
    sb.from('documents').update({
      status:'signed',
      signed_at:new Date().toISOString(),
      signed_by:S.user.id,
      signature_data:sigData
    }).eq('id',docId).in('buyer_id',_bids.length?_bids:['__none__']).then(function(r){
      if(r.error){console.warn('Signature DB sync failed:',r.error.message);toast(_t('Signature saved locally. Cloud sync will retry.','м„ңлӘ…мқҙ лЎңм»¬м—җ м ҖмһҘлҗҳм—ҲмҠөлӢҲлӢӨ. нҒҙлқјмҡ°л“ң лҸҷкё°нҷ”лҘј мһ¬мӢңлҸ„н•©лӢҲлӢӨ.'),'warn');}
    }).catch(function(){toast(_t('Signature saved locally only. Check your connection.','м„ңлӘ…мқҙ лЎңм»¬м—җл§Ң м ҖмһҘлҗҳм—ҲмҠөлӢҲлӢӨ. м—°кІ° мғҒнғңлҘј нҷ•мқён•ҙ мЈјм„ёмҡ”.'),'warn');});
  }
  S.modal=null;S.modalData=null;
  toast(_t('Document signed successfully!','м„ңлҘҳ м„ңлӘ…мқҙ мҷ„лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ!'),'ok');
  render();
}

  // If no extra content, show helpful tips
  if(!(deal.documents||[]).length&&!(deal.dealSamples||[]).length&&!deal.order&&!deal.shipment&&deal.stage!=='inquiry'){

    h+='</div>';
  }

  // Review section вҖ” show for completed deals
  var canReview=deal.stage==='completed'||deal.stage==='delivered';
  if(deal.order&&(deal.order.status==='completed'||deal.order.status==='delivered'))canReview=true;
  if(canReview){
    var _smid3=deal.matching&&deal.matching.id;
    var existingReview=_smid3?S.reviews.find(function(rv){return rv.target_id===_smid3&&rv.target_type==='matching';}):null;
    h+='<div class="stage-card"><div class="stage-card-title">&#x2B50; '+_t('Review & Rating','лҰ¬л·° л°Ҹ нҸүм җ')+'</div>';
    if(existingReview){
      h+='<div style="padding:8px 0">';
      h+='<div style="margin-bottom:6px">'+('&#x2B50;'.repeat(existingReview.rating))+'<span style="color:var(--w40);margin-left:4px;font-size:12px">'+existingReview.rating+'/5</span></div>';
      if(existingReview.title)h+='<div style="font-weight:600;font-size:13px;margin-bottom:4px">'+esc(existingReview.title)+'</div>';
      if(existingReview.content)h+='<div style="font-size:12px;color:var(--w60);line-height:1.6">'+esc(existingReview.content)+'</div>';
      if(existingReview.tags&&existingReview.tags.length)h+='<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">'+existingReview.tags.map(function(t){return'<span class="badge badge-ghost" style="font-size:10px">'+esc(t)+'</span>';}).join('')+'</div>';
      h+='<div style="font-size:10px;color:var(--w20);margin-top:8px">Submitted '+new Date(existingReview.created_at).toLocaleDateString()+'</div>';
      h+='</div>';
    }else{
      h+='<div style="padding:8px 0;font-size:12px;color:var(--w60);margin-bottom:10px">'+_t('Share your experience with this seller to help other buyers.','мқҙ м…Җлҹ¬м—җ лҢҖн•ң кІҪн—ҳмқ„ кіөмң н•ҳм—¬ лӢӨлҘё л°”мқҙм–ҙм—җкІҢ лҸ„мӣҖмқ„ мЈјм„ёмҡ”.')+'</div>';
      h+='<div id="review-stars" style="display:flex;gap:4px;margin-bottom:10px">';
      for(var star=1;star<=5;star++){
        h+='<span onclick="B.setReviewStar('+star+')" style="cursor:pointer;font-size:24px;color:'+(S.reviewDraft.rating>=star?'var(--acc)':'var(--w12)')+';transition:color .2s">&#x2B50;</span>';
      }
      if(S.reviewDraft.rating)h+='<span style="color:var(--w40);font-size:12px;align-self:center;margin-left:6px">'+S.reviewDraft.rating+'/5</span>';
      h+='</div>';
      h+='<input type="text" placeholder="Review title (optional)" value="'+esc(S.reviewDraft.title||'')+'" oninput="B._rvTitle=this.value" style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;margin-bottom:8px;outline:none">';
      h+='<textarea placeholder="Write your review..." oninput="B._rvContent=this.value" style="width:100%;padding:8px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:var(--r-s);color:var(--w);font-size:12px;min-height:60px;resize:vertical;outline:none;font-family:inherit">'+esc(S.reviewDraft.content||'')+'</textarea>';
      var rvTags=['Fast Response','Good Quality','Fair Price','Professional','Reliable','Great Communication'];
      h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin:8px 0">';
      rvTags.forEach(function(tag){
        var sel=S.reviewDraft.tags.indexOf(tag)>-1;
        h+='<span onclick="B.toggleReviewTag(\''+tag+'\')" class="badge '+(sel?'badge-pri':'badge-ghost')+'" style="cursor:pointer;font-size:10px">'+tag+'</span>';
      });
      h+='</div>';
      h+='<button class="btn btn-pri btn-sm" onclick="B.submitReview(\''+(_smid3||'')+'\')" style="margin-top:6px"'+(S.reviewDraft.rating&&_smid3?'':' disabled')+'>Submit Review</button>';
    }
    h+='</div>';
  }

  return h;
}

/* === REVIEWS === */
function loadReviews(){
  if(!S.user)return;
  sb.from('reviews').select('*').eq('reviewer_id',S.user.id).order('created_at',{ascending:false}).limit(100).then(function(r){
    S.reviews=r.data||[];render();
  });
}

function loadProductReviews(){
  sb.from('reviews').select('*').order('created_at',{ascending:false}).limit(100).then(function(r){
    S._productReviews=r.data||[];
  }).catch(function(){S._productReviews=[];});
}

function setReviewStar(n){
  S.reviewDraft.rating=n;render();
}

function toggleReviewTag(tag){
  var idx=S.reviewDraft.tags.indexOf(tag);
  if(idx>-1)S.reviewDraft.tags.splice(idx,1);
  else S.reviewDraft.tags.push(tag);
  render();
}

function submitReview(matchingId){
  if(!S.user||!S.reviewDraft.rating)return;
  var title=B._rvTitle||S.reviewDraft.title||'';
  var content=B._rvContent||S.reviewDraft.content||'';
  // Find product_id and company from the deal/matching context
  var _deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  var _pid=_deal&&_deal.matching?(_deal.matching.product_id||null):null;
  var _company=_deal?(_deal.sellerId||null):null;
  sb.from('reviews').insert({
    reviewer_id:S.user.id,
    reviewer_role:'buyer',
    target_id:matchingId,
    target_type:'matching',
    review_type:'product',
    product_id:_pid,
    target_company:_company,
    buyer_country:S.user.country||null,
    rating:S.reviewDraft.rating,
    title:title||null,
    content:content||null,
    tags:S.reviewDraft.tags.length?S.reviewDraft.tags:null,
    is_public:true
  }).then(function(r){
    if(r.error){toast('Failed to submit review: '+r.error.message,'err');return;}
    toast(_t('Review submitted! Thank you.','лҰ¬л·°к°Җ м ңм¶ңлҗҳм—ҲмҠөлӢҲлӢӨ! к°җмӮ¬н•©лӢҲлӢӨ.'),'ok');
    S.reviewDraft={rating:0,title:'',content:'',tags:[]};
    B._rvTitle='';B._rvContent='';
    loadReviews();
  });
}

/* === DEAL ACTIONS (BUYER SIDE) === */
function requestQuote(matchingId){
  if(S._submitting)return;S._submitting=true;
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal){S._submitting=false;return;}
  if(!deal.buyerLinkId||!deal.sellerId){toast(_t('Deal is not yet matched. Please wait for seller response.','кұ°лһҳк°Җ м•„м§Ғ л§Өм№ӯлҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ. м…Җлҹ¬ мқ‘лӢөмқ„ кё°лӢӨл Ө мЈјм„ёмҡ”.'),'warn');S._submitting=false;return;}
  sb.from('messages').insert({
    buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
    body:'Hi! I\'d like to request a formal quotation (Proforma Invoice) for this product. Please include pricing, MOQ, lead time, and payment terms.',
    message_type:'text',channel:'platform',direction:'inbound'
  }).then(function(){
    S._submitting=false;
    toast(_t('Quotation request sent to seller!','м…Җлҹ¬м—җкІҢ кІ¬м Ғ мҡ”мІӯмқҙ м „мҶЎлҗҳм—ҲмҠөлӢҲлӢӨ!'),'ok');
    render();
  }).catch(function(e){S._submitting=false;console.error('[requestQuote]',e);toast(_t('Failed to send request','мҡ”мІӯ м „мҶЎ мӢӨнҢЁ'),'err');});
}

function acceptQuote(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  sb.from('matchings').update({status:'negotiation'}).eq('id',matchingId).then(function(){
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Quotation Accepted] I accept the quotation. Let\'s proceed with the next steps.',
      message_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){});
    if(deal.sellerId)sb.from('notifications').insert({user_id:deal.sellerId,type:'deal',title:'Quotation Accepted',body:(S.user.company_name||S.user.display_name||'Buyer')+' accepted your quotation',link_page:'deals',link_id:deal.id,is_read:false}).then(function(){});
    toast(_t('Quotation accepted! Moving to negotiation stage.','кІ¬м Ғмқҙ мҲҳлқҪлҗҳм—ҲмҠөлӢҲлӢӨ! нҳ‘мғҒ лӢЁкі„лЎң мқҙлҸҷн•©лӢҲлӢӨ.'),'ok');
    deal.matching.status='negotiation';
    buildDeals();render();
  });
}

function confirmSampleOk(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  sb.from('matchings').update({status:'negotiation'}).eq('id',matchingId).then(function(){
    sb.from('messages').insert({

      message_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){});
    if(deal.sellerId)sb.from('notifications').insert({user_id:deal.sellerId,type:'deal',title:'Sample Approved',body:(S.user.company_name||S.user.display_name||'Buyer')+' approved the sample',link_page:'deals',link_id:deal.id,is_read:false}).then(function(){});
    toast(_t('Sample approved! Moving to negotiation.','мғҳн”Ңмқҙ мҠ№мқёлҗҳм—ҲмҠөлӢҲлӢӨ! нҳ‘мғҒ лӢЁкі„лЎң мқҙлҸҷн•©лӢҲлӢӨ.'),'ok');
    deal.matching.status='negotiation';
    buildDeals();render();
  });
}

function confirmReadyToOrder(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  if(!S._orderReadySent)S._orderReadySent={};
  S._orderReadySent[matchingId]=true;
  sb.from('messages').insert({
    buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
    body:'[Ready to Order] We\'re ready to proceed with the order. Please create the purchase order with the agreed terms.',
    message_type:'system',channel:'platform',direction:'inbound'
  }).then(function(){
    if(deal.sellerId)sb.from('notifications').insert({user_id:deal.sellerId,type:'deal',title:'Ready to Order',body:(S.user.company_name||S.user.display_name||'Buyer')+' is ready to place an order',link_page:'deals',link_id:deal.id,is_read:false}).then(function(){});
    toast(_t('Order readiness confirmed! The seller will create the order.','мЈјл¬ё мӨҖл№„к°Җ нҷ•мқёлҗҳм—ҲмҠөлӢҲлӢӨ! м…Җлҹ¬к°Җ мЈјл¬ёмқ„ мғқм„ұн•©лӢҲлӢӨ.'),'ok');
    render();
  });
}

function confirmDelivery(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  /* Payment validation before completion */
  if(deal.order&&deal.order.payment_status&&deal.order.payment_status!=='paid'){
    toast(_t('Payment is not completed yet. Please complete payment before confirming delivery.','кІ°м ңк°Җ м•„м§Ғ мҷ„лЈҢлҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ. мҲҳл № нҷ•мқё м „м—җ кІ°м ңлҘј мҷ„лЈҢн•ҙ мЈјм„ёмҡ”.'),'err');return;
  }
  sb.from('matchings').update({status:'completed'}).eq('id',matchingId).then(function(){
    if(deal.order)sb.from('orders').update({status:'completed'}).eq('id',deal.order.id).then(function(){});
    // Auto-update escrow if active
    var _escDlv=_getEscrowStatus(deal.id);
    if(_escDlv&&(_escDlv.status==='shipping'||_escDlv.status==='secured'||_escDlv.status==='buyer_paid')){
      _escDlv.status='delivered';_escDlv.deliveredAt=new Date().toISOString();_setEscrow(deal.id,_escDlv);
    }
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Delivery Confirmed] Goods received successfully. Thank you!',
      message_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){
      if(deal.sellerId)sb.from('notifications').insert({user_id:deal.sellerId,type:'deal',title:'Delivery Confirmed',body:(S.user.company_name||S.user.display_name||'Buyer')+' confirmed receipt. Deal completed!',link_page:'deals',link_id:deal.id,is_read:false}).then(function(){});
      toast(_t('Delivery confirmed! Deal completed.','мҲҳл №мқҙ нҷ•мқёлҗҳм—ҲмҠөлӢҲлӢӨ! кұ°лһҳ мҷ„лЈҢ.'),'ok');
      deal.matching.status='completed';
      buildDeals();render();
    });
  });
}

/* === SAMPLE REQUESTS === */
function toggleSampleForm(dealId){
  S._sampleFormOpen=dealId;render();
}

function submitSampleReq(matchingId){
  if(!S.user)return;
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  var qty=parseInt(document.getElementById('smp-qty').value)||1;
  var addr=document.getElementById('smp-addr').value.trim();
  var method=document.getElementById('smp-method').value;
  var notes=document.getElementById('smp-notes').value.trim();
  if(!addr){toast(_t('Please enter a shipping address','л°°мҶЎ мЈјмҶҢлҘј мһ…л Ҙн•ҙ мЈјм„ёмҡ”'),'err');return;}
  sb.from('samples').insert({
    user_id:deal.sellerId,
    buyer_id:deal.buyerLinkId,
    status:'requested',
    quantity:qty,
    shipping_method:method,
    notes:(addr?'Ship to: '+addr:'')+(notes?'\n'+notes:'')
  }).then(function(r){

/* === MESSAGES / CHAT === */
function loadConversations(){
  var bids=getBuyerIds();if(!bids.length)return;
  sb.from('messages').select('*').in('buyer_id',bids).order('created_at',{ascending:false}).limit(200).then(function(r){
    var msgs=r.data||[];
    var convMap={};
    msgs.forEach(function(m){
      var key=m.buyer_id+'_'+m.user_id;
      if(!convMap[key]){convMap[key]={buyerLinkId:m.buyer_id,sellerId:m.user_id,lastMsg:m,unread:0,msgs:[]};}
      convMap[key].msgs.push(m);
      if(!m.is_read&&m.sender_type!=='buyer'&&!m.read_at)convMap[key].unread++;
    });
    S.conversations=Object.values(convMap).sort(function(a,b){return new Date(b.lastMsg.created_at)-new Date(a.lastMsg.created_at);});
    S.chatUnread=S.conversations.reduce(function(s,c){return s+c.unread;},0);
    render();
  });
}

function openChat(buyerLinkId,sellerId){
  S.currentChat={buyerLinkId:buyerLinkId,sellerId:sellerId};
  S.chatMessages=[];render();
  sb.from('messages').select('*').eq('buyer_id',buyerLinkId).eq('user_id',sellerId).order('created_at',{ascending:true}).limit(100).then(function(r){
    S.chatMessages=r.data||[];render();
    setTimeout(scrollChatBottom,100);
    // Mark unread as read
    var unread=(r.data||[]).filter(function(m){return m.sender_type!=='buyer'&&!m.read_at;});
    if(unread.length){
      sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).in('id',unread.map(function(m){return m.id;})).then(function(){loadConversations();});
    }
  });
  initChatRealtime(buyerLinkId);
}

function closeChat(){S.currentChat=null;if(S._chatChannel){sb.removeChannel(S._chatChannel);S._chatChannel=null;}render();}

function sendChat(){
  var inp=document.getElementById('chatInput');if(!inp||!inp.value.trim())return;
  var body=inp.value.trim();inp.value='';inp.style.height='auto';
  var msg={user_id:S.currentChat.sellerId,buyer_id:S.currentChat.buyerLinkId,body:body,sender_type:'buyer',message_type:'text',channel:'platform',direction:'inbound'};
  S.chatMessages.push(Object.assign({id:'temp_'+Date.now(),created_at:new Date().toISOString()},msg));
  render();scrollChatBottom();
  sb.from('messages').insert(msg).select().single().then(function(r){
    if(r.error){toast(_t('Failed to send','м „мҶЎ мӢӨнҢЁ'),'err');return;}
    S.chatMessages=S.chatMessages.filter(function(m){return!m.id.toString().startsWith('temp_');});
    S.chatMessages.push(r.data);render();scrollChatBottom();
  });
}

function chatAttachFile(input){
  if(!input.files||!input.files[0]||!S.currentChat)return;
  var file=input.files[0];
  if(file.size>10*1024*1024){toast(_t('Max file size is 10MB','мөңлҢҖ нҢҢмқј нҒ¬кё°лҠ” 10MBмһ…лӢҲлӢӨ'),'warn');return;}
  var ext=file.name.split('.').pop().toLowerCase();
  var path='chat/'+S.user.id+'/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  toast(_t('Uploading...','м—…лЎңл“ң мӨ‘...'),'info');
  sb.storage.from('documents').upload(path,file).then(function(r){
    if(r.error){toast('Upload failed: '+r.error.message,'err');return;}
    var url=sb.storage.from('documents').getPublicUrl(path).data.publicUrl;
    var isImg=/^(jpg|jpeg|png|gif|webp)$/i.test(ext);
    var body=isImg?'[Image] '+file.name:'[File] '+file.name;
    var msg={user_id:S.currentChat.sellerId,buyer_id:S.currentChat.buyerLinkId,body:body,sender_type:'buyer',message_type:'file',metadata:{file_url:url,file_name:file.name,file_type:ext,is_image:isImg},channel:'platform',direction:'inbound'};
    S.chatMessages.push(Object.assign({id:'temp_'+Date.now(),created_at:new Date().toISOString()},msg));
    render();scrollChatBottom();
    sb.from('messages').insert(msg).select().single().then(function(r){
      if(r.error){toast(_t('Send failed','м „мҶЎ мӢӨнҢЁ'),'err');return;}
      S.chatMessages=S.chatMessages.filter(function(m){return!m.id.toString().startsWith('temp_');});
      S.chatMessages.push(r.data);toast(_t('File sent','нҢҢмқјмқҙ м „мҶЎлҗҳм—ҲмҠөлӢҲлӢӨ'),'ok');render();scrollChatBottom();
    });
  });
  input.value='';
}

function initChatRealtime(buyerLinkId){
  if(S._chatChannel){sb.removeChannel(S._chatChannel);S._chatChannel=null;}
  S._chatChannel=sb.channel('buyer-chat-'+buyerLinkId).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'buyer_id=eq.'+buyerLinkId},function(payload){
    var m=payload.new;
    if(S.currentChat&&S.currentChat.buyerLinkId===buyerLinkId){
      if(!S.chatMessages.find(function(x){return x.id===m.id;})){S.chatMessages.push(m);render();scrollChatBottom();}
      if(m.sender_type!=='buyer'){sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).eq('id',m.id).then(function(){});}
    } else {S.chatUnread++;render();}
  }).subscribe();
}

function scrollChatBottom(){var el=document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;}

    h+='<span class="badge '+(sh.status==='delivered'?'badge-ok':sh.status==='exception'?'badge-err':'badge-pri')+'">'+esc(sh.status||'booked')+'</span></div>';

    if(sh.bl_number)h+='<div>B/L: '+esc(sh.bl_number)+'</div>';
    if(sh.vessel_name)h+='<div>Vessel: '+esc(sh.vessel_name)+'</div>';
    if(sh.eta)h+='<div>ETA: '+sh.eta+'</div>';
    h+='</div>';
    // Timeline
    h+='<div class="ship-timeline">';
    stages.forEach(function(st,i){
      var cls=i<currentIdx?'done':i===currentIdx?'current':'';
      h+='<div class="ship-step '+cls+'"><div class="dot"></div>';
      h+='<div style="font-size:12px;font-weight:'+(i===currentIdx?'700':'400')+';color:'+(i<=currentIdx?'var(--w90)':'var(--w20)')+'">'+st.replace(/_/g,' ')+'</div>';
      // Show dates from tracking_history
      if(sh.tracking_history&&sh.tracking_history.length){

    h+='</div></div>';
  });
  return h;
}

/* === TRANSLATION === */
var _translations={};
function translateMsg(msgId,targetLang){
  var key=msgId+'_'+(targetLang||'en');
  if(_translations[key]&&_translations[key]!=='loading'){
    delete _translations[key];render();return;
  }
  // Find message text from current messages
  var text='';
  var allMsgs=S.dealMessages.concat(S.chatMessages);
  for(var i=0;i<allMsgs.length;i++){if(String(allMsgs[i].id)===String(msgId)){text=allMsgs[i].body||'';break;}}
  if(!text)return;
  if(!RELAY){_translations[key]='[Translation unavailable]';render();return;}
  _translations[key]='loading';render();
  fetch(RELAY+'/api/translate',{method:'POST',headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},body:JSON.stringify({text:text,targetLang:targetLang||'en'})}).then(function(r){return r.json();}).then(function(d){
    if(d.ok){_translations[key]=d.translated;}
    else{_translations[key]='[Translation failed]';}
    render();
    setTimeout(function(){var el=document.getElementById('dealChatMsgs')||document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;},50);
  }).catch(function(){_translations[key]='[Translation failed]';render();});
}
function getTranslation(msgId,targetLang){
  return _translations[msgId+'_'+(targetLang||'en')]||null;
}
function renderChatBubble(m,isMine){
  var body=m.body||'';
  var isSystem=m.message_type==='system';

  // Rich card rendering for system messages
  if(isSystem){return renderSystemCard(m,body);}

  var tgt=isMine?'ko':'en';
  var tr=getTranslation(m.id,tgt);
  var h='<div class="chat-bubble '+(isMine?'mine':'theirs')+'" style="font-size:12px">';
  var _fUrl=m.file_url||(m.metadata&&m.metadata.file_url)||'';var _fName=(m.metadata&&m.metadata.file_name)||body||'File';var _fIsImg=m.metadata&&m.metadata.is_image;
  if(m.message_type==='file'&&_fUrl&&/^https?:\/\//.test(_fUrl)){if(_fIsImg){h+='<img src="'+esc(_fUrl)+'" style="max-width:200px;max-height:200px;border-radius:8px;margin-bottom:4px;cursor:pointer" onclick="window.open(\''+esc(_fUrl)+'\',\'_blank\')">';}else{h+='&#x1F4CE; <a href="'+esc(_fUrl)+'" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">'+esc(_fName)+'</a>';}}else if(m.message_type==='file'){h+='&#x1F4CE; '+esc(_fName);}
  else if(m.message_type==='doc'){h+='&#x1F4C4; '+esc(body||'Document shared');}
  else{
    if(tr&&tr!=='loading'){
      h+='<div style="font-size:12px">'+esc(tr)+'</div>';
      h+='<div style="font-size:9px;color:'+(isMine?'rgba(0,0,0,.4)':'var(--w20)')+';margin-top:3px;font-style:italic">Translated</div>';
      h+='<div style="font-size:10px;margin-top:2px;opacity:.6;border-top:1px solid '+(isMine?'rgba(0,0,0,.1)':'var(--w08)')+';padding-top:2px">'+esc(body)+'</div>';
    } else {
      h+=esc(body);
    }
  }
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">';
  h+='<span style="font-size:8px;opacity:.5">'+new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</span>';
  if(body&&!String(m.id).startsWith('tmp_')&&!String(m.id).startsWith('temp_')){
    if(tr==='loading'){
      h+='<span style="font-size:9px;opacity:.5">translating...</span>';
    } else {
      h+='<span style="font-size:9px;cursor:pointer;opacity:.6;'+(tr?'color:'+(isMine?'rgba(0,0,0,.7)':'var(--pri)'):'')
        +'" onclick="event.stopPropagation();B.translateMsg(\''+m.id+'\',\''+(isMine?'ko':'en')+'\')">'
        +(tr?'Original':'Translate')+'</span>';
    }
  }
  h+='</div></div>';
  return h;
}

function renderSystemCard(m,body){
  var ts=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var deal=S.currentDeal;

  // === DOCUMENT CARDS ===
  if(body.indexOf('[м„ңлҘҳ м „мҶЎ]')>-1||body.indexOf('Document')>-1||body.indexOf('PI-')>-1||body.indexOf('CI-')>-1){
    var docMatch=body.match(/(кІ¬м ҒмҶЎмһҘ|мғҒм—…мҶЎмһҘ|нҢЁнӮ№лҰ¬мҠӨнҠё|мӣҗмӮ°м§ҖмҰқлӘ…|кі„м•Ҫм„ң|PI|CI|PL|CO|SC)\(?([A-Z]*)?\)?[^$]*?(\$[\d,.]+)?/i);
    var docType=docMatch?docMatch[1]:'Document';
    var amount=docMatch&&docMatch[3]?docMatch[3]:'';
    var docNum=body.match(/[A-Z]{2}-\d{4}-\d+/);
    var docIcons={PI:'&#x1F4B0;',CI:'&#x1F4CB;',PL:'&#x1F4E6;',CO:'&#x1F3F3;',SC:'&#x1F4DD;'};
    var docTypeMap={'кІ¬м ҒмҶЎмһҘ':'PI','мғҒм—…мҶЎмһҘ':'CI','нҢЁнӮ№лҰ¬мҠӨнҠё':'PL','мӣҗмӮ°м§ҖмҰқлӘ…':'CO','кі„м•Ҫм„ң':'SC'};
    var typeCode=docTypeMap[docType]||(docType.length<=2?docType:'PI');
    var icon=docIcons[typeCode]||'&#x1F4C4;';

    var h='<div style="display:flex;justify-content:center"><div class="chat-rich-card" style="min-width:260px">';
    h+='<div class="rc-header" style="background:rgba(0,212,255,.04)">'+icon+' ';
    h+=typeCode==='PI'?'Proforma Invoice':typeCode==='CI'?'Commercial Invoice':typeCode==='PL'?'Packing List':typeCode==='CO'?'Certificate of Origin':'Sales Contract';
    h+='</div><div class="rc-body">';
    if(docNum)h+='<div style="font-weight:600;color:var(--w80);margin-bottom:4px">'+docNum[0]+'</div>';
    if(amount)h+='<div style="font-size:16px;font-weight:800;color:var(--acc);margin-bottom:4px">'+amount+'</div>';
    h+='<div style="font-size:10px;color:var(--w30)">'+ts+' &middot; From seller</div>';
    h+='</div>';
    // Show accept/negotiate buttons for PI documents in quotation stage
    if(deal&&deal.stage==='quotation'&&(typeCode==='PI'||docType==='кІ¬м ҒмҶЎмһҘ')){
      h+='<div class="rc-footer">';
      if(deal.matching&&deal.matching.id)h+='<button class="btn btn-pri btn-sm" onclick="B.acceptQuote(\''+deal.matching.id+'\')" style="font-size:10px">&#x2705; Accept</button>';
      h+='<button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'dealChatInput\').focus()" style="font-size:10px">&#x1F4AC; Negotiate</button>';
      h+='</div>';
    }
    h+='</div></div>';
    return h;
  }

  // === STAGE TRANSITION CARDS ===
  if(body.indexOf('[лӢЁкі„ м „нҷҳ]')>-1||body.indexOf('Stage advanced')>-1){
    var stageMatch=body.match(/вҶ’\s*(.+?)\s*(лӢЁкі„|stage)/i);
    var stageName=stageMatch?stageMatch[1]:'Next';
    var stageIcons={'л§Өм№ӯ':'&#x1F91D;','кІ¬м Ғ':'&#x1F4B0;','мғҳн”Ң':'&#x1F4E6;','нҳ‘мғҒ':'&#x1F4DD;','мЈјл¬ё':'&#x2705;','мғқмӮ°':'&#x1F3ED;','м¶ңн•ҳ':'&#x1F6A2;','мҷ„лЈҢ':'&#x1F389;'};
    var stIcon=stageIcons[stageName]||'&#x27A1;';
    return '<div style="text-align:center"><div class="chat-stage-badge">'+stIcon+' Stage: '+esc(stageName)+'<span style="font-size:9px;color:var(--w30);margin-left:6px">'+ts+'</span></div></div>';
  }

  // === ORDER CARDS ===
  if(body.indexOf('[мЈјл¬ё нҷ•м •]')>-1||body.indexOf('Order confirmed')>-1){
    var orderMatch=body.match(/([A-Z]{2}-\d{4}-\d+).*?\$([0-9,.]+)/);
    var h='<div style="display:flex;justify-content:center"><div class="chat-rich-card" style="min-width:260px;border-color:rgba(0,230,118,.2)">';
    h+='<div class="rc-header" style="background:rgba(0,230,118,.04);color:var(--ok)">&#x2705; Order Confirmed</div>';
    h+='<div class="rc-body">';
    if(orderMatch){h+='<div style="font-weight:600;color:var(--w80)">'+orderMatch[1]+'</div>';h+='<div style="font-size:18px;font-weight:800;color:var(--acc);margin:4px 0">$'+orderMatch[2]+'</div>';}
    var termsMatch=body.match(/\(([^)]+)\)\s*$/);
    if(termsMatch)h+='<div style="font-size:10px;color:var(--w40)">Payment: '+esc(termsMatch[1])+'</div>';
    h+='<div style="font-size:10px;color:var(--w30);margin-top:4px">'+ts+'</div>';
    h+='</div></div></div>';
    return h;
  }

  // === SHIPMENT CARDS ===
  if(body.indexOf('[м¶ңн•ҳ л“ұлЎқ]')>-1||body.indexOf('Shipment registered')>-1){

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function stripHtml(s){return s?s.replace(/<[^>]*>/g,''):''}
function formatDate(d){if(!d)return'';var dt=new Date(d);return dt.toLocaleDateString(_isKorean?'ko-KR':'en-US',{month:'short',day:'numeric',year:'numeric'});}
function _countryFlag(code){if(!code||code.length!==2)return'&#x1F30D;';var c=code.toUpperCase();return String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)+String.fromCodePoint(0x1F1E6+c.charCodeAt(1)-65);}
function _relDate(d){if(!d)return'';var ms=Date.now()-new Date(d).getTime();var days=Math.floor(ms/86400000);if(days<1)return'Today';if(days<7)return days+'d ago';if(days<30)return Math.floor(days/7)+'w ago';return Math.floor(days/30)+'mo ago';}
function timeAgo(d){if(!d)return'';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return formatDate(d);}

function initBuyerStripe(planId){

  var cycleEl=document.querySelector('input[name=b_cycle]:checked');
  var cycle=cycleEl?cycleEl.value:'m';
  var priceId=STRIPE_CFG.prices[planId]&&STRIPE_CFG.prices[planId][cycle];
  if(!priceId){toast(_t('Payment setup in progress. Contact creative@mo-tive.com','кІ°м ң м„Өм • мӨ‘мһ…лӢҲлӢӨ. creative@mo-tive.comмңјлЎң л¬ёмқҳн•ҙ мЈјм„ёмҡ”'),'info');return;}
  var btn=document.getElementById('bck-btn');
  if(btn){btn.disabled=true;btn.textContent=_t('Connecting...','м—°кІ° мӨ‘...');}
  sb.auth.getSession().then(function(r){
    if(!r.data||!r.data.session){toast(_t('Please log in first','лЁјм Җ лЎңк·ёмқён•ҙ мЈјм„ёмҡ”'),'warn');if(btn){btn.disabled=false;btn.textContent=_t('Pay with Card','м№ҙл“ң кІ°м ң');}return;}
    fetch(STRIPE_CFG.fn+'/create-checkout-session',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+r.data.session.access_token,'apikey':SB_KEY},
      body:JSON.stringify({price_id:priceId,type:'subscription',plan:'buyer_'+planId,billing_cycle:cycle,success_url:location.origin+location.pathname+'#profile',cancel_url:location.origin+location.pathname+'#profile'})
    }).then(function(r){return r.json();}).then(function(data){
      if(data.error){toast(data.error,'err');if(btn){btn.disabled=false;btn.textContent=_t('Pay with Card','м№ҙл“ң кІ°м ң');}return;}
      if(data.url){closeModal('bck');window.location.href=data.url;}
      else{toast(_t('Payment session creation failed. Please try again.','кІ°м ң м„ём…ҳ мғқм„ұм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ. лӢӨмӢң мӢңлҸ„н•ҙ мЈјм„ёмҡ”.'),'err');if(btn){btn.disabled=false;btn.textContent=_t('Pay with Card','м№ҙл“ң кІ°м ң');}}
    }).catch(function(err){toast('Connection error: '+err.message,'err');if(btn){btn.disabled=false;btn.textContent=_t('Pay with Card','м№ҙл“ң кІ°м ң');}});
  });
}

function _ftaFormData(){

function _buildFtaPrompt(d, hsCode, destinations){
  var destNames = destinations.map(function(code){
    var c = _FTA_COUNTRIES.find(function(fc){return fc.code===code;});
    return c ? c.name+' ('+code+')' : code;
  }).join(', ');
  var originC = _FTA_ORIGIN_COUNTRIES.find(function(c){return c.code===d.fta_origin;});
  var originName = originC ? originC.name : d.fta_origin;
  var catObj = _FTA_PRODUCT_CATS.find(function(c){return c.id===d.fta_category;});
  var catName = catObj ? catObj.label : d.fta_category;
  var p = 'You are an expert international trade consultant specializing in FTA (Free Trade Agreement) analysis and tariff classification.\n\n';
  p += 'Analyze the following import scenario and provide detailed FTA/tariff information:\n\n';
  p += '- Product Category: '+catName+'\n';
  if(hsCode) p += '- HS Code: '+hsCode+'\n';
  if(d.fta_product_desc) p += '- Product Description: '+d.fta_product_desc+'\n';
  p += '- Origin Country: '+originName+'\n';
  p += '- Destination(s): '+destNames+'\n';
  if(d.fta_value && parseFloat(d.fta_value) > 0) p += '- Estimated Product Value: $'+d.fta_value+' USD\n';
  p += '\nPlease respond with ONLY valid JSON (no markdown, no code blocks) in this exact format:\n';
  if(destinations.length === 1){
    p += '{\n';
    p += '  "destination": "'+destinations[0]+'",\n';
    p += '  "best_fta": "Name of the best applicable FTA agreement",\n';
    p += '  "mfn_rate": 8.5,\n';
    p += '  "best_rate": 0,\n';
    p += '  "savings_pct": 8.5,\n';
    p += '  "origin_rule": "CTC (Change in Tariff Classification) or RVC 40% etc.",\n';
    p += '  "required_docs": ["Certificate of Origin","Commercial Invoice","etc."],\n';
    p += '  "applicable_ftas": [{"name":"FTA Name","fta_rate":0,"mfn_rate":8.5}],\n';
    p += '  "hs_code_suggestion": "330499 if not provided",\n';
    p += '  "recommendation": "Brief strategic recommendation for the buyer"\n';
    p += '}\n';
  } else {
    p += '{"results": [{"destination":"US","best_fta":"KORUS","mfn_rate":6.5,"best_rate":0,"savings_pct":6.5,"origin_rule":"CTC","required_docs":["C/O"],"recommendation":"..."},...]}\n';
  }
  p += '\nIMPORTANT: Use realistic tariff rates. If no FTA applies, set best_fta to null and best_rate equal to mfn_rate. Numbers must be numeric (not strings). Always include origin_rule and required_docs.';
  return p;
}

function _callFtaAI(prompt, callback){
  var relay = RELAY_URL;
  if(!relay){
    /* Try Supabase edge function as fallback */
    sb.functions.invoke('fta-simulator',{body:{prompt:prompt}}).then(function(resp){
      if(resp.error) return callback({error:resp.error.message||'Simulation failed'});
      var data = resp.data;
      if(!data||!data.ok) return callback({error:(data&&data.error)||'Simulation failed'});
      callback(data.result || data.results || data);
    }).catch(function(err){callback({error:err.message});});
    return;
  }
  fetch(relay+'/api/whistle/chat-inquiry',{
    method:'POST',
    headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
    body:JSON.stringify({
      message:prompt,
      page:'buyer-fta',
      system:'You are an FTA trade expert. Respond only with valid JSON. No markdown.',
      name:S.user?(S.user.display_name||S.user.email):'buyer',
      email:S.user?S.user.email:''
    })
  }).then(function(r){return r.json();}).then(function(data){
    if(!data.ok && !data.reply){
      /* Fallback: try Supabase edge function */
      var hsMatch = prompt.match(/HS Code:\s*(\d+)/);
      var destMatch = prompt.match(/Destination\(s\):\s*([^\n]+)/);
      var destCodes = [];
      if(destMatch){
        var dStr = destMatch[1];
        _FTA_COUNTRIES.forEach(function(c){if(dStr.indexOf(c.code)>=0) destCodes.push(c.code);});
      }
      var body = {prompt:prompt};
      if(hsMatch) body.hs_code = hsMatch[1];
      if(destCodes.length===1) body.destination = destCodes[0];
      else if(destCodes.length>1) body.destinations = destCodes;
      sb.functions.invoke('fta-simulator',{body:body}).then(function(resp){
        if(resp.error) return callback({error:resp.error.message||'Simulation failed'});
        var rd = resp.data;
        if(!rd||!rd.ok) return callback({error:(rd&&rd.error)||'Simulation failed'});
        callback(rd.result || rd.results || rd);
      }).catch(function(err){callback({error:err.message});});
      return;
    }
    /* Parse AI reply as JSON */
    var reply = data.reply || '';
    try {
      reply = reply.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
      var parsed = JSON.parse(reply);
      callback(parsed.results ? parsed : parsed);
    } catch(e){
      /* If JSON parse fails, return the text as-is for display */
      callback({_rawText:reply});
    }
  }).catch(function(err){callback({error:err.message||'Network error'});});
}

function openCmdPalette(){
  if(document.getElementById('cmd-pal'))return;
  var o=document.createElement('div');o.id='cmd-pal';o.className='cmd-palette-overlay';
  o.onclick=function(e){if(e.target===o)closeCmdPalette();};
  var p=document.createElement('div');p.className='cmd-palette';
  var inp=document.createElement('input');inp.className='cmd-input';inp.placeholder=_t('Navigate, search...','нғҗмғү, кІҖмғү...');
  p.appendChild(inp);
  var res=document.createElement('div');res.className='cmd-results';
  p.appendChild(res);o.appendChild(p);document.body.appendChild(o);inp.focus();
  function renderItems(q){
    var items=CMD_ITEMS;
    if(q){var ql=q.toLowerCase();items=CMD_ITEMS.filter(function(c){return c.label.toLowerCase().indexOf(ql)>=0||(c.page||'').indexOf(ql)>=0;});}
    if(!items.length){res.innerHTML='<div class="cmd-empty">'+_t('No results','кІ°кіј м—ҶмқҢ')+'</div>';return;}
    res.innerHTML=items.map(function(c,i){return '<div class="cmd-item'+(i===0?' sel':'')+'" data-idx="'+i+'"><span class="ci-icon">'+c.icon+'</span><span class="ci-label">'+c.label+'</span></div>';}).join('');
    res.querySelectorAll('.cmd-item').forEach(function(el,i){el.onclick=function(){closeCmdPalette();nav(items[i].page);};});
    window._cmdFiltered=items;window._cmdIdx=0;
  }
  inp.addEventListener('input',function(){renderItems(inp.value);});
  inp.addEventListener('keydown',function(e){
    var items=window._cmdFiltered||CMD_ITEMS;var idx=window._cmdIdx||0;
    if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,items.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);}
    else if(e.key==='Enter'){e.preventDefault();if(items[idx]){closeCmdPalette();nav(items[idx].page);}return;}
    else if(e.key==='Escape'){closeCmdPalette();return;}
    else return;
    window._cmdIdx=idx;
    res.querySelectorAll('.cmd-item').forEach(function(el,i){el.classList.toggle('sel',i===idx);});
    var sel=res.querySelector('.cmd-item.sel');if(sel)sel.scrollIntoView({block:'nearest'});
  });
  renderItems('');
}
function closeCmdPalette(){var o=document.getElementById('cmd-pal');if(o)o.remove();}
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openCmdPalette();}
});

    if(msgs.length===0&&step===0){html+=bbl('bot',''+(_isKorean?'м•Ҳл…•н•ҳм„ёмҡ”! Whistle AIмһ…лӢҲлӢӨ. м–ҙл–»кІҢ лҸ„мҷҖл“ңлҰҙк№Ңмҡ”?':'Hi! Welcome to Whistle AI. How can we help?')+'');html+=qb(_isKorean?['м ңн’Ҳ кІҖмғү лҸ„мӣҖ','мҶҢмӢұ л¬ёмқҳ','нҢҢнҠёл„ҲмӢӯ','кё°нғҖ']:['Product Search Help','Sourcing Inquiry','Partnership','Other']);}
    for(var i=0;i<msgs.length;i++)html+=bbl(msgs[i].from,msgs[i].text);
    if(step===1){html+=bbl('bot',''+(_isKorean?'лҚ” мһҳ лҸ„мҷҖл“ңлҰ¬кё° мң„н•ҙ м •ліҙлҘј м•Ңл ӨмЈјм„ёмҡ”.':'Please share some info so we can assist you better.')+'');html+='<div style="display:flex;flex-direction:column;gap:6px;width:100%"><input id="wc-name" placeholder="'+(_isKorean?'мқҙлҰ„ / нҡҢмӮ¬лӘ…':'Name / Company')+'" value="'+esc(info.name)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><input id="wc-email" placeholder="Email (optional)" value="'+esc(info.email)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><input id="wc-phone" placeholder="Phone (optional)" value="'+esc(info.phone)+'" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><button onclick="WC.submitInfo()" style="padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);color:#060B18;font-weight:700;font-size:13px;cursor:pointer">'+(_isKorean?'мұ„нҢ… мӢңмһ‘':'Start Chat')+'</button></div>';}
    html+='</div>';
    if(step>=2){html+='<div style="padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px"><input id="wc-input" onkeydown="if(event.key===\'Enter\')WC.send()" placeholder="Type your message..." style="flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:#111B2E;color:rgba(255,255,255,.9);font-size:13px;outline:none"><button onclick="WC.send()" style="width:40px;height:40px;border-radius:10px;border:none;background:linear-gradient(135deg,#00D4FF,#0088FF);cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="#060B18"/></svg></button></div>';}
    html+='</div>';
    el.innerHTML=html;var mc=document.getElementById('wc-msgs');if(mc)mc.scrollTop=mc.scrollHeight;
  }
  function bbl(f,t){var et=esc(t);return f==='bot'?'<div style="align-self:flex-start;max-width:85%;padding:10px 14px;border-radius:12px 12px 12px 4px;background:#111B2E;border:1px solid rgba(255,255,255,.06)"><div style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.5">'+et+'</div></div>':'<div style="align-self:flex-end;max-width:85%;padding:10px 14px;border-radius:12px 12px 4px 12px;background:linear-gradient(135deg,#00D4FF20,#0088FF15);border:1px solid #00D4FF30"><div style="font-size:13px;color:rgba(255,255,255,.9);line-height:1.5">'+et+'</div></div>';}
  function qb(a){var h='<div style="display:flex;flex-wrap:wrap;gap:6px">';for(var i=0;i<a.length;i++)h+='<div onclick="WC.pick(\''+esc(a[i])+'\')" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(0,212,255,.3);background:rgba(0,212,255,.06);color:#00D4FF;font-size:12px;font-weight:600;cursor:pointer">'+esc(a[i])+'</div>';return h+'</div>';}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  var ar={'Product Search Help':'You can search for Korean products using the search bar on the Product Search page. Enter keywords, product names, or categories to find suppliers.','Sourcing Inquiry':'For custom sourcing requests, use the Marketplace page to post your requirements. Korean manufacturers will review and send proposals.','Partnership':'We offer reseller, service, technology, and institutional partnerships. Navigate to the Partnership page from the sidebar or contact us at creative@mo-tive.com.','Other':'Please type your question below and our team will get back to you shortly.'};
  window.WC={
    toggle:function(){open=!open;r();},
    pick:function(t){msgs.push({from:'user',text:t});if(ar[t]){msgs.push({from:'bot',text:ar[t]});msgs.push({from:'bot',text:'For further assistance, please share your details below.'});step=1;}r();},
    submitInfo:function(){var n=document.getElementById('wc-name'),e=document.getElementById('wc-email'),p=document.getElementById('wc-phone');info.name=n?n.value:'';info.email=e?e.value:'';info.phone=p?p.value:'';if(!info.name){toast(_t('Please enter your name or company.','мқҙлҰ„ лҳҗлҠ” нҡҢмӮ¬лӘ…мқ„ мһ…л Ҙн•ҙ мЈјм„ёмҡ”.'),'warn');return;}msgs.push({from:'bot',text:'Hi '+info.name+'! Feel free to type your question.'});step=2;r();},
    send:function(){var inp=document.getElementById('wc-input');if(!inp||!inp.value.trim())return;var msg=inp.value.trim();msgs.push({from:'user',text:msg});r();var relay=getRelay();if(!relay){msgs.push({from:'bot',text:'Chat service is connecting... please try again in a moment.'});r();return;}fetch(relay+'/api/whistle/chat-inquiry',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:info.name,email:info.email,phone:info.phone,message:msg,page:PAGE})}).then(function(res){return res.json();}).then(function(d){if(d.ok){msgs.push({from:'bot',text:d.reply||'Your message has been received.'});r();}}).catch(function(){msgs.push({from:'bot',text:'Failed to send. Please try again later.'});r();});}
  };r();
})();
</script>
