    h+='<input class="form-input" id="dealChatInput" placeholder="'+_t('Type a message...','메시지를 입력하세요...')+'" style="flex:1;border-radius:12px;font-size:13px;padding:10px 14px" onkeydown="if(event.key===\'Enter\')B.sendDealMessage()">';
    h+='<button class="btn btn-pri" onclick="B.sendDealMessage()" style="border-radius:12px;padding:10px 18px">'+_t('Send','보내기')+'</button>';
    h+='</div></div>';

    h+='</div>'; // end deal-chat

  } else {
    // Not matched yet — full chat area with waiting state
    h+='<div class="deal-chat" style="align-items:center;justify-content:center;text-align:center">';
    h+='<div style="padding:40px"><div style="font-size:48px;margin-bottom:12px">&#x1F91D;</div>';
    h+='<div style="font-size:16px;font-weight:700;color:var(--w70);margin-bottom:8px">'+_t('Matching in progress','매칭 진행 중')+'</div>';
    h+='<div style="font-size:12px;color:var(--w30);max-width:320px;margin:0 auto">'+_t('Our team is reviewing your inquiry. Once matched with the best seller, you can chat, exchange documents, and manage the entire deal here.','팀에서 문의를 검토하고 있습니다. 최적의 셀러와 매칭되면 채팅, 서류 교환, 거래 관리를 모두 이곳에서 할 수 있습니다.')+'</div>';
    h+='<div style="margin-top:16px"><div style="display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;background:rgba(255,184,0,.06);border:1px solid rgba(255,184,0,.15)"><div style="width:8px;height:8px;border-radius:4px;background:var(--acc);animation:pulse 2s infinite"></div><span style="font-size:11px;color:var(--acc)">'+_t('Reviewing your inquiry','문의 검토 중')+'</span></div></div>';
    h+='</div></div>';
  }

  // RIGHT: Context sidebar (collapsible)
  h+='<div class="deal-content'+(S._dealSidebarHidden?' collapsed':'')+'" id="dealSidebar">';
  if(!S._dealSidebarHidden){h+=renderDealSidebar(deal,stageIdx);}
  h+='</div>';

  h+='</div>'; // end deal-room
  return h;
}

/* === DEAL ACTION CHIPS — Stage-specific quick actions above chat input === */
function renderDealActionChips(deal,stageIdx){
  var h='<div class="chat-actions">';
  var stage=deal.stage;

  switch(stage){
    case'matched':
      if(deal.matching&&deal.matching.id){
      h+='<div class="chat-action-chip" onclick="B.requestQuote(\''+deal.matching.id+'\')">&#x1F4B0; '+_t('Request Quote','견적 요청')+'</div>';
      }
      h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; '+_t('Say Hello','인사하기')+'</div>';
      break;
    case'quotation':
      var hasPI=deal.documents.some(function(d){return d.doc_type==='pi';});
      if(hasPI){
        if(deal.matching&&deal.matching.id)h+='<div class="chat-action-chip ok" onclick="B.acceptQuote(\''+deal.matching.id+'\')">&#x2705; '+_t('Accept Quote','견적 수락')+'</div>';
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; '+_t('Negotiate','협상하기')+'</div>';
      } else {
        if(deal.matching&&deal.matching.id)h+='<div class="chat-action-chip" onclick="B.requestQuote(\''+deal.matching.id+'\')">&#x1F4B0; '+_t('Request Quote Again','견적 재요청')+'</div>';
      }
      break;
    case'sample':
      var hasPending=(deal.dealSamples||[]).some(function(s){return s.status==='requested'||s.status==='preparing';});
      var hasDelivered=(deal.dealSamples||[]).some(function(s){return s.status==='delivered';});
      if(hasDelivered){
        if(deal.matching&&deal.matching.id)h+='<div class="chat-action-chip ok" onclick="B.confirmSampleOk(\''+deal.matching.id+'\')">&#x1F44D; '+_t('Approve Sample','샘플 승인')+'</div>';
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; '+_t('Request Changes','변경 요청')+'</div>';
      } else if(!hasPending){
        h+='<div class="chat-action-chip accent" onclick="B.toggleSampleForm(\''+deal.id+'\')">&#x1F4E6; '+_t('Request Sample','샘플 요청')+'</div>';
      } else {
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; '+_t('Check Status','상태 확인')+'</div>';
      }
      break;
    case'negotiation':
      if(deal.matching&&deal.matching.id){
        var _orSent=S._orderReadySent&&S._orderReadySent[deal.matching.id];
        if(_orSent)h+='<div class="chat-action-chip" style="cursor:default;opacity:.6">&#x23F3; '+_t('Waiting for seller to create order...','셀러의 주문 생성 대기 중...')+'</div>';
        else h+='<div class="chat-action-chip ok" onclick="B.confirmReadyToOrder(\''+deal.matching.id+'\')">&#x2705; '+_t('Ready to Order','주문 준비 완료')+'</div>';
      }
      h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; '+_t('Discuss Terms','조건 협의')+'</div>';
      var _escN=_getEscrowStatus(deal.id);
      if(_escN&&_escN.status==='requested')h+='<div class="chat-action-chip ok" onclick="B.openEscrowPayModal(\''+deal.id+'\')">&#x1F512; '+_t('Pay Securely','안전결제')+'</div>';
      else if(_escN&&_escN.status!=='none')h+='<div class="chat-action-chip" style="cursor:default;opacity:.7">&#x1F512; Payment: '+_escrowBuyerLabel(_escN.status)+'</div>';
      break;
    case'order':
      var _escO=_getEscrowStatus(deal.id);
      if(_escO&&_escO.status==='requested')h+='<div class="chat-action-chip ok" onclick="B.openEscrowPayModal(\''+deal.id+'\')">&#x1F512; '+_t('Pay Securely','안전결제')+'</div>';
      else if(_escO&&_escO.status!=='none')h+='<div class="chat-action-chip" style="cursor:default;opacity:.7">&#x1F512; Payment: '+_escrowBuyerLabel(_escO.status)+'</div>';
      else h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; '+_t('Discuss Payment','결제 협의')+'</div>';
      break;
    case'production':
      h+='<div class="chat-action-chip" onclick="B.sendQuickMsg(deal,'+(_isKorean?'\'생산 진행 상황을 공유해 주실 수 있나요?\'':'\'Could you please share a production progress update?\'')+')">&#x1F4AC; '+_t('Request Update','진행 상황 요청')+'</div>';
      h+='<div class="chat-action-chip" onclick="B.sendQuickMsg(deal,'+(_isKorean?'\'예상 출하일이 언제인가요?\'':'\'When is the estimated shipment date?\'')+')">&#x1F6A2; '+_t('Ask ETA','출하일 문의')+'</div>';
      h+='<div class="chat-action-chip" onclick="B.sendQuickMsg(deal,'+(_isKorean?'\'출하 전 공장 검수가 가능한가요?\'':'\'Can I arrange a factory inspection before shipment?\'')+')">&#x1F50D; '+_t('Request Inspection','검수 요청')+'</div>';
      break;
    case'shipping':
      var _escS=_getEscrowStatus(deal.id);
      if(_escS&&_escS.status==='shipping'){
        h+='<div class="chat-action-chip ok" onclick="B.confirmEscrowDelivery(\''+deal.id+'\')">&#x1F4E6; '+_t('Confirm Delivery & Release Payment','수령 확인 및 결제 해제')+'</div>';
        h+='<div class="chat-action-chip" style="color:var(--err)" onclick="B.raiseEscrowDispute(\''+deal.id+'\')">&#x26A0; '+_t('Dispute','이의 제기')+'</div>';
      } else if(deal.shipment&&deal.shipment.status==='delivered'){
        h+='<div class="chat-action-chip ok" onclick="B.confirmDelivery(\''+(deal.matching&&deal.matching.id||'')+'\')">&#x1F4E6; '+_t('Confirm Receipt','수령 확인')+'</div>';
      } else {
        h+='<div class="chat-action-chip" onclick="document.getElementById(\'dealChatInput\').focus()">&#x1F4AC; '+_t('Track Shipment','배송 추적')+'</div>';
      }
      break;
    case'completed':
      var _mid=deal.matching&&deal.matching.id;
      var hasReview=_mid&&S.reviews.some(function(rv){return rv.target_id===_mid;});
      if(!hasReview){h+='<div class="chat-action-chip accent" onclick="B.toggleDealSidebar()">&#x2B50; '+_t('Write Review','리뷰 작성')+'</div>';}
      break;
  }

  // Sample form inline (shown in chat area when requested)
  if(S._sampleFormOpen===deal.id){
    h+='</div>';
    h+=renderInlineSampleForm(deal);
    return h;
  }
  h+='</div>';
  return h;
}

  h+='<textarea id="smp-notes" rows="1" placeholder="'+_t('Notes (optional)','비고 (선택사항)')+'" style="width:100%;padding:7px 10px;background:var(--w08);border:1px solid var(--bd);border-radius:8px;color:var(--w);font-size:11px;resize:none;outline:none;font-family:inherit;margin-bottom:6px"></textarea>';

  h+='</div>';
  return h;
}

/* === ESCROW PAYMENT (Server-Side — orders table as single source of truth) === */
function _getEscrowStatus(dealId){
  var cached=S._escrowCache&&S._escrowCache[dealId];if(cached)return cached;
  var k='escrow_'+dealId;try{var ls=JSON.parse(localStorage.getItem(k));if(ls){if(!S._escrowCache)S._escrowCache={};S._escrowCache[dealId]=ls;return ls;}}catch(e){}
  return null;
}
function _setEscrow(dealId,data){
  if(!S._escrowCache)S._escrowCache={};S._escrowCache[dealId]=data;
  localStorage.setItem('escrow_'+dealId,JSON.stringify(data));
}
/** Call escrow-transition Edge Function for server-side state machine */
function _escrowTransition(dealId,newStatus,metadata){
  return sb.auth.getSession().then(function(r){
    if(!r.data||!r.data.session)return Promise.reject(new Error('Not authenticated'));
    return fetch(SB_URL+'/functions/v1/escrow-transition',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+r.data.session.access_token,'apikey':SB_KEY},
      body:JSON.stringify({deal_id:dealId,new_status:newStatus,metadata:metadata||{}})
    });
  }).then(function(r){return r.json();}).then(function(res){
    if(res.error){console.error('[escrow-transition]',res.error);return Promise.reject(new Error(res.error));}
    if(res.escrow){
      var esc=_dbEscrowToLocal(res.escrow);
      if(!S._escrowCache)S._escrowCache={};
      S._escrowCache[dealId]=esc;
      localStorage.setItem('escrow_'+dealId,JSON.stringify(esc));
    }
    return res;
  });
}
function _dbEscrowToLocal(dbRow){
  return{
    status:dbRow.escrow_status||'none',
    amount:Number(dbRow.escrow_amount)||0,
    currency:dbRow.escrow_currency||'USD',
    terms:dbRow.escrow_terms||'50/50',
    confirmDays:dbRow.escrow_confirm_days||7,
    method:dbRow.escrow_method||null,
    fee:Number(dbRow.escrow_fee)||0,
    netAmount:Number(dbRow.escrow_net_amount)||0,
    requestedAt:dbRow.escrow_requested_at||null,
    paidAt:dbRow.escrow_paid_at||null,
    securedAt:dbRow.escrow_secured_at||null,
    shippedAt:dbRow.escrow_shipped_at||null,
    deliveredAt:dbRow.escrow_delivered_at||null,
    releasedAt:dbRow.escrow_released_at||null,
    disputedAt:dbRow.escrow_disputed_at||null,
    stripe_payment_intent:dbRow.stripe_payment_intent||null,
    dispute:dbRow.escrow_dispute||null
  };
}
function _loadEscrowFromDB(){
  if(!S.user)return Promise.resolve();
  return sb.from('orders').select('deal_id, escrow_status, escrow_amount, escrow_currency, escrow_fee, escrow_net_amount, escrow_terms, escrow_method, escrow_confirm_days, escrow_requested_at, escrow_paid_at, escrow_secured_at, escrow_shipped_at, escrow_delivered_at, escrow_released_at, escrow_disputed_at, stripe_payment_intent, escrow_dispute').eq('buyer_id',S.user.id).neq('escrow_status','none').limit(200).then(function(r){
    if(r.data){r.data.forEach(function(row){
      if(!row.deal_id)return;
      var esc=_dbEscrowToLocal(row);
      if(!S._escrowCache)S._escrowCache={};
      S._escrowCache[row.deal_id]=esc;
      localStorage.setItem('escrow_'+row.deal_id,JSON.stringify(esc));
    });}
  }).catch(function(e){console.error('[escrow] buyer load from DB fail:',e);});
}

function _escMethodSelect(method){
  var stripe=document.getElementById('esc-method-stripe');
  var wire=document.getElementById('esc-method-wire');
  if(method==='stripe'){
    if(stripe){stripe.style.borderColor='var(--acc)';stripe.style.background='rgba(0,212,255,.04)';}
    if(wire){wire.style.borderColor='var(--w08)';wire.style.background='transparent';}
  }else{
    if(wire){wire.style.borderColor='var(--acc)';wire.style.background='rgba(0,212,255,.04)';}
    if(stripe){stripe.style.borderColor='var(--w08)';stripe.style.background='transparent';}
  }

function confirmEscrowPay(dealId){
  var escData=_getEscrowStatus(dealId);
  if(!escData||escData.status!=='requested')return;
  var methodEl=document.querySelector('input[name=esc_method]:checked');
  var method=methodEl?methodEl.value:'stripe';

  if(method==='stripe'){
    /* Stripe card payment */
    initiateStripeEscrowPayment(dealId,escData.amount,escData.currency||'USD');
    return;
  }

  /* Wire transfer flow — server-side transition */
  var btn=document.getElementById('escrow-pay-btn');if(btn)btn.disabled=true;
  _escrowTransition(dealId,'buyer_paid',{method:'wire'}).then(function(){
    S.modal=null;S.modalData=null;
    toast(_t('Payment confirmed! Settlement will proceed after delivery is verified.','결제가 확인되었습니다! 배송 확인 후 정산이 진행됩니다.'),'ok',5000);
    render();
  }).catch(function(err){
    if(btn)btn.disabled=false;
    toast(_t('Payment failed: ','결제 실패: ')+err.message,'err');
  });
}

/* Buyer confirms delivery → triggers seller settlement (escrow flow) */
function confirmEscrowDelivery(dealId){
  var escData=_getEscrowStatus(dealId);
  if(!escData||escData.status!=='shipping'){toast(_t('Goods must be shipped before confirming delivery','배송이 완료된 후에만 수령 확인이 가능합니다'),'warn');return;}
  if(!confirm(_t('Confirm that you have received the goods? This will release payment to the seller.','상품을 수령하셨습니까? 셀러에게 대금이 지급됩니다.')))return;
  _escrowTransition(dealId,'delivered').then(function(){
    var deal=S.deals.find(function(d){return d.id===dealId;});
    var matchingId=deal&&deal.matching&&deal.matching.id;
    if(matchingId){
      sb.from('matchings').update({buyer_confirmed_at:new Date().toISOString(),delivered_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq('id',matchingId).catch(function(e){console.error('[escrow] matchings update fail:',e);});
    }
    toast(_t('Delivery confirmed! Payment will be released to the seller.','수령이 확인되었습니다! 셀러에게 대금이 지급됩니다.'),'ok');
    render();
  }).catch(function(err){toast(err.message,'err');});
}

/* Buyer raises dispute */
function raiseEscrowDispute(dealId){
  var escData=_getEscrowStatus(dealId);

function _initSigCanvas(){
  var c=document.getElementById('sig-canvas');if(!c)return;
  var ctx=c.getContext('2d');
  var drawing=false;
  ctx.strokeStyle='#ffffff';ctx.lineWidth=2;ctx.lineCap='round';
  c.onmousedown=function(e){drawing=true;ctx.beginPath();var r=c.getBoundingClientRect();ctx.moveTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));};
  c.onmousemove=function(e){if(!drawing)return;var r=c.getBoundingClientRect();ctx.lineTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));ctx.stroke();};
  c.onmouseup=function(){drawing=false;};
  c.onmouseleave=function(){drawing=false;};
  // Touch support
  c.ontouchstart=function(e){e.preventDefault();drawing=true;ctx.beginPath();var r=c.getBoundingClientRect();var t=e.touches[0];ctx.moveTo((t.clientX-r.left)*(c.width/r.width),(t.clientY-r.top)*(c.height/r.height));};
  c.ontouchmove=function(e){e.preventDefault();if(!drawing)return;var r=c.getBoundingClientRect();var t=e.touches[0];ctx.lineTo((t.clientX-r.left)*(c.width/r.width),(t.clientY-r.top)*(c.height/r.height));ctx.stroke();};
  c.ontouchend=function(){drawing=false;};
  c._sigCtx=ctx;
}

function clearSigCanvas(){
  var c=document.getElementById('sig-canvas');if(!c)return;
  var ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
}

function submitDocSignature(docId){
  var c=document.getElementById('sig-canvas');
  if(c){var ctx=c.getContext('2d');var imgData=ctx.getImageData(0,0,c.width,c.height);var hasDrawing=false;for(var i=3;i<imgData.data.length;i+=4){if(imgData.data[i]>0){hasDrawing=true;break;}}
    if(!hasDrawing){toast(_t('Please draw your signature first','먼저 서명을 그려주세요'),'warn');return;}}
  var sigs=_getDocSignatures();
  var sigData=c?c.toDataURL():null;
  sigs[docId]=Object.assign(sigs[docId]||{},{status:'signed',signedAt:new Date().toISOString(),signatureData:sigData});
  localStorage.setItem('doc_signatures',JSON.stringify(sigs));
  /* Sync signature to Supabase so seller can see it */
  if(S.user&&docId){
    var _bids=getBuyerIds();
    sb.from('documents').update({
      status:'signed',
      signed_at:new Date().toISOString(),
      signed_by:S.user.id,
      signature_data:sigData
    }).eq('id',docId).in('buyer_id',_bids.length?_bids:['__none__']).then(function(r){
      if(r.error){console.warn('Signature DB sync failed:',r.error.message);toast(_t('Signature saved locally. Cloud sync will retry.','서명이 로컬에 저장되었습니다. 클라우드 동기화를 재시도합니다.'),'warn');}
    }).catch(function(){toast(_t('Signature saved locally only. Check your connection.','서명이 로컬에만 저장되었습니다. 연결 상태를 확인해 주세요.'),'warn');});
  }
  S.modal=null;S.modalData=null;
  toast(_t('Document signed successfully!','서류 서명이 완료되었습니다!'),'ok');
  render();
}

      break;
    case'quotation':
      h+='<div style="font-size:12px;color:var(--w60)">'+_t('The seller has shared a quotation. Review the documents below, then accept or request changes.','셀러가 견적을 공유했습니다. 아래 서류를 검토한 후 수락하거나 변경을 요청하세요.')+'</div>';
      // Show PI summary (info only, actions via chat chips)
      var piDocs=deal.documents.filter(function(d){return d.doc_type==='pi';});
      if(piDocs.length){
        h+='<div style="margin-top:8px;padding:10px;background:rgba(0,212,255,.05);border-radius:8px;border:1px solid rgba(0,212,255,.15)">';
        var latestPI=piDocs[0];
        var piContent=null;try{piContent=JSON.parse(latestPI.content);}catch(e){}
        if(piContent){
          h+='<div style="font-size:12px;font-weight:700;margin-bottom:6px">&#x1F4B0; Proforma Invoice — '+esc(latestPI.doc_number||'')+'</div>';
          if(piContent.items&&piContent.items.length){
            h+='<div style="font-size:11px;margin-bottom:6px">';
            piContent.items.forEach(function(it){h+='<div>'+esc(it.name||'Item')+' × '+(it.qty||0)+' '+esc(it.unit||'PCS')+' @ $'+(parseFloat(it.unit_price)||0).toFixed(2)+' = <strong>$'+((parseFloat(it.qty)||0)*(parseFloat(it.unit_price)||0)).toFixed(2)+'</strong></div>';});
            h+='<div style="margin-top:4px;font-weight:700;color:var(--acc)">Total: $'+(piContent.total||0).toFixed(2)+'</div>';
            h+='</div>';
          }
          if(piContent.payment_terms)h+='<div style="font-size:11px;color:var(--w40)">Payment: '+esc(piContent.payment_terms)+'</div>';
          if(piContent.incoterms)h+='<div style="font-size:11px;color:var(--w40)">Incoterms: '+esc(piContent.incoterms)+'</div>';
        }
        h+='</div>';
      }
      break;
    case'sample':
      h+='<div style="font-size:12px;color:var(--w60)">'+_t('Sample stage — track your sample request status below. Once you receive and approve the sample, we can proceed to negotiation.','샘플 단계 — 아래에서 샘플 요청 상태를 확인하세요. 샘플을 수령하고 승인하면 협상 단계로 진행됩니다.')+'</div>';
      var deliveredSamples=(deal.dealSamples||[]).filter(function(s){return s.status==='delivered';});
      if(deliveredSamples.length){
        h+='<div style="margin-top:8px;font-size:11px;color:var(--ok)">'+_t('Sample delivered — use chat actions below to approve or request changes.','샘플이 배송되었습니다 — 아래 채팅 액션으로 승인하거나 변경을 요청하세요.')+'</div>';
      }
      break;
    case'negotiation':
      h+='<div style="font-size:12px;color:var(--w60)">'+_t('Finalize pricing, MOQ, delivery schedule, and payment terms with the seller. Once agreed, the seller will create the order.','셀러와 가격, MOQ, 납기, 결제 조건을 최종 확정하세요. 합의되면 셀러가 주문을 생성합니다.')+'</div>';
      break;
    case'order':
      h+='<div style="font-size:12px;color:var(--w60)">'+_t('Your order has been confirmed! Track payment milestones and production status below.','주문이 확정되었습니다! 아래에서 결제 단계와 생산 상태를 확인하세요.')+'</div>';

      }
      break;
    case'production':
      h+='<div style="font-size:12px;color:var(--w60)">'+_t('Your order is being manufactured. The seller will update progress and notify you when ready for shipment.','주문이 생산 중입니다. 셀러가 진행 상황을 업데이트하고 출하 준비가 되면 알려드립니다.')+'</div>';
      break;
    case'shipping':
      h+='<div style="font-size:12px;color:var(--w60)">'+_t('Your shipment is on its way! Track delivery status below.','배송이 진행 중입니다! 아래에서 배송 상태를 확인하세요.')+'</div>';

  }

  // Documents section
  if((deal.documents||[]).length){

      h+='<span class="badge badge-acc" style="font-size:10px">'+esc(doc.doc_type||'').toUpperCase()+'</span>';
      h+='<div style="flex:1;font-size:12px"><div style="font-weight:600">'+esc(doc.doc_number||typeNames[doc.doc_type]||'Document')+'</div><div style="color:var(--w40)">'+formatDate(doc.created_at)+'</div></div>';

      h+='</div>';
    });
    h+='</div>';
  }

  // Samples section
  if((deal.dealSamples||[]).length){
    h+='<div class="stage-card"><div class="stage-card-title">&#x1F4E6; '+_t('Samples','샘플')+' ('+(deal.dealSamples||[]).length+')</div>';

      if(s.feedback_rating)h+='<span style="color:var(--acc)">'+('&#x2B50;'.repeat(s.feedback_rating))+'</span>';

  // Sample Request — available for matched/negotiation/sample stages when seller is known

      h+='<div><label style="font-size:11px;color:var(--w40);display:block;margin-bottom:3px">'+_t('Quantity','수량')+'</label>';

      h+='<option value="economy">'+_t('Economy','이코노미')+'</option>';
      h+='<option value="seller_choice">'+_t('Seller\'s Choice','셀러 선택')+'</option>';
      h+='</select></div>';
      h+='<div><label style="font-size:11px;color:var(--w40);display:block;margin-bottom:3px">'+_t('Notes (optional)','비고 (선택사항)')+'</label>';

      h+='</div>';
      h+='<div style="display:flex;gap:8px;margin-top:10px">';
      h+='<button class="btn btn-pri btn-sm" onclick="B.submitSampleReq(\''+(deal.matching&&deal.matching.id||'')+'\')"'+(deal.matching&&deal.matching.id?'':' disabled')+'>&#x1F4E8; '+_t('Submit Request','요청 제출')+'</button>';

  if(!(deal.documents||[]).length&&!(deal.dealSamples||[]).length&&!deal.order&&!deal.shipment&&deal.stage!=='inquiry'){

  var canReview=deal.stage==='completed'||deal.stage==='delivered';
  if(deal.order&&(deal.order.status==='completed'||deal.order.status==='delivered'))canReview=true;

      var rvTags=['Fast Response','Good Quality','Fair Price','Professional','Reliable','Great Communication'];
      h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin:8px 0">';
      rvTags.forEach(function(tag){

      });
      h+='</div>';
      h+='<button class="btn btn-pri btn-sm" onclick="B.submitReview(\''+(_smid3||'')+'\')" style="margin-top:6px"'+(S.reviewDraft.rating&&_smid3?'':' disabled')+'>Submit Review</button>';
    }
    h+='</div>';
  }

  return h;
}

function loadReviews(){
  if(!S.user)return;
  sb.from('reviews').select('*').eq('reviewer_id',S.user.id).order('created_at',{ascending:false}).limit(100).then(function(r){
    S.reviews=r.data||[];render();
  });
}

function loadProductReviews(){
  sb.from('reviews').select('*').order('created_at',{ascending:false}).limit(100).then(function(r){
    S._productReviews=r.data||[];
  }).catch(function(){S._productReviews=[];});
}

function setReviewStar(n){
  S.reviewDraft.rating=n;render();
}

function toggleReviewTag(tag){
  var idx=S.reviewDraft.tags.indexOf(tag);
  if(idx>-1)S.reviewDraft.tags.splice(idx,1);
  else S.reviewDraft.tags.push(tag);
  render();
}

function submitReview(matchingId){
  if(!S.user||!S.reviewDraft.rating)return;
  var title=B._rvTitle||S.reviewDraft.title||'';
  var content=B._rvContent||S.reviewDraft.content||'';
  // Find product_id and company from the deal/matching context
  var _deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  var _pid=_deal&&_deal.matching?(_deal.matching.product_id||null):null;
  var _company=_deal?(_deal.sellerId||null):null;
  sb.from('reviews').insert({
    reviewer_id:S.user.id,
    reviewer_role:'buyer',
    target_id:matchingId,
    target_type:'matching',
    review_type:'product',
    product_id:_pid,
    target_company:_company,
    buyer_country:S.user.country||null,
    rating:S.reviewDraft.rating,
    title:title||null,
    content:content||null,
    tags:S.reviewDraft.tags.length?S.reviewDraft.tags:null,
    is_public:true
  }).then(function(r){
    if(r.error){toast(_t('Failed:','실패:')+' '+r.error.message,'err');return;}
    toast(_t('Review submitted! Thank you.','리뷰가 제출되었습니다! 감사합니다.'),'ok');
    S.reviewDraft={rating:0,title:'',content:'',tags:[]};
    B._rvTitle='';B._rvContent='';
    loadReviews();
  });
}

/* === DEAL ACTIONS (BUYER SIDE) === */
function requestQuote(matchingId){
  if(S._submitting)return;S._submitting=true;
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal){S._submitting=false;return;}
  if(!deal.buyerLinkId||!deal.sellerId){toast(_t('Deal is not yet matched. Please wait for seller response.','거래가 아직 매칭되지 않았습니다. 셀러 응답을 기다려 주세요.'),'warn');S._submitting=false;return;}
  sb.from('messages').insert({
    buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
    body:'Hi! I\'d like to request a formal quotation (Proforma Invoice) for this product. Please include pricing, MOQ, lead time, and payment terms.',
    message_type:'text',channel:'platform',direction:'inbound'
  }).then(function(){
    S._submitting=false;
    toast(_t('Quotation request sent to seller!','셀러에게 견적 요청이 전송되었습니다!'),'ok');
    render();
  }).catch(function(e){S._submitting=false;console.error('[requestQuote]',e);toast(_t('Failed to send request','요청 전송 실패'),'err');});
}

function acceptQuote(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  sb.from('matchings').update({status:'negotiation'}).eq('id',matchingId).then(function(){
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Quotation Accepted] I accept the quotation. Let\'s proceed with the next steps.',
      message_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){});
    if(deal.sellerId)_sendNotification(deal.sellerId,'deal','Quotation Accepted',esc(S.user.company_name||S.user.display_name||'Buyer')+' accepted your quotation',{link_page:'deals',link_id:deal.id});
    toast(_t('Quotation accepted! Moving to negotiation stage.','견적이 수락되었습니다! 협상 단계로 이동합니다.'),'ok');
    deal.matching.status='negotiation';
    buildDeals();render();
  });
}

function confirmSampleOk(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  sb.from('matchings').update({status:'negotiation'}).eq('id',matchingId).then(function(){
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Sample Approved] The sample quality meets our requirements. Let\'s finalize the order terms.',
      message_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){});
    if(deal.sellerId)_sendNotification(deal.sellerId,'deal','Sample Approved',esc(S.user.company_name||S.user.display_name||'Buyer')+' approved the sample',{link_page:'deals',link_id:deal.id});
    toast(_t('Sample approved! Moving to negotiation.','샘플이 승인되었습니다! 협상 단계로 이동합니다.'),'ok');
    deal.matching.status='negotiation';
    buildDeals();render();
  });
}

function confirmReadyToOrder(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  if(!S._orderReadySent)S._orderReadySent={};
  S._orderReadySent[matchingId]=true;
  sb.from('messages').insert({
    buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
    body:'[Ready to Order] We\'re ready to proceed with the order. Please create the purchase order with the agreed terms.',
    message_type:'system',channel:'platform',direction:'inbound'
  }).then(function(){
    if(deal.sellerId)_sendNotification(deal.sellerId,'deal','Ready to Order',esc(S.user.company_name||S.user.display_name||'Buyer')+' is ready to place an order',{link_page:'deals',link_id:deal.id});
    toast(_t('Order readiness confirmed! The seller will create the order.','주문 준비가 확인되었습니다! 셀러가 주문을 생성합니다.'),'ok');
    render();
  });
}

function confirmDelivery(matchingId){
  var deal=S.deals.find(function(d){return d.matching&&d.matching.id===matchingId;});
  if(!deal)return;
  /* Payment validation before completion */
  if(deal.order&&deal.order.payment_status&&deal.order.payment_status!=='paid'){
    toast(_t('Payment is not completed yet. Please complete payment before confirming delivery.','결제가 아직 완료되지 않았습니다. 수령 확인 전에 결제를 완료해 주세요.'),'err');return;
  }
  sb.from('matchings').update({status:'completed'}).eq('id',matchingId).then(function(){
    if(deal.order)sb.from('orders').update({status:'completed'}).eq('id',deal.order.id).then(function(){});
    // Auto-update escrow if active
    var _escDlv=_getEscrowStatus(deal.id);
    if(_escDlv&&(_escDlv.status==='shipping'||_escDlv.status==='secured'||_escDlv.status==='buyer_paid')){
      _escDlv.status='delivered';_escDlv.deliveredAt=new Date().toISOString();_setEscrow(deal.id,_escDlv);
    }
    sb.from('messages').insert({
      buyer_id:deal.buyerLinkId,user_id:deal.sellerId,sender_type:'buyer',
      body:'[Delivery Confirmed] Goods received successfully. Thank you!',
      message_type:'system',channel:'platform',direction:'inbound'
    }).then(function(){
      if(deal.sellerId)_sendNotification(deal.sellerId,'deal','Delivery Confirmed',esc(S.user.company_name||S.user.display_name||'Buyer')+' confirmed receipt. Deal completed!',{link_page:'deals',link_id:deal.id});
      toast(_t('Delivery confirmed! Deal completed.','수령이 확인되었습니다! 거래 완료.'),'ok');
      deal.matching.status='completed';
      buildDeals();render();
    });
  });
}

  document.querySelectorAll('.sf-aspect.btn-pri').forEach(function(b){selectedAspects.push(b.getAttribute('data-aspect'));});

  var feedbackText=comment;
  if(selectedAspects.length)feedbackText=(selectedAspects.join(', ')+(comment?' | '+comment:''));
  var upd={
    feedback_rating:rating,
    feedback:feedbackText||null,
    updated_at:new Date().toISOString()
  };
  sb.from('samples').update(upd).eq('id',d.sampleId).then(function(r){
    if(r.error){toast(_t('Failed to submit feedback','피드백 제출 실패'),'err');return;}
    toast(_t('Thank you for your feedback!','피드백 감사합니다!'),'ok');
    var sample=S.samples.find(function(s){return s.id===d.sampleId;});
    if(sample){sample.feedback_rating=rating;sample.feedback=feedbackText;}

    }
    S.modal=null;S.modalData=null;render();
  });
}

function cancelSampleReq(sampleId){

  sb.from('samples').delete().eq('id',sampleId).eq('status','requested').then(function(r){

    toast(_t('Sample request cancelled','샘플 요청이 취소되었습니다'),'ok');
    render();
  });
}

function submitStandaloneSample(){
  var d=S.modalData||{};
  var qty=parseInt(document.getElementById('ssa-qty').value)||1;
  var addr=(document.getElementById('ssa-addr').value||'').trim();
  var method=document.getElementById('ssa-method').value;
  var notes=(document.getElementById('ssa-notes').value||'').trim();
  if(!addr){toast(_t('Please enter a shipping address','배송 주소를 입력해 주세요'),'err');return;}

  var sellerId=d.sellerId;
  var buyerLink=S.buyerLinks.find(function(b){return b.registered_by===sellerId;});
  if(!buyerLink&&S.buyerLinks.length)buyerLink=S.buyerLinks[0];

  function _doInsert(bid){
    sb.from('samples').insert({
      user_id:sellerId,
      buyer_id:bid,
      product_id:d.productId||null,
      status:'requested',
      quantity:qty,
      shipping_method:method,
      notes:(addr?'Ship to: '+addr:'')+(notes?'\n'+notes:'')
    }).then(function(r){
      if(r.error){toast(_t('Failed to send request','요청 전송 실패'),'err');return;}
      toast(_t('Sample request sent! The manufacturer will review it.','샘플 요청이 전송되었습니다!'),'ok');
      loadSamples();
      // Send chat notification
      sb.from('messages').insert({
        buyer_id:bid,user_id:sellerId,sender_type:'buyer',
        body:'[Sample Request] '+(d.productName?d.productName+' | ':'')+'Qty: '+qty+' | Shipping: '+method+(notes?' | '+notes:''),
        message_type:'system',channel:'platform',direction:'inbound'
      }).then(function(){});
      // Notify seller
      _sendNotification(sellerId,'sample',_t('New Sample Request','새 샘플 요청'),esc(S.user.company_name||S.user.display_name||'Buyer')+_t(' requested a sample.',' 님이 샘플을 요청했습니다.'),{link_page:'samples'});
      S.modal=null;S.modalData=null;render();
    });
  }

  if(buyerLink){
    _doInsert(buyerLink.id);
  } else {
    sb.from('buyers').insert({
      company_name:S.user.user_metadata&&S.user.user_metadata.company_name||S.user.email,
      email:S.user.email,buyer_user_id:S.user.id,registered_by:sellerId,status:'active'
    }).select().single().then(function(r){
      if(r.error){toast(_t('Failed','실패'),'err');return;}
      S.buyerLinks.push(r.data);
      _doInsert(r.data.id);
    });
  }
}


/* === MESSAGES / CHAT === */
function loadConversations(){
  var bids=getBuyerIds();if(!bids.length)return;
  sb.from('messages').select('*').in('buyer_id',bids).order('created_at',{ascending:false}).limit(200).then(function(r){
    var msgs=r.data||[];
    var convMap={};
    msgs.forEach(function(m){
      var key=m.buyer_id+'_'+m.user_id;
      if(!convMap[key]){convMap[key]={buyerLinkId:m.buyer_id,sellerId:m.user_id,lastMsg:m,unread:0,msgs:[]};}
      convMap[key].msgs.push(m);
      if(!m.is_read&&m.sender_type!=='buyer'&&!m.read_at)convMap[key].unread++;
    });
    S.conversations=Object.values(convMap).sort(function(a,b){return new Date(b.lastMsg.created_at)-new Date(a.lastMsg.created_at);});
    S.chatUnread=S.conversations.reduce(function(s,c){return s+c.unread;},0);
    render();
  });
}

function _getSellerInitials(sellerId){
  var s=S.sellerInfo[sellerId]||{};
  var name=s.name_en||s.name_ko||s.company_name||'S';
  var words=name.trim().split(/\s+/);
  if(words.length>=2)return(words[0].charAt(0)+words[1].charAt(0)).toUpperCase();
  return name.substring(0,2).toUpperCase();
}
function _getSellerAvatarColor(sellerId){
  var colors=['#00D4FF','#FF6B6B','#FFB800','#00E676','#A855F7','#FF8C00','#4ECDC4','#E040FB'];
  var hash=0;for(var i=0;i<sellerId.length;i++)hash=((hash<<5)-hash)+sellerId.charCodeAt(i);
  return colors[Math.abs(hash)%colors.length];
}
function _getSellerCountry(sellerId){
  var s=S.sellerInfo[sellerId]||{};
  return s.country||'';
}
function _chatMsgPrefix(msg){
  if(!msg)return '';
  var body=msg.body||'';
  var mtype=msg.message_type||'text';
  if(mtype==='file')return _t('File','파일')+' ';
  if(mtype==='system'){
    if(body.indexOf('[서류 전송]')>-1||body.indexOf('Document')>-1||body.indexOf('PI-')>-1||body.indexOf('CI-')>-1)return _t('Document','서류')+' ';
    if(body.indexOf('[단계 전환]')>-1||body.indexOf('Stage')>-1)return _t('Stage update','단계 변경')+' ';
    if(body.indexOf('[주문 확정]')>-1||body.indexOf('Order')>-1)return _t('Order','주문')+' ';
    return _t('System','시스템')+' ';
  }
  return '';
}
function setChatConvFilter(v){S._chatConvFilter=v;render();}
function toggleChatAutoTranslate(){
  S._chatAutoTranslate=!S._chatAutoTranslate;
  try{localStorage.setItem('whistle_buyer_chat_auto_translate',S._chatAutoTranslate?'1':'0');}catch(e){}
  toast(S._chatAutoTranslate?_t('Auto-translate ON','자동 번역 ON'):_t('Auto-translate OFF','자동 번역 OFF'),S._chatAutoTranslate?'ok':'info');
  if(S._chatAutoTranslate&&S.chatMessages.length){
    var tl=_userLang||'en';
    S.chatMessages.forEach(function(m){
      if(m.sender_type!=='buyer'&&m.message_type!=='system'&&!getTranslation(m.id,tl)){
        translateMsg(m.id,tl);
      }
    });
  }
  render();
}
function _loadChatAutoTranslate(){
  try{var v=localStorage.getItem('whistle_buyer_chat_auto_translate');if(v==='1')S._chatAutoTranslate=true;}catch(e){}
}
function _getCachedTranslation(chatId,msgId,tl){
  try{var cache=JSON.parse(localStorage.getItem('whistle_translations_'+chatId)||'{}');return cache[msgId+'_'+tl]||null;}catch(e){return null;}
}
function _setCachedTranslation(chatId,msgId,tl,text){
  try{var key='whistle_translations_'+chatId;var cache=JSON.parse(localStorage.getItem(key)||'{}');cache[msgId+'_'+tl]=text;localStorage.setItem(key,JSON.stringify(cache));}catch(e){}
}

/* Enhanced chat bubble with avatars and grouped messages */
function _renderEnhancedBubble(m,isMine,isNewGroup){
  var h='';
  if(!isMine&&isNewGroup){
    var initials=_getSellerInitials(m.user_id);
    var avColor=_getSellerAvatarColor(m.user_id);
    var sCountry=_getSellerCountry(m.user_id);
    var flag=sCountry?_countryFlag(sCountry):'';
    var sellerName=getSellerName(m.user_id);
    h+='<div style="display:flex;align-items:flex-start;gap:8px;margin-top:8px">';
    h+='<div style="width:28px;height:28px;border-radius:8px;background:'+avColor+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--bg);flex-shrink:0;margin-top:2px">'+esc(initials)+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="font-size:10px;color:var(--w40);margin-bottom:2px;font-weight:600">'+(flag?flag+' ':'')+esc(sellerName)+'</div>';
    h+=_renderBubbleContent(m,isMine);
    h+='</div></div>';
  } else if(!isMine&&!isNewGroup){
    h+='<div style="display:flex;align-items:flex-start;gap:8px">';
    h+='<div style="width:28px;flex-shrink:0"></div>';
    h+='<div style="flex:1;min-width:0">';
    h+=_renderBubbleContent(m,isMine);
    h+='</div></div>';
  } else {
    h+=_renderBubbleContent(m,isMine);
  }
  return h;
}

/* Bubble content with read receipts */
function _renderBubbleContent(m,isMine){
  var body=m.body||'';
  var tgt=isMine?'ko':(_userLang||'en');
  var tr=getTranslation(m.id,tgt);
  var h='<div class="chat-bubble '+(isMine?'mine':'theirs')+'" style="font-size:12px">';
  var _fUrl=m.file_url||(m.metadata&&m.metadata.file_url)||'';var _fName=(m.metadata&&m.metadata.file_name)||body||'File';var _fIsImg=m.metadata&&m.metadata.is_image;
  if(m.message_type==='file'&&_fUrl&&/^https?:\/\//.test(_fUrl)){if(_fIsImg){h+='<img src="'+esc(_fUrl)+'" style="max-width:200px;max-height:200px;border-radius:8px;margin-bottom:4px;cursor:pointer" onclick="window.open(\''+esc(_fUrl)+'\',\'_blank\')">';}else{h+='&#x1F4CE; <a href="'+esc(_fUrl)+'" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">'+esc(_fName)+'</a>';}}else if(m.message_type==='file'){h+='&#x1F4CE; '+esc(_fName);}
  else if(m.message_type==='doc'){h+='&#x1F4C4; '+esc(body||'Document shared');}
  else{
    if(tr&&tr!=='loading'){
      h+='<div style="font-size:12px">'+esc(tr)+'</div>';
      h+='<div style="font-size:9px;color:'+(isMine?'rgba(0,0,0,.4)':'var(--w20)')+';margin-top:3px;font-style:italic">Translated</div>';
      h+='<div style="font-size:10px;margin-top:2px;opacity:.6;border-top:1px solid '+(isMine?'rgba(0,0,0,.1)':'var(--w08)')+';padding-top:2px">'+esc(body)+'</div>';
    } else {
      h+=esc(body);
    }
  }
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px;gap:6px">';
  h+='<span style="font-size:8px;opacity:.5">'+new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</span>';
  // Read receipt for buyer-sent messages
  if(isMine&&!String(m.id).startsWith('temp_')){
    var isRead=m.read_at||m.is_read;
    h+='<span style="font-size:9px;color:'+(isRead?'var(--pri)':'var(--w20)')+'">'+_t(isRead?'Read':'Sent',isRead?'읽음':'전송됨')+'</span>';
  }
  if(body&&!String(m.id).startsWith('tmp_')&&!String(m.id).startsWith('temp_')){
    if(tr==='loading'){
      h+='<span style="font-size:9px;opacity:.5">translating...</span>';
    } else {
      h+='<span style="font-size:9px;cursor:pointer;opacity:.6;'+(tr?'color:'+(isMine?'rgba(0,0,0,.7)':'var(--pri)'):'')
        +'" onclick="event.stopPropagation();B.translateMsg(\''+m.id+'\',\''+(isMine?'ko':(_userLang||'en'))+'\')">'
        +(tr?'Original':'Translate')+'</span>';
    }
  }
  h+='</div></div>';
  return h;
}

function openChat(buyerLinkId,sellerId){
  S.currentChat={buyerLinkId:buyerLinkId,sellerId:sellerId};
  S.chatMessages=[];render();
  sb.from('messages').select('*').eq('buyer_id',buyerLinkId).eq('user_id',sellerId).order('created_at',{ascending:true}).limit(200).then(function(r){
    S.chatMessages=r.data||[];render();
    setTimeout(scrollChatBottom,100);
    // Mark unread as read
    var unread=(r.data||[]).filter(function(m){return m.sender_type!=='buyer'&&!m.read_at;});
    if(unread.length){
      sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).in('id',unread.map(function(m){return m.id;})).then(function(){loadConversations();});
    }
    // Auto-translate existing seller messages when auto-translate is on
    if(S._chatAutoTranslate){
      var tl=_userLang||'en';
      (r.data||[]).filter(function(m){return m.sender_type!=='buyer'&&m.message_type!=='system'&&!getTranslation(m.id,tl);}).slice(-15).forEach(function(m){
        translateMsg(m.id,tl);
      });
    }
  });
  initChatRealtime(buyerLinkId);
}

function closeChat(){S.currentChat=null;if(S._chatChannel){sb.removeChannel(S._chatChannel);S._chatChannel=null;}render();}

function sendChat(){
  var inp=document.getElementById('chatInput');if(!inp||!inp.value.trim())return;
  var body=inp.value.trim();inp.value='';inp.style.height='auto';
  var msg={user_id:S.currentChat.sellerId,buyer_id:S.currentChat.buyerLinkId,body:body,sender_type:'buyer',message_type:'text',channel:'platform',direction:'inbound'};
  S.chatMessages.push(Object.assign({id:'temp_'+Date.now(),created_at:new Date().toISOString()},msg));
  render();scrollChatBottom();
  sb.from('messages').insert(msg).select().single().then(function(r){
    if(r.error){toast(_t('Failed to send','전송 실패'),'err');return;}
    S.chatMessages=S.chatMessages.filter(function(m){return!m.id.toString().startsWith('temp_');});
    S.chatMessages.push(r.data);render();scrollChatBottom();
  });
}

function chatAttachFile(input){
  if(!input.files||!input.files[0]||!S.currentChat)return;
  var file=input.files[0];
  if(file.size>10*1024*1024){toast(_t('Max file size is 10MB','최대 파일 크기는 10MB입니다'),'warn');return;}
  var ext=file.name.split('.').pop().toLowerCase();
  var path='chat/'+S.user.id+'/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  toast(_t('Uploading...','업로드 중...'),'info');
  sb.storage.from('documents').upload(path,file).then(function(r){
    if(r.error){toast('Upload failed: '+r.error.message,'err');return;}
    var url=sb.storage.from('documents').getPublicUrl(path).data.publicUrl;
    var isImg=/^(jpg|jpeg|png|gif|webp)$/i.test(ext);
    var body=isImg?'[Image] '+file.name:'[File] '+file.name;
    var msg={user_id:S.currentChat.sellerId,buyer_id:S.currentChat.buyerLinkId,body:body,sender_type:'buyer',message_type:'file',metadata:{file_url:url,file_name:file.name,file_type:ext,is_image:isImg},channel:'platform',direction:'inbound'};
    S.chatMessages.push(Object.assign({id:'temp_'+Date.now(),created_at:new Date().toISOString()},msg));
    render();scrollChatBottom();
    sb.from('messages').insert(msg).select().single().then(function(r){
      if(r.error){toast(_t('Send failed','전송 실패'),'err');return;}
      S.chatMessages=S.chatMessages.filter(function(m){return!m.id.toString().startsWith('temp_');});
      S.chatMessages.push(r.data);toast(_t('File sent','파일이 전송되었습니다'),'ok');render();scrollChatBottom();
    });
  });
  input.value='';
}

function initChatRealtime(buyerLinkId){
  if(S._chatChannel){sb.removeChannel(S._chatChannel);S._chatChannel=null;}
  S._chatChannel=sb.channel('buyer-chat-'+buyerLinkId)
  .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'buyer_id=eq.'+buyerLinkId},function(payload){
    var m=payload.new;
    if(S.currentChat&&S.currentChat.buyerLinkId===buyerLinkId){
      if(!S.chatMessages.find(function(x){return x.id===m.id;})){
        S.chatMessages.push(m);render();scrollChatBottom();
        // Auto-translate incoming seller messages
        if(S._chatAutoTranslate&&m.sender_type!=='buyer'&&m.message_type!=='system'){
          var tl=_userLang||'en';
          if(!getTranslation(m.id,tl))translateMsg(m.id,tl);
        }
      }
      if(m.sender_type!=='buyer'){sb.from('messages').update({read_at:new Date().toISOString(),is_read:true}).eq('id',m.id).then(function(){});}
    } else {S.chatUnread++;render();}
  })
  .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:'buyer_id=eq.'+buyerLinkId},function(payload){
    var updated=payload.new;
    if(S.currentChat&&S.currentChat.buyerLinkId===buyerLinkId){
      for(var i=0;i<S.chatMessages.length;i++){
        if(S.chatMessages[i].id===updated.id){
          S.chatMessages[i]=updated;
          render();
          break;
        }
      }
    }
  })
  .subscribe(function(status,err){if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){console.error('Realtime subscription error:',status,err);}});
}

function scrollChatBottom(){var el=document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;}

/* === ORDERS === */
function loadOrders(){
  var bids=getBuyerIds();if(!bids.length)return;
  sb.from('orders').select('*').in('buyer_id',bids).order('created_at',{ascending:false}).limit(200).then(function(r){
    S.orders=r.data||[];render();
    loadShipments();
    initOrderRealtime(bids);
  });
}

/* === REAL-TIME ORDER/SHIPMENT SYNC (Fix #9) === */
function initOrderRealtime(bids){
  if(S._orderRealtimeCh)return;
  if(!bids||!bids.length)return;
  S._orderRealtimeCh=sb.channel('buyer-order-sync')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'orders'},function(payload){
      _handleOrderUpdate(payload.new);
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'shipments'},function(payload){
      _handleShipmentInsert(payload.new);
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'shipments'},function(payload){
      _handleShipmentUpdate(payload.new);
    })
    .subscribe(function(status,err){if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){console.error('Realtime subscription error:',status,err);}});
}

function _handleOrderUpdate(updated){
  if(!updated||!updated.id)return;
  var bids=getBuyerIds();
  var isMine=bids.indexOf(updated.buyer_id)!==-1;
  if(!isMine)return;
  var prev=S.orders.find(function(o){return o.id===updated.id;});
  var prevStatus=prev?prev.status:'';
  if(prev){for(var k in updated)prev[k]=updated[k];}
  else{S.orders.unshift(updated);}
  S._orderNotifCount=(S._orderNotifCount||0)+1;
  render();
  if(prevStatus!==updated.status){
    _showOrderToast(updated);
    _notifyOrderChange(updated);
  }
}

function _showOrderToast(order){
  var labels={
    confirmed:_t('Order confirmed by seller','판매자가 주문을 확인했습니다'),
    production:_t('Order is in production','주문이 생산 중입니다'),
    shipped:_t('Order has been shipped!','주문이 출하되었습니다!'),
    delivered:_t('Order delivered','주문이 도착했습니다'),
    completed:_t('Order completed','주문이 완료되었습니다'),
    cancelled:_t('Order has been cancelled','주문이 취소되었습니다')
  };
  var msg=labels[order.status];
  if(!msg)msg=_t('Order status updated: ','주문 상태 변경: ')+order.status;
  var num=order.order_number||order.id.substring(0,8);
  var type=order.status==='cancelled'?'err':'ok';
  if(order.status==='shipped')type='info';
  toast('📦 #'+num+' — '+msg,type,5000);
}

function _notifyOrderChange(order){
  if(!S.user)return;
  var events=['shipped','delivered','completed'];
  if(events.indexOf(order.status)===-1)return;
  var num=order.order_number||order.id.substring(0,8);
  var title=_t('Order Update','주문 업데이트');
  var body='#'+num+': '+order.status;
  _sendNotification(S.user.id,'order',title,body,{
    link_page:'orders',link_id:order.id
  });
  _showWebNotif(title,body,'order-'+order.id);
}

function _handleShipmentInsert(shipment){
  if(!shipment)return;
  var orderIds=S.orders.map(function(o){return o.id;});
  if(orderIds.indexOf(shipment.order_id)===-1)return;
  S.shipments.unshift(shipment);
  S._orderNotifCount=(S._orderNotifCount||0)+1;
  render();
  var num=shipment.tracking_number||'';
  toast('🚢 '+_t('New shipment created','새 배송이 생성되었습니다')+(num?' — '+num:''),'info',5000);
}

function _handleShipmentUpdate(updated){
  if(!updated||!updated.id)return;
  var idx=S.shipments.findIndex(function(s){return s.id===updated.id;});
  if(idx===-1)return;
  S.shipments[idx]=updated;
  render();
  if(updated.status==='delivered'){
    toast('🚢 '+_t('Shipment delivered!','배송이 도착했습니다!'),'ok',5000);
  }
}

/* Extract product info from an order + linked deal */
function _extractOrderProduct(o, deal) {
  var items = o.items || [];
  if (items.length) {
    var first = items[0];
    return {
      name: first.name || first.product_name || '',
      image: first.image_url || first.image || '',
      qty: first.qty || first.quantity || '',
      price: first.unit_price || first.price || ''
    };
  }
  if (deal && deal.product_name) {
    return {
      name: deal.product_name,
      image: deal.product_image || '',
      qty: '', price: ''
    };
  }
  return { name: '', image: '', qty: '', price: '' };
}

/* Extract product info from a deal */
function _extractDealProduct(d) {
  var name = d.product_name || d.title || '';
  var image = d.product_image || '';
  var qty = '';
  var price = '';
  if (d.matching) {
    if (d.matching.product_name) name = d.matching.product_name;
    if (d.matching.product_image) image = d.matching.product_image;
    if (d.matching.quantity) qty = d.matching.quantity;
    if (d.matching.quoted_price) price = d.matching.quoted_price;
  }
  if (d.order && d.order.items && d.order.items.length) {
    var fi = d.order.items[0];
    if (!name) name = fi.name || fi.product_name || '';
    if (!image) image = fi.image_url || fi.image || '';
    qty = fi.qty || fi.quantity || qty;
    price = fi.unit_price || fi.price || price;
  }
  return { name: name, image: image, qty: qty, price: price };
}

function pgOrders(){
  var h='';
  if(!S.buyerLinks.length){return '<div style="text-align:center;padding:60px;color:var(--w40)"><div style="font-size:36px;margin-bottom:12px">&#x1F4E6;</div><p>'+_t('Submit an inquiry to receive orders from sellers.','문의를 제출하면 판매자로부터 주문을 받을 수 있습니다.')+'</p><button class="btn btn-pri btn-sm" onclick="B.nav(\'search\')" style="margin-top:16px;font-size:13px">&#x1F50D; '+_t('Search Products','제품 검색')+'</button></div>';}

  // Build unified order list: formal orders + deals at order stage or beyond
  var unified=[];
  // 1) Formal orders from orders table
  var usedDealIds={};
  S.orders.forEach(function(o){
    var linkedDeal=S.deals.find(function(d){return d.order&&d.order.id===o.id;});
    if(linkedDeal)usedDealIds[linkedDeal.id]=true;
    var _oItems=o.items||[];
    var _oProd=_extractOrderProduct(o,linkedDeal);
    unified.push({
      type:'order',source:o,deal:linkedDeal||null,
      id:o.id,title:o.order_number||_t('Order','주문'),
      sellerName:getSellerName(o.user_id),sellerId:o.user_id,
      status:o.status||'pending',payStatus:o.payment_status||'unpaid',
      amount:Number(o.total_amount||0),currency:o.currency||'USD',
      terms:o.payment_terms||'-',incoterms:o.incoterms||'FOB',
      shipDate:o.estimated_ship_date||'',
      created:o.created_at,stage:linkedDeal?linkedDeal.stage:'order',
      hasEscrow:!!(o.escrow_status||o.payment_intent_id),
      escrowStatus:o.escrow_status||'',
      productName:_oProd.name,productImage:_oProd.image,
      itemCount:_oItems.length,firstItemQty:_oProd.qty,firstItemPrice:_oProd.price
    });
  });
  // 2) Deals at order stage or beyond (not already linked to a formal order)
  var orderStages=['order','production','shipping','completed'];
  S.deals.forEach(function(d){
    if(usedDealIds[d.id])return;
    if(orderStages.indexOf(d.stage)<0)return;
    var amt=0;var cur='USD';var terms='-';var inco='FOB';
    if(d.order){amt=Number(d.order.total_amount||0);cur=d.order.currency||'USD';terms=d.order.payment_terms||'-';inco=d.order.incoterms||'FOB';}
    else if(d.matching&&d.matching.quoted_price){amt=Number(d.matching.quoted_price||0);cur=d.matching.currency||'USD';}
    var _dProd=_extractDealProduct(d);
    unified.push({
      type:'deal',source:d,deal:d,
      id:d.id,title:d.title||_t('Deal','거래'),
      sellerName:getSellerName(d.sellerId),sellerId:d.sellerId,
      status:d.stage,payStatus:d.order?(d.order.payment_status||'unpaid'):'awaiting',
      amount:amt,currency:cur,terms:terms,incoterms:inco,
      shipDate:d.order?d.order.estimated_ship_date||'':'',
      created:d.created_at,stage:d.stage,
      hasEscrow:!!(d.order&&(d.order.escrow_status||d.order.payment_intent_id)),
      escrowStatus:d.order?d.order.escrow_status||'':'',
      productName:_dProd.name,productImage:_dProd.image,
      itemCount:d.order&&d.order.items?d.order.items.length:0,
      firstItemQty:_dProd.qty,firstItemPrice:_dProd.price
    });
  });
  // 3) If still empty, also include all active deals as "pre-order" pipeline
  if(!unified.length&&S.deals.length){
    S.deals.forEach(function(d){
      if(d.stage==='completed')return;
      var amt=0;
      if(d.matching&&d.matching.quoted_price)amt=Number(d.matching.quoted_price||0);
      var _pdProd=_extractDealProduct(d);
      unified.push({
        type:'deal',source:d,deal:d,
        id:d.id,title:d.title||_t('Deal','거래'),
        sellerName:getSellerName(d.sellerId),sellerId:d.sellerId,
        status:d.stage,payStatus:'pre-order',
        amount:amt,currency:d.matching?d.matching.currency||'USD':'USD',
        terms:'-',incoterms:'-',shipDate:'',
        created:d.created_at,stage:d.stage,
        hasEscrow:false,escrowStatus:'',
        productName:_pdProd.name,productImage:_pdProd.image,
        itemCount:0,firstItemQty:_pdProd.qty,firstItemPrice:_pdProd.price
      });
    });
  }

  // Sort by created date descending
  unified.sort(function(a,b){return new Date(b.created)-new Date(a.created);});

  // Summary stats
  var totalActive=unified.filter(function(u){return u.status!=='completed'&&u.status!=='cancelled';}).length;
  var totalAmount=unified.reduce(function(sum,u){return sum+u.amount;},0);
  var formalCount=unified.filter(function(u){return u.type==='order';}).length;
  var inProgress=unified.filter(function(u){return u.status==='production'||u.status==='order'||u.status==='shipping';}).length;

  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px">';
  h+='<div style="padding:14px;border-radius:var(--r-s);background:var(--sf);border:1px solid var(--bd);text-align:center">';
  h+='<div style="font-size:22px;font-weight:800;color:var(--pri)">'+totalActive+'</div>';
  h+='<div style="font-size:11px;color:var(--w40)">'+_t('Active','진행 중')+'</div></div>';
  h+='<div style="padding:14px;border-radius:var(--r-s);background:var(--sf);border:1px solid var(--bd);text-align:center">';
  h+='<div style="font-size:22px;font-weight:800;color:var(--acc)">$'+totalAmount.toLocaleString()+'</div>';
  h+='<div style="font-size:11px;color:var(--w40)">'+_t('Total Value','총 금액')+'</div></div>';
  h+='<div style="padding:14px;border-radius:var(--r-s);background:var(--sf);border:1px solid var(--bd);text-align:center">';
  h+='<div style="font-size:22px;font-weight:800;color:var(--ok)">'+formalCount+'</div>';
  h+='<div style="font-size:11px;color:var(--w40)">'+_t('Confirmed Orders','확정 주문')+'</div></div>';
  h+='<div style="padding:14px;border-radius:var(--r-s);background:var(--sf);border:1px solid var(--bd);text-align:center">';
  h+='<div style="font-size:22px;font-weight:800;color:var(--warn)">'+inProgress+'</div>';
  h+='<div style="font-size:11px;color:var(--w40)">'+_t('In Progress','처리 중')+'</div></div>';
  h+='</div>';

  // Pipeline filter
  var stages=['all','order','production','shipping','completed','cancelled'];
  // Include pre-order stages if we have deals in early stages
  var hasPreOrder=unified.some(function(u){return ['inquiry','matched','quotation','sample','negotiation'].indexOf(u.status)>=0;});
  if(hasPreOrder)stages.splice(1,0,'pre-order');
  h+='<div class="order-pipeline">';
  stages.forEach(function(st){
    var cnt;
    if(st==='all')cnt=unified.length;
    else if(st==='pre-order')cnt=unified.filter(function(u){return ['inquiry','matched','quotation','sample','negotiation'].indexOf(u.status)>=0;}).length;
    else cnt=unified.filter(function(u){return u.status===st;}).length;
    if(st!=='all'&&!cnt)return;
    var stLabel={'all':_t('All','전체'),'pre-order':_t('Pre-order','주문 전'),'order':_t('Ordered','주문'),'production':_t('Production','생산'),'shipping':_t('Shipping','배송'),'completed':_t('Completed','완료'),'cancelled':_t('Cancelled','취소')};
    h+='<div class="order-stage'+(S.orderFilter===st?' active':'')+'" onclick="B.set({orderFilter:\''+st+'\'})">'+esc(stLabel[st]||st)+' <span class="cnt">('+cnt+')</span></div>';
  });
  h+='</div>';

  // Filter
  var list=unified;
  if(S.orderFilter&&S.orderFilter!=='all'){
    if(S.orderFilter==='pre-order')list=list.filter(function(u){return ['inquiry','matched','quotation','sample','negotiation'].indexOf(u.status)>=0;});
    else list=list.filter(function(u){return u.status===S.orderFilter;});
  }

  if(!list.length){
    h+='<div style="text-align:center;padding:60px;color:var(--w40)"><div style="font-size:48px;margin-bottom:16px">&#x1F4E6;</div>';
    h+='<h3 style="font-weight:700;margin-bottom:8px">'+_t('No orders yet','아직 주문이 없습니다')+'</h3>';

function showOrderDetail(orderId){
  var o=S.orders.find(function(x){return x.id===orderId;});if(!o)return;
  S.modal='orderDetail';S.modalData=o;
  // Load milestones
  sb.from('payment_milestones').select('*').eq('order_id',orderId).order('created_at',{ascending:true}).limit(50).then(function(r){
    S.orderMilestones=r.data||[];render();
  });
  render();
}

function openConfirmReceiptModal(orderId) {

  S.modalData = o;
  S._receiptAgreed = false;

}

function renderConfirmReceiptModal() {
  var o = S.modalData;

  var prodSummary = _buildOrderProductSummary(o);
  var h = '<div class="modal-overlay" onclick="B.closeModal()">';
  h += '<div class="modal" style="max-width:480px;width:90vw" onclick="event.stopPropagation()">';

  h += '<div class="modal-b">';
  h += _renderReceiptModalBody(orderNum, prodSummary, o);
  h += '</div></div></div>';
  return h;
}

function _buildOrderProductSummary(o) {

  var first = o.items[0];
  var name = first.name || first.product_name || '';
  if (o.items.length > 1) name += ' ' + _t('and', '외') + ' ' + (o.items.length - 1) + _t(' more items', '건');
  return name;
}

function _toggleReceiptAgree() {
  S._receiptAgreed = !S._receiptAgreed;
  var cb = document.getElementById('receipt-agree-cb');
  var btn = document.getElementById('receipt-confirm-btn');
  if (cb) cb.checked = S._receiptAgreed;
  if (btn) btn.disabled = !S._receiptAgreed;
}

function _execConfirmReceipt(orderId) {
  var o = S.orders.find(function(x) { return x.id === orderId; });
  if (!o) return;
  var btn = document.getElementById('receipt-confirm-btn');
  if (btn) { btn.disabled = true; btn.textContent = _t('Processing...', '처리 중...'); }
  o.status = 'completed';
  o.received_at = new Date().toISOString();
  sb.from('orders').update({ status: 'completed', received_at: new Date().toISOString() }).eq('id', orderId).then(function() {
    // Handle deal-based receipt confirmation
    _handleDealReceiptSideEffects();
    toast(_t('Order receipt confirmed!', '주문 수령이 확인되었습니다!'), 'ok');
    S.modal = null; S.modalData = null; S._receiptDealId = null; render();
  }).catch(function(e) {
    console.error('[order] receipt confirm fail:', e);
    toast(_t('Failed to confirm', '확인 실패'), 'err');
    if (btn) { btn.disabled = false; btn.textContent = _t('Confirm Receipt', '수취 확인'); }
  });
}

function _handleDealReceiptSideEffects() {
  var dealId = S._receiptDealId;
  if (!dealId) return;
  var deal = S.deals.find(function(d) { return d.id === dealId; });
  if (!deal) return;
  // Auto-advance deal stage
  if (deal.matching && deal.matching.status !== 'completed') {
    deal.matching.status = 'completed';
    sb.from('matchings').update({
      status: 'completed',
      buyer_confirmed_at: new Date().toISOString(),
      delivered_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    }).eq('id', deal.matching.id || deal.id).then(function() {});
  }
  // Auto-release escrow
  var escData = _getEscrowStatus(dealId);
  if (escData && (escData.status === 'shipping' || escData.status === 'secured')) {
    escData.status = 'delivered';
    escData.deliveredAt = new Date().toISOString();
    _setEscrow(dealId, escData);
  }
}

  openConfirmReceiptModal(orderId);

function _handleRefundFiles(files) {

      toast(_t('Maximum ' + MAX_REFUND_FILES + ' files allowed', '최대 ' + MAX_REFUND_FILES + '개 파일까지 가능합니다'), 'warn');
      break;
    }
    var file = files[i];
    if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
      toast(_t('File too large: ', '파일이 너무 큽니다: ') + file.name, 'warn');
      continue;
    }
    _refundFiles.push(file);

function _submitRefundRequest(orderId) {
  var o = S.orders.find(function(x) { return x.id === orderId; });
  if (!o) return;
  var reasonEl = document.getElementById('refund-reason');
  var descEl = document.getElementById('refund-desc');
  var reason = reasonEl ? reasonEl.value : '';
  var desc = descEl ? descEl.value.trim() : '';
  if (!reason) { toast(_t('Please select a reason', '사유를 선택하세요'), 'warn'); return; }
  if (desc.length < 20) {
    toast(_t('Description must be at least 20 characters', '설명은 최소 20자 이상이어야 합니다'), 'warn');
    return;
  }
  var btn = document.getElementById('refund-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = _t('Submitting...', '제출 중...'); }
  _uploadRefundEvidence(orderId, function(fileUrls) {
    _insertRefundDispute(o, reason, desc, fileUrls);
  });
}

function _uploadRefundEvidence(orderId, cb) {
  if (!_refundFiles.length) { cb([]); return; }
  var urls = [];
  var pending = _refundFiles.length;
  _refundFiles.forEach(function(file, i) {
    var ext = file.name.split('.').pop() || 'bin';
    var path = 'disputes/' + orderId + '/' + Date.now() + '_' + i + '.' + ext;
    sb.storage.from('whistle-uploads').upload(path, file).then(function(r) {
      if (r.error) { console.error('[refund] upload fail:', r.error); }
      else { urls.push(sb.storage.from('whistle-uploads').getPublicUrl(path).data.publicUrl); }
      pending--;
      if (pending <= 0) cb(urls);
    }).catch(function(e) {
      console.error('[refund] upload error:', e);
      pending--;
      if (pending <= 0) cb(urls);
    });
  });
}

function _insertRefundDispute(o, reason, desc, fileUrls) {
  var trackingNum = 'DSP-' + Date.now().toString(36).toUpperCase();
  var refundData = {
    order_id: o.id,
    buyer_id: o.buyer_id,
    seller_id: o.user_id,
    reason: reason,
    description: desc,
    status: 'pending',
    amount: o.total_amount || 0,
    currency: o.currency || 'USD',
    requested_at: new Date().toISOString(),
    tracking_number: trackingNum,
    evidence_urls: fileUrls
  };
  sb.from('disputes').insert(refundData).then(function(r) {
    if (r.error) {
      toast(_t('Failed to submit refund request', '환불 요청 실패') + ': ' + r.error.message, 'err');
      _resetRefundBtn();
      return;
    }
    _showRefundConfirmation(trackingNum);
  }).catch(function(e) {
    console.error('[refund]', e);
    toast(_t('Request failed', '요청 실패'), 'err');
    _resetRefundBtn();
  });
}

function _renderTrackingTimeline(status,history){
  var stages=_shipTimelineStages();
  var statusMap={booked:'picked_up',loaded:'picked_up',production_complete:'picked_up',container_loaded:'departed',departed:'departed',in_transit:'in_transit',arrived:'arrived',customs_clearance:'customs',customs_cleared:'customs',delivered:'delivered'};
  var mapped=statusMap[status]||status;
  var currentIdx=stages.findIndex(function(s){return s.id===mapped;});
  if(currentIdx<0)currentIdx=0;

  var h='<div style="display:flex;gap:0;margin:16px 0;position:relative">';
  stages.forEach(function(st,i){
    var isDone=i<currentIdx;
    var isCurrent=i===currentIdx;
    var color=isDone?'var(--ok)':isCurrent?'var(--pri)':'var(--w15)';
    h+='<div style="flex:1;text-align:center;position:relative">';
    // Connector line
    if(i>0)h+='<div style="position:absolute;top:14px;left:-50%;right:50%;height:2px;background:'+(i<=currentIdx?'var(--ok)':'var(--w15)')+'"></div>';
    // Dot
    h+='<div style="width:28px;height:28px;border-radius:50%;background:'+color+';display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative;z-index:1;font-size:12px">'+(isDone?'&#x2713;':isCurrent?st.icon:'')+'</div>';
    h+='<div style="font-size:10px;margin-top:4px;font-weight:'+(isCurrent?'700':'400')+';color:'+(i<=currentIdx?'var(--w90)':'var(--w20)')+'">'+st.label+'</div>';
    // Date from history
    var hist=_parseTrackingHistory(history);
    var entry=hist.find(function(e){return e.stage===st.id||e.status===st.id;});
    if(entry)h+='<div style="font-size:9px;color:var(--w30)">'+formatDate(entry.timestamp)+'</div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function _parseTrackingHistory(history){
  if(!history)return[];
  if(Array.isArray(history))return history;
  try{return JSON.parse(history);}catch(e){return[];}
}

    shipList.push({
      type:'order',
      source:sh,
      title:order?order.order_number:_t('Shipment','배송'),
      carrier:sh.carrier||'',
      trackNo:sh.bl_number||'',
      status:sh.status||'booked',
      shipType:(sh.type||'ocean').toUpperCase(),
      route:(sh.port_of_loading||'')+(sh.port_of_discharge?' → '+sh.port_of_discharge:''),
      vessel:sh.vessel_name||'',
      eta:sh.eta||'',
      etd:sh.etd||'',
      history:sh.tracking_history,
      trackUrl:sh.tracking_url||'',
      meta:sh.tracking_metadata||{},
      date:sh.created_at,
      sellerId:sh.user_id
    });
  });

  // 2. Matchings with tracking info
  (S.matchings||[]).forEach(function(m){
    if(!m.tracking_number&&!m.tracking_carrier)return;
    // Skip if already covered by a shipment
    var alreadyCovered=shipList.some(function(s){return s.source&&s.source.order_id&&S.orders.some(function(o){return o.id===s.source.order_id&&o.matching_id===m.id;});});
    if(alreadyCovered)return;
    shipList.push({
      type:'deal',
      source:m,
      title:_t('Deal','거래')+' #'+esc((m.id||'').substring(0,8)),
      carrier:m.tracking_carrier||'',
      trackNo:m.tracking_number||'',
      status:m.tracking_status||m.status||'',
      shipType:'',
      route:'',vessel:'',eta:'',etd:'',
      history:m.tracking_history,
      trackUrl:m.tracking_url||'',
      meta:{},
      date:m.updated_at||m.created_at,
      sellerId:m.user_id
    });
  });

  // 3. Shipped samples
  (S.samples||[]).forEach(function(s){
    if(!s.tracking_number&&s.status!=='shipped')return;
    shipList.push({
      type:'sample',
      source:s,
      title:_t('Sample','샘플')+' #'+esc((s.id||'').substring(0,8)),
      carrier:s.shipping_method||'',
      trackNo:s.tracking_number||'',
      status:s.status==='shipped'?'in_transit':s.status==='delivered'?'delivered':'picked_up',
      shipType:_t('SAMPLE','샘플'),
      route:'',vessel:'',eta:'',etd:'',
      history:null,
      trackUrl:'',
      meta:{},
      date:s.shipped_at||s.created_at,
      sellerId:s.user_id
    });
  });

  // Sort by most recent
  shipList.sort(function(a,b){return new Date(b.date)-new Date(a.date);});

  if(!shipList.length){
    return '<div style="text-align:center;padding:60px;color:var(--w40)"><div style="font-size:48px;margin-bottom:12px">&#x1F6A2;</div><h3 style="font-weight:700;margin-bottom:8px">'+_t('No Shipments','배송 없음')+'</h3><p style="font-size:13px">'+_t('Shipments will appear here once your orders are shipped.','주문이 출하되면 여기에 배송 정보가 표시됩니다.')+'</p></div>';
  }

  // Stats
  var inTransit=shipList.filter(function(s){return['in_transit','departed','shipped'].indexOf(s.status)>-1;}).length;
  var customs=shipList.filter(function(s){return['customs','customs_clearance','customs_cleared'].indexOf(s.status)>-1;}).length;
  var delivered=shipList.filter(function(s){return s.status==='delivered';}).length;

  var h='<div class="grid-4" style="gap:12px;margin-bottom:20px">';
  h+='<div class="stat-card" style="border-left:3px solid var(--pri)"><div class="stat-val">'+shipList.length+'</div><div class="stat-lbl">'+_t('Total','전체')+'</div></div>';
  h+='<div class="stat-card" style="border-left:3px solid #00b4d8"><div class="stat-val">'+inTransit+'</div><div class="stat-lbl">'+_t('In Transit','운송중')+'</div></div>';
  h+='<div class="stat-card" style="border-left:3px solid var(--acc)"><div class="stat-val">'+customs+'</div><div class="stat-lbl">'+_t('Customs','통관중')+'</div></div>';
  h+='<div class="stat-card" style="border-left:3px solid var(--ok)"><div class="stat-val">'+delivered+'</div><div class="stat-lbl">'+_t('Delivered','도착완료')+'</div></div>';
  h+='</div>';

  // Shipment cards
  shipList.forEach(function(sh){
    var carrierKey=(sh.carrier||'').toLowerCase().replace(/\s+/g,'');
    var carrierLabel=_CARRIER_LABELS[carrierKey]||sh.carrier||_t('Unknown','미정');
    var carrierIcon=_CARRIER_ICONS[carrierKey]||'&#x1F4E6;';
    var sellerName=getSellerName(sh.sellerId);
    var typeBadge=sh.type==='sample'?'badge-acc':sh.type==='deal'?'badge-pri':'badge-ghost';
    var typeLabel=sh.type==='sample'?_t('Sample','샘플'):sh.type==='deal'?_t('Deal','거래'):_t('Order','주문');
    var statusCls=sh.status==='delivered'?'badge-ok':sh.status==='exception'?'badge-err':['in_transit','departed','shipped'].indexOf(sh.status)>-1?'badge-pri':['customs','customs_clearance'].indexOf(sh.status)>-1?'badge-acc':'badge-ghost';

    h+='<div class="card" style="margin-bottom:14px">';
    // Header
    h+='<div style="padding:16px;display:flex;justify-content:space-between;align-items:flex-start">';
    h+='<div style="flex:1">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">';
    h+='<span class="badge '+typeBadge+'" style="font-size:10px">'+typeLabel+'</span>';
    h+='<span style="font-weight:700;font-size:14px">'+esc(sh.title)+'</span>';
    if(sh.shipType)h+='<span style="font-size:11px;color:var(--w40);background:var(--w08);padding:2px 8px;border-radius:10px">'+esc(sh.shipType)+'</span>';
    h+='</div>';
    // Seller
    if(sh.sellerId)h+='<div style="font-size:12px;color:var(--w40);margin-bottom:8px">&#x1F3ED; <a href="#" onclick="event.preventDefault();B.openMakerProfile(\''+esc(sh.sellerId)+'\')" style="color:var(--pri);text-decoration:none">'+esc(sellerName)+'</a></div>';
    // Carrier + tracking
    h+='<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--w60)">';
    h+='<span>'+carrierIcon+' '+esc(carrierLabel)+'</span>';
    if(sh.trackNo)h+='<span style="font-family:monospace;background:var(--w08);padding:2px 8px;border-radius:4px">'+esc(sh.trackNo)+'</span>';
    if(sh.route)h+='<span>&#x1F6A2; '+esc(sh.route)+'</span>';
    if(sh.vessel)h+='<span>'+_t('Vessel:','선박:')+' '+esc(sh.vessel)+'</span>';
    h+='</div>';
    // ETA/ETD
    if(sh.eta||sh.etd){
      h+='<div style="display:flex;gap:16px;font-size:11px;color:var(--w40);margin-top:4px">';
      if(sh.etd)h+='<span>ETD: '+esc(sh.etd)+'</span>';
      if(sh.eta)h+='<span>ETA: <strong style="color:var(--acc)">'+esc(sh.eta)+'</strong></span>';
      h+='</div>';
    }
    // Domestic tracking (2-segment)
    if(sh.meta.domestic_carrier||sh.meta.domestic_tracking){
      var domLabel=_CARRIER_LABELS[(sh.meta.domestic_carrier||'').toLowerCase()]||sh.meta.domestic_carrier||'';
      h+='<div style="font-size:11px;color:var(--w40);margin-top:6px;padding:6px 10px;background:var(--w05);border-radius:var(--r-xs);border:1px dashed var(--bd)">';

      if(sh.meta.domestic_tracking)h+=' &middot; <span style="font-family:monospace">'+esc(sh.meta.domestic_tracking)+'</span>';
      if(sh.meta.domestic_carrier&&sh.meta.domestic_tracking){
        h+=' <a href="#" onclick="event.preventDefault();B.buyerTrackShipment(\''+esc(sh.meta.domestic_tracking)+'\',\''+esc(sh.meta.domestic_carrier)+'\')" style="color:var(--pri);margin-left:6px">'+_t('Track','추적')+'</a>';
      }
      h+='</div>';
    }
    h+='</div>';
    // Status badge + track button
    h+='<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;align-items:flex-end">';
    h+='<span class="badge '+statusCls+'">'+esc((sh.status||'booked').replace(/_/g,' '))+'</span>';
    if(sh.trackNo){
      h+='<button class="btn btn-pri btn-sm" onclick="B.buyerTrackShipment(\''+esc(sh.trackNo)+'\',\''+esc(sh.carrier)+'\')">&#x1F4CD; '+_t('Track','추적')+'</button>';
    } else if(sh.trackUrl){
      h+='<a href="'+esc(sh.trackUrl)+'" target="_blank" class="btn btn-ghost btn-sm">&#x1F517; '+_t('Track Online','온라인 추적')+'</a>';
    }
    h+='</div></div>';

    // Timeline
    h+=_renderTrackingTimeline(sh.status,sh.history);

    h+='</div>';
  });

  return h;
}

/* === NOTIFICATIONS === */
function loadNotifications(){
  if(!S.user)return;
  var prevCount=S.notifications?S.notifications.length:0;
  sb.from('notifications').select('*').eq('user_id',S.user.id).order('created_at',{ascending:false}).limit(30).then(function(r){
    S.notifications=r.data||[];
    S.notifUnread=S.notifications.filter(function(n){return!n.is_read;}).length;
    /* Show browser notification for new unread items */
    if(prevCount>0&&S.notifications.length>prevCount){
      var newest=S.notifications[0];
      if(newest&&!newest.is_read){_showWebNotif(newest.title||'Whistle AI',newest.body||'',newest.type||'notification');}
    }
    render();
  });
}

function toggleNotif(){S.notifOpen=!S.notifOpen;render();}

function clickNotif(id,page,linkId){
  sb.from('notifications').update({is_read:true}).eq('id',id).then(function(){loadNotifications();});
  S.notifOpen=false;
  if(page)nav(page);
  /* Deep link: auto-open specific deal/order */
  if(linkId){
    setTimeout(function(){
      if(page==='deals'||page==='deal'){openDeal(linkId);}
      else if(page==='orders'){var ord=(S.orders||[]).find(function(o){return o.id===linkId;});if(ord){S._selectedOrder=ord;render();}}
    },100);
  }
}

function markAllNotifRead(){
  var ids=S.notifications.filter(function(n){return!n.is_read;}).map(function(n){return n.id;});
  if(!ids.length)return;
  sb.from('notifications').update({is_read:true}).in('id',ids).then(function(){loadNotifications();});
}

/* === TRANSLATION === */
var _translations={};
function translateMsg(msgId,targetLang){
  var key=msgId+'_'+(targetLang||'en');
  if(_translations[key]&&_translations[key]!=='loading'){
    delete _translations[key];render();return;
  }
  // Check localStorage cache first
  var chatId=S.currentChat?(S.currentChat.buyerLinkId+'_'+S.currentChat.sellerId):'deal';
  var cached=_getCachedTranslation(chatId,msgId,targetLang||'en');
  if(cached){_translations[key]=cached;render();return;}
  // Find message text from current messages
  var text='';
  var allMsgs=S.dealMessages.concat(S.chatMessages);
  for(var i=0;i<allMsgs.length;i++){if(String(allMsgs[i].id)===String(msgId)){text=allMsgs[i].body||'';break;}}
  if(!text)return;
  if(!RELAY){_translations[key]='[Translation unavailable]';render();return;}
  _translations[key]='loading';render();
  fetch(RELAY+'/api/translate',{method:'POST',headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},body:JSON.stringify({text:text,targetLang:targetLang||'en'})}).then(function(r){return r.json();}).then(function(d){
    if(d.ok){_translations[key]=d.translated;_setCachedTranslation(chatId,msgId,targetLang||'en',d.translated);}
    else{_translations[key]='[Translation failed]';}
    render();
    setTimeout(function(){var el=document.getElementById('dealChatMsgs')||document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;},50);
  }).catch(function(){_translations[key]='[Translation failed]';render();});
}
function getTranslation(msgId,targetLang){
  var key=msgId+'_'+(targetLang||'en');
  if(_translations[key])return _translations[key];
  // Fallback to localStorage cache
  var chatId=S.currentChat?(S.currentChat.buyerLinkId+'_'+S.currentChat.sellerId):'deal';
  var cached=_getCachedTranslation(chatId,msgId,targetLang||'en');
  if(cached){_translations[key]=cached;return cached;}
  return null;
}
function renderChatBubble(m,isMine){
  var body=m.body||'';
  var isSystem=m.message_type==='system';

  // Rich card rendering for system messages
  if(isSystem){return renderSystemCard(m,body);}

  var tgt=isMine?'ko':(_userLang||'en');
  var tr=getTranslation(m.id,tgt);
  var h='<div class="chat-bubble '+(isMine?'mine':'theirs')+'" style="font-size:12px">';
  var _fUrl=m.file_url||(m.metadata&&m.metadata.file_url)||'';var _fName=(m.metadata&&m.metadata.file_name)||body||'File';var _fIsImg=m.metadata&&m.metadata.is_image;
