/* ═══ 5. Global Localization Settings ═══ */
function pgLocalization(){
  var countries=S.localizationCountries||[];
  var tab=S._locTab||'all';
  var filtered=tab==='active'?countries.filter(function(c){return c.isActive;}):tab==='inactive'?countries.filter(function(c){return !c.isActive;}):countries;
  var search=(S.searchFilter||'').toLowerCase();
  if(search)filtered=filtered.filter(function(c){return c.name.toLowerCase().indexOf(search)>=0||c.code.toLowerCase().indexOf(search)>=0;});
  var activeCount=countries.filter(function(c){return c.isActive;}).length;
  var avgReadiness=countries.length?Math.round(countries.reduce(function(s,c){return s+c.readiness;},0)/countries.length*10)/10:0;
  var totalTemplates=countries.reduce(function(s,c){return s+c.templates;},0);

  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:18px;font-weight:800">'+AT('ð_global_localization_settings')+'</h2><p style="font-size:12px;color:var(--w40);margin-top:4px">'+AT('manage_country_certifications_ftas_and_document')+'</p></div>'+
    '<button class="btn btn-pri" onclick="Adm.showAddCountry()">'+AT('add_country')+'</button></div>';

  h+='<div class="grid-4" style="margin-bottom:16px">'+
    UI.stat(AT('countries2'),countries.length,'','var(--pri)')+
    UI.stat(AT('active'),activeCount,'','var(--ok)')+
    UI.stat(AT('avg_readiness'),avgReadiness+'/10','','var(--acc)')+
    UI.stat(AT('templates2'),totalTemplates,'','var(--purple)')+
  '</div>';

  h+='<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">'+
    '<button class="btn btn-sm '+(tab==='all'?'btn-pri':'btn-ghost')+'" onclick="S._locTab=\'all\';render()">'+AT('all')+' ('+countries.length+')</button>'+
    '<button class="btn btn-sm '+(tab==='active'?'btn-ok':'btn-ghost')+'" onclick="S._locTab=\'active\';render()">'+AT('active')+' ('+activeCount+')</button>'+
    '<button class="btn btn-sm '+(tab==='inactive'?'btn-ghost':'btn-ghost')+'" onclick="S._locTab=\'inactive\';render()">'+AT('inactive')+' ('+(countries.length-activeCount)+')</button>'+
    '<div style="flex:1"></div>'+
    '<input placeholder="'+AT('search_country')+'" value="'+U.esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="padding:8px 12px;border-radius:8px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:12px;width:220px">'+
  '</div>';

  h+='<div class="card"><div class="card-b" style="padding:0"><div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>'+AT('country')+'</th><th>'+AT('code')+'</th><th>'+AT('active')+'</th><th>'+AT('certifications')+'</th><th>FTA</th><th>'+AT('templates')+'</th><th>'+AT('lang')+'</th><th>'+AT('score2')+'</th><th>'+AT('edit')+'</th>'+
    '</tr></thead><tbody>';
  filtered.forEach(function(c,i){
    var readinessColor=c.readiness>=8?'var(--ok)':c.readiness>=5?'var(--acc)':'var(--err)';
    var readinessBar='<div style="display:flex;align-items:center;gap:6px"><div style="width:60px;height:6px;border-radius:3px;background:var(--w08);overflow:hidden"><div style="height:100%;width:'+c.readiness*10+'%;background:'+readinessColor+';border-radius:3px"></div></div><span style="font-size:11px;font-weight:700;color:'+readinessColor+'">'+c.readiness+'</span></div>';
    var certTags=(c.certs||'').split(',').map(function(t){return t.trim()?'<span class="badge badge-ghost" style="margin:1px;font-size:9px;padding:1px 5px">'+U.esc(t.trim())+'</span>':'';}).join('');
    var ftaTags=(c.ftas||'').split(',').map(function(t){return t.trim()?'<span class="badge badge-pri" style="margin:1px;font-size:9px;padding:1px 5px">'+U.esc(t.trim())+'</span>':'';}).join('');
    h+='<tr>'+
      '<td style="font-weight:600">'+c.flag+' '+U.esc(c.name)+'</td>'+
      '<td style="font-family:JetBrains Mono;font-size:12px">'+c.code+'</td>'+
      '<td><div onclick="Adm.toggleLocCountry(\''+c.code+'\')" style="cursor:pointer;width:36px;height:20px;border-radius:10px;background:'+(c.isActive?'var(--ok)':'var(--w12)')+';position:relative;transition:all .2s"><div style="position:absolute;top:2px;'+(c.isActive?'right:2px':'left:2px')+';width:16px;height:16px;border-radius:8px;background:var(--w);transition:all .2s"></div></div></td>'+

function toggleLocCountry(code){
  var idx=S.localizationCountries.findIndex(function(c){return c.code===code;});
  if(idx<0)return;
  var newVal=!S.localizationCountries[idx].isActive;
  S.localizationCountries[idx].isActive=newVal;render();
  sb.from('localization_countries').update({is_active:newVal,updated_at:new Date().toISOString()}).eq('code',code).then(function(r){
    if(r.error){console.error('[loc] toggle error:',r.error.message);UI.toast(AT('save_failed'),'err');}
  }).catch(function(e){console.error('[loc] toggle:',e);});
}

function saveNewCountry(){
  var name=(document.getElementById('loc-new-name')||{}).value;
  var code=((document.getElementById('loc-new-code')||{}).value||'').toUpperCase();
  if(!name||!code){UI.toast(AT('name_and_code_are_required'),'warn');return;}
  if(S.localizationCountries.find(function(c){return c.code===code;})){UI.toast(AT('code_already_exists'),'warn');return;}

    S.localizationCountries.push({id:row?row.id:null,name:name,code:code,flag:flag,isActive:false,certs:certs,ftas:ftas,templates:0,lang:lang,readiness:1});

/* ═══ 6. Enhanced Logistics Dashboard ═══ */
function pgLogisticsDash(){
  var shipments=S.shipments||[];
  var filter=S._logisticsFilter||'all';
  if(filter!=='all')shipments=shipments.filter(function(s){return s.status===filter;});
  var search=(S.searchFilter||'').toLowerCase();
  if(search)shipments=shipments.filter(function(s){return(s.tracking_number||'').toLowerCase().indexOf(search)>=0||(s.carrier||'').toLowerCase().indexOf(search)>=0;});

  var inTransit=S.shipments.filter(function(s){return s.status==='in_transit'||s.status==='in-transit'||s.status==='shipped';}).length;

/* ═══ 7. Certification Tracking ═══ */
var CERT_STAGES=['접수','서류검토','시험의뢰','시험진행','결과검토','인증발급','완료'];
var CERT_STAGES_EN=['Received','Doc Review','Test Request','Testing','Result Review','Issuance','Complete'];
function pgCertTracking(){
  var projects=S.projects||[];
  /* Extract certification items from projects */
  var certs=[];
  projects.forEach(function(p){
    var items=p.certifications||p.certification_items||[];
    if(typeof items==='string')try{items=JSON.parse(items);}catch(e){items=[];}
    if(Array.isArray(items)){
      items.forEach(function(ci){
        certs.push({project_id:p.id,project_name:p.name||p.title||'',user_id:p.user_id,cert_name:ci.name||ci.type||'',country:ci.country||p.target_country||'',status:ci.status||'접수',stage:ci.stage||0,created_at:ci.created_at||p.created_at});
      });
    }
    /* Also treat project itself as a cert if it has certification type */
    if(p.service_type==='certification'||p.type==='certification'){
      certs.push({project_id:p.id,project_name:p.name||p.title||'',user_id:p.user_id,cert_name:p.certification_type||p.name||'',country:p.target_country||'',status:p.certification_status||p.status||'접수',stage:p.certification_stage||0,created_at:p.created_at});
    }
  });

  var filter=S._certFilter||'all';
  var filtered=filter==='all'?certs:certs.filter(function(c){return c.status===filter;});
  var search=(S.searchFilter||'').toLowerCase();
  if(search)filtered=filtered.filter(function(c){return(c.cert_name||'').toLowerCase().indexOf(search)>=0||(c.project_name||'').toLowerCase().indexOf(search)>=0||(c.country||'').toLowerCase().indexOf(search)>=0;});

  /* Stage distribution */
  var stageDist=CERT_STAGES.map(function(s,i){return certs.filter(function(c){return c.status===s||c.stage===i;}).length;});

  var h='<div style="margin-bottom:20px"><h2 style="font-size:18px;font-weight:800">'+AT('certification_tracking')+'</h2><p style="font-size:12px;color:var(--w40);margin-top:4px">'+AT('track_all_project_certifications_across_7')+'</p></div>';

  /* Stage pipeline visualization */
  h+='<div class="card" style="margin-bottom:16px"><div class="card-h">'+AT('certification_pipeline')+'</div><div class="card-b"><div style="display:flex;gap:4px">';
  CERT_STAGES.forEach(function(s,i){
    var count=stageDist[i];
    var colors=['#94a3b8','#3b82f6','#f59e0b','#8b5cf6','#06b6d4','#22c55e','#10b981'];
    h+='<div style="flex:1;text-align:center;padding:12px 4px;border-radius:8px;background:'+(count>0?colors[i]+'18':'var(--w08)')+';border:1px solid '+(count>0?colors[i]+'30':'var(--bd)')+'">'+
      '<div style="font-size:20px;font-weight:800;color:'+(count>0?colors[i]:'var(--w20)')+'">'+count+'</div>'+
      '<div style="font-size:9px;color:var(--w40);margin-top:2px">'+(_isKorean?s:CERT_STAGES_EN[i])+'</div>'+
      '</div>';
    if(i<CERT_STAGES.length-1)h+='<div style="display:flex;align-items:center;color:var(--w12);font-size:16px">\u2192</div>';
  });
  h+='</div></div></div>';

  h+='<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">'+
    '<button class="btn btn-sm '+(filter==='all'?'btn-pri':'btn-ghost')+'" onclick="S._certFilter=\'all\';render()">'+AT('all')+' ('+certs.length+')</button>';
  CERT_STAGES.forEach(function(s){
    h+='<button class="btn btn-sm '+(filter===s?'btn-pri':'btn-ghost')+'" onclick="S._certFilter=\''+s+'\';render()" style="font-size:11px">'+(_isKorean?s:CERT_STAGES_EN[CERT_STAGES.indexOf(s)])+'</button>';
  });
  h+='<div style="flex:1"></div>'+
    '<input placeholder="'+AT('search_cert_project_country')+'" value="'+U.esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="padding:8px 12px;border-radius:8px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:12px;width:220px">'+
  '</div>';

  if(!filtered.length){
    return h+UI.empty('\uD83C\uDFC5',AT('no_certifications'),AT('certifications_will_appear_here_when_registered'));
  }

  h+='<div class="card"><div class="card-b" style="padding:0"><div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>'+AT('certification2')+'</th><th>'+AT('project')+'</th><th>'+AT('country')+'</th><th>'+AT('progress')+'</th><th>'+AT('stage2')+'</th><th>'+AT('date5')+'</th>'+
    '</tr></thead><tbody>';
  filtered.forEach(function(c){
    var stageIdx=typeof c.stage==='number'?c.stage:CERT_STAGES.indexOf(c.status);
    if(stageIdx<0)stageIdx=0;
    var pct=Math.round((stageIdx+1)/CERT_STAGES.length*100);
    var progressBar='<div style="display:flex;align-items:center;gap:6px;min-width:120px"><div style="flex:1;height:6px;border-radius:3px;background:var(--w08);overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+(pct>=100?'var(--ok)':pct>=50?'var(--acc)':'var(--pri)')+';border-radius:3px"></div></div><span style="font-size:10px;font-weight:700;color:var(--w40)">'+pct+'%</span></div>';
    h+='<tr>'+
      '<td style="font-weight:600">'+U.esc(c.cert_name||'\u2014')+'</td>'+
      '<td style="font-size:12px">'+U.esc(c.project_name||'\u2014')+'</td>'+
      '<td>'+U.cl(c.country)+' '+U.esc(c.country||'')+'</td>'+
      '<td>'+progressBar+'</td>'+
      '<td>'+UI.badge(_isKorean?CERT_STAGES[stageIdx]||'':CERT_STAGES_EN[stageIdx]||'','pri')+'</td>'+
      '<td style="font-size:11px">'+U.fd(c.created_at)+'</td>'+
    '</tr>';
  });
  h+='</tbody></table></div></div></div>';
  return h;
}

/* ── Send Contract Email ── */
function sendContractEmail(){
  var email=document.getElementById('sigEmail').value.trim();
  var name=document.getElementById('sigName').value.trim();
  var company=document.getElementById('sigCompany').value.trim();
  var message=document.getElementById('sigMessage').value.trim();
  var checks=document.querySelectorAll('.sig-doc-check:checked');
  var templates=[];checks.forEach(function(c){templates.push(c.value);});
  if(!email){alert(_isKorean?'이메일을 입력하세요':'Enter email');return;}
  if(!templates.length){alert(_isKorean?'서류를 선택하세요':'Select documents');return;}
  var btn=document.getElementById('btnSendContract');
  var status=document.getElementById('sendContractStatus');
  btn.disabled=true;btn.textContent=_isKorean?'⏳ 발송 중...':'⏳ Sending...';
  status.textContent='';
  var sbUrl='https://lylktgxngrlxmsldxdqj.supabase.co';
  fetch(sbUrl+'/functions/v1/send-contract-email',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+(function(){try{var s=JSON.parse(localStorage.getItem('sb-lylktgxngrlxmsldxdqj-auth-token'));return s&&s.access_token||'';}catch(e){return '';}})()},
    body:JSON.stringify({action:'send_contract',recipient_email:email,recipient_name:name,company_name:company,template_names:templates,custom_message:message,sent_by:'admin'})
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(data){
    btn.disabled=false;btn.textContent='✉️ '+(_isKorean?'서명 요청 발송':'Send Signature Request');
    if(data.error){status.style.color='var(--err)';status.textContent='❌ '+data.error;return;}
    status.style.color='var(--ok)';status.textContent='✅ '+(_isKorean?'발송 완료! 서명 링크: ':'Sent! Sign URL: ')+data.sign_url;
    document.getElementById('sigEmail').value='';document.getElementById('sigName').value='';
    document.getElementById('sigCompany').value='';document.getElementById('sigMessage').value='';
    setTimeout(function(){loadSigRequests();},500);
  }).catch(function(err){
    btn.disabled=false;btn.textContent='✉️ '+(_isKorean?'서명 요청 발송':'Send Signature Request');
    status.style.color='var(--err)';status.textContent='❌ '+err.message;
  });
}
/* ── Load Signature Requests List ── */
function loadSigRequests(){
  var el=document.getElementById('sigRequestsList');
  if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:12px;color:var(--w30)">⏳</div>';
  var sbUrl='https://lylktgxngrlxmsldxdqj.supabase.co';
  fetch(sbUrl+'/functions/v1/send-contract-email',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+(function(){try{var s=JSON.parse(localStorage.getItem('sb-lylktgxngrlxmsldxdqj-auth-token'));return s&&s.access_token||'';}catch(e){return '';}})()},
    body:JSON.stringify({action:'list_requests',limit:30})
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(res){
    var data=res.data||[];
    if(!data.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--w30)">'+(_isKorean?'서명 요청 내역이 없습니다':'No signature requests yet')+'</div>';return;}
    var h='<table class="tbl" style="width:100%"><thead><tr><th>'+(_isKorean?'수신자':'Recipient')+'</th><th>'+(_isKorean?'서류':'Documents')+'</th><th>'+(_isKorean?'상태':'Status')+'</th><th>'+(_isKorean?'발송일':'Sent')+'</th><th>'+(_isKorean?'만료일':'Expires')+'</th><th></th></tr></thead><tbody>';
    data.forEach(function(r){
      var sd=r.signature_data||{};
      var stColor=r.status==='signed'?'var(--ok)':r.status==='pending'?'var(--acc)':'var(--err)';
      var stLabel=r.status==='signed'?(_isKorean?'✅ 서명완료':'✅ Signed'):r.status==='pending'?(_isKorean?'⏳ 대기중':'⏳ Pending'):r.status==='cancelled'?(_isKorean?'❌ 취소':'❌ Cancelled'):r.status;
      var docs=(r.template_names||[]).length;
      h+='<tr>';
      h+='<td><div style="font-weight:600;font-size:12px">'+(sd.signer_name||'-')+'</div><div style="font-size:10px;color:var(--w30)">'+(sd.signer_email||'-')+'</div></td>';
      h+='<td style="font-size:11px">'+docs+(_isKorean?'건':'')+'</td>';
      h+='<td><span style="font-size:11px;color:'+stColor+';font-weight:600">'+stLabel+'</span></td>';
      h+='<td style="font-size:11px;color:var(--w40)">'+(r.created_at?new Date(r.created_at).toLocaleDateString('ko-KR'):'-')+'</td>';
      h+='<td style="font-size:11px;color:var(--w40)">'+(r.expires_at?new Date(r.expires_at).toLocaleDateString('ko-KR'):'-')+'</td>';
      h+='<td style="white-space:nowrap">';
      if(r.status==='pending'){
        h+='<button class="btn btn-ghost btn-sm" onclick="sendSigReminder(\''+r.id+'\')" style="font-size:10px;margin-right:4px">🔔 '+(_isKorean?'리마인더':'Remind')+'</button>';
        h+='<button class="btn btn-danger btn-sm" onclick="cancelSigRequest(\''+r.id+'\')" style="font-size:10px">'+(_isKorean?'취소':'Cancel')+'</button>';
      }
      h+='</td></tr>';
    });
    h+='</tbody></table>';
    el.innerHTML=h;
  }).catch(function(err){
    el.innerHTML='<div style="color:var(--err);font-size:12px;padding:12px">'+err.message+'</div>';
  });
}
function sendSigReminder(id){
  if(!confirm(_isKorean?'리마인더를 발송하시겠습니까?':'Send reminder?'))return;
  var sbUrl='https://lylktgxngrlxmsldxdqj.supabase.co';
  fetch(sbUrl+'/functions/v1/send-contract-email',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+(function(){try{var s=JSON.parse(localStorage.getItem('sb-lylktgxngrlxmsldxdqj-auth-token'));return s&&s.access_token||'';}catch(e){return '';}})()},
    body:JSON.stringify({action:'send_reminder',signature_request_id:id})
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(data){
    if(data.error){alert('Error: '+data.error);return;}
    alert(_isKorean?'리마인더가 발송되었습니다 ('+data.reminder_count+'차)':'Reminder sent ('+data.reminder_count+')');
    loadSigRequests();
  }).catch(function(e){alert(e.message);});
}
function cancelSigRequest(id){
  if(!confirm(_isKorean?'서명 요청을 취소하시겠습니까?':'Cancel this signature request?'))return;
  var sbUrl='https://lylktgxngrlxmsldxdqj.supabase.co';
  fetch(sbUrl+'/functions/v1/send-contract-email',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+(function(){try{var s=JSON.parse(localStorage.getItem('sb-lylktgxngrlxmsldxdqj-auth-token'));return s&&s.access_token||'';}catch(e){return '';}})()},
    body:JSON.stringify({action:'cancel_request',signature_request_id:id})
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(data){
    if(data.error){alert('Error: '+data.error);return;}
    loadSigRequests();
  }).catch(function(e){alert(e.message);});
}

function pgMarketing(){
  var campaigns=S.marketingCampaigns||[];
  var events=S.marketingEvents||[];
  var automations=S.marketingAutomations||[];
  var tab=S._mktTab||'overview';

  var now=new Date();
  var todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var weekStart=new Date(todayStart-6*864e5);
  var monthStart=new Date(now.getFullYear(),now.getMonth(),1);

  var sentEvents=events.filter(function(e){return e.event_type==='sent';});
  var openedEvents=events.filter(function(e){return e.event_type==='opened';});
  var clickedEvents=events.filter(function(e){return e.event_type==='clicked';});
  var convertedEvents=events.filter(function(e){return e.event_type==='converted';});

  var sentToday=sentEvents.filter(function(e){return new Date(e.created_at)>=todayStart;}).length;
  var sentWeek=sentEvents.filter(function(e){return new Date(e.created_at)>=weekStart;}).length;
  var sentMonth=sentEvents.filter(function(e){return new Date(e.created_at)>=monthStart;}).length;
  var totalSent=sentEvents.length;
  var openRate=totalSent>0?Math.round(openedEvents.length/totalSent*1000)/10:0;
  var clickRate=totalSent>0?Math.round(clickedEvents.length/totalSent*1000)/10:0;
  var signupsFromCampaigns=convertedEvents.length;

  // Tab bar
  var tabs=[
    {id:'overview',label:AT('overview')},

  h+='</div>';

  if(tab==='overview'){
    h+=_mktOverview(sentToday,sentWeek,sentMonth,openRate,clickRate,signupsFromCampaigns,campaigns,events,convertedEvents);

function toggleCampaign(id,currentStatus){
  var newStatus=currentStatus==='running'?'paused':'running';
  sb.from('marketing_campaigns').update({status:newStatus,updated_at:new Date().toISOString()}).eq('id',id).then(function(r){
    if(r.error){UI.toast(AT('status_change_failed'),'err');return;}
    var idx=S.marketingCampaigns.findIndex(function(c){return c.id===id;});
    if(idx>=0)S.marketingCampaigns[idx].status=newStatus;
    UI.toast(AT('campaign_status_updated'),'ok');
    render();
  });
}

function toggleAutomation(id,isActive){
  sb.from('marketing_automations').update({is_active:isActive,updated_at:new Date().toISOString()}).eq('id',id).then(function(r){
    if(r.error){UI.toast(AT('automation_toggle_failed'),'err');return;}
    var idx=S.marketingAutomations.findIndex(function(a){return a.id===id;});
    if(idx>=0)S.marketingAutomations[idx].is_active=isActive;
    UI.toast((isActive?AT('automation_enabled'):AT('automation_disabled')),'ok');
    render();
  });
}

var SENSITIVE_PAGES={payments:1,orderpay:1,settings:1,users:1,usershub:1,ordersMgmt:1};
function renderPage(){
  if(S._reauthCb)return pgReauth();
  if(SENSITIVE_PAGES[S.page]&&!isReauthed()){
    requireReauth(function(){render();});
    return pgReauth();
  }
  switch(S.page){
    case'usershub':return pgUsersHub();
    case'dealhub':return pgDealHub();
    case'orderpay':return pgOrderPay();
    case'contenthub':return pgContentHub();
    case'systemhub':return pgSystemHub();
    case'dashboard':return pgDash();
    case'analytics':return pgAnalytics();
    case'sellers':return pgSellers();
    case'buyersMgmt':return pgBuyers();

/* === Sidebar Arrow Key Navigation === */
document.addEventListener('keydown',function(e){
  if(e.target&&e.target.closest&&e.target.closest('.sidebar-nav')){
    var items=Array.prototype.slice.call(document.querySelectorAll('.sidebar-nav > .nav-item'));
    var idx=items.indexOf(e.target);
    if(idx<0)return;
    if(e.key==='ArrowDown'){e.preventDefault();var next=(idx+1)%items.length;items[next].focus();items[next].setAttribute('tabindex','0');items[idx].setAttribute('tabindex','-1');}
    else if(e.key==='ArrowUp'){e.preventDefault();var prev=(idx-1+items.length)%items.length;items[prev].focus();items[prev].setAttribute('tabindex','0');items[idx].setAttribute('tabindex','-1');}
    else if(e.key==='Enter'||e.key===' '){e.preventDefault();e.target.click();}
    else if(e.key==='Home'){e.preventDefault();items[0].focus();items[0].setAttribute('tabindex','0');items[idx].setAttribute('tabindex','-1');}
    else if(e.key==='End'){e.preventDefault();items[items.length-1].focus();items[items.length-1].setAttribute('tabindex','0');items[idx].setAttribute('tabindex','-1');}
  }
});

});

  sb.from('matchings').update({status:newStatus}).eq('id',matchingId).then(function(r){
    if(r.error){UI.toast('상태 변경 실패: '+r.error.message,'err');return;}
    var m=S.matchings.find(function(x){return x.id===matchingId;});
    if(m){m.status=newStatus;S.selectedMatching=m;}
    UI.toast('매칭 상태 → '+matchStatusLabel(newStatus),'ok');render();
  });
}
function changeOrderStatus(orderId,newStatus){
  if(newStatus==='cancelled'&&!confirm('이 주문을 취소 처리하시겠습니까?'))return;
  sb.from('orders').update({status:newStatus}).eq('id',orderId).then(function(r){
    if(r.error){UI.toast('상태 변경 실패: '+r.error.message,'err');return;}
    var o=S.orders.find(function(x){return x.id===orderId;});
    if(o){o.status=newStatus;S.selectedOrder=o;}
    UI.toast('주문 상태 → '+orderStatusLabel(newStatus),'ok');render();
  });
}
function changeOrderPayment(orderId,newPayStatus){
  sb.from('orders').update({payment_status:newPayStatus}).eq('id',orderId).then(function(r){
    if(r.error){UI.toast(AT('payment_status_change_failed'),'err');return;}
    var o=S.orders.find(function(x){return x.id===orderId;});
    if(o){o.payment_status=newPayStatus;S.selectedOrder=o;}
    UI.toast(AT('payment_status_updated'),'ok');render();
  });
}
function markMilestonePaid(milestoneId,evt){
  if(!confirm('이 마일스톤을 결제 완료 처리하시겠습니까?'))return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.from('payment_milestones').update({status:'paid',paid_at:new Date().toISOString()}).eq('id',milestoneId).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast(AT('payment_processing_failed'),'err');return;}
    var p=S.paymentMilestones.find(function(x){return x.id===milestoneId;});
    if(p){p.status='paid';p.paid_at=new Date().toISOString();}
    UI.toast(AT('payment_completed'),'ok');render();
  });
}

function rmMatchingTag(matchingId,tag){
  var m=S.matchings.find(function(x){return x.id===matchingId;});if(!m)return;
  var tags=(m.admin_tags||[]).filter(function(t){return t!==tag;});
  sb.from('matchings').update({admin_tags:tags}).eq('id',matchingId).then(function(r){
    if(r.error){UI.toast(AT('tag_delete_failed'),'err');return;}m.admin_tags=tags;render();
  });
}

function editAlibabaSync(projectId){
  var p=S.projects.find(function(x){return x.id===projectId;});if(!p)return;
  var stages=['planning','certification','alibaba_listing','buyer_search','negotiation','production','shipping','completed'];
  var stL2={planning:'기획',certification:'인증',alibaba_listing:'알리바바 입점',buyer_search:'바이어 발굴',negotiation:'협상',production:'생산',shipping:'선적',completed:'완료'};
  var sync=p.alibaba_sync||{};
  var body='<div style="font-size:12px;color:var(--w40);margin-bottom:12px">프로젝트: <b style="color:var(--w90)">'+U.esc(p.name)+'</b></div>'+
    '<table class="tbl"><thead><tr><th>단계</th><th>동기화 상태</th><th>메모</th></tr></thead><tbody>'+
    stages.map(function(s){
      var ss=sync[s]||{};
      return '<tr><td style="font-weight:600">'+stL2[s]+'</td><td><select id="sync-'+s+'" style="padding:6px;border-radius:6px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:11px"><option value="pending"'+(ss.status==='pending'?' selected':'')+'>대기중</option><option value="synced"'+(ss.status==='synced'?' selected':'')+'>동기화됨</option><option value="not_applicable"'+(!ss.status||ss.status==='not_applicable'?' selected':'')+'>해당없음</option></select></td><td><input id="syncn-'+s+'" value="'+U.esc(ss.note||'')+'" placeholder="메모" style="width:100%;padding:6px;border-radius:6px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:11px"></td></tr>';

  UI.showModal('sync-form');

function saveAlibabaSync(projectId){
  var p=S.projects.find(function(x){return x.id===projectId;});if(!p)return;
  var stages=['planning','certification','alibaba_listing','buyer_search','negotiation','production','shipping','completed'];
  var sync={};
  stages.forEach(function(s){
    var statusEl=document.getElementById('sync-'+s);
    var noteEl=document.getElementById('syncn-'+s);
    sync[s]={status:statusEl?statusEl.value:'pending',note:noteEl?noteEl.value.trim():'',updated_at:new Date().toISOString()};
  });
  var _saveSyncBtn=document.querySelector('#sync-form .btn-pri, .modal-f .btn-pri');btnLoading(_saveSyncBtn,true);
  sb.from('projects').update({alibaba_sync:sync}).eq('id',projectId).then(function(r){
    btnLoading(_saveSyncBtn,false);
    if(r.error){UI.toast('저장 실패: '+r.error.message,'err');return;}
    p.alibaba_sync=sync;
    closeModal('sync-form');
    UI.toast(AT('sync_status_saved'),'ok');
    render();
  });
}

  // Default language for admin portal is Korean
  var DEFAULT_ADMIN_LANG = 'ko';

  function getAdminLang() {
    // Use i18n-detect.js detected language if available, otherwise default to Korean
    var lang = window._whistleLang || DEFAULT_ADMIN_LANG;
    if (!ADMIN_I18N[lang]) lang = DEFAULT_ADMIN_LANG;
    return lang;
  }

  // Build a sorted key list (longest first) to prevent partial replacements
  var sortedKeys = Object.keys(ADMIN_I18N.ko).sort(function(a, b) {
    return b.length - a.length;
  });

  function translateAdminDOM(lang) {
    if (!lang || lang === 'ko' || !ADMIN_I18N[lang]) return;

    var dict = ADMIN_I18N[lang];
    var walker = document.createTreeWalker(
      document.body,
      NodeFilter.SHOW_TEXT,
      null,
      false
    );

    var textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);

    for (var i = 0; i < textNodes.length; i++) {
      var node = textNodes[i];
      var original = node.nodeValue;
      if (!original || !original.trim()) continue;

      var translated = original;
      for (var k = 0; k < sortedKeys.length; k++) {
        var key = sortedKeys[k];
        if (translated.indexOf(key) !== -1 && dict[key] && dict[key] !== key) {
          translated = translated.split(key).join(dict[key]);
        }
      }
      if (translated !== original) {
        node.nodeValue = translated;
      }
    }

    // Also translate placeholder attributes
    var inputs = document.querySelectorAll('input[placeholder], textarea[placeholder]');
    for (var j = 0; j < inputs.length; j++) {
      var ph = inputs[j].placeholder;
      for (var m = 0; m < sortedKeys.length; m++) {
        var sk = sortedKeys[m];
        if (ph.indexOf(sk) !== -1 && dict[sk] && dict[sk] !== sk) {
          ph = ph.split(sk).join(dict[sk]);
        }
      }
      if (ph !== inputs[j].placeholder) {
        inputs[j].placeholder = ph;
      }
    }

    // Translate the page title
    if (dict['CEO Command Center']) {
      document.title = 'Whistle AI — Admin Portal';
    }

    // Set dir=rtl for Arabic
    if (lang === 'ar') {
      document.documentElement.setAttribute('dir', 'rtl');
    } else {
      document.documentElement.removeAttribute('dir');
    }
  }

  // Hook into the render cycle: observe DOM mutations to re-translate after dynamic renders
  var adminLang = getAdminLang();
  var translateTimer = null;

  function scheduleTranslation() {
    if (translateTimer) clearTimeout(translateTimer);
    translateTimer = setTimeout(function() {
      var lang = getAdminLang();
      if (lang !== 'ko') translateAdminDOM(lang);
    }, 100);
  }

  // Observe DOM changes for dynamic content
  if (typeof MutationObserver !== 'undefined') {
    var observer = new MutationObserver(function(mutations) {
      var hasRelevantChange = false;
      for (var i = 0; i < mutations.length; i++) {
        if (mutations[i].type === 'childList' && mutations[i].addedNodes.length > 0) {
          hasRelevantChange = true;
          break;
        }
      }
      if (hasRelevantChange) scheduleTranslation();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }

  // Override _whistleSetLang to re-translate admin on language change
  var origSetLang = window._whistleSetLang;
  window._whistleSetLang = function(lang) {
    if (origSetLang) origSetLang(lang);
    window._whistleLang = lang;
    scheduleTranslation();
  };

  // Initial translation
  if (adminLang !== 'ko') {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        translateAdminDOM(adminLang);
      });
    } else {
      translateAdminDOM(adminLang);
    }
  }

  // Expose for manual use
  window._adminI18n = ADMIN_I18N;
  window._translateAdmin = function(lang) {
    translateAdminDOM(lang || getAdminLang());
  };
})();
</script>
