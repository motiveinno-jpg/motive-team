.sidebar-footer{padding:12px;border-top:1px solid var(--bd)}

.page-content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden}
.card-h{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:14px}
.card-b{padding:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r-s);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.5;cursor:not-allowed}

.badge-ok{background:rgba(0,230,118,.1);color:var(--ok);border:1px solid rgba(0,230,118,.2)}
.badge-err{background:rgba(255,82,82,.1);color:var(--err);border:1px solid rgba(255,82,82,.2)}

.badge-admin{background:rgba(255,107,107,.1);color:var(--admin);border:1px solid rgba(255,107,107,.2)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--w40);margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border-radius:var(--r-s);border:1.5px solid var(--bd);background:var(--sf);color:var(--w90);font-size:14px;font-family:inherit}

.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--w40);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd-l);background:var(--w08)}
.tbl td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--w08);color:var(--w90)}
.tbl tr:hover td{background:var(--w08)}
.tbl tr{cursor:pointer}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;visibility:hidden;transition:all .2s}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:var(--card);border:1px solid var(--bd-l);border-radius:var(--r);width:90%;max-width:640px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg)}

.modal-close:hover{background:var(--w12);color:var(--w)}

.toast{padding:12px 18px;border-radius:var(--r-s);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);animation:slideInR .3s ease;min-width:280px}

.empty-state .ed{font-size:13px}

function btnLoading(btn,loading){
  if(!btn)return;
  if(loading){btn._origHTML=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="btn-spinner"></span> '+AT('processing2');}
  else{btn.disabled=false;if(btn._origHTML!==undefined)btn.innerHTML=btn._origHTML;}
}
function withLoading(evt,fn){
  var btn=evt&&evt.target?evt.target.closest('button'):null;
  btnLoading(btn,true);
  var result=fn();
  if(result&&typeof result.then==='function'){result.then(function(){btnLoading(btn,false);}).catch(function(){btnLoading(btn,false);});}
  else{btnLoading(btn,false);}
}

  /* 5초 타임아웃: 로딩이 끝나지 않으면 로그인 화면 표시 */
  var _loadTimeout=setTimeout(function(){if(S.loading){set({loading:false});}},5000);
  sb.auth.getSession().then(function(res){
    clearTimeout(_loadTimeout);
    var session=res.data.session;
    if(!session)return set({loading:false});
    sb.from('users').select('*').eq('id',session.user.id).single().then(function(r){
      if(r.error||!r.data||r.data.role!=='admin'){
        sb.auth.signOut();
        return set({loading:false,authError:AT('admin_accounts_only2')});
      }
      S.user=r.data;S.loading=false;
      // DB language 반영
      var dbLang = r.data.language;
      if (dbLang && dbLang !== _userLang) {
        _userLang = dbLang;
        _isKorean = _userLang === 'ko';
        localStorage.setItem('_adminLang', dbLang);
      }
      loadAll();
    }).catch(function(e){console.error('[admin] user load:',e);set({loading:false});});
  }).catch(function(e){console.error('[admin] session:',e);set({loading:false});});
}

/* === AUTH === */
function doLogin(e){
  e.preventDefault();if(S._loggingIn)return;S._loggingIn=true;var f=e.target;S.authError='';render();
  sb.auth.signInWithPassword({email:f.email.value,password:f.password.value}).then(function(r){
    S._loggingIn=false;
    if(r.error)return set({authError:r.error.message==='Invalid login credentials'?AT('invalid_email_or_password'):r.error.message});
    loadUser();
  });
}
function doLogout(){if(confirm(AT('log_out'))){sb.auth.signOut().then(function(){S.user=null;S._reauthed=false;render();});}}

/* === RE-AUTH GATE === */
var REAUTH_TIMEOUT=30*60*1000; /* 30분 */
var _lastReauth=0;
function isReauthed(){return S._reauthed&&(Date.now()-_lastReauth<REAUTH_TIMEOUT);}
function requireReauth(cb){
  if(isReauthed()){cb();return;}
  S._reauthCb=cb;S._reauthErr='';render();
  setTimeout(function(){var el=document.getElementById('reauth-pw');if(el)el.focus();},100);
}
function doReauth(e){
  e.preventDefault();S._reauthErr='';
  var pw=document.getElementById('reauth-pw').value;
  if(!pw){S._reauthErr=AT('please_enter_your_password');render();return;}
  S._reauthLoading=true;render();
  sb.auth.signInWithPassword({email:S.user.email,password:pw}).then(function(r){
    S._reauthLoading=false;
    if(r.error){S._reauthErr=AT('incorrect_password');render();return;}
    S._reauthed=true;_lastReauth=Date.now();
    var cb=S._reauthCb;S._reauthCb=null;
    if(cb)cb();else render();
  });
}
function cancelReauth(){S._reauthCb=null;S._reauthErr='';nav('dashboard');render();}
function pgReauth(){
  var errBox=S._reauthErr?'<div id="reauth-error" role="alert" style="padding:10px 14px;border-radius:8px;background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.2);color:var(--err);font-size:12px;margin-bottom:12px">'+S._reauthErr+'</div>':'';
  return '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh"><div style="width:380px;padding:32px;background:var(--sf);border-radius:16px;border:1px solid var(--bd)">'+

    errBox+

    '<div style="margin-bottom:12px"><label for="reauth-pw" style="font-size:11px;font-weight:700;color:var(--w40);display:block;margin-bottom:4px">비밀번호</label><input id="reauth-pw" type="password" placeholder="'+AT('enter_password')+'" required'+(S._reauthErr?' aria-describedby="reauth-error"':'')+' style="width:100%;padding:12px;border-radius:8px;background:var(--bg);border:1px solid var(--bd);color:var(--w90);font-size:13px;box-sizing:border-box"></div>'+

    '</form>'+
    '<div style="text-align:center;margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="Adm.cancelReauth()" style="font-size:11px;color:var(--w40)">'+AT('cancel')+'</button></div>'+
    '</div></div>';
}
function doReset(e){
  e.preventDefault();var f=e.target;S.authError='';
  var email=f.email.value;
  if(!email){set({authError:AT('please_enter_your_email')});return;}
  sb.auth.resetPasswordForEmail(email).then(function(r){
    if(r.error)return set({authError:r.error.message});
    set({authMode:'login',authError:''});
    UI.toast(AT('password_reset_link_sent_to_your'),'ok',5000);
  });
}

/* ── SVG Chart Helpers ── */
function svgBarChart(data,opts){
  var w=opts.w||480,h=opts.h||180,pad=opts.pad||{t:10,r:10,b:28,l:42};
  var cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  var n=data.length;if(!n)return '<div style="color:var(--w30);font-size:12px;text-align:center;padding:30px">No data</div>';
  var maxV=Math.max.apply(null,data.map(function(d){return d.v;}))||1;
  var barW=Math.max(Math.floor(cw/n)-4,6);
  var gap=Math.max(Math.floor((cw-barW*n)/(n+1)),2);
  var gridLines=4;
  var svg='<svg class="svg-chart" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet">';
  for(var g=0;g<=gridLines;g++){
    var gy=pad.t+ch-ch*(g/gridLines);
    var gVal=Math.round(maxV*(g/gridLines));
    svg+='<line class="grid-line" x1="'+pad.l+'" y1="'+gy+'" x2="'+(w-pad.r)+'" y2="'+gy+'"/>';
    svg+='<text x="'+(pad.l-6)+'" y="'+(gy+3)+'" text-anchor="end" font-size="9">'+(opts.fmt?opts.fmt(gVal):gVal)+'</text>';
  }
  svg+='<line class="axis-line" x1="'+pad.l+'" y1="'+(pad.t+ch)+'" x2="'+(w-pad.r)+'" y2="'+(pad.t+ch)+'"/>';
  for(var i=0;i<n;i++){
    var bx=pad.l+gap+(barW+gap)*i;
    var bh=Math.max(Math.round(data[i].v/maxV*ch),2);
    var by=pad.t+ch-bh;
    var col=data[i].c||opts.color||'#00d4ff';
    svg+='<rect class="bar-rect" x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+bh+'" fill="'+col+'"><title>'+data[i].l+': '+(opts.fmt?opts.fmt(data[i].v):data[i].v)+'</title></rect>';
    if(n<=12){
      svg+='<text x="'+(bx+barW/2)+'" y="'+(pad.t+ch+14)+'" text-anchor="middle" font-size="9">'+data[i].l+'</text>';
    } else if(i%Math.ceil(n/6)===0||i===n-1){
      svg+='<text x="'+(bx+barW/2)+'" y="'+(pad.t+ch+14)+'" text-anchor="middle" font-size="8">'+data[i].l+'</text>';
    }
  }
  svg+='</svg>';
  return svg;
}

function svgLineChart(data,opts){
  var w=opts.w||480,h=opts.h||180,pad=opts.pad||{t:10,r:10,b:28,l:42};
  var cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  var n=data.length;if(!n)return '<div style="color:var(--w30);font-size:12px;text-align:center;padding:30px">No data</div>';
  var maxV=Math.max.apply(null,data.map(function(d){return d.v;}))||1;
  var stepX=n>1?cw/(n-1):cw;
  var gridLines=4;
  var col=opts.color||'#00d4ff';
  var svg='<svg class="svg-chart" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet">';
  for(var g=0;g<=gridLines;g++){
    var gy=pad.t+ch-ch*(g/gridLines);
    var gVal=Math.round(maxV*(g/gridLines));
    svg+='<line class="grid-line" x1="'+pad.l+'" y1="'+gy+'" x2="'+(w-pad.r)+'" y2="'+gy+'"/>';
    svg+='<text x="'+(pad.l-6)+'" y="'+(gy+3)+'" text-anchor="end" font-size="9">'+(opts.fmt?opts.fmt(gVal):gVal)+'</text>';
  }
  svg+='<line class="axis-line" x1="'+pad.l+'" y1="'+(pad.t+ch)+'" x2="'+(w-pad.r)+'" y2="'+(pad.t+ch)+'"/>';
  var pts=[];var areaPath='M '+pad.l+' '+(pad.t+ch)+' ';
  for(var i=0;i<n;i++){
    var px=pad.l+(n>1?stepX*i:cw/2);
    var py=pad.t+ch-Math.round(data[i].v/maxV*ch);
    pts.push(px+','+py);
    areaPath+='L '+px+' '+py+' ';
  }
  areaPath+='L '+(pad.l+stepX*(n-1))+' '+(pad.t+ch)+' Z';
  svg+='<path class="area-path" d="'+areaPath+'" fill="'+col+'"/>';
  svg+='<polyline class="line-path" points="'+pts.join(' ')+'" stroke="'+col+'"/>';
  for(var i=0;i<n;i++){
    var px=pad.l+(n>1?stepX*i:cw/2);
    var py=pad.t+ch-Math.round(data[i].v/maxV*ch);
    svg+='<circle class="dot" cx="'+px+'" cy="'+py+'" r="3" fill="'+col+'"><title>'+data[i].l+': '+(opts.fmt?opts.fmt(data[i].v):data[i].v)+'</title></circle>';
    if(n<=12){
      svg+='<text x="'+px+'" y="'+(pad.t+ch+14)+'" text-anchor="middle" font-size="9">'+data[i].l+'</text>';
    } else if(i%Math.ceil(n/6)===0||i===n-1){
      svg+='<text x="'+px+'" y="'+(pad.t+ch+14)+'" text-anchor="middle" font-size="8">'+data[i].l+'</text>';
    }
  }
  svg+='</svg>';
  return svg;
}

function svgDonutChart(data,opts){
  var size=opts.size||160,thick=opts.thick||28;
  var r=(size-thick)/2,cx=size/2,cy=size/2;
  var total=data.reduce(function(s,d){return s+d.v;},0)||1;
  var svg='<div class="donut-chart"><svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">';
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--w08)" stroke-width="'+thick+'"/>';
  var offset=0;var circ=2*Math.PI*r;
  data.forEach(function(d){
    if(d.v<=0)return;
    var pct=d.v/total;
    var dash=pct*circ;
    var gap=circ-dash;
    var rot=-90+offset*360;
    svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+(d.c||'#00d4ff')+'" stroke-width="'+thick+'" stroke-dasharray="'+dash.toFixed(2)+' '+gap.toFixed(2)+'" transform="rotate('+rot.toFixed(2)+' '+cx+' '+cy+')" stroke-linecap="butt"><title>'+d.l+': '+d.v+' ('+(pct*100).toFixed(1)+'%)</title></circle>';
    offset+=pct;
  });

function filterBySearch(arr,fields){

/* === ENHANCED KPI FUNCTIONS === */
function calcARPU(){var paid=S.users.filter(function(u){return u.plan&&u.plan!=='free';});if(!paid.length)return 0;return calcMRR()/paid.length;}
function calcChurnRate(){var cancelled=S.subscriptions.filter(function(s){return s.status==='cancelled';}).length;var total=S.subscriptions.length;if(!total)return 0;return(cancelled/total*100);}
function calcConversionRate(){var total=S.users.length;if(!total)return 0;var paid=S.users.filter(function(u){return u.plan&&u.plan!=='free';}).length;return(paid/total*100);}
function calcLTV(){var arpu=calcARPU();var churn=calcChurnRate()/100;if(churn<=0)return arpu*12;return arpu/churn;}
function calcActiveRate(){var total=S.users.length;if(!total)return 0;var thirtyDaysAgo=new Date(Date.now()-30*864e5).toISOString();var active=S.users.filter(function(u){return u.last_sign_in_at&&u.last_sign_in_at>thirtyDaysAgo;}).length;return(active/total*100);}
function calcUsageSummary(){var summary={};if(!S.usageEvents)return summary;S.usageEvents.forEach(function(e){if(!summary[e.feature])summary[e.feature]={count:0,revenue:0};summary[e.feature].count+=e.quantity||1;summary[e.feature].revenue+=(e.unit_price||0)*(e.quantity||1);});return summary;}

function sortUsers(arr){
  var s=S._userSort;var col=s.col;var dir=s.asc?1:-1;
  return arr.slice().sort(function(a,b){
    var va,vb;
    if(col==='email'){va=(a.display_name||a.email||'').toLowerCase();vb=(b.display_name||b.email||'').toLowerCase();}
    else if(col==='company_name'){va=(a.company_name||'').toLowerCase();vb=(b.company_name||'').toLowerCase();}
    else if(col==='plan'){va=a.plan||'free';vb=b.plan||'free';}
    else if(col==='is_active'){va=a.is_active?1:0;vb=b.is_active?1:0;}
    else if(col==='analyses'){va=S.analyses.filter(function(x){return x.user_id===a.id;}).length;vb=S.analyses.filter(function(x){return x.user_id===b.id;}).length;}
    else{va=a.created_at||'';vb=b.created_at||'';}
    if(va<vb)return -1*dir;if(va>vb)return 1*dir;return 0;
  });
}
function setUserSort(col){
  if(S._userSort.col===col)S._userSort.asc=!S._userSort.asc;
  else{S._userSort={col:col,asc:true};}

}

function pgFeedback(){
  if(S.selectedFB)return pgFBDetail();
  var all=getFeedbacks();
  var filtered=all;

function pgServiceReq(){
  if(S.selectedSR)return pgSRDetail();
  var filtered=filterBySearch(S.serviceRequests,['title','service_type']);
  if(S.tab!=='all')filtered=filtered.filter(function(s){return s.status===S.tab;});

  var tabs=['all','pending','accepted','processing','completed','cancelled'];
  var tabL={all:AT('all'),pending:AT('received'),accepted:AT('assigned'),processing:AT('processing'),completed:AT('done'),cancelled:AT('cancelled')};

  /* SLA 계산 */
  var slaHours={urgent:4,high:24,normal:72,low:168};
  function getSLA(sr){
    var h=slaHours[sr.priority||'normal']||72;
    var created=new Date(sr.created_at);var now=new Date();
    var elapsed=Math.floor((now-created)/(1000*60*60));
    var remain=h-elapsed;
    return {total:h,elapsed:elapsed,remain:remain,pct:Math.min(Math.round(elapsed/h*100),100),overdue:remain<0};
  }

  /* 파이프라인 요약 */
  var pipeline='<div style="display:flex;gap:6px;margin-bottom:16px">'+
    [{s:'pending',i:'📥',c:'var(--w40)'},{s:'accepted',i:'👤',c:'var(--pri)'},{s:'processing',i:'⚙️',c:'var(--acc)'},{s:'completed',i:'✅',c:'var(--ok)'}].map(function(st){
    var cnt=S.serviceRequests.filter(function(x){return x.status===st.s;}).length;
    return '<div style="flex:1;padding:12px;border-radius:10px;background:var(--w08);text-align:center;border-bottom:3px solid '+(cnt?st.c:'transparent')+'">'+
    '<div style="font-size:16px">'+st.i+'</div><div style="font-size:10px;color:var(--w40)">'+tabL[st.s]+'</div>'+
    '<div style="font-size:20px;font-weight:800;color:'+(cnt?st.c:'var(--w20)')+'">'+cnt+'</div></div>';
  }).join('')+'</div>';

  /* 긴급 SLA 경고 */
  var urgentSRs=S.serviceRequests.filter(function(sr){return sr.status!=='completed'&&sr.status!=='cancelled'&&getSLA(sr).overdue;});
  var urgentAlert=urgentSRs.length?'<div style="padding:10px 14px;border-radius:10px;background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.2);margin-bottom:12px;font-size:12px;color:var(--err)">⚠️ SLA 초과 '+urgentSRs.length+'건 — 즉시 처리 필요</div>':'';

  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-size:18px;font-weight:800">'+AT('ð_¼_service_requests')+'</h2>'+UI.badge(S.serviceRequests.length+'건','acc')+'</div>'+
  pipeline+urgentAlert+
  '<div style="display:flex;gap:10px;margin-bottom:16px"><div class="search-box" style="flex:1"><input placeholder="'+AT('search_services')+'" value="'+S.searchFilter+'" oninput="Adm.setSearch(this.value)"></div></div>'+
  '<div class="tab-bar">'+tabs.map(function(t){
    var c=t==='all'?S.serviceRequests.length:S.serviceRequests.filter(function(s){return s.status===t;}).length;
    return '<div class="tab-item '+(S.tab===t?'active':'')+'" role="tab" aria-selected="'+(S.tab===t)+'" tabindex="'+(S.tab===t?'0':'-1')+'" onclick="Adm.setTab(\''+t+'\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();this.click()}">'+tabL[t]+' <span style="font-size:10px;color:var(--w20)">'+c+'</span></div>';
  }).join('')+'</div>'+
  '<div class="card"><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>'+AT('service')+'</th><th>'+AT('user')+'</th><th>'+AT('status')+'</th><th>'+AT('priority')+'</th><th>SLA</th><th>'+AT('assigned2')+'</th><th>'+AT('amount')+'</th></tr></thead><tbody>'+
  (filtered.length?filtered.map(function(sr){
    var sla=getSLA(sr);
    var slaCol=sla.overdue?'var(--err)':sla.remain<12?'var(--acc)':'var(--ok)';
    var isDone=sr.status==='completed'||sr.status==='cancelled';

    '<td style="font-size:11px;color:'+(isDone?'var(--w20)':slaCol)+'">'+(isDone?'—':(sla.overdue?AT('overdue')+Math.abs(sla.remain)+'h':sla.remain+'h'))+'</td>'+
    '<td style="font-size:11px;color:var(--w40)">'+(sr.assigned_to?getUserName(sr.assigned_to):AT('unassigned'))+'</td>'+
    '<td style="font-family:JetBrains Mono;font-size:12px">'+(sr.price?U.krw(sr.price):'\u2014')+'</td></tr>';
  }).join(''):'<tr><td colspan="7">'+UI.empty('💼',AT('no_results'),'')+'</td></tr>')+
  '</tbody></table></div></div>';

function pgAnalytics(){
  var tabs=['users','pages','funnel','feature','revenue','trends','tradeTools'];
  var tabL={users:AT('user_analytics'),pages:AT('page_views'),funnel:AT('conversion_funnel'),feature:AT('feature_usage'),revenue:AT('revenue2'),trends:AT('export_trends'),tradeTools:AT('trade_tools')};
  var tabBar='<div class="tab-bar">'+tabs.map(function(t){
    return '<div class="tab-item '+(S.analyticsTab===t?'active':'')+'" role="tab" aria-selected="'+(S.analyticsTab===t)+'" tabindex="'+(S.analyticsTab===t?'0':'-1')+'" onclick="Adm.setAnalyticsTab(\''+t+'\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();this.click()}">'+tabL[t]+'</div>';
  }).join('')+'</div>';
  if(S.analyticsTab==='pages') return pgAnalyticsPages(tabBar);
  if(S.analyticsTab==='funnel') return pgAnalyticsFunnel(tabBar);
  if(S.analyticsTab==='feature') return pgAnalyticsFeature(tabBar);
  if(S.analyticsTab==='revenue') return pgAnalyticsRevenue(tabBar);
  if(S.analyticsTab==='trends') return pgAnalyticsTrends(tabBar);
  if(S.analyticsTab==='tradeTools') return pgTradeTools(tabBar);
  return pgAnalyticsUsers(tabBar);
}
function pgAnalyticsUsers(tabBar){
  var today=new Date();
  var days=[];for(var i=29;i>=0;i--){var d=new Date(today-i*864e5);days.push(d.toISOString().slice(0,10));}
  var signupByDay={};days.forEach(function(d){signupByDay[d]=0;});
  S.users.forEach(function(u){var d=(u.created_at||'').slice(0,10);if(signupByDay[d]!==undefined)signupByDay[d]++;});
  var maxSignup=Math.max.apply(null,days.map(function(d){return signupByDay[d];}))||1;
  var roles=groupBy(S.users,'role');var roleLabels={client:AT('manufacturer'),buyer:AT('buyer'),admin:AT('admin')};
  var clients=S.users.filter(function(u){return u.role==='client';});var plans=groupBy(clients,'plan');
  var countries={};S.buyers.forEach(function(b){if(b.country)countries[b.country]=(countries[b.country]||0)+1;});
  return '<div style="margin-bottom:20px"><h2 style="font-size:18px;font-weight:800">'+AT('ð_analytics')+'</h2></div>'+tabBar+
  '<div class="card" style="margin-bottom:16px"><div class="card-h">'+AT('signups_30_days')+'</div><div class="card-b">'+
    '<div style="display:flex;align-items:flex-end;gap:2px;height:100px">'+days.map(function(d){var v=signupByDay[d];var h=Math.max(Math.round(v/maxSignup*80),2);return '<div title="'+d+': '+v+'명" style="flex:1;height:'+h+'px;background:var(--pri);border-radius:2px 2px 0 0;opacity:'+(v?1:0.2)+'"></div>';}).join('')+'</div>'+
    '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--w20)"><span>'+days[0]+'</span><span>'+days[days.length-1]+'</span></div>'+
  '</div></div>'+
  '<div class="grid-2" style="margin-bottom:16px">'+
    '<div class="card"><div class="card-h">'+AT('role_dist')+'</div><div class="card-b">'+Object.keys(roleLabels).map(function(k){return hBar(roleLabels[k],(roles[k]||[]).length,S.users.length,'var(--pri)');}).join('')+'</div></div>'+
    '<div class="card"><div class="card-h">'+AT('plan_dist_manufacturers')+'</div><div class="card-b">'+['free','starter','pro','alibaba'].map(function(k){var cnt=0;clients.forEach(function(u){if(k==='starter'&&(u.plan==='starter'||u.plan==='basic'))cnt++;else if(u.plan===k)cnt++;});var r=U.pl(k);return hBar(r[0],cnt,clients.length||1,r[1]);}).join('')+'</div></div>'+
  '</div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-h">'+AT('buyers_by_country')+'</div><div class="card-b">'+(function(){var sorted=Object.entries(countries).sort(function(a,b){return b[1]-a[1];});var mx=sorted.length?sorted[0][1]:1;return sorted.map(function(e){return hBar(flag(e[0])+' '+e[0],e[1],mx,'var(--pri)');}).join('');})()+
    '</div></div>'+
    '<div class="card"><div class="card-h">'+AT('activity_level')+'</div><div class="card-b">'+(function(){var t7=new Date(today-7*864e5);var t30=new Date(today-30*864e5);var a7=S.users.filter(function(u){return new Date(u.updated_at)>=t7;}).length;var a30=S.users.filter(function(u){return new Date(u.updated_at)>=t30;}).length;return hBar(AT('active_7d'),a7,S.users.length,'var(--ok)')+hBar(AT('active_30d'),a30,S.users.length,'var(--acc)')+hBar(AT('inactive_30d'),S.users.length-a30,S.users.length,'var(--err)');})()+
    '</div></div>'+
  '</div>';
}

  var pvByPortal=groupBy(S.pageViews,'portal');

  var pvByDay={};days.forEach(function(d){pvByDay[d]=0;});

  '<div class="card" style="margin-bottom:16px"><div class="card-h">'+AT('page_views_30_days')+'</div><div class="card-b">'+
    '<div style="display:flex;align-items:flex-end;gap:2px;height:100px">'+days.map(function(d){var v=pvByDay[d];var h=Math.max(Math.round(v/maxDayPV*80),2);return '<div title="'+d+': '+v+'" style="flex:1;height:'+h+'px;background:var(--acc);border-radius:2px 2px 0 0;opacity:'+(v?1:0.2)+'"></div>';}).join('')+'</div>'+
    '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--w20)"><span>'+days[0]+'</span><span>'+days[days.length-1]+'</span></div>'+
  '</div></div>'+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-h">'+AT('top_pages')+'</div><div class="card-b">'+sorted.slice(0,10).map(function(p){return hBar(p.page,p.count,maxPV,'var(--pri)');}).join('')+'</div></div>'+
    '<div class="card"><div class="card-h">'+AT('by_portal_role')+'</div><div class="card-b"><div style="font-size:12px;font-weight:600;color:var(--w40);margin-bottom:8px">'+AT('portal')+'</div>'+Object.entries(pvByPortal).map(function(e){return hBar(e[0]||'unknown',e[1].length,S.pageViews.length||1,'var(--acc)');}).join('')+'<div style="font-size:12px;font-weight:600;color:var(--w40);margin:12px 0 8px">'+AT('role')+'</div>'+Object.keys(roleLabels).map(function(k){return hBar(roleLabels[k],(pvByRole[k]||[]).length,S.pageViews.length||1,'var(--pri)');}).join('')+'</div></div>'+
  '</div>';
}
function pgAnalyticsFunnel(tabBar){
  var clients=S.users.filter(function(u){return u.role==='client';});
  var wA=new Set();S.analyses.forEach(function(a){wA.add(a.user_id);});
  var wP=new Set();S.products.forEach(function(p){wP.add(p.user_id);});
  var wM=new Set();S.matchings.forEach(function(m){wM.add(m.user_id);});
  var wO=new Set();S.orders.forEach(function(o){wO.add(o.user_id);});
  var wC=new Set();S.matchings.filter(function(m){return m.status==='completed';}).forEach(function(m){wC.add(m.user_id);});
  var funnel=[{label:AT('signup'),count:clients.length,color:'var(--w60)'},{label:AT('analysis_done'),count:wA.size,color:'var(--pri)'},{label:AT('product_listed'),count:wP.size,color:'var(--acc)'},{label:AT('buyer_matched'),count:wM.size,color:'var(--warn)'},{label:AT('order_placed'),count:wO.size,color:'var(--purple)'},{label:AT('deal_closed'),count:wC.size,color:'var(--ok)'}];
  var buyerUsers=S.users.filter(function(u){return u.role==='buyer';});
  var bR=new Set();S.buyerRequests.forEach(function(r){bR.add(r.buyer_id);});
  var bM=new Set();S.matchings.forEach(function(m){bM.add(m.buyer_id);});
  var bO=new Set();S.orders.forEach(function(o){bO.add(o.buyer_id);});
  var buyerFunnel=[{label:AT('signup'),count:buyerUsers.length,color:'var(--w60)'},{label:AT('buyer_registered'),count:S.buyers.length,color:'var(--pri)'},{label:AT('inquiry_made'),count:bR.size,color:'var(--acc)'},{label:AT('matching2'),count:bM.size,color:'var(--warn)'},{label:AT('orders3'),count:bO.size,color:'var(--ok)'}];
  function funnelBar(f,base){var pct=base?Math.round(f.count/base*100):0;var w=Math.max(pct,8);return '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--w60)">'+f.label+'</span><span style="font-size:12px;font-weight:700;font-family:JetBrains Mono;color:'+f.color+'">'+f.count+' ('+pct+'%)</span></div><div style="height:28px;background:'+f.color+'15;border-radius:6px;width:'+w+'%;display:flex;align-items:center;padding:0 10px"><div style="height:100%;background:'+f.color+';border-radius:6px;width:100%;opacity:.7"></div></div></div>';}
  return '<div style="margin-bottom:20px"><h2 style="font-size:18px;font-weight:800">'+AT('ð_analytics')+'</h2></div>'+tabBar+
  '<div class="grid-2">'+
    '<div class="card"><div class="card-h">'+AT('manufacturer_funnel')+'</div><div class="card-b">'+funnel.map(function(f){return funnelBar(f,clients.length);}).join('')+'</div></div>'+
    '<div class="card"><div class="card-h">'+AT('buyer_funnel')+'</div><div class="card-b">'+buyerFunnel.map(function(f){return funnelBar(f,buyerUsers.length||1);}).join('')+'</div></div>'+
  '</div>';
}
function pgAnalyticsFeature(tabBar){
  var usage=calcUsageSummary();
  var featureLabels={ai_analysis:AT('ai_export_analysis'),document_gen:AT('document_gen'),buyer_matching:AT('buyer_matching'),email_send:AT('email_send'),trend_report:AT('trend_report')};
  /* Derive feature usage from existing data if usage_events is sparse */
  var featureData=[];
  var analysisCount=S.analyses?S.analyses.length:0;
  var docCount=S.documents?S.documents.length:0;
  var matchCount=S.matchings?S.matchings.length:0;
  var msgCount=S.messages?S.messages.length:0;
  var orderCount=S.orders?S.orders.length:0;
  var productCount=S.products?S.products.length:0;
  var projectCount=S.projects?S.projects.length:0;
  featureData.push({label:AT('ai_analysis'),count:analysisCount+(usage.ai_analysis?usage.ai_analysis.count:0),icon:'🔬',color:'var(--pri)'});
  featureData.push({label:AT('product_registration'),count:productCount,icon:'📦',color:'var(--acc)'});
  featureData.push({label:AT('project_creation'),count:projectCount,icon:'🗂️',color:'var(--ok)'});
  featureData.push({label:AT('document_generation'),count:docCount+(usage.document_gen?usage.document_gen.count:0),icon:'📄',color:'var(--warn)'});
  featureData.push({label:AT('buyer_matching'),count:matchCount+(usage.buyer_matching?usage.buyer_matching.count:0),icon:'🤝',color:'var(--purple)'});
  featureData.push({label:AT('chat_messages'),count:msgCount,icon:'💬',color:'var(--admin)'});
  featureData.push({label:AT('orders_created'),count:orderCount,icon:'📋',color:'#f97316'});
  for(var fk in usage){if(!featureLabels[fk])continue;var found=false;featureData.forEach(function(fd){if(fd.label===(featureLabels[fk]||fk))found=true;});if(!found)featureData.push({label:featureLabels[fk]||fk,count:usage[fk].count,icon:'⚡',color:'var(--pri)'});}
  featureData.sort(function(a,b){return b.count-a.count;});
  var maxFeat=featureData.length?featureData[0].count:1;
  var totalUsage=featureData.reduce(function(s,f){return s+f.count;},0);

  /* Per-user feature adoption */
  var clients=S.users.filter(function(u){return u.role==='client';});
  var clientsWithAnalysis=new Set();S.analyses.forEach(function(a){clientsWithAnalysis.add(a.user_id);});
  var clientsWithProduct=new Set();S.products.forEach(function(p){clientsWithProduct.add(p.user_id);});
  var clientsWithDoc=new Set();S.documents.forEach(function(d){clientsWithDoc.add(d.user_id);});
  var clientsWithMatch=new Set();S.matchings.forEach(function(m){clientsWithMatch.add(m.user_id);});
  var clientsWithOrder=new Set();S.orders.forEach(function(o){clientsWithOrder.add(o.user_id);});
  var adoptionData=[
    {label:AT('used_analysis'),count:clientsWithAnalysis.size,color:'var(--pri)'},
    {label:AT('listed_product'),count:clientsWithProduct.size,color:'var(--acc)'},
    {label:AT('generated_docs'),count:clientsWithDoc.size,color:'var(--warn)'},
    {label:AT('had_matching'),count:clientsWithMatch.size,color:'var(--purple)'},
    {label:AT('placed_order'),count:clientsWithOrder.size,color:'var(--ok)'}
  ];

  return '<div style="margin-bottom:20px"><h2 style="font-size:18px;font-weight:800">'+AT('ð_analytics')+'</h2></div>'+tabBar+
  '<div class="grid-4" style="margin-bottom:16px">'+
    UI.stat(AT('total_usage'),totalUsage,'','var(--pri)')+
    UI.stat(AT('active_features'),featureData.filter(function(f){return f.count>0;}).length+'/'+featureData.length,'','var(--acc)')+
    UI.stat(AT('analyses2'),analysisCount,'','var(--ok)')+
    UI.stat(AT('documents2'),docCount,'','var(--warn)')+
  '</div>'+
  '<div class="grid-2" style="margin-bottom:16px">'+
    '<div class="card"><div class="card-h">'+AT('usage_by_feature')+'</div><div class="card-b">'+
      featureData.map(function(f){
        var pct=maxFeat?Math.round(f.count/maxFeat*100):0;
        return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px">'+
          '<div style="min-width:20px;text-align:center">'+f.icon+'</div>'+
          '<div style="min-width:110px;font-weight:600">'+f.label+'</div>'+
          '<div style="flex:1;height:20px;background:var(--w08);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+Math.max(pct,2)+'%;background:'+f.color+';border-radius:4px;opacity:.7"></div></div>'+
          '<div style="min-width:50px;text-align:right;font-family:JetBrains Mono;font-weight:700;font-size:12px">'+f.count+'</div></div>';
      }).join('')+
    '</div></div>'+
    '<div class="card"><div class="card-h">'+AT('feature_adoption_manufacturers')+'</div><div class="card-b">'+
      (clients.length?adoptionData.map(function(a){
        var pct=Math.round(a.count/clients.length*100);
        return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px">'+

/* ── P2-3: Export Trends (Enhanced) ── */
function pgAnalyticsTrends(tabBar){
  var today=new Date();
  var thisYear=today.getFullYear();
  var thisMonth=today.getMonth();
  var lastMonth=thisMonth===0?11:thisMonth-1;
  var lastMonthYear=thisMonth===0?thisYear-1:thisYear;

  // 30-day range
  var days=[];for(var i=29;i>=0;i--){var d=new Date(today-i*864e5);days.push(d.toISOString().slice(0,10));}

  // Helper: check if date falls in a given month/year
  function inMonth(dateStr,yr,mo){
    if(!dateStr)return false;
    var p=dateStr.slice(0,7).split('-');
    return parseInt(p[0])===yr&&parseInt(p[1])===(mo+1);
  }

  // ── MoM deal counts ──
  var dealsThisMonth=0,dealsLastMonth=0;
  S.matchings.forEach(function(m){
    if(inMonth(m.created_at,thisYear,thisMonth))dealsThisMonth++;
    if(inMonth(m.created_at,lastMonthYear,lastMonth))dealsLastMonth++;
  });
  var dealChange=dealsLastMonth?Math.round((dealsThisMonth-dealsLastMonth)/dealsLastMonth*100):dealsThisMonth?100:0;

  // ── MoM new buyers ──
  var buyersThisMonth=0,buyersLastMonth=0;
  S.buyers.forEach(function(b){
    if(inMonth(b.created_at,thisYear,thisMonth))buyersThisMonth++;
    if(inMonth(b.created_at,lastMonthYear,lastMonth))buyersLastMonth++;
  });
  var buyerChange=buyersLastMonth?Math.round((buyersThisMonth-buyersLastMonth)/buyersLastMonth*100):buyersThisMonth?100:0;

  // ── MoM escrow/transaction amounts ──
  var escrows=S.escrowTxns||[];
  var txnThisMonth=0,txnLastMonth=0;
  var settledCount=0,totalEscrowCount=0,refundCount=0;
  var holdDaysSum=0,holdDaysN=0;
  escrows.forEach(function(e){
    var amt=Number(e.amount)||0;
    if(inMonth(e.created_at,thisYear,thisMonth))txnThisMonth+=amt;
    if(inMonth(e.created_at,lastMonthYear,lastMonth))txnLastMonth+=amt;
    totalEscrowCount++;
    if(e.status==='settled'||e.status==='completed'){
      settledCount++;
      if(e.created_at&&e.settled_at){
        var d1=new Date(e.created_at),d2=new Date(e.settled_at);
        var diff=Math.round((d2-d1)/(864e5));
        if(diff>=0){holdDaysSum+=diff;holdDaysN++;}
      }
    }
    if(e.status==='refunded')refundCount++;
  });
  var txnChange=txnLastMonth?Math.round((txnThisMonth-txnLastMonth)/txnLastMonth*100):txnThisMonth?100:0;
  var settlementRate=totalEscrowCount?Math.round(settledCount/totalEscrowCount*100):0;
  var avgHoldDays=holdDaysN?Math.round(holdDaysSum/holdDaysN):0;
  var refundRate=totalEscrowCount?Math.round(refundCount/totalEscrowCount*1000)/10:0;

  // ── Country pipeline with amounts ──
  var countryData={};
  S.matchings.forEach(function(m){
    var buyer=S.buyers.find(function(b){return b.id===m.buyer_id;});
    if(buyer&&buyer.country){
      var c=buyer.country;
      if(!countryData[c])countryData[c]={deals:0,dealsLast:0,amount:0};
      countryData[c].deals++;
      if(inMonth(m.created_at,lastMonthYear,lastMonth))countryData[c].dealsLast++;
      var order=S.orders.find(function(o){return o.matching_id===m.id;});
      if(order)countryData[c].amount+=Number(order.total_amount||order.amount||0);
    }
  });
  var countryEntries=Object.keys(countryData).map(function(c){
    var d=countryData[c];
    var momPct=d.dealsLast?Math.round((d.deals-d.dealsLast)/d.dealsLast*100):d.deals?100:0;
    var avgPrice=d.deals?Math.round(d.amount/d.deals):0;
    return{country:c,deals:d.deals,amount:d.amount,mom:momPct,avgPrice:avgPrice};
  }).sort(function(a,b){return b.deals-a.deals;}).slice(0,10);
  var maxCountryDeals=countryEntries.length?countryEntries[0].deals:1;

  // Top country name for narrative
  var topCountryName=countryEntries.length?countryEntries[0].country:'-';

  // ── Category/Industry trends with suitability ──
  var catData={};
  S.analyses.forEach(function(a){
    var cat=(a.category||a.product_category||'Other');
    if(!catData[cat])catData[cat]={count:0,countLast:0,scores:[],destinations:{}};
    catData[cat].count++;
    if(inMonth(a.created_at,lastMonthYear,lastMonth))catData[cat].countLast++;
    var score=Number(a.export_suitability_score||a.suitability_score||0);
    if(score)catData[cat].scores.push(score);
    var dest=a.target_country||a.destination_country||'';
    if(dest){catData[cat].destinations[dest]=(catData[cat].destinations[dest]||0)+1;}
  });
  var catEntries=Object.keys(catData).map(function(cat){
    var d=catData[cat];
    var avgScore=d.scores.length?Math.round(d.scores.reduce(function(s,v){return s+v;},0)/d.scores.length*10)/10:0;
    var topDest='-';var topDestN=0;
    Object.keys(d.destinations).forEach(function(k){if(d.destinations[k]>topDestN){topDestN=d.destinations[k];topDest=k;}});
    var momPct=d.countLast?Math.round((d.count-d.countLast)/d.countLast*100):d.count?100:0;
    var tag=momPct>10?'growth':momPct<-10?'decline':'stable';
    return{cat:cat,count:d.count,avgScore:avgScore,topDest:topDest,mom:momPct,tag:tag};
  }).sort(function(a,b){return b.count-a.count;}).slice(0,10);
  var maxCat=catEntries.length?catEntries[0].count:1;

  // ── HS code analysis ──
  var hsData={};

      var hs=p.hs_code.substring(0,4);
      if(!hsData[hs])hsData[hs]={count:0,name:'',tariffs:[],ftaCount:0};
      hsData[hs].count++;
      if(p.product_name||p.name)hsData[hs].name=p.product_name||p.name;
    }
  });
  // Enrich from analyses
  S.analyses.forEach(function(a){
    if(a.hs_code){
      var hs=a.hs_code.substring(0,4);

        if(a.tariff_rate!==undefined&&a.tariff_rate!==null)hsData[hs].tariffs.push(Number(a.tariff_rate)||0);

    var tariffRange=d.tariffs.length?(tariffMin===tariffMax?tariffMin+'%':tariffMin+'~'+tariffMax+'%'):'-';
    return{hs:hs,count:d.count,name:d.name,tariffRange:tariffRange,ftaCount:d.ftaCount};
  }).sort(function(a,b){return b.count-a.count;}).slice(0,8);
  var maxHS=hsEntries.length?hsEntries[0].count:1;

  // ── Deals by day (30-day trend) ──
  var dealsByDay={};days.forEach(function(d){dealsByDay[d]=0;});
  S.matchings.forEach(function(m){var d=(m.created_at||'').slice(0,10);if(dealsByDay[d]!==undefined)dealsByDay[d]++;});
  var maxDayDeals=Math.max.apply(null,days.map(function(d){return dealsByDay[d];}))||1;

  // ── Sample trend ──
  var samplesByDay={};days.forEach(function(d){samplesByDay[d]=0;});
  (S.samples||[]).forEach(function(s){var d=(s.created_at||'').slice(0,10);if(samplesByDay[d]!==undefined)samplesByDay[d]++;});
  var maxDaySamples=Math.max.apply(null,days.map(function(d){return samplesByDay[d];}))||1;

  // ── Monthly escrow trend (last 6 months) ──
  var escrowMonthly=[];
  for(var mi=5;mi>=0;mi--){

    if(emo<0){emo+=12;eyr--;}

    escrowMonthly.push({label:mLabel,amount:mTotal});

  // ── Methodology counts ──
  var uniqueCountries=Object.keys(countryData).length;
  var mfgCount=S.users.filter(function(u){return u.role==='manufacturer'||u.user_type==='manufacturer';}).length;

  // ── Build HTML ──

  h+='<div class="card" style="border-left:3px solid var(--acc)"><div class="card-b" style="padding:16px">'+

function lookupHSCode(){
  var q=(document.getElementById('ttHsInput')||{}).value;if(!q||!q.trim())return;
  var el=document.getElementById('ttHsResult');
  el.innerHTML='<div style="padding:10px;text-align:center"><div class="spinner" style="width:20px;height:20px;margin:0 auto"></div></div>';
  sb.functions.invoke('classify-hs',{body:{product_name:q.trim(),lang:_isKorean?'ko':'en'}}).then(function(r){
    var data=r.data;
    if(!data||data.error){el.innerHTML='<div style="color:var(--err);font-size:12px">'+AT('lookup_failed')+'</div>';return;}
    var res=typeof data==='string'?JSON.parse(data):data;
    var h='<div style="padding:10px;background:var(--w08);border-radius:var(--r-xs)">';
    if(res.hs_code)h+='<div style="font-size:16px;font-weight:800;font-family:JetBrains Mono;color:var(--pri);margin-bottom:4px">HS '+U.esc(res.hs_code)+'</div>';
    if(res.description)h+='<div style="font-size:12px;color:var(--w60);margin-bottom:4px">'+U.esc(res.description)+'</div>';
    if(res.duty_rate)h+='<div style="font-size:11px;color:var(--acc)">'+AT('duty_rate')+': '+U.esc(res.duty_rate)+'</div>';
    if(res.notes)h+='<div style="font-size:11px;color:var(--w40);margin-top:4px">'+U.esc(res.notes)+'</div>';
    h+='</div>';
    el.innerHTML=h;
  }).catch(function(e){el.innerHTML='<div style="color:var(--err);font-size:12px">Error: '+U.esc(e.message)+'</div>';});
}

function checkFTA(){
  var hs=(document.getElementById('ttFtaHs')||{}).value;
  var origin=(document.getElementById('ttFtaOrigin')||{}).value||'KR';
  var dest=(document.getElementById('ttFtaDest')||{}).value;
  if(!hs||!dest){UI.toast(AT('fill_all_fields'),'warn');return;}
  var el=document.getElementById('ttFtaResult');
  el.innerHTML='<div style="padding:10px;text-align:center"><div class="spinner" style="width:20px;height:20px;margin:0 auto"></div></div>';
  sb.functions.invoke('fta-simulator',{body:{hs_code:hs.trim(),origin:origin.trim(),destination:dest.trim(),lang:_isKorean?'ko':'en'}}).then(function(r){
    var data=r.data;
    if(!data||data.error){el.innerHTML='<div style="color:var(--err);font-size:12px">'+AT('fta_check_failed')+'</div>';return;}
    var res=typeof data==='string'?JSON.parse(data):data;
    var h='<div style="padding:10px;background:var(--w08);border-radius:var(--r-xs)">';
    if(res.fta_name)h+='<div style="font-size:14px;font-weight:700;color:var(--ok);margin-bottom:4px">'+U.esc(res.fta_name)+'</div>';
    if(res.preferential_rate!==undefined)h+='<div style="font-size:12px;margin-bottom:4px">'+AT('preferential_rate')+': <strong style="color:var(--acc)">'+U.esc(res.preferential_rate)+'</strong></div>';
    if(res.mfn_rate)h+='<div style="font-size:11px;color:var(--w40)">MFN: '+U.esc(res.mfn_rate)+'</div>';
    if(res.rules_of_origin)h+='<div style="font-size:11px;color:var(--w60);margin-top:4px;border-top:1px solid var(--bd);padding-top:6px">'+AT('origin_rules')+': '+U.esc(res.rules_of_origin)+'</div>';

    h+='</div>';
    el.innerHTML=h;
  }).catch(function(e){el.innerHTML='<div style="color:var(--err);font-size:12px">Error: '+U.esc(e.message)+'</div>';});
}

function disputeSLA(d){

function changeDisputeStatus(id,val){
  if((val==='resolved'||val==='closed')&&!confirm(AT('confirm_dispute_status')+' "'+DST[val]+'"?'))return;
  var curr=S.disputes.find(function(x){return x.id===id;});
  var details=curr?JSON.parse(JSON.stringify(curr.details||{})):{};
  if(!details.status_history)details.status_history=[];
  details.status_history.push({from:curr?curr.status:'',to:val,by:S.user.id,at:new Date().toISOString()});
  var upd={status:val,details:details,updated_at:new Date().toISOString()};
  if(val==='resolved'||val==='closed'){upd.resolved_by=S.user.id;upd.resolved_at=new Date().toISOString();}
  sb.from('disputes').update(upd).eq('id',id).select().then(function(r){
    if(r.error)return UI.toast(AT('change_failed'),'err');
    var d=r.data[0];var idx=S.disputes.findIndex(function(x){return x.id===id;});if(idx>=0)S.disputes[idx]=d;
    if(S.selectedDispute&&S.selectedDispute.id===id)S.selectedDispute=d;
    UI.toast(AT('status_changed')+': '+DST[val],'ok');render();
    notifyDisputeParties(d,'status_change',AT('dispute_status_changed_to')+' '+DST[val]);
    /* Sync escrow_dispute on linked order when resolved/closed */
    if((val==='resolved'||val==='closed')&&d.details&&d.details.deal_id){
      var resText=d.resolution||DST[val]||val;
      sb.from('orders').select('escrow_dispute').eq('deal_id',d.details.deal_id).single().then(function(oRes){
        if(oRes.error||!oRes.data||!oRes.data.escrow_dispute)return;
        var ed=oRes.data.escrow_dispute;
        ed.status=val;ed.resolvedAt=new Date().toISOString();ed.resolution=resText;ed.resolutionNote='Admin: '+resText;
        ed.timeline=ed.timeline||[];ed.timeline.push({date:new Date().toISOString(),action:'Admin resolved: '+resText,type:'resolved'});
        sb.from('orders').update({escrow_dispute:ed,updated_at:new Date().toISOString()}).eq('deal_id',d.details.deal_id).catch(function(e){console.error('[dispute] order sync fail:',e);});
      });
    }
  });
}

function processDisputeRefund(id,refundType){
  var d=S.disputes.find(function(x){return x.id===id;});if(!d)return;
  if(refundType==='partial'){
    var amt=prompt(AT('enter_refund_amount')+' ('+(d.details&&d.details.currency||'USD')+'):');
    if(!amt||isNaN(Number(amt)))return;
  }
  if(refundType==='reship'){
    if(!confirm(AT('confirm_reship')))return;
    var details=JSON.parse(JSON.stringify(d.details||{}));
    details.reship_requested=true;details.reship_at=new Date().toISOString();
    sb.from('disputes').update({details:details,updated_at:new Date().toISOString()}).eq('id',id).select().then(function(r){
      if(r.error)return UI.toast(AT('save_failed2'),'err');
      var upd=r.data[0];var idx=S.disputes.findIndex(function(x){return x.id===id;});if(idx>=0)S.disputes[idx]=upd;
      S.selectedDispute=upd;UI.toast(AT('reship_requested'),'ok');render();
      notifyDisputeParties(upd,'reship',AT('reship_requested_msg'));
    });
    return;
  }
  if(!confirm(refundType==='full'?AT('confirm_full_refund'):AT('confirm_partial_refund')))return;
  var piId=d.details&&d.details.payment_intent_id;
  if(!piId){UI.toast(AT('no_payment_intent'),'err');return;}
  var token=sb.auth.session&&sb.auth.session()&&sb.auth.session().access_token;
  if(!token){var sess=null;try{sess=JSON.parse(localStorage.getItem('sb-lylktgxngrlxmsldxdqj-auth-token'));}catch(e){}token=sess&&sess.access_token;}
  UI.toast(AT('processing_refund'),'info');
  fetch('https://lylktgxngrlxmsldxdqj.supabase.co/functions/v1/process-refund',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({refund_type:'escrow_dispute',payment_intent_id:piId,deal_id:d.details&&d.details.deal_id||'',reason:'admin_dispute_resolution: '+U.tr(d.subject,50)})
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(res){
    if(res.error){UI.toast(AT('refund_failed')+': '+res.error,'err');return;}
    var details=JSON.parse(JSON.stringify(d.details||{}));
    details.refund_id=res.refund_id;details.refund_amount=res.amount;details.refund_at=new Date().toISOString();
    sb.from('disputes').update({details:details,status:'resolved',resolution:(d.resolution||'')+'\n['+AT('refund_processed')+'] '+res.refund_id,resolved_by:S.user.id,resolved_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq('id',id).select().then(function(r2){
      if(r2.error)return UI.toast(AT('save_failed2'),'err');
      var upd=r2.data[0];var idx=S.disputes.findIndex(function(x){return x.id===id;});if(idx>=0)S.disputes[idx]=upd;
      S.selectedDispute=upd;UI.toast(AT('refund_completed')+': '+(res.currency||'USD')+' '+Number(res.amount||0).toLocaleString(),'ok');render();
    });
  }).catch(function(err){UI.toast(AT('refund_failed')+': '+err.message,'err');});
}

function manualEscrowRelease(escrowId){
  var esc=S.escrowTxns.find(function(x){return x.id===escrowId;});
  if(!esc)return UI.toast(AT('escrow_not_found'),'err');
  if(!confirm(AT('confirm_escrow_release')+'\n\n'+AT('manufacturer')+': '+getUserName(esc.seller_id)+'\n'+AT('amount')+': '+(esc.currency||'USD')+' '+Number(esc.amount).toLocaleString()))return;
  UI.toast(AT('processing_settlement'),'info');
  sb.from('payments').select('*').eq('type','escrow').eq('status','held').or('deal_id.eq.'+esc.matching_id+',deal_id.eq.'+esc.order_id).limit(1).then(function(r){
    if(!r.data||!r.data.length){
      forceEscrowStatusUpdate(escrowId,'released',AT('no_stripe_payment_manual'));
      return;
    }
    var payment=r.data[0];
    var token=null;try{var sess=JSON.parse(localStorage.getItem('sb-lylktgxngrlxmsldxdqj-auth-token'));token=sess&&sess.access_token;}catch(e){}
    if(!token)return UI.toast(AT('auth_required'),'err');
    fetch('https://lylktgxngrlxmsldxdqj.supabase.co/functions/v1/auto-settle',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({action:'release_escrow',payment_intent_id:payment.stripe_payment_intent,deal_id:payment.deal_id||esc.matching_id})
    }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(res){
      if(res.error){
        UI.toast(AT('settlement_failed')+': '+res.error,'err');
        return;
      }
      var fee=Number(esc.amount)*0.025;var net=Number(esc.amount)-fee;
      sb.from('orders').update({escrow_status:'released',escrow_released_at:new Date().toISOString(),escrow_fee:fee,escrow_net_amount:net,status:'completed',updated_at:new Date().toISOString()}).eq('id',escrowId).then(function(r2){
        var idx=S.escrowTxns.findIndex(function(x){return x.id===escrowId;});if(idx>=0){S.escrowTxns[idx].escrow_status='released';S.escrowTxns[idx].commission_amount=fee;}

function confirmEscrowOverride(escrowId){
  var newStatus=document.getElementById('esc-new-status').value;
  var reason=document.getElementById('esc-override-reason').value;
  if(!reason){UI.toast(AT('enter_override_reason'),'err');return;}
  var esc=S.escrowTxns.find(function(x){return x.id===escrowId;});
  if(!confirm(AT('confirm_override')+'\n\n'+((ESC_ST[esc.escrow_status]&&ESC_ST[esc.escrow_status][0])||esc.escrow_status)+' → '+((ESC_ST[newStatus]&&ESC_ST[newStatus][0])||newStatus)))return;
  var upd={escrow_status:newStatus,updated_at:new Date().toISOString()};
  if(newStatus==='released'){upd.escrow_released_at=new Date().toISOString();upd.status='completed';}
  if(newStatus==='cancelled'||newStatus==='refunded'){upd.status='cancelled';upd.cancel_reason='admin_override: '+reason;upd.cancelled_at=new Date().toISOString();}
  if(newStatus==='disputed'){upd.escrow_disputed_at=new Date().toISOString();}
  sb.from('orders').update(upd).eq('id',escrowId).then(function(r){
    if(r.error)return UI.toast(AT('change_failed'),'err');
    var idx=S.escrowTxns.findIndex(function(x){return x.id===escrowId;});if(idx>=0)S.escrowTxns[idx].escrow_status=newStatus;
    closeModal('modal-escrow-override');
    UI.toast(AT('status_changed')+': '+((ESC_ST[newStatus]&&ESC_ST[newStatus][0])||newStatus),'ok');render();
    if(esc.matching_id){
      var matchUpd={settlement_status:newStatus==='released'?'settled':newStatus==='refunded'?'disputed_refunded':newStatus,updated_at:new Date().toISOString()};
      if(newStatus==='released')matchUpd.settled_at=new Date().toISOString();
      sb.from('matchings').update(matchUpd).eq('id',esc.matching_id).then(function(mr){if(mr.error)console.error('[escrow] matching update fail:',mr.error.message);}).catch(function(e){console.error('[escrow] matching update:',e);});
    }
    notifyEscrowParties(esc,newStatus);
  });
}
function forceEscrowStatusUpdate(escrowId,status,reason){
  var upd={escrow_status:status,updated_at:new Date().toISOString()};
  if(status==='released'){upd.escrow_released_at=new Date().toISOString();upd.status='completed';}
  if(status==='refunded'||status==='cancelled'){upd.status='cancelled';upd.cancel_reason='force: '+reason;upd.cancelled_at=new Date().toISOString();}
  sb.from('orders').update(upd).eq('id',escrowId).then(function(r){
    if(r.error)return UI.toast(AT('change_failed'),'err');
    var idx=S.escrowTxns.findIndex(function(x){return x.id===escrowId;});if(idx>=0)S.escrowTxns[idx].escrow_status=status;
    UI.toast(AT('status_changed')+' ('+AT('db_only')+'): '+((ESC_ST[status]&&ESC_ST[status][0])||status),'ok');render();
  });
}
function notifyEscrowParties(esc,action){
  var parties=[];if(esc.seller_id)parties.push(esc.seller_id);if(esc.buyer_id)parties.push(esc.buyer_id);
  var title=action==='released'?AT('escrow_released_title'):action==='refunded'?AT('escrow_refunded_title'):AT('escrow_status_updated');
  var body=AT('escrow_status_changed_to')+' '+((ESC_ST[action]&&ESC_ST[action][0])||action)+'. '+(esc.currency||'USD')+' '+Number(esc.amount).toLocaleString();
  var notifs=parties.map(function(uid){return{user_id:uid,type:'payment',title:title,body:body,is_read:false};});
  sb.from('notifications').insert(notifs).then(function(r){if(r.error)console.error('escrow notify err:',r.error.message);});
}

function viewDeal(did){
  var d=S.deals.find(function(x){return x.id===did;});
  if(d){S.selectedDeal=d;S.page='dealsMgmt';render();}
}

function setDealsTab(t){S.dealsTab=t;S._pg={};render();}

function changeDealStage(dealId,newStage,evt){
  if(!confirm('스테이지를 "'+newStage.toUpperCase()+'"(으)로 변경하시겠습니까?'))return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.from('deals').update({stage:newStage,updated_at:new Date().toISOString()}).eq('id',dealId).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('스테이지 변경 실패: '+r.error.message,'err');return;}
    var d=S.deals.find(function(x){return x.id===dealId;});
    if(d){d.stage=newStage;S.selectedDeal=d;}
    UI.toast('스테이지가 '+newStage.toUpperCase()+'로 변경되었습니다','ok');
    render();
  });
}

function pgPayRevenue(){
  var mrr=calcMRR();var arr=mrr*12;var hold=calcEscrowHold();var comm=calcEscrowComm();var flt=calcFloat();
  /* 미수금 합계 (pending billing events) */
  var pendingBilling=(S.billingEvents||[]).filter(function(e){return e.status==='pending';});
  var pendingTotal=pendingBilling.reduce(function(s,e){return s+(Number(e.amount)||0);},0);
  var pendingDocCount=pendingBilling.filter(function(e){return e.event_type==='document_generation';}).length;
  var pendingAICount=pendingBilling.filter(function(e){return e.event_type==='ai_analysis';}).length;
  var activeSubs=S.subscriptions.filter(function(s){return s.status==='active';}).length||S.users.filter(function(u){return PLAN_PRICE[u.plan];}).length;
  var activeEsc=S.escrowTxns.filter(function(e){return['buyer_paid','secured','shipping','delivered','release_requested','platform_hold'].indexOf(e.escrow_status)>=0;}).length;

  /* Plan revenue breakdown */
  var planRev={starter:0,pro:0,alibaba:0,enterprise:0};
  if(S.subscriptions.length){S.subscriptions.filter(function(s){return s.status==='active';}).forEach(function(s){var a=Number(s.amount)||0;var mo=s.billing_cycle==='semi_annual'?a/6:s.billing_cycle==='annual'?a/12:a;var k=(s.plan==='basic')?'starter':s.plan;planRev[k]=(planRev[k]||0)+mo;});}
  else{S.users.forEach(function(u){var p=PLAN_PRICE[u.plan];if(p){var k=(u.plan==='basic')?'starter':u.plan;planRev[k]=(planRev[k]||0)+p.m;}});}
  var maxPR=Math.max.apply(null,Object.values(planRev).concat([1]));

  /* Billing cycle dist */
  var cycleDist={monthly:0,semi_annual:0,annual:0};
  if(S.subscriptions.length){S.subscriptions.filter(function(s){return s.status==='active';}).forEach(function(s){if(cycleDist[s.billing_cycle]!==undefined)cycleDist[s.billing_cycle]++;});}
  else{S.users.forEach(function(u){if(PLAN_PRICE[u.plan])cycleDist[u.billing_cycle||'monthly']++;});}
  var maxCy=Math.max.apply(null,Object.values(cycleDist).concat([1]));

function submitAdminRefund(){
  var type=document.getElementById('ar-type').value;
  var email=document.getElementById('ar-email').value;
  var pi=document.getElementById('ar-pi').value;
  var reason=document.getElementById('ar-reason').value;
  if(!email||!reason){UI.toast(AT('fill_required_fields'),'err');return;}
  if(!confirm(AT('confirm_admin_refund')+'\n\n'+AT('type')+': '+type+'\nEmail: '+email))return;
  var token=null;try{var sess=JSON.parse(localStorage.getItem('sb-lylktgxngrlxmsldxdqj-auth-token'));token=sess&&sess.access_token;}catch(e){}
  if(!token)return UI.toast(AT('auth_required'),'err');
  UI.toast(AT('processing_refund'),'info');
  var payload;
  if(type==='subscription'){
    payload={refund_type:'subscription_cooling',reason:reason};
    if(pi)payload.payment_intent_id=pi;
  } else {
    if(!pi){UI.toast('Stripe Payment Intent ID '+AT('required'),'err');return;}
    payload={refund_type:'escrow_dispute',payment_intent_id:pi,reason:'admin: '+reason};
  }
  fetch('https://lylktgxngrlxmsldxdqj.supabase.co/functions/v1/process-refund',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify(payload)
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(res){

  }).catch(function(err){UI.toast(AT('refund_failed')+': '+err.message,'err');});

function adminRefundPayment(paymentId){
  var p=S.payments.find(function(x){return x.id===paymentId;});if(!p)return;
  var reason=prompt(AT('enter_refund_reason'));if(!reason)return;
  if(!confirm(AT('confirm_admin_refund')+'\n\n'+(p.currency||'USD')+' '+Number(p.amount).toLocaleString()+'\n'+getUserName(p.user_id)))return;
  var token=null;try{var sess=JSON.parse(localStorage.getItem('sb-lylktgxngrlxmsldxdqj-auth-token'));token=sess&&sess.access_token;}catch(e){}
  if(!token)return UI.toast(AT('auth_required'),'err');
  UI.toast(AT('processing_refund'),'info');
  fetch('https://lylktgxngrlxmsldxdqj.supabase.co/functions/v1/process-refund',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({refund_type:p.type==='subscription'?'subscription_cooling':'escrow_dispute',payment_intent_id:p.stripe_payment_intent,deal_id:p.deal_id||'',reason:'admin_refund: '+reason})
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(res){
    if(res.error){UI.toast(AT('refund_failed')+': '+res.error,'err');return;}
    var idx=S.payments.findIndex(function(x){return x.id===paymentId;});
    if(idx>=0){S.payments[idx].status='refunded';S.payments[idx].refunded_at=new Date().toISOString();S.payments[idx].refund_reason=reason;}
    UI.toast(AT('refund_completed')+': '+(res.currency||'USD')+' '+Number(res.amount||0).toLocaleString(),'ok');render();
    notifyPaymentRefund(p,reason);
  }).catch(function(err){UI.toast(AT('refund_failed')+': '+err.message,'err');});
}
function adminSettlePayment(paymentId){
  var p=S.payments.find(function(x){return x.id===paymentId;});if(!p)return;
  if(!confirm(AT('confirm_settle')+'\n\n'+(p.currency||'USD')+' '+Number(p.amount).toLocaleString()))return;
  var token=null;try{var sess=JSON.parse(localStorage.getItem('sb-lylktgxngrlxmsldxdqj-auth-token'));token=sess&&sess.access_token;}catch(e){}
  if(!token)return UI.toast(AT('auth_required'),'err');
  UI.toast(AT('processing_settlement'),'info');
  fetch('https://lylktgxngrlxmsldxdqj.supabase.co/functions/v1/auto-settle',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({action:'release_escrow',payment_intent_id:p.stripe_payment_intent,deal_id:p.deal_id||''})
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(res){
    if(res.error){UI.toast(AT('settlement_failed')+': '+res.error,'err');return;}
    var idx=S.payments.findIndex(function(x){return x.id===paymentId;});
    if(idx>=0){S.payments[idx].status='settled';S.payments[idx].settled_at=new Date().toISOString();}
    UI.toast(AT('escrow_released'),'ok');render();
  }).catch(function(err){UI.toast(AT('settlement_failed')+': '+err.message,'err');});
}
function adminRetrySettle(paymentId){
  var p=S.payments.find(function(x){return x.id===paymentId;});if(!p)return;
  if(!confirm(AT('confirm_retry_settle')))return;

  var tab=S._proofTab||'all';

  // Stats
  var pending=proofs.filter(function(p){return p.status==='pending';}).length;
  var approved=proofs.filter(function(p){return p.status==='approved';}).length;
  var rejected=proofs.filter(function(p){return p.status==='rejected';}).length;
  var totalAmt=milestones.filter(function(m){return m.status==='paid';}).reduce(function(s,m){return s+(Number(m.amount)||0);},0);

  // Filter by tab
  var filtered=proofs;
  if(tab!=='all')filtered=proofs.filter(function(p){return p.status===tab;});

  // Search
  var search=(S.searchFilter||'').toLowerCase();
  if(search){
    filtered=filtered.filter(function(p){
      var ms=milestones.find(function(m){return m.id===p.milestone_id;});
      var deal=ms?S.deals.find(function(d){return d.id===ms.deal_id;}):null;
      return (p.file_name||'').toLowerCase().indexOf(search)>=0||
        (ms&&ms.name&&ms.name.toLowerCase().indexOf(search)>=0)||
        (deal&&deal.title&&deal.title.toLowerCase().indexOf(search)>=0)||
        (p.id||'').indexOf(search)>=0;
    });
  }

  // Pagination
  var pKey='payProofs';
  var pg=S._pg[pKey]||0;
  var perPage=15;
  var paged=filtered.slice(pg*perPage,(pg+1)*perPage);

  var statsHtml='<div class="grid-4" style="margin-bottom:16px">'+

    UI.stat('\uC2B9\uC778',approved,'','var(--ok)')+

  var tabHtml='<div style="display:flex;gap:6px;margin-bottom:12px">'+
    ['all','pending','approved','rejected'].map(function(t){
      return '<button class="btn btn-sm '+(tab===t?'btn-pri':'btn-ghost')+'" onclick="Adm.setProofTab(\''+t+'\')">'+tabLabels[t]+' ('+tabCounts[t]+')</button>';
    }).join('')+
  '</div>';

  var searchHtml='<div style="margin-bottom:12px"><input placeholder="\uC99D\uBE59 \uAC80\uC0C9 (\uD30C\uC77C\uBA85, \uB9C8\uC77C\uC2A4\uD1A4, \uB51C)..." value="'+U.esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="width:100%;max-width:400px;padding:10px 14px;border-radius:10px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:13px"></div>';

  // Table
  var tableHtml='<div class="card"><div class="card-h"><span>\uACB0\uC81C \uC99D\uBE59 \uBAA9\uB85D</span>'+UI.badge(filtered.length+'\uAC74','pri')+'</div><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>\uB51C</th><th>\uB9C8\uC77C\uC2A4\uD1A4</th><th>\uAE08\uC561</th><th>\uC5C5\uB85C\uB354</th><th>\uD30C\uC77C</th><th>\uC0C1\uD0DC</th><th>\uC81C\uCD9C\uC77C</th><th>\uC561\uC158</th></tr></thead><tbody>'+
    (paged.length?paged.map(function(p){

function approveProof(proofId,evt){
  if(!confirm('\uC774 \uACB0\uC81C \uC99D\uBE59\uC744 \uC2B9\uC778\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?'))return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.functions.invoke('verify-payment-proof',{body:{proof_id:proofId,action:'approve'}}).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('Payment proof verification is being set up','warn');console.error('verify-payment-proof error:',r.error);return;}
    var d=r.data;
    if(d&&!d.ok){UI.toast('\uC2B9\uC778 \uC2E4\uD328: '+(d.error||'unknown'),'err');return;}
    var proof=S.paymentProofs.find(function(p){return p.id===proofId;});
    if(proof){proof.status='approved';proof.reviewed_at=new Date().toISOString();proof.reviewer_id=S.user?S.user.id:null;}
    if(d&&d.milestone_id){
      var ms=S.paymentMilestones.find(function(m){return m.id===d.milestone_id;});
      if(ms)ms.status='paid';
    }
    closeModal('proof-detail');
    UI.toast('\uACB0\uC81C \uC99D\uBE59\uC774 \uC2B9\uC778\uB418\uC5C8\uC2B5\uB2C8\uB2E4','ok');
    render();
  }).catch(function(e){btnLoading(btn,false);console.error('verify-payment-proof failed:',e);UI.toast('Payment proof verification is being set up','warn');});
}

function rejectProof(proofId,evt){
  var reason=prompt('\uBC18\uB824 \uC0AC\uC720\uB97C \uC785\uB825\uD558\uC138\uC694:');
  if(reason===null)return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.functions.invoke('verify-payment-proof',{body:{proof_id:proofId,action:'reject',reason:reason||'\uC99D\uBE59 \uBD80\uC801\uD569'}}).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('Payment proof verification is being set up','warn');console.error('verify-payment-proof error:',r.error);return;}
    var d=r.data;
    if(d&&!d.ok){UI.toast('\uBC18\uB824 \uC2E4\uD328: '+(d.error||'unknown'),'err');return;}
    var proof=S.paymentProofs.find(function(p){return p.id===proofId;});
    if(proof){proof.status='rejected';proof.reviewed_at=new Date().toISOString();proof.reviewer_notes=reason||'\uC99D\uBE59 \uBD80\uC801\uD569';proof.reviewer_id=S.user?S.user.id:null;}
    if(d&&d.milestone_id){
      var ms=S.paymentMilestones.find(function(m){return m.id===d.milestone_id;});
      if(ms)ms.status='rejected';
    }
    closeModal('proof-detail');
    UI.toast('\uACB0\uC81C \uC99D\uBE59\uC774 \uBC18\uB824\uB418\uC5C8\uC2B5\uB2C8\uB2E4','ok');

}

function exportCSV(table){
  var data=S[table==='service_requests'?'serviceRequests':table]||[];
  if(!data.length){UI.toast(AT('no_data'),'warn');return;}
  var sensitive=['stripe_customer_id','password','password_hash','billing_key','secret','token'];
  var keys=Object.keys(data[0]).filter(function(k){return sensitive.indexOf(k)<0;});
  var csv=keys.join(',')+'\n';
  data.forEach(function(row){
    csv+=keys.map(function(k){var v=row[k];if(v==null)return'';v=String(v).replace(/"/g,'""');return v.indexOf(',')>=0||v.indexOf('\n')>=0?'"'+v+'"':v;}).join(',')+'\n';
  });
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=table+'_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
  URL.revokeObjectURL(url);UI.toast(AT('csv_downloaded'),'ok');
}

  h+='</div>';

  if(top10.length){

    top10.forEach(function(t){h+='<tr><td><span class="badge badge-err">'+t.cnt+'</span></td><td style="font-size:12px;word-break:break-all">'+U.esc(t.msg)+'</td></tr>';});
    h+='</tbody></table></div></div>';
  }
  /* Recent errors table */
  var pinfo=paginate(errs,'errorMonitor');

  if(!pinfo.items.length){h+='<tr><td colspan="5" style="text-align:center;color:var(--w40);padding:20px">'+(_isKorean?'에러 없음':'No errors')+'</td></tr>';}
  pinfo.items.forEach(function(e){
    var _loc=_isKorean?'ko-KR':'en-US';var dt=new Date(e.created_at);var ts=dt.toLocaleDateString(_loc,{month:'short',day:'numeric'})+' '+dt.toLocaleTimeString(_loc,{hour:'2-digit',minute:'2-digit'});
    var rid=(e.extra&&e.extra.rid)||'-';

    h+='<tr><td style="font-size:11px;white-space:nowrap">'+ts+'</td>';
    h+='<td><span style="font-family:monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--w08);cursor:pointer" onclick="navigator.clipboard.writeText(\''+U.esc(rid)+'\');Adm.UI.toast('+(_isKorean?'\'복사됨\'':'\'Copied\'')+',\'ok\')" title="'+(_isKorean?'클릭하여 복사':'Click to copy')+'">'+U.esc(rid)+'</span></td>';
    h+='<td style="font-size:11px">'+U.esc((e.page||'').replace(/#/g,' #'))+'</td>';
    h+='<td style="font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+U.esc(e.error_message||'')+'">'+U.esc((e.error_message||'').slice(0,100))+'</td>';
    h+='<td style="font-size:11px">'+uid+'</td></tr>';

/* === PAGINATION === */
function getPg(key){return S._pg[key]||0;}
function setPg(key,p){S._pg[key]=p;render();}
function paginate(arr,key){
  var pg=getPg(key);var total=arr.length;var pages=Math.ceil(total/PAGE_SIZE)||1;
  if(pg>=pages)pg=pages-1;if(pg<0)pg=0;
  var start=pg*PAGE_SIZE;var sliced=arr.slice(start,start+PAGE_SIZE);
  return{items:sliced,page:pg,pages:pages,total:total};
}
function paginationBar(key,info){
  if(info.pages<=1)return '';
  var btns='';
  for(var i=0;i<info.pages;i++){
    if(info.pages>7&&i>1&&i<info.pages-2&&Math.abs(i-info.page)>1){
      if(btns.slice(-3)!=='...')btns+='<span style="color:var(--w20);padding:0 4px">...</span>';
      continue;
    }
    btns+='<button class="btn btn-sm '+(i===info.page?'btn-pri':'btn-ghost')+'" onclick="Adm.setPg(\''+key+'\','+i+')" style="min-width:30px;padding:4px 8px">'+( i+1)+'</button>';
  }
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:8px 0">'+
    '<span style="font-size:11px;color:var(--w40)">'+info.total+AT('of')+(info.page*PAGE_SIZE+1)+'-'+Math.min((info.page+1)*PAGE_SIZE,info.total)+'</span>'+
    '<div style="display:flex;gap:4px;align-items:center">'+
    '<button class="btn btn-ghost btn-sm" onclick="Adm.setPg(\''+key+'\','+(info.page-1)+')" '+(info.page<=0?'disabled':'')+' style="padding:4px 8px">&laquo;</button>'+
    btns+
    '<button class="btn btn-ghost btn-sm" onclick="Adm.setPg(\''+key+'\','+(info.page+1)+')" '+(info.page>=info.pages-1?'disabled':'')+' style="padding:4px 8px">&raquo;</button>'+
    '</div></div>';
}

function updateSP(spId,newStatus){
  if(!confirm(_isKorean?'SP 상태를 "'+newStatus+'"로 변경하시겠습니까?':'Change SP status to "'+newStatus+'"?'))return;
  var upd={status:newStatus,updated_at:new Date().toISOString()};
  if(newStatus==='active')upd.approved_at=new Date().toISOString();
  sb.from('service_providers').update(upd).eq('id',spId).then(function(r){
    if(r.error){UI.toast(AT('failed'),'err');return;}
    var sp=S.serviceProviders.find(function(x){return x.id===spId;});
    if(sp){sp.status=newStatus;if(upd.approved_at)sp.approved_at=upd.approved_at;sp.updated_at=upd.updated_at;}
    if(S.selectedSP&&S.selectedSP.id===spId)S.selectedSP=sp;
    UI.toast(AT('updated'),'ok');render();
  });
}

function pgBuyerVerify(){
  var tab=S._buyerVerifyTab||'pending';

  var approved=allBuyers.filter(function(b){return b.verification_status==='approved';});

  var search=(S.searchFilter||'').toLowerCase();

  h+='<div class="grid-4" style="margin-bottom:16px">'+
    UI.stat(AT('pending'),pending.length,'','var(--acc)')+
    UI.stat(AT('approved'),approved.length,'','var(--ok)')+
    UI.stat(AT('rejected'),rejected.length,'','var(--err)')+
    UI.stat(AT('total'),allBuyers.length,'','var(--pri)')+

  h+='<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">'+
    ['pending','approved','rejected','all'].map(function(t){
      var label={pending:(_isKorean?'대기':'Pending')+' ('+pending.length+')',approved:(_isKorean?'승인':'Approved')+' ('+approved.length+')',rejected:(_isKorean?'반려':'Rejected')+' ('+rejected.length+')',all:AT('all')+' ('+allBuyers.length+')'}[t];
      return '<button class="btn btn-sm '+(tab===t?'btn-pri':'btn-ghost')+'" onclick="S._buyerVerifyTab=\''+t+'\';render()">'+label+'</button>';
    }).join('')+
    '<div style="flex:1"></div>'+
    '<input placeholder="'+AT('search_company_country2')+'" value="'+U.esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="padding:8px 12px;border-radius:8px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:12px;width:220px">'+
  '</div>';

  if(!filtered.length){
    return h+UI.empty('✅',AT('no_verification_requests'),AT('no_requests_in_this_status'));
  }

  h+='<div class="card"><div class="card-b" style="padding:0"><div class="tbl-wrap"><table class="tbl"><thead><tr>'+
    '<th>'+AT('company')+'</th><th>'+AT('country')+'</th><th>'+AT('level')+'</th><th>'+AT('documents')+'</th><th>'+AT('request_date')+'</th><th>'+AT('status')+'</th><th>'+AT('actions')+'</th>'+
    '</tr></thead><tbody>';
  filtered.forEach(function(b){
    var docs=b.verification_documents||b.documents||[];
    if(typeof docs==='string')try{docs=JSON.parse(docs);}catch(e){docs=[];}
    var docCount=Array.isArray(docs)?docs.length:0;
    var statusBadge=b.verification_status==='approved'?UI.badge(AT('approved'),'ok'):b.verification_status==='rejected'?UI.badge(AT('rejected'),'err'):UI.badge(AT('pending'),'acc');
    h+='<tr>'+
      '<td style="font-weight:600">'+U.esc(b.company_name||'\u2014')+'</td>'+
      '<td>'+U.cl(b.country)+' '+U.esc(b.country||'')+'</td>'+
      '<td><span class="badge badge-pri">'+(b.verification_level||'basic')+'</span></td>'+
      '<td>'+docCount+AT('files')+'</td>'+
      '<td style="font-size:11px">'+U.fd(b.created_at)+'</td>'+
      '<td>'+statusBadge+'</td>'+
      '<td style="white-space:nowrap">'+

          '<button class="btn btn-ok btn-sm" onclick="Adm.approveBuyer(\''+b.id+'\')">'+AT('approve')+'</button> '+
          '<button class="btn btn-danger btn-sm" onclick="Adm.rejectBuyer(\''+b.id+'\')">'+AT('reject')+'</button>':
          '<button class="btn btn-ghost btn-sm" onclick="Adm.viewBuyer(\''+b.id+'\')">'+AT('detail')+'</button>')+
      '</td></tr>';
  });
  h+='</tbody></table></div></div></div>';

  /* Verification history log */
  var history=allBuyers.filter(function(b){return b.verification_status==='approved'||b.verification_status==='rejected';}).sort(function(a,b){return new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at);}).slice(0,20);

  }
  return h;

function approveBuyer(bid){
  if(!confirm(AT('approve_this_buyer')))return;
  var level=prompt(AT('select_verification_level')+'\n\nbasic / verified / premium / enterprise','verified');
  if(!level||['basic','verified','premium','enterprise'].indexOf(level)<0)level='verified';
  sb.from('buyers').update({verification_status:'approved',verification_level:level,verified_at:new Date().toISOString(),verified_by:S.user.id,updated_at:new Date().toISOString()}).eq('id',bid).select().then(function(r){
    if(r.error){UI.toast(AT('approve_failed')+r.error.message,'err');return;}
    var upd=r.data[0];var idx=S.buyers.findIndex(function(b){return b.id===bid;});
    if(idx>=0)S.buyers[idx]=upd;
    UI.toast(AT('buyer_verified'),'ok');render();
    notifyBuyerVerification(upd,'approved');
  }).catch(function(e){UI.toast(AT('error')+e.message,'err');});
}
function rejectBuyer(bid){
  var reason=promptAT('enter_rejection_reason');
  if(!reason)return;
  sb.from('buyers').update({verification_status:'rejected',rejection_reason:reason,verified_at:new Date().toISOString(),verified_by:S.user.id,updated_at:new Date().toISOString()}).eq('id',bid).select().then(function(r){
    if(r.error){UI.toast(AT('reject_failed')+r.error.message,'err');return;}
    var upd=r.data[0];var idx=S.buyers.findIndex(function(b){return b.id===bid;});
    if(idx>=0)S.buyers[idx]=upd;
    UI.toast(AT('buyer_rejected'),'ok');render();
    notifyBuyerVerification(upd,'rejected');
  }).catch(function(e){UI.toast(AT('error')+e.message,'err');});
}
function suspendBuyer(bid){
  var reason=prompt(AT('enter_suspend_reason'));
  if(!reason)return;
  sb.from('buyers').update({verification_status:'suspended',rejection_reason:reason,updated_at:new Date().toISOString()}).eq('id',bid).select().then(function(r){
    if(r.error){UI.toast(AT('change_failed'),'err');return;}
    var upd=r.data[0];var idx=S.buyers.findIndex(function(b){return b.id===bid;});
    if(idx>=0)S.buyers[idx]=upd;
    UI.toast(AT('buyer_suspended'),'ok');render();
    notifyBuyerVerification(upd,'suspended');
  });
}
function changeBuyerLevel(bid,newLevel){

function saveBuyerDoc(bid){
  var fileInput=document.getElementById('bdoc-file');var file=fileInput&&fileInput.files[0];
  if(!file){UI.toast(AT('select_file'),'err');return;}
  var docType=document.getElementById('bdoc-type').value;
  var path='buyers/'+bid+'/'+Date.now()+'_'+file.name;
  UI.toast(AT('uploading'),'info');
  sb.storage.from('documents').upload(path,file,{upsert:true}).then(function(r){
    if(r.error){UI.toast(AT('upload_failed')+': '+r.error.message,'err');return;}
    var url=sb.storage.from('documents').getPublicUrl(path).data.publicUrl;
    var buyer=S.buyers.find(function(x){return x.id===bid;});
    var docs=Array.isArray(buyer.verification_documents)?buyer.verification_documents.slice():[];
    docs.push({type:docType,url:url,file_name:file.name,uploaded_at:new Date().toISOString(),uploaded_by:S.user.id});
    sb.from('buyers').update({verification_documents:docs,updated_at:new Date().toISOString()}).eq('id',bid).select().then(function(r2){
      if(r2.error){UI.toast(AT('save_failed2'),'err');return;}
      var upd=r2.data[0];var idx=S.buyers.findIndex(function(x){return x.id===bid;});if(idx>=0)S.buyers[idx]=upd;
      if(S.selectedBuyer&&S.selectedBuyer.id===bid)S.selectedBuyer=upd;

function generateTrendSummary(){
  // MoM 비교 데이터 자동 생성
  var today=new Date();
  var thisMonth=today.getMonth(),thisYear=today.getFullYear();
  var lastMonth=thisMonth===0?11:thisMonth-1;
  var lastMonthYear=thisMonth===0?thisYear-1:thisYear;

  function inMonth(dateStr,yr,mo){
    if(!dateStr)return false;
    var p=dateStr.slice(0,7).split('-');
    return parseInt(p[0])===yr&&parseInt(p[1])===(mo+1);
  }

  var dealsThis=0,dealsLast=0;
  S.matchings.forEach(function(m){
    if(inMonth(m.created_at,thisYear,thisMonth))dealsThis++;
    if(inMonth(m.created_at,lastMonthYear,lastMonth))dealsLast++;
  });
  var buyersThis=0,buyersLast=0;
  S.buyers.forEach(function(b){
    if(inMonth(b.created_at,thisYear,thisMonth))buyersThis++;
    if(inMonth(b.created_at,lastMonthYear,lastMonth))buyersLast++;
  });
  var escrows=S.escrowTxns||[];
  var txnThis=0,txnLast=0;
  escrows.forEach(function(e){
    var amt=Number(e.amount)||0;
    if(inMonth(e.created_at,thisYear,thisMonth))txnThis+=amt;
    if(inMonth(e.created_at,lastMonthYear,lastMonth))txnLast+=amt;
  });

  if(!S.matchings.length&&!S.buyers.length){
    UI.toast(AT('no_trend_data'),'warn');
    return;
  }

  var pct=function(cur,prev){
    if(!prev)return cur?'+100%':'0%';
    var v=Math.round((cur-prev)/prev*100);
    return(v>0?'+':'')+v+'%';
  };

  // Country pipeline
  var countryDeals={};
  S.matchings.forEach(function(m){
    var buyer=S.buyers.find(function(b){return b.id===m.buyer_id;});
    if(buyer&&buyer.country){
      var c=buyer.country;
      if(!countryDeals[c])countryDeals[c]={deals:0,dealsLast:0};
      countryDeals[c].deals++;
      if(inMonth(m.created_at,lastMonthYear,lastMonth))countryDeals[c].dealsLast++;
    }
  });
  var topC=Object.keys(countryDeals).sort(function(a,b){return countryDeals[b].deals-countryDeals[a].deals;}).slice(0,3);
  var countriesText=topC.map(function(c,i){
    var d=countryDeals[c];
    var chg=pct(d.deals,d.dealsLast);
    return(i+1)+'. '+c+' - '+d.deals+' deals ('+chg+')';
  }).join('\n');

  // Growth categories
  var catData={};
  S.analyses.forEach(function(a){
    var cat=(a.category||a.product_category||'Other');
    if(!catData[cat])catData[cat]={count:0,countLast:0};
    catData[cat].count++;
    if(inMonth(a.created_at,lastMonthYear,lastMonth))catData[cat].countLast++;
  });
  var growthCats=Object.keys(catData).filter(function(c){
    var d=catData[c];
    return d.countLast?((d.count-d.countLast)/d.countLast*100)>10:d.count>0;
  }).slice(0,3);

  // Build trend summary text
  var lines=[];
  lines.push(AT('deals_this_month')+': '+dealsThis+' ('+pct(dealsThis,dealsLast)+' '+AT('vs_last_month')+')');
  lines.push(AT('new_buyers')+': '+buyersThis+' ('+pct(buyersThis,buyersLast)+' '+AT('vs_last_month')+')');
  if(txnThis||txnLast){
    lines.push(AT('transaction_amount')+': $'+Math.round(txnThis).toLocaleString()+' ('+pct(txnThis,txnLast)+')');
  }
  if(growthCats.length){
    lines.push('');
    lines.push(AT('growth_tag')+': '+growthCats.join(', '));
  }
  var trendText=lines.join('\n');

  // Methodology
  var uniqueCountries=Object.keys(countryDeals).length;
  var mfgCount=S.users.filter(function(u){return u.role==='manufacturer'||u.user_type==='manufacturer';}).length;

  // Fill editor fields
  var trendEl=document.getElementById('brief-trend');
  if(trendEl)trendEl.value=trendText;
  var countriesEl=document.getElementById('brief-countries');
  if(countriesEl&&countriesText)countriesEl.value=countriesText;

  UI.toast(AT('auto_fill_complete'),'ok');
