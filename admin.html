/* === PRICE MEMORY — Outlier Detection === */
S.priceHistory=[];S._priceOutliers=[];
function _buildPriceOutliers(){
  var byCat={};
  (S.priceHistory||[]).forEach(function(p){
    var cat=p.category||'general';
    if(!byCat[cat])byCat[cat]={prices:[],items:[]};
    byCat[cat].prices.push(Number(p.unit_price));
    byCat[cat].items.push(p);
  });
  var outliers=[];
  for(var cat in byCat){
    var ps=byCat[cat].prices;
    if(ps.length<3)continue;
    var sum=ps.reduce(function(a,b){return a+b;},0);
    var avg=sum/ps.length;
    byCat[cat].items.forEach(function(p){
      var dev=Math.abs(Number(p.unit_price)-avg)/avg;
      if(dev>0.3){
        outliers.push({item:p.item_key,price:Number(p.unit_price),avg:Math.round(avg*100)/100,deviation:Math.round(dev*100),direction:Number(p.unit_price)>avg?'high':'low',category:cat,seller_id:p.seller_id,doc_type:p.doc_type,created_at:p.created_at});
      }
    });
  }
  outliers.sort(function(a,b){return b.deviation-a.deviation;});
  S._priceOutliers=outliers;
}

/* === ENHANCED KPI FUNCTIONS === */
function calcARPU(){var paid=S.users.filter(function(u){return u.plan&&u.plan!=='free';});if(!paid.length)return 0;return calcMRR()/paid.length;}
function calcChurnRate(){var cancelled=S.subscriptions.filter(function(s){return s.status==='cancelled';}).length;var total=S.subscriptions.length;if(!total)return 0;return(cancelled/total*100);}
function calcConversionRate(){var total=S.users.length;if(!total)return 0;var paid=S.users.filter(function(u){return u.plan&&u.plan!=='free';}).length;return(paid/total*100);}
function calcLTV(){var arpu=calcARPU();var churn=calcChurnRate()/100;if(churn<=0)return arpu*12;return arpu/churn;}
function calcActiveRate(){var total=S.users.length;if(!total)return 0;var thirtyDaysAgo=new Date(Date.now()-30*864e5).toISOString();var active=S.users.filter(function(u){return u.last_sign_in_at&&u.last_sign_in_at>thirtyDaysAgo;}).length;return(active/total*100);}
function calcUsageSummary(){var summary={};if(!S.usageEvents)return summary;S.usageEvents.forEach(function(e){if(!summary[e.feature])summary[e.feature]={count:0,revenue:0};summary[e.feature].count+=e.quantity||1;summary[e.feature].revenue+=(e.unit_price||0)*(e.quantity||1);});return summary;}

/* ── Dashboard ── */
function pgDash(){
  var today=new Date();var t7=new Date(today-7*864e5);var t30=new Date(today-30*864e5);
  var clients=S.users.filter(function(u){return u.role==='client';});
  var buyerUsers=S.users.filter(function(u){return u.role==='buyer';});
  var completedDeals=S.matchings.filter(function(m){return m.status==='completed';});
  var totalRevenue=sumBy(S.orders.filter(function(o){return o.payment_status==='paid'||o.status==='completed';}), 'total_amount');
  var activeDeals=S.matchings.filter(function(m){return m.status!=='completed'&&m.status!=='rejected'&&m.status!=='expired';}).length;
  var countries={}; S.buyers.forEach(function(b){if(b.country)countries[b.country]=(countries[b.country]||0)+1;});
  var countryCount=Object.keys(countries).length;
  var newUsers7=S.users.filter(function(u){return new Date(u.created_at)>=t7;}).length;
  var convRate=clients.length?Math.round(completedDeals.length/clients.length*100):0;

  // Plan distribution
  var planDist={free:0,starter:0,basic:0,pro:0,alibaba:0};
  clients.forEach(function(u){planDist[u.plan||'free']=(planDist[u.plan||'free']||0)+1;});
  planDist.starter=(planDist.starter||0)+(planDist.basic||0);planDist.basic=0;
  var maxPlan=Math.max(planDist.free,planDist.starter,planDist.pro,planDist.alibaba,1);

  // Pipeline funnel
  var pipeline={proposed:0,interested:0,sample:0,negotiation:0,contract:0,completed:0};
  S.matchings.forEach(function(m){if(pipeline[m.status]!==undefined)pipeline[m.status]++;});
  var maxPipe=Math.max.apply(null,Object.values(pipeline).concat([1]));

  // Recent activity
  var recentMsgs=S.messages.slice(0,5);

  // Urgent items widget
  var pendingSR = S.serviceRequests.filter(function(r){return r.status==='pending';}).length;
  var overdueSR = S.serviceRequests.filter(function(r){
    if(!r.created_at || r.status==='completed' || r.status==='cancelled') return false;
    var hours = (Date.now() - new Date(r.created_at).getTime()) / 3600000;
    var limit = {urgent:4, high:24, normal:72, low:168}[r.priority||'normal'] || 72;
    return hours > limit;
  }).length;
  var unreadChat = S.messages ? S.messages.filter(function(m){return !m.is_read;}).length : 0;
  /* Stale deal detection */
  var _staleDeals=S.matchings.filter(function(m){
    if(m.status==='completed'||m.status==='rejected'||m.status==='expired'||m.status==='cancelled')return false;
    var age=Math.floor((Date.now()-new Date(m.updated_at||m.created_at).getTime())/86400000);
    return age>=7;
  });
  var _staleOrders=S.orders.filter(function(o){
    if(o.status==='completed'||o.status==='cancelled')return false;
    if(o.payment_status==='unpaid'){
      var age=Math.floor((Date.now()-new Date(o.updated_at||o.created_at).getTime())/86400000);
      return age>=3;
    }
    return false;
  });
  /* D-grade trust detection */
  var _dGradeUsers=Object.values(S.trustScores||{}).filter(function(ts){return ts.grade==='D';});
  /* Price outlier detection */
  var _priceOutliers=S._priceOutliers||[];

  if(pendingSR > 0 || overdueSR > 0 || unreadChat > 0 || _staleDeals.length > 0 || _staleOrders.length > 0 || _dGradeUsers.length > 0 || _priceOutliers.length > 0) {
    urgentHtml += '<div class="card" style="border-left:3px solid var(--err);margin-bottom:16px">';
    urgentHtml += '<div class="card-b" style="padding:14px 18px">';
    urgentHtml += '<div style="font-weight:800;font-size:14px;margin-bottom:10px;color:var(--err)">&#x26A0;&#xFE0F; 긴급 처리 필요</div>';
    urgentHtml += '<div style="display:flex;gap:16px;flex-wrap:wrap">';
    if(pendingSR > 0) urgentHtml += '<div onclick="Adm.set({page:\'services\'})" style="cursor:pointer;padding:10px 16px;background:rgba(255,82,82,.1);border-radius:var(--r-s);border:1px solid rgba(255,82,82,.2)"><div style="font-size:20px;font-weight:800;color:var(--err)">'+pendingSR+'</div><div style="font-size:11px;color:var(--w40)">미배정 요청</div></div>';
    if(overdueSR > 0) urgentHtml += '<div onclick="Adm.set({page:\'services\'})" style="cursor:pointer;padding:10px 16px;background:rgba(255,82,82,.1);border-radius:var(--r-s);border:1px solid rgba(255,82,82,.2)"><div style="font-size:20px;font-weight:800;color:var(--err)">'+overdueSR+'</div><div style="font-size:11px;color:var(--w40)">SLA 초과</div></div>';
    if(unreadChat > 0) urgentHtml += '<div onclick="Adm.set({page:\'chat\'})" style="cursor:pointer;padding:10px 16px;background:rgba(0,212,255,.1);border-radius:var(--r-s);border:1px solid rgba(0,212,255,.2)"><div style="font-size:20px;font-weight:800;color:var(--pri)">'+unreadChat+'</div><div style="font-size:11px;color:var(--w40)">미읽은 메시지</div></div>';
    if(_staleDeals.length > 0) urgentHtml += '<div onclick="Adm.set({page:\'matchings\'})" style="cursor:pointer;padding:10px 16px;background:rgba(255,184,0,.1);border-radius:var(--r-s);border:1px solid rgba(255,184,0,.2)"><div style="font-size:20px;font-weight:800;color:var(--acc)">'+_staleDeals.length+'</div><div style="font-size:11px;color:var(--w40)">7일+ 정체 거래</div></div>';
    if(_staleOrders.length > 0) urgentHtml += '<div onclick="Adm.set({page:\'orders\'})" style="cursor:pointer;padding:10px 16px;background:rgba(255,82,82,.1);border-radius:var(--r-s);border:1px solid rgba(255,82,82,.2)"><div style="font-size:20px;font-weight:800;color:var(--err)">'+_staleOrders.length+'</div><div style="font-size:11px;color:var(--w40)">3일+ 미결제</div></div>';
    if(_dGradeUsers.length > 0) urgentHtml += '<div onclick="Adm.set({page:\'matchings\'})" style="cursor:pointer;padding:10px 16px;background:rgba(239,68,68,.08);border-radius:var(--r-s);border:1px solid rgba(239,68,68,.15)"><div style="font-size:20px;font-weight:800;color:var(--err)">'+_dGradeUsers.length+'</div><div style="font-size:11px;color:var(--w40)">D등급 신뢰도</div></div>';
    if(_priceOutliers.length > 0) urgentHtml += '<div style="cursor:pointer;padding:10px 16px;background:rgba(255,184,0,.08);border-radius:var(--r-s);border:1px solid rgba(255,184,0,.15)"><div style="font-size:20px;font-weight:800;color:var(--acc)">'+_priceOutliers.length+'</div><div style="font-size:11px;color:var(--w40)">가격 이상치 (±30%)</div></div>';
    urgentHtml += '</div>';
    /* Stale detail cards */
    if(_staleDeals.length>0||_staleOrders.length>0){
      urgentHtml+='<div style="margin-top:12px;border-top:1px solid var(--bd);padding-top:10px">';
      _staleDeals.slice(0,5).forEach(function(m){
        var age=Math.floor((Date.now()-new Date(m.updated_at||m.created_at).getTime())/86400000);
        var uName=getUserName(m.user_id);
        var bName=m.buyer_id?(S.buyers||[]).find(function(b){return b.id===m.buyer_id;}):null;
        bName=bName?(bName.company_name||bName.contact_name||''):'';
        urgentHtml+='<div onclick="Adm.viewMatching(\''+m.id+'\')" style="cursor:pointer;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:4px;background:var(--w05)" onmouseover="this.style.background=\'var(--w08)\'" onmouseout="this.style.background=\'var(--w05)\'">';
        urgentHtml+='<span style="font-size:14px">&#x23F3;</span>';
        urgentHtml+='<span style="flex:1;font-size:12px;color:var(--w70)">'+U.esc(uName)+' &harr; '+U.esc(bName)+' &middot; <b>'+U.esc(m.status)+'</b></span>';
        urgentHtml+='<span style="font-size:11px;font-weight:700;color:var(--acc)">'+age+'일</span>';
        urgentHtml+='</div>';
      });
      _staleOrders.slice(0,5).forEach(function(o){
        var age=Math.floor((Date.now()-new Date(o.updated_at||o.created_at).getTime())/86400000);
        urgentHtml+='<div onclick="Adm.viewOrder(\''+o.id+'\')" style="cursor:pointer;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:4px;background:var(--w05)" onmouseover="this.style.background=\'var(--w08)\'" onmouseout="this.style.background=\'var(--w05)\'">';
        urgentHtml+='<span style="font-size:14px">&#x1F4B0;</span>';
        urgentHtml+='<span style="flex:1;font-size:12px;color:var(--w70)">'+(o.order_number||'주문')+' &middot; <b>미결제</b></span>';
        urgentHtml+='<span style="font-size:11px;font-weight:700;color:var(--err)">'+age+'일</span>';
        urgentHtml+='</div>';
      });
      urgentHtml+='</div>';
    }
    /* Price outlier detail cards */
    if(_priceOutliers.length>0){
      urgentHtml+='<div style="margin-top:12px;border-top:1px solid var(--bd);padding-top:10px"><div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:6px">가격 이상치 (카테고리 평균 ±30% 이상)</div>';
      _priceOutliers.slice(0,5).forEach(function(o){
        urgentHtml+='<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:4px;background:var(--w05)">';
        urgentHtml+='<span style="font-size:14px">'+(o.direction==='high'?'&#x1F4C8;':'&#x1F4C9;')+'</span>';
        urgentHtml+='<span style="flex:1;font-size:12px;color:var(--w70)">'+U.esc(o.item)+' <span style="color:var(--w40)">['+o.category+']</span> $'+o.price+' (avg $'+o.avg+')</span>';
        urgentHtml+='<span style="font-size:11px;font-weight:700;color:'+(o.deviation>=50?'var(--err)':'var(--acc)')+'">'+o.direction.toUpperCase()+' '+o.deviation+'%</span>';
        urgentHtml+='</div>';
      });
      urgentHtml+='</div>';
    }
    urgentHtml += '</div></div>';
  }

  return '<div style="margin-bottom:20px"><h2 style="font-size:22px;font-weight:800">\uAD00\uB9AC\uC790 \uB300\uC2DC\uBCF4\uB4DC</h2><p style="font-size:13px;color:var(--w40);margin-top:4px">'+today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})+'</p></div>'+

  urgentHtml+

  '<div class="grid-5" style="margin-bottom:20px">'+
    UI.stat('\uC804\uCCB4 \uC720\uC800',S.users.length,'\uC81C\uC870\uC0AC '+clients.length+' / \uBC14\uC774\uC5B4 '+buyerUsers.length+' (+'+newUsers7+' 7\uC77C)','var(--pri)')+
    UI.stat('\uD65C\uC131 \uB51C',activeDeals,completedDeals.length+'\uAC74 \uC644\uB8CC','var(--acc)')+
    UI.stat('\uC804\uD658\uC728',convRate+'%','\uC81C\uC870\uC0AC\u2192\uC644\uB8CC\uB51C','var(--ok)')+
    UI.stat('\uB204\uC801 \uB9E4\uCD9C',U.usd(totalRevenue),S.orders.length+'\uAC74 \uC8FC\uBB38','var(--admin)')+
    UI.stat('\uAD6D\uAC00\uC218',countryCount,'\uBC14\uC774\uC5B4 '+S.buyers.length+'\uBA85','var(--purple)')+
  '</div>'+

  (S.deals.length?'<div class="card" style="margin-bottom:16px;cursor:pointer" onclick="Adm.nav(\'dealsMgmt\')"><div class="card-h">🏢 딜룸 거래 현황</div><div class="card-b"><div class="grid-5">'+
    UI.stat('전체 딜',S.deals.length,'','var(--pri)')+
    UI.stat('Active',S.deals.filter(function(d){return d.status==='active';}).length,'','var(--ok)')+
    UI.stat('Negotiation',S.deals.filter(function(d){return d.stage==='negotiation';}).length,'','var(--acc)')+
    UI.stat('Contract',S.deals.filter(function(d){return d.stage==='contract';}).length,'','#8b5cf6')+
    UI.stat('견적 수',S.quotes.length,'승인 '+S.quotes.filter(function(q){return q.status==='approved';}).length,'var(--admin)')+
  '</div></div></div>':'')+

  // 7일 가입 트렌드
  '<div class="card" style="margin-bottom:16px"><div class="card-h"><span>📈 7일 가입 트렌드</span></div><div class="card-b"><div style="display:flex;align-items:flex-end;gap:4px;height:60px">'+
  (function(){var days=[];for(var i=6;i>=0;i--){var d=new Date(today-i*864e5);var ds=d.toISOString().split('T')[0];var cnt=S.users.filter(function(u){return(u.created_at||'').startsWith(ds);}).length;days.push({label:['일','월','화','수','목','금','토'][d.getDay()],cnt:cnt});}var mx=Math.max.apply(null,days.map(function(d){return d.cnt;}).concat([1]));return days.map(function(d){var pct=Math.max(d.cnt/mx*100,d.cnt>0?10:3);return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">'+(d.cnt>0?'<div style="font-size:10px;font-weight:700;color:var(--pri);margin-bottom:2px">'+d.cnt+'</div>':'')+'<div style="width:100%;height:'+pct+'%;background:var(--pri);border-radius:3px 3px 0 0;min-height:2px;opacity:'+(d.cnt>0?'1':'0.15')+'"></div><div style="font-size:9px;color:var(--w30);margin-top:4px">'+d.label+'</div></div>';}).join('');})()+
  '</div></div></div>'+

  '<div class="grid-2" style="margin-bottom:20px">'+
    // Plan distribution
    '<div class="card"><div class="card-h"><span>\uD50C\uB79C \uBD84\uD3EC</span>'+UI.badge(clients.length+'\uBA85','pri')+'</div><div class="card-b">'+
      Object.keys(planDist).map(function(k){
        var r=U.pl(k);
        return hBar(r[0],planDist[k],maxPlan,r[1]);
      }).join('')+
    '</div></div>'+

    // Pipeline funnel
    '<div class="card"><div class="card-h"><span>\uD30C\uC774\uD504\uB77C\uC778 \uD37C\uB110</span>'+UI.badge(S.matchings.length+'\uAC74','acc')+'</div><div class="card-b">'+
      [{k:'proposed',c:'var(--w40)'},{k:'interested',c:'var(--pri)'},{k:'sample',c:'var(--acc)'},{k:'negotiation',c:'var(--warn)'},{k:'contract',c:'var(--purple)'},{k:'completed',c:'var(--ok)'}].map(function(st){
        return hBar(matchStatusLabel(st.k),pipeline[st.k],maxPipe,st.c);
      }).join('')+
    '</div></div>'+
  '</div>'+

  '<div class="grid-2" style="margin-bottom:20px">'+
    // Country distribution
    '<div class="card"><div class="card-h"><span>\uAD6D\uAC00\uBCC4 \uBC14\uC774\uC5B4</span></div><div class="card-b">'+
      (function(){var sorted=Object.entries(countries).sort(function(a,b){return b[1]-a[1];});var mx=sorted.length?sorted[0][1]:1;
        return sorted.map(function(e){return hBar(flag(e[0])+' '+e[0],e[1],mx,'var(--pri)');}).join('');
      })()+
    '</div></div>'+

    // Recent messages
    '<div class="card"><div class="card-h"><span>\uCD5C\uADFC \uBA54\uC2DC\uC9C0</span><button class="btn btn-ghost btn-sm" onclick="Adm.nav(\'chat\')">\uC804\uCCB4 \u2192</button></div><div class="card-b">'+(recentMsgs.length?recentMsgs.map(function(m){
      return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--w08)"><div style="width:28px;height:28px;border-radius:7px;background:'+(m.direction==='inbound'?'rgba(0,212,255,.1)':'rgba(255,184,0,.1)')+';display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">'+(m.direction==='inbound'?'\u2B05':'\u27A1')+'</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+U.esc(U.tr(m.subject||m.body,40))+'</div><div style="font-size:10px;color:var(--w40)">'+getUserName(m.user_id)+' \u2192 '+getBuyerName(m.buyer_id)+' \xB7 '+U.fd(m.created_at,'rel')+'</div></div>'+(m.is_read?'':'<div style="width:6px;height:6px;border-radius:3px;background:var(--err)"></div>')+'</div>';
    }).join(''):UI.empty('\uD83D\uDCAC','\uBA54\uC2DC\uC9C0 \uC5C6\uC74C',''))+'</div></div>'+
  '</div>';

/* ── Users ── */
function sortUsers(arr){
  var s=S._userSort;var col=s.col;var dir=s.asc?1:-1;
  return arr.slice().sort(function(a,b){
    var va,vb;
    if(col==='email'){va=(a.display_name||a.email||'').toLowerCase();vb=(b.display_name||b.email||'').toLowerCase();}
    else if(col==='company_name'){va=(a.company_name||'').toLowerCase();vb=(b.company_name||'').toLowerCase();}
    else if(col==='plan'){va=a.plan||'free';vb=b.plan||'free';}
    else if(col==='is_active'){va=a.is_active?1:0;vb=b.is_active?1:0;}
    else if(col==='analyses'){va=S.analyses.filter(function(x){return x.user_id===a.id;}).length;vb=S.analyses.filter(function(x){return x.user_id===b.id;}).length;}
    else{va=a.created_at||'';vb=b.created_at||'';}
    if(va<vb)return -1*dir;if(va>vb)return 1*dir;return 0;
  });
}
function setUserSort(col){
  if(S._userSort.col===col)S._userSort.asc=!S._userSort.asc;
  else{S._userSort={col:col,asc:true};}
  S._pg={};render();
}
function userSortCls(col){return 'sortable'+(S._userSort.col===col?(S._userSort.asc?' asc':' desc'):'');}
function pgUsers(){
  if(S.selectedUser)return pgUserDetail();
  var filtered=filterBySearch(S.users,['email','company_name','display_name']);
  if(S.tab!=='all')filtered=filtered.filter(function(u){return u.plan===S.tab||u.role===S.tab;});
  filtered=sortUsers(filtered);

  var plans=['all','free','starter','basic','pro','alibaba'];
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-size:18px;font-weight:800">👥 유저 관리</h2><div style="display:flex;gap:8px;align-items:center">'+UI.badge(S.users.length+'명','pri')+'<button class="btn btn-ghost btn-sm" onclick="Adm.exportCSV(\'users\')" style="font-size:11px">📥 CSV</button></div></div>'+
  '<div style="display:flex;gap:10px;margin-bottom:16px"><div class="search-box" style="flex:1"><input placeholder="이메일, 회사명 검색..." value="'+S.searchFilter+'" oninput="Adm.setSearch(this.value)"></div></div>'+
  '<div class="tab-bar">'+plans.map(function(p){
    var label=p==='all'?'전체':U.pl(p)[0];
    var count=p==='all'?S.users.length:S.users.filter(function(u){return u.plan===p;}).length;

      '</div></div>'+
    '</div></div>';

  /* Info card */

      '<div class="detail-row"><div class="detail-label">\uC720\uC800</div><div class="detail-value" style="cursor:pointer;color:var(--pri)" onclick="Adm.viewUser(\''+a.user_id+'\')">'+getUserName(a.user_id)+'</div></div>'+

  if(r.alibaba_strategy){

/* ── Service Requests ── */
function pgServiceReq(){
  if(S.selectedSR)return pgSRDetail();
  var filtered=filterBySearch(S.serviceRequests,['title','service_type']);
  if(S.tab!=='all')filtered=filtered.filter(function(s){return s.status===S.tab;});

  var tabs=['all','pending','accepted','processing','completed','cancelled'];
  var tabL={all:'전체',pending:'접수',accepted:'배정',processing:'처리중',completed:'완료',cancelled:'취소'};

  /* SLA 계산 */
  var slaHours={urgent:4,high:24,normal:72,low:168};
  function getSLA(sr){
    var h=slaHours[sr.priority||'normal']||72;
    var created=new Date(sr.created_at);var now=new Date();
    var elapsed=Math.floor((now-created)/(1000*60*60));
    var remain=h-elapsed;
    return {total:h,elapsed:elapsed,remain:remain,pct:Math.min(Math.round(elapsed/h*100),100),overdue:remain<0};
  }

  /* 파이프라인 요약 */
  var pipeline='<div style="display:flex;gap:6px;margin-bottom:16px">'+
    [{s:'pending',i:'📥',c:'var(--w40)'},{s:'accepted',i:'👤',c:'var(--pri)'},{s:'processing',i:'⚙️',c:'var(--acc)'},{s:'completed',i:'✅',c:'var(--ok)'}].map(function(st){
    var cnt=S.serviceRequests.filter(function(x){return x.status===st.s;}).length;
    return '<div style="flex:1;padding:12px;border-radius:10px;background:var(--w08);text-align:center;border-bottom:3px solid '+(cnt?st.c:'transparent')+'">'+
    '<div style="font-size:16px">'+st.i+'</div><div style="font-size:10px;color:var(--w40)">'+tabL[st.s]+'</div>'+
    '<div style="font-size:20px;font-weight:800;color:'+(cnt?st.c:'var(--w20)')+'">'+cnt+'</div></div>';
  }).join('')+'</div>';

  /* 긴급 SLA 경고 */
  var urgentSRs=S.serviceRequests.filter(function(sr){return sr.status!=='completed'&&sr.status!=='cancelled'&&getSLA(sr).overdue;});
  var urgentAlert=urgentSRs.length?'<div style="padding:10px 14px;border-radius:10px;background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.2);margin-bottom:12px;font-size:12px;color:var(--err)">⚠️ SLA 초과 '+urgentSRs.length+'건 — 즉시 처리 필요</div>':'';

  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-size:18px;font-weight:800">💼 서비스 요청</h2>'+UI.badge(S.serviceRequests.length+'건','acc')+'</div>'+
  pipeline+urgentAlert+
  '<div style="display:flex;gap:10px;margin-bottom:16px"><div class="search-box" style="flex:1"><input placeholder="서비스 검색..." value="'+S.searchFilter+'" oninput="Adm.setSearch(this.value)"></div></div>'+
  '<div class="tab-bar">'+tabs.map(function(t){
    var c=t==='all'?S.serviceRequests.length:S.serviceRequests.filter(function(s){return s.status===t;}).length;
    return '<div class="tab-item '+(S.tab===t?'active':'')+'" onclick="Adm.setTab(\''+t+'\')">'+tabL[t]+' <span style="font-size:10px;color:var(--w20)">'+c+'</span></div>';
  }).join('')+'</div>'+
  '<div class="card"><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>서비스</th><th>유저</th><th>상태</th><th>긴급도</th><th>SLA</th><th>담당</th><th>금액</th></tr></thead><tbody>'+
  (filtered.length?filtered.map(function(sr){
    var sla=getSLA(sr);
    var slaCol=sla.overdue?'var(--err)':sla.remain<12?'var(--acc)':'var(--ok)';
    var isDone=sr.status==='completed'||sr.status==='cancelled';
    return '<tr onclick="Adm.viewSR(\''+sr.id+'\')" style="'+(sla.overdue&&!isDone?'background:rgba(255,82,82,.04)':'')+'"><td>'+U.si(sr.service_type)+' '+U.sl(sr.service_type)+'</td><td style="font-size:12px">'+getUserName(sr.user_id)+'</td><td>'+UI.sb(sr.status)+'</td><td>'+UI.badge(sr.priority||'normal',sr.priority==='urgent'?'err':sr.priority==='high'?'acc':'ghost')+'</td>'+
    '<td style="font-size:11px;color:'+(isDone?'var(--w20)':slaCol)+'">'+(isDone?'—':(sla.overdue?'초과 '+Math.abs(sla.remain)+'h':sla.remain+'h'))+'</td>'+
    '<td style="font-size:11px;color:var(--w40)">'+(sr.assigned_to?getUserName(sr.assigned_to):'미배정')+'</td>'+
    '<td style="font-family:JetBrains Mono;font-size:12px">'+(sr.price?U.krw(sr.price):'\u2014')+'</td></tr>';
  }).join(''):'<tr><td colspan="7">'+UI.empty('💼','결과 없음','')+'</td></tr>')+
  '</tbody></table></div></div>';
}

function pgSRDetail(){
  var sr=S.selectedSR;if(!sr)return'';
  var details=sr.details||{};

  /* SLA 계산 */
  var slaHours={urgent:4,high:24,normal:72,low:168};
  var slaH=slaHours[sr.priority||'normal']||72;
  var elapsed=Math.floor((new Date()-new Date(sr.created_at))/(1000*60*60));
  var remain=slaH-elapsed;var slaPct=Math.min(Math.round(elapsed/slaH*100),100);
  var isDone=sr.status==='completed'||sr.status==='cancelled';
  var slaCol=isDone?'var(--ok)':remain<0?'var(--err)':remain<12?'var(--acc)':'var(--pri)';

  /* SLA 바 */
  var slaBar='<div style="padding:12px;border-radius:10px;background:'+(remain<0&&!isDone?'rgba(255,82,82,.06)':'var(--w08)')+';margin-bottom:16px;border:1px solid '+(remain<0&&!isDone?'rgba(255,82,82,.15)':'var(--bd)')+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
    '<span style="font-size:11px;font-weight:700">SLA '+(isDone?'완료':remain<0?'⚠️ 초과 '+Math.abs(remain)+'시간':'잔여 '+remain+'시간')+'</span>'+
    '<span style="font-size:11px;color:var(--w40)">목표: '+slaH+'h / 경과: '+elapsed+'h</span></div>'+
    '<div style="height:6px;border-radius:3px;background:var(--w08)"><div style="height:100%;border-radius:3px;background:'+slaCol+';width:'+slaPct+'%;transition:width .3s"></div></div></div>';

  /* 담당자 선택 옵션 */
  var adminUsers=S.users.filter(function(u){return u.role==='admin';});
  var assignOpts=[{value:'',label:'-- 미배정 --'}].concat(adminUsers.map(function(u){return {value:u.id,label:U.esc(u.display_name||u.email)};}));

  /* 워크플로우 단계 */
  var stages=['pending','accepted','processing','review','completed'];

  var stageBar='<div style="display:flex;gap:2px;margin-bottom:16px">'+stages.map(function(st,i){
    var active=i<=curIdx;
    return '<div style="flex:1;text-align:center;padding:6px;border-radius:6px;background:'+(active?'rgba(255,107,107,.1)':'var(--w08)')+';cursor:pointer" onclick="Adm.quickSR(\''+sr.id+'\',\''+st+'\')">'+
    '<div style="font-size:10px;font-weight:'+(active?'700':'400')+';color:'+(active?'var(--admin)':'var(--w20)')+'">'+stageL[st]+'</div></div>';
  }).join('')+'</div>';

  return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><button class="btn btn-ghost btn-sm" onclick="Adm.set({selectedSR:null})">← 목록</button><h2 style="font-size:18px;font-weight:800;flex:1">'+U.si(sr.service_type)+' '+U.sl(sr.service_type)+'</h2>'+UI.sb(sr.status)+'</div>'+

  slaBar+stageBar+

  '<div class="grid-2" style="margin-bottom:16px">'+
    '<div class="card"><div class="card-h">📋 요청 정보</div><div class="card-b">'+
      '<div class="detail-row"><div class="detail-label">서비스</div><div class="detail-value">'+U.sl(sr.service_type)+'</div></div>'+
      '<div class="detail-row"><div class="detail-label">유저</div><div class="detail-value" style="cursor:pointer;color:var(--pri)" onclick="Adm.viewUser(\''+sr.user_id+'\')">'+getUserName(sr.user_id)+'</div></div>'+
      '<div class="detail-row"><div class="detail-label">긴급도</div><div class="detail-value">'+UI.badge(sr.priority||'normal',sr.priority==='urgent'?'err':sr.priority==='high'?'acc':'ghost')+'</div></div>'+
      '<div class="detail-row"><div class="detail-label">담당자</div><div class="detail-value">'+(sr.assigned_to?getUserName(sr.assigned_to):'<span style="color:var(--err)">미배정</span>')+'</div></div>'+
      '<div class="detail-row"><div class="detail-label">금액</div><div class="detail-value">'+(sr.price?U.krw(sr.price):'미정')+'</div></div>'+
      '<div class="detail-row"><div class="detail-label">접수</div><div class="detail-value">'+U.fd(sr.created_at)+'</div></div>'+
      (sr.started_at?'<div class="detail-row"><div class="detail-label">시작</div><div class="detail-value">'+U.fd(sr.started_at)+'</div></div>':'')+
      (sr.completed_at?'<div class="detail-row"><div class="detail-label">완료</div><div class="detail-value">'+U.fd(sr.completed_at)+'</div></div>':'')+
      (details.text?'<div style="margin-top:12px;padding:12px;border-radius:8px;background:var(--w08)"><div style="font-size:11px;color:var(--w40);margin-bottom:6px">요청 내용</div><div style="font-size:13px;color:var(--w70);white-space:pre-wrap">'+U.esc(details.text)+'</div></div>':'')+
    '</div></div>'+

    '<div class="card"><div class="card-h">⚡ 처리</div><div class="card-b">'+
      '<div class="grid-2" style="margin-bottom:12px">'+
        UI.sel('sr_status','상태',[{value:'pending',label:'접수'},{value:'accepted',label:'배정'},{value:'processing',label:'처리중'},{value:'review',label:'검토'},{value:'completed',label:'완료'},{value:'cancelled',label:'취소'}],sr.status)+

      '<div class="grid-2" style="margin-bottom:12px">'+
        UI.inp('sr_price','금액 (원)',{type:'number',value:sr.price||'',placeholder:'300000'})+
        UI.sel('sr_priority','긴급도',[{value:'low',label:'낮음'},{value:'normal',label:'일반'},{value:'high',label:'높음'},{value:'urgent',label:'긴급'}],sr.priority||'normal')+
      '</div>'+
      UI.ta('sr_note','관리자 메모',{placeholder:'내부 메모...',value:(sr.admin_notes||sr.admin_note||''),rows:3})+
      '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">'+
        '<button class="btn btn-admin" onclick="Adm.updateSR(\''+sr.id+'\',event)">저장</button>'+

        '<button class="btn btn-danger btn-sm" onclick="Adm.deleteSR(\''+sr.id+'\',event)">삭제</button>'+
      '</div>'+
    '</div></div>'+
  '</div>';
}

function saveDisputeForm(e){
  e.preventDefault();var f=e.target;
  var data={type:f.type.value,subject:f.subject.value,description:f.description.value,priority:f.priority.value,reporter_role:f.reporter_role.value,reporter_id:S.user.id,status:'open'};
  if(f.order_id.value)data.order_id=f.order_id.value;
  if(f.matching_id.value)data.matching_id=f.matching_id.value;
  var _saveDisputeBtn=f.querySelector('[type=submit]');btnLoading(_saveDisputeBtn,true);
  sb.from('disputes').insert(data).select().then(function(r){
    btnLoading(_saveDisputeBtn,false);
    if(r.error)return UI.toast('등록 실패: '+r.error.message,'err');
    S.disputes.unshift(r.data[0]);closeModal('modal-dispute');UI.toast('분쟁이 등록되었습니다','ok');render();
  }).catch(function(){btnLoading(_saveDisputeBtn,false);UI.toast('분쟁 등록 실패 — 네트워크를 확인하세요','err');});
}

  var activeSubs=S.subscriptions.filter(function(s){return s.status==='active';}).length||S.users.filter(function(u){return PLAN_PRICE[u.plan];}).length;
  var activeEsc=S.escrowTxns.filter(function(e){return['funded','in_production','shipped','inspection'].indexOf(e.escrow_status)>=0;}).length;

  /* Plan revenue breakdown */
  var planRev={starter:0,pro:0,alibaba:0,enterprise:0};
  if(S.subscriptions.length){S.subscriptions.filter(function(s){return s.status==='active';}).forEach(function(s){var a=Number(s.amount)||0;var mo=s.billing_cycle==='semi_annual'?a/6:s.billing_cycle==='annual'?a/12:a;var k=(s.plan==='basic')?'starter':s.plan;planRev[k]=(planRev[k]||0)+mo;});}
  else{S.users.forEach(function(u){var p=PLAN_PRICE[u.plan];if(p){var k=(u.plan==='basic')?'starter':u.plan;planRev[k]=(planRev[k]||0)+p.m;}});}
  var maxPR=Math.max.apply(null,Object.values(planRev).concat([1]));

  /* Billing cycle dist */
  var cycleDist={monthly:0,semi_annual:0,annual:0};

  else{S.users.forEach(function(u){if(PLAN_PRICE[u.plan])cycleDist[u.billing_cycle||'monthly']++;});}

    items.forEach(function(it){if(it.name){prodRev[it.name]=(prodRev[it.name]||0)+(Number(it.amount||it.total)||0);}});
    if(!items.length&&o.total_amount){var p=S.products.find(function(pp){return pp.user_id===o.user_id;});if(p)prodRev[p.name_ko||p.name_en||'Unknown']=(prodRev[p.name_ko||p.name_en||'Unknown']||0)+(Number(o.total_amount)||0);}

/* ── Payment Proofs Review ── */
function pgPayProofs(){
  var proofs=S.paymentProofs||[];
  var milestones=S.paymentMilestones||[];
  var tab=S._proofTab||'all';

  // Stats
  var pending=proofs.filter(function(p){return p.status==='pending';}).length;
  var approved=proofs.filter(function(p){return p.status==='approved';}).length;
  var rejected=proofs.filter(function(p){return p.status==='rejected';}).length;
  var totalAmt=milestones.filter(function(m){return m.status==='paid';}).reduce(function(s,m){return s+(Number(m.amount)||0);},0);

  // Filter by tab
  var filtered=proofs;
  if(tab!=='all')filtered=proofs.filter(function(p){return p.status===tab;});

  // Search
  var search=(S.searchFilter||'').toLowerCase();
  if(search){
    filtered=filtered.filter(function(p){
      var ms=milestones.find(function(m){return m.id===p.milestone_id;});
      var deal=ms?S.deals.find(function(d){return d.id===ms.deal_id;}):null;
      return (p.file_name||'').toLowerCase().indexOf(search)>=0||
        (ms&&ms.name&&ms.name.toLowerCase().indexOf(search)>=0)||
        (deal&&deal.title&&deal.title.toLowerCase().indexOf(search)>=0)||
        (p.id||'').indexOf(search)>=0;
    });
  }

  // Pagination
  var pKey='payProofs';
  var pg=S._pg[pKey]||0;
  var perPage=15;
  var paged=filtered.slice(pg*perPage,(pg+1)*perPage);

  var statsHtml='<div class="grid-4" style="margin-bottom:16px">'+
    UI.stat('\uB300\uAE30 \uC911',pending,'\uB9AC\uBDF0 \uD544\uC694','var(--acc)')+
    UI.stat('\uC2B9\uC778',approved,'','var(--ok)')+
    UI.stat('\uBC18\uB824',rejected,'','var(--err)')+
    UI.stat('\uACB0\uC81C \uC644\uB8CC \uCD1D\uC561','$'+Number(totalAmt).toLocaleString(),milestones.filter(function(m){return m.status==='paid';}).length+'\uAC74','var(--pri)')+
  '</div>';

  // Tabs
  var tabCounts={all:proofs.length,pending:pending,approved:approved,rejected:rejected};
  var tabLabels={all:'\uC804\uCCB4',pending:'\uB300\uAE30',approved:'\uC2B9\uC778',rejected:'\uBC18\uB824'};
  var tabHtml='<div style="display:flex;gap:6px;margin-bottom:12px">'+
    ['all','pending','approved','rejected'].map(function(t){
      return '<button class="btn btn-sm '+(tab===t?'btn-pri':'btn-ghost')+'" onclick="Adm.setProofTab(\''+t+'\')">'+tabLabels[t]+' ('+tabCounts[t]+')</button>';
    }).join('')+
  '</div>';

  var searchHtml='<div style="margin-bottom:12px"><input placeholder="\uC99D\uBE59 \uAC80\uC0C9 (\uD30C\uC77C\uBA85, \uB9C8\uC77C\uC2A4\uD1A4, \uB51C)..." value="'+U.esc(S.searchFilter)+'" oninput="Adm.setSearch(this.value)" style="width:100%;max-width:400px;padding:10px 14px;border-radius:10px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:13px"></div>';

  // Table
  var tableHtml='<div class="card"><div class="card-h"><span>\uACB0\uC81C \uC99D\uBE59 \uBAA9\uB85D</span>'+UI.badge(filtered.length+'\uAC74','pri')+'</div><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>\uB51C</th><th>\uB9C8\uC77C\uC2A4\uD1A4</th><th>\uAE08\uC561</th><th>\uC5C5\uB85C\uB354</th><th>\uD30C\uC77C</th><th>\uC0C1\uD0DC</th><th>\uC81C\uCD9C\uC77C</th><th>\uC561\uC158</th></tr></thead><tbody>'+
    (paged.length?paged.map(function(p){
      var ms=milestones.find(function(m){return m.id===p.milestone_id;})||{};
      var deal=S.deals.find(function(d){return d.id===(ms.deal_id||p.deal_id);})||{};

      var statusL={pending:'\uB300\uAE30',approved:'\uC2B9\uC778',rejected:'\uBC18\uB824'};

      var uploaderName=getUserName(p.uploader_id);

      var actionBtns='';

          '<button class="btn btn-sm" style="background:#ef4444;color:#fff;border-color:#ef4444;padding:10px 20px;font-size:14px;min-height:44px;border-radius:8px;font-weight:700;margin-left:4px" onclick="event.stopPropagation();Adm.rejectProofConfirm(\''+p.id+'\')">반려</button>';
      } else if(p.status==='approved'){
        actionBtns='<span style="color:#22c55e;font-size:11px;font-weight:600">\u2713 '+U.fd(p.reviewed_at)+'</span>';

        '<td>'+UI.badge(statusL[p.status]||p.status,statusCol[p.status]||'ghost')+'</td>'+

  '</tbody></table></div></div>';

  var pgInfo={items:paged,page:pg,pages:Math.ceil(filtered.length/perPage)||1,total:filtered.length};
  var pagination=paginationBar(pKey,pgInfo);

  // Milestones overview card
  var msOverview='<div class="card" style="margin-top:16px"><div class="card-h"><span>\uACB0\uC81C \uB9C8\uC77C\uC2A4\uD1A4 \uC804\uCCB4</span>'+UI.badge(milestones.length+'\uAC74','pri')+'</div><div class="card-b" style="padding:0"><table class="tbl"><thead><tr><th>\uB51C</th><th>\uB9C8\uC77C\uC2A4\uD1A4</th><th>\uD0C0\uC785</th><th>\uAE08\uC561</th><th>\uACB0\uC81C\uBC29\uBC95</th><th>\uC0C1\uD0DC</th><th>\uC0DD\uC131\uC77C</th></tr></thead><tbody>'+
    (milestones.length?milestones.slice(0,20).map(function(m){
      var deal=S.deals.find(function(d){return d.id===m.deal_id;})||{};
      var msStatusCol={pending:'acc',proof_submitted:'pri',paid:'ok',rejected:'err'};

      var fmtAmt=m.amount?((m.currency||'USD')+' '+Number(m.amount).toLocaleString()):'—';
      var typeL={deposit:'\uACC4\uC57D\uAE08',pre_shipment:'\uC120\uC801\uC804',balance:'\uC794\uAE08',full_payment:'\uC77C\uC2DC\uBD88',custom:'\uAE30\uD0C0'};
      var methodL={wire_transfer:'T/T \uC1A1\uAE08',lc:'L/C \uC2E0\uC6A9\uC7A5',cash:'\uD604\uAE08'};
      return '<tr>'+
        '<td style="font-size:12px">'+U.esc(U.tr(deal.title||'—',18))+'</td>'+
        '<td style="font-size:12px;font-weight:600">'+U.esc(m.name||'—')+'</td>'+
        '<td style="font-size:11px">'+U.esc(typeL[m.milestone_type]||m.milestone_type||'—')+'</td>'+
        '<td style="font-family:JetBrains Mono;font-weight:700;font-size:12px">'+fmtAmt+'</td>'+
        '<td style="font-size:11px">'+U.esc(methodL[m.payment_method]||m.payment_method||'—')+'</td>'+
        '<td>'+UI.badge(msStatusL[m.status]||m.status,msStatusCol[m.status]||'ghost')+'</td>'+
        '<td style="font-size:11px;color:var(--w40)">'+U.fd(m.created_at)+'</td>'+

    }).join(''):'<tr><td colspan="7">'+UI.empty('\uD83D\uDCB3','\uB9C8\uC77C\uC2A4\uD1A4 \uC5C6\uC74C','')+'</td></tr>')+
  '</tbody></table></div></div>';

  return statsHtml+searchHtml+tabHtml+tableHtml+pagination+msOverview;
}

  var fmtAmt=ms.amount?((ms.currency||'USD')+' '+Number(ms.amount).toLocaleString()):'—';
  var statusCol={pending:'#f59e0b',approved:'#22c55e',rejected:'#ef4444'};
  var statusL={pending:'\uB300\uAE30 \uC911',approved:'\uC2B9\uC778\uB428',rejected:'\uBC18\uB824\uB428'};
  var sc=statusCol[proof.status]||'#94a3b8';

  // Build file preview
  var filePreview='';

    var isImage=(proof.file_type||'').startsWith('image/');

    if(isImage){
      filePreview='<div style="text-align:center;margin:16px 0"><img src="'+U.esc(fileUrl)+'" style="max-width:100%;max-height:400px;border-radius:10px;border:1px solid var(--bd)" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><div style="display:none;padding:20px;color:var(--w40);font-size:12px">\uC774\uBBF8\uC9C0 \uB85C\uB4DC \uC2E4\uD328</div></div>';
    } else {
      filePreview='<div style="text-align:center;margin:16px 0"><a href="'+U.esc(fileUrl)+'" target="_blank" rel="noopener noreferrer" class="btn btn-pri" style="display:inline-flex;align-items:center;gap:6px">\uD83D\uDCC4 PDF \uD30C\uC77C \uBCF4\uAE30 / \uB2E4\uC6B4\uB85C\uB4DC</a></div>';

  }

  var actionBtns='';

    actionBtns='<div style="display:flex;gap:8px;margin-top:16px">'+
      '<button class="btn" style="flex:1;background:#22c55e;color:#fff;border-color:#22c55e;padding:10px 20px;font-weight:700;font-size:14px;min-height:44px;border-radius:8px" onclick="Adm.approveProof(\''+proof.id+'\',event)">\u2713 \uACB0\uC81C \uC2B9\uC778</button>'+
      '<button class="btn" style="flex:1;background:#ef4444;color:#fff;border-color:#ef4444;padding:10px 20px;font-weight:700;font-size:14px;min-height:44px;border-radius:8px" onclick="Adm.rejectProofConfirm(\''+proof.id+'\',event)">\u2717 \uBC18\uB824</button>'+
    '</div>';
  }

  var reviewInfo='';
  if(proof.reviewer_id){
    reviewInfo='<div class="detail-row"><div class="detail-label">\uB9AC\uBDF0\uC5B4</div><div class="detail-value">'+getUserName(proof.reviewer_id)+'</div></div>'+
      '<div class="detail-row"><div class="detail-label">\uB9AC\uBDF0\uC77C\uC2DC</div><div class="detail-value">'+U.fd(proof.reviewed_at)+'</div></div>'+
      (proof.reviewer_notes?'<div class="detail-row"><div class="detail-label">\uBA54\uBAA8</div><div class="detail-value" style="color:var(--err)">'+U.esc(proof.reviewer_notes)+'</div></div>':'');
  }

  var body=

      '<span style="font-size:12px;color:var(--w40)">'+U.fd(proof.created_at)+'</span>'+

function approveProof(proofId,evt){
  if(!confirm('\uC774 \uACB0\uC81C \uC99D\uBE59\uC744 \uC2B9\uC778\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?'))return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.functions.invoke('verify-payment-proof',{body:{proof_id:proofId,action:'approve'}}).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('\uC2B9\uC778 \uC2E4\uD328: '+(r.error.message||r.error),'err');return;}
    var d=r.data;
    if(d&&!d.ok){UI.toast('\uC2B9\uC778 \uC2E4\uD328: '+(d.error||'unknown'),'err');return;}
    var proof=S.paymentProofs.find(function(p){return p.id===proofId;});
    if(proof){proof.status='approved';proof.reviewed_at=new Date().toISOString();proof.reviewer_id=S.user?S.user.id:null;}
    if(d&&d.milestone_id){
      var ms=S.paymentMilestones.find(function(m){return m.id===d.milestone_id;});
      if(ms)ms.status='paid';
    }
    closeModal('proof-detail');
    UI.toast('\uACB0\uC81C \uC99D\uBE59\uC774 \uC2B9\uC778\uB418\uC5C8\uC2B5\uB2C8\uB2E4','ok');
    render();
  });
}

function rejectProofConfirm(proofId,evt){
  if(!confirm('\uC774 \uACB0\uC81C \uC99D\uBE59\uC744 \uBC18\uB824\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?'))return;
  rejectProof(proofId,evt);
}
function rejectProof(proofId,evt){
  var reason=prompt('\uBC18\uB824 \uC0AC\uC720\uB97C \uC785\uB825\uD558\uC138\uC694:');
  if(reason===null)return;
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);
  sb.functions.invoke('verify-payment-proof',{body:{proof_id:proofId,action:'reject',reason:reason||'\uC99D\uBE59 \uBD80\uC801\uD569'}}).then(function(r){
    btnLoading(btn,false);
    if(r.error){UI.toast('\uBC18\uB824 \uC2E4\uD328: '+(r.error.message||r.error),'err');return;}
    var d=r.data;
    if(d&&!d.ok){UI.toast('\uBC18\uB824 \uC2E4\uD328: '+(d.error||'unknown'),'err');return;}
    var proof=S.paymentProofs.find(function(p){return p.id===proofId;});

function exportCSV(table){
  var data=S[table==='service_requests'?'serviceRequests':table]||[];
  if(!data.length){UI.toast('데이터 없음','warn');return;}
  var sensitive=['stripe_customer_id','toss_billing_key','toss_customer_key','password','password_hash','billing_key','secret','token'];
  var keys=Object.keys(data[0]).filter(function(k){return sensitive.indexOf(k)<0;});
  var csv=keys.join(',')+'\n';
  data.forEach(function(row){
    csv+=keys.map(function(k){var v=row[k];if(v==null)return'';v=String(v).replace(/"/g,'""');return v.indexOf(',')>=0||v.indexOf('\n')>=0?'"'+v+'"':v;}).join(',')+'\n';
  });
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=table+'_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
  URL.revokeObjectURL(url);UI.toast('CSV 다운로드','ok');
}

/* === ERROR MONITOR === */
function pgErrorMonitor(){
  var errs=S.clientErrors||[];
  var sf=S.searchFilter||'';
  if(sf){errs=errs.filter(function(e){return (e.error_message||'').toLowerCase().indexOf(sf.toLowerCase())>=0||(e.page||'').toLowerCase().indexOf(sf.toLowerCase())>=0||((e.extra&&e.extra.rid)||'').toLowerCase().indexOf(sf.toLowerCase())>=0;});}
  /* Top 10 errors (24h) */
  var now=Date.now();var h24=now-86400000;
  var recent=errs.filter(function(e){return new Date(e.created_at).getTime()>h24;});
  var msgCount={};recent.forEach(function(e){var k=(e.error_message||'unknown').slice(0,80);msgCount[k]=(msgCount[k]||0)+1;});
  var top10=Object.keys(msgCount).map(function(k){return{msg:k,cnt:msgCount[k]};}).sort(function(a,b){return b.cnt-a.cnt;}).slice(0,10);
  /* Stats */
  var total=errs.length;var today=recent.length;
  var pages=new Set();errs.forEach(function(e){if(e.page)pages.add(e.page);});
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px"><div><input oninput="Adm.setSearch(this.value)" value="'+U.esc(sf)+'" placeholder="RID, 메시지, 페이지 검색..." style="padding:8px 14px;border-radius:8px;background:var(--w08);border:1px solid var(--bd);color:var(--w);font-size:12px;width:300px;outline:none"></div><button class="btn btn-ghost btn-sm" onclick="Adm.refreshErrors()">🔄 새로고침</button></div>';
  /* KPI cards */
  h+='<div class="grid-4" style="margin-bottom:20px">';
  h+='<div class="stat-card"><div class="stat-label">총 에러</div><div class="stat-value" style="color:var(--err)">'+total+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">24시간 내</div><div class="stat-value" style="color:var(--acc)">'+today+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">영향 페이지</div><div class="stat-value" style="color:var(--pri)">'+pages.size+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">에러 유형</div><div class="stat-value" style="color:var(--w60)">'+Object.keys(msgCount).length+'</div></div>';
  h+='</div>';
  /* Top 10 */
  if(top10.length){
    h+='<div class="card" style="margin-bottom:20px"><div class="card-h">Top 에러 (24시간)</div><div class="card-b"><table class="tbl"><thead><tr><th>횟수</th><th>에러 메시지</th></tr></thead><tbody>';
    top10.forEach(function(t){h+='<tr><td><span class="badge badge-err">'+t.cnt+'</span></td><td style="font-size:12px;word-break:break-all">'+U.esc(t.msg)+'</td></tr>';});
    h+='</tbody></table></div></div>';
  }
  /* Recent errors table */
  var pinfo=paginate(errs,'errorMonitor');
  h+='<div class="card"><div class="card-h">최근 에러 ('+total+'건)</div><div class="card-b"><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>시간</th><th>RID</th><th>페이지</th><th>메시지</th><th>유저</th></tr></thead><tbody>';
  if(!pinfo.items.length){h+='<tr><td colspan="5" style="text-align:center;color:var(--w40);padding:20px">에러 없음</td></tr>';}
  pinfo.items.forEach(function(e){
    var dt=new Date(e.created_at);var ts=dt.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})+' '+dt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    var rid=(e.extra&&e.extra.rid)||'-';
    var uid=e.user_id?getUserName(e.user_id):'<span style="color:var(--w20)">비로그인</span>';
    h+='<tr><td style="font-size:11px;white-space:nowrap">'+ts+'</td>';
    h+='<td><span style="font-family:monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--w08);cursor:pointer" onclick="navigator.clipboard.writeText(\''+U.esc(rid)+'\');Adm.UI.toast(\'복사됨\',\'ok\')" title="클릭하여 복사">'+U.esc(rid)+'</span></td>';
    h+='<td style="font-size:11px">'+U.esc((e.page||'').replace(/#/g,' #'))+'</td>';
    h+='<td style="font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+U.esc(e.error_message||'')+'">'+U.esc((e.error_message||'').slice(0,100))+'</td>';
    h+='<td style="font-size:11px">'+uid+'</td></tr>';
  });
  h+='</tbody></table></div>'+paginationBar('errorMonitor',pinfo)+'</div></div>';
  return h;
}

/* === PAGINATION === */
function getPg(key){return S._pg[key]||0;}
function setPg(key,p){S._pg[key]=p;render();}
function paginate(arr,key){
  var pg=getPg(key);var total=arr.length;var pages=Math.ceil(total/PAGE_SIZE)||1;
  if(pg>=pages)pg=pages-1;if(pg<0)pg=0;
  var start=pg*PAGE_SIZE;var sliced=arr.slice(start,start+PAGE_SIZE);
  return{items:sliced,page:pg,pages:pages,total:total};
}
function paginationBar(key,info){
  if(info.pages<=1)return '';
  var btns='';
  for(var i=0;i<info.pages;i++){
    if(info.pages>7&&i>1&&i<info.pages-2&&Math.abs(i-info.page)>1){
      if(btns.slice(-3)!=='...')btns+='<span style="color:var(--w20);padding:0 4px">...</span>';
      continue;
    }
    btns+='<button class="btn btn-sm '+(i===info.page?'btn-pri':'btn-ghost')+'" onclick="Adm.setPg(\''+key+'\','+i+')" style="min-width:30px;padding:4px 8px">'+( i+1)+'</button>';
  }
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:8px 0">'+
    '<span style="font-size:11px;color:var(--w40)">'+info.total+'건 중 '+(info.page*PAGE_SIZE+1)+'-'+Math.min((info.page+1)*PAGE_SIZE,info.total)+'</span>'+
    '<div style="display:flex;gap:4px;align-items:center">'+
    '<button class="btn btn-ghost btn-sm" onclick="Adm.setPg(\''+key+'\','+(info.page-1)+')" '+(info.page<=0?'disabled':'')+' style="padding:4px 8px">&laquo;</button>'+
    btns+
    '<button class="btn btn-ghost btn-sm" onclick="Adm.setPg(\''+key+'\','+(info.page+1)+')" '+(info.page>=info.pages-1?'disabled':'')+' style="padding:4px 8px">&raquo;</button>'+
    '</div></div>';
}

/* ═══ 바우처 결과보고서 자동 생성 ═══ */

    filtA.slice(0,20).forEach(function(a){
      h+='<tr><td style="font-size:11px">'+(a.created_at||'').slice(0,10)+'</td><td>'+U.esc(a.product_name||'—')+'</td><td>'+U.esc(a.category||'—')+'</td><td><span class="badge badge-pri">'+((a.overall_score||0)+'점')+'</span></td><td style="font-size:11px">'+U.esc((a.target_markets||[]).join(', '))+'</td></tr>';

  h+='<div>✅ 수출 서류 (PI/CI/PL/CO) — '+docCnt+'건</div>';
  h+='<div>✅ 바이어 매칭 기록 — '+matchCnt+'건</div>';
  h+='<div>✅ 서비스 이용 로그 — billing_events '+filtBE.length+'건</div>';

/* ── Email Logs ── */
function pgEmailLogs(){
  var logs=S.emailLogs||[];
  var tab=S.emailTab||'all';
  var filtered=logs;
  if(tab==='sent')filtered=logs.filter(function(e){return e.status==='sent';});
  else if(tab==='failed')filtered=logs.filter(function(e){return e.status==='failed';});
  else if(tab==='pending')filtered=logs.filter(function(e){return !e.status||e.status==='pending'||e.status==='queued';});
  if(S.searchFilter)filtered=filtered.filter(function(e){return (e.to_email||'').indexOf(S.searchFilter)>-1||(e.subject||'').indexOf(S.searchFilter)>-1||(e.template_type||'').indexOf(S.searchFilter)>-1;});
  var sent=logs.filter(function(e){return e.status==='sent';}).length;
  var failed=logs.filter(function(e){return e.status==='failed';}).length;
  var h='<div style="margin-bottom:20px"><h2 style="font-size:18px;font-weight:800">📧 이메일 발송 로그</h2><p style="font-size:12px;color:var(--w40);margin-top:4px">전체 '+logs.length+'건 | 발송 '+sent+' | 실패 <span style="color:var(--err)">'+failed+'</span></p></div>';
  /* Stats cards */
  var today=new Date();var t7=new Date(today-7*864e5);
  var recent7=logs.filter(function(e){return new Date(e.created_at)>=t7;}).length;
  var tplCount={};logs.forEach(function(e){var t=e.template_type||'direct';tplCount[t]=(tplCount[t]||0)+1;});
  h+='<div class="grid-4" style="margin-bottom:20px">';
  h+='<div class="stat-card"><div class="stat-value">'+logs.length+'</div><div class="stat-label">전체 발송</div></div>';
  h+='<div class="stat-card"><div class="stat-value" style="color:var(--ok)">'+sent+'</div><div class="stat-label">성공</div></div>';
  h+='<div class="stat-card"><div class="stat-value" style="color:var(--err)">'+failed+'</div><div class="stat-label">실패</div></div>';
  h+='<div class="stat-card"><div class="stat-value">'+recent7+'</div><div class="stat-label">최근 7일</div></div>';
  h+='</div>';
  /* Template breakdown */
  var tplKeys=Object.keys(tplCount);
  if(tplKeys.length){
    h+='<div style="margin-bottom:16px;display:flex;gap:6px;flex-wrap:wrap">';
    var tplLabels={intro:'소개',quote:'견적',sample:'샘플',shipping:'출하',followup:'후속',thankyou:'감사',direct:'직접'};
    tplKeys.forEach(function(k){h+='<span style="font-size:11px;padding:3px 10px;border-radius:12px;background:var(--w08);color:var(--w60)">'+U.esc(tplLabels[k]||k)+' '+tplCount[k]+'</span>';});
    h+='</div>';
  }
  /* Tab filter */
  h+='<div style="display:flex;gap:6px;margin-bottom:12px">';
  ['all','sent','failed','pending'].forEach(function(t){
    var label=t==='all'?'전체':t==='sent'?'발송':t==='failed'?'실패':'대기';
    h+='<button class="btn btn-sm '+(tab===t?'btn-admin':'btn-ghost')+'" onclick="Adm.setEmailTab(\''+t+'\')">'+label+'</button>';
  });
  h+='<div style="flex:1"></div><input placeholder="검색 (이메일, 제목, 템플릿)" value="'+U.esc(S.searchFilter||'')+'" oninput="Adm.setSearch(this.value)" style="padding:6px 12px;border-radius:8px;background:var(--sf);border:1px solid var(--bd);color:var(--w90);font-size:12px;width:240px">';
  h+='</div>';
  /* Table */
  if(!filtered.length){
    h+='<div style="text-align:center;padding:40px;color:var(--w40)"><div style="font-size:32px;margin-bottom:8px">📭</div><div>이메일 로그가 없습니다</div></div>';
  } else {
    h+='<div class="card"><div class="card-b" style="padding:0;overflow-x:auto"><table class="data-table" style="width:100%;font-size:12px;border-collapse:collapse">';
    h+='<thead><tr style="background:var(--w08)"><th style="padding:10px;text-align:left;font-weight:600;color:var(--w40)">시간</th><th style="padding:10px;text-align:left;font-weight:600;color:var(--w40)">수신자</th><th style="padding:10px;text-align:left;font-weight:600;color:var(--w40)">제목</th><th style="padding:10px;text-align:left;font-weight:600;color:var(--w40)">템플릿</th><th style="padding:10px;text-align:center;font-weight:600;color:var(--w40)">상태</th></tr></thead><tbody>';
    filtered.slice(0,100).forEach(function(e){
      var stCls=e.status==='sent'?'badge-ok':e.status==='failed'?'badge-err':'badge-ghost';
      var stTxt=e.status==='sent'?'발송':e.status==='failed'?'실패':'대기';
      var tplLabel={intro:'소개',quote:'견적',sample:'샘플',shipping:'출하',followup:'후속',thankyou:'감사',direct:'직접'};
      h+='<tr style="border-bottom:1px solid var(--bd)">';
      h+='<td style="padding:10px;color:var(--w40);white-space:nowrap">'+U.esc(_fmtTime(e.created_at))+'</td>';
      h+='<td style="padding:10px;font-weight:600">'+U.esc(e.to_email||'')+'</td>';
      h+='<td style="padding:10px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+U.esc(e.subject||'')+'</td>';
      h+='<td style="padding:10px"><span style="font-size:10px;padding:2px 8px;border-radius:8px;background:var(--w08);color:var(--pri)">'+U.esc(tplLabel[e.template_type]||e.template_type||'direct')+'</span></td>';
      h+='<td style="padding:10px;text-align:center"><span class="badge '+stCls+'">'+stTxt+'</span></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
    if(filtered.length>100)h+='<div style="text-align:center;margin-top:12px;font-size:11px;color:var(--w40)">최근 100건만 표시 (전체 '+filtered.length+'건)</div>';
  }
  return h;
}

function setEmailTab(t){S.emailTab=t;S._pg={};render();}

function _fmtTime(dt){if(!dt)return '';var d=new Date(dt);var now=new Date();var diff=now-d;if(diff<6e4)return '방금';if(diff<36e5)return Math.floor(diff/6e4)+'분 전';if(diff<864e5)return Math.floor(diff/36e5)+'시간 전';return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}

function pgAuditLog(){

  var h='<div class="card"><div class="card-h"><span>감사 로그 (최근 500건)</span><button class="btn btn-sm btn-ghost" onclick="sb.from(\'audit_log\').select(\'*\').order(\'created_at\',{ascending:false}).limit(500).then(function(r){S.auditLog=r.data||[];render();UI.toast(\'갱신 완료\',\'ok\');})">🔄 새로고침</button></div><div class="card-b">';
  if(!logs.length)return h+UI.empty('📋','감사 로그 없음','아직 기록된 활동이 없습니다.')+'</div></div>';
  h+='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>시각</th><th>사용자</th><th>액션</th><th>대상</th><th>상세</th></tr></thead><tbody>';
  logs.forEach(function(l){
    var det=l.details?JSON.stringify(l.details).slice(0,80):'';
    h+='<tr><td style="white-space:nowrap;font-size:11px">'+_fmtTime(l.created_at)+'</td><td style="font-size:12px">'+(l.user_email||'-')+'</td><td>'+UI.badge(l.action||'-','pri')+'</td><td style="font-size:12px">'+(l.entity_type?l.entity_type+(l.entity_id?' #'+l.entity_id.slice(0,8):''):'—')+'</td><td style="font-size:11px;color:var(--w40);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+U.esc(det)+'</td></tr>';
  });

}

function pgSystemHub(){
  var tab=S._systemHubTab||'health';

function renderPage(){
  switch(S.page){
    case'usershub':return pgUsersHub();
    case'dealhub':return pgDealHub();
    case'orderpay':return pgOrderPay();
    case'contenthub':return pgContentHub();
    case'systemhub':return pgSystemHub();
    case'dashboard':return pgDash();
    case'analytics':return pgAnalytics();
    case'sellers':return pgSellers();
    case'buyersMgmt':return pgBuyers();
    case'matchings':return pgMatchings();
    case'ordersMgmt':return pgOrders();
    case'payments':return pgPayments();
    case'disputes':return pgDisputes();

/* ── Matching notification: notify both seller and buyer ── */
function notifyMatching(matching){
  if(!matching)return;
  var sellerName='';var buyerName='';
  try{
    var su=S.users.find(function(u){return u.id===matching.user_id;});
    sellerName=su?(su.company_name||su.name||su.email):'';
    var bu=S.buyers.find(function(b){return b.id===matching.buyer_id;});
    buyerName=bu?(bu.company_name||bu.name||bu.email):'';
  }catch(e){}
  var notifications=[
    {
      user_id:matching.user_id,
      type:'matching_created',
      title:'새로운 바이어 매칭',
      body:'새로운 바이어'+(buyerName?' ('+buyerName+')':'')+' 가 매칭되었습니다. 프로젝트를 확인해주세요.',
      link_page:'projects',
      link_id:matching.id,
      is_read:false
    },
    {
      user_id:matching.buyer_id,
      type:'matching_created',
      title:'New Seller Match',
      body:'You have been matched with a Korean manufacturer'+(sellerName?' ('+sellerName+')':'')+'. Check your deals.',
      link_page:'deals',
      link_id:matching.id,
      is_read:false
    }
  ];
  sb.from('notifications').insert(notifications).then(function(r){
    if(r.error)console.warn('[notifyMatching] insert failed:',r.error.message);
    else console.log('[notifyMatching] notifications sent for matching',matching.id);
  });
}

function saveAlibabaSync(projectId){
  var p=S.projects.find(function(x){return x.id===projectId;});if(!p)return;

  var sync={};

    var statusEl=document.getElementById('sync-'+s);

    sync[s]={status:statusEl?statusEl.value:'pending',note:noteEl?noteEl.value.trim():'',updated_at:new Date().toISOString()};
  });
  var _saveSyncBtn=document.querySelector('#sync-form .btn-pri, .modal-f .btn-pri');btnLoading(_saveSyncBtn,true);

    closeModal('sync-form');

    render();
  });
}

function convertInquiryToDeal(inquiryId,evt){
  if(!confirm('\uC774 \uBB38\uC758\uB97C \uD504\uB85C\uC81D\uD2B8(deal)\uB85C \uC804\uD658\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?'))return;
  var inq=S.alibabaInquiries.find(function(x){return x.id===inquiryId;});
  if(!inq){UI.toast('\uBB38\uC758 \uC815\uBCF4\uB97C \uCC3E\uC744 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4','err');return;}
  var btn=evt&&evt.target?evt.target.closest('button'):null;btnLoading(btn,true);

  // Create a new project from inquiry data
  var projectData={
    name:'\uC54C\uB9AC\uBC14\uBC14 \uBB38\uC758 \u2192 '+(inq.buyer_company||inq.buyer_name||'Unknown'),
    user_id:inq.user_id,
    status:'planning',
    target_countries:inq.buyer_country?[inq.buyer_country]:[],
    alibaba_customer:true,
    alibaba_inquiry_id:inq.id,
    notes:'\uBB38\uC758 \uC81C\uD488: '+(inq.product_interest||'\u2014')+'\n\uBC14\uC774\uC5B4: '+(inq.buyer_company||'')+' ('+(inq.buyer_country||'')+')'+'\n\uBB38\uC758\uC77C: '+U.fd(inq.created_at)
  };
  sb.from('projects').insert(projectData).select().single().then(function(r){
    if(r.error){btnLoading(btn,false);UI.toast('\uD504\uB85C\uC81D\uD2B8 \uC0DD\uC131 \uC2E4\uD328: '+r.error.message,'err');return;}
    var newProject=r.data;
    // Update inquiry status to converted
    sb.from('alibaba_inquiries').update({status:'converted',converted_project_id:newProject.id,updated_at:new Date().toISOString()}).eq('id',inquiryId).then(function(r2){
      btnLoading(btn,false);
      if(r2.error){UI.toast('\uBB38\uC758 \uC0C1\uD0DC \uBCC0\uACBD \uC2E4\uD328','warn');}
      var inqItem=S.alibabaInquiries.find(function(x){return x.id===inquiryId;});
      if(inqItem){inqItem.status='converted';inqItem.converted_project_id=newProject.id;}
      S.projects.unshift(newProject);
      closeModal('inquiry-reply');
      UI.toast('\uD504\uB85C\uC81D\uD2B8\uAC00 \uC0DD\uC131\uB418\uC5C8\uC2B5\uB2C8\uB2E4: '+U.esc(newProject.name),'ok',5000);
      render();
    });
  });
}

function showOnboarding(){
  _onboardingStep=0;

function renderOnboarding(){
  var existing=document.getElementById('onboarding-overlay');
  if(existing)existing.remove();
  if(_onboardingStep>=_onboardingSteps.length){
    localStorage.setItem('admin_onboarding_done','1');
    return;
  }
  var step=_onboardingSteps[_onboardingStep];
  var total=_onboardingSteps.length;
  // Highlight the target menu item
  var navItems=document.querySelectorAll('.nav-item');
  navItems.forEach(function(n){n.style.outline='';n.style.outlineOffset='';});

      n.style.outline='2px solid var(--pri)';n.style.outlineOffset='2px';
      n.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  });
  var dotHtml='<div style="display:flex;gap:6px;justify-content:center;margin-top:16px">';
  for(var i=0;i<total;i++){dotHtml+='<div style="width:8px;height:8px;border-radius:4px;background:'+(i===_onboardingStep?'var(--pri)':'var(--w20)')+'"></div>';}

  overlay.id='onboarding-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;';

    '<div style="background:var(--card);border:1px solid var(--bd-l);border-radius:20px;width:90%;max-width:480px;padding:36px;box-shadow:var(--shadow-lg);text-align:center">'+
      '<div style="font-size:48px;margin-bottom:16px">'+step.icon+'</div>'+
      '<div style="font-size:10px;color:var(--w20);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">STEP '+(_onboardingStep+1)+' / '+total+'</div>'+
      '<h3 style="font-size:20px;font-weight:800;margin-bottom:10px">'+step.title+'</h3>'+
      '<p style="font-size:14px;color:var(--w60);line-height:1.7;margin-bottom:24px">'+step.desc+'</p>'+
      dotHtml+
      '<div style="display:flex;gap:8px;justify-content:center;margin-top:20px">'+
        (_onboardingStep>0?'<button class="btn btn-ghost" onclick="Adm.onboardingPrev()" style="min-width:80px">\uC774\uC804</button>':'')+
        '<button class="btn btn-ghost" onclick="Adm.onboardingSkip()" style="min-width:80px;color:var(--w40)">\uAC74\uB108\uB6F0\uAE30</button>'+
        '<button class="btn btn-pri" onclick="Adm.onboardingNext()" style="min-width:80px">'+(_onboardingStep<total-1?'\uB2E4\uC74C':'\uC644\uB8CC')+'</button>'+
      '</div>'+
    '</div>';
  document.body.appendChild(overlay);
}

function onboardingNext(){
  _onboardingStep++;
  if(_onboardingStep>=_onboardingSteps.length){
    var ov=document.getElementById('onboarding-overlay');if(ov)ov.remove();
    localStorage.setItem('admin_onboarding_done','1');

    return;
  }
  renderOnboarding();
}

function onboardingPrev(){

}

function onboardingSkip(){
