<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  bg: "#060B18", bgCard: "#0D1424", bgSurface: "#111B2E",
  navy: "#0A1628", deep: "#070E1B",
  pri: "#00D4FF", priG: "linear-gradient(135deg,#00D4FF,#0088FF)",
  acc: "#FFB800", accG: "linear-gradient(135deg,#FFB800,#FF8C00)",
  ok: "#00E676", err: "#FF5252",
  purple: "#A855F7", purpleG: "linear-gradient(135deg,#A855F7,#6D28D9)",
  w: "#FFFFFF", w90: "rgba(255,255,255,.9)", w60: "rgba(255,255,255,.6)",
  w40: "rgba(255,255,255,.4)", w20: "rgba(255,255,255,.2)", w08: "rgba(255,255,255,.06)",

  glow: "0 0 40px rgba(0,212,255,.15)", glowAcc: "0 0 40px rgba(255,184,0,.12)",
  card: "0 4px 24px rgba(0,0,0,.4)",

const useInView = (th = 0.1) => {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => { const el = ref.current; if (!el) return; if(!window.IntersectionObserver){setV(true);return;} const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: th }); o.observe(el); const t=setTimeout(()=>setV(true),1200); return () => {o.disconnect();clearTimeout(t);}; }, [th]);
  return [ref, v];
};
const Fade = ({ children, delay = 0, style = {} }) => { const [ref, v] = useInView(); return <div ref={ref} style={{ ...style, opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(28px)", transition: `all .8s cubic-bezier(.16,1,.3,1) ${delay}s` }}>{children}</div>; };
const GlowLine = () => <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${T.pri}40, transparent)`, margin: "0 auto", maxWidth: 600 }} />;

const CATEGORIES = [
  { icon: "💄", name: "Beauty & Cosmetics", desc: "K-Beauty, skincare, hair care" },
  { icon: "🍜", name: "Food & Beverage", desc: "Health foods, snacks, beverages" },
  { icon: "⚡", name: "Electronics", desc: "Components, devices, accessories" },
  { icon: "👕", name: "Textiles & Fashion", desc: "Fabrics, apparel, accessories" },
  { icon: "🌿", name: "Health & Wellness", desc: "Supplements, vitamins, wellness products" },

];

    icon: "🔍"
  },
  {
    problem: "No idea what the total landed cost will be",
    solution: "AI calculates HS code, tariffs, FTA benefits, shipping — see your real cost before you commit",
    icon: "💰"
  },
  {

    solution: "AI-verified manufacturers + Stripe-secured payments + full transaction history",

        </Fade>
        <Fade delay={0.1}>
          <h1 className="hero-heading" style={{ fontSize: 48, fontWeight: 800, color: T.w, letterSpacing: -2, lineHeight: 1.15, marginTop: 16 }}>
            Find the right manufacturer<br />in <span style={{ background: T.priG, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>minutes, not months</span>
          </h1>
        </Fade>
        <Fade delay={0.2}>
          <p className="hero-sub" style={{ fontSize: 17, color: T.w60, lineHeight: 1.7, marginTop: 20, maxWidth: 600, margin: "20px auto 0" }}>

        {FAQ_ITEMS.map((item, i) => (
          <Fade key={i} delay={i * 0.05}>
            <div
              style={{ ...s.card, marginBottom: 12, cursor: "pointer", transition: "all .2s" }}
              onClick={() => setFaqOpen(faqOpen === i ? null : i)}
            >
              <div style={{ padding: "18px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16 }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: T.w90, lineHeight: 1.5 }}>{item.q}</div>
                <div style={{ fontSize: 20, color: T.w40, flexShrink: 0, transition: "transform .25s", transform: faqOpen === i ? "rotate(45deg)" : "rotate(0)" }}>+</div>
              </div>
              {faqOpen === i && (
                <div style={{ padding: "0 24px 18px", fontSize: 14, color: T.w60, lineHeight: 1.7 }}>{item.a}</div>
              )}
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ CTA ═══ */
  const ctaSection = (
    <div style={{ padding: "80px 24px", position: "relative" }}>
      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at center, rgba(0,212,255,.06) 0%, transparent 70%)" }} />
      <div style={{ maxWidth: 600, margin: "0 auto", textAlign: "center", position: "relative", zIndex: 1 }}>
        <h2 style={{ fontSize: 32, fontWeight: 800, color: T.w, letterSpacing: -0.5, marginBottom: 12 }}>Ready to source smarter?</h2>
        <p style={{ fontSize: 14, color: T.w40, marginBottom: 32, lineHeight: 1.7 }}>Join buyers using AI to find the best manufacturers. Starting with Korea's finest — expanding worldwide.</p>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
          <a href="/app/buyer?lang=en" style={{ ...s.btn("pri"), textDecoration: "none" }}>Sign Up Free</a>
          <a href="/en" style={{ ...s.btn("ghost"), textDecoration: "none" }}>I'm a Manufacturer</a>
        </div>
      </div>
    </div>
  );

  /* ═══ FOOTER ═══ */
  const footer = (
    <div style={{ background: T.deep, borderTop: `1px solid ${T.border}`, padding: "40px 24px 24px" }}>
      <div className="footer-flex" style={{ maxWidth: 1140, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 24 }}>
        <div>
          <Logo size={22} />
          <div style={{ fontSize: 11, color: T.w20, lineHeight: 1.8, marginTop: 10 }}>
            MOTIVE Global, Inc.<br />
            AI-Powered Global Sourcing Platform<br />
            Contact: creative@mo-tive.com
          </div>
        </div>
        <div className="footer-links" style={{ display: "flex", gap: 32 }}>
          {[
            ["Platform", [["How It Works", "#howitworks"], ["Features", "#features"], ["Categories", "#categories"]]],
            ["For Buyers", [["Sign Up", "/app/buyer?lang=en"], ["Buyer Portal", "/app/buyer"]]],
            ["For Manufacturers", [["Seller Portal", "/en"], ["Export Tools", "/app"]]],
            ["Legal", [["Terms of Service", "/terms/en", true], ["Privacy Policy", "/privacy/en", true], ["Refund Policy", "/refund/en", true]]],
          ].map(([ft, links], i) => (
            <div key={i}>
              <div style={{ fontSize: 12, fontWeight: 700, color: T.w20, marginBottom: 8 }}>{ft}</div>
              {links.map(([l, href, isBlank], j) => <a key={j} href={href} {...(isBlank ? { target: "_blank", rel: "noopener noreferrer" } : {})} style={{ fontSize: 12, color: T.w40, cursor: "pointer", marginBottom: 4, display: "block", textDecoration: "none" }}>{l}</a>)}
            </div>
          ))}
        </div>
      </div>
      <div style={{ maxWidth: 1140, margin: "0 auto", borderTop: `1px solid ${T.border}`, marginTop: 24, paddingTop: 16, display: "flex", justifyContent: "space-between", fontSize: 11, color: T.w20, flexWrap: "wrap", gap: 8 }}>
        <span>&copy; 2026 MOTIVE Global, Inc. All rights reserved.</span>
        <span>Whistle AI &middot; AI-Powered Global Sourcing</span>
      </div>
    </div>
  );

  /* ═══ RENDER ═══ */
  return (
    <div style={{ fontFamily: "'Sora','Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", background: T.bg, color: T.w, minHeight: "100vh" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}a{text-decoration:none}
        button{cursor:pointer;font-family:inherit}select,input,textarea{font-family:inherit}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:${T.bg}}::-webkit-scrollbar-thumb{background:${T.w12};border-radius:3px}
        input::placeholder{color:rgba(255,255,255,.3)}
      `}</style>
      {header}
      {hero}
      {painSection}
      <GlowLine />
      {howSection}
      {aiSection}
      <GlowLine />
      {categoriesSection}
      {paymentSection}
      <GlowLine />
      {enhancedTrustSection}
      <GlowLine />
      {globalLocalizationSection}
      {sanctionsSection}
      <GlowLine />
      {marketCoverageSection}
      {briefSection}
      {freeSection}
      <GlowLine />
      {faqSection}
      {ctaSection}
      {footer}
      {/* Cookie Consent */}
      {!localStorage.getItem('whistle_cookie_ok') && (
        <div id="cookie-banner" style={{position:'fixed',bottom:0,left:0,right:0,padding:'14px 24px',background:'rgba(6,11,24,.96)',borderTop:'1px solid rgba(255,255,255,.08)',display:'flex',alignItems:'center',justifyContent:'center',gap:16,zIndex:9999,backdropFilter:'blur(12px)',flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'rgba(255,255,255,.6)',maxWidth:600}}>We use cookies to improve your experience. By continuing, you agree to our <a href="/privacy/en" target="_blank" style={{color:'#00d4ff',textDecoration:'underline'}}>Privacy Policy</a>.</span>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>{localStorage.setItem('whistle_cookie_ok','1');document.getElementById('cookie-banner').remove()}} style={{padding:'6px 16px',borderRadius:6,background:'#00d4ff',color:'#000',border:'none',fontSize:12,fontWeight:700,cursor:'pointer'}}>Accept</button>
            <button onClick={()=>{document.getElementById('cookie-banner').remove()}} style={{padding:'6px 16px',borderRadius:6,background:'transparent',color:'rgba(255,255,255,.5)',border:'1px solid rgba(255,255,255,.12)',fontSize:12,cursor:'pointer'}}>Decline</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
