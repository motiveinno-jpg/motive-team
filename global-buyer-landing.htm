const LangContext = createContext({ lang: 'en', setLang: function(){} });

function useLang() { return useContext(LangContext); }

function t(key, lang) {
  var dict = translations[lang] || translations.en;
  if (dict[key] !== undefined) return dict[key];
  return translations.en[key] || key;
}

/* ═══════════════════════════════════════════════════
   Language Switcher Component
   ═══════════════════════════════════════════════════ */
function LanguageSwitcher() {
  var ctx = useLang();
  var currentLang = ctx.lang;
  var setLang = ctx.setLang;
  var ref = useRef(null);
  var isOpen = useState(false);
  var open = isOpen[0];
  var setOpen = isOpen[1];

  useEffect(function() {
    function handleClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return function() { document.removeEventListener('mousedown', handleClick); };
  }, []);

  var isRtl = RTL_LANGS.indexOf(currentLang) !== -1;

  return (
    <div ref={ref} style={{ position: 'fixed', bottom: 24, right: isRtl ? 'auto' : 24, left: isRtl ? 24 : 'auto', zIndex: 9998 }}>
      {open && (
        <div style={{ position: 'absolute', bottom: 52, right: 0, background: 'rgba(13,20,36,.97)', border: '1px solid rgba(255,255,255,.1)', borderRadius: 12, padding: '8px 0', minWidth: 160, maxHeight: 320, overflowY: 'auto', backdropFilter: 'blur(16px)', boxShadow: '0 8px 32px rgba(0,0,0,.5)' }}>
          {SUPPORTED_LANGS.map(function(code) {
            var isActive = code === currentLang;
            return (
              <div
                key={code}
                onClick={function() { setLang(code); setOpen(false); }}
                style={{ padding: '8px 16px', fontSize: 13, color: isActive ? '#00D4FF' : 'rgba(255,255,255,.7)', cursor: 'pointer', fontWeight: isActive ? 700 : 500, display: 'flex', justifyContent: 'space-between', alignItems: 'center', transition: 'background .15s', background: isActive ? 'rgba(0,212,255,.06)' : 'transparent' }}
                onMouseEnter={function(e) { if (!isActive) e.currentTarget.style.background = 'rgba(255,255,255,.04)'; }}
                onMouseLeave={function(e) { if (!isActive) e.currentTarget.style.background = 'transparent'; }}
              >
                <span>{LANG_LABELS[code]}</span>
                <span style={{ fontSize: 11, color: 'rgba(255,255,255,.3)', textTransform: 'uppercase' }}>{code}</span>
              </div>
            );
          })}
        </div>
      )}
      <div
        onClick={function() { setOpen(!open); }}
        style={{ width: 44, height: 44, borderRadius: 22, background: 'rgba(13,20,36,.92)', border: '1px solid rgba(255,255,255,.12)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: '0 4px 16px rgba(0,0,0,.4)', backdropFilter: 'blur(12px)', transition: 'all .2s', fontSize: 20 }}
        title="Change language"
      >
        {"\uD83C\uDF10"}
      </div>
    </div>
  );
}

const useInView = (th = 0.1) => {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => { const el = ref.current; if (!el) return; if(!window.IntersectionObserver){setV(true);return;} const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: th }); o.observe(el); const t=setTimeout(()=>setV(true),1200); return () => {o.disconnect();clearTimeout(t);}; }, [th]);
  return [ref, v];
};

        </div>
      </Fade>
    </div>
  );

  /* ═══ WHISTLE BRIEF ═══ */
  const briefSection = (
    <div style={{ ...s.section, padding: "60px 24px" }}>
      <Fade>
        <div style={{ ...s.card, padding: "40px 36px", maxWidth: 700, margin: "0 auto", textAlign: "center", border: `1px solid ${T.purple}25`, background: `linear-gradient(135deg, ${T.bgCard}, rgba(168,85,247,.04))` }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>{"\uD83D\uDCE8"}</div>
          <h3 style={{ fontSize: 22, fontWeight: 800, color: T.w, marginBottom: 8 }}>{_('brief_title')}</h3>
          <p style={{ fontSize: 14, color: T.w60, lineHeight: 1.7, maxWidth: 480, margin: "0 auto 24px" }}>{_('brief_desc')}</p>
          <a href="/brief.html" style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "12px 28px", borderRadius: 10, background: T.purpleG, color: T.w, fontSize: 14, fontWeight: 700, textDecoration: "none", boxShadow: "0 0 24px rgba(168,85,247,.2)", cursor: "pointer" }}>{_('brief_btn')}</a>
        </div>
      </Fade>
    </div>
  );

  /* ═══ ENHANCED TRUST SIGNALS ═══ */
  const enhancedTrustSection = (
    <div style={s.section}>
      <Fade><h2 style={s.heading}>{_('etrust_heading')}</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>{_('etrust_sub')}</p></Fade>
      <div style={{ maxWidth: 640, margin: "40px auto 0" }}>
        {[
          { icon: "\uD83D\uDD0D", text: _('etrust_1'), color: T.pri },
          { icon: "\uD83E\uDD16", text: _('etrust_2'), color: T.acc },
          { icon: "\uD83D\uDEE1\uFE0F", text: _('etrust_3'), color: T.ok },
          { icon: "\uD83D\uDE9A", text: _('etrust_4'), color: T.purple },
          { icon: "\uD83D\uDCAC", text: _('etrust_5'), color: T.pri },
          { icon: "\uD83D\uDCB1", text: _('etrust_6'), color: T.acc },
        ].map((item, i) => (
          <Fade key={i} delay={i * 0.08}>
            <div style={{ display: "flex", alignItems: "center", gap: 16, padding: "14px 0", borderBottom: i < 5 ? `1px solid ${T.border}` : "none" }}>
              <div style={{ width: 40, height: 40, borderRadius: 10, background: `${item.color}10`, border: `1px solid ${item.color}20`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{item.icon}</div>
              <span style={{ fontSize: 15, color: T.w90, fontWeight: 600 }}>{item.text}</span>
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ MARKET COVERAGE ═══ */
  const marketCoverageSection = (
    <div style={{ ...s.section, padding: "80px 24px" }}>
      <Fade><h2 style={s.heading}>{_('market_heading')}</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>{_('market_sub')}</p></Fade>
      <div style={{ maxWidth: 700, margin: "40px auto 0" }}>
        {[
          { icon: "\uD83C\uDF0F", text: _('market_text_1') },
          { icon: "\uD83D\uDCA1", text: _('market_text_2') },
        ].map((item, i) => (
          <Fade key={i} delay={i * 0.1}>
            <div style={{ ...s.card, padding: "20px 24px", marginBottom: 12, display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ fontSize: 24, flexShrink: 0 }}>{item.icon}</div>
              <span style={{ fontSize: 14, color: T.w90, lineHeight: 1.6 }}>{item.text}</span>
            </div>
          </Fade>
        ))}

        {/* TAM highlight */}
        <Fade delay={0.3}>
          <div style={{ textAlign: "center", marginTop: 32, padding: "20px 24px", borderRadius: 12, background: `linear-gradient(135deg, rgba(0,212,255,.06), rgba(168,85,247,.06))`, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 36, fontWeight: 800, background: T.priG, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>1.4B+</div>
            <div style={{ fontSize: 13, color: T.w60, marginTop: 4 }}>{_('market_tam_label')}</div>
          </div>
        </Fade>

        <Fade delay={0.4}>
          <div style={{ textAlign: "center", marginTop: 24 }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
              {["\uD83C\uDDF0\uD83C\uDDF7", "\uD83C\uDDEF\uD83C\uDDF5", "\uD83C\uDDEE\uD83C\uDDF3", "\uD83C\uDDFB\uD83C\uDDF3", "\uD83C\uDDF9\uD83C\uDDED", "\uD83C\uDDEE\uD83C\uDDE9", "\uD83C\uDDF9\uD83C\uDDFC"].map((flag, i) => (
                <span key={i} style={{ fontSize: 28, padding: "2px 4px" }}>{flag}</span>
              ))}
            </div>
            <div style={{ fontSize: 12, color: T.w40, marginTop: 8 }}>{_('market_countries')}</div>
          </div>
        </Fade>
      </div>
    </div>
  );

  /* ═══ FAQ ═══ */
  const FAQ_ITEMS = [
    { q: _('faq_q1'), a: _('faq_a1') },
    { q: _('faq_q2'), a: _('faq_a2') },
    { q: _('faq_q3'), a: _('faq_a3') },
    { q: _('faq_q4'), a: _('faq_a4') },
    { q: _('faq_q5'), a: _('faq_a5') },
    { q: _('faq_q6'), a: _('faq_a6') },
  ];
  const [faqOpen, setFaqOpen] = useState(null);
  const faqSection = (
    <div id="faq" style={{ ...s.section, padding: "80px 24px" }}>
      <Fade><h2 style={s.heading}>{_('faq_heading')}</h2></Fade>
      <Fade delay={0.1}><p style={s.sub}>{_('faq_sub')}</p></Fade>
      <div style={{ maxWidth: 720, margin: "48px auto 0" }}>
        {FAQ_ITEMS.map((item, i) => (
          <Fade key={i} delay={i * 0.05}>
            <div
              style={{ ...s.card, marginBottom: 12, cursor: "pointer", transition: "all .2s" }}
              onClick={() => setFaqOpen(faqOpen === i ? null : i)}
            >
              <div style={{ padding: "18px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16 }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: T.w90, lineHeight: 1.5 }}>{item.q}</div>
                <div style={{ fontSize: 20, color: T.w40, flexShrink: 0, transition: "transform .25s", transform: faqOpen === i ? "rotate(45deg)" : "rotate(0)" }}>+</div>
              </div>
              {faqOpen === i && (
                <div style={{ padding: "0 24px 18px", fontSize: 14, color: T.w60, lineHeight: 1.7 }}>{item.a}</div>
              )}
            </div>
          </Fade>
        ))}
      </div>
    </div>
  );

  /* ═══ CTA ═══ */
  const ctaSection = (
    <div style={{ padding: "80px 24px", position: "relative" }}>
      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at center, rgba(0,212,255,.06) 0%, transparent 70%)" }} />
      <div style={{ maxWidth: 600, margin: "0 auto", textAlign: "center", position: "relative", zIndex: 1 }}>
        <h2 style={{ fontSize: 32, fontWeight: 800, color: T.w, letterSpacing: -0.5, marginBottom: 12 }}>{_('cta_heading')}</h2>
        <p style={{ fontSize: 14, color: T.w40, marginBottom: 32, lineHeight: 1.7 }}>{_('cta_sub')}</p>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
          <a href={"/app/buyer?lang=" + langParam} style={{ ...s.btn("pri"), textDecoration: "none" }}>{_('cta_signup')}</a>
          <a href="/en" style={{ ...s.btn("ghost"), textDecoration: "none" }}>{_('cta_manufacturer')}</a>
        </div>
      </div>
    </div>
  );

  /* ═══ FOOTER ═══ */
  const footer = (
    <div style={{ background: T.deep, borderTop: `1px solid ${T.border}`, padding: "40px 24px 24px" }}>
      <div className="footer-flex" style={{ maxWidth: 1140, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 24 }}>
        <div>
          <Logo size={22} />
          <div style={{ fontSize: 11, color: T.w20, lineHeight: 1.8, marginTop: 10 }}>
            MOTIVE Global, Inc.<br />
            AI-Powered Global Sourcing Platform<br />
            Contact: creative@mo-tive.com
          </div>
        </div>
        <div className="footer-links" style={{ display: "flex", gap: 32 }}>
          {[
            [_('footer_platform'), [[_('nav_how'), "#howitworks"], [_('nav_features'), "#features"], [_('nav_categories'), "#categories"]]],
            [_('footer_for_buyers'), [[_('footer_signup'), "/app/buyer?lang=" + langParam], [_('footer_buyer_portal'), "/app/buyer"]]],
            [_('footer_for_manufacturers'), [[_('footer_seller_portal'), "/en"], [_('footer_export_tools'), "/app"]]],
            [_('footer_legal'), [[_('footer_terms'), "/terms/en", true], [_('footer_privacy'), "/privacy/en", true], [_('footer_refund'), "/refund/en", true]]],
          ].map(([ft, links], i) => (
            <div key={i}>
              <div style={{ fontSize: 12, fontWeight: 700, color: T.w20, marginBottom: 8 }}>{ft}</div>
              {links.map(([l, href, isBlank], j) => <a key={j} href={href} {...(isBlank ? { target: "_blank", rel: "noopener noreferrer" } : {})} style={{ fontSize: 12, color: T.w40, cursor: "pointer", marginBottom: 4, display: "block", textDecoration: "none" }}>{l}</a>)}
            </div>
          ))}
        </div>
      </div>
      <div style={{ maxWidth: 1140, margin: "0 auto", borderTop: `1px solid ${T.border}`, marginTop: 24, paddingTop: 16, display: "flex", justifyContent: "space-between", fontSize: 11, color: T.w20, flexWrap: "wrap", gap: 8 }}>
        <span>{_('footer_copyright')}</span>
        <span>{_('footer_tagline')}</span>
      </div>
    </div>
  );

  /* ═══ RENDER ═══ */
  return (
    <LangContext.Provider value={{ lang: lang, setLang: setLang }}>
      <div style={{ fontFamily: "'Sora','Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", background: T.bg, color: T.w, minHeight: "100vh", direction: isRtl ? 'rtl' : 'ltr' }}>
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');
          *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}a{text-decoration:none}
          button{cursor:pointer;font-family:inherit}select,input,textarea{font-family:inherit}
          ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:${T.bg}}::-webkit-scrollbar-thumb{background:${T.w12};border-radius:3px}
          input::placeholder{color:rgba(255,255,255,.3)}
          html[dir="rtl"] *{text-align:right}
          html[dir="rtl"] h1,html[dir="rtl"] h2,html[dir="rtl"] h3,html[dir="rtl"] h4{text-align:center}
        `}</style>
        {header}
        {hero}
        {painSection}
        <GlowLine />
        {howSection}
        {aiSection}
        <GlowLine />
        {categoriesSection}
        {paymentSection}
        <GlowLine />
        {enhancedTrustSection}
        <GlowLine />
        {globalLocalizationSection}
        {sanctionsSection}
        <GlowLine />
        {marketCoverageSection}
        {freeSection}
        <GlowLine />
        {faqSection}
        {briefSection}
        {ctaSection}
        {footer}
        <LanguageSwitcher />
        {/* Cookie Consent */}
        {!localStorage.getItem('whistle_cookie_ok') && (
          <div id="cookie-banner" style={{position:'fixed',bottom:0,left:0,right:0,padding:'14px 24px',background:'rgba(6,11,24,.96)',borderTop:'1px solid rgba(255,255,255,.08)',display:'flex',alignItems:'center',justifyContent:'center',gap:16,zIndex:9999,backdropFilter:'blur(12px)',flexWrap:'wrap'}}>
            <span style={{fontSize:12,color:'rgba(255,255,255,.6)',maxWidth:600}}>{_('cookie_text')} <a href="/privacy/en" target="_blank" style={{color:'#00d4ff',textDecoration:'underline'}}>{_('cookie_privacy')}</a>.</span>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{localStorage.setItem('whistle_cookie_ok','1');document.getElementById('cookie-banner').remove()}} style={{padding:'6px 16px',borderRadius:6,background:'#00d4ff',color:'#000',border:'none',fontSize:12,fontWeight:700,cursor:'pointer'}}>{_('cookie_accept')}</button>
              <button onClick={()=>{document.getElementById('cookie-banner').remove()}} style={{padding:'6px 16px',borderRadius:6,background:'transparent',color:'rgba(255,255,255,.5)',border:'1px solid rgba(255,255,255,.12)',fontSize:12,cursor:'pointer'}}>{_('cookie_decline')}</button>
            </div>
          </div>
        )}
      </div>
    </LangContext.Provider>
  );
}

window.__whistleTranslations = translations;
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

<script src="/motion-demo.js?v=3"></script>
<script>
setTimeout(function(){
  var features = document.getElementById('features');
  if(features && typeof createBuyerDemo === 'function'){
    var lang = localStorage.getItem('whistle_buyer_lang') || 'en';
    var tr = window.__whistleTranslations;
    var heading = 'See It In Action';
    var sub = 'From manufacturer search to FTA analysis, chat negotiation, secure payment, and delivery — the full sourcing journey';
    if (tr && tr[lang]) {
      heading = tr[lang].demo_heading || heading;
      sub = tr[lang].demo_sub || sub;
    }
    var demoDiv = document.createElement('div');
    demoDiv.style.cssText = 'max-width:1140px;margin:60px auto 0;padding:0 24px 80px';
    demoDiv.innerHTML = '<h2 style="font-size:32px;font-weight:800;color:#fff;text-align:center;margin-bottom:8px">' + heading + '</h2><p style="font-size:15px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:32px">' + sub + '</p>' + createBuyerDemo(false);
    features.insertAdjacentElement("afterend", demoDiv);
    var bootKeys = Object.keys(window).filter(function(k){return k.indexOf('__wdBoot_')===0;});
    bootKeys.forEach(function(k){ try{window[k]();}catch(e){} });
  }
}, 1500);
</script>
