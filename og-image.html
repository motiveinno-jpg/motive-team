<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whistle AI — OG Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 24px;
  }
  h1 { font-size: 18px; font-weight: 500; opacity: 0.6; }
  canvas {
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    max-width: 100%;
    height: auto;
  }
  button {
    background: linear-gradient(135deg, #00d4ff, #0088ff);
    color: #060B18;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  .info {
    font-size: 13px;
    opacity: 0.4;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
<h1>OG Image Generator</h1>
<canvas id="canvas" width="1200" height="630"></canvas>
<button id="download">Download as PNG (1200x630)</button>
<p class="info">
  Save as <code>og-whistle.png</code> in the project root.<br>
  Recommended: use for og:image across all Whistle AI pages.
</p>

<script>
(function () {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var W = 1200;
  var H = 630;

  // Background
  var bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#060B18');
  bgGrad.addColorStop(0.5, '#0a1628');
  bgGrad.addColorStop(1, '#060B18');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle radial glow top-left
  var glow1 = ctx.createRadialGradient(W * 0.3, H * 0.35, 0, W * 0.3, H * 0.35, W * 0.5);
  glow1.addColorStop(0, 'rgba(0, 212, 255, 0.07)');
  glow1.addColorStop(1, 'rgba(0, 212, 255, 0)');
  ctx.fillStyle = glow1;
  ctx.fillRect(0, 0, W, H);

  // Subtle radial glow bottom-right
  var glow2 = ctx.createRadialGradient(W * 0.7, H * 0.65, 0, W * 0.7, H * 0.65, W * 0.4);
  glow2.addColorStop(0, 'rgba(0, 136, 255, 0.05)');
  glow2.addColorStop(1, 'rgba(0, 136, 255, 0)');
  ctx.fillStyle = glow2;
  ctx.fillRect(0, 0, W, H);

  // Grid pattern (subtle)
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
  ctx.lineWidth = 1;
  var GRID_SIZE = 60;
  for (var x = 0; x <= W; x += GRID_SIZE) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (var y = 0; y <= H; y += GRID_SIZE) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Logo box
  var LOGO_SIZE = 68;
  var logoX = W / 2 - 130;
  var logoY = H / 2 - 90;
  var logoGrad = ctx.createLinearGradient(logoX, logoY, logoX + LOGO_SIZE, logoY + LOGO_SIZE);
  logoGrad.addColorStop(0, '#00d4ff');
  logoGrad.addColorStop(1, '#0088ff');

  // Rounded rect for logo
  var r = 15;
  ctx.beginPath();
  ctx.moveTo(logoX + r, logoY);
  ctx.lineTo(logoX + LOGO_SIZE - r, logoY);
  ctx.arcTo(logoX + LOGO_SIZE, logoY, logoX + LOGO_SIZE, logoY + r, r);
  ctx.lineTo(logoX + LOGO_SIZE, logoY + LOGO_SIZE - r);
  ctx.arcTo(logoX + LOGO_SIZE, logoY + LOGO_SIZE, logoX + LOGO_SIZE - r, logoY + LOGO_SIZE, r);
  ctx.lineTo(logoX + r, logoY + LOGO_SIZE);
  ctx.arcTo(logoX, logoY + LOGO_SIZE, logoX, logoY + LOGO_SIZE - r, r);
  ctx.lineTo(logoX, logoY + r);
  ctx.arcTo(logoX, logoY, logoX + r, logoY, r);
  ctx.closePath();
  ctx.fillStyle = logoGrad;
  ctx.fill();

  // "W" letter inside logo
  ctx.font = '900 40px "Helvetica Neue", Arial, sans-serif';
  ctx.fillStyle = '#060B18';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('W', logoX + LOGO_SIZE / 2, logoY + LOGO_SIZE / 2 + 1);

  // "Whistle AI" text
  ctx.font = '800 46px "Helvetica Neue", Arial, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('Whistle AI', logoX + LOGO_SIZE + 20, logoY + LOGO_SIZE / 2);

  // Tagline
  ctx.font = '400 22px "Helvetica Neue", Arial, sans-serif';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('AI-Powered Export Intelligence Platform', W / 2, H / 2 + 30);

  // Divider line
  var LINE_W = 240;
  ctx.strokeStyle = 'rgba(0, 212, 255, 0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2 - LINE_W, H / 2 + 60);
  ctx.lineTo(W / 2 + LINE_W, H / 2 + 60);
  ctx.stroke();

  // Feature pills
  var features = ['Smart Analysis', 'Buyer Matching', 'Document Generation', 'Secure Payments'];
  ctx.font = '400 14px "Helvetica Neue", Arial, sans-serif';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.textAlign = 'center';
  ctx.fillText(features.join('  \u00B7  '), W / 2, H / 2 + 95);

  // Domain at bottom
  ctx.font = '400 14px "Helvetica Neue", Arial, sans-serif';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
  ctx.fillText('whistle-ai.com', W / 2, H - 50);

  // Bottom border accent
  var accentGrad = ctx.createLinearGradient(W * 0.3, H, W * 0.7, H);
  accentGrad.addColorStop(0, 'rgba(0, 212, 255, 0)');
  accentGrad.addColorStop(0.5, 'rgba(0, 212, 255, 0.3)');
  accentGrad.addColorStop(1, 'rgba(0, 136, 255, 0)');
  ctx.strokeStyle = accentGrad;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W * 0.3, H - 1);
  ctx.lineTo(W * 0.7, H - 1);
  ctx.stroke();

  // Download handler
  document.getElementById('download').addEventListener('click', function () {
    var link = document.createElement('a');
    link.download = 'og-whistle.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
})();
</script>
</body>
</html>
