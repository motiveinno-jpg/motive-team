      }
      if (changed !== original) {
        textNodes[i].nodeValue = changed;
      }
    }

    // Also translate text content on buttons
    var buttons = root.querySelectorAll('button, [role="button"]');
    for (var b = 0; b < buttons.length; b++) {
      var btnText = buttons[b].textContent.trim();
      if (dict[btnText] !== undefined) {
        if (buttons[b].childNodes.length === 1 && buttons[b].childNodes[0].nodeType === 3) {
          buttons[b].childNodes[0].nodeValue = dict[btnText];
        }
      }
    }

    // Set document lang and dir for RTL
    document.documentElement.setAttribute('lang', lang);
    if (lang === 'ar') {
      document.documentElement.setAttribute('dir', 'rtl');
    } else {
      document.documentElement.removeAttribute('dir');
    }
  }

  /**
   * Wait for React to finish rendering, then apply translations.
   * Uses MutationObserver to detect when #root has content.
   */
  function waitForReactAndTranslate() {
    var root = document.getElementById('root');
    if (!root) return;

    if (root.children.length > 0) {
      setTimeout(applyGlobalLandingI18n, 150);
      return;
    }

    var observer = new MutationObserver(function(mutations, obs) {
      if (root.children.length > 0) {
        obs.disconnect();
        setTimeout(applyGlobalLandingI18n, 150);
      }
    });

    observer.observe(root, { childList: true, subtree: true });

    setTimeout(function() {
      observer.disconnect();
      applyGlobalLandingI18n();
    }, 5000);
  }

    vi: { banner: '🚀 Giá đối tác sớm — Đăng ký 2026 được giảm giá vĩnh viễn →', cookie: 'Chúng tôi sử dụng cookie để cải thiện dịch vụ. Xem ', cookieLink: 'Chính sách bảo mật', cookieEnd: '.', accept: 'Chấp nhận', decline: 'Từ chối' },
    th: { banner: '🚀 ราคาพาร์ทเนอร์ระยะแรก — สมัครปี 2026 รับส่วนลดถาวร →', cookie: 'เราใช้คุกกี้เพื่อปรับปรุงบริการ ดู', cookieLink: 'นโยบายความเป็นส่วนตัว', cookieEnd: '', accept: 'ยอมรับ', decline: 'ปฏิเสธ' },

    pt: { banner: '🚀 Preço de parceiro antecipado — Cadastro 2026 = preço membro fundador →', cookie: 'Usamos cookies para melhorar o serviço. Veja nossa ', cookieLink: 'Política de Privacidade', cookieEnd: '.', accept: 'Aceitar', decline: 'Recusar' },
    id: { banner: '🚀 Harga partner awal — Daftar 2026 dapat diskon permanen →', cookie: 'Kami menggunakan cookie untuk meningkatkan layanan. Lihat ', cookieLink: 'Kebijakan Privasi', cookieEnd: '.', accept: 'Terima', decline: 'Tolak' },

  };

  function translateBanners() {
    var lang = window._whistleLang || 'en';
    var bt = BANNER_TRANSLATIONS[lang];

    // Prelaunch banner
    var banner = document.getElementById('prelaunch-banner');
    if (banner && bt) {
      banner.textContent = bt.banner;
    } else if (banner && lang === 'en') {
      banner.textContent = 'Early Partner Price — 2026 signups get founding member pricing →';
    }

    // Cookie consent banner
    var cookieBanner = document.getElementById('cookie-consent-banner');
    if (cookieBanner && bt) {
      var p = cookieBanner.querySelector('p');
      if (p) {
        p.innerHTML = bt.cookie + '<a href="/privacy' + (lang === 'ko' ? '' : '/en') + '" style="color:#4f8cff;text-decoration:underline">' + bt.cookieLink + '</a>' + bt.cookieEnd;
      }
      var btns = cookieBanner.querySelectorAll('button');
      if (btns.length >= 2) {
        btns[0].textContent = bt.decline;
        btns[1].textContent = bt.accept;
      }
    }
  }

  // Re-apply translations when language is switched via the lang switcher
  var originalSetLang = window._whistleSetLang;
  if (originalSetLang) {
    window._whistleSetLang = function(lang) {
      originalSetLang(lang);
      setTimeout(function() {
        applyGlobalLandingI18n();
        translateBanners();
      }, 100);
    };
  }

  // Start the process
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      waitForReactAndTranslate();
      translateBanners();
    });
  } else {
    waitForReactAndTranslate();
    translateBanners();
  }
})();
