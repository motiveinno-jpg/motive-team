  window._whistleI18n = translations;

  /**
   * Walk the DOM tree after React renders and replace English text
   * with detected language translations.
   * Uses text-matching approach since React controls the DOM (no data-i18n attrs).
   */
  function applyGlobalLandingI18n() {
    var lang = window._whistleLang || 'en';
    if (lang === 'en') return;

    var dict = translations[lang];
    if (!dict) return;

    // Build sorted keys (longest first to avoid partial matches)
    var keys = Object.keys(dict).sort(function(a, b) { return b.length - a.length; });

    var root = document.getElementById('root');
    if (!root) return;

    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
    var textNodes = [];
    var node;
    while (node = walker.nextNode()) {
      if (node.nodeValue && node.nodeValue.trim().length > 0) {
        textNodes.push(node);
      }
    }

    for (var i = 0; i < textNodes.length; i++) {
      var original = textNodes[i].nodeValue;
      var trimmed = original.trim();

      // Exact match first
      if (dict[trimmed] !== undefined) {
        textNodes[i].nodeValue = original.replace(trimmed, dict[trimmed]);
        continue;
      }

      // Partial match for longer strings containing translatable segments
      var changed = original;
      for (var k = 0; k < keys.length; k++) {
        if (changed.indexOf(keys[k]) !== -1 && dict[keys[k]]) {
          changed = changed.replace(keys[k], dict[keys[k]]);
        }
      }
      if (changed !== original) {
        textNodes[i].nodeValue = changed;
      }
    }

    // Also translate placeholder/value attributes on inputs and buttons
    var buttons = root.querySelectorAll('button, [role="button"], div[onClick]');
    for (var b = 0; b < buttons.length; b++) {
      var btnText = buttons[b].textContent.trim();
      if (dict[btnText] !== undefined) {
        // Only replace if it's a leaf text node (no complex children)
        if (buttons[b].childNodes.length === 1 && buttons[b].childNodes[0].nodeType === 3) {
          buttons[b].childNodes[0].nodeValue = dict[btnText];
        }
      }
    }

    // Set document lang and dir for RTL
    document.documentElement.setAttribute('lang', lang);
    if (lang === 'ar') {
      document.documentElement.setAttribute('dir', 'rtl');
    }

      return;
    }

    // Watch for React to populate #root
    var observer = new MutationObserver(function(mutations, obs) {
      if (root.children.length > 0) {
        obs.disconnect();
        setTimeout(applyGlobalLandingI18n, 150);
      }
    });

    observer.observe(root, { childList: true, subtree: true });

    // Fallback: if MutationObserver doesn't fire within 5s, try anyway
    setTimeout(function() {
      observer.disconnect();
      applyGlobalLandingI18n();
    }, 5000);
  }

  // Re-apply translations when language is switched via the lang switcher
  var originalSetLang = window._whistleSetLang;
  if (originalSetLang) {
    window._whistleSetLang = function(lang) {
      originalSetLang(lang);
      setTimeout(applyGlobalLandingI18n, 100);
    };
  }

  // Start the process
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', waitForReactAndTranslate);
  } else {
    waitForReactAndTranslate();
  }
})();
</script>
