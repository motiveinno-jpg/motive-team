name: Whistle CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Check required HTML files exist and are non-empty
        run: |
          fail=0
          for f in whistle.html buyer.html admin.html; do
            if [ ! -s "$f" ]; then
              echo "FAIL: $f is missing or empty"
              fail=1
            else
              size=$(wc -c < "$f")
              echo "OK: $f exists ($size bytes)"
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi

      - name: Check whistle.html minimum size (>100KB)
        run: |
          size=$(wc -c < whistle.html)
          if [ "$size" -lt 102400 ]; then
            echo "FAIL: whistle.html is only $size bytes (expected >100KB). Possible accidental truncation."
            exit 1
          fi
          echo "OK: whistle.html is $size bytes."

      - name: Security check - target="_blank" without rel="noopener"
        run: |
          matches=$(grep -n 'target="_blank"' whistle.html buyer.html admin.html \
            | grep -v 'rel="noopener' || true)
          if [ -n "$matches" ]; then
            echo "FAIL: Found target=\"_blank\" without rel=\"noopener\":"
            echo "$matches"
            exit 1
          fi
          echo "OK: All target=_blank links have rel=noopener."

      - name: Check business registration number in all HTML files
        run: |
          fail=0
          for f in whistle.html buyer.html admin.html; do
            if ! grep -q "155-88-02209" "$f"; then
              echo "FAIL: $f missing business number 155-88-02209"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "OK: Business number found in all HTML files."

      - name: Check buyer.html for Korean UI leak in buttons/labels
        run: |
          # Look for Korean characters in button/label elements (not comments or JS strings used as keys)
          # Match lines with <button or <label containing Korean
          matches=$(grep -n '<\(button\|label\)[^>]*>.*[가-힣]' buyer.html || true)
          if [ -n "$matches" ]; then
            echo "FAIL: Found Korean text in button/label elements in buyer.html:"
            echo "$matches"
            exit 1
          fi
          echo "OK: No Korean UI leak in buyer.html buttons/labels."

      - name: Check admin.html has no .limit(200)
        run: |
          count=$(grep -c '\.limit(200)' admin.html || true)
          if [ "$count" -gt 0 ]; then
            echo "FAIL: Found $count occurrences of .limit(200) in admin.html"
            exit 1
          fi
          echo "OK: No .limit(200) in admin.html."

      - name: Run Playwright tests (optional)
        continue-on-error: true
        run: |
          if [ -f playwright.config.ts ] || [ -f playwright.config.js ]; then
            npm ci
            npx playwright install --with-deps chromium
            npx playwright test
          else
            echo "No Playwright config found, skipping."
          fi

  deploy-cloudflare:
    needs: static-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=whistle-ai --commit-dirty=true
