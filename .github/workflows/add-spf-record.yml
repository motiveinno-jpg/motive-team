name: Add SPF DNS record for whistle-ai.com

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/add-spf-record.yml'

jobs:
  add-spf:
    runs-on: ubuntu-latest
    steps:
      - name: Add SPF TXT record via Cloudflare API
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_NAME: whistle-ai.com
          SPF_CONTENT: "v=spf1 include:amazonses.com include:_spf.resend.com ~all"
        run: |
          set -euo pipefail

          echo "=== Fetching zone ID for $ZONE_NAME ==="
          ZONE_ID=$(curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "ERROR: Zone not found or token lacks zone:read"
            exit 1
          fi
          echo "Zone ID: $ZONE_ID"

          echo "=== Checking existing SPF records ==="
          EXISTING=$(curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=TXT&name=$ZONE_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "$EXISTING" | jq '.result[] | {id, content}'

          SPF_ID=$(echo "$EXISTING" | jq -r '.result[] | select(.content | startswith("v=spf1")) | .id' | head -1)

          if [ -n "$SPF_ID" ] && [ "$SPF_ID" != "null" ]; then
            echo "=== Updating existing SPF record $SPF_ID ==="
            curl -sS -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$SPF_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"TXT\",\"name\":\"$ZONE_NAME\",\"content\":\"$SPF_CONTENT\",\"ttl\":1}" | jq '.success, .errors'
          else
            echo "=== Creating new SPF record ==="
            curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"TXT\",\"name\":\"$ZONE_NAME\",\"content\":\"$SPF_CONTENT\",\"ttl\":1}" | jq '.success, .errors, .result.id'
          fi

          echo "=== Verification ==="
          sleep 3
          curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=TXT&name=$ZONE_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" | jq '.result[] | {name, content}'
